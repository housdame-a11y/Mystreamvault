  setPlaybackControlsBusy(true);

  clearInterval(p._watchTimer);
  p.playbackState = 'loading'; // freeze the instant we commit to tearing the iframe down — nothing
  // moves the bar again until the global PLAYER_EVENT listener sees player_status === "playing"
  // from the rebuilt iframe
  stopProgressInterpolation();
  setPlayerSyncPoint(target);
  p.fakePaused = false; // a seek always resumes playback, even if the title was paused when pressed
  // Persist the new position immediately — Resume Playback and Watch Progress (continue-watching
  // rows, "watched" checkmarks, etc.) all read straight from item.progress, so this keeps them in
  // sync the instant the seek happens rather than waiting for the next timer tick.
  const watched = isNearPlaybackEnd(target, totalSeconds);
  saveProgress(item, p.key, target, totalSeconds, watched);
  updatePlayerProgressUI(); // snap the bar to the landed position right away, don't wait for the reload
  if(p.subtitleCues) updateSubtitleOverlay(target); // seeking support: recalculate immediately against the new position

  const seekingLabel = `Seeking to ${formatResumeTime(target)}…`;
  // Bring the loading overlay back up now, before the old iframe/cover is even destroyed — see the
  // matching comment in restartPlayer().
  const loadingElNow = document.getElementById('playerLoading');
  const loadingLabelElNow = document.getElementById('playerLoadingLabel');
  if(loadingLabelElNow) loadingLabelElNow.textContent = seekingLabel;
  if(loadingElNow) loadingElNow.classList.remove('done');

  const rebuild = ()=>{
    if(!state.player) return;
    // Root cause (confirmed): vaplayer.ru does not resume playback via t=, it uses resumeAt= —
    // buildResumeEmbedUrl now generates that param, so any reload (fresh open, resume, or seek)
    // lands at the right position. Seeks go through a full renderPlayer() re-render rather than
    // the lighter mountResumedIframe swap simply because that's what was in place when the real
    // fix landed; safe to leave as-is since it's already proven to work correctly end-to-end.
    renderPlayer();
    const labelEl = document.getElementById('playerLoadingLabel');
    if(labelEl) labelEl.textContent = seekingLabel;
  };

  if(iframe){
    iframe.classList.add('player-fade-out');
    setTimeout(()=>{
      if(iframe.isConnected) iframe.remove();
      rebuild();
    }, 380);
  } else {
    cover.classList.remove('visible');
    setTimeout(()=>{
      if(cover.isConnected) cover.remove();
      rebuild();
    }, 380);
  }
  setPlayerPlayIcon(true);
}
// ±20s (or any relative delta) — used by the skip buttons and the progress track's arrow-key handler.
function seekPlayer(deltaSeconds){
  const p = state.player;
  if(!p) return;
  performPlayerSeek((p._elapsedSeconds||0) + deltaSeconds);
}
// Absolute seek from a 0–1 fraction of total duration — used by the progress-bar click/drag handler.
function seekPlayerToPercent(pct){
  const p = state.player;
  if(!p) return;
  const total = p._totalSeconds || 0;
  performPlayerSeek(total * Math.min(Math.max(pct, 0), 1));
}
// RESTART: the one and only "start over from frame zero" implementation. Shared by the Restart
// button AND by performPlayerSeek (whenever a seek — progress-bar drag/click, Home key, or a skip
// that lands at/before 0 — resolves to target 0), so restarting behaves identically no matter which
// control triggered it. Steps, in order:
//   1. stop the playback timer
//   2. reset the elapsed position to 0
//   3. delete (not just zero out) the saved watch progress for this session
//   4. fully remove the existing iframe from the DOM
//   5. mount a brand-new iframe on the same base embed URL, forced to autoplay=1, with no
//      resumeAt/startAt, every other param preserved, plus a fresh cb= cache-buster
//   6. once that iframe loads, restart the watch timer from 0:00 and leave the progress bar at 0
function restartPlayer(){
  const p = state.player;
  if(!p || p.isLive || p._playbackBusy) return; // live channels have no "position" to restart
  const item = getItem(p.itemId);
  if(!item || !p._embedBaseUrl) return; // not a trackable iframe embed — nothing to rebuild

  const iframe = document.getElementById('playerIframeEl');
  const cover = document.getElementById('playerPauseCover');
  if(!iframe && !cover) return; // stage not in a state we can restart from (e.g. mid-teardown)

  p._playbackBusy = true;
  setPlaybackControlsBusy(true);

  // 1. Stop the playback timer.
  clearInterval(p._watchTimer);
  p.playbackState = 'loading'; // frozen until the fresh iframe actually finishes loading, below
  stopProgressInterpolation();
  // 2. Reset the current playback position to 0.
  setPlayerSyncPoint(0);
  p.fakePaused = false;
  // 3. Clear/delete the saved watch progress for the current playback session.
  deleteProgress(item, p.key);
  updatePlayerProgressUI(); // snap the bar back to 0 immediately, don't wait for the reload
  if(p.subtitleCues) updateSubtitleOverlay(0); // restart support: recalculate immediately against position 0

  // Bring the loading overlay back up now, before the old iframe is even destroyed — the stage
  // background is solid #000 either way, but this guarantees the overlay (and not a bare black
  // stage) is what's on top for the whole teardown+rebuild, matching every other player action.
  const loadingElNow = document.getElementById('playerLoading');
  const loadingLabelElNow = document.getElementById('playerLoadingLabel');
  if(loadingLabelElNow) loadingLabelElNow.textContent = 'Restarting…';
  if(loadingElNow) loadingElNow.classList.remove('done');

  const rebuild = ()=>{
    if(!state.player) return;
    mountRestartedIframe(item, state.player, ()=>{ p._playbackBusy = false; setPlaybackControlsBusy(false); });
    const labelEl = document.getElementById('playerLoadingLabel');
    if(labelEl) labelEl.textContent = 'Restarting…';
  };

  // 4. Completely remove the existing iframe (or paused cover) from the DOM.
  if(iframe){
    iframe.classList.add('player-fade-out');
    setTimeout(()=>{
      if(iframe.isConnected) iframe.remove();
      rebuild();
    }, 380);
  } else {
    cover.classList.remove('visible');
    setTimeout(()=>{
      if(cover.isConnected) cover.remove();
      rebuild();
    }, 380);
  }
  setPlayerPlayIcon(true);
}
// Creates a brand-new iframe at buildRestartEmbedUrl(p._embedBaseUrl) — autoplay=1 forced, no
// resumeAt/startAt, every other param preserved, plus a fresh cb= cache-buster — fades it in, and
// restarts the watch timer from 0:00 once it loads. The restarted session then behaves identically
// to a fresh open. onMounted (optional) fires once the iframe has been created and inserted — used
// to clear the busy-lock in restartPlayer without waiting on the cross-origin 'load' event, which is
// unreliable in timing (and sometimes never fires at all) for third-party embeds.
function mountRestartedIframe(item, p, onMounted){
  const stage = document.getElementById('playerStage');
  // Mount inside the persistent brightness wrapper (see .player-media-wrap / PLAYER BRIGHTNESS),
  // not the bare stage — that's what lets the current brightness filter just keep applying to
  // whatever iframe happens to be inside it, with no extra wiring needed here at all.
  const mediaWrap = document.getElementById('playerMediaWrap') || stage;
  if(!stage || !p._embedBaseUrl){ if(onMounted) onMounted(); return; }
  const src = buildRestartEmbedUrl(p._embedBaseUrl);
  console.debug('[StreamVault] iframe src ->', src); // verify: autoplay=1 present, no resumeAt/startAt, cb= present
  const sandbox = state.settings.blockPopupAds ? 'allow-scripts allow-same-origin allow-forms allow-presentation' : '';

  const iframe = document.createElement('iframe');
  iframe.id = 'playerIframeEl';
  iframe.className = 'player-fade-out'; // start invisible; fade to visible once inserted
  iframe.src = src;
  iframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
  iframe.allowFullscreen = true;
  iframe.loading = 'eager';
  if(sandbox) iframe.setAttribute('sandbox', sandbox);

  // Reuse the existing loading spinner (solid #000 background) so there's no white flash while
  // the third-party page behind the iframe boots back up — same treatment as the very first open.
  const loadingEl = document.getElementById('playerLoading');
  const loadingLabelEl = document.getElementById('playerLoadingLabel');
  if(loadingLabelEl) loadingLabelEl.textContent = 'Restarting…';
  if(loadingEl) loadingEl.classList.remove('done');
  mediaWrap.appendChild(iframe);

  requestAnimationFrame(()=> iframe.classList.remove('player-fade-out'));
  // The loading overlay is no longer hidden here via a generic "iframe looks ready" heuristic —
  // it's hidden exclusively by the global PLAYER_EVENT listener (PLAYBACK MANAGER, above) once a
  // real player_status === "playing" message arrives from THIS iframe, via hidePlayerLoadingOverlay().
  // p.playbackState stays 'loading' (frozen at 0:00) until that happens. armIframeEventFallback is
  // the only safety net, for a mirror that never sends events at all.
  armIframeEventFallback(iframe);

  applyPlayerClickShield(); // permanent shield — re-assert it in front of the freshly mounted iframe
  if(onMounted) onMounted();
}
// Creates a brand-new iframe from the saved base embed URL + current elapsed time, fades it in,
// and restarts the watch timer — the resumed/seeked session then behaves identically to a fresh
// open. onMounted (optional) fires once the iframe has been created and inserted — used to clear
// the busy-lock in fakeResumePlayer without waiting on the cross-origin 'load' event, which is
// unreliable in timing (and sometimes never fires at all) for third-party embeds.
// Used by fakeResumePlayer; seekPlayer goes through renderPlayer() instead (see its comment).
function mountResumedIframe(item, p, onMounted, loadingLabel){
  const stage = document.getElementById('playerStage');
  // See the matching comment in mountRestartedIframe — mount inside the persistent brightness
  // wrapper, not the bare stage.
  const mediaWrap = document.getElementById('playerMediaWrap') || stage;
  if(!stage || !p._embedBaseUrl){ if(onMounted) onMounted(); return; }
  const src = buildResumeEmbedUrl(p._embedBaseUrl, p._elapsedSeconds);
  console.debug('[StreamVault] iframe src ->', src); // same verification hook as the initial-mount path
  const sandbox = state.settings.blockPopupAds ? 'allow-scripts allow-same-origin allow-forms allow-presentation' : '';

  const iframe = document.createElement('iframe');
  iframe.id = 'playerIframeEl';
  iframe.className = 'player-fade-out'; // start invisible; fade to visible once inserted
  iframe.src = src;
  iframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
  iframe.allowFullscreen = true;
  iframe.loading = 'eager';
  if(sandbox) iframe.setAttribute('sandbox', sandbox);

  // Reuse the existing loading spinner (solid #000 background) so there's no white flash while
  // the third-party page behind the iframe boots up — same treatment as the very first open.
  const loadingEl = document.getElementById('playerLoading');
  const loadingLabelEl = document.getElementById('playerLoadingLabel');
  if(loadingLabelEl) loadingLabelEl.textContent = loadingLabel || 'Loading stream…';
  if(loadingEl) loadingEl.classList.remove('done');
  mediaWrap.appendChild(iframe);

  requestAnimationFrame(()=> iframe.classList.remove('player-fade-out'));
  // The loading overlay is no longer hidden here via a generic "iframe looks ready" heuristic —
  // it's hidden exclusively by the global PLAYER_EVENT listener (PLAYBACK MANAGER, above) once a
  // real player_status === "playing" message arrives from THIS iframe, via hidePlayerLoadingOverlay().
  // p.playbackState stays 'loading' (frozen at the resume point) until that happens.
  // armIframeEventFallback is the only safety net, for a mirror that never sends events at all.
  armIframeEventFallback(iframe);

  applyPlayerClickShield(); // permanent shield — re-assert it in front of the freshly mounted iframe
  if(onMounted) onMounted();
}

/* =========================================================
   LIFECYCLE RECOVERY
   ---------------------------------------------------------
   Android (and mobile browsers generally) can interrupt playback at any time — an incoming call,
   switching apps, the screen locking, or the OS just backgrounding the tab/WebView to reclaim
   memory. A third-party iframe embed (vaplayer.ru / VidSrc-family) is a cross-origin page we don't
   control: some browsers/WebViews freeze its JS entirely while hidden, and a few discard the frame's
   contents outright under memory pressure, so "returning" to it can mean anything from "still
   playing fine" to "silently dead". Native <video>/hls sources don't have this problem — the
   browser itself owns suspend/resume for those, so this module only ever touches the iframe path.

   Two signal tiers, on purpose:
     - visibilitychange (hidden/visible) and pagehide/pageshow are the authoritative "the app was
       actually backgrounded" signals — these arm the recovery/health-check logic below.
     - blur/focus are also wired up (per spec) but are treated as a lighter-weight signal only:
       clicking into the video/iframe itself fires a window 'blur' even though the app is still
       fully visible and playing normally (focus moved into a same-page cross-origin frame, not
       away from the app), so blur/focus alone only pause/resume cosmetic UI timers and take an
       extra safety-net progress save — they never trigger an iframe rebuild by themselves. Real
       backgrounding always also fires visibilitychange/pagehide, which is what actually recovers
       the player.

   On background: save the exact position + play state immediately, freeze purely cosmetic timers
   (progress-bar interpolation, the auto-hide controls timer) — and touch nothing else. The iframe
   itself is left completely alone; it is never torn down just because the app went to the background.

   On return: if the iframe is still connected and either recent activity was already heard from it
   or the background gap was short, it's left running untouched. Otherwise (node gone, or a real
   PLAYER_EVENT doesn't arrive within a short grace window, or the gap was long enough that a stall
   is likely) the SAME fade-out/remove/mount-with-resumeAt= flow fakeResumePlayer already uses is
   reused to swap in one fresh iframe at the last saved position — never more than one, never a full
   renderPlayer() reset, and only ever a single rebuild per return (guarded by p._playbackBusy, the
   same lock every other rebuild path already respects).
========================================================= */
let lifecycleHiddenAt = null;          // set only by a real background (visibilitychange/pagehide)
let lifecycleRecoveryTimer = null;
const LIFECYCLE_STALE_GAP_MS = 45000;  // background gap long enough to rebuild without waiting for a health-check
const LIFECYCLE_GRACE_MS = 2500;       // health-check grace window on return, for shorter gaps

function isPlayerOverlayOpen(){
  const overlay = document.getElementById('playerOverlay');
  return !!(overlay && overlay.classList.contains('open'));
}
// Immediate, idempotent progress-safety save + cosmetic-timer freeze — shared by every "we might be
// backgrounded" signal (visibilitychange, pagehide, blur). Safe to call repeatedly.
function lifecycleSaveAndFreeze(){
  if(!isPlayerOverlayOpen() || !state.player) return;
  const p = state.player;
  stopProgressInterpolation();       // no point animating a bar nobody can see
  clearTimeout(controlsHideTimer);   // don't let the auto-hide timer burn down off-screen
  if(p.isLive) return;               // nothing trackable to persist for a live channel
  const item = getItem(p.itemId);
  if(!item) return;
  saveProgress(item, p.key, p._elapsedSeconds || 0, p._totalSeconds || 0, false);
}
// Authoritative "app actually left" — arms the health-check/rebuild logic on return.
function handleAppBackground(){
  lifecycleSaveAndFreeze();
  if(lifecycleHiddenAt == null) lifecycleHiddenAt = Date.now();
}
// Lighter-weight signal (window blur, or a visibilitychange/pagehide firing again while already
// backgrounded) — always safe to just re-run the save/freeze without touching the recovery clock.
function handleAppSoftBackground(){
  lifecycleSaveAndFreeze();
}
function handleAppForeground(){
  if(!isPlayerOverlayOpen() || !state.player){ lifecycleHiddenAt = null; return; }
  scheduleHideControls(); // controls should reappear immediately on return, not wait for a fresh interaction
  const p = state.player;
  if(p._embedKind === 'iframe' && p.playbackState === 'playing'){
    startProgressInterpolation(); // resume the bar's smoothing loop right away if it was running
  }
  if(lifecycleHiddenAt == null) return; // was only a blur/refocus, never an actual background — nothing to recover
  const hiddenFor = Date.now() - lifecycleHiddenAt;
  lifecycleHiddenAt = null;
  attemptIframeRecovery(p, hiddenFor);
}
// Decides whether the current iframe needs rebuilding after a real background/foreground cycle,
// and either leaves it alone or hands off to recreateFrozenIframe().
function attemptIframeRecovery(p, hiddenForMs){
  if(!p || p.isLive) return;                          // live channels: nothing to recover
  if(document.getElementById('playerVideoEl')) return; // native <video>/hls: the browser already handled it
  if(p.fakePaused || document.getElementById('playerPauseCover')) return; // user had paused — no live iframe to go stale
  if(!p._embedBaseUrl) return;                          // not a trackable iframe embed at all

  const iframe = document.getElementById('playerIframeEl');
  if(!iframe || !iframe.isConnected){
    // The node itself is gone — some WebViews/browsers discard iframe content under memory
    // pressure while backgrounded. Nothing left to heal; rebuild immediately.
    recreateFrozenIframe(p);
    return;
  }
  if(hiddenForMs >= LIFECYCLE_STALE_GAP_MS){
    // A gap this long (a real phone call, an extended app-switch) is likely enough to have
    // stalled the embed that it's not worth waiting on a health-check first.
    recreateFrozenIframe(p);
    return;
  }
  const lastEventAt = p._lastEventAt || 0;
  if(Date.now() - lastEventAt < LIFECYCLE_GRACE_MS){
    return; // heard from it recently (it kept posting while briefly backgrounded) — healthy, leave it
  }
  // Short gap, nothing heard yet — give the iframe one brief grace window to prove it's still
  // alive with a real PLAYER_EVENT before assuming the worst.
  clearTimeout(lifecycleRecoveryTimer);
  lifecycleRecoveryTimer = setTimeout(()=>{
    if(!state.player || state.player !== p) return; // a different session is open now — irrelevant
    if(p.fakePaused || document.getElementById('playerPauseCover')) return;
    const stillIframe = document.getElementById('playerIframeEl');
    if(!stillIframe || !stillIframe.isConnected){ recreateFrozenIframe(p); return; }
    if((p._lastEventAt||0) > lastEventAt) return; // a fresh event arrived during the grace window — healthy
    recreateFrozenIframe(p); // silence through the whole grace window — treat as frozen/unloaded
  }, LIFECYCLE_GRACE_MS);
}
// Swaps a frozen/unresponsive iframe for a fresh one at the last saved position, reusing the exact
// same fade-out/remove/mount-with-resumeAt= mechanics as fakeResumePlayer — so recovery LOOKS
// identical to a normal resume (no flash, no duplicate iframe) rather than a jarring full reload.
function recreateFrozenIframe(p){
  if(!state.player || state.player !== p || p._playbackBusy) return;
  const item = getItem(p.itemId);
  if(!item || !p._embedBaseUrl) return;
  p._playbackBusy = true;
  setPlaybackControlsBusy(true);
  p.playbackState = 'loading'; // frozen until the fresh iframe reports player_status === "playing"
  stopProgressInterpolation();
  setPlayerSyncPoint(p._elapsedSeconds || 0); // re-stamp — the old sync clock is stale after any gap

  const loadingEl = document.getElementById('playerLoading');
  const loadingLabelEl = document.getElementById('playerLoadingLabel');
  if(loadingLabelEl) loadingLabelEl.textContent = 'Resuming playback…';
  if(loadingEl) loadingEl.classList.remove('done');

  const finish = ()=>{ p._playbackBusy = false; setPlaybackControlsBusy(false); };
  const oldIframe = document.getElementById('playerIframeEl');
  if(oldIframe && oldIframe.isConnected){
    oldIframe.classList.add('player-fade-out');
    setTimeout(()=>{
      if(oldIframe.isConnected) oldIframe.remove();
      if(state.player === p) mountResumedIframe(item, p, finish, 'Resuming playback…');
      else finish();
    }, 380);
  } else {
    mountResumedIframe(item, p, finish, 'Resuming playback…');
  }
}

document.addEventListener('visibilitychange', ()=>{
  if(document.hidden) handleAppBackground(); else handleAppForeground();
});
window.addEventListener('pagehide', handleAppBackground);
window.addEventListener('pageshow', handleAppForeground);
window.addEventListener('blur', handleAppSoftBackground);
window.addEventListener('focus', handleAppForeground);

/* =========================================================
   GLOBAL KEYS
========================================================= */
document.addEventListener('keydown', e=>{
  if(document.getElementById('subtitlePromptOverlay').classList.contains('open')){
    if(e.key==='Escape') cancelSubtitlePrompt();
    return;
  }
  if(e.key==='Escape'){
    if(document.getElementById('shortcutsOverlay').classList.contains('open')){ closeShortcutsOverlay(); return; }
    if(document.getElementById('playerOverlay').classList.contains('open')) closePlayer();
    else if(document.getElementById('modalOverlay').classList.contains('open')) closeModal();
    return;
  }
  // '?' — keyboard shortcuts cheat sheet. Works from anywhere (browsing or mid-playback), except
  // while actually typing in a field, where a literal '?' character should just be typed normally.
  if(e.key==='?'){
    const focusedTag = (document.activeElement && document.activeElement.tagName) || '';
    if(focusedTag==='INPUT' || focusedTag==='TEXTAREA' || focusedTag==='SELECT') return;
    e.preventDefault();
    toggleShortcutsOverlay();
    return;
  }
  const playerOpen = document.getElementById('playerOverlay').classList.contains('open');
  if(!playerOpen) return;
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
  const vid = document.getElementById('playerVideoEl');
  scheduleHideControls();
  if(e.key==='f' || e.key==='F'){ e.preventDefault(); togglePlayerFullscreen(); return; }
  if(e.key==='h' || e.key==='H'){ e.preventDefault(); togglePlayerHide(); return; }
  // Quick subtitle nudge — deliberately available for iframe embeds too (that's the path that
  // actually drifts), so a user can correct sync mid-scene without pausing to hunt through the
  // subtitle panel. '[' / ']' = 1/6s (a natural single "tap" adjustment), Shift+ = a full 1s jump.
  if((e.key==='[' || e.key===']') && state.player && state.player.subtitleCues){
    e.preventDefault();
    const step = e.shiftKey ? 1 : (1/6);
    adjustSubtitleOffset(e.key===']' ? step : -step);
    return;
  }
  // Space / Left / Right work for BOTH direct <video> sources and third-party iframe embeds — the
  // iframe branch routes through togglePlayerPlayPause()/seekPlayer(), the exact same fake-pause/
  // seek machinery the on-screen buttons already use (see PLAYBACK MANAGER). 'M' (mute) stays
  // direct-video-only below: there's no way for a parent page to mute audio inside a cross-origin
  // iframe at all, so it's left off entirely for embeds rather than silently doing nothing.
  if(e.key===' ' || e.code==='Space'){ e.preventDefault(); togglePlayerPlayPause(); return; }
  if(e.key==='ArrowRight'){
    e.preventDefault();
    if(vid) vid.currentTime = Math.min(vid.duration||Infinity, vid.currentTime+10);
    else if(state.player && state.player._embedBaseUrl && !state.player.isLive) seekPlayer(10);
    return;
  }
  if(e.key==='ArrowLeft'){
    e.preventDefault();
    if(vid) vid.currentTime = Math.max(0, vid.currentTime-10);
    else if(state.player && state.player._embedBaseUrl && !state.player.isLive) seekPlayer(-10);
    return;
  }
  if(vid && (e.key==='m' || e.key==='M')){ e.preventDefault(); vid.muted = !vid.muted; }
});

router.__manual__ = function(){};

/* =========================================================
   ANDROID TV MODE
   Activated by: ?tv=1 in the URL, OR localStorage flag,
   OR auto-detected (large screen + no fine pointer = TV/projector)
========================================================= */
function isTvMode(){
  // Auto-detect only: large screen + coarse pointer (remote/gamepad) or no hover capability
  const coarse = window.matchMedia('(pointer: coarse)').matches;
  const wide = window.innerWidth >= 1280;
  const noHover = window.matchMedia('(hover: none)').matches;
  return wide && (coarse || noHover);
}

// Make all interactive elements reachable via D-pad (tabindex=0)
function makeFocusable(){
  if(!document.body.classList.contains('tv-mode')) return;
  // Cards, episode cards, channel cards, nav items, buttons, links
  document.querySelectorAll('.card, .episode-card, .channel-card, .collection-card, .watchlist-row, .schedule-row, .nav-item').forEach(el=>{
    if(!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
  });
}

// Re-run makeFocusable whenever the page re-renders
const _origRouter = router;
window.addEventListener('hashchange', ()=> setTimeout(makeFocusable, 120));
// Patch router to always re-apply after render
const _patchedRouter = router;

// D-pad / keyboard navigation in TV mode
document.addEventListener('keydown', e=>{
  if(!document.body.classList.contains('tv-mode')) return;

  // Back button (Escape or AndroidTV back = Escape in WebView)
  if(e.key === 'Escape' || e.key === 'GoBack'){
    if(document.getElementById('subtitlePromptOverlay').classList.contains('open')){ cancelSubtitlePrompt(); return; }
    if(document.getElementById('playerOverlay').classList.contains('open')){ closePlayer(); return; }
    if(document.getElementById('modalOverlay').classList.contains('open')){ closeModal(); return; }
    if(state.route !== 'home'){ history.back(); return; }
  }

  // Play button on remote — quick play focused card
  if(e.key === 'MediaPlayPause' || e.key === 'Play'){
    const focused = document.activeElement;
    if(focused && focused.classList.contains('card')){
      const id = focused.getAttribute('onclick')||'';
      const m = id.match(/detail\/([^']+)/);
      if(m) quickPlay(m[1]);
    }
    return;
  }

  // Enter/OK on focused card or nav item
  if(e.key === 'Enter'){
    const focused = document.activeElement;
    if(focused && (focused.classList.contains('card') || focused.classList.contains('nav-item') || focused.classList.contains('episode-card') || focused.classList.contains('channel-card') || focused.classList.contains('collection-card') || focused.classList.contains('watchlist-row') || focused.classList.contains('schedule-row'))){
      e.preventDefault();
      focused.click();
      return;
    }
  }

  // Arrow key spatial navigation between focusable elements
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    const player = document.getElementById('playerOverlay');
    if(player && player.classList.contains('open')) return; // let player handle arrows

    const focusable = Array.from(document.querySelectorAll(
      '.card, .episode-card, .channel-card, .collection-card, .watchlist-row, .schedule-row, .nav-item, .btn, .btn-icon, input, select, textarea, [tabindex="0"]'
    )).filter(el=>{
      const r = el.getBoundingClientRect();
      return r.width > 0 && r.height > 0 && !el.closest('.player-overlay');
    });

    const current = document.activeElement;
    if(!focusable.length) return;

    if(!focusable.includes(current)){
      // Nothing focused yet — focus the first card or nav item
      const first = focusable.find(el=>el.classList.contains('nav-item') || el.classList.contains('card'));
      if(first){ e.preventDefault(); first.focus(); }
      return;
    }

    const cr = current.getBoundingClientRect();
    const cx = cr.left + cr.width/2;
    const cy = cr.top + cr.height/2;

    // Find the best candidate in the pressed direction
    let best = null, bestScore = Infinity;
    for(const el of focusable){
      if(el === current) continue;
      const r = el.getBoundingClientRect();
      const ex = r.left + r.width/2;
      const ey = r.top + r.height/2;
      const dx = ex - cx, dy = ey - cy;

      let inDir = false;
      if(e.key==='ArrowRight' && dx > 10) inDir = true;
      if(e.key==='ArrowLeft'  && dx < -10) inDir = true;
      if(e.key==='ArrowDown'  && dy > 10) inDir = true;
      if(e.key==='ArrowUp'    && dy < -10) inDir = true;
      if(!inDir) continue;

      // Score: prioritise alignment on the perpendicular axis, then distance
      const perpendicular = (e.key==='ArrowLeft'||e.key==='ArrowRight') ? Math.abs(dy) : Math.abs(dx);
      const distance = Math.sqrt(dx*dx + dy*dy);
      const score = perpendicular * 2 + distance;
      if(score < bestScore){ bestScore = score; best = el; }
    }

    if(best){
      e.preventDefault();
      best.focus();
      best.scrollIntoView({block:'nearest', inline:'nearest', behavior:'smooth'});
    }
  }
}, true);

// Init TV mode on load — fully automatic, no user action needed
if(isTvMode()){
  document.body.classList.add('tv-mode');
}
setTimeout(makeFocusable, 200);
window.addEventListener('hashchange', ()=> setTimeout(makeFocusable, 200));

applySubtitleDisplayStyle(); // apply saved subtitle size/color/opacity before first render
router();
</script>
</body>
</html>
