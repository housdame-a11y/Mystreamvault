      <div id="tmdbTopListGrid" data-media-type="${mediaType}">
        ${state.settings.tmdb ? `<div class="grid-3col">${Array.from({length:9}).map(()=> `<div class="card skeleton-card"></div>`).join('')}</div>` : emptyState('TMDB API key required', `Add a TMDB API key in Settings to fetch the ${esc(label)} list.`, 'Open Settings', "location.hash='settings'")}
      </div>
    </div>`;
}
async function loadTmdbTopListGrid(mediaType){
  const container = document.getElementById('tmdbTopListGrid');
  if(!container || !state.settings.tmdb) return;
  const endpoint = mediaType==='movie' ? 'movie' : 'tv';
  // Titles the user removed from this list (see removeFromTmdbTop100 / SETTINGS > TMDB Top 100) are
  // filtered out here, and we keep pulling further TMDB pages past the usual 5 until we've backfilled
  // up to 100 titles again — so a removal always results in the next-best-ranked replacement, not a
  // shorter list. Only the bare TMDB id is kept for this — no title/poster is retained anywhere.
  const excludedIds = new Set(state.settings.tmdbTop100Excluded[mediaType]||[]);
  try{
    const results = [];
    const seen = new Set();
    const MAX_PAGES = 20; // headroom: 5 pages normally covers it, more only kick in to replace removals
    for(let page=1; page<=MAX_PAGES && results.length<100; page++){
      const data = await fetch(`https://api.themoviedb.org/3/${endpoint}/top_rated?api_key=${encodeURIComponent(state.settings.tmdb)}&page=${page}`).then(r=>r.json());
      const pageResults = data.results || [];
      if(!pageResults.length) break; // TMDB ran out of pages
      for(const r of pageResults){
        if(!r.poster_path || excludedIds.has(r.id) || seen.has(r.id)) continue;
        seen.add(r.id);
        results.push(r);
        if(results.length>=100) break;
      }
    }
    if(!container.isConnected || container.dataset.mediaType!==mediaType) return;
    if(!results.length){ container.innerHTML = emptyState('Nothing to show', 'TMDB did not return any results just now.'); return; }
    container.innerHTML = `<div class="grid-3col">${results.map(r=>tmdbTopListCardHtml(r,mediaType)).join('')}</div>`;
  }catch(e){
    if(container.isConnected) container.innerHTML = emptyState('Could not load Top 100', 'Check your connection or TMDB API key and try again.');
  }
}
// Same visual as externalSimilarCardHtml() but with a hover "remove" button (reusing the .card-remove
// pattern from Continue Watching) so a title can be taken out of the Top 100 list directly. Removing
// one records it in state.settings.tmdbTop100Excluded and reloads the grid, which pulls the next
// best-ranked, not-yet-excluded title in from later TMDB pages — an automatic replacement.
function tmdbTopListCardHtml(tmdbItem, mediaType){
  const title = mediaType==='tv' ? tmdbItem.name : tmdbItem.title;
  const year = ((mediaType==='tv' ? tmdbItem.first_air_date : tmdbItem.release_date)||'').split('-')[0];
  const poster = tmdbItem.poster_path ? `https://image.tmdb.org/t/p/w342${tmdbItem.poster_path}` : '';
  const titleJs = esc(title).replace(/'/g,"&#39;");
  return `
    <div class="card" onclick="quickAddFromTmdb(${tmdbItem.id}, '${mediaType}')" title="Add to your library">
      ${poster ? `<img src="${esc(poster)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>` : fallbackHtml(title)}
      <span class="card-badge">${mediaType==='tv'?'Series':'Movie'}</span>
      <button type="button" class="card-remove" title="Remove from Top 100" onclick="event.stopPropagation(); removeFromTmdbTop100('${mediaType}', ${tmdbItem.id}, '${titleJs}')">${ICON.close}</button>
      <div class="card-overlay">
        <div class="card-play" style="background:var(--highlight);">${ICON.plus}</div>
        <div class="card-title">${esc(title)}</div>
        <div class="card-meta">${esc(year||'')}${year?' • ':''}Add to library</div>
      </div>
    </div>`;
}
// Removes a title from the live TMDB Top 100 Shows/Movies list. Only the bare TMDB id is persisted to
// settings (state.settings.tmdbTop100Excluded) — no title, poster, or year is stored or shown anywhere
// in Settings, since the id alone is all that's needed to keep filtering it out of the list. `title`
// is only used for the confirmation toast and is never written to settings. This is permanent — there's
// no restore.
function removeFromTmdbTop100(mediaType, id, title){
  if(!state.settings.tmdbTop100Excluded) state.settings.tmdbTop100Excluded = {movie:[], tv:[]};
  const list = state.settings.tmdbTop100Excluded[mediaType] || (state.settings.tmdbTop100Excluded[mediaType]=[]);
  if(!list.includes(id)) list.push(id);
  saveSettings();
  toast(title ? `Removed "${title}" — replaced automatically` : 'Removed — replaced automatically');
  loadTmdbTopListGrid(mediaType);
}
// Settings > TMDB Top 100 search box — lets a title be removed directly from Settings by searching
// for it, instead of requiring the user to open the collection page and hover a card to reveal the
// ✕ (which isn't reachable at all on touch devices, since that button only appears on :hover).
let tmdbTop100SearchDebounce = {};
function debounceTmdbTop100Search(mediaType){
  clearTimeout(tmdbTop100SearchDebounce[mediaType]);
  tmdbTop100SearchDebounce[mediaType] = setTimeout(()=> searchTmdbTop100Exclude(mediaType), 450);
}
async function searchTmdbTop100Exclude(mediaType){
  const input = document.getElementById('tmdbTop100SearchInput_'+mediaType);
  const container = document.getElementById('tmdbTop100SearchResults_'+mediaType);
  if(!input || !container) return;
  const query = input.value.trim();
  if(!query){ container.innerHTML = ''; return; }
  if(!state.settings.tmdb){ container.innerHTML = `<div class="manage-lib-empty">Add a TMDB API key above to search.</div>`; return; }
  container.innerHTML = `<div class="manage-lib-empty">Searching…</div>`;
  const endpoint = mediaType==='movie' ? 'search/movie' : 'search/tv';
  try{
    const data = await fetch(`https://api.themoviedb.org/3/${endpoint}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(query)}`).then(r=>r.json());
    const results = (data.results||[]).filter(r=>r.poster_path).slice(0,8);
    if(container!==document.getElementById('tmdbTop100SearchResults_'+mediaType)) return; // stale response
    if(!results.length){ container.innerHTML = `<div class="manage-lib-empty">No results for "${esc(query)}".</div>`; return; }
    const excludedIds = new Set(state.settings.tmdbTop100Excluded[mediaType]||[]);
    container.innerHTML = `<div class="manage-lib-rows">${results.map(r=>{
      const title = mediaType==='tv' ? r.name : r.title;
      const year = ((mediaType==='tv' ? r.first_air_date : r.release_date)||'').split('-')[0];
      const poster = r.poster_path ? `https://image.tmdb.org/t/p/w92${r.poster_path}` : '';
      const titleJs = esc(title).replace(/'/g,"&#39;");
      const already = excludedIds.has(r.id);
      return `<div class="manage-lib-row">
        <div class="manage-lib-poster">${poster ? `<img src="${esc(poster)}" alt="" loading="lazy" onload="this.classList.add('loaded')">` : fallbackHtml(title||'')}</div>
        <div class="manage-lib-info">
          <div class="manage-lib-title">${esc(title||'Untitled')}</div>
          <div class="manage-lib-meta">${esc(year||'')}</div>
        </div>
        <div class="manage-lib-actions">
          <button type="button" class="btn btn-ghost" ${already?'disabled':''} onclick="removeFromTmdbTop100SettingsSearch('${mediaType}', ${r.id}, '${titleJs}')">${already?'Removed':'Remove'}</button>
        </div>
      </div>`;
    }).join('')}</div>`;
  }catch(e){
    if(container.isConnected) container.innerHTML = `<div class="manage-lib-empty">Search failed. Check your connection or TMDB API key.</div>`;
  }
}
// Wraps removeFromTmdbTop100 for the Settings search box specifically: re-runs the search so the
// "Remove" button on the just-removed result immediately flips to "Removed", and patches the count
// label directly (not a full router() re-render, which would wipe out whatever the user was typing
// in the search box). There's no removed-titles list to keep in sync — Settings only ever shows a
// count, never the names of removed titles.
function removeFromTmdbTop100SettingsSearch(mediaType, id, title){
  removeFromTmdbTop100(mediaType, id, title);
  searchTmdbTop100Exclude(mediaType);
  const count = (state.settings.tmdbTop100Excluded[mediaType]||[]).length;
  const countEl = document.getElementById('tmdbTop100Count_'+mediaType);
  if(countEl) countEl.textContent = `${mediaType==='movie'?'Movies':'Shows'} (${count} removed)`;
}

function normalizeChannelsJson(data){
  const arr = Array.isArray(data) ? data : (data && Array.isArray(data.channels) ? data.channels : null);
  if(!arr) throw new Error('JSON must be an array of channels, or an object like {"channels":[...]}');
  return arr.map(c=>{
    const name = (c.name || c.title || 'Untitled Channel').toString();
    const logo = (c.logo || c.icon || c.image || '').toString();
    const category = (c.type || c.category || c.genre || 'General').toString();
    const language = (c.language || c.lang || '').toString();
    let sources = [];
    if(Array.isArray(c.sources)) sources = c.sources.map(s=>({label:(s.label||'Source').toString(), url:(s.url||s.link||'').toString()})).filter(s=>s.url);
    else if(Array.isArray(c.urls)) sources = c.urls.filter(Boolean).map((u,i)=>({label:'Source '+(i+1), url:u.toString()}));
    else if(typeof c.url==='string' && c.url) sources = [{label:'Source 1', url:c.url}];
    else if(typeof c.link==='string' && c.link) sources = [{label:'Source 1', url:c.link}];
    return {name, logo, category, language, sources};
  }).filter(c=>c.sources.length);
}
// Parses a standard M3U/M3U8 playlist (#EXTM3U header, #EXTINF metadata lines followed by a URL).
// Grabs tvg-logo, group-title, and tvg-language/tvg-country from each #EXTINF line when present.
function parseM3UPlaylist(text){
  const lines = text.split(/\r\n|\r|\n/);
  const entries = [];
  let current = null;
  const attrRegex = /([a-zA-Z0-9_-]+)="([^"]*)"/g;
  for(const raw of lines){
    const line = raw.trim();
    if(!line) continue;
    if(/^#EXTM3U/i.test(line)) continue;
    if(/^#EXTINF/i.test(line)){
      const commaIdx = line.indexOf(',');
      const attrsPart = commaIdx>-1 ? line.slice(0, commaIdx) : line;
      const namePart = commaIdx>-1 ? line.slice(commaIdx+1).trim() : '';
      const attrs = {};
      let m;
      attrRegex.lastIndex = 0;
      while((m = attrRegex.exec(attrsPart))) attrs[m[1].toLowerCase()] = m[2];
      current = {
        name: namePart || attrs['tvg-name'] || 'Untitled Channel',
        logo: attrs['tvg-logo'] || attrs['tvg-logo-small'] || '',
        category: attrs['group-title'] || '',
        language: attrs['tvg-language'] || attrs['tvg-country'] || '',
      };
    } else if(/^#EXTGRP:/i.test(line)){
      if(current && !current.category) current.category = line.slice(line.indexOf(':')+1).trim();
    } else if(line.startsWith('#')){
      continue; // other directives (#EXTVLCOPT, #KODIPROP, #EXTHTTP, etc.) aren't needed for playback here
    } else {
      // A plain, non-comment line is the stream URL for whichever #EXTINF preceded it.
      if(current){
        entries.push(Object.assign({}, current, {url:line}));
        current = null;
      } else {
        entries.push({name:`Channel ${entries.length+1}`, logo:'', category:'', language:'', url:line});
      }
    }
  }
  return entries;
}
function normalizeM3U(entries){
  return entries.filter(e=>e.url).map(e=>({
    name: e.name || 'Untitled Channel',
    logo: e.logo || '',
    category: e.category || 'General',
    language: e.language || '',
    sources: [{label:'Source 1', url:e.url}],
  }));
}
function applyChannelsJsonImport(){
  const text = document.getElementById('channelsJsonText').value.trim();
  if(!text){ toast('Paste or upload a file first'); return; }
  let normalized;
  if(/^#EXTM3U/i.test(text) || /#EXTINF/i.test(text)){
    try{ normalized = normalizeM3U(parseM3UPlaylist(text)); }
    catch(e){ toast('Failed to parse M3U playlist: '+e.message); return; }
  } else {
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ toast('Could not read that as JSON or M3U — check the file format'); return; }
    try{ normalized = normalizeChannelsJson(data); }
    catch(e){ toast(e.message); return; }
  }
  if(!normalized.length){ toast('No valid channels found (each needs at least one URL)'); return; }
  state.lib.channels = state.lib.channels || [];
  normalized.forEach(c=>{
    state.lib.channels.push({id:uuid(), dateAdded:new Date().toISOString(), ...c});
  });
  saveLib(); closeModal(); router();
  toast(`Imported ${normalized.length} channel(s)`);
}

function renderDetail(id){

      // Unwatched" is based only on episodes that have actually aired (mirrors markSeasonWatched,

      const airedEpisodes = (active.episodes||[]).filter(e=>{
        const airDateObj = e.airDate ? new Date(e.airDate+'T00:00:00') : null;

      const airedAllWatched = airedEpisodes.length>0 && airedEpisodes.every(e=>{

              ${airedEpisodes.length ? `<button type="button" class="btn btn-ghost btn-icon-only season-mark-watched-btn" title="${airedAllWatched?'Mark Season as Unwatched':'Mark Season as Watched'}" onclick="markSeasonWatched('${item.id}', ${active.number})">${airedAllWatched?ICON.close:ICON.check}</button>` : ''}

              ${seasons.map((s,i)=>{
                const epCount = (s.episodes||[]).length;
                const watchedCount = (s.episodes||[]).filter(e=>{
                  const p = (item.progress||{})['s'+s.number+'e'+e.number];

                    ${pct>0 ? `<span class="season-chip-progress"><span style="width:${pct}%"></span></span>` : ''}

      </div>
      <div class="episode-list">

                  <div class="ep-mini-stars" onclick="event.stopPropagation()">${episodeMiniStarsHtml(item.id, active.number, ep)}</div>
                </div>
              </div>
              ${isUnaired ? '' : `<button type="button" class="ep-watch-toggle ${watched?'is-watched':''}" title="${watched?'Mark as unwatched':'Mark as watched'}" onclick="event.stopPropagation(); toggleEpisodeWatched('${item.id}', ${active.number}, ${ep.number})">${ICON.check}</button>`}

    <div class="detail-body">
      <div class="detail-top">
        <div class="detail-poster">${posterEl(item)}</div>

// Suggests titles already in the user's own library sharing genres with this one — always playable
// since they're already in the collection, unlike a generic "similar movies" list from the internet.
// Computes "next episode to watch" and how many are left — TV Time-style tracking, based on the
// same watched/progress data already tracked per episode, just walked in real season/episode order.
function getWatchProgressSummary(item){
  if(item.type!=='series') return null;
  const allEpisodes = [];
  (item.seasons||[]).forEach(s=> (s.episodes||[]).forEach(e=> allEpisodes.push({season:s.number, episode:e})));
  if(!allEpisodes.length) return null;
  allEpisodes.sort((a,b)=> a.season-b.season || a.episode.number-b.episode.number);
  const prog = item.progress || {};
  const remaining = allEpisodes.filter(x=>{
    const key = 's'+x.season+'e'+x.episode.number;
    return !(prog[key] && prog[key].watched);
  });
  return { total: allEpisodes.length, remaining: remaining.length, next: remaining[0] || null };
}
function watchProgressBannerHtml(item){
  const summary = getWatchProgressSummary(item);
  if(!summary || !summary.total) return '';
  // "Actively tracking progress" means at least one episode has been watched or partially watched —
  // not just that the show happens to be on the watchlist. Without this check, every never-touched
  // series would show "N episodes remaining," which isn't progress, it's just an episode count.
  const prog = item.progress || {};
  const hasActivity = Object.keys(prog).some(k => prog[k] && (prog[k].watched || prog[k].timestamp > 0));
  if(!hasActivity) return '';
  if(summary.remaining===0){
    return `<div class="watch-progress-banner watch-progress-done">${ICON.check} All caught up!</div>`;
  }
  const next = summary.next;
  return `<div class="watch-progress-banner">
    <div class="wpb-next">
      <span class="wpb-label">Next Up</span>
      <span class="wpb-title">S${next.season}E${next.episode.number} — ${esc(next.episode.title||('Episode '+next.episode.number))}</span>
    </div>
    <div class="wpb-remaining">${summary.remaining} episode${summary.remaining===1?'':'s'} remaining</div>
  </div>`;
}
// Multi-source ratings row (IMDb / Rotten Tomatoes / Metacritic, whichever exist) — populated by
// importFromImdb()/fetchOmdb() from OMDb's Ratings array. Falls back to the single item.rating tag
// (usually a TMDB score) only when nothing more specific was ever fetched, so titles added by hand
// still show *something* without implying multi-source data that was never actually pulled.
// One unified "ratings" cluster: external scores (IMDb/RT/Metacritic, or a single fallback rating)
// plus the user's own star rating, all rendered as the same badge-card family instead of two
// unrelated widgets (a boxed score row vs. a plain star strip) stacked on top of each other.
// Now that .detail-tags is a visible glass panel (border + blur), it can't just render unconditionally
// like the old plain flex row could — an item with none of these fields would show an empty frosted
// box. Building the chip list first and bailing out to '' when it's empty keeps that panel invisible
// exactly when it would have been invisible before (implicit zero-height row).
function detailTagsHtml(item){
  const chips = [
    item.contentRating ? `<span class="tag tag-cert">${esc(item.contentRating)}</span>` : '',
    item.year ? `<span class="tag">${esc(item.year)}</span>` : '',
    item.runtime ? `<span class="tag">${esc(item.runtime)}</span>` : '',
    (!item.ratings||!item.ratings.length) && item.rating ? `<span class="tag">★ ${esc(item.rating)}</span>` : ''
  ].filter(Boolean);
  return chips.length ? `<div class="detail-tags">${chips.join('')}</div>` : '';
}
function ratingsClusterHtml(item){
  const badges = (item.ratings||[]).filter(r=>r.value).map(r=>({label:r.source, value:r.value}));
  if(!badges.length && item.rating) badges.push({label:'Rating', value:item.rating});
  const myRating = item.myRating || 0;
  let stars = '';
  for(let i=1;i<=5;i++){
    stars += `<button type="button" class="my-rating-star ${i<=myRating?'is-filled':''}" title="Rate ${i} star${i>1?'s':''}" onclick="setMyRating('${item.id}', ${i})">${starSvg(i<=myRating)}</button>`;
  }
  const mine = `<span class="rating-badge rating-badge-mine">
    <span class="my-rating-stars-row">
      <span class="my-rating-stars">${stars}</span>
      ${myRating>0 ? `<button type="button" class="my-rating-clear" title="Clear rating" onclick="event.stopPropagation(); setMyRating('${item.id}', 0)">${ICON.close}</button>` : ''}
    </span>
    <small>My Rating</small>
  </span>`;
  return `<div class="detail-ratings-row">${badges.map(b=>`<span class="rating-badge"><b>${esc(b.value)}</b><small>${esc(b.label)}</small></span>`).join('')}${mine}</div>`;
}
// TV-only: airing status (Returning/Ended/Canceled) plus when the next episode drops, if TMDB had one
// scheduled at the time this was last fetched. Purely informational — doesn't touch progress tracking.
function tvStatusLineHtml(item){
  if(item.type!=='series') return '';
  const next = item.nextEpisodeInfo;
  if(!item.tvStatus && !(next && next.airDate)) return '';
  let nextText = '';
  if(next && next.airDate){
    const d = new Date(next.airDate+'T00:00:00');
    const dateStr = isNaN(d) ? next.airDate : d.toLocaleDateString(undefined,{month:'short', day:'numeric', year:'numeric'});
    nextText = `Next: S${next.season}E${next.episode}${next.name?` "${next.name}"`:''} — ${dateStr}`;

    .map(i=>({item:i, score:(i.genre||[]).filter(g=>genres.has(g)).length}))

// Expands/collapses the episode list with a real accordion slide (height 0 → content height) instead
// of the list just popping into existence at full height, plus a staggered rise-and-fade on each
// episode-card so they cascade in one after another rather than all appearing at once.
function toggleDetailEpisodesVisible(){
  const opening = !state.detailEpisodesOpen;
  if(!opening){
    // Closing: the markup only renders episode-card content while detailEpisodesOpen is true, so we
    // have to animate the shrink BEFORE flipping that flag — otherwise the content (and the height
    // we'd be animating from) is already gone by the time updateTvSeasonArea() re-renders.

    if(listEl){
      listEl.style.height = listEl.scrollHeight+'px';

        listEl.style.height = '0px';

  // content before its scrollHeight can be measured, hence the rAF instead of animating inline.

// item on a TV show's detail page. Same all-or-nothing pattern as markSeasonWatched, just applied
// across every season instead of one — direction is "toWatched" unless isFullyWatched() already
// says every aired episode is done, in which case it clears everything back to unwatched. Skips
// unaired episodes so this can never mark something not yet out as watched.
function toggleSeriesWatched(id){
  const item = getItem(id);
  if(!item || item.type!=='series') return;
  const seasons = item.seasons||[];
  item.progress = item.progress || {};
  const allWatched = isFullyWatched(item);
  seasons.forEach(s=>{
    (s.episodes||[]).forEach(e=>{
      const airDateObj = e.airDate ? new Date(e.airDate+'T00:00:00') : null;
      if(airDateObj && !isNaN(airDateObj) && airDateObj > new Date()) return; // skip unaired
      const key = 's'+s.number+'e'+e.number;
      const cur = item.progress[key];
      item.progress[key] = allWatched
        ? {timestamp:0, duration:(cur&&cur.duration)||0, watched:false}
        : {timestamp:(cur&&cur.duration)||1, duration:(cur&&cur.duration)||1, watched:true};
    });
  });
  item.lastWatched = new Date().toISOString();
  saveProgressStore();
  document.getElementById('pageRoot').innerHTML = renderDetail(id);
  toast(allWatched?'Marked as unwatched':'Marked as watched');
}
function toggleEpisodeWatched(itemId, seasonNum, epNum){

  const key = 's'+seasonNum+'e'+epNum;
  item.progress = item.progress || {};
  const cur = item.progress[key];
  const watched = !!(cur && cur.watched);
  item.progress[key] = {timestamp:watched?0:((cur&&cur.duration)||1), duration:(cur&&cur.duration)||1, watched:!watched};
  item.lastWatched = new Date().toISOString();

// Bulk season-level toggle for the "Mark Season as Watched" button in the season overview panel —
// same per-episode progress shape toggleEpisodeWatched writes, just applied to every episode in the
// season in one pass/one saveLib()/one re-render instead of clicking each episode individually.
// Skips unaired episodes (mirrors the episode-card list, which hides the watched-toggle for those)
// so bulk-marking a season never marks something that hasn't aired yet as watched.
// Direction is "toWatched" when the season isn't fully watched yet, and "toUnwatched" once it is —
// same all-or-nothing pattern as toggleMovieWatched, so the button always reads as a single clear action.
function markSeasonWatched(itemId, seasonNum){
  const item = getItem(itemId);
  if(!item) return;
  const season = (item.seasons||[]).find(s=>s.number===seasonNum);
  if(!season) return;
  const episodes = (season.episodes||[]).filter(e=>{
    const airDateObj = e.airDate ? new Date(e.airDate+'T00:00:00') : null;
    return !(airDateObj && !isNaN(airDateObj) && airDateObj > new Date());
  });
  if(!episodes.length) return;
  item.progress = item.progress || {};
  const allWatched = episodes.every(e=>{
    const p = item.progress['s'+seasonNum+'e'+e.number];
    return p && p.watched;
  });
  episodes.forEach(e=>{
    const key = 's'+seasonNum+'e'+e.number;
    const cur = item.progress[key];
    item.progress[key] = allWatched
      ? {timestamp:0, duration:(cur&&cur.duration)||0, watched:false}
      : {timestamp:(cur&&cur.duration)||1, duration:(cur&&cur.duration)||1, watched:true};
  });
  item.lastWatched = new Date().toISOString();
  saveProgressStore();
  document.getElementById('pageRoot').innerHTML = renderDetail(itemId);
  toast(allWatched ? `Season ${seasonNum} marked as unwatched` : `Season ${seasonNum} marked as watched`);
}

/* ---------- Episode info modal (opened by clicking an episode card, instead of playing directly) ---------- */
// evt is only passed when opened by clicking an episode-card directly (not from the prev/next nav
// buttons inside an already-open modal, nor from the deep-link setTimeout on page load) — that's what
// lets the modal thumbnail visually "grow" out of the exact card that was clicked instead of just
// appearing from nowhere, while every other entry point still opens the modal normally.
function openEpisodeInfoModal(itemId, seasonNum, epNum, evt){
  const item = getItem(itemId);
  const ep = item && findPlayerEpisode(item, seasonNum, epNum);
  if(!item || !ep) return;
  let originRect = null;
  if(evt && evt.currentTarget){
    const cardThumb = evt.currentTarget.querySelector('.ep-thumb');
    if(cardThumb){
      const r = cardThumb.getBoundingClientRect();
      if(r.width>0 && r.height>0) originRect = r;
    }
  }
  openModal(episodeInfoModalHtml(itemId, seasonNum, epNum));
  const modalBody = document.getElementById('modalBody');
  modalBody.classList.add('modal-episode-info');
  // Stamp the open episode into the URL (season/episode NUMBERs) purely so it's shareable/refreshable
  // — see router()'s detail/{id}/{season}/{episode} parsing. replaceState avoids a back-button stop
  // or a hashchange/router() re-render for every episode click, same reasoning as setDetailSeason.
  if(state.route==='detail' && state.routeParam===itemId){
    history.replaceState(null, '', '#detail/'+itemId+'/'+seasonNum+'/'+epNum);
  }
  const epKey = itemId+'-s'+seasonNum+'e'+epNum;
  modalBody.dataset.epKey = epKey;
  modalBody.style.removeProperty('--episode-glow');
  applyEpisodeThumbGlow(epKey, ep.thumbnail);
  // FLIP: measure where the thumbnail ends up (after the overlay/modal have opened), then paint it
  // starting at the clicked card's position/size and animate it into place. Runs a frame after open
  // so the modal has actually laid out — otherwise the "target" rect would still reflect the
  // pre-open (scaled-down) modal position.
  if(originRect){
    requestAnimationFrame(()=>{
      const thumbEl = modalBody.querySelector('.episode-modal-thumb');
      if(!thumbEl) return;
      const targetRect = thumbEl.getBoundingClientRect();
      if(!targetRect.width || !targetRect.height) return;
      const dx = originRect.left - targetRect.left;
      const dy = originRect.top - targetRect.top;
      const sx = originRect.width / targetRect.width;
      const sy = originRect.height / targetRect.height;
      thumbEl.style.transformOrigin = 'top left';
      thumbEl.style.transition = 'none';
      thumbEl.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;
      thumbEl.offsetHeight; // force reflow so the starting transform actually applies before animating
      requestAnimationFrame(()=>{
        thumbEl.style.transition = 'transform .32s cubic-bezier(.16,1,.3,1)';
        thumbEl.style.transform = 'none';
      });
      setTimeout(()=>{ thumbEl.style.transition=''; thumbEl.style.transform=''; thumbEl.style.transformOrigin=''; }, 360);
    });
  }
}
// Same dominant-color extraction the detail page uses for --poster-glow, just pointed at the episode
// thumbnail and scoped to the modal instead of #pageRoot. epKey is stamped at open time and re-checked
// here since this resolves async — if the person has already flipped to a different episode (or closed
// the modal) by the time the color is ready, that stale result gets dropped instead of mis-tinting.
function applyEpisodeThumbGlow(epKey, thumbnail){
  extractPosterGlowColor(thumbnail).then(color=>{
    if(!color) return;
    const modalBody = document.getElementById('modalBody');
    if(!modalBody || modalBody.dataset.epKey !== epKey) return;
    modalBody.style.setProperty('--episode-glow', color);
  });

function episodeInfoModalHtml(itemId, seasonNum, epNum){
  const item = getItem(itemId);
  const ep = item && findPlayerEpisode(item, seasonNum, epNum);
  if(!item || !ep) return '';
  const key = 's'+seasonNum+'e'+epNum;
  const p = (item.progress||{})[key];
  const watched = !!(p && p.watched);
  const pct = p && p.duration ? Math.min(100, Math.round((p.timestamp/p.duration)*100)) : 0;
  const canResume = !!(p && !watched && p.timestamp>0);
  const sources = getEpisodeSources(item, ep, seasonNum);
  const sourceCount = sources.length;
  const prev = getPrevEpisode(item, seasonNum, epNum);
  const next = getNextEpisode(item, seasonNum, epNum);
  // Air date badge: only worth showing once we know it, and "Airs <date>" only makes sense while

// Closes the modal and hands off to the player. sourceIdx lets the source-picker (shown when an
// episode has more than one source) start playback on the one the user actually chose — the sources
// array is reordered so that pick plays first, while the rest stay in as fallbacks if it fails, same
// as openPlayer/tryNextSource already do for the default (single-source) path.
function playEpisodeFromModal(itemId, seasonNum, epNum, sourceIdx){
  const item = getItem(itemId);
  const ep = item && findPlayerEpisode(item, seasonNum, epNum);
  if(!item || !ep) return;
  const sources = getEpisodeSources(item, ep, seasonNum);
  const ordered = sourceIdx>0 ? [sources[sourceIdx], ...sources.slice(0,sourceIdx), ...sources.slice(sourceIdx+1)] : sources;
  closeModal();
  requestPlayback(item, seasonNum, epNum, ordered);
}
// Same star row as episodeMiniStarsHtml on the card, but wired to refresh the open modal in place
// (setEpisodeRating already repaints the detail page behind it; the modal is a separate DOM subtree
// that needs its own refresh, same reasoning as playerEndCardStarsHtml/setPlayerRating elsewhere).
function episodeModalStarsHtml(itemId, seasonNum, ep){
  const rating = ep.myRating || 0;
  let stars = '';
  for(let i=1;i<=5;i++){
    stars += `<button type="button" class="ep-mini-star ${i<=rating?'is-filled':''}" title="Rate episode ${i} star${i>1?'s':''}" onclick="setEpisodeRatingInModal('${itemId}', ${seasonNum}, ${ep.number}, ${i})">${starSvg(i<=rating)}</button>`;
  }
  return stars;
}
function setEpisodeRatingInModal(itemId, seasonNum, epNum, rating){
  setEpisodeRating(itemId, seasonNum, epNum, rating); // updates data, toasts, repaints the page behind the modal
  const body = document.getElementById('modalBody');
  if(body) body.innerHTML = episodeInfoModalHtml(itemId, seasonNum, epNum);
}
function toggleEpisodeWatchedInModal(itemId, seasonNum, epNum){
  const item = getItem(itemId);
  if(!item) return;
  const wasWatched = !!(item.progress && item.progress['s'+seasonNum+'e'+epNum] && item.progress['s'+seasonNum+'e'+epNum].watched);
  toggleEpisodeWatched(itemId, seasonNum, epNum); // updates data, toasts, repaints the page behind the modal
  // Auto-advance to the next episode when this just got marked WATCHED (not unwatched) — the whole
  // point of checking episodes off in this modal is not having to close/reopen it for every one.
  // Skipped when there's no next episode (openEpisodeInfoModal doesn't care whether it's aired yet,
  // same as the prev/next chevrons — it'll just show as "Airs <date>" with playback disabled).
  if(!wasWatched){
    const next = getNextEpisode(item, seasonNum, epNum);
    if(next){ openEpisodeInfoModal(itemId, next.seasonNum, next.ep.number); return; }
  }
  const body = document.getElementById('modalBody');
  if(body) body.innerHTML = episodeInfoModalHtml(itemId, seasonNum, epNum);
}
// Swipe left/right anywhere in the episode-info modal to move to the next/previous episode — same
// dx-threshold drag pattern as the hero carousel (heroPointerDown/Move/Up), just horizontal-only and
// bound once at the modalBody level (that DOM node persists across every openEpisodeInfoModal
// re-render, so this only needs to be wired up a single time at startup, not per open). Guarded by
// modal-episode-info so it's a no-op for every other modal that shares the same #modalBody element.
// Reuses the existing prev/next chevron buttons rather than duplicating their logic, which also means
// it automatically respects their disabled state at the first/last episode.
let episodeModalSwipeStartX = null, episodeModalSwipeStartY = null;
function initEpisodeModalSwipe(){
  const modalBody = document.getElementById('modalBody');
  if(!modalBody) return;
  modalBody.addEventListener('touchstart', e=>{
    if(!modalBody.classList.contains('modal-episode-info') || !e.touches.length) return;
    episodeModalSwipeStartX = e.touches[0].clientX;
    episodeModalSwipeStartY = e.touches[0].clientY;
  }, {passive:true});
  modalBody.addEventListener('touchend', e=>{
    if(episodeModalSwipeStartX==null || !modalBody.classList.contains('modal-episode-info')) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - episodeModalSwipeStartX;
    const dy = t.clientY - episodeModalSwipeStartY;
    episodeModalSwipeStartX = null; episodeModalSwipeStartY = null;
    // Require a clearly horizontal drag past a real swipe distance (same 50px threshold the hero
    // carousel uses) so a vertical scroll through the overview text never gets mistaken for a swipe.
    if(Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
    const btn = modalBody.querySelector(dx > 0 ? '.episode-modal-nav-prev' : '.episode-modal-nav-next');
    if(btn && !btn.disabled) btn.click();
  }, {passive:true});
}
initEpisodeModalSwipe();
// Star row for the PLAYBACK END CARD specifically — deliberately separate from ratingsClusterHtml()/
// episodeMiniStarsHtml() above, whose onclick handlers re-render the whole detail page. That's fine
// on the detail page itself, but the player overlay sits on top of (and hides) pageRoot, so doing
// that here would silently update a page the user can't see instead of the stars they're looking
// at. setPlayerRating() below repaints just this row in place instead.
function playerEndCardStarsHtml(item){
  const p = state.player;
  const rating = item.type==='movie' ? (item.myRating||0) : ((findPlayerEpisode(item, p.seasonNum, p.epNum)||{}).myRating||0);
  let stars = '';
  for(let i=1;i<=5;i++){
    stars += `<button type="button" class="my-rating-star ${i<=rating?'is-filled':''}" title="Rate ${i} star${i>1?'s':''}" onclick="event.stopPropagation(); setPlayerRating(${i})">${starSvg(i<=rating)}</button>`;
  }
  return stars;
}
// Rates whatever the player currently has loaded (movie, or the specific episode) and repaints
// just the end-card's star row — saveLib() persists it exactly like every other rating write, so
// the detail page picks up the change next time it renders normally.
function setPlayerRating(rating){
  const p = state.player;
  if(!p) return;
  const item = getItem(p.itemId);
  if(!item) return;
  let newRating;
  if(item.type === 'movie'){
    item.myRating = (item.myRating===rating) ? 0 : rating;
    newRating = item.myRating;
  } else {
    const ep = findPlayerEpisode(item, p.seasonNum, p.epNum);
    if(!ep) return;
    ep.myRating = (ep.myRating===rating) ? 0 : rating;
    newRating = ep.myRating;
  }
  saveLib();
  const starsEl = document.getElementById('playerEndCardStars');
  if(starsEl) starsEl.innerHTML = playerEndCardStarsHtml(item);
  toast(newRating ? `Rated ${newRating} star${newRating>1?'s':''}` : 'Rating cleared');
}
function openAddToCollection(itemId){
  if(!state.lib.collections.length){
    if(confirm('No collections yet. Create one now?')) createCollection();
    return;
  }
  const html = state.lib.collections.map(c=>{
    const inCol = c.itemIds.includes(itemId);
    return `<button class="chip-btn ${inCol?'active':''}" style="width:100%;justify-content:flex-start;margin-bottom:8px;" onclick="toggleItemInCollection('${c.id}','${itemId}'); this.classList.toggle('active')">${inCol?ICON.check:''} ${esc(c.name)}</button>`;
  }).join('');
  openModal(`
    <div class="modal-head"><h2>Add to Collection</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div>${html}</div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal(); router()">Done</button></div>
  `);
}

function saveApiKeys(){
  state.settings.omdb = document.getElementById('omdbKey').value.trim();
  state.settings.tmdb = document.getElementById('tmdbKey').value.trim();
  saveSettings(); toast('API keys saved');
}
function saveSubdlKey(){
  state.settings.subdl = document.getElementById('subdlKey').value.trim();
  saveSettings(); toast('SubDL key saved');
}
// Live-applies a single Subtitle Display setting: writes it to state + localStorage, re-derives
// the --sub-* CSS vars and the ::cue style block (see applySubtitleDisplayStyle), and — since the
// settings-page preview box uses those same vars — that's all it takes for the preview to update
// too, no separate preview-rendering code needed. Opacity also needs its own % label refreshed.
function updateSubtitleDisplaySetting(key, value){
  if(key==='subtitleBgOpacity') value = Math.min(100, Math.max(0, parseInt(value,10)||0));
  state.settings[key] = value;
  saveSettings();
  applySubtitleDisplayStyle();
  if(key==='subtitleBgOpacity'){
    const label = document.getElementById('subtitleBgOpacityValue');
    if(label) label.textContent = value+'%';
  }
}
function resetSubtitleDisplay(){
  state.settings.subtitleSize = 'medium';
  state.settings.subtitleColor = '#ffffff';
  state.settings.subtitleBgColor = '#000000';
  state.settings.subtitleBgOpacity = 72;
  saveSettings();
  applySubtitleDisplayStyle();
  router(); // re-render Settings so the size/color/slider inputs reflect the reset values
  toast('Subtitle display reset to default');
}
function saveVidsrcDomain(){
  state.settings.vidsrcDomain = document.getElementById('vidsrcDomain').value;
  saveSettings(); toast('VidSrc domain saved');
}
// Working draft of the domain list while Settings is open, so add/remove rows don't need a full
// page re-render. Lazily seeded from the saved list (or a single blank row) the first time it's
// needed, and re-seeded after every save so it always reflects what's actually persisted.
function ensureProviderDraft(){
  if(!Array.isArray(state.settingsProviderDraft)){
    state.settingsProviderDraft = (state.settings.streamingProviders||[]).length ? state.settings.streamingProviders.slice() : [''];
  }
}
function streamingProviderRowsHtml(){
  ensureProviderDraft();
  return state.settingsProviderDraft.map((d,i)=>`
    <div class="source-row">
      <input placeholder="example.com" value="${esc(d)}" oninput="state.settingsProviderDraft[${i}]=this.value">
      <button type="button" class="rm" onclick="removeStreamingProviderRow(${i})">${ICON.close}</button>
    </div>`).join('');
}
function addStreamingProviderRow(){
  ensureProviderDraft();
  state.settingsProviderDraft.push('');
  document.getElementById('streamingProviderRows').innerHTML = streamingProviderRowsHtml();
}
function removeStreamingProviderRow(i){
  ensureProviderDraft();
  state.settingsProviderDraft.splice(i,1);
  if(!state.settingsProviderDraft.length) state.settingsProviderDraft.push('');
  document.getElementById('streamingProviderRows').innerHTML = streamingProviderRowsHtml();
}
// Persists only the bare domains (see DYNAMIC STREAMING PROVIDER section) — never full URLs.
// Order is preserved: index 0 becomes "Source 1", index 1 "Source 2", etc.
function saveStreamingProviders(){
  ensureProviderDraft();
  state.settings.streamingProviders = state.settingsProviderDraft.map(normalizeProviderDomain).filter(Boolean);
  state.settingsProviderDraft = null; // re-seed from the saved list next time Settings renders
  saveSettings();
  router();
  toast('Streaming providers saved');
}
function toggleFeaturedArtworkBleed(checked){
  state.settings.featuredArtworkBleed = !!checked;
  saveSettings();
  // Live-update the label text without a full router() re-render.
  const label = document.querySelector('#featuredArtworkBleedToggle')?.closest('.field')?.querySelector('.toggle-row-label');
  if(label) label.textContent = checked ? 'On' : 'Off';
  // If a Featured Release card is currently on screen (Home/Movies/TV), flip its bleed class in
  // place rather than forcing a route change.
  const card = document.getElementById('featuredCard');
  if(card){ card.classList.toggle('bleed-on', checked); card.classList.toggle('bleed-off', !checked); }
  toast(checked ? 'Featured artwork bleed enabled' : 'Featured artwork bleed disabled');
}
function saveSupabaseConfig(){
  state.settings.supabaseUrl = document.getElementById('supabaseUrlInput').value.trim().replace(/\/$/, '');
  state.settings.supabaseKey = document.getElementById('supabaseKeyInput').value.trim();
  saveSettings();
  toast(state.settings.supabaseUrl && state.settings.supabaseKey ? 'Cloud sync enabled' : 'Cloud sync settings saved');
}
function toggleBlockPopupAds(checked){
  state.settings.blockPopupAds = !!checked;
  saveSettings();
  const cb = document.getElementById('blockPopupAdsToggle');
  const label = cb && cb.closest('.field').querySelector('.toggle-row-label');
  if(label) label.textContent = checked ? 'On' : 'Off';
  toast(checked ? 'Popup blocking enabled' : 'Popup blocking disabled');
}
async function toggleContentBlur(checked){
  state.settings.contentBlur = !!checked;
  saveSettings();
  const cb = document.getElementById('contentBlurToggle');
  const label = cb && cb.closest('.field').querySelector('.toggle-row-label');
  if(label) label.textContent = checked ? 'On' : 'Off';
  const levelField = document.getElementById('contentBlurLevelField');
  if(levelField) levelField.style.display = checked ? '' : 'none';
  if(checked){
    toast('Content Blur enabled — downloading the on-device model…');
    try{
      await loadContentBlurModel();
      toast('Content Blur ready');
    }catch(e){
      showContentBlurError(e.message || String(e));
    }
  } else {
    toast('Content Blur disabled');
  }
}
function showContentBlurError(message){
  openModal(`
    <div class="modal-head"><h2>Content Blur couldn't start</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div class="field-hint" style="margin-bottom:14px;">
      This is the actual error, not a guess — worth sharing this exact text if you're troubleshooting further:
    </div>
    <textarea readonly style="min-height:120px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px;">${esc(message)}</textarea>
    <div class="field-hint" style="margin-top:10px;">
      Common causes: the WebView/app is restricted to only load resources from its own domain (blocking the CDN scripts), a firewall or network filter blocking <code>cdn.jsdelivr.net</code>/<code>unpkg.com</code>, or (rarely) the device's browser engine not supporting what TensorFlow.js needs.
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="copyContentBlurError('${esc(message).replace(/'/g,"&#39;")}')">${ICON.bookmark} Copy Error</button>
    </div>
  `);
}
async function copyContentBlurError(message){
  try{ await navigator.clipboard.writeText(message); toast('Error copied'); }
  catch(e){ toast('Could not copy — select the text manually'); }
}
function saveContentBlurLevel(level){
  state.settings.contentBlurLevel = level;
  saveSettings();
  toast('Sensitivity set to '+level);
}
function saveContentBlurModelUrl(){
  const val = document.getElementById('contentBlurModelUrl').value.trim();
  state.settings.contentBlurModelUrl = val;
  saveSettings();
  // Force a fresh load next time content blur runs, using the newly saved URL.
  contentBlurModel = null;

/* ---- Median App Injection Script (for Website Overrides → Custom JavaScript) ----
   Same content-blur approach as the toggle above, but self-contained so it can run
   independently of this page — needed because Median injects it fresh into whichever
   frame it targets, which may include third-party iframes (VidSrc, live TV) that this
   app's own JavaScript can never reach into no matter how it's written. */
const MEDIAN_BLUR_SCRIPT = `/*
 * Stream Vault — Content Blur (all-frames injection script)
 * -----------------------------------------------------------
 * WHERE THIS GOES: Median App Studio -> Website Overrides -> Custom JavaScript
 * (only useful if Median confirms that field injects into iframes/subframes,
 * not just the top-level page -- ask their support if unsure).
 *
 * WHAT IT DOES: on-device NSFW detection (nsfwjs) applied to every <img> and
 * <video> element it finds, with tap-to-reveal. Runs entirely on-device --
 * nothing is uploaded anywhere.
 *
 * WHY IT'S SEPARATE FROM THE MAIN APP: this needs to be injected by Median
 * itself into every frame of the WebView (including third-party iframes like
 * VidSrc embeds). Code living inside Stream Vault's own HTML can only ever
 * see Stream Vault's own page -- it cannot reach into a cross-origin iframe
 * no matter where it's called from. This script works differently: it isn't
 * Stream Vault's code reaching out, it's Median's WebView engine placing a
 * fresh copy of this exact script directly inside each frame, including
 * frames that belong to another website entirely. That's what makes it
 * capable of reaching content this app's own JavaScript cannot.
 *
 * HONEST LIMITS THAT DON'T GO AWAY, EVEN HERE:
 *  - If a source's own server blocks cross-origin pixel access (no CORS
 *    headers), the classifier can't read that particular image/video and
 *    will just skip it -- this is common for random third-party media and
 *    is a browser security rule, not a bug.
 *  - Sites that render video via <canvas>, WebGL, or proprietary players
 *    instead of a plain <video> tag won't be caught by this script.
 *  - This only runs if Median actually injects it into subframes. If it
 *    only reaches the top-level page, it will still work great on Stream
 *    Vault's own posters/backdrops/logos, just not inside embedded players.
 */
(function () {
  'use strict';
  if (window.__streamVaultBlurInstalled) return; // avoid double-injection
  window.__streamVaultBlurInstalled = true;

  var SENSITIVITY = 'moderate'; // 'moderate' or 'strict'
  var THRESHOLD = SENSITIVITY === 'strict' ? 0.2 : 0.4;
  var SCAN_INTERVAL_MS = 3000; // how often to look for newly-added images/video
  var VIDEO_SAMPLE_INTERVAL_MS = 2500;
  // If the default model won't download inside your wrapped app (common when a WebView restricts
  // which domains it can fetch from), host model.json + its .bin shard files on your own domain and
  // put the full URL to model.json here. Leave blank to use the default (nsfwjs's bundled model).
  var MODEL_URL = '';

  var modelPromise = null;
  function loadScriptOnce(src, timeoutMs) {
    timeoutMs = timeoutMs || 12000;
    return new Promise(function (resolve, reject) {
      var s = document.createElement('script');
      var done = false;
      var timer = setTimeout(function () {
        if (done) return;
        done = true;
        s.remove();
        reject(new Error('Timed out loading ' + src));
      }, timeoutMs);
      s.src = src;
      s.onload = function () { if (done) return; done = true; clearTimeout(timer); resolve(); };
      s.onerror = function () { if (done) return; done = true; clearTimeout(timer); reject(new Error('Failed to load ' + src)); };
      document.head.appendChild(s);
    });
  }
  async function loadScriptWithFallback(urls) {
    var lastErr = null;
    for (var i = 0; i < urls.length; i++) {
      try { await loadScriptOnce(urls[i]); return urls[i]; }
      catch (e) { lastErr = e; }
    }
    throw lastErr || new Error('All sources failed');
  }
  function loadModel() {
    if (modelPromise) return modelPromise;
    modelPromise = (async function () {
      if (!window.tf) {
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
          'https://unpkg.com/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
        ]);
      }
      if (!window.nsfwjs) {
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/nsfwjs@4.2.1/dist/nsfwjs.min.js',
          'https://unpkg.com/nsfwjs@4.2.1/dist/nsfwjs.min.js',
        ]);
      }
      // Model source priority: explicit MODEL_URL above > an auto-detected same-directory
      // "models/nsfwjs/model.json" (works when this script runs on your own hosted page; can't
      // work when injected into a different-origin iframe, since "same directory" means nothing
      // there) > nsfwjs's own bundled model as a last resort.
      if (MODEL_URL) {
        return window.nsfwjs.load(MODEL_URL);
      }
      try {
        var relativeUrl = new URL('models/nsfwjs/model.json', location.href).href;
        var check = await fetch(relativeUrl, { method: 'HEAD', cache: 'no-store' });
        if (!check.ok) throw new Error('not found');
        return await window.nsfwjs.load(relativeUrl);
      } catch (relErr) {
        return window.nsfwjs.load('MobileNetV2');
      }
    })().catch(function (e) {
      console.error('[StreamVault Blur] failed to load:', e);
      throw e;
    });
    return modelPromise;
  }
  async function classify(el) {
    try {
      var model = await loadModel();
      var predictions = await model.classify(el);
      return predictions
        .filter(function (p) { return p.className === 'Porn' || p.className === 'Hentai' || p.className === 'Sexy'; })
        .reduce(function (sum, p) { return sum + p.probability; }, 0);
    } catch (e) {
      return null; // couldn't analyze this element (tainted canvas, load failure, etc.) -- skip it
    }
  }
  function reveal(el, ev) {
    if (ev) ev.stopPropagation();
    el.classList.remove('__sv_blurred');
    el.classList.add('__sv_revealed');
  }
  function ensureStyle() {
    if (document.getElementById('__sv_blur_style')) return;
    var style = document.createElement('style');
    style.id = '__sv_blur_style';
    style.textContent =
      '.__sv_blurred{filter:blur(32px) saturate(70%) !important;cursor:pointer !important;transition:filter .3s ease;}' +
      '.__sv_blurred:hover{filter:blur(18px) saturate(70%) !important;}' +
      '.__sv_revealed{filter:none !important;}';
    document.head.appendChild(style);
  }
  async function checkImage(img) {
    if (img.dataset.__svChecked) return;
    img.dataset.__svChecked = '1';
    var run = function () {
      classify(img).then(function (score) {
        if (score !== null && score >= THRESHOLD) {
          img.classList.add('__sv_blurred');
          img.addEventListener('click', function (ev) {
            if (img.classList.contains('__sv_blurred')) reveal(img, ev);
          });
        }
      });
    };
    if (img.complete && img.naturalWidth > 0) run();
    else img.addEventListener('load', run, { once: true });
  }
  function watchVideo(video) {
    if (video.dataset.__svWatching) return;
    video.dataset.__svWatching = '1';
    var canvas = document.createElement('canvas');
    canvas.width = 160; canvas.height = 90;
    var ctx = canvas.getContext('2d');
    var interval = setInterval(async function () {
      if (!video.isConnected) { clearInterval(interval); return; }
      if (video.paused || video.readyState < 2) return;
      try { ctx.drawImage(video, 0, 0, 160, 90); }
      catch (e) { clearInterval(interval); return; } // cross-origin source we can't read -- stop trying
      var score = await classify(canvas);
      if (score === null) { clearInterval(interval); return; }
      video.classList.toggle('__sv_blurred', score >= THRESHOLD);
    }, VIDEO_SAMPLE_INTERVAL_MS);
  }
  function scan() {
    ensureStyle();
    document.querySelectorAll('img:not([data-__svChecked])').forEach(checkImage);
    document.querySelectorAll('video:not([data-__svWatching])').forEach(watchVideo);
  }

  ensureStyle();
  scan();
  setInterval(scan, SCAN_INTERVAL_MS); // catches images/video added dynamically after page load
  var mo = new MutationObserver(function () { scan(); });
  mo.observe(document.documentElement, { childList: true, subtree: true });
})();
`;
function finalMedianBlurScript(){
  const modelUrl = (state.settings.contentBlurModelUrl||'').trim();
  if(!modelUrl) return MEDIAN_BLUR_SCRIPT;

/* ---- Link Health checker ----
   Browsers can't read the HTTP status of a cross-origin URL (CORS blocks the response body/status
   from being visible to our JS). A no-cors fetch still tells us one useful thing though: whether the
   request could even reach a server at all. That fails (throws/aborts) for a dead domain, a refused
   connection, or a timeout — the way these mirror/live-TV sources actually die most of the time.
   It can NOT tell us "the domain is up but returns a 404" or "shows an unavailable page" — that
   requires actually opening the link. So results here are a first-pass filter, not a guarantee. */
function checkUrlReachable(url, timeoutMs){
  timeoutMs = timeoutMs || 8000;
  return new Promise(resolve=>{
    const controller = new AbortController();
    const timer = setTimeout(()=>{ controller.abort(); }, timeoutMs);
    fetch(url, {mode:'no-cors', cache:'no-store', signal:controller.signal})
      .then(()=>{ clearTimeout(timer); resolve(true); })
      .catch(()=>{ clearTimeout(timer); resolve(false); });
  });
}
function collectAllSources(onlyItemId){
  const list = [];
  state.lib.items.forEach(item=>{
    if(onlyItemId && item.id!==onlyItemId) return;
    if(item.type==='movie'){
      (item.sources||[]).forEach(s=>{
        if(s.url) list.push({scope:'movie', itemId:item.id, title:item.title, label:s.label, url:s.url});
      });
    } else {
      (item.seasons||[]).forEach(season=>{
        (season.episodes||[]).forEach(ep=>{
          (ep.sources||[]).forEach(s=>{
            if(s.url) list.push({scope:'episode', itemId:item.id, title:`${item.title} — S${season.number}E${ep.number}`, label:s.label, url:s.url});
          });
        });
      });
    }
  });
  if(!onlyItemId){
    (state.lib.channels||[]).forEach(ch=>{
      (ch.sources||[]).forEach(s=>{
        if(s.url) list.push({scope:'channel', channelId:ch.id, title:ch.name, label:s.label, url:s.url});
      });
    });
  }
  return list;
}
async function runLinkHealthCheck(sources, onProgress){
  const results = [];
  const concurrency = 6;
  let idx = 0;
  async function worker(){
    while(idx < sources.length){
      const i = idx++;
      const s = sources[i];
      const ok = await checkUrlReachable(s.url);
      results.push(Object.assign({}, s, {ok}));
      if(onProgress) onProgress(results.length, sources.length);
    }
  }
  const workers = Array.from({length:Math.min(concurrency, sources.length)}, worker);
  await Promise.all(workers);
  return results;
}
async function openLinkHealthCheck(onlyItemId){
  const sources = collectAllSources(onlyItemId);
  if(!sources.length){ toast('No sources to check'); return; }
  openModal(`
    <div class="modal-head"><h2>Checking Sources</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div style="text-align:center; padding:36px 0;">
      <div class="spinner" style="margin:0 auto 18px auto;"></div>
      <div id="linkCheckProgressText" style="color:var(--muted); font-size:13px;">Checking 0 / ${sources.length}…</div>
    </div>
  `);
  const results = await runLinkHealthCheck(sources, (done,total)=>{
    const el = document.getElementById('linkCheckProgressText');
    if(el) el.textContent = `Checking ${done} / ${total}…`;
  });
  renderLinkHealthReport(results, onlyItemId);
}
function renderLinkHealthReport(results, onlyItemId){
  const dead = results.filter(r=>!r.ok);
  const ok = results.filter(r=>r.ok);
  openModal(`
    <div class="modal-head"><h2>Link Health Report</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div class="field-hint" style="margin-bottom:16px;">
      Checked ${results.length} source${results.length===1?'':'s'} — ${ok.length} reachable, ${dead.length} unreachable. This only catches domains that don't respond at all; a source can still fail to play even if it's marked reachable here, and an occasional slow server can show up as a false positive.
    </div>
    ${dead.length ? `
      <div style="display:flex; flex-direction:column; gap:10px; max-height:380px; overflow-y:auto;">
        ${dead.map(r=>`
          <div class="link-health-row">
            <div style="min-width:0;">
              <div class="link-health-title">${esc(r.title)}</div>
              <div class="link-health-url">${esc(r.label||'Source')} · ${esc(r.url)}</div>
            </div>
            <div style="display:flex; gap:6px; flex-shrink:0;">
              <button class="btn-icon" title="Open link in a new tab" onclick="window.open('${esc(r.url)}','_blank')">${ICON.expand}</button>
              <button class="btn-icon" title="Go to title" onclick="closeModal(); location.hash='${r.scope==='channel' ? 'live' : 'detail/'+r.itemId}'">${ICON.chevronRight}</button>
            </div>
          </div>`).join('')}
      </div>
    ` : `<div class="empty-state" style="padding:36px 16px;"><div class="empty-icon">${ICON.check}</div><h3>All clear</h3><p>Every source responded.</p></div>`}
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="openLinkHealthCheck(${onlyItemId?`'${onlyItemId}'`:''})">Re-check</button>
    </div>
  `);
}

function importLibrary(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.items) throw new Error('invalid');
      state.lib = {items:data.items||[], collections:data.collections||[], channels:data.channels||[], notifications:data.notifications||[], skipData:(data.skipData && typeof data.skipData==='object') ? data.skipData : {}};
      saveLib();
      // The imported items still carry progress/lastWatched inline (exports always include them —
      // see buildLibSnapshotForWrite's comment). saveLib() alone would only persist catalog fields
      // now that the progress split is in place, so this also needs an explicit progress-store save
      // or the imported watch progress would render fine this session but be gone on next reload.
      saveProgressStore();
      // Same reasoning for skipData, now that it's cut over to IndexedDB-only (Stage 3) --
      // saveLib() no longer persists it at all.
      saveSkipDataStore();
      router(); toast('Library imported');
    }catch(err){ toast('Invalid library file'); }
  };
  reader.readAsText(file);
}
function clearAllData(){

  state.lib = {items:[], collections:[], channels:[], notifications:[], skipData:{}};
  saveLib();
  saveProgressStore(); // clears the separate progress store too — items[] is empty, so this writes {}
  saveSkipDataStore(); // clears the IndexedDB skipData store too, same reasoning
  location.hash='home'; toast('All data cleared');
}

/* ---- Device-to-device sync via backup code ---- */
function encodeBackupCode(data){
  // JSON → UTF-8 bytes → base64. We use btoa via a TextEncoder-safe approach
  // so non-ASCII characters in titles/descriptions survive the round-trip.
  const json = JSON.stringify(data);
  const bytes = new TextEncoder().encode(json);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}
function decodeBackupCode(code){
  // Reverse: base64 → binary → UTF-8 bytes → JSON
  const binary = atob(code.trim().replace(/\s+/g, ''));
  const bytes = new Uint8Array(binary.length);
  for(let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const json = new TextDecoder().decode(bytes);
  return JSON.parse(json);
}

  // body once the fade-out finishes removes the now-dead iframe node entirely.
  if(modalBody){

  return `
    <div class="shortcuts-modal-head">

    </div>

      <div class="shortcuts-group-label">General</div>

function openEditModal(id){
  state.editingId = id || null;
  const item = id ? getItem(id) : null;
  state.editType = item ? item.type : 'movie';
  state.editGenres = item ? [...(item.genre||[])] : [];
  state.editActors = item ? [...(item.actors||[])] : [];
  state.editSources = item ? JSON.parse(JSON.stringify(item.sources||[{label:'',url:''}])) : [{label:'',url:''}];
  if(!state.editSources.length) state.editSources = [{label:'',url:''}];
  state.editSeasons = item ? JSON.parse(JSON.stringify(item.seasons||[])) : [];
  state.editImdbMeta = item ? {imdbId:item.imdbId||null, tmdbId:item.tmdbId||null, trailerKey:item.trailerKey||'', trailerChecked:!!item.trailerChecked} : null;
  state.editExcludedAutoProviders = item ? [...(item.excludedAutoProviders||[])] : [];
  state.editFormDraft = null;
  state.editCast = item ? JSON.parse(JSON.stringify(item.cast||[])) : [];
  state.editRatings = item ? JSON.parse(JSON.stringify(item.ratings||[])) : [];
  state.editTvStatus = item ? (item.tvStatus||'') : '';
  state.editNextEpisode = item ? (item.nextEpisodeInfo||null) : null;
  renderEditModal(item);
}
// These 8 plain text fields only ever existed as live DOM input values, never captured into a JS
// variable like editGenres/editActors/editSources/editSeasons are. That's fine as long as the modal

}

function setEditType(t){
  state.editType = t;
  document.querySelectorAll('.type-toggle button').forEach((b,i)=> b.classList.toggle('active',(i===0)===(t==='movie')));
  document.getElementById('typeSpecific').innerHTML = t==='movie' ? sourcesEditorHtml() : seasonsEditorHtml();
}
function toggleGenre(g){
  const i = state.editGenres.indexOf(g);
  if(i>-1) state.editGenres.splice(i,1); else state.editGenres.push(g);
  document.querySelectorAll('#genreChips .chip-btn').forEach(b=>{
    if(b.textContent.trim()===g) b.classList.toggle('active', state.editGenres.includes(g));
  });
}
function actorChipsHtml(){
  if(!state.editActors.length) return `<span style="color:var(--muted); font-size:12.5px;">No cast added yet.</span>`;
  return state.editActors.map((a,i)=>`<span class="actor-chip">${esc(a)}<button type="button" title="Remove" onclick="removeActor(${i})">${ICON.close}</button></span>`).join('');
}
function refreshActorChips(){
  const el = document.getElementById('actorChips');
  if(el) el.innerHTML = actorChipsHtml();
}
function addActorFromInput(){
  const input = document.getElementById('actorInput');
  if(!input) return;
  const name = input.value.trim();
  if(!name) return;
  if(!state.editActors.some(a=>a.toLowerCase()===name.toLowerCase())) state.editActors.push(name);
  input.value = '';
  refreshActorChips();
  input.focus();
}
function removeActor(i){
  state.editActors.splice(i,1);
  refreshActorChips();
}

   ---------------------------------------------------------
   Banned words are tag chips (add/remove pattern mirrors actor-chip cast tags above), saved to

   with the other always-on Settings toggles). Banned genres reuse the same chip-btn multi-select

   (see CONTENT FILTERS, near DEFAULT_GENRES) and is called from every add path.
========================================================= */
function bannedWordChipsHtml(){
  const words = state.settings.bannedWords||[];
  if(!words.length) return `<span style="color:var(--muted); font-size:12.5px;">No banned words yet.</span>`;
  return words.map((w,i)=>`<span class="actor-chip">${esc(w)}<button type="button" title="Remove" onclick="removeBannedWord(${i})">${ICON.close}</button></span>`).join('');
}
function refreshBannedWordChips(){
  const el = document.getElementById('bannedWordChips');
  if(el) el.innerHTML = bannedWordChipsHtml();
}
function addBannedWordFromInput(){
  const input = document.getElementById('bannedWordInput');
  if(!input) return;
  const word = input.value.trim().toLowerCase();
  if(!word) return;
  if(!state.settings.bannedWords.includes(word)){
    state.settings.bannedWords.push(word);
    saveSettings();
  }
  input.value = '';
  refreshBannedWordChips();
  input.focus();
}
function removeBannedWord(i){
  state.settings.bannedWords.splice(i,1);
  saveSettings();
  refreshBannedWordChips();
}
function toggleBannedGenre(g){
  const list = state.settings.bannedGenres;
  const i = list.indexOf(g);
  if(i>-1) list.splice(i,1); else list.push(g);
  saveSettings();
  document.querySelectorAll('#bannedGenreChips .chip-btn').forEach(b=>{
    if(b.textContent.trim()===g) b.classList.toggle('active', list.includes(g));
  });
}

/* =========================================================
   SKIP SEGMENTS — Settings + Manager UI
   ---------------------------------------------------------
   Master on/off + notification toggle live directly on the Settings page (see renderSettings >
   "Skip Segments"). Everything else — browsing every title/episode that has segments, adding new
   ones by hand, editing, deleting, and per-segment or per-title enable/disable — lives in a modal
   "Skip Manager" (openSkipManager), reusing the app's existing openModal()/closeModal() plumbing
   and .link-health-row / .switch / .chip-btn styling rather than introducing new components.
   state.skipManager holds the manager's own transient UI state (which of its 3 screens is showing,
   search text, which title/episode is drilled into, which single segment is mid-edit) — none of it
   is persisted; only the actual skip data (state.lib.skipData) is.
========================================================= */
function toggleSkipSegmentsEnabled(checked){
  state.settings.skipSegmentsEnabled = checked;
  saveSettings();
  const toggle = document.getElementById('skipSegmentsEnabledToggle');
  const span = toggle && toggle.closest('.field') && toggle.closest('.field').querySelector('.toggle-row-label');
  if(span) span.textContent = checked ? 'Enabled' : 'Disabled';
  toast(checked ? 'Skip Segments enabled' : 'Skip Segments disabled');
}
function toggleSkipNotify(checked){
  state.settings.skipNotify = checked;
  saveSettings();
  const toggle = document.getElementById('skipNotifyToggle');
  const span = toggle && toggle.closest('.field') && toggle.closest('.field').querySelector('.toggle-row-label');
  if(span) span.textContent = checked ? 'On' : 'Off';
}
function exportSkipData(){
  const blob = new Blob([JSON.stringify(state.lib.skipData||{}, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'stream-vault-skip-segments.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Skip data exported');
}
function importSkipData(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(typeof data !== 'object' || !data || Array.isArray(data)) throw new Error('invalid');
      // Merge rather than replace — importing a shared/backup skip file shouldn't wipe out segments
      // already built locally for titles the import doesn't mention.
      if(!state.lib.skipData) state.lib.skipData = {};
      let importedCount = 0;
      Object.keys(data).forEach(key=>{
        const incoming = data[key];
        if(!incoming || !Array.isArray(incoming.segments)) return;
        const segments = incoming.segments
          .filter(s=> s && typeof s.start==='number' && typeof s.end==='number' && s.end > s.start)
          .map(s=>({ id: s.id || uuid(), name: s.name || '', start: Math.max(0, Math.round(s.start)), end: Math.round(s.end), enabled: s.enabled !== false }));
        if(!segments.length) return;
        state.lib.skipData[key] = { enabled: incoming.enabled !== false, segments };
        importedCount++;
      });
      if(!importedCount) throw new Error('empty');
      saveSkipDataStore();
      toast(`Imported skip data for ${importedCount} title${importedCount===1?'':'s'}`);
      if(state.skipManager) openModal(renderSkipManagerHtml());
    }catch(err){ toast('Invalid skip data file'); }
  };
  reader.readAsText(file);
}
function resetAllSkipSegments(){
  if(!confirm('Delete every saved skip segment for every title? This cannot be undone.')) return;
  state.lib.skipData = {};
  saveSkipDataStore();
  toast('All skip segments reset');
  if(state.skipManager) openModal(renderSkipManagerHtml());
}

function skipManagerRowLabel(r){

  return r.seasonNum!=null ? `${r.item.title} — S${r.seasonNum}E${r.epNum}` : r.item.title;
}
function openSkipManager(){
  state.skipManager = {view:'list', query:'', openKey:null, editingSegId:null, addPickItemId:null, addPickQuery:''};
  openModal(renderSkipManagerHtml());
}
function renderSkipManagerHtml(){
  const sm = state.skipManager;
  if(sm.view==='detail') return renderSkipManagerDetailHtml(sm.openKey);
  if(sm.view==='addPick') return renderSkipManagerAddPickHtml();
  return renderSkipManagerListHtml();
}
function renderSkipManagerListHtml(){

  let rows = listSkipEntries();
  if(q) rows = rankedTitleSearch(rows, q, skipManagerRowLabel);
  rows.sort((a,b)=> skipManagerRowLabel(a).localeCompare(skipManagerRowLabel(b)));
  return `
    <div class="modal-head"><h2>Skip Segments</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>

function skipManagerRowHtml(r){

function filterSkipManagerList(query){
  state.skipManager.query = query;

  const q = (query||'').toLowerCase();
  let rows = listSkipEntries();
  if(q) rows = rankedTitleSearch(rows, q, skipManagerRowLabel);
  rows.sort((a,b)=> skipManagerRowLabel(a).localeCompare(skipManagerRowLabel(b)));
  el.innerHTML = rows.length ? rows.map(r=>skipManagerRowHtml(r)).join('') : `<div class="field-hint">No matches.</div>`;
}

  if(sm.editingSegId === seg.id){
    return `
      <div class="link-health-row" style="flex-direction:column; align-items:stretch; gap:8px;">
        <div class="field-row" style="align-items:flex-end;">
          <div class="field" style="flex:1; margin-bottom:0;"><label>Start</label><input id="skipMgrEditStart" value="${esc(formatResumeTime(seg.start))}"></div>
          <div class="field" style="flex:1; margin-bottom:0;"><label>End</label><input id="skipMgrEditEnd" value="${esc(formatResumeTime(seg.end))}"></div>
        </div>
        <input id="skipMgrEditName" value="${esc(seg.name||'')}" placeholder="Name (optional)">
        <div style="display:flex; gap:8px;">
          <button class="btn btn-primary" style="flex:1; justify-content:center;" onclick="saveSkipManagerEditSegment('${keyEsc}','${seg.id}')">Save</button>
          <button class="btn btn-ghost" style="flex:1; justify-content:center;" onclick="cancelSkipManagerEditSegment()">Cancel</button>
        </div>
      </div>`;
  }
  return `
    <div class="link-health-row" style="align-items:center;">
      <div style="min-width:0; flex:1;">
        <div class="link-health-title">${esc(seg.name || 'Skip Segment')}</div>
        <div class="link-health-url">${formatResumeTime(seg.start)} → ${formatResumeTime(seg.end)} ${seg.enabled?'':'· Disabled'}</div>
      </div>
      <label class="switch" style="flex-shrink:0;"><input type="checkbox" ${seg.enabled?'checked':''} onchange="toggleSkipSegmentEnabledInManager('${keyEsc}','${seg.id}', this.checked)"><span class="switch-slider"></span></label>
      <button class="btn-icon" title="Edit" style="flex-shrink:0; margin-left:6px;" onclick="startSkipManagerEditSegment('${seg.id}')">${ICON.edit}</button>
      <button class="btn-icon" title="Delete" style="flex-shrink:0; margin-left:6px;" onclick="deleteSkipSegmentInManager('${keyEsc}','${seg.id}')">${ICON.trash}</button>
    </div>`;
}
function toggleSkipEntryEnabled(key, checked){
  const entry = ensureSkipEntry(key);
  entry.enabled = checked;
  saveSkipDataStore();
}
function toggleSkipSegmentEnabledInManager(key, segId, checked){
  const entry = getSkipEntry(key);
  const seg = entry && entry.segments.find(s=>s.id===segId);
  if(seg) seg.enabled = checked;
  saveSkipDataStore();
}
function deleteSkipSegmentInManager(key, segId){
  const entry = getSkipEntry(key);
  if(!entry) return;
  entry.segments = entry.segments.filter(s=>s.id!==segId);
  pruneSkipEntry(key);
  saveSkipDataStore();
  toast('Skip segment deleted');
  if(state.lib.skipData[key]) openModal(renderSkipManagerHtml());
  else backToSkipManagerList(); // that was the last segment — the key was pruned, nothing left to show here
}
function deleteAllSkipSegmentsForKey(key){
  if(!confirm('Delete all skip segments for this title?')) return;
  delete state.lib.skipData[key];
  saveSkipDataStore();
  toast('Skip segments deleted');
  backToSkipManagerList();
}
function startSkipManagerEditSegment(segId){
  state.skipManager.editingSegId = segId;
  openModal(renderSkipManagerHtml());
}
function cancelSkipManagerEditSegment(){
  state.skipManager.editingSegId = null;
  openModal(renderSkipManagerHtml());
}
function saveSkipManagerEditSegment(key, segId){
  const entry = getSkipEntry(key);
  const seg = entry && entry.segments.find(s=>s.id===segId);
  if(!seg) return;
  const start = parseSkipTime(document.getElementById('skipMgrEditStart').value);
  const end = parseSkipTime(document.getElementById('skipMgrEditEnd').value);
  if(start==null || end==null){ toast('Enter both Start and End as MM:SS or HH:MM:SS'); return; }
  if(end<=start){ toast('End must be after Start'); return; }
  seg.start = start; seg.end = end;
  seg.name = document.getElementById('skipMgrEditName').value.trim();
  saveSkipDataStore();
  state.skipManager.editingSegId = null;
  openModal(renderSkipManagerHtml());
  toast('Skip segment updated');
}
function addSkipSegmentInManager(key){
  const start = parseSkipTime(document.getElementById('skipMgrNewStart').value);
  const end = parseSkipTime(document.getElementById('skipMgrNewEnd').value);
  if(start==null || end==null){ toast('Enter both Start and End as MM:SS or HH:MM:SS'); return; }
  if(end<=start){ toast('End must be after Start'); return; }
  const name = document.getElementById('skipMgrNewName').value.trim();
  const entry = ensureSkipEntry(key);
  entry.segments.push({id: uuid(), name, start, end, enabled:true});
  saveSkipDataStore();
  openModal(renderSkipManagerHtml());
  toast('Skip segment added');
}

// Shared by the movie editor and each episode editor: a preview of the auto-generated Streaming
// Provider link(s), so it's clear at a glance what will actually play without having to leave the
// edit modal and check Settings. The label/URL fields aren't editable (change the domain in
// Settings for that), but each row's Remove button opts THIS title out of that one provider —
// see removeAutoProviderSource() — and a Restore link reappears below once anything is hidden.
function autoSourcesPreviewHtml(auto, excluded){
  let html = '';
  if(!auto.length && !(excluded && excluded.length)){
    const hint = (state.editImdbMeta && state.editImdbMeta.imdbId)
      ? 'No Streaming Provider domains set — add one in Settings &rarr; Playback to auto-generate a link here.'
      : 'Import from IMDb above to auto-generate a link here once a Streaming Provider is set in Settings.';
    return `<div class="field-hint" style="margin-bottom:8px;">${hint}</div>`;
  }
  html += auto.map(s=>`
    <div class="source-row source-row-auto" title="Generated automatically from Settings &rarr; Playback &rarr; Streaming Providers. Removing it only opts this title out — the domain stays configured for everything else.">
      <input value="${esc(s.label)}" disabled>
      <input value="${esc(s.url)}" disabled>
      <span class="source-row-auto-badge">Auto</span>
      <button type="button" class="rm" title="Remove this auto-generated link for this title only" onclick="removeAutoProviderSource('${esc(s.providerDomain)}')">${ICON.close}</button>
    </div>`).join('');
  if(excluded && excluded.length){
    html += `<div class="field-hint" style="margin-bottom:8px;">${excluded.length} auto-generated link${excluded.length===1?'':'s'} hidden for this title — <a href="#" onclick="restoreAutoProviderSources(); return false;" style="color:var(--highlight);">Restore</a></div>`;
  }
  return html;
}
