/* ---- Median App Injection Script (for Website Overrides → Custom JavaScript) ----
   Same content-blur approach as the toggle above, but self-contained so it can run
   independently of this page — needed because Median injects it fresh into whichever
   frame it targets, which may include third-party iframes (VidSrc, live TV) that this
   app's own JavaScript can never reach into no matter how it's written. */
const MEDIAN_BLUR_SCRIPT = `/*
 * Stream Vault — Content Blur (all-frames injection script)
 * -----------------------------------------------------------
 * WHERE THIS GOES: Median App Studio -> Website Overrides -> Custom JavaScript
 * (only useful if Median confirms that field injects into iframes/subframes,
 * not just the top-level page -- ask their support if unsure).
 *
 * WHAT IT DOES: on-device NSFW detection (nsfwjs) applied to every <img> and
 * <video> element it finds, with tap-to-reveal. Runs entirely on-device --
 * nothing is uploaded anywhere.
 *
 * WHY IT'S SEPARATE FROM THE MAIN APP: this needs to be injected by Median
 * itself into every frame of the WebView (including third-party iframes like
 * VidSrc embeds). Code living inside Stream Vault's own HTML can only ever
 * see Stream Vault's own page -- it cannot reach into a cross-origin iframe
 * no matter where it's called from. This script works differently: it isn't
 * Stream Vault's code reaching out, it's Median's WebView engine placing a
 * fresh copy of this exact script directly inside each frame, including
 * frames that belong to another website entirely. That's what makes it
 * capable of reaching content this app's own JavaScript cannot.
 *
 * HONEST LIMITS THAT DON'T GO AWAY, EVEN HERE:
 *  - If a source's own server blocks cross-origin pixel access (no CORS
 *    headers), the classifier can't read that particular image/video and
 *    will just skip it -- this is common for random third-party media and
 *    is a browser security rule, not a bug.
 *  - Sites that render video via <canvas>, WebGL, or proprietary players
 *    instead of a plain <video> tag won't be caught by this script.
 *  - This only runs if Median actually injects it into subframes. If it
 *    only reaches the top-level page, it will still work great on Stream
 *    Vault's own posters/backdrops/logos, just not inside embedded players.
 */
(function () {
  'use strict';
  if (window.__streamVaultBlurInstalled) return; // avoid double-injection
  window.__streamVaultBlurInstalled = true;

  var SENSITIVITY = 'moderate'; // 'moderate' or 'strict'
  var THRESHOLD = SENSITIVITY === 'strict' ? 0.2 : 0.4;
  var SCAN_INTERVAL_MS = 3000; // how often to look for newly-added images/video
  var VIDEO_SAMPLE_INTERVAL_MS = 2500;
  // If the default model won't download inside your wrapped app (common when a WebView restricts
  // which domains it can fetch from), host model.json + its .bin shard files on your own domain and
  // put the full URL to model.json here. Leave blank to use the default (nsfwjs's bundled model).
  var MODEL_URL = '';

  var modelPromise = null;
  function loadScriptOnce(src, timeoutMs) {
    timeoutMs = timeoutMs || 12000;
    return new Promise(function (resolve, reject) {
      var s = document.createElement('script');
      var done = false;
      var timer = setTimeout(function () {
        if (done) return;
        done = true;
        s.remove();
        reject(new Error('Timed out loading ' + src));
      }, timeoutMs);
      s.src = src;
      s.onload = function () { if (done) return; done = true; clearTimeout(timer); resolve(); };
      s.onerror = function () { if (done) return; done = true; clearTimeout(timer); reject(new Error('Failed to load ' + src)); };
      document.head.appendChild(s);
    });
  }
  async function loadScriptWithFallback(urls) {
    var lastErr = null;
    for (var i = 0; i < urls.length; i++) {
      try { await loadScriptOnce(urls[i]); return urls[i]; }
      catch (e) { lastErr = e; }
    }
    throw lastErr || new Error('All sources failed');
  }
  function loadModel() {
    if (modelPromise) return modelPromise;
    modelPromise = (async function () {
      if (!window.tf) {
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
          'https://unpkg.com/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
        ]);
      }
      if (!window.nsfwjs) {
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/nsfwjs@4.2.1/dist/nsfwjs.min.js',
          'https://unpkg.com/nsfwjs@4.2.1/dist/nsfwjs.min.js',
        ]);
      }
      // Model source priority: explicit MODEL_URL above > an auto-detected same-directory
      // "models/nsfwjs/model.json" (works when this script runs on your own hosted page; can't
      // work when injected into a different-origin iframe, since "same directory" means nothing
      // there) > nsfwjs's own bundled model as a last resort.
      if (MODEL_URL) {
        return window.nsfwjs.load(MODEL_URL);
      }
      try {
        var relativeUrl = new URL('models/nsfwjs/model.json', location.href).href;
        var check = await fetch(relativeUrl, { method: 'HEAD', cache: 'no-store' });
        if (!check.ok) throw new Error('not found');
        return await window.nsfwjs.load(relativeUrl);
      } catch (relErr) {
        return window.nsfwjs.load('MobileNetV2');
      }
    })().catch(function (e) {
      console.error('[StreamVault Blur] failed to load:', e);
      throw e;
    });
    return modelPromise;
  }
  async function classify(el) {
    try {
      var model = await loadModel();
      var predictions = await model.classify(el);
      return predictions
        .filter(function (p) { return p.className === 'Porn' || p.className === 'Hentai' || p.className === 'Sexy'; })
        .reduce(function (sum, p) { return sum + p.probability; }, 0);
    } catch (e) {
      return null; // couldn't analyze this element (tainted canvas, load failure, etc.) -- skip it
    }
  }
  function reveal(el, ev) {
    if (ev) ev.stopPropagation();
    el.classList.remove('__sv_blurred');
    el.classList.add('__sv_revealed');
  }
  function ensureStyle() {
    if (document.getElementById('__sv_blur_style')) return;
    var style = document.createElement('style');
    style.id = '__sv_blur_style';
    style.textContent =
      '.__sv_blurred{filter:blur(32px) saturate(70%) !important;cursor:pointer !important;transition:filter .3s ease;}' +
      '.__sv_blurred:hover{filter:blur(18px) saturate(70%) !important;}' +
      '.__sv_revealed{filter:none !important;}';
    document.head.appendChild(style);
  }
  async function checkImage(img) {
    if (img.dataset.__svChecked) return;
    img.dataset.__svChecked = '1';
    var run = function () {
      classify(img).then(function (score) {
        if (score !== null && score >= THRESHOLD) {
          img.classList.add('__sv_blurred');
          img.addEventListener('click', function (ev) {
            if (img.classList.contains('__sv_blurred')) reveal(img, ev);
          });
        }
      });
    };
    if (img.complete && img.naturalWidth > 0) run();
    else img.addEventListener('load', run, { once: true });
  }
  function watchVideo(video) {
    if (video.dataset.__svWatching) return;
    video.dataset.__svWatching = '1';
    var canvas = document.createElement('canvas');
    canvas.width = 160; canvas.height = 90;
    var ctx = canvas.getContext('2d');
    var interval = setInterval(async function () {
      if (!video.isConnected) { clearInterval(interval); return; }
      if (video.paused || video.readyState < 2) return;
      try { ctx.drawImage(video, 0, 0, 160, 90); }
      catch (e) { clearInterval(interval); return; } // cross-origin source we can't read -- stop trying
      var score = await classify(canvas);
      if (score === null) { clearInterval(interval); return; }
      video.classList.toggle('__sv_blurred', score >= THRESHOLD);
    }, VIDEO_SAMPLE_INTERVAL_MS);
  }
  function scan() {
    ensureStyle();
    document.querySelectorAll('img:not([data-__svChecked])').forEach(checkImage);
    document.querySelectorAll('video:not([data-__svWatching])').forEach(watchVideo);
  }

  ensureStyle();
  scan();
  setInterval(scan, SCAN_INTERVAL_MS); // catches images/video added dynamically after page load
  var mo = new MutationObserver(function () { scan(); });
  mo.observe(document.documentElement, { childList: true, subtree: true });
})();
`;

/* ---- Link Health checker ----
   Browsers can't read the HTTP status of a cross-origin URL (CORS blocks the response body/status
   from being visible to our JS). A no-cors fetch still tells us one useful thing though: whether the
   request could even reach a server at all. That fails (throws/aborts) for a dead domain, a refused
   connection, or a timeout — the way these mirror/live-TV sources actually die most of the time.
   It can NOT tell us "the domain is up but returns a 404" or "shows an unavailable page" — that
   requires actually opening the link. So results here are a first-pass filter, not a guarantee. */
function checkUrlReachable(url, timeoutMs){
  timeoutMs = timeoutMs || 8000;
  return new Promise(resolve=>{
    const controller = new AbortController();
    const timer = setTimeout(()=>{ controller.abort(); }, timeoutMs);
    fetch(url, {mode:'no-cors', cache:'no-store', signal:controller.signal})
      .then(()=>{ clearTimeout(timer); resolve(true); })
      .catch(()=>{ clearTimeout(timer); resolve(false); });
  });
}
function collectAllSources(onlyItemId){
  const list = [];
  state.lib.items.forEach(item=>{
    if(onlyItemId && item.id!==onlyItemId) return;
    if(item.type==='movie'){
      (item.sources||[]).forEach(s=>{
        if(s.url) list.push({scope:'movie', itemId:item.id, title:item.title, label:s.label, url:s.url});
      });
    } else {
      (item.seasons||[]).forEach(season=>{
        (season.episodes||[]).forEach(ep=>{
          (ep.sources||[]).forEach(s=>{
            if(s.url) list.push({scope:'episode', itemId:item.id, title:`${item.title} — S${season.number}E${ep.number}`, label:s.label, url:s.url});
          });
        });
      });
    }
  });
  if(!onlyItemId){
    (state.lib.channels||[]).forEach(ch=>{
      (ch.sources||[]).forEach(s=>{
        if(s.url) list.push({scope:'channel', channelId:ch.id, title:ch.name, label:s.label, url:s.url});
      });
    });
  }
  return list;
}
async function runLinkHealthCheck(sources, onProgress){
  const results = [];
  const concurrency = 6;
  let idx = 0;
  async function worker(){
    while(idx < sources.length){
      const i = idx++;
      const s = sources[i];
      const ok = await checkUrlReachable(s.url);
      results.push(Object.assign({}, s, {ok}));
      if(onProgress) onProgress(results.length, sources.length);
    }
  }
  const workers = Array.from({length:Math.min(concurrency, sources.length)}, worker);
  await Promise.all(workers);
  return results;
}

/* ---- Device-to-device sync via backup code ---- */
function encodeBackupCode(data){
  // JSON → UTF-8 bytes → base64. We use btoa via a TextEncoder-safe approach
  // so non-ASCII characters in titles/descriptions survive the round-trip.
  const json = JSON.stringify(data);
  const bytes = new TextEncoder().encode(json);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}
function decodeBackupCode(code){
  // Reverse: base64 → binary → UTF-8 bytes → JSON
  const binary = atob(code.trim().replace(/\s+/g, ''));
  const bytes = new Uint8Array(binary.length);
  for(let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const json = new TextDecoder().decode(bytes);
  return JSON.parse(json);
}
async function copyBackupCode(){
  const itemCount = state.lib.items.length;
  const channelCount = (state.lib.channels||[]).length;
  if(!itemCount && !channelCount){ toast('Your library is empty — nothing to copy'); return; }
  try{
    const code = encodeBackupCode(state.lib);
    await navigator.clipboard.writeText(code);
    toast(`✅ Backup code copied! (${itemCount} title${itemCount===1?'':'s'}, ${channelCount} channel${channelCount===1?'':'s'}) — now paste it into WhatsApp, Telegram, or email and send it to yourself.`);
  }catch(e){
    // Fallback for devices where clipboard API is restricted (some Android WebViews)
    openModal(`
      <div class="modal-head"><h2>Your Backup Code</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
      <p class="field-hint" style="margin-bottom:12px;">Clipboard access was blocked. Select all the text below, copy it, then send it to yourself via WhatsApp, Telegram, or email.</p>
      <textarea id="backupCodeOutput" readonly style="min-height:160px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; word-break:break-all;">${encodeBackupCode(state.lib)}</textarea>

        <button class="btn btn-ghost" onclick="closeModal()">Close</button>

}

function applyRestoreFromCode(){
  const raw = (document.getElementById('restoreCodeInput').value||'').trim();
  if(!raw){ toast('Paste a backup code first'); return; }
  try{
    const data = decodeBackupCode(raw);
    if(!data.items) throw new Error('invalid');
    state.lib = {
      items: data.items || [],
      collections: data.collections || [],
      channels: data.channels || [],
      notifications: data.notifications || [],
    };
    saveLib();
    closeModal();
    router();
    const itemCount = state.lib.items.length;
    const channelCount = (state.lib.channels||[]).length;
    toast(`✅ Library restored! ${itemCount} title${itemCount===1?'':'s'}, ${channelCount} channel${channelCount===1?'':'s'}.`);
  }catch(e){
    toast('That code looks wrong — make sure you copied the whole thing without cutting it off.');
  }
}

    ]
  },
  {
    "number": 2,
    "episodes": [ { "title": "S2E1", "url": "https://..." } ]
  }
]'></textarea>
      <div class="field-hint">Array of seasons (or <code>{"seasons":[...]}</code>). Each episode accepts <code>"url"</code>, <code>"urls":[...]</code>, or <code>"sources":[{"label","url"}]</code>. If you've already fetched metadata (title, thumbnail, synopsis, runtime) from TMDB/IMDb, importing here only updates the stream links for matching episodes — everything else fetched stays intact. New seasons/episodes not already present get added.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="renderEditModal(state.editingId?getItem(state.editingId):null)">Cancel</button>
      <button class="btn btn-primary" onclick="applySeasonsJsonImport()">Import Seasons</button>
    </div>
  `);

function normalizeSeasonsJson(data){
  const arr = Array.isArray(data) ? data : (data && Array.isArray(data.seasons) ? data.seasons : null);
  if(!arr) throw new Error('JSON must be an array of seasons, or an object like {"seasons":[...]}');
  return arr.map((s,si)=>{
    const number = parseInt(s.number ?? s.season ?? s.season_number ?? (si+1), 10) || (si+1);
    const eps = Array.isArray(s.episodes) ? s.episodes : [];
    const episodes = eps.map((e,ei)=>{
      const num = parseInt(e.number ?? e.episode ?? e.episode_number ?? (ei+1), 10) || (ei+1);
      let sources = [];
      if(Array.isArray(e.sources)) sources = e.sources.map(src=>({label:(src.label||'Source').toString(), url:(src.url||src.link||'').toString()})).filter(s=>s.url);
      else if(Array.isArray(e.urls)) sources = e.urls.filter(Boolean).map((u,i)=>({label:'Source '+(i+1), url:u}));
      else if(typeof e.url==='string' && e.url) sources = [{label:'Source 1', url:e.url}];
      else if(typeof e.link==='string' && e.link) sources = [{label:'Source 1', url:e.link}];
      if(!sources.length) sources = [{label:'',url:''}];
      return {number:num, title:(e.title||('Episode '+num)).toString(), thumbnail:(e.thumbnail||e.image||'').toString(), sources};
    });
    return {number, episodes};
  });
}
function applySeasonsJsonImport(){
  const text = document.getElementById('seasonsJsonText').value.trim();
  if(!text){ toast('Paste some JSON first'); return; }
  let data;
  try{ data = JSON.parse(text); }
  catch(e){ toast('Invalid JSON: '+e.message); return; }
  let normalized;
  try{ normalized = normalizeSeasonsJson(data); }
  catch(e){ toast(e.message); return; }

  let linksUpdated = 0, episodesAdded = 0, seasonsAdded = 0;
  normalized.forEach(ns=>{
    const season = state.editSeasons.find(s=>s.number===ns.number);
    if(!season){
      // Brand new season we don't have yet — nothing to merge with, add it as-is.
      state.editSeasons.push(ns);
      seasonsAdded++;
      episodesAdded += ns.episodes.length;
      return;
    }
    season.episodes = season.episodes || [];
    ns.episodes.forEach(newEp=>{
      const existingEp = season.episodes.find(e=>e.number===newEp.number);
      if(existingEp){
        // Only replace the links. Title/thumbnail/overview/runtime/rating already fetched from
        // TMDB/IMDb stay untouched — this is the whole point: re-pasting a links-only JSON after
        // fetching metadata shouldn't wipe that metadata back out.
        existingEp.sources = newEp.sources;
        // Fill in title/thumbnail only if we don't already have a real one (a generic
        // "Episode N" placeholder counts as not having one).
        if(newEp.title && (!existingEp.title || /^Episode \d+$/i.test(existingEp.title))) existingEp.title = newEp.title;
        if(newEp.thumbnail && !existingEp.thumbnail) existingEp.thumbnail = newEp.thumbnail;
        linksUpdated++;
      } else {
        season.episodes.push(newEp);
        episodesAdded++;
      }
    });
    season.episodes.sort((a,b)=>a.number-b.number);
  });
  state.editSeasons.sort((a,b)=>a.number-b.number);
  renderEditModal(state.editingId?getItem(state.editingId):null);
  const parts = [];
  if(linksUpdated) parts.push(`updated links for ${linksUpdated} episode(s)`);
  if(episodesAdded) parts.push(`added ${episodesAdded} new episode(s)`);
  if(seasonsAdded) parts.push(`${seasonsAdded} new season(s)`);
  toast(parts.length ? parts.join(', ').replace(/^./, c=>c.toUpperCase()) : 'Nothing to import');
}

// Shared TMDB detail pull used by both "Fetch from TMDB" (by title) and the IMDb auto-import.
// Populates genres/cast/poster/backdrop/logo/rating/runtime/description, and for TV shows,
// walks every season and pulls real episode titles + thumbnails (sources are left for you to add).
async function applyTmdbDetails(tmdbId, tmdbType){
  const key = state.settings.tmdb;
  const detailsRes = await fetch(`https://api.themoviedb.org/3/${tmdbType}/${tmdbId}?api_key=${encodeURIComponent(key)}&append_to_response=credits,videos,images&include_image_language=en,null`);
  const d = await detailsRes.json();
  if(d.success===false) throw new Error(d.status_message||'TMDB lookup failed');

  const titleVal = tmdbType==='movie' ? d.title : d.name;
  const dateVal = tmdbType==='movie' ? d.release_date : d.first_air_date;
  const year = dateVal ? dateVal.split('-')[0] : '';
  const poster = d.poster_path ? `https://image.tmdb.org/t/p/w780${d.poster_path}` : '';
  const backdrop = d.backdrop_path ? `https://image.tmdb.org/t/p/w1280${d.backdrop_path}` : '';
  const genres = (d.genres||[]).map(g=>g.name);
  const rating = d.vote_average ? d.vote_average.toFixed(1) : '';
  const runtimeMinutes = tmdbType==='movie' ? d.runtime : (d.episode_run_time && d.episode_run_time[0]);
  const runtime = runtimeMinutes ? `${runtimeMinutes} min` : '';
  const overview = d.overview || '';
  const cast = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>c.name);
  const logos = (d.images && d.images.logos) || [];
  const bestLogo = logos.find(l=>l.iso_639_1==='en') || logos[0];
  const logo = bestLogo ? `https://image.tmdb.org/t/p/original${bestLogo.file_path}` : '';
  const videos = ((d.videos && d.videos.results) || []).filter(v=>v.site==='YouTube');
  const trailerVid = videos.find(v=>v.type==='Trailer' && v.official) || videos.find(v=>v.type==='Trailer') || videos.find(v=>v.type==='Teaser') || videos[0];

  if(genres.length) state.editGenres = genres;
  if(cast.length) state.editActors = cast;

  let episodeCount = 0, seasonCount = 0;
  if(tmdbType==='tv' && Array.isArray(d.seasons)){
    const realSeasons = d.seasons.filter(s=>s.season_number>0);
    const seasonsData = [];
    for(const s of realSeasons){
      try{
        const seasonRes = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${s.season_number}?api_key=${encodeURIComponent(key)}`);
        const seasonJson = await seasonRes.json();
        const episodes = (seasonJson.episodes||[]).map(e=>({
          number: e.episode_number,
          title: e.name || `Episode ${e.episode_number}`,
          thumbnail: e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : '',
          overview: e.overview || '',
          runtime: e.runtime || null,
          sources: [{label:'',url:''}]
        }));
        seasonsData.push({number: s.season_number, episodes});
        episodeCount += episodes.length;
      }catch(e){ /* skip a season that fails to load rather than aborting the whole import */ }
    }
    seasonCount = seasonsData.length;
    state.editSeasons = seasonsData;
  }

  // Re-render so the genre pool / cast chips / season editor reflect the new data, then restore field values.
  // NOTE: this recreates every element in the modal (including any button that triggered this call),
  // so callers must not hold onto a DOM reference captured before this point — re-query by id instead.
  renderEditModal(state.editingId ? getItem(state.editingId) : null);
  const setVal = (id, val)=>{ const el=document.getElementById(id); if(el && val) el.value = val; };
  setVal('f_title', titleVal);
  setVal('f_year', year);
  setVal('f_poster', poster);
  setVal('f_backdrop', backdrop);
  setVal('f_logo', logo);
  setVal('f_desc', overview);
  setVal('f_rating', rating);
  setVal('f_runtime', runtime);

  return { tmdbId, trailerKey: trailerVid ? trailerVid.key : '', logo, seasonCount, episodeCount };
}

async function fetchTmdbByTitle(){
  const title = document.getElementById('f_title').value.trim();
  if(!title){ toast('Enter a title first'); return; }
  if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings'); return; }
  setTmdbFetchBtnState('Fetching...', true);
  try{
    const tmdbType = state.editType==='series' ? 'tv' : 'movie';
    const yearVal = document.getElementById('f_year').value.trim();
    const yearParam = yearVal ? (tmdbType==='movie' ? `&year=${encodeURIComponent(yearVal)}` : `&first_air_date_year=${encodeURIComponent(yearVal)}`) : '';
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/${tmdbType}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(title)}${yearParam}`);
    const searchData = await searchRes.json();
    if(searchData.success===false){
      toast(`TMDB error: ${searchData.status_message||'request failed'} — check your API key in Settings (it needs the "API Key (v3 auth)", not the Read Access Token)`);
      return;
    }
    const match = searchData.results && searchData.results[0];
    if(!match){ toast(`No TMDB match found for "${title}"${yearVal?' ('+yearVal+')':''}${yearVal?' — try clearing the year and searching again':''}`); return; }
    const info = await applyTmdbDetails(match.id, tmdbType);
    state.editImdbMeta = Object.assign({}, state.editImdbMeta, {tmdbId: info.tmdbId, trailerKey: info.trailerKey, trailerChecked: !!info.trailerKey});
    toast(info.seasonCount ? `Fetched from TMDB — ${info.seasonCount} season(s), ${info.episodeCount} episode(s)` : 'Metadata fetched from TMDB');
  }catch(e){

    setTmdbFetchBtnState('Fetch from TMDB', false);
  }
}

// IMDb Auto Import: paste any IMDb title URL, get metadata + (for TV) full season/episode
// structure pulled automatically from OMDb + TMDB. Stream sources are left for you to fill in —
// see the note in the UI for why links aren't auto-generated.
async function importFromImdb(){
  const raw = document.getElementById('imdbUrlInput').value.trim();
  const idMatch = raw.match(/tt\d{6,10}/);
  if(!idMatch){ toast('Paste a valid IMDb URL (e.g. imdb.com/title/tt0111161/)'); return; }
  const imdbId = idMatch[0];
  if(!state.settings.omdb){ toast('Add your OMDb API key in Settings first'); return; }
  if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings first — needed for backdrops, logos, trailers, and season data'); return; }

  const setBtnState = (text, disabled)=>{
    // Re-queried on demand since applyTmdbDetails re-renders the whole modal partway through.
    const b = document.getElementById('imdbImportBtn');
    if(b){ b.disabled = disabled; b.textContent = text; }
  };
  setBtnState('Importing...', true);
  try{
    // OMDb by IMDb ID gives us a reliable Movie/Series type plus baseline fields.
    const omdbRes = await fetch(`https://www.omdbapi.com/?i=${encodeURIComponent(imdbId)}&plot=full&apikey=${encodeURIComponent(state.settings.omdb)}`);
    const omdb = await omdbRes.json();
    if(omdb.Response==='False'){ toast(omdb.Error || 'IMDb ID not found on OMDb — double-check your OMDb key in Settings'); return; }
    const type = omdb.Type==='series' ? 'series' : 'movie';
    state.editType = type;

    // Resolve the TMDB numeric ID from the IMDb ID so we can pull backdrops/logos/trailers/seasons.
    const tmdbType = type==='series' ? 'tv' : 'movie';
    const findRes = await fetch(`https://api.themoviedb.org/3/find/${imdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}&external_source=imdb_id`);
    const find = await findRes.json();
    if(find.success===false){
      toast(`TMDB error: ${find.status_message||'request failed'} — check your API key in Settings (it needs the "API Key (v3 auth)", not the Read Access Token)`);
      return;
    }
    const results = tmdbType==='movie' ? find.movie_results : find.tv_results;
    const tmdbMatch = results && results[0];

    let info = null;
    if(tmdbMatch){
      info = await applyTmdbDetails(tmdbMatch.id, tmdbType);
    } else {
      if(omdb.Genre) state.editGenres = omdb.Genre.split(',').map(g=>g.trim()).filter(Boolean);
      if(omdb.Actors && omdb.Actors!=='N/A') state.editActors = omdb.Actors.split(',').map(a=>a.trim()).filter(Boolean);
      renderEditModal(state.editingId?getItem(state.editingId):null);
    }

    // Fill in anything TMDB left blank (or wasn't available at all) using OMDb's data,
    // and prefer OMDb's IMDb rating since that's the number most people recognize.
    const setIfEmpty = (id, val)=>{ const el=document.getElementById(id); if(el && !el.value && val && val!=='N/A') el.value = val; };
    setIfEmpty('f_title', omdb.Title);
    setIfEmpty('f_year', (omdb.Year||'').split('–')[0].split('-')[0]);
    setIfEmpty('f_poster', omdb.Poster);
    setIfEmpty('f_desc', omdb.Plot);
    setIfEmpty('f_runtime', omdb.Runtime);
    if(omdb.imdbRating && omdb.imdbRating!=='N/A'){ const r=document.getElementById('f_rating'); if(r) r.value = omdb.imdbRating; }

    state.editImdbMeta = {
      imdbId,
      tmdbId: info ? info.tmdbId : null,
      trailerKey: info ? info.trailerKey : '',
      trailerChecked: !!(info && info.trailerKey),
    };

    const seasonNote = (info && info.seasonCount) ? ` — ${info.seasonCount} season(s), ${info.episodeCount} episode(s)` : '';
    const tmdbNote = tmdbMatch ? '' : ' (no TMDB match — used OMDb data only, so no backdrop/logo/trailer)';
    toast(`Imported from IMDb${seasonNote}${tmdbNote}. Now add your stream source(s) below.`);
  }catch(e){
    toast('Import failed: ' + (e.message || 'check your API keys and the IMDb URL'));
  }finally{
    setBtnState('Import', false);
  }
}

/* =========================================================
   PLAYER
========================================================= */
const VIDSRC_DOMAINS = ['vidsrc-embed.ru','vidsrc-embed.su','vidsrcme.su','vsrc.su'];
const VIDSRC_MATCH = /vidsrc[-a-z]*\.(ru|su|to|me|pro|cc|xyz|net|in|vip)|vsrc\.su/i;

function detectEmbed(url){
  url = url.trim();
  let m;
  if((m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/live\/)([\w-]{6,})/))){
    return {kind:'iframe', src:`https://www.youtube.com/embed/${m[1]}?autoplay=1`};
  }
  // Live stream tied to a channel ID rather than a video ID (e.g. youtube.com/channel/UC.../live)
  if((m = url.match(/youtube\.com\/channel\/([\w-]+)\/live/))){
    return {kind:'iframe', src:`https://www.youtube.com/embed/live_stream?channel=${m[1]}&autoplay=1`};
  }
  if((m = url.match(/dailymotion\.com\/video\/([\w]+)/))){
    return {kind:'iframe', src:`https://www.dailymotion.com/embed/video/${m[1]}`};
  }
  // VidSrc family — always rewritten onto the configured mirror domain
  if(VIDSRC_MATCH.test(url)){
    return {kind:'iframe', src: normalizeVidsrc(url), isVidsrc:true};
  }
  if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)){
    return {kind:'video', src:url};
  }
  if(/\.m3u8(\?|$)/i.test(url)){
    return {kind:'hls', src:url};
  }
  return {kind:'iframe', src:url};
}

function normalizeVidsrc(url){
  const domain = VIDSRC_DOMAINS.includes(state.settings.vidsrcDomain) ? state.settings.vidsrcDomain : VIDSRC_DOMAINS[0];
  let m;
  // Preserve existing query string (skin, color, title, autoplay, etc.) after rewriting path/host
  const qIdx = url.indexOf('?');
  const existingQuery = qIdx !== -1 ? url.slice(qIdx + 1) : '';
  const urlNoQuery = qIdx !== -1 ? url.slice(0, qIdx) : url;
  function appendQuery(base){
    return existingQuery ? `${base}?${existingQuery}` : base;
  }
  // imdb/tmdb query-style embed links: keep params, just swap the host
  if((m = url.match(/[?&](imdb|tmdb)=([\w]+)/i))){
    const rest = urlNoQuery.split(/\/\/[^/]+/)[1] || '';
    return appendQuery(`https://${domain}${rest}`);
  }
  // /embed/movie/{id} or /movie/{id}
  if((m = urlNoQuery.match(/\/(?:embed\/)?movie\/([\w]+)/i))){
    return appendQuery(`https://${domain}/embed/movie/${m[1]}`);
  }
  // /embed/tv/{id}/{season}/{episode} or /tv/{id}/{season}/{episode}
  if((m = urlNoQuery.match(/\/(?:embed\/)?tv\/([\w]+)\/(\d+)\/(\d+)/i))){
    return appendQuery(`https://${domain}/embed/tv/${m[1]}/${m[2]}/${m[3]}`);
  }
  // /embed/tv/{id} or /tv/{id}
  if((m = urlNoQuery.match(/\/(?:embed\/)?tv\/([\w]+)/i))){
    return appendQuery(`https://${domain}/embed/tv/${m[1]}`);
  }
  // Unrecognized path shape — just swap the host, keep everything (path + query)
  const rest = url.split(/\/\/[^/]+/)[1] || '';
  return `https://${domain}${rest}`;
}

function getNextEpisode(item, seasonNum, epNum){
  if(item.type!=='series' || seasonNum==null) return null;
  const seasons = (item.seasons||[]).slice().sort((a,b)=>a.number-b.number);
  const si = seasons.findIndex(s=>s.number===seasonNum);
  if(si===-1) return null;
  const eps = (seasons[si].episodes||[]).slice().sort((a,b)=>a.number-b.number);
  const ei = eps.findIndex(e=>e.number===epNum);
  if(ei>-1 && ei+1<eps.length){
    return {seasonNum:seasons[si].number, ep:eps[ei+1]};
  }
  if(si+1<seasons.length){
    const nextEps = (seasons[si+1].episodes||[]).slice().sort((a,b)=>a.number-b.number);
    if(nextEps.length) return {seasonNum:seasons[si+1].number, ep:nextEps[0]};
  }
  return null;
}
function playNextEpisode(){
  const p = state.player;
  if(!p) return;
  const item = getItem(p.itemId);
  const next = getNextEpisode(item, p.seasonNum, p.epNum);
  if(!next){ toast('No more episodes'); return; }
  cleanupPlayerTimers();
  openPlayer(item, next.seasonNum, next.ep.number, next.ep.sources||[]);
}

function openPlayer(item, seasonNum, epNum, sources){
  sources = sources || [];
  if(!sources.length){ toast('No sources available'); return; }
  if(seasonNum!=null && item.type==='series' && !item.watchlist){
    item.watchlist = true;
    toast('Added to Watchlist — tracking your progress');
  }
  // cleanupPlayerTimers() reads the *current* state.player (about to be replaced below) — safe to
  // call even if none is active yet (it no-ops). playNextEpisode/tryNextSource/closePlayer already
  // call this before swapping state.player; doing it here too means it's guaranteed for every path
  // that opens a player (e.g. clicking a different episode card directly), so a previous title's
  // watch timer can never keep running against an object nothing on screen points to anymore.
  cleanupPlayerTimers();
  state.player = {
    itemId: item.id, seasonNum, epNum, sources, sourceIdx:0,
    key: seasonNum!=null ? 's'+seasonNum+'e'+epNum : 'movie',
    subtitle: seasonNum!=null ? `Season ${seasonNum} · Episode ${epNum}` : (item.year||''),
    playbackState: 'loading',
  };
  item.lastWatched = new Date().toISOString();
  saveLib();
  renderPlayer();
  document.getElementById('playerOverlay').classList.add('open');
}
function playChannel(id){
  const ch = getChannel(id);
  if(!ch || !ch.sources || !ch.sources.length){ toast('No stream sources available'); return; }
  state.player = {
    isLive:true, channelId:id, sources:ch.sources, sourceIdx:0,
    subtitle: ch.category || 'General',
    title: ch.name,
  };
  renderPlayer();
  document.getElementById('playerOverlay').classList.add('open');
}
function renderPlayer(){
  const p = state.player;
  const isLive = !!p.isLive;
  const item = isLive ? null : getItem(p.itemId);
  const titleText = isLive ? p.title : item.title;
  const src = p.sources[p.sourceIdx];
  const embed = detectEmbed(src.url);
  const overlay = document.getElementById('playerOverlay');
  const next = isLive ? null : getNextEpisode(item, p.seasonNum, p.epNum);

  let stageHtml = '';
  // For iframe embeds, inject saved resume timestamp into the URL as ?resumeAt=SECONDS (or
  // &resumeAt=SECONDS). vaplayer.ru honours this parameter and seeks to it on load — so when
  // autoplay=1 is set and the player can't show its own "resume?" dialog, we do the seek ourselves
  // by baking the timestamp directly into the src before the iframe is created.
  // buildResumeEmbedUrl() is the same helper the fake-pause/resume flow (PLAYBACK MANAGER, below)
  // uses to rebuild the iframe src when the user hits Resume — this is just its first use, on open.
  let iframeSrc = embed.src;
  let resumeAtOpen = 0;
  if(embed.kind === 'iframe' && !isLive){
    // Base URL (no t= param) — kept on state.player so the fake-pause/resume cycle can always
    // rebuild a clean src from the *original* embed link, never stacking timestamps on top of
    // each other across multiple pause/resume cycles.
    p._embedBaseUrl = embed.src;
    const savedForResume = (item && item.progress && item.progress[p.key]);
    resumeAtOpen = savedForResume && !savedForResume.watched ? Math.floor(savedForResume.timestamp) : 0;
    iframeSrc = buildResumeEmbedUrl(embed.src, resumeAtOpen);
    console.debug('[StreamVault] iframe src ->', iframeSrc); // verify in DevTools: no resumeAt param should ever appear here for a seek-to-0
  }
  // Fresh mount (open / next episode / retry source) always starts in the real "playing" state —
  // any previous fake-pause cover or in-flight rebuild lock no longer applies to whatever is being
  // rendered now (renderPlayer replaces the whole overlay, so nothing from before still exists to
  // finish rebuilding).
  p.fakePaused = false;
  p._playbackBusy = false;
  p._elapsedSeconds = resumeAtOpen;
  p._embedKind = embed.kind;
  // Needed up front (not just later, inside startIframeWatchTimer) so the bottom-bar progress
  // track below has a real duration to size itself against on the very first paint.
  if(embed.kind==='iframe' && !isLive) p._totalSeconds = getPlaybackDurationSeconds(item, p.seasonNum, p.epNum);

let hlsJsLoadPromise = null;
function loadHlsJs(){
  if(window.Hls) return Promise.resolve(window.Hls);
  if(hlsJsLoadPromise) return hlsJsLoadPromise;
  hlsJsLoadPromise = new Promise((resolve, reject)=>{
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js';
    script.onload = ()=> resolve(window.Hls);
    script.onerror = ()=> reject(new Error('Failed to load HLS.js'));
    document.head.appendChild(script);
  });
  return hlsJsLoadPromise;
}
async function initHlsPlayer(src, hideSpinner){
  const vid = document.getElementById('playerVideoEl');
  if(!vid) return;
  // Safari (and some mobile browsers) can play HLS natively — no library needed.
  if(vid.canPlayType('application/vnd.apple.mpegurl')){
    vid.src = src;
    return;
  }
  try{
    const Hls = await loadHlsJs();
    if(!Hls || !Hls.isSupported()){
      toast('HLS playback is not supported in this browser');
      hideSpinner && hideSpinner();
      return;
    }
    const hls = new Hls({ maxBufferLength: 30, enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ hideSpinner && hideSpinner(); vid.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (evt, data)=>{
      if(!data.fatal) return;
      if(data.type===Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
      else if(data.type===Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
      else{
        hideSpinner && hideSpinner();
        if(state.player && state.player.sources.length>1){ toast('Stream failed — trying the next source'); tryNextSource(); }
        else toast('Stream failed to load');
        hls.destroy();
      }
    });
    if(state.player) state.player._hls = hls;
  }catch(e){
    toast('Failed to load the HLS player');
    hideSpinner && hideSpinner();
  }
}

// page never receives the click at all. There is intentionally no button or setting to turn this
// off; it's simply always present for the lifetime of an iframe-based player.

// DOWN to the actual click target, before that target's own bubble-phase handlers (the click shield's
// revealCenterSkipButtons, the hide overlay's own content, a native <video> element, etc.) ever see
// the event — so on a genuine double-tap this stops the event right here and none of those other
// handlers fire at all. It is bound once per stage element (stage._hideGestureBound guards against
// rebinding on the fullscreen/shield-reassert paths, which don't recreate the stage) and, crucially,
// is never touched by .controls-locked — that CSS only hides specific buttons/panels, it has no
