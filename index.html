<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Stream Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@700;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090d;
  --surface:#0f1117;
  --surface2:#161923;
  --primary:#0D4A4A;
  --highlight:#3ddbd9;
  --highlight-dim:rgba(61,219,217,.16);
  --text:#e8f0ef;
  --muted:#5a7a78;
  --display-font:'Inter Tight','Inter',system-ui,sans-serif;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
/* Android Chrome recalculates its own "boosted" zoom level for the page whenever content height
   changes a lot — going from the short home page into the much taller movie/TV detail page is
   exactly that kind of jump. That recalculation is what makes position:fixed elements like
   .bottom-nav (and the Home button inside it) suddenly render larger/"zoomed" right after the
   route changes, even though no CSS on this page actually scales them up. Turning off the
   automatic adjustment stops Chrome from ever re-zooming the layout on its own. */
html{-webkit-text-size-adjust:100%; text-size-adjust:100%; touch-action:pan-x pan-y;}
body{
  background:
    radial-gradient(1100px 620px at 12% -8%, rgba(13,74,74,.35), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(61,219,217,.05), transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  font-feature-settings:'ss01' 1, 'cv05' 1;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img{-webkit-user-drag:none;user-select:none;}
button{font-family:inherit; cursor:pointer; border:none; outline:none; background:none; color:inherit;}
input,select,textarea{font-family:inherit; color:var(--text); outline:none; direction:ltr; text-align:left;}
a{color:inherit; text-decoration:none;}
::-webkit-scrollbar{height:8px; width:8px;}
::-webkit-scrollbar-thumb{background:#1d2230; border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
:focus-visible{outline:2px solid var(--highlight); outline-offset:2px;}

/* ---------- Layout shell ---------- */
#app{display:flex; min-height:100vh;}

.sidebar{
  width:230px; flex-shrink:0; background:var(--surface);
  border-right:1px solid #1a1d26; padding:26px 16px;
  display:flex; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh;
}
.brand{
  display:flex; align-items:center; gap:11px; padding:2px 8px 24px 8px; margin-bottom:12px;
  border-bottom:1px solid #1a1d26;
}
.brand .mark{
  width:34px; height:34px; border-radius:9px;
  background:linear-gradient(135deg,var(--highlight),var(--primary) 78%);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; color:#04211f; font-size:15px; font-family:var(--display-font);
  box-shadow:0 4px 16px rgba(61,219,217,.28);
}
.brand span{font-weight:800; font-size:17px; letter-spacing:.1px; font-family:var(--display-font);}

.nav-item{
  display:flex; align-items:center; gap:12px;
  padding:11px 13px; border-radius:9px; color:var(--muted); position:relative;
  font-size:13.5px; font-weight:600; transition:background var(--transition), color var(--transition);
}
.nav-item svg{width:18px; height:18px; flex-shrink:0; transition:transform var(--transition);}
.nav-item:hover{background:#161923; color:var(--text);}
.nav-item:hover svg{transform:translateY(-1px);}
.nav-item.active{background:linear-gradient(90deg, var(--highlight-dim), transparent); color:var(--highlight); font-weight:700;}
.nav-item.active::before{
  content:''; position:absolute; left:-16px; top:50%; transform:translateY(-50%);
  width:3px; height:18px; border-radius:0 3px 3px 0; background:var(--highlight);
}

.main{flex:1; min-width:0; padding-bottom:60px;}
.topbar{
  position:sticky; top:0; z-index:20; backdrop-filter:blur(16px) saturate(140%);
  background:rgba(8,9,13,.68); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; gap:16px;
  border-bottom:1px solid #14161f; transition:box-shadow var(--transition);
}
.topbar.scrolled{box-shadow:0 8px 24px rgba(0,0,0,.35);}
.topbar h1{font-size:23px; font-weight:800; letter-spacing:.1px; font-family:var(--display-font);}
.topbar-actions{display:flex; gap:10px; align-items:center;}

.btn{
  padding:10px 18px; border-radius:8px; font-weight:700; font-size:13.5px;
  transition:transform var(--transition), background var(--transition), opacity var(--transition), box-shadow var(--transition);
  display:inline-flex; align-items:center; gap:8px; white-space:nowrap;
}
.btn svg{width:15px; height:15px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(135deg, var(--highlight), #2bc4c1); color:#04211f; box-shadow:0 4px 18px rgba(61,219,217,.22);}
.btn-primary:hover{box-shadow:0 6px 22px rgba(61,219,217,.36); transform:translateY(-1px);}
.btn-icon-only{width:38px; height:38px; padding:0; border-radius:8px; flex-shrink:0; justify-content:center;}
.btn-icon-only svg{width:17px; height:17px;}
.btn-ghost{background:#161923; color:var(--text); border:1px solid #232837;}
.btn-ghost:hover{background:#1c2130; border-color:#2c3244;}
.btn-danger{background:#3a1218; color:#ff8b93; border:1px solid #4d1a20;}
.btn-danger:hover{background:#481318;}
.btn-icon{width:38px; height:38px; border-radius:8px; background:#161923; display:flex; align-items:center; justify-content:center; border:1px solid #232837; transition:background var(--transition), border-color var(--transition), transform var(--transition);}
.btn-icon:hover{background:#1c2130; border-color:#2c3244; transform:translateY(-1px);}
.btn-icon.is-active{background:var(--highlight-dim); border-color:rgba(61,219,217,.4); color:var(--highlight);}
.btn-icon.is-fav{background:rgba(255,107,129,.12); border-color:rgba(255,107,129,.4); color:#ff6b81;}
.btn-icon svg{width:16px; height:16px;}
.btn-icon.notif-bell-btn{position:relative;}
/* Watchlist/Favorite on the detail page: the most-used of the six action-row icon buttons, so they
   carry a short text label at normal breakpoints instead of relying on title-attribute hover text,
   which reads to nobody on touch/TV. Collapses back to a plain icon square under ~860px to keep the
   row from wrapping awkwardly on narrow layouts. */
.btn-icon-label{width:auto; padding:0 14px 0 12px; gap:7px;}
.btn-icon-label-text{font-size:13px; font-weight:700; white-space:nowrap;}
@media (max-width:860px){
  .btn-icon-label{width:38px; padding:0;}
  .btn-icon-label-text{display:none;}
}
/* Detail-page "more actions" dropdown — replaces the old lone Mark-as-Watched icon (movies) and the
   separate Watchlist/Favorite/Collection icon row (both types) with a single chevron trigger next to
   Trailer. Only one detail page is ever on screen at a time, so #detailActionDropdown is a singleton
   like #subtitlePanel/#notificationsPanel elsewhere in this app. */
.detail-action-menu{position:relative; display:inline-flex;}
.detail-action-dropdown{
  position:absolute; top:calc(100% + 8px); right:0; min-width:212px; background:var(--surface);
  border:1px solid #232837; border-radius:12px; box-shadow:0 20px 50px rgba(0,0,0,.5); padding:6px;
  z-index:20; opacity:0; transform:translateY(-6px) scale(.97); transform-origin:top right; pointer-events:none;
  transition:opacity .18s ease, transform .18s ease;
}
.detail-action-dropdown.open{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
.detail-action-dropdown button{
  display:flex; align-items:center; gap:10px; width:100%; padding:10px 12px; border-radius:8px;
  background:none; border:none; color:var(--text); font-size:13.5px; font-weight:600; text-align:left;
  cursor:pointer; transition:background var(--transition); font-family:inherit;
}
.detail-action-dropdown button:hover{background:#161923;}
.detail-action-dropdown button svg{width:16px; height:16px; flex-shrink:0; color:var(--muted);}
.detail-action-dropdown button[data-fav-id].is-fav svg{color:#ff6b81;}
@media (max-width:480px){ .detail-action-dropdown{right:auto; left:0; transform-origin:top left;} }
.notif-badge{
  position:absolute; top:-4px; right:-4px; min-width:16px; height:16px; padding:0 3px; border-radius:8px;
  background:#ff6b81; color:#1a0508; font-size:9.5px; font-weight:800; line-height:16px; text-align:center;
  box-shadow:0 0 0 2px var(--surface);
  animation:notifBadgePulse 2.4s ease-in-out infinite;
}
@keyframes notifBadgePulse{
  0%,100%{box-shadow:0 0 0 2px var(--surface), 0 0 0 0 rgba(255,107,129,.55);}
  50%{box-shadow:0 0 0 2px var(--surface), 0 0 0 5px rgba(255,107,129,0);}
}

.topbar-search{
  display:flex; align-items:center; background:#12141c; border:1px solid #232837; border-radius:20px;
  transition:border-color var(--transition), background var(--transition);
}
.topbar-search-icon{
  width:38px; height:38px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--muted);
  transition:color var(--transition);
}
.topbar-search-icon svg{width:16px; height:16px;}
.topbar-search:hover .topbar-search-icon{color:var(--text);}
.topbar-search.open{border-color:rgba(61,219,217,.4); background:#0c0e14;}
.topbar-search.open .topbar-search-icon{color:var(--highlight);}
.global-search-input{
  width:0; opacity:0; background:transparent; border:0; padding:0; font-size:13.5px; color:var(--text);
  transition:width var(--transition), opacity var(--transition), padding var(--transition);
}
.topbar-search.open .global-search-input{width:230px; opacity:1; padding:9px 14px 9px 0;}
.global-search-input::placeholder{color:var(--muted);}
.global-search-results{
  position:absolute; top:66px; right:32px; width:340px; max-height:420px; overflow-y:auto;
  background:var(--surface); border:1px solid #1e2330; border-radius:14px; box-shadow:0 24px 60px rgba(0,0,0,.5);
  z-index:60; display:none; padding:8px;
}
.global-search-results.show{display:block;}
.gsr-item{display:flex; gap:12px; align-items:center; padding:8px; border-radius:10px; cursor:pointer; transition:background var(--transition);}
.gsr-item:hover, .gsr-item.kbd-active{background:#161923;}
.gsr-poster{width:38px; height:56px; border-radius:6px; overflow:hidden; flex-shrink:0; background:var(--surface2); display:flex; align-items:center; justify-content:center;}
.gsr-poster img{width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .4s ease;}
.gsr-poster img.loaded{opacity:1;}
.gsr-poster .poster-fallback{font-size:16px;}
.gsr-poster svg{width:15px; height:15px; color:var(--muted);}
.gsr-title{font-size:13px; font-weight:700; line-height:1.3;}
.gsr-meta{font-size:11px; color:var(--muted); margin-top:3px; display:flex; align-items:center;}
.search-hl{background:none; color:var(--highlight); font-weight:800;}
.gsr-empty{padding:16px; text-align:center; color:var(--muted); font-size:13px;}
.gsr-empty-hint{display:block; margin-top:6px; font-size:11.5px; color:var(--muted); opacity:.75;}
/* ---- TMDB fallback ("not in your library yet") — desktop dropdown ---- */
.gsr-section-label{
  padding:12px 8px 6px; font-size:10.5px; font-weight:800; text-transform:uppercase; letter-spacing:.06em;
  color:var(--muted); border-top:1px solid #1a1d26; margin-top:4px;
}
.gsr-section-label:first-child{border-top:0; margin-top:0;}
.gsr-item.gsr-tmdb{border:1px dashed #2a3040; margin-bottom:2px;}
.gsr-item.gsr-tmdb:hover, .gsr-item.gsr-tmdb.kbd-active{background:var(--highlight-dim); border-color:rgba(61,219,217,.4);}
.gsr-tmdb-badge{
  display:inline-flex; align-items:center; gap:3px; margin-top:4px; padding:2px 7px 2px 5px; border-radius:6px;
  background:var(--highlight-dim); color:var(--highlight); font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.03em;
}
.gsr-tmdb-badge svg{width:10px; height:10px;}
.gsr-tmdb-skel{display:flex; gap:12px; align-items:center; padding:8px;}
.gsr-tmdb-skel .gsr-poster, .gsr-skel-line{
  background:linear-gradient(100deg,#12141c 0%,#1c1f2b 40%,#12141c 80%); background-size:220% 100%;
  animation:skeletonShimmer 1.7s ease-in-out infinite;
}
.gsr-skel-line{height:10px; border-radius:4px; margin-top:6px;}
.gsr-skel-line.w1{width:70%;} .gsr-skel-line.w2{width:45%; margin-top:8px;}
@media (max-width:860px){
  .global-search-results{right:16px; left:16px; width:auto;}
  .topbar-search.open .global-search-input{width:130px;}
}

/* ---------- Mobile full-screen search (IMDb-style) ---------- */
.mobile-search-overlay{
  position:fixed; inset:0; z-index:300; background:var(--bg);
  display:none; flex-direction:column; opacity:0; transition:opacity .18s ease;
}
.mobile-search-overlay.show{display:flex; opacity:1;}
.msearch-header{
  display:flex; align-items:center; gap:12px; padding:14px 16px;
  border-bottom:1px solid #14161f; flex-shrink:0;
}
.msearch-input-wrap{
  flex:1; display:flex; align-items:center; gap:10px; background:#12141c; border:1px solid #232837;
  border-radius:22px; padding:10px 16px; min-width:0;
}
.msearch-input-wrap svg{width:17px; height:17px; color:var(--muted); flex-shrink:0;}
.msearch-input{
  flex:1; min-width:0; background:transparent; border:0; font-size:15px; color:var(--text); font-family:inherit;
}
.msearch-input::placeholder{color:var(--muted);}
.msearch-clear{
  flex-shrink:0; width:20px; height:20px; border-radius:50%; background:#2c3244; color:var(--text);
  display:flex; align-items:center; justify-content:center;
}
.msearch-clear svg{width:11px; height:11px;}
.msearch-cancel{
  flex-shrink:0; background:none; border:0; color:var(--highlight); font-size:14.5px; font-weight:700;
  font-family:inherit; padding:4px 2px;
}
.msearch-tabs{
  display:flex; border-bottom:1px solid #14161f; flex-shrink:0; padding:0 16px;
}
.msearch-tab{
  flex:1; text-align:center; padding:13px 8px 12px; background:none; border:0; font-family:inherit;
  font-size:14.5px; font-weight:700; color:var(--muted); position:relative; transition:color var(--transition);
}
.msearch-tab.active{color:var(--text);}
.msearch-tab.active::after{
  content:''; position:absolute; left:0; right:0; bottom:-1px; height:2.5px; background:var(--highlight); border-radius:2px 2px 0 0;
}
.msearch-body{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
.msearch-recent-header{
  display:flex; align-items:center; justify-content:space-between; padding:16px 16px 8px;
  font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.3px;
}
.msearch-recent-header button{background:none; border:0; color:var(--highlight); font-family:inherit; font-size:13px; font-weight:700; text-transform:none; letter-spacing:0;}
.msearch-row{
  display:flex; align-items:center; gap:14px; padding:10px 16px; transition:background var(--transition);
}
.msearch-row:active, .msearch-row.kbd-active{background:#12141c;}
.msearch-row-poster{
  width:44px; height:64px; border-radius:6px; overflow:hidden; flex-shrink:0; background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
}
.msearch-row-poster img{width:100%; height:100%; object-fit:cover;}
.msearch-row-poster svg{width:16px; height:16px; color:var(--muted);}
.msearch-row-title{font-size:14.5px; font-weight:700; color:var(--text); line-height:1.3;}
.msearch-row-meta{font-size:12.5px; color:var(--muted); margin-top:3px;}
.msearch-empty{padding:40px 20px; text-align:center; color:var(--muted); font-size:13.5px;}
.msearch-empty-hint{display:block; margin-top:8px; font-size:12.5px; opacity:.75;}
/* ---- TMDB fallback ("not in your library yet") — mobile full-screen search ---- */
.msearch-section-label{
  padding:16px 16px 8px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.3px;
  color:var(--muted); border-top:1px solid #14161f; margin-top:6px;
}
.msearch-row.msearch-tmdb{border-top:1px dashed #232837; border-bottom:1px dashed #232837; margin-top:-1px;}
.msearch-row.msearch-tmdb:active{background:var(--highlight-dim);}
.msearch-tmdb-badge{
  display:inline-flex; align-items:center; gap:3px; margin-top:5px; padding:2px 8px 2px 6px; border-radius:6px;
  background:var(--highlight-dim); color:var(--highlight); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.03em;
}
.msearch-tmdb-badge svg{width:11px; height:11px;}
.msearch-tmdb-skel{display:flex; align-items:center; gap:14px; padding:10px 16px;}
.msearch-tmdb-skel .msearch-row-poster, .msearch-skel-line{
  background:linear-gradient(100deg,#12141c 0%,#1c1f2b 40%,#12141c 80%); background-size:220% 100%;
  animation:skeletonShimmer 1.7s ease-in-out infinite;
}
.msearch-skel-line{height:11px; border-radius:4px; margin-top:8px;}
.msearch-skel-line.w1{width:65%;} .msearch-skel-line.w2{width:40%; margin-top:9px;}
.msearch-adv-section{padding:16px 16px 4px;}
.msearch-adv-label{font-size:12.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:10px;}
.msearch-adv-label small{text-transform:none; letter-spacing:0; font-weight:600; color:var(--muted); opacity:.75;}
.msearch-adv-chips{
  display:flex; flex-wrap:nowrap; gap:8px; margin-bottom:22px;
  overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:none;
  padding:0 16px; margin-left:-16px; margin-right:-16px; width:calc(100% + 32px);
}
.msearch-adv-chips::-webkit-scrollbar{display:none;}
.msearch-adv-chip{
  padding:8px 15px; border-radius:20px; background:#161923; border:1px solid #232837; color:var(--text);
  font-size:13px; font-weight:600; font-family:inherit; display:inline-flex; align-items:center; gap:6px;
  transition:background var(--transition), border-color var(--transition), color var(--transition);
  flex-shrink:0; white-space:nowrap;
}
.msearch-adv-chip svg{width:13px; height:13px; flex-shrink:0;}
.msearch-adv-chip.active{background:var(--highlight-dim); border-color:rgba(61,219,217,.4); color:var(--highlight);}
.msearch-adv-chip.fav-chip.active{background:rgba(255,107,129,.12); border-color:rgba(255,107,129,.4); color:#ff6b81;}
.msearch-adv-sort{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:24px;}
.msearch-adv-sort .select-input{flex-shrink:0; min-width:150px;}
.msearch-adv-footer{
  position:sticky; bottom:0; display:flex; gap:10px; padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg, transparent, var(--bg) 22%); border-top:1px solid #14161f; flex-shrink:0;
}
.msearch-adv-clear{
  flex:0 0 auto; padding:13px 20px; border-radius:10px; text-align:center; background:#161923; border:1px solid #232837;
  color:var(--text); font-weight:700; font-size:14px; font-family:inherit; transition:opacity var(--transition);
}
.msearch-adv-clear:disabled{opacity:.4;}
.msearch-adv-submit{
  flex:1; padding:13px; border-radius:10px; text-align:center;
  background:linear-gradient(135deg, var(--highlight), #2bc4c1); color:#04211f; font-weight:800; font-size:14px; border:0; font-family:inherit;
}
.msearch-adv-results-header{
  display:flex; align-items:center; justify-content:space-between; padding:16px 16px 8px;
  font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.3px;
}

.page{padding:0 32px; animation:fadeIn .4s cubic-bezier(.16,1,.3,1);}
@keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Hero ---------- */
.hero-carousel{
  position:relative; height:64vh; min-height:420px; max-height:600px;
  border-radius:18px; overflow:hidden; margin:20px 32px 8px 32px;
  border:1px solid rgba(61,219,217,.14); background:#0c0e13;
  box-shadow:0 0 0 1px rgba(61,219,217,.04), 0 40px 80px -20px rgba(0,0,0,.6);
  animation:fadeIn .4s cubic-bezier(.16,1,.3,1);
}
.hero-track{display:flex; height:100%; transition:transform .7s cubic-bezier(.22,1,.36,1); cursor:grab; touch-action:pan-y;}
.hero-track.dragging{transition:none; cursor:grabbing;}
.hero-slide{position:relative; flex:0 0 100%; width:100%; height:100%; display:flex; align-items:flex-end; cursor:pointer; overflow:hidden;}
/* Ken Burns drift: a slow scale-up on whichever slide is current, so a still backdrop reads as alive
   rather than static. Only .is-active gets the transform, and the transition duration (20s) is far
   longer than the ~6.5s autoplay interval, so the drift never visibly completes or resets mid-view --
   it's always subtly mid-motion. Non-active slides sit at their resting scale so nothing jumps when
   the track swaps which slide is showing. */
.hero-slide > img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.6; filter:var(--cinematic-grade); transform:scale(1); transition:transform 20s linear;}
.hero-slide.is-active > img{transform:scale(1.06);}
/* Low-opacity cyan wash bleeding in from the top-right corner -- echoes the same radial-gradient
   motif already used on the page body, so the hero reads as part of the app's ambient color rather
   than a sealed-off photo. Sits above the backdrop image but below the darkening scrim so it never
   fights text legibility. */
.hero-slide::before{
  content:''; position:absolute; inset:0; z-index:1;
  background:radial-gradient(60% 50% at 100% 0%, rgba(61,219,217,.10), transparent 70%);
  pointer-events:none;
}
/* Same darkening scrim as before, but the lighter/outer stops (away from the text, where full-black
   darkening isn't needed for legibility) are tinted toward the brand teal instead of pure black --
   the darkening itself now carries a little color rather than being purely neutral. The stops nearest
   the text stay neutral black so contrast/legibility is unaffected. */
.hero-slide::after{
  content:''; position:absolute; inset:0; z-index:1;
  background:linear-gradient(0deg, var(--bg) 2%, rgba(8,9,13,.45) 42%, rgba(13,74,74,.16) 100%),
             linear-gradient(90deg, rgba(8,9,13,.92) 0%, rgba(8,9,13,.35) 55%, rgba(13,74,74,.10) 100%);
}
/* Faint cyan-tinted glass panel behind the text block -- gives the content its own subtle surface
   instead of sitting directly on the darkened photo. Kept very low-opacity so it reads as "premium
   glass", not a colored box; rounded only on the top-right corner so it doesn't fight the carousel's
   own corner radius on the bottom-left where the text starts. */
.hero-content{position:relative; z-index:2; padding:44px; max-width:600px;}
/* Staggered entrance for the content block -- badge, then title/logo, then description, then
   buttons, each ~70ms behind the last. Only fires on .is-active (toggled in updateHeroTrack()), so it
   replays every time a slide becomes current rather than just once on first paint. opacity:0 by
   default on these elements when NOT active prevents a flash of unstyled content on slides that
   haven't been activated yet. */
.hero-slide:not(.is-active) .hero-badge,
.hero-slide:not(.is-active) .hero-content h2,
.hero-slide:not(.is-active) .hero-logo-slot,
.hero-slide:not(.is-active) .hero-content p,
.hero-slide:not(.is-active) .hero-btns{opacity:0;}
.hero-slide.is-active .hero-badge{animation:heroRise .5s cubic-bezier(.22,1,.36,1) .05s both;}
.hero-slide.is-active .hero-content h2,
.hero-slide.is-active .hero-logo-slot{animation:heroRise .5s cubic-bezier(.22,1,.36,1) .12s both;}
.hero-slide.is-active .hero-content p{animation:heroRise .5s cubic-bezier(.22,1,.36,1) .19s both;}
.hero-slide.is-active .hero-btns{animation:heroRise .5s cubic-bezier(.22,1,.36,1) .26s both;}
@keyframes heroRise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
.hero-badge{
  position:absolute; top:20px; left:20px; z-index:3;
  display:inline-flex; align-items:center; gap:6px; background:var(--highlight-dim); color:var(--highlight);
  font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  padding:5px 11px; border-radius:20px; border:1px solid rgba(61,219,217,.25);
  backdrop-filter:blur(6px);
}
@media (max-width:860px){
  .hero-badge{top:14px; left:14px;}
}
.hero-content h2{font-family:var(--display-font); font-size:44px; font-weight:900; margin-bottom:12px; line-height:1.05; letter-spacing:-.01em; text-shadow:0 4px 24px rgba(0,0,0,.5);}
/* The logo <img> only gets max-width/max-height, no intrinsic size — until it finishes loading, the
   browser doesn't know how tall it is, so nothing reserves its space. That let the badge/description/
   buttons render as if there were no logo, then the logo would pop in at full size the instant it
   loaded, shoving everything below it down — overlapping content, shifting the button row, and (since
   .hero-carousel clips overflow) sometimes pushing the bottom of the content block out of view
   entirely. .hero-logo-slot reserves the logo's full max-height up front (matched per breakpoint
   below) so that space exists from the very first paint, and bottom-aligns the image within it once it
   does load — no jump, no overlap. */
.hero-logo-slot{min-height:130px; margin-bottom:16px; display:flex; align-items:flex-end;}
/* min-width:0 and min-height:0 are essential here, not decorative: as a flex item (child of the
   flex-display .hero-logo-slot above), this <img> otherwise gets a default automatic minimum size
   equal to its own intrinsic/natural dimensions — which silently wins over max-width/max-height,
   letting the logo render at full original size (often hundreds of pixels wide) instead of shrinking
   to fit. .hero-carousel's overflow:hidden then clips that oversized image, which is what produced
   the giant, cut-off, misplaced-looking logo. Zeroing out the automatic minimum lets max-width/
   max-height actually govern the size again. */
.hero-logo{max-width:420px; max-height:130px; width:auto; height:auto; min-width:0; min-height:0; object-fit:contain; display:block; filter:drop-shadow(0 4px 24px rgba(0,0,0,.5));}
.hero-content p{color:#c7d5d3; font-size:15px; line-height:1.6; margin-bottom:22px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
.hero-btns{display:flex; gap:12px;}
.hero-btns .btn{position:relative; z-index:3;}
.hero-btns .btn-primary{padding:12px 24px; font-size:14px;}
.hero-progress{margin-top:16px; width:260px; height:4px; border-radius:3px; background:rgba(255,255,255,.12); overflow:hidden;}
.hero-progress > div{height:100%; background:linear-gradient(90deg, var(--highlight), #2bc4c1); box-shadow:0 0 10px rgba(61,219,217,.5);}
.hero-nav-btn{
  position:absolute; top:50%; transform:translateY(-50%); z-index:4; width:40px; height:40px; border-radius:50%;
  background:rgba(8,9,13,.55); border:1px solid rgba(255,255,255,.15); color:var(--text);
  display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity var(--transition), background var(--transition);
  backdrop-filter:blur(6px);
}
.hero-nav-btn svg{width:18px; height:18px;}
.hero-carousel:hover .hero-nav-btn{opacity:1;}
.hero-nav-btn:hover{background:rgba(8,9,13,.85);}
.hero-nav-prev{left:16px;}
.hero-nav-next{right:16px;}
@media (max-width:860px){
  .hero-nav-btn{display:none;}
}

/* ---------- Featured Release: ONE featured card for the most-recently-added title with curated
   banner art, cycled via dot indicators. Redesigned to match the "Featured Release Redesign v8"
   mockup: morphing cyan blob-glow + pulsing outline text behind the card, a pulsing ring-glow border
   on the card itself, an animated sparkle "New Movie/New Show" badge, an optional title logo image
   (falls back to styled text), a dot-separated meta row, and a short description line.

   ARTWORK NOTE: an earlier version of this card tried to bleed the real backdrop photo up past the
   card's top edge (masked only on the top/bottom edge) to fill the reserved typography zone. That
   heuristic is gone now — real photographic content only fades cleanly on a mask along one axis, so
   its left/right edges stayed hard vertical cuts, which read as a floating rectangle stamped over the
   glow text instead of blending into it (exactly the "backdrop is getting outside the card" problem).
   The reference mockup never bled real artwork above the card at all — both of its states keep the
   photo fully contained inside the card, with only the blurred blob-glow + outline text living above
   it. Artwork is now always clipped to the card's own rounded bounds; the "Featured Artwork Bleed"
   setting is kept (for any saved user preference) but no longer changes anything visually, since both
   states now render the same clean, fully-contained result. A per-title "Featured Cutout URL" (a real
   transparent-PNG subject cutout) still overrides this with actual custom artwork that pokes above the
   card intentionally, since that's real segmented art, not a hard photo rectangle. */
:root{ --featured-radius:14px; --featured-font:'Oswald','Inter Tight',sans-serif; --featured-top-gap:clamp(48px,7vw,90px); --cinematic-grade: contrast(1.08) saturate(1.14) brightness(.97); }
/* PERF NOTE: this used to animate the box-shadow property directly (interpolating its blur/spread
   values every frame). box-shadow is a paint property, not a compositor one like transform/opacity —
   animating it forces the browser to repaint the card's shadow on every single frame, forever, for as
   long as the Home page is mounted. That constant repaint work competes with the browser's scroll
   compositing right as this section crosses the viewport, which is what caused scrolling to feel
   noticeably less smooth specifically around the featured card. Fixed by keeping box-shadow itself
   static and instead animating the *opacity* of a glow layer (see .featured-card::after below) —
   opacity is compositor-only, so this now costs nothing extra during scroll. */
@keyframes featuredRingPulse{
  0%,100%{opacity:.55;}
  50%{opacity:1;}
}
@keyframes featuredShine{
  0%{transform:translateX(-160%) rotate(20deg);}
  16%{transform:translateX(240%) rotate(20deg);}
  100%{transform:translateX(240%) rotate(20deg);}
}
/* Breathing glow on the cyan panel, same 3.2s cadence as the card's own featuredRingPulse so the
   panel and the card read as one light source pulsing together rather than two unrelated effects.
   Same PERF NOTE as featuredRingPulse above — box-shadow is now static on .featured-bg-rect (below),
   only opacity animates here. */
@keyframes featuredRectPulse{
  0%,100%{opacity:.72;}
  50%{opacity:1;}
}
/* Very slow side-to-side drift — a few px each way — applied separately to line 1 and line 5 (the
   two actually-visible big lines; lines 2-4 stay hidden) in inverse phase, so the two lines drift
   apart and back together rather than moving as one static block. Same duration/easing keeps them
   perfectly mirrored. */
@keyframes featuredLine1Drift{
  0%,100%{transform:translateX(-6px);}
  50%{transform:translateX(6px);}
}
@keyframes featuredLine2Drift{
  0%,100%{transform:translateY(-3px) translateX(6px);}
  50%{transform:translateY(-3px) translateX(-6px);}
}

.featured-row{position:relative; padding:var(--featured-top-gap) 0 40px; margin-top:0;}
/* Giant outline "New Movie / New Show" watermark, repeated 5x (the original + 4 duplicates) in a
   single vertical stack that sits fully BEHIND the card (z-index:0, same as before, vs. the card's
   z-index:1) — never in normal document flow, never pushing the card down. All five copies share one
   flex `gap`, so the spacing between the original and the first duplicate is identical to the spacing
   between every other pair in the stack. The whole stack is clipped to the row's own bounds so nothing
   spills out past the top/bottom of the featured section. Only the original (.featured-bg-text) keeps
   the radial-gradient mask fade; the duplicates (.featured-bg-text-dup) render at full, unfaded
   opacity. */
/* Blue panel behind the poster (z-index:0, same layer as the watermark stack, below the card's
   z-index:1), sized/positioned via JS (positionFeaturedBgRect) to run from 2px below line 1 to 2px
   above line 5, spanning the row's full width edge-to-edge. Comes before .featured-bg-text-stack in the
   DOM so the repeated watermark text still renders on top of it. */
.featured-bg-rect{
  position:absolute; left:0; right:0; z-index:0; background:#3ddbd9; pointer-events:none;
  overflow:hidden; box-shadow:0 0 62px 12px rgba(61,219,217,.32); animation:featuredRectPulse 3.2s ease-in-out infinite;
}
.featured-bg-rect::after{
  content:''; position:absolute; top:-40%; left:-60%; width:35%; height:180%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.55), transparent);
  animation:featuredShine 7s ease-in-out infinite; animation-delay:1.5s; pointer-events:none;
}
.featured-bg-text-stack{
  position:absolute; left:0; right:0; top:0; bottom:0; z-index:0; display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start; gap:0; pointer-events:none; overflow:hidden;
}
.featured-bg-text{
  position:relative; flex-shrink:0; width:100%; height:calc(var(--featured-top-gap) + 40px);
  display:flex; align-items:flex-end; justify-content:center; overflow:hidden; padding:0 12px;
  -webkit-mask-image:radial-gradient(ellipse 62% 88% at 50% 68%, #000 40%, rgba(0,0,0,.45) 68%, transparent 100%);
  mask-image:radial-gradient(ellipse 62% 88% at 50% 68%, #000 40%, rgba(0,0,0,.45) 68%, transparent 100%);
  animation:featuredLine1Drift 14s ease-in-out infinite;
}
.featured-bg-text-dup{
  position:relative; flex-shrink:0; width:100%; display:flex; align-items:center; justify-content:center;
  overflow:hidden; padding:0 12px; margin-top:-0.62em;
}
/* Mirrors the original's fade (which is anchored low, at 50% 68%, so it's solid near its top and
   fades toward its bottom/edges) — this one is anchored high, at 50% 32%, so it's solid near its
   bottom and fades toward its top/edges instead. Bookends the stack with matching-but-opposite fades
   on the first and last lines. */
.featured-bg-text-dup--last{
  -webkit-mask-image:radial-gradient(ellipse 62% 88% at 50% 32%, #000 40%, rgba(0,0,0,.45) 68%, transparent 100%);
  mask-image:radial-gradient(ellipse 62% 88% at 50% 32%, #000 40%, rgba(0,0,0,.45) 68%, transparent 100%);
  transform:translateY(-3px);
  animation:featuredLine2Drift 14s ease-in-out infinite;
}
/* Keeps the exact same box height/position in the stack (so line 1 and line 5 don't shift) while
   rendering no visible text — used to "remove" lines 2/3/4 without disturbing layout. */
.featured-bg-text-dup--hidden span{ visibility:hidden; }
.featured-bg-text span, .featured-bg-text-dup span{
  position:relative; font-family:var(--featured-font); font-weight:700; text-transform:uppercase;
  font-size:clamp(80px, 18vw, 260px); letter-spacing:.02em; line-height:1;
  color:transparent; -webkit-text-stroke:2px rgba(61,219,217,.85); text-stroke:2px rgba(61,219,217,.85);
  white-space:nowrap;
}
@media (max-width:860px){
  .featured-bg-text-stack{gap:0;}
  .featured-bg-text span, .featured-bg-text-dup span{font-size:clamp(48px, 19vw, 120px); letter-spacing:.01em;}
}
/* Outer wrapper is deliberately NOT clipped (overflow:visible) so the artwork can bleed above the
   card's top edge. .featured-card-inner below is the piece that actually gets the rounded corners
   and clips the scrim/UI to the card's real bounds. */
.featured-card{
  position:relative; z-index:1; max-width:1040px; margin:0 auto; aspect-ratio:16/9;
  overflow:visible; cursor:pointer; isolation:isolate; border-radius:var(--featured-radius);
  box-shadow:0 24px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(61,219,217,.35), 0 0 38px rgba(61,219,217,.18);
  animation:featuredCardReveal 550ms cubic-bezier(.22,1,.36,1) forwards;
}
/* Glow ring lives on its own layer so its "breathing" can animate via opacity (compositor-only —
   see the PERF NOTE on featuredRingPulse near the top of this stylesheet) instead of animating
   .featured-card's own box-shadow directly, which used to force a full repaint of the card every
   frame, forever, and was the main cause of scroll feeling less smooth around the featured card. */
.featured-card::before{
  content:''; position:absolute; inset:0; z-index:3; border-radius:inherit; pointer-events:none;
  box-shadow:0 0 0 1px rgba(61,219,217,.42), 0 0 46px rgba(61,219,217,.22);
  animation:featuredRingPulse 3.2s ease-in-out infinite;
}
/* Simple fade+rise entrance (no 3D) when a new featured item mounts, then JS swaps this out for a
   slow continuous float once it finishes (see the 'animationend' listener near CARD_HOVER_CAPABLE) so
   the card just gently bobs up and down forever afterward instead of sitting completely still. */
@keyframes featuredCardReveal{
  0%{opacity:0; transform:translateY(34px) scale(.97);}
  100%{opacity:1; transform:translateY(0) scale(1);}
}
@keyframes featuredCardFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-9px);}
}
.featured-art{position:absolute; inset:0; z-index:0;}
.featured-art-layer{position:absolute; inset:0; opacity:0; transition:opacity 900ms cubic-bezier(.4,0,.2,1);}
.featured-art-layer.active{opacity:1;}
/* The single continuous image, contained (not zoomed past what cover requires) so the backdrop's
   full composition survives. object-position is biased only slightly toward the top of the source
   frame — just enough that a vertical crop favors heads/shoulders over empty sky/set — without the
   aggressive crop a portrait-shaped container used to force. Always clipped to the card's own rounded
   bounds — see the ARTWORK NOTE above for why this no longer bleeds past the card's top edge. */
.featured-art-img{
  width:100%; height:100%; object-fit:cover; object-position:center 22%; display:block;
  clip-path:inset(0 round var(--featured-radius));
  filter:var(--cinematic-grade) drop-shadow(0 16px 26px rgba(0,0,0,.45));
}
/* Custom cutout: a transparent PNG (subject only, no background) supplied per-title in the Add/Edit
   Title form (Featured Cutout URL). Anchored to the card's bottom-center and sized taller than the
   card so the top of it (head/shoulders) pokes above the card into the giant-typography zone — real
   artwork standing in for the old heuristic backdrop-crop escape. One <img>, never duplicated. Sits
   above the scrim (so the subject itself doesn't get dimmed) but below the text/button content. */
.featured-cutout{
  position:absolute; left:50%; bottom:0; transform:translateX(-50%); height:128%; max-width:56%;
  z-index:1; display:flex; align-items:flex-end; justify-content:center; pointer-events:none;
}
.featured-cutout img{
  height:100%; width:auto; max-width:100%; object-fit:contain; display:block; pointer-events:auto;
  filter:drop-shadow(0 18px 34px rgba(0,0,0,.55));
  animation:featuredCutoutReveal 500ms cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes featuredCutoutReveal{
  0%{opacity:0; transform:translateY(30px) scale(.95);}
  100%{opacity:1; transform:translateY(0) scale(1);}
}
.featured-card-inner{
  position:absolute; inset:0; z-index:1; border-radius:var(--featured-radius); overflow:hidden;
  pointer-events:none;
}
.featured-scrim{
  position:absolute; inset:0; z-index:1;
  background:linear-gradient(90deg, rgba(3,4,7,.92) 0%, rgba(3,4,7,.55) 45%, transparent 78%),
             linear-gradient(0deg, rgba(3,4,7,.5) 0%, transparent 40%);
  pointer-events:none;
}
/* Bounded width keeps title/meta/buttons hugging the lower-left corner like a Netflix/Apple TV hero
   card, instead of stretching edge-to-edge across the whole card. max-height + overflow:hidden is a
   hard backstop: no matter how tall a title's logo/description/meta happen to render, this block can
   never grow past ~72% of the card's height and collide with the badge pinned near the top. */
.featured-content{
  position:absolute; left:0; right:0; bottom:0; z-index:2; padding:20px 24px 22px; max-width:62%;
  max-height:72%; overflow:hidden;
  pointer-events:auto; transition:opacity 380ms ease, transform 380ms ease;
}
.featured-logo{max-width:260px; max-height:60px; width:auto; height:auto; object-fit:contain; display:block; margin-bottom:12px; filter:drop-shadow(0 2px 10px rgba(0,0,0,.5));}
.featured-title{
  font-family:var(--featured-font); font-size:clamp(24px, 3.6vw, 36px); font-weight:700;
  text-transform:uppercase; letter-spacing:.01em; margin-bottom:12px; line-height:1.05;
  text-shadow:0 2px 14px rgba(0,0,0,.6);
}
.featured-meta{display:flex; align-items:center; flex-wrap:wrap; gap:8px; font-size:12px; color:#c9cbd1; margin-bottom:12px;}
.featured-meta .dot{color:var(--highlight);}
.featured-desc{
  font-size:12.5px; line-height:1.5; color:#a9adb3; margin:0 0 16px; max-width:300px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.featured-actions{display:flex; gap:10px; align-items:center;}
.featured-actions .btn-primary{box-shadow:0 0 24px rgba(61,219,217,.45);}
.featured-indicators{
  position:absolute; right:22px; bottom:22px; z-index:2; display:flex; gap:6px; pointer-events:auto;
}
.featured-dot{
  width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.35);
  border:none; transition:background var(--transition), transform var(--transition); padding:0;
}
.featured-dot.active{background:var(--highlight); transform:scale(1.3); box-shadow:0 0 8px rgba(61,219,217,.7);}
@media (max-width:860px){
  .featured-row{--featured-top-gap:clamp(34px,11vw,56px); padding:var(--featured-top-gap) 0 28px;}
  /* .featured-row lives inside .page, which has its own left/right padding — so the rect's left:0/
     right:0 (set on .featured-bg-rect near the top of this file) only reaches the row's own edges,
     still inset from the actual screen edge by that padding. This "full-bleed" trick re-anchors the
     rect to the viewport itself instead of its padded parent: left:50% + translateX(-50%) centers a
     100vw-wide box on the viewport's own center, so it reaches both physical edges regardless of how
     much padding sits between .featured-row and the screen — exactly what an edge-to-edge phone
     display needs. Scoped to mobile only; desktop keeps the rect matching the row's own bounds. */
  .featured-bg-rect{left:50%; right:auto; width:100vw; transform:translateX(-50%);}
  /* Was aspect-ratio:4/5 (portrait) — the actual bug behind the "looks like a poster" complaint.
     4/3 stays unambiguously landscape while giving a little extra height for stacked mobile text. */
  .featured-card{aspect-ratio:4/3; margin:0 16px; max-width:none; --featured-radius:12px;}
  .featured-bg-text{height:calc(var(--featured-top-gap) + 22px);}
  .featured-bg-text span{font-size:clamp(48px, 19vw, 120px); letter-spacing:.01em;}
  .featured-cutout{height:122%; max-width:70%;}
  .featured-content{padding:16px 18px 18px; max-width:82%;}
  .featured-logo{max-width:180px; max-height:44px;}
  .featured-title{font-size:clamp(19px,5vw,26px);}
  .featured-desc{max-width:none; -webkit-line-clamp:2;}
  .featured-actions .btn span, .featured-actions .btn{font-size:12.5px;}
  .featured-indicators{right:16px; bottom:16px;}
}
@media (max-width:480px){
  /* Extra-small phones: drop the description and shrink the logo further so the whole stack
     (logo/title + meta + buttons) stays well clear of the badge even with a tall real-world logo
     image, rather than depending on .featured-content's overflow-hidden clip as the only backstop. */
  .featured-desc{display:none;}
  .featured-logo{max-width:150px; max-height:34px; margin-bottom:8px;}
  .featured-meta{margin-bottom:10px; font-size:11px;}
  .featured-content{padding:14px 16px 16px;}
}
@media (prefers-reduced-motion:reduce){
  .featured-art-layer, .featured-content{transition:none;}
  .featured-card{animation:none;}
  .featured-card::before{animation:none;}
  .featured-bg-rect, .featured-bg-rect::after, .featured-bg-text, .featured-bg-text-dup--last{animation:none;}
  .featured-cutout img{animation:none;}
}
body.tv-mode .featured-card{aspect-ratio:16/9;}
body.tv-mode .featured-title{font-size:clamp(28px,3.2vw,42px);}

/* ---------- Rows / Cards ---------- */
.row{margin:38px 0; text-align:left;}
/* Cheap visual rhythm break: on a page that can stack Continue Watching, Featured, New Season,
   Favorites, Because You Liked, Recently Added, several genre rows and Binge Now back to back,
   every 4th row gets a hairline + extra breathing room so the eye has a place to "reset" on a
   long scroll instead of every row reading as one continuous, undifferentiated list. */
.row:nth-of-type(4n):not(.featured-row){margin-top:54px; padding-top:30px; border-top:1px solid rgba(255,255,255,.06);}
.row-head{display:flex; align-items:center; justify-content:space-between; padding:0 32px; margin-bottom:16px; text-align:left;}
.row-head h3{font-size:18px; font-weight:800; font-family:var(--display-font); letter-spacing:.1px; position:relative; padding-left:14px; display:flex; align-items:center; gap:8px;}
.row-head h3::before{content:''; position:absolute; left:0; top:2px; bottom:2px; width:3px; border-radius:2px; background:linear-gradient(180deg, var(--highlight), var(--primary));}
.row-head-icon{
  display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; width:22px; height:22px;
  border-radius:7px; background:var(--highlight-dim); color:var(--highlight); border:1px solid rgba(61,219,217,.25);
}
.row-head-icon svg{width:12px; height:12px;}
.row-track{display:flex; justify-content:flex-start; gap:16px; overflow-x:auto; padding:8px 32px 22px 32px; scroll-behavior:smooth;}
.row-track::-webkit-scrollbar{display:none;}

.card{
  position:relative; flex:0 0 190px; width:190px; border-radius:12px; overflow:hidden;
  background:var(--surface); cursor:pointer; border:1px solid #191c26;
  transition:transform .4s cubic-bezier(.34,1.3,.44,1), box-shadow .35s ease, border-color .35s ease;
  aspect-ratio:2/3;
}
/* Desktop / mouse: lift + tilt toward cursor. Scoped to real hover devices so it can't get "stuck"
   on a phone after a tap (touch has no hover-end event to cleanly reverse it). */
@media (hover:hover) and (pointer:fine){
  .card:hover{
    transform:scale(1.07) translateY(-4px) rotateX(var(--tiltX,0deg)) rotateY(var(--tiltY,0deg));
    z-index:5; box-shadow:0 20px 44px rgba(0,0,0,.6), 0 0 0 1px rgba(61,219,217,.35); border-color:rgba(61,219,217,.35);
  }
}
/* Touch: no hover state exists, so swap the lift for an immediate press-down — the tactile
   equivalent of the desktop lift, felt at the moment of the tap instead of before it. */
@media (hover:none){
  .card:active{
    transform:scale(.96); transition:transform .15s ease;
    box-shadow:0 8px 22px rgba(0,0,0,.5), 0 0 0 1px rgba(61,219,217,.3); border-color:rgba(61,219,217,.3);
  }
}
/* Diagonal shine sweep — desktop plays it on hover, touch plays it once per tap via .tap-shine
   (toggled in JS on touchstart), so both devices get the "light catching the case" moment. */
.card-shine{
  position:absolute; inset:-50% -70%; z-index:3; pointer-events:none;
  background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.22) 50%, transparent 58%);
  transform:translateX(-130%) rotate(8deg); opacity:0;
}
@media (hover:hover) and (pointer:fine){
  .card:hover .card-shine{opacity:1; transform:translateX(130%) rotate(8deg); transition:transform .85s cubic-bezier(.22,1,.36,1), opacity .15s;}
}
.card.tap-shine .card-shine{opacity:1; transform:translateX(130%) rotate(8deg); transition:transform .6s cubic-bezier(.22,1,.36,1), opacity .1s;}
.card img{width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity .4s ease;}
.card img.loaded, .card img[data-loaded]{opacity:1;}
.card .poster-fallback{
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  font-size:44px; font-weight:900; color:var(--highlight); font-family:var(--display-font);
  background:linear-gradient(135deg,var(--primary),var(--surface));
}
.card-badge{
  position:absolute; top:9px; left:9px; background:rgba(8,9,13,.8); backdrop-filter:blur(4px);
  color:var(--highlight); font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.06em;
  padding:3px 8px; border-radius:20px; border:1px solid rgba(61,219,217,.25); z-index:2;
}
.card-new{
  position:absolute; top:9px; right:9px; background:var(--highlight); color:#04211f;
  font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.06em;
  padding:3px 8px; border-radius:20px; box-shadow:0 2px 10px rgba(61,219,217,.4); z-index:2;
}
.card-remove{
  position:absolute; top:9px; right:9px; width:24px; height:24px; border-radius:50%;
  background:rgba(8,9,13,.85); border:1px solid #2c3244; color:var(--text);
  display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity var(--transition), background var(--transition);
  /* Must be above .card-overlay (z-index:3) or its full-card inset:0 hit area silently swallows the
     click even though it looks transparent up here -- matches .card-favorite-btn's z-index:4, the
     other corner button that has to survive on top of the same overlay. */
  z-index:4;
}
.card-remove svg{width:11px; height:11px;}
.card:hover .card-remove{opacity:1;}
.card-remove:hover{background:#3a1218; border-color:#4d1a20; color:#ff8b93;}
@media (hover:none){
  /* Touch devices have no hover state, so a hover-only remove button is effectively unreachable —
     keep it visible (slightly dimmed) at all times instead of only revealing it on hover. */
  .card-remove{opacity:.85;}
}
.card-progress{position:absolute; left:0; right:0; bottom:0; height:4px; background:rgba(255,255,255,.15); z-index:2;}
.card-progress > div{height:100%; background:linear-gradient(90deg, var(--highlight), #2bc4c1);}
.card-watchlist-badge{
  position:absolute; bottom:9px; left:9px; z-index:2; width:22px; height:22px; border-radius:50%;
  background:rgba(8,9,13,.85); border:1px solid rgba(61,219,217,.45); color:var(--highlight);
  display:flex; align-items:center; justify-content:center;
}

.card-favorite-btn{

}

.card:hover .card-favorite-btn{opacity:1;}

.notifications-panel{
  position:absolute; top:66px; right:80px; width:388px; max-height:min(72vh,560px); overflow-y:auto; overflow-x:hidden;
  background:
    radial-gradient(220px 140px at 100% 0%, rgba(61,219,217,.07), transparent 60%),
    linear-gradient(180deg, #141722 0%, var(--surface) 100%);
  border:1px solid #1e2330; border-radius:16px;
  box-shadow:0 30px 70px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.02) inset;
  z-index:60; padding:8px;
  opacity:0; visibility:hidden; transform:translateY(-10px) scale(.96); transform-origin:top right;
  pointer-events:none; transition:opacity .22s cubic-bezier(.16,1,.3,1), transform .22s cubic-bezier(.16,1,.3,1), visibility .22s;
}
.notifications-panel.show{opacity:1; visibility:visible; transform:translateY(0) scale(1); pointer-events:auto;}
/* .notif-header / .notif-clear are shared with the Recent Searches dropdown (renderGlobalSearchResults)
   so they keep their original plain/uppercase styling here — the notifications panel's richer header
   below uses its own .notif-panel-* namespace instead of overloading those two. */
.notif-header{display:flex; align-items:center; justify-content:space-between; padding:8px 8px 12px 8px; font-size:12.5px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;}
.notif-clear{font-size:11.5px; font-weight:700; color:var(--highlight); text-transform:none; letter-spacing:0;}
.notif-clear:hover{text-decoration:underline;}
.notif-panel-header{
  display:flex; align-items:center; justify-content:space-between; gap:10px;

}

  font-size:10.5px; font-weight:800; line-height:19px; text-align:center;
}

.notif-panel-markread, .notif-panel-clear{

  transition:color var(--transition); display:flex; align-items:center; gap:4px;
}
.notif-panel-markread svg{width:12px; height:12px;}
.notif-panel-markread:hover{color:var(--highlight);}
.notif-panel-clear:hover{color:#ff6b81;}
.notif-empty{
  display:flex; flex-direction:column; align-items:center; gap:12px; padding:46px 22px 40px; text-align:center;
}
.notif-empty-icon{
  width:52px; height:52px; border-radius:50%; background:var(--highlight-dim); color:var(--highlight);
  display:flex; align-items:center; justify-content:center; opacity:.7;
}

  position:relative; transition:background var(--transition), transform var(--transition);

}
@keyframes notifItemIn{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }

}

  background:var(--notif-accent-dim); color:var(--notif-accent); box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;

  justify-content:center; color:var(--muted); background:#1a1d26; opacity:0; transform:scale(.85);
  transition:opacity .16s ease, transform .16s ease, background var(--transition), color var(--transition);

}
.card-trailer{position:absolute; inset:0; z-index:1; background:#000; opacity:0; animation:cardTrailerFadeIn .5s ease forwards;}
@keyframes cardTrailerFadeIn{from{opacity:0;} to{opacity:1;}}
.card-trailer iframe{width:100%; height:100%; border:0; pointer-events:none; transform:scale(1.35); transform-origin:center;}
.card-trailer-mute{
  position:absolute; bottom:9px; right:9px; width:24px; height:24px; border-radius:50%;
  background:rgba(8,9,13,.8); border:1px solid rgba(255,255,255,.2); color:#fff; display:flex; align-items:center; justify-content:center;
  pointer-events:auto; transition:background var(--transition);
  /* Same fix as .card-remove above: must clear .card-overlay's z-index:3, and this one sits right in
     the overlay's most-opaque corner (bottom-right, where its gradient is ~97% opaque), so the click
     was even more reliably swallowed than card-remove's was. .card-trailer itself intentionally stays
     BELOW the overlay (z-index:1) so the title/play button stay legibly overlaid on the video, same
     as a Netflix-style hover preview -- only the button needs to clear the overlay, not the video. */
  z-index:4;
}

.card-overlay{

  background:linear-gradient(0deg, rgba(5,6,9,.97) 8%, rgba(5,6,9,.25) 58%, transparent 100%);
  display:flex; flex-direction:column; justify-content:flex-end; padding:13px;
}

.card-play{

  display:flex; align-items:center; justify-content:center; margin-bottom:9px; transition:transform var(--transition), box-shadow var(--transition);
  box-shadow:0 4px 16px rgba(61,219,217,.4);
}

.card:hover .card-play{transform:scale(1.1);}
.card-title{font-size:12.5px; font-weight:700; line-height:1.3; margin-bottom:2px;}
.card-meta{font-size:10.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

/* ---------- Continue Watching: landscape variant ----------
   Poster cards (2:3, 190px) work for "browse and discover" rows, but for "what was I watching"
   a landscape thumbnail reads faster — it's what the title actually looked like on screen, not
   its poster art. The image lives in .card-landscape-media (its own positioned box, so the
   existing .card-badge/.card-remove/.card-progress absolute-position rules anchor to the
   thumbnail rather than the whole tile); title + next-episode meta sit underneath, always
   visible rather than hover-only, since landscape tiles don't have the vertical room for a
   convincing overlay treatment. */
.card.card-landscape{
  flex:0 0 240px; width:240px; aspect-ratio:auto; display:flex; flex-direction:column;
  background:none; border:none; border-radius:0; overflow:visible;
}
.card-landscape-media{
  position:relative; aspect-ratio:16/9; border-radius:10px; overflow:hidden;
  background:var(--surface); border:1px solid #191c26;
}
.card-landscape-media img{filter:var(--cinematic-grade);}
.card-landscape-play{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0;
  background:linear-gradient(0deg, rgba(5,6,9,.5) 0%, rgba(5,6,9,.05) 60%, transparent 100%);
  transition:opacity var(--transition);
}
.card-landscape:hover .card-landscape-play{opacity:1;}
.card-landscape-play .card-play{margin-bottom:0;}
.card-landscape-info{padding-top:9px;}
@media (max-width:860px){
  .card.card-landscape{flex:0 0 210px; width:210px;}
}

.empty-state{

}

  width:56px; height:56px; border-radius:16px; margin:0 auto 20px auto; display:flex; align-items:center; justify-content:center;
  background:var(--highlight-dim); color:var(--highlight); border:1px solid rgba(61,219,217,.25);
}

.empty-state p{margin-bottom:22px; font-size:14px; max-width:340px; margin-left:auto; margin-right:auto;}

/* ---------- Library ---------- */
.filter-bar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:20px 0 26px 0; padding:0 32px 0 0;}
.chip-btn{padding:8px 16px; border-radius:20px; background:#12141c; color:var(--muted); font-size:13px; font-weight:700; border:1px solid #232837; transition:all var(--transition);}
.chip-btn:hover{border-color:#333a4d; color:var(--text);}

  flex:1; min-width:180px; max-width:320px; background:#12141c; border:1px solid #232837; border-radius:20px;
  padding:10px 16px; font-size:13.5px; color:var(--text); transition:border-color var(--transition);
}

.search-input::placeholder{color:var(--muted);}
.select-input{background:#12141c; border:1px solid #232837; border-radius:20px; padding:9px 14px; font-size:13px; color:var(--text);}

.grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:18px; padding-bottom:20px;
}
.grid .card{width:100%; flex:none;}

/* Fixed 3-per-row layout used for Collections and Category (genre) pages — unlike .grid's
   auto-fill (which packs however many columns fit the viewport), this always wraps at 3 so
   collections read as tidy rows of posters regardless of screen width. */
.grid-3col{
  display:grid; grid-template-columns:repeat(3,1fr); gap:18px; padding-bottom:20px;
}
.grid-3col .card{width:100%; flex:none;}
.grid-3col .card.skeleton-card{
  background:linear-gradient(100deg,#12141c 0%,#1c1f2b 40%,#12141c 80%); background-size:220% 100%;
  animation:skeletonShimmer 1.7s ease-in-out infinite; cursor:default;
}
@media (max-width:640px){
  .grid-3col{gap:8px;}
}

/* ---------- Detail ---------- */
/* Shimmering placeholder shown behind the backdrop/poster while their images load (or forever, if
   they fail) — same idea as a skeleton screen, just done with a moving gradient instead of gray bars. */
@keyframes skeletonShimmer{0%{background-position:0% 0;} 100%{background-position:200% 0;}}
.detail-backdrop{
  position:relative; height:44vh; min-height:300px; border-radius:16px; overflow:hidden; margin:20px 32px;
  background:linear-gradient(100deg,#12141c 0%,#1c1f2b 40%,#12141c 80%); background-size:220% 100%;
  animation:skeletonShimmer 1.7s ease-in-out infinite;
  /* Ambient glow bled from the poster's dominant color (see extractPosterGlowColor) — box-shadow paints
     outside the element even though overflow:hidden clips the backdrop image itself, so it reads as a
     soft color wash behind the whole card, Spotify/Plex "Now Playing" style. Transparent until computed.
     --poster-glow itself is set on #pageRoot (see applyDetailPosterGlow) rather than here, so the same
     tint can cascade down to the Play button glow, season-select border, and rating-star hover below. */
  box-shadow:0 0 140px -30px var(--poster-glow, transparent), 0 0 260px -70px var(--poster-glow, transparent);
  transition:box-shadow .9s ease;
}
.detail-backdrop.bg-loaded{animation:none; background:var(--bg);}
.detail-backdrop.backdrop-fallback{animation:none; background:linear-gradient(135deg,var(--primary),var(--surface));}
.detail-backdrop img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .5s ease;}
/* Slow, barely-there zoom/pan once the backdrop image is in — "forwards" holds the zoomed-in end
   state rather than looping, so it reads as one deliberate cinematic reveal, not a constant drift. */
@keyframes kenBurnsBackdrop{
  0%{transform:scale(1) translate(0,0);}
  100%{transform:scale(1.09) translate(-1.5%,-1.5%);}
}
.detail-backdrop img.loaded{opacity:.5; animation:kenBurnsBackdrop 16s ease-out forwards;}
.detail-backdrop::after{
  content:''; position:absolute; inset:0;
  /* Multiple stops approximate an eased curve instead of a flat linear fade — a plain 2-stop
     gradient (solid at 2%, gone by 80%) reads as a visible band/edge on some backdrops. This
     ramps down gradually from solid at the very bottom (where it meets the page background)
     to fully transparent near the top of the image, so the dissolve feels continuous. */
  background:linear-gradient(0deg,
    var(--bg) 0%,
    color-mix(in srgb, var(--bg) 92%, transparent) 10%,
    color-mix(in srgb, var(--bg) 68%, transparent) 24%,
    color-mix(in srgb, var(--bg) 40%, transparent) 40%,
    color-mix(in srgb, var(--bg) 18%, transparent) 58%,
    color-mix(in srgb, var(--bg) 6%, transparent) 75%,
    transparent 92%
  );
}
.detail-body{padding:0 32px; margin-top:-150px; position:relative; z-index:2; display:flex; flex-direction:column; gap:20px; animation:fadeIn .4s cubic-bezier(.16,1,.3,1);}

.detail-tags{
