.ep-thumb .ep-num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--muted); font-size:20px;}
.ep-progress{position:absolute; left:0; right:0; bottom:0; height:3px; background:rgba(255,255,255,.15);}
.ep-progress > div{height:100%; background:var(--highlight);}
.ep-info{flex:1; min-width:0;}
.ep-info .ep-title{font-weight:700; font-size:14px; margin-bottom:3px; display:flex; align-items:center; gap:8px;}
.ep-overview{
  font-size:12px; color:#a6b8b6; line-height:1.5; margin-bottom:6px; min-height:calc(1.5em * 2);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.ep-meta-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
.ep-info .ep-sub{font-size:12px; color:var(--muted);}
.ep-mini-stars{display:flex; gap:2px;}
.ep-mini-star{width:16px; height:16px; color:var(--muted); transition:color var(--transition), transform var(--transition);}
.ep-mini-star svg{width:14px; height:14px; display:block;}
.ep-mini-star:hover{color:var(--highlight); transform:scale(1.15);}
.ep-mini-star.is-filled{color:var(--highlight);}
.ep-watch-toggle{
  width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background:#161923; border:1px solid #232837; color:var(--muted); transition:all var(--transition);
}
.ep-watch-toggle svg{width:14px; height:14px;}
.ep-watch-toggle:hover{border-color:rgba(61,219,217,.4); color:var(--highlight);}
.ep-watch-toggle.is-watched{background:var(--highlight); border-color:var(--highlight); color:#04211f;}

/* ---------- Modal / overlay ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(4,5,8,.78); backdrop-filter:blur(10px); z-index:100;
  display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity var(--transition);
  padding:20px;
}
.overlay.open{opacity:1; pointer-events:auto;}
.modal{
  background:var(--surface); border:1px solid #1e2330; border-radius:16px; width:100%; max-width:640px;
  max-height:88vh; overflow-y:auto; padding:30px; transform:translateY(16px) scale(.98); transition:transform var(--transition);
  box-shadow:0 30px 80px rgba(0,0,0,.55);
}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal.modal-video{max-width:900px; padding:0; overflow:hidden;}
.modal.modal-episode-info{
  max-width:640px; padding:0; overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.55), 0 0 90px -20px color-mix(in srgb, var(--episode-glow, var(--highlight)) 55%, transparent);
  transition:box-shadow .7s ease;
}
.episode-modal-thumb{position:relative; width:100%; aspect-ratio:16/9; background:#12141c; overflow:hidden;}
.episode-modal-thumb img{width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity .4s ease;}
.episode-modal-thumb img.loaded{opacity:1;}
.episode-modal-thumb .ep-num{width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--muted); font-size:42px;}
.episode-modal-close{position:absolute; top:12px; right:12px; background:rgba(10,11,16,.65); border-color:rgba(255,255,255,.15);}
.episode-modal-close:hover{background:rgba(10,11,16,.9);}
.episode-modal-nav{position:absolute; top:50%; transform:translateY(-50%); background:rgba(10,11,16,.55); border-color:rgba(255,255,255,.15);}
.episode-modal-nav:hover{background:rgba(10,11,16,.85);}
.episode-modal-nav-prev{left:12px;}
.episode-modal-nav-next{right:12px;}
.episode-modal-progress{position:absolute; left:0; right:0; bottom:0; height:4px; background:rgba(255,255,255,.12);}
.episode-modal-progress > div{height:100%; background:var(--episode-glow, var(--highlight));}
.episode-modal-progress.is-complete > div{opacity:.5;}
.episode-modal-body{
  padding:22px 26px 26px; position:relative;
  background:radial-gradient(120% 160% at 12% -15%, color-mix(in srgb, var(--episode-glow, var(--highlight)) 16%, transparent), transparent 60%);
}
.episode-modal-eyebrow{font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--episode-glow, var(--highlight)); margin-bottom:6px;}
.episode-modal-title{font-size:20px; font-weight:800; font-family:var(--display-font); margin-bottom:12px;}
.episode-modal-meta{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}
.episode-modal-overview{
  color:#c7d5d3; font-size:14px; line-height:1.6; margin-bottom:18px; min-height:calc(1.6em * 3);
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.episode-modal-ratings-row{display:flex; align-items:center; gap:14px; margin-bottom:12px;}
.episode-modal-stars{display:flex; align-items:center; gap:3px;}
.episode-modal-stars .ep-mini-star{width:22px; height:22px;}
.episode-modal-stars .ep-mini-star svg{width:17px; height:17px;}
.episode-modal-resume-hint{display:flex; align-items:center; gap:7px; color:var(--episode-glow, var(--highlight)); font-size:12.5px; font-weight:700; margin-bottom:14px;}
.episode-modal-resume-hint svg{width:12px; height:12px;}
.episode-modal-actions{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start;}
.episode-modal-source-list{display:flex; flex-direction:column; gap:8px; width:100%;}
.episode-modal-source-btn{justify-content:flex-start;}
@media (max-width:860px){ .modal.modal-episode-info{max-width:100%;} }
.trailer-modal-head{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 20px; border-bottom:1px solid #1a1d26;}
.trailer-modal-head h2{font-size:15.5px; font-weight:800; font-family:var(--display-font);}
/* Shimmering placeholder (same treatment as .detail-backdrop/.detail-poster) behind the trailer
   iframe until the YouTube embed actually finishes loading — otherwise there's a flash of plain black
   while the embed's own document spins up. .loaded is added by the iframe's onload handler in
   openTrailerModal. */
.trailer-frame-wrap{
  position:relative; width:100%; aspect-ratio:16/9;
  background:linear-gradient(100deg,#12141c 0%,#1c1f2b 40%,#12141c 80%); background-size:220% 100%;
  animation:skeletonShimmer 1.7s ease-in-out infinite;
}
.trailer-frame-wrap.iframe-loaded{animation:none; background:#000;}
.trailer-frame-wrap iframe{position:absolute; inset:0; width:100%; height:100%; border:0; opacity:0; transition:opacity .4s ease;}
.trailer-frame-wrap iframe.loaded{opacity:1;}
@media (max-width:860px){ .modal.modal-video{max-width:100%;} }
.modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:18px; border-bottom:1px solid #1a1d26;}
.modal-head h2{font-size:19px; font-weight:800; font-family:var(--display-font);}

.field{margin-bottom:16px;}
.field label{display:block; font-size:11.5px; font-weight:700; color:var(--muted); margin-bottom:7px; text-transform:uppercase; letter-spacing:.05em;}
.field input, .field textarea, .field select{
  width:100%; background:#0c0e14; border:1px solid #232837; border-radius:8px; padding:11px 13px; font-size:14px;
  transition:border-color var(--transition), box-shadow var(--transition);
}
.field input:focus, .field textarea:focus, .field select:focus{border-color:rgba(61,219,217,.5); box-shadow:0 0 0 3px rgba(61,219,217,.1);}
.field textarea{resize:vertical; min-height:70px;}
.field-row{display:flex; gap:12px;}
.field-row .field{flex:1;}
.field-hint{font-size:11px; color:var(--muted); margin-top:5px;}
.imdb-import-field{
  background:var(--highlight-dim); border:1px solid rgba(61,219,217,.25); border-radius:10px; padding:14px; margin-bottom:20px;
}
.imdb-import-field label{color:var(--highlight);}
.imdb-import-field input, .imdb-import-field textarea{background:#0c0e14;}
.field-hint code{background:#161923; border:1px solid #232837; border-radius:4px; padding:1px 5px; font-family:ui-monospace,Menlo,Consolas,monospace; color:#9fb3b1;}

.type-toggle{display:flex; gap:10px; margin-bottom:20px;}
.type-toggle button{flex:1; padding:12px; border-radius:8px; background:#0c0e14; border:1px solid #232837; font-weight:700; font-size:13.5px; color:var(--muted);}
.type-toggle button.active{background:var(--primary); color:var(--highlight); border-color:var(--primary);}

.chip-select{display:flex; gap:8px; flex-wrap:wrap;}
.chip-select .chip-btn{padding:7px 13px; font-size:12.5px;}

.actor-chips-wrap{display:flex; flex-wrap:wrap; gap:8px;}
.actor-chip{
  display:inline-flex; align-items:center; gap:7px; background:#12141c; border:1px solid #232837;
  padding:6px 8px 6px 13px; border-radius:20px; font-size:12.5px; font-weight:600; color:var(--text);
}
.actor-chip button{
  width:17px; height:17px; border-radius:50%; background:#1e2330; display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:all var(--transition); flex-shrink:0;
}
.actor-chip button svg{width:9px; height:9px;}
.actor-chip button:hover{background:#3a1218; color:#ff8b93;}
.cast-blur-editor{display:flex; flex-direction:column; gap:6px;}
.cast-blur-row{display:flex; align-items:center; gap:10px; background:#12141c; border:1px solid #232837; border-radius:10px; padding:8px 10px;}
.cast-blur-photo{width:36px; height:36px; border-radius:50%; overflow:hidden; flex-shrink:0; background:var(--surface2);}
.cast-blur-photo img{width:100%; height:100%; object-fit:cover; display:block;}
.cast-blur-info{display:flex; flex-direction:column; flex:1; min-width:0;}
.cast-blur-name{font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.cast-blur-info .cast-character{font-size:11.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.cast-blur-row .btn-icon{width:32px; height:32px; flex-shrink:0;}

.source-row{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
.source-row input{flex:1;}
.source-row .rm{width:32px; height:32px; flex-shrink:0; border-radius:6px; background:#3a1218; color:#ff8b93; display:flex; align-items:center; justify-content:center;}
/* Read-only preview of an auto-generated Streaming Provider source (see getEditAutoSources /
   autoSourcesPreviewHtml) — same layout as an editable .source-row, but visually muted with a
   small "Auto" tag instead of a remove button, since these aren't stored and can't be edited here. */
.source-row-auto input{opacity:.65; cursor:default;}
.source-row-auto-badge{
  width:32px; height:32px; flex-shrink:0; border-radius:6px; background:rgba(61,219,217,.14);
  color:var(--highlight); display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.02em;
}

.season-block{border:1px solid #1e2330; border-radius:10px; padding:14px; margin-bottom:14px; background:#0c0e14;}
.season-block-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.season-block-head b{font-size:14px;}
.ep-editor{border:1px solid #1a1d26; border-radius:8px; padding:10px; margin-bottom:8px; background:var(--surface);}
.ep-editor-head{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.ep-editor-head input{flex:1;}

.modal-footer{display:flex; justify-content:flex-end; gap:10px; margin-top:20px; border-top:1px solid #1a1d26; padding-top:18px;}

/* ---------- Add Title Wizard ---------- */
/* Every step is deliberately short (see the ADD TITLE WIZARD comment in JS for why), but as a
   last-resort safety net for anything that still doesn't fit on a very short screen, the modal
   itself becomes a fixed-height flex column: modal-head / stepper / tabs / hero stay pinned, only
   #wizardStepBody scrolls, and the footer with Back/Next is always pinned at the bottom — so you
   never have to hunt for the buttons, even in that edge case. */
.modal.modal-wizard{
  max-width:860px; display:flex; flex-direction:column; max-height:88vh; overflow:hidden;
  padding:0; border-radius:20px; border-color:#1c2230;
  background:
    radial-gradient(600px 220px at 18% 0%, rgba(61,219,217,.09), transparent 60%),
    var(--surface);
  box-shadow:0 30px 90px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.03);
}
.modal-wizard .modal-head,
.modal-wizard .wizard-stepper-wrap,
.modal-wizard .wizard-title-tabs,
.modal-wizard .wizard-hero,
.modal-wizard .wizard-footer{flex-shrink:0;}
.modal-wizard .modal-head{
  margin:0; padding:22px 30px 18px; border-bottom:1px solid #191d28;
  background:linear-gradient(180deg, rgba(61,219,217,.05), transparent);
}
.modal-wizard .modal-head h2{display:flex; align-items:center; gap:10px;}
.modal-wizard #wizardStepBody{flex:1 1 auto; min-height:0; overflow-y:auto; padding:2px 30px 4px;}
.modal-wizard #wizardStepBody::-webkit-scrollbar{width:6px;}
.modal-wizard #wizardStepBody::-webkit-scrollbar-track{background:transparent;}
.modal-wizard #wizardStepBody::-webkit-scrollbar-thumb{background:rgba(61,219,217,.25); border-radius:3px;}
.modal-wizard #wizardStepBody::-webkit-scrollbar-thumb:hover{background:rgba(61,219,217,.45);}
.modal-wizard .wizard-footer{margin-bottom:0; padding:16px 30px 22px;}
.modal-wizard .wizard-title-tabs{padding-left:30px; padding-right:30px;}
.modal-wizard .wizard-hero{margin-left:30px; margin-right:30px;}
@keyframes wizardFadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
#wizardStepBody, .wizard-hero, .wizard-intro{animation:wizardFadeUp .35s cubic-bezier(.22,1,.36,1);}

.wizard-season-nav{display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:16px; padding:10px; border-radius:10px; background:#0c0e14; border:1px solid rgba(61,219,217,.14);}
.wizard-season-nav-label{font-weight:800; font-size:14px; text-align:center; min-width:120px; color:var(--highlight);}
.wizard-season-nav-label span{display:block; font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); margin-top:2px;}

.wizard-step-count{
  font-size:11px; font-weight:800; color:var(--highlight); background:var(--highlight-dim);
  padding:3px 10px; border-radius:20px; letter-spacing:.02em;
}

/* Stepper: a slim gradient progress rail with the current step's name/number floating above it,
   instead of ten bare segments — keeps the "how far am I" signal but gives it an actual label. */
.wizard-stepper-wrap{padding:16px 30px 20px; border-bottom:1px solid #191d28;}
.wizard-stepper-label{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px;}
.wizard-stepper-label-name{font-size:13.5px; font-weight:800; font-family:var(--display-font); color:var(--text);}
.wizard-stepper-label-name span{color:var(--highlight);}
.wizard-stepper-label-pct{font-size:11px; font-weight:700; color:var(--muted);}
.wizard-segments{display:flex; gap:4px;}
.wizard-segment{flex:1; height:5px; border-radius:3px; background:#1a1d26; transition:background .35s ease, box-shadow .35s ease; position:relative; overflow:hidden;}
.wizard-segment.filled{background:linear-gradient(90deg, var(--highlight), #29a3a1);}
.wizard-segment.current{box-shadow:0 0 10px 1px rgba(61,219,217,.55);}

.wizard-intro{text-align:center; padding:30px 10px 22px;}
.wizard-intro-icon{
  width:56px; height:56px; border-radius:16px; margin:0 auto 18px; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(145deg, rgba(61,219,217,.22), rgba(61,219,217,.05)); color:var(--highlight);
  border:1px solid rgba(61,219,217,.25); box-shadow:0 12px 30px -10px rgba(61,219,217,.4);
}
.wizard-intro-icon svg{width:26px; height:26px;}
.wizard-intro h3{font-size:21px; font-weight:800; font-family:var(--display-font); margin-bottom:8px;}
.wizard-intro p{font-size:13px; color:var(--muted); max-width:360px; margin:0 auto;}

.wizard-step-header{display:flex; align-items:center; gap:14px; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid rgba(61,219,217,.1);}
.wizard-step-header-icon{
  width:38px; height:38px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(145deg, rgba(61,219,217,.24), rgba(61,219,217,.06)); color:var(--highlight);
  border:1px solid rgba(61,219,217,.25);
}
.wizard-step-header-icon svg{width:18px; height:18px;}
.wizard-step-header-text h4{font-size:16px; font-weight:800; font-family:var(--display-font); color:var(--text);}
.wizard-step-header-text p{font-size:11.5px; color:var(--muted); margin-top:2px;}

/* Hero: a frosted summary card that follows you through steps 2-9, built from the poster (as a
   blurred backdrop wash) plus the title/meta panel — reads like a real title card rather than a
   plain info strip. */
.wizard-hero{
  display:flex; align-items:center; gap:18px; padding:18px; border-radius:14px; margin-bottom:20px;
  background:linear-gradient(120deg, rgba(61,219,217,.08), rgba(61,219,217,.015) 55%), #0c0e14;
  border:1px solid rgba(61,219,217,.16); position:relative; overflow:hidden;
}
.wizard-hero::before{
  content:''; position:absolute; inset:0; opacity:.5; pointer-events:none;
  background:radial-gradient(120% 140% at 0% 0%, rgba(61,219,217,.16), transparent 60%);
}
.wizard-hero-poster{width:64px; aspect-ratio:2/3; border-radius:9px; overflow:hidden; flex-shrink:0; background:#161923; box-shadow:0 14px 30px -6px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.04); position:relative; z-index:1; transition:box-shadow var(--transition);}
.wizard-hero-poster img{width:100%; height:100%; object-fit:cover; display:block;}
.wizard-hero-poster-empty{width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:var(--muted);}
.wizard-hero-poster-empty svg{width:20px; height:20px;}
.wizard-hero-info{min-width:0; flex:1; position:relative; z-index:1;}
.wizard-hero-type{display:inline-block; font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--highlight); background:rgba(61,219,217,.14); padding:3px 9px; border-radius:20px; margin-bottom:8px;}
.wizard-hero-title{font-size:19px; font-weight:800; font-family:var(--display-font); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.wizard-hero-year{font-weight:500; color:var(--muted); font-size:14.5px;}
.wizard-hero-meta{display:flex; align-items:center; gap:10px; font-size:12px; color:var(--muted); margin-top:6px; flex-wrap:wrap;}
.wizard-hero-rating{display:flex; align-items:center; gap:4px; color:#ffc94d; font-weight:700;}
.wizard-hero-rating svg{width:12px; height:12px;}
.wizard-hero-pill{padding:2px 8px; border-radius:4px; background:#1a1d26; font-size:10.5px; font-weight:700; color:var(--text);}
.wizard-hero-genres{display:flex; gap:6px; margin-top:10px; flex-wrap:wrap;}
.wizard-hero-genre-tag{font-size:10.5px; font-weight:700; padding:3px 10px; border-radius:20px; background:var(--highlight-dim); color:var(--highlight);}

.wizard-title-tabs{display:flex; gap:8px; overflow-x:auto; padding-bottom:16px; margin-bottom:18px; border-bottom:1px solid rgba(61,219,217,.1);}
.wizard-title-tab{
  display:flex; align-items:center; gap:2px; flex-shrink:0; max-width:190px; padding:6px 8px 6px 6px; border-radius:24px;
  background:#12141c; border:1px solid #1e2330; font-size:12px; font-weight:700; color:var(--muted);
  transition:all var(--transition);
}
.wizard-title-tab:hover{border-color:#333a4d; color:var(--text); transform:translateY(-1px);}
.wizard-title-tab.active{background:var(--highlight-dim); color:var(--highlight); border-color:rgba(61,219,217,.45); box-shadow:0 4px 14px -4px rgba(61,219,217,.3);}
.wizard-title-tab-btn{display:flex; align-items:center; gap:8px; min-width:0; background:none; border:none; color:inherit; font:inherit; cursor:pointer; padding:0;}
.wizard-title-tab-thumb{width:24px; height:24px; border-radius:50%; overflow:hidden; flex-shrink:0; background:#1e2330; display:flex; align-items:center; justify-content:center; transition:box-shadow var(--transition);}
.wizard-title-tab.active .wizard-title-tab-thumb{box-shadow:0 0 0 2px rgba(61,219,217,.55);}
.wizard-title-tab-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
.wizard-title-tab-name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.wizard-title-tab-error{width:7px; height:7px; border-radius:50%; background:#ff5566; flex-shrink:0; box-shadow:0 0 0 3px rgba(255,85,102,.2);}
.wizard-title-tab-remove{
  width:19px; height:19px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:all var(--transition);
}
.wizard-title-tab-remove svg{width:9px; height:9px;}
.wizard-title-tab-remove:hover{background:#3a1218; color:#ff8b93;}

.wizard-gallery{display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:10px; margin-bottom:8px;}
.wizard-gallery.wizard-gallery-wide{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
.wizard-gallery-item{
  position:relative; aspect-ratio:2/3; border-radius:10px; overflow:hidden; background:#12141c;
  border:2px solid transparent; cursor:pointer; transition:all var(--transition);
}
.wizard-gallery-wide .wizard-gallery-item{aspect-ratio:16/9;}
.wizard-gallery-item img{width:100%; height:100%; object-fit:cover; display:block;}
.wizard-gallery-item.logo-tile{background:repeating-conic-gradient(#1a1d26 0% 25%, #14161e 0% 50%) 50%/16px 16px;}
.wizard-gallery-item.logo-tile img{object-fit:contain; padding:14px;}
.wizard-gallery-item:hover{border-color:#333a4d; transform:translateY(-3px); box-shadow:0 10px 22px -6px rgba(0,0,0,.55);}
.wizard-gallery-item.selected{border-color:var(--highlight); box-shadow:0 0 0 3px rgba(61,219,217,.2), 0 12px 26px -6px rgba(61,219,217,.3); transform:translateY(-3px);}
.wizard-gallery-check{
  position:absolute; top:6px; right:6px; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:rgba(10,11,16,.75); border:1.5px solid rgba(255,255,255,.3); color:transparent; transition:all var(--transition);
}
.wizard-gallery-check svg{width:12px; height:12px;}
.wizard-gallery-item.selected .wizard-gallery-check{background:var(--highlight); border-color:var(--highlight); color:#04211f;}
.wizard-gallery-empty{color:rgba(61,219,217,.55); font-size:12.5px; padding:16px; text-align:center; border:1px dashed rgba(61,219,217,.25); border-radius:8px;}

.wizard-preview-strip{display:flex; gap:16px; margin-bottom:18px; flex-wrap:wrap;}
.wizard-preview-card{text-align:center;}
.wizard-preview-card-label{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); margin-bottom:6px;}
.wizard-preview-poster{width:74px; aspect-ratio:2/3; border-radius:8px; overflow:hidden; background:#12141c; box-shadow:0 10px 26px rgba(0,0,0,.5);}
.wizard-preview-backdrop{width:132px; aspect-ratio:16/9; border-radius:8px; overflow:hidden; background:#12141c; box-shadow:0 10px 26px rgba(0,0,0,.5);}
.wizard-preview-logo{width:132px; aspect-ratio:16/9; border-radius:8px; overflow:hidden; background:repeating-conic-gradient(#1a1d26 0% 25%, #14161e 0% 50%) 50%/16px 16px; display:flex; align-items:center; justify-content:center;}
.wizard-preview-logo img{max-width:88%; max-height:70%; object-fit:contain;}
.wizard-preview-poster img, .wizard-preview-backdrop img{width:100%; height:100%; object-fit:cover; display:block;}

.wizard-footer{display:flex; justify-content:space-between; align-items:center; border-top:1px solid #191d28; gap:10px; background:linear-gradient(0deg, rgba(61,219,217,.04), transparent);}
.wizard-footer-right{display:flex; gap:10px;}
.wizard-progress-track{height:3px; border-radius:2px; background:#1a1d26; overflow:hidden; margin-bottom:2px;}
.wizard-progress-fill{height:100%; background:linear-gradient(90deg, var(--highlight), #29a3a1); transition:width .3s ease;}

.wizard-confirm-stats{display:flex; gap:10px; margin-bottom:22px;}
.wizard-confirm-stat{
  flex:1; display:flex; align-items:center; gap:10px; text-align:left; padding:12px 14px; border-radius:12px;
  background:#0c0e14; border:1px solid rgba(61,219,217,.14); transition:all var(--transition);
}
.wizard-confirm-stat:hover{border-color:rgba(61,219,217,.35);}
.wizard-confirm-stat-icon{
  width:32px; height:32px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background:rgba(61,219,217,.14); color:var(--highlight);
}
.wizard-confirm-stat-icon svg{width:15px; height:15px;}
.wizard-confirm-stat-num{font-size:19px; font-weight:800; font-family:var(--display-font); color:var(--text); line-height:1.1;}
.wizard-confirm-stat-label{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); margin-top:1px;}
.wizard-confirm-stat-error{border-color:rgba(255,85,102,.25);}
.wizard-confirm-stat-error .wizard-confirm-stat-icon{background:rgba(255,85,102,.14); color:#ff8b93;}

.wizard-summary-item{display:flex; flex-direction:column; gap:12px; padding:14px; border:1px solid rgba(61,219,217,.14); border-radius:12px; margin-bottom:10px; background:#0c0e14; transition:all var(--transition);}
.wizard-summary-item:hover{border-color:#2a3040; background:#0e1119; transform:translateY(-1px);}
.wizard-summary-top{display:flex; gap:14px; align-items:flex-start;}
.wizard-summary-poster{width:56px; aspect-ratio:2/3; border-radius:7px; overflow:hidden; flex-shrink:0; align-self:flex-start; background:#12141c; box-shadow:0 8px 18px -4px rgba(0,0,0,.5);}
.wizard-summary-poster img{width:100%; height:100%; object-fit:cover; display:block;}
.wizard-summary-body{min-width:0; flex:1;}
.wizard-summary-title{font-weight:800; font-size:14.5px; margin-bottom:2px; line-height:1.3;}
.wizard-summary-meta{font-size:12px; color:var(--muted); margin-bottom:6px;}
.wizard-summary-tags{display:flex; flex-wrap:wrap; align-items:center; gap:6px;}
.wizard-summary-tag{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; background:var(--highlight-dim); color:var(--highlight); line-height:1.4;}
.wizard-summary-tag svg{width:10px; height:10px; flex-shrink:0;}
.wizard-summary-tag-newest{background:rgba(255,201,77,.16); color:#ffc94d;}
.wizard-summary-error{border-color:rgba(255,85,102,.3); background:rgba(255,85,102,.05);}
.wizard-summary-remove{
  width:34px; height:34px; flex-shrink:0; align-self:flex-start; border-radius:9px; padding:0;
  display:flex; align-items:center; justify-content:center; background:#161923; border:1px solid #232837; color:var(--muted);
}
.wizard-summary-remove svg{width:14px; height:14px;}
.wizard-summary-remove:hover{background:#3a1218; border-color:#4d1a20; color:#ff8b93;}

.wizard-error-banner{
  display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border-radius:8px; margin-bottom:16px;
  background:rgba(255,85,102,.08); border:1px solid rgba(255,85,102,.3); color:#ff8b93; font-size:12.5px; line-height:1.5;
}

/* ---------- Player ---------- */
.player-overlay{
  position:fixed; inset:0; background:#000; z-index:200; display:flex; flex-direction:column;
  opacity:0; pointer-events:none; transition:opacity var(--transition);
}
.player-overlay.open{opacity:1; pointer-events:auto;}
.player-top{
  position:absolute; top:0; left:0; right:0; z-index:5; padding:20px 26px; display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg, rgba(0,0,0,.85), transparent);
}
.player-title{font-size:15px; font-weight:800; font-family:var(--display-font);}
.live-badge{
  display:inline-flex; align-items:center; background:#ff4757; color:#fff; font-size:10px; font-weight:800;
  letter-spacing:.04em; padding:2px 7px; border-radius:4px; margin-right:2px; animation:liveBlink 1.8s ease-in-out infinite;
}
@keyframes liveBlink{0%,100%{opacity:1;} 50%{opacity:.55;}}
.hls-badge{
  display:inline-flex; align-items:center; background:var(--highlight-dim); color:var(--highlight); font-size:9.5px; font-weight:800;
  letter-spacing:.04em; padding:2px 6px; border-radius:4px; margin-left:6px; border:1px solid rgba(61,219,217,.3);
}
.player-sub{font-size:12px; color:#8fa5a3; margin-top:2px;}
.player-top-info{transition:opacity .25s ease;}
.player-top-actions{display:flex; align-items:center; gap:8px;}
.player-top-actions .btn-icon{background:rgba(22,25,35,.6); border-color:rgba(255,255,255,.12);}
.player-top-actions .btn-icon:hover{background:rgba(22,25,35,.9);}
/* Outside fullscreen, Subtitles/Brightness/Hide screen/Lock stay put — always visible/clickable,
   regardless of the auto-hide-on-inactivity timer that fades the rest of the controls. In
   fullscreen they join the auto-hide group instead (see .player-overlay.is-fullscreen.controls-hidden
   below), so the whole UI — Brightness, Hide screen, everything — disappears together and a single
   tap brings it all back. Locking is the one other exception, independent of fullscreen: Hide Screen
   disappears outright and Lock itself starts fading with the auto-hide timer too — see the LOCK CSS
   further down for both. */
.player-top-pinned{display:flex; align-items:center; gap:8px; transition:opacity .25s ease;}
.player-top-fade{display:flex; align-items:center; gap:8px; transition:opacity .25s ease;}
.player-stage{flex:1; position:relative; background:#000;}
/* Wraps ONLY the iframe/video — never the loading overlay, subtitle overlay/panel, skip buttons,
   or click shield — so the Brightness control (PLAYER BRIGHTNESS, below) can filter just the video
   surface without dimming or brightening the app's own UI on top of it. The iframe/video itself is
   still swapped in and out of this wrapper on every restart/resume/seek — the wrapper element (and
   therefore its filter) persists across all of that untouched, so brightness never has to fight a
   rebuild and never triggers one either. */
.player-media-wrap{width:100%; height:100%; display:block; transition:filter .25s ease;}
.player-stage iframe, .player-stage video{width:100%; height:100%; border:0; display:block;}
/* Fake-pause fade: the stage background is always solid #000 behind these, so opacity-only
   transitions never show a white flash while the iframe is being unloaded/recreated. */
.player-stage iframe, .player-stage video{opacity:1; transition:opacity .38s ease;}
.player-stage iframe.player-fade-out, .player-stage video.player-fade-out{opacity:0;}

/* ---------- Fake-pause cover (Netflix-style "paused" state) ----------
   Shown in place of the iframe once it has been unloaded. Purely visual — the third-party
   embed underneath is completely gone from the DOM at this point (see closePlayerCover). */
.player-pause-cover{
  position:absolute; inset:0; z-index:4; background:#000;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .42s ease; cursor:pointer;
}
.player-pause-cover.visible{opacity:1;}
.player-pause-cover-bg{
  position:absolute; inset:0; background-size:cover; background-position:center center;
  filter:blur(3px) brightness(.4) saturate(1.1); transform:scale(1.06);
}
.player-pause-cover::after{
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at center, rgba(5,6,9,.35) 0%, rgba(5,6,9,.85) 100%);
}
.player-pause-cover-content{
  position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:16px;
  text-align:center; padding:24px; max-width:520px;
}
.player-pause-resume-btn{
  width:78px; height:78px; border-radius:50%; border:2px solid rgba(255,255,255,.5);
  background:rgba(255,255,255,.08); backdrop-filter:blur(6px); color:#fff;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:transform var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition);
}
.player-pause-resume-btn svg{width:32px; height:32px; margin-left:3px;}
.player-pause-cover:hover .player-pause-resume-btn{
  transform:scale(1.08); background:var(--highlight); border-color:var(--highlight); color:#04211f;
  box-shadow:0 0 0 8px rgba(61,219,217,.16);
}
.player-pause-title{font-size:22px; font-weight:800; font-family:var(--display-font); color:#fff;}
.player-pause-sub{font-size:13.5px; color:var(--muted); font-weight:600;}
.player-pause-resume-label{font-size:14.5px; font-weight:700; color:var(--highlight); letter-spacing:.01em;}
.player-pause-progress{width:260px; height:4px; border-radius:3px; background:rgba(255,255,255,.15); overflow:hidden; margin-top:2px;}
.player-pause-progress > div{height:100%; background:linear-gradient(90deg, var(--highlight), #2bc4c1);}

/* ---------- Playback end card (Netflix-style "you finished watching" screen) ----------
   Shown on top of the stage once a title actually finishes — a real 'ended' event for direct
   video/HLS, or the existing watched-threshold proxy for third-party iframes (there is no real
   'ended' signal available across a cross-origin iframe). Unlike the pause cover, nothing needs
   to be destroyed first: the title is over either way, so this just fades in on top of whatever
   was showing; z-index:9 puts it above the top/bottom control bars (z:5) and next-episode nub,
   just under the manual Hide Screen overlay (z:10). */
.player-end-card{
  position:absolute; inset:0; z-index:9; background:#000;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .45s ease;
}
.player-end-card.visible{opacity:1;}
.player-end-card-bg{
  position:absolute; inset:0; background-size:cover; background-position:center center;
  filter:blur(4px) brightness(.35) saturate(1.1); transform:scale(1.06);
}
.player-end-card::after{
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at center, rgba(5,6,9,.4) 0%, rgba(5,6,9,.92) 100%);
}
.player-end-card-content{
  position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:14px;
  text-align:center; padding:32px; max-width:420px; width:100%;
}
.player-end-card-eyebrow{font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--highlight);}
.player-end-card-title{font-size:24px; font-weight:800; font-family:var(--display-font); color:#fff; line-height:1.25;}
.player-end-card-sub{font-size:13.5px; color:var(--muted); font-weight:600; margin-top:-8px;}
.player-end-card-stars{display:flex; gap:8px; margin:8px 0 2px;}
.player-end-card-stars .my-rating-star{width:34px; height:34px;}
.player-end-card-stars .my-rating-star svg{width:26px; height:26px;}
.player-end-card-actions{display:flex; flex-direction:column; gap:10px; width:100%; margin-top:10px;}
.player-end-card-actions .btn{width:100%; justify-content:center; padding:13px; font-size:14.5px;}
/* Small pie-timer that fills up over the autoplay countdown, sitting right in the Next Episode
   button so the "why is this button changing" question is answered at a glance without a separate
   progress bar competing for attention. --pct is ticked from 0 to 100 by startEndCardAutoplay(). */
.player-end-card-next-ring{
  width:16px; height:16px; border-radius:50%; flex-shrink:0;
  background:conic-gradient(#04211f calc(var(--pct,0)*1%), rgba(4,33,31,.35) 0);
}
.player-end-card-cancel-link{
  background:none; border:none; color:var(--muted); font-size:12.5px; font-weight:700;
  padding:2px; text-align:center; width:100%; transition:color var(--transition);
}
.player-end-card-cancel-link:hover{color:var(--text); text-decoration:underline;}

/* ---------- Keyboard shortcuts cheat-sheet ('?') ----------
   A dedicated overlay (not the generic modal system) so it can sit ABOVE the player: modalOverlay
   is z:100 but player-overlay is z:200, so reusing openModal() here would render the cheat sheet
   invisibly behind an open player. z:260 guarantees it's always on top of everything, in or out
   of playback. */
.shortcuts-overlay{
  position:fixed; inset:0; background:rgba(4,5,8,.78); backdrop-filter:blur(10px); z-index:260;
  display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none;
  transition:opacity var(--transition); padding:20px;
}
.shortcuts-overlay.open{opacity:1; pointer-events:auto;}
.shortcuts-modal{
  background:var(--surface); border:1px solid #1e2330; border-radius:16px; width:100%; max-width:480px;
  max-height:88vh; overflow-y:auto; padding:28px; transform:translateY(16px) scale(.98); transition:transform var(--transition);
  box-shadow:0 30px 80px rgba(0,0,0,.55);
}
.shortcuts-overlay.open .shortcuts-modal{transform:translateY(0) scale(1);}
.shortcuts-modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid #1a1d26;}
.shortcuts-modal-head h2{font-size:18px; font-weight:800; font-family:var(--display-font);}
.shortcuts-group{margin-bottom:22px;}
.shortcuts-group:last-child{margin-bottom:0;}
.shortcuts-group-label{font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px;}
.shortcuts-group-note{font-size:11.5px; color:var(--muted); margin-bottom:10px;}
.shortcut-row{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:7px 0;}
.shortcut-row-desc{font-size:13.5px; color:var(--text); font-weight:600;}
.shortcut-row-hint{font-size:11px; color:var(--muted); margin-top:2px;}
.shortcut-keys{display:flex; align-items:center; gap:4px; flex-shrink:0;}
kbd.key{
  display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:26px; padding:0 7px;
  background:#161923; border:1px solid #2a3040; border-bottom-width:2px; border-radius:6px;
  font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11.5px; font-weight:700; color:var(--text);
}
.shortcut-keys .plus{color:var(--muted); font-size:11px;}

/* ---------- Pre-playback subtitle prompt ----------
   Shown the first time a title/episode is played (before any player exists): "Would you like to
   add a subtitle?" over that title's backdrop. A dedicated overlay (not the generic modal system)
   for the same reason as .shortcuts-overlay above — this can be triggered mid-playback too (Next
   Episode), where modalOverlay's z:100 would render invisibly behind the open player (z:200). */
.subtitle-prompt-overlay{
  position:fixed; inset:0; background:rgba(4,5,8,.78); backdrop-filter:blur(10px); z-index:220;
  display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none;
  transition:opacity var(--transition); padding:20px;
}
.subtitle-prompt-overlay.open{opacity:1; pointer-events:auto;}
.subtitle-prompt-modal{
  position:relative; background:var(--surface); border:1px solid #1e2330; border-radius:16px;
  width:100%; max-width:440px; max-height:88vh; overflow:hidden; transform:translateY(16px) scale(.98);
  transition:transform var(--transition); box-shadow:0 30px 80px rgba(0,0,0,.55);
}
.subtitle-prompt-overlay.open .subtitle-prompt-modal{transform:translateY(0) scale(1);}
.subtitle-prompt-bg{
  position:relative; min-height:440px; max-height:88vh; overflow-y:auto; display:flex; flex-direction:column;
  justify-content:flex-end; background-size:cover; background-position:center center; background-color:#12141c;
}
.subtitle-prompt-bg::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(5,6,9,.3) 0%, rgba(5,6,9,.55) 38%, rgba(5,6,9,.97) 82%);
}
.subtitle-prompt-close{position:absolute; top:14px; right:14px; z-index:2; background:rgba(10,11,16,.55); border-color:rgba(255,255,255,.15);}
.subtitle-prompt-close:hover{background:rgba(10,11,16,.9);}
.subtitle-prompt-content{position:relative; z-index:1; padding:28px 26px 26px; display:flex; flex-direction:column; gap:12px;}
.subtitle-prompt-eyebrow{font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--highlight);}
.subtitle-prompt-title{font-size:21px; font-weight:800; font-family:var(--display-font); color:#fff; line-height:1.25;}
.subtitle-prompt-episode{font-size:12.5px; color:#8fa5a3; margin-top:-8px;}
.subtitle-prompt-question{font-size:13.5px; color:#c7d5d3; line-height:1.5;}
.subtitle-prompt-actions{display:flex; gap:10px; margin-top:6px;}
.subtitle-prompt-actions .btn{flex:1; justify-content:center; padding:13px; font-size:14.5px;}
@media (max-width:480px){ .subtitle-prompt-bg{min-height:380px;} }
.content-blurred{filter:blur(32px) saturate(70%); transition:filter .3s ease; cursor:pointer;}
.content-blurred:hover{filter:blur(18px) saturate(70%);}
.content-blur-revealed{filter:none;}
.player-stage.content-blurred-video video{filter:blur(40px);}
/* Cast avatars are tiny circles (36-44px) — the default 32px blur above erases them to a flat color
   blob that looks deleted rather than blurred. A much smaller radius keeps them recognizably "a
   blurred photo" instead of "no photo". */
.cast-chip-photo img.content-blurred,
.cast-blur-photo.content-blurred{filter:blur(8px) saturate(70%); transition:filter .3s ease; cursor:pointer;}
.cast-chip-photo img.content-blurred:hover{filter:blur(5px) saturate(70%);}

.player-loading{
  position:absolute; inset:0; z-index:3; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  background:#000; opacity:1; pointer-events:none; transition:opacity .4s ease;
}
.player-loading.done{opacity:0;}
.player-loading-label{font-size:12.5px; font-weight:600; color:var(--muted); letter-spacing:.02em;}
.spinner{
  width:44px; height:44px; border-radius:50%; border:3px solid rgba(61,219,217,.18); border-top-color:var(--highlight);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.player-hide-overlay{
  position:absolute; inset:0; z-index:10; background:rgba(5,6,9,.97); backdrop-filter:blur(60px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  color:var(--text); cursor:pointer; animation:cardTrailerFadeIn .25s ease;
}
.player-hide-icon{width:56px; height:56px; border-radius:50%; background:var(--highlight-dim); display:flex; align-items:center; justify-content:center; color:var(--highlight);}
.player-hide-icon svg{width:26px; height:26px;}
.player-hide-overlay span{font-size:13px; font-weight:700; color:var(--muted);}
.player-bottom{
  position:absolute; bottom:0; left:0; right:0; z-index:5; padding:14px 24px 18px;
  display:flex; align-items:center; gap:16px;
  background:linear-gradient(0deg, rgba(0,0,0,.85), transparent); transition:opacity .25s ease;
}
.player-bottom-left{display:flex; align-items:center; justify-content:flex-start; gap:4px; flex-shrink:0;}
/* Holds current-time / scrubber / total-time — grows to fill whatever room is left between the
   left transport cluster and the right-side buttons, exactly like Netflix's bottom bar. */
.player-bottom-progress{display:flex; align-items:center; gap:10px; flex:1 1 auto; min-width:0;}
.player-bottom-right{display:flex; align-items:center; justify-content:flex-end; gap:10px; flex-shrink:0;}
.player-bottom .btn-icon{background:rgba(22,25,35,.6); border-color:rgba(255,255,255,.12);}
.player-bottom .btn-icon:hover{background:rgba(22,25,35,.9);}
/* Applied to Play/Pause + the two skip buttons (and the progress track) while an iframe rebuild
   (pause/resume/seek) is in flight — blocks rapid repeat clicks/drags from starting a second
   rebuild on top of one already running. */
.player-bottom .btn-icon.is-busy{opacity:.4; pointer-events:none;}
.player-time{
  font-size:12.5px; font-weight:700; color:#c7d5d3; font-variant-numeric:tabular-nums;
  white-space:nowrap; flex-shrink:0; letter-spacing:.01em;
}
/* Larger invisible hit area (16px tall) around a slim 4px visual track — same "easy to grab,
   subtle at rest" treatment Netflix uses, so it doesn't dominate the control bar visually. */
.player-progress-track{
  position:relative; flex:1 1 auto; min-width:60px; height:16px; display:flex; align-items:center;
  cursor:pointer; touch-action:none;
}
.player-progress-track::before{
  content:''; position:absolute; left:0; right:0; top:50%; height:4px; transform:translateY(-50%);
  border-radius:3px; background:rgba(255,255,255,.22); transition:height .15s ease;
}
.player-progress-fill{
  position:absolute; left:0; top:50%; height:4px; transform:translateY(-50%); width:0%;
  border-radius:3px; background:linear-gradient(90deg,var(--highlight),#2bc4c1);
  pointer-events:none; transition:height .15s ease;
}
.player-progress-handle{
  position:absolute; top:50%; left:0%; width:13px; height:13px; border-radius:50%;
  background:var(--highlight); transform:translate(-50%,-50%) scale(0);
  box-shadow:0 0 0 4px rgba(61,219,217,.22), 0 2px 6px rgba(0,0,0,.4);
  transition:transform .15s ease; pointer-events:none;
}
.player-progress-track:hover .player-progress-handle,
.player-progress-track.dragging .player-progress-handle{transform:translate(-50%,-50%) scale(1);}
.player-progress-track:hover::before, .player-progress-track.dragging::before,
.player-progress-track:hover .player-progress-fill, .player-progress-track.dragging .player-progress-fill{height:6px;}
.player-progress-track.dragging{cursor:grabbing;}
.player-progress-track:focus-visible::before{outline:2px solid var(--highlight); outline-offset:4px;}
.player-next-side{
  position:absolute; top:50%; right:24px; transform:translateY(-50%); z-index:6;
  width:52px; height:52px; border-radius:50%; overflow:hidden; cursor:pointer;
  border:2px solid rgba(61,219,217,.5); box-shadow:0 8px 20px rgba(0,0,0,.4);
  transition:opacity .25s ease, transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  animation:pnsRise .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes pnsRise{from{opacity:0; transform:translateY(calc(-50% + 14px));} to{opacity:1; transform:translateY(-50%);}}
.player-next-side:hover{transform:translateY(-50%) scale(1.1); border-color:var(--highlight); box-shadow:0 10px 26px rgba(0,0,0,.5), 0 0 0 3px rgba(61,219,217,.25);}
.pns-thumb{position:relative; width:100%; height:100%; background:linear-gradient(135deg,var(--primary),var(--surface));}
.pns-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
.pns-play-icon{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.4);
}
.pns-play-icon svg{width:18px; height:18px; color:#fff; filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.pns-meta{display:none;}
.player-hover-zone{position:absolute; top:0; left:0; right:0; height:90px; z-index:4;}
/* Centered ±20s buttons — sit above the click shield (z-index 3 > 2) so they're always clickable
   themselves, but stay invisible/inert until the screen is tapped (see revealCenterSkipButtons). */
.player-center-skip-group{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3;
  display:flex; align-items:center; gap:110px; pointer-events:none;
}
.player-center-skip-btn{
  width:64px; height:64px; border-radius:50%; flex-shrink:0;
  background:rgba(8,10,14,.55); backdrop-filter:blur(6px); border:1.5px solid rgba(255,255,255,.28);
  color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer;
  opacity:0; transform:scale(.8); pointer-events:none;
  transition:opacity .25s ease, transform .25s ease, background var(--transition), border-color var(--transition), color var(--transition);
}
.player-center-skip-btn svg{width:28px; height:28px;}
.player-overlay.center-skip-visible .player-center-skip-btn{opacity:1; transform:scale(1); pointer-events:auto;}
.player-center-skip-btn:hover{background:var(--highlight-dim); border-color:var(--highlight); color:var(--highlight);}
.player-center-skip-btn:active{transform:scale(.9);}
.player-center-skip-btn.is-busy{opacity:.4 !important; pointer-events:none !important;}
@media (max-width:860px){
  .player-center-skip-group{gap:64px;}
  .player-center-skip-btn{width:50px; height:50px;}
  .player-center-skip-btn svg{width:22px; height:22px;}
}
/* Subtitle search panel — floats in the top-right of the stage, above the top-fade gradient's
   controls (z 5) and bottom bar (z 6) so it never gets covered by them. */
.player-subtitle-panel{
  position:absolute; top:74px; right:24px; z-index:7; width:320px; max-height:min(70vh,520px);
  display:flex; flex-direction:column; overflow:hidden;

  border-radius:12px; padding:16px; box-shadow:0 20px 50px rgba(0,0,0,.5);
  opacity:0; transform:translateY(-8px) scale(.97); pointer-events:none; transition:opacity .2s ease, transform .2s ease;
}
.player-subtitle-panel.open{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
.player-subtitle-panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.player-subtitle-panel-head b{font-size:14px; font-weight:800;}
.player-subtitle-panel .field input{background:#08090d;}
.subtitle-results-list{overflow-y:auto; flex:1 1 auto; min-height:0; display:flex; flex-direction:column; gap:8px; max-height:260px;}
.subtitle-result-row{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:#0c0e14; border:1px solid #1e2330; border-radius:8px; padding:9px 10px;
}
.subtitle-result-name{font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.subtitle-result-meta{font-size:11px; color:var(--muted); margin-top:2px;}
.subtitle-sync-row{margin-top:14px; padding-top:14px; border-top:1px solid #1a1d26;}
.subtitle-sync-label{display:flex; justify-content:space-between; align-items:baseline; font-size:11.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px;}
.subtitle-sync-label #subtitleOffsetValue{font-size:14px; font-weight:800; color:var(--highlight); text-transform:none; letter-spacing:0; font-variant-numeric:tabular-nums;}
.subtitle-sync-controls{display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:6px;}
.subtitle-sync-btn{
  flex:0 0 auto; min-width:38px; height:34px; padding:0 8px; border-radius:8px; background:#0c0e14; border:1px solid #232837;
  color:var(--text); font-size:12.5px; font-weight:800; display:flex; align-items:center; justify-content:center;
  transition:background var(--transition), border-color var(--transition), color var(--transition);
}
.subtitle-sync-btn:hover{background:var(--highlight-dim); border-color:var(--highlight); color:var(--highlight);}
.subtitle-sync-btn:active{transform:scale(.94);}
.subtitle-sync-reset{flex:0 0 34px; padding:0;}
.subtitle-sync-reset svg{width:16px; height:16px;}
@media (max-width:860px){

}
/* Brightness popover — a compact vertical slider, floats under its trigger button. Uses the classic
   rotated-horizontal-range trick (broadest cross-browser support for a vertical slider) rather than
   relying on writing-mode, which some engines still render inconsistently for range inputs. */
.player-brightness-panel{
  position:absolute; top:74px; right:100px; z-index:7; width:64px;
  display:flex; flex-direction:column; align-items:center; gap:10px; padding:16px 0 14px;
  background:rgba(12,14,20,.92); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.14);
  border-radius:14px; box-shadow:0 20px 50px rgba(0,0,0,.5);
  opacity:0; transform:translateY(-8px) scale(.97); pointer-events:none; transition:opacity .2s ease, transform .2s ease;
}
.player-brightness-panel.open{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
.player-brightness-value{font-size:13px; font-weight:800; color:var(--highlight); font-variant-numeric:tabular-nums;}
.brightness-slider-track{position:relative; width:36px; height:140px; display:flex; align-items:center; justify-content:center;}
.brightness-slider-track input[type=range]{
  width:140px; height:28px; margin:0; transform:rotate(-90deg); transform-origin:center;
  -webkit-appearance:none; appearance:none; background:transparent; cursor:pointer;
}
.brightness-slider-track input[type=range]::-webkit-slider-runnable-track{
  height:4px; border-radius:3px; background:linear-gradient(90deg, var(--highlight), rgba(255,255,255,.15));
}
.brightness-slider-track input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; margin-top:-6px; width:16px; height:16px; border-radius:50%;
  background:#fff; border:2px solid var(--highlight); box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.brightness-slider-track input[type=range]::-moz-range-track{height:4px; border-radius:3px; background:rgba(255,255,255,.15);}
.brightness-slider-track input[type=range]::-moz-range-progress{height:4px; border-radius:3px; background:var(--highlight);}
.brightness-slider-track input[type=range]::-moz-range-thumb{
  width:16px; height:16px; border-radius:50%; background:#fff; border:2px solid var(--highlight); box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.player-brightness-icon-min{color:var(--muted); display:flex;}
.player-brightness-icon-min svg{width:15px; height:15px;}
#playerBrightnessBtn.is-active{color:var(--highlight);}
@media (max-width:860px){
  .player-brightness-panel{right:12px; top:64px;}
}
/* ---------- Brightness swipe HUD ----------
   Shown only while actively dragging via initPlayerBrightnessGesture (vertical swipe-anywhere-on-
   the-stage to adjust brightness) — a compact centered pill with a fill bar, styled like the
   brightness/volume HUD most native media players show during that gesture. Purely a visual echo of
   whatever applyPlayerBrightnessLive() is already doing to the filter; it holds no state of its own.
   pointer-events:none because it sits on top of the stage during a drag that's already in progress —
   it must never itself intercept the pointermove/pointerup finishing that drag. */
.player-brightness-swipe-hud{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.94); z-index:8;
  display:flex; flex-direction:column; align-items:center; gap:10px; padding:18px 14px;
  width:56px; background:rgba(12,14,20,.82); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.14); border-radius:16px; box-shadow:0 20px 50px rgba(0,0,0,.5);
  opacity:0; pointer-events:none; transition:opacity .15s ease, transform .15s ease;
}
.player-brightness-swipe-hud.visible{opacity:1; transform:translate(-50%,-50%) scale(1);}
.player-brightness-swipe-icon{color:var(--highlight); display:flex;}
.player-brightness-swipe-icon svg{width:18px; height:18px;}
.player-brightness-swipe-track{
  position:relative; width:5px; height:110px; border-radius:3px; background:rgba(255,255,255,.15); overflow:hidden;
}
.player-brightness-swipe-fill{
  position:absolute; left:0; right:0; bottom:0; height:50%; background:var(--highlight); border-radius:3px;
}
.player-brightness-swipe-value{font-size:12.5px; font-weight:800; color:#fff; font-variant-numeric:tabular-nums;}
/* Sits directly in front of a third-party iframe embed so a click is hit-tested against this div,
   not the iframe underneath — the ad script inside the embed's page never receives the click event
   at all, which is what stops popup/redirect ads without needing the `sandbox` attribute (which some
   ad-supported mirrors detect and refuse to play against). Fully transparent, purely functional. */
/* z-index kept below player-top/player-bottom/player-next-side (5/6) so the shield never covers
   the control buttons — it only needs to beat the iframe itself, which sits at the default z:auto. */
.player-click-shield{position:absolute; inset:0; z-index:2; background:transparent; cursor:default;}
/* Subtitle overlay — sits above the click shield (z 2) so cues are always visible over an iframe
   embed, but stays pointer-events:none so it never steals the click the shield is there to catch. */
.player-subtitle-overlay{
  position:absolute; left:6%; right:6%; bottom:9%; z-index:4; text-align:center;
  pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:6px;
}
.player-subtitle-overlay:empty{display:none;}
.player-subtitle-overlay span{
  display:inline-block; background:var(--sub-bg, rgba(0,0,0,.72)); color:var(--sub-color, #fff);
  font-size:var(--sub-font-size, 19px); font-weight:600;
  line-height:1.35; padding:5px 12px; border-radius:4px; text-shadow:0 1px 3px rgba(0,0,0,.8);
}
@media (max-width:860px){
  .player-subtitle-overlay{bottom:16%;}
  .player-subtitle-overlay span{font-size:calc(var(--sub-font-size, 19px) * 0.74); padding:4px 9px;}
}
/* Settings > Subtitle Display live preview — a small mock "screen" so the sample line reads the
   way it will over actual video, not just floating on the settings page's own background. */
.subtitle-preview-box{
  position:relative; border-radius:10px; padding:34px 16px; display:flex; align-items:flex-end;
  justify-content:center; min-height:120px;
  background:linear-gradient(160deg,#1c2030,#0a0b10 70%);
  border:1px solid #232837; overflow:hidden;
}
.subtitle-preview-box span{
  display:inline-block; background:var(--sub-bg, rgba(0,0,0,.72)); color:var(--sub-color, #fff);
  font-size:var(--sub-font-size, 19px); font-weight:600; line-height:1.35; padding:5px 12px;
  border-radius:4px; text-shadow:0 1px 3px rgba(0,0,0,.8); max-width:100%; text-align:center;
}
.player-overlay.controls-hidden .player-top-info,
.player-overlay.controls-hidden .player-top-fade,
.player-overlay.controls-hidden .player-bottom,
.player-overlay.controls-hidden .player-next-side{
  opacity:0; pointer-events:none;
}
/* Fullscreen-only: the pinned group (Subtitles/Brightness/Hide screen/Lock) normally ignores
   controls-hidden (see .player-top-pinned above) so it's always reachable in the windowed player —
   but in fullscreen the whole point is an unobstructed screen, so it fades out with everything else
   here instead. is-fullscreen is toggled by the fullscreenchange listener; controls-hidden is the
   same auto-hide class the rest of the UI already uses, so a single tap/click anywhere (see the
   document-level interaction listeners near scheduleHideControls) brings it straight back. */
.player-overlay.is-fullscreen.controls-hidden .player-top-pinned{
  opacity:0; pointer-events:none;
}
/* LOCK: hides every player control except the Lock button itself (so it stays reachable to
   unlock) — guards against accidental taps while the video is, say, in a pocket or being handed to
   someone else. Uses !important so it wins regardless of the double-tap-to-seek reveal
   (.center-skip-visible) or the auto-hide timer's own opacity rules.
   Hide Screen and Brightness are included here too — while locked, both buttons disappear along
   with everything else. For Hide Screen that's purely cosmetic: activating it is still possible via
   the double-tap-anywhere gesture (see initPlayerHideGesture), which is bound on the stage itself
   and has nothing to do with whether this button is visible, so the feature keeps working even
   though the button doesn't. Brightness has no such back door, so locking it out is the real thing —
   without this it stayed reachable (and, in fullscreen once a tap revealed the pinned group, openable)
   even while "locked", which defeated the point of locking. */
.player-overlay.controls-locked .player-top-fade,
.player-overlay.controls-locked #playerSubtitleBtn,
.player-overlay.controls-locked #playerHideScreenBtn,
.player-overlay.controls-locked #playerBrightnessBtn,
.player-overlay.controls-locked .player-center-skip-group,
.player-overlay.controls-locked .player-bottom,
.player-overlay.controls-locked .player-next-side{
  opacity:0 !important; pointer-events:none !important;
}
/* Lock itself: normally part of the always-visible pinned group (see .player-top-pinned above), but
   while locked it instead joins the ordinary auto-hide cadence — fading out after a few seconds of
   inactivity and reappearing on a single tap/click anywhere, exactly like the rest of the controls
   (see scheduleHideControls and the document-level interaction listeners). No !important here on
   purpose: unlike the rest of this block, this one's meant to come back on its own with a tap, not
   stay forced off. */
#playerLockBtn{transition:opacity .25s ease;}
.player-overlay.controls-locked.controls-hidden #playerLockBtn{
  opacity:0; pointer-events:none;
}
#playerLockBtn.is-active{background:var(--highlight-dim); border-color:var(--highlight); color:var(--highlight);}
.up-next{
  position:absolute; bottom:100px; right:24px; z-index:6; display:flex; align-items:center; gap:14px;
  background:rgba(10,11,16,.94); border:1px solid #232837; border-radius:14px; padding:14px; max-width:400px;
  box-shadow:0 24px 60px rgba(0,0,0,.55); font-size:13px; animation:upNextRise .4s cubic-bezier(.16,1,.3,1) both;

.up-next-thumb{width:84px; height:47px; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--surface2);}
.up-next-thumb img{width:100%; height:100%; object-fit:cover;}

.up-next-label{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--highlight);}
.up-next-title{font-size:13px; font-weight:700; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.up-next-progress{height:3px; border-radius:3px; background:rgba(255,255,255,.12); overflow:hidden; margin-top:2px;}
.up-next-progress > div{height:100%; width:0%; background:linear-gradient(90deg,var(--highlight),#2bc4c1);}
.up-next-actions{display:flex; flex-direction:column; gap:6px; flex-shrink:0;}
.up-next-actions .btn{padding:7px 12px; font-size:11.5px; white-space:nowrap; justify-content:center;}
@media (max-width:860px){

  .pns-play-icon svg{width:15px; height:15px;}
  .up-next{right:12px; left:12px; max-width:none; bottom:88px; flex-wrap:wrap;}
  /* Progress bar takes priority on narrow screens — tighten the transport-button spacing and

  .player-bottom{gap:8px; padding:10px 12px 14px;}
  .player-bottom-left{gap:0;}

.schedule-countdown{
  flex-shrink:0; background:var(--highlight-dim); border:1px solid rgba(61,219,217,.3); color:var(--highlight);
  font-weight:800; font-size:12.5px; padding:6px 12px; border-radius:20px; font-family:var(--display-font); white-space:nowrap;
}
@media (max-width:860px){
  .schedule-time{width:48px; font-size:12px;}
  .schedule-thumb{width:44px; height:44px;}
  .schedule-network{display:none;}
}

/* Home nav button — big, blue, centered, raised above the mobile bottom bar, ALWAYS (not just
   when active) — !important needed because .bottom-nav .nav-item.active has higher specificity
   (3 classes vs 2) and would otherwise override this back to transparent specifically when the
   Home tab itself is the active route. */
.bottom-nav .nav-item-home{
  flex:0 0 auto; width:56px; height:56px; border-radius:50%; position:relative; top:-16px;
  background:linear-gradient(135deg, var(--highlight), #2bc4c1) !important; color:#04211f !important;
  box-shadow:0 6px 18px rgba(61,219,217,.45), 0 0 0 4px var(--bg);
  justify-content:center; align-items:center;
}
.bottom-nav .nav-item-home svg{width:24px; height:24px;}
.bottom-nav .nav-item-home span{display:none;}
.bottom-nav .nav-item-home::after{display:none;}
.bottom-nav .nav-item-home:hover{transform:translateY(-2px);}
.sidebar .nav-item-home{background:var(--highlight-dim) !important; color:var(--highlight) !important; font-weight:800;}
.channel-card{
  position:relative; background:var(--surface); border:1px solid #1a1d26; border-radius:12px; padding:14px;
  display:flex; align-items:center; gap:14px; cursor:pointer;
  transition:transform var(--transition), background var(--transition), border-color var(--transition);
}
.channel-card:hover{transform:translateY(-2px); background:#141721; border-color:rgba(61,219,217,.3);}
.channel-logo{
  width:52px; height:52px; border-radius:10px; overflow:hidden; background:var(--surface2);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.channel-logo img{width:100%; height:100%; object-fit:contain;}
.channel-logo .poster-fallback{font-size:20px; border-radius:10px;}
.channel-info{flex:1; min-width:0;}
.channel-name{font-weight:800; font-size:14px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.channel-cat{font-size:11px; color:var(--muted);}
.channel-live-dot{width:8px; height:8px; border-radius:50%; background:#ff4757; box-shadow:0 0 8px rgba(255,71,87,.6); flex-shrink:0; animation:liveBlink 1.8s ease-in-out infinite;}
.channel-card .btn-icon{width:30px; height:30px; flex-shrink:0;}
.channel-card .btn-icon svg{width:13px; height:13px;}
@media (max-width:860px){
  .channel-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
}

/* ---------- Settings ---------- */
.settings-section{background:var(--surface); border:1px solid #1a1d26; border-radius:12px; padding:22px; margin-bottom:18px; max-width:560px;}
.settings-section h3{
  font-size:15px; font-weight:800; margin-bottom:16px; cursor:pointer; user-select:none;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  transition:margin-bottom .28s ease;
}
.settings-section h3:hover .settings-chevron{color:var(--highlight);}
.settings-title-text{display:flex; align-items:center; flex-wrap:wrap; gap:6px;}
.settings-chevron{display:flex; flex-shrink:0; color:var(--muted); transition:transform .25s ease, color var(--transition);}
.settings-chevron svg{width:18px; height:18px;}
/* Collapsed state: chevron points sideways, the h3's bottom margin collapses along with the body so
   there's no leftover gap, and the body itself shrinks via max-height rather than display:none so it
   can actually transition instead of popping. max-height is a generous fixed value rather than the
   real content height (which JS would have to measure) — every section here comfortably fits under
   it, so the eased curve still reads as a smooth open/close in practice. */
.settings-section.is-collapsed h3{margin-bottom:0;}
.settings-section.is-collapsed .settings-chevron{transform:rotate(-90deg);}
.settings-section-body{
  max-height:1200px; opacity:1; overflow:hidden;
  transition:max-height .32s ease, opacity .25s ease, margin-top .32s ease;
}
.settings-section.is-collapsed .settings-section-body{max-height:0; opacity:0; pointer-events:none;}
.settings-row{display:flex; gap:10px; margin-bottom:12px;}
.manage-lib-rows{display:flex; flex-direction:column; max-height:420px; overflow-y:auto; border:1px solid #1a1d26; border-radius:10px; margin-top:14px;}
.manage-lib-row{display:flex; align-items:center; gap:14px; padding:10px 12px; border-bottom:1px solid #1a1d26;}
.manage-lib-row:last-child{border-bottom:none;}
.manage-lib-poster{width:44px; aspect-ratio:2/3; border-radius:6px; overflow:hidden; flex-shrink:0; background:var(--surface2);}
.manage-lib-poster img{width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity .4s ease;}
.manage-lib-poster img.loaded{opacity:1;}
.manage-lib-poster .poster-fallback{font-size:14px; border-radius:6px;}
.manage-lib-info{flex:1; min-width:0;}
.manage-lib-title{font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.manage-lib-meta{font-size:12px; color:var(--muted);}
.manage-lib-actions{display:flex; gap:6px; flex-shrink:0;}
.manage-lib-empty{padding:18px; text-align:center; color:var(--muted); font-size:13px;}
.link-health-row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  background:#0c0e14; border:1px solid #232837; border-radius:10px; padding:10px 12px;
}
.link-health-title{font-size:13px; font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.link-health-url{font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.toggle-row{display:flex; align-items:center; gap:12px; margin-top:2px;}
.toggle-row-label{font-size:13px; font-weight:700; color:var(--text);}
.switch{position:relative; display:inline-block; width:44px; height:25px; flex-shrink:0;}
.switch input{opacity:0; width:0; height:0;}
.switch-slider{position:absolute; cursor:pointer; inset:0; background:#232837; border:1px solid #2c3244; border-radius:25px; transition:background var(--transition), border-color var(--transition);}
.switch-slider::before{
  content:''; position:absolute; height:17px; width:17px; left:3px; top:3px; border-radius:50%;
  background:#8a9997; transition:transform var(--transition), background var(--transition);
}
.switch input:checked + .switch-slider{background:var(--highlight-dim); border-color:rgba(61,219,217,.5);}
.switch input:checked + .switch-slider::before{transform:translateX(19px); background:var(--highlight); box-shadow:0 0 8px rgba(61,219,217,.5);}

/* ---------- Toast ---------- */
#toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); z-index:300;
  background:var(--surface2); border:1px solid #232837; padding:12px 20px; border-radius:8px; font-size:13.5px; font-weight:600;
  opacity:0; transition:all var(--transition); pointer-events:none; box-shadow:0 10px 30px rgba(0,0,0,.4);
  display:flex; align-items:center; gap:14px;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0); bottom:76px;}
#toast.has-action{pointer-events:auto;}
.toast-undo-btn{
  background:none; border:none; color:var(--highlight); font-size:13px; font-weight:800;
  white-space:nowrap; letter-spacing:.02em; padding:2px; cursor:pointer;
}
.toast-undo-btn:hover{text-decoration:underline;}

/* ---------- Mobile bottom nav ---------- */
.bottom-nav{display:none;}
@media (max-width:860px){
  .sidebar{display:none;}
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; z-index:50; background:var(--surface);
    border-top:1px solid #1a1d26; padding:8px 6px calc(8px + env(safe-area-inset-bottom)) 6px; justify-content:space-around;
  }
  .bottom-nav .nav-item{flex-direction:column; gap:3px; font-size:10px; padding:6px 8px; flex:1; align-items:center; text-align:center; border-radius:8px; position:relative;}
  .bottom-nav .nav-item.active{background:transparent; color:var(--highlight);}
  .bottom-nav .nav-item::before{display:none;}
  .bottom-nav .nav-item.active svg{filter:drop-shadow(0 0 6px rgba(61,219,217,.6));}
  .bottom-nav .nav-item.active::after{
    content:''; position:absolute; bottom:-1px; left:50%; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background:var(--highlight); box-shadow:0 0 6px rgba(61,219,217,.7);
  }
  .main{padding-bottom:90px;}
  .page, .topbar{padding-left:16px; padding-right:16px;}
  .hero-carousel{margin:14px 16px 0 16px; height:50vh;}
  .hero-content{padding:22px;}
  .hero-content h2{font-size:26px;}
  .hero-logo-slot{min-height:78px; margin-bottom:12px;}
  .hero-logo{max-width:240px; max-height:78px;}
  .detail-backdrop{margin:14px 16px;}
  .detail-body{padding:0 16px;}
  .row-head, .row-track, .episode-list{padding-left:16px; padding-right:16px;}
  .filter-bar{padding-right:16px;}
  /* iOS Safari auto-zooms the whole page in when a focused text field's computed font-size is under
     16px, and — since this is a hash-routed SPA with no real page reload — that zoomed-in state just
     carries over when you then navigate to another route. The fixed .bottom-nav (with the Home
     button) doesn't scroll away like normal content, so it's what makes the leftover zoom obvious:
     it ends up looking blown up on whatever page you land on next, most noticeably the detail/"more
     info" page reached right after tapping a search result. Forcing every field to 16px here stops
     the zoom from triggering in the first place, without changing how anything actually looks (the
     16px only applies while the field has focus/text entry on a touch device).*/
  input, select, textarea{font-size:16px !important;}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none !important; animation:none !important;}
}

/* ==========================================================
   ANDROID TV LAYOUT
   Detected via: URL param ?tv=1  OR  screen width >= 1280px
   and no fine pointer (i.e. a TV / D-pad device, not a desktop mouse)
   ========================================================== */
body.tv-mode {
  font-size: 18px;
}
/* Hide mobile bottom nav and regular sidebar in TV mode */
body.tv-mode .bottom-nav { display: none !important; }

/* TV sidebar — wider, larger text, taller items */
body.tv-mode .sidebar {
  width: 280px;
  padding: 32px 20px;
  gap: 6px;
}
body.tv-mode .brand { padding-bottom: 28px; margin-bottom: 16px; }
body.tv-mode .brand .mark { width: 42px; height: 42px; font-size: 18px; }
body.tv-mode .brand span { font-size: 22px; }

body.tv-mode .nav-item {
  padding: 16px 18px;
  font-size: 16px;
  border-radius: 12px;
  gap: 16px;
}
body.tv-mode .nav-item svg { width: 24px; height: 24px; }

/* TV focus ring — D-pad navigation highlights focused elements */
body.tv-mode *:focus {
  outline: 3px solid var(--highlight) !important;
  outline-offset: 3px !important;
}
body.tv-mode .nav-item:focus {
  background: var(--highlight-dim);
  color: var(--highlight);
  outline: 3px solid var(--highlight) !important;
}

/* TV topbar */
body.tv-mode .topbar {
  padding: 22px 48px;
}
body.tv-mode .topbar h1 { font-size: 30px; }

/* TV page padding */
body.tv-mode .page { padding: 0 48px; }
body.tv-mode .hero-carousel { margin: 24px 48px 12px 48px; height: 58vh; }
body.tv-mode .hero-content h2 { font-size: 52px; }
body.tv-mode .hero-logo-slot { min-height: 156px; }
body.tv-mode .hero-logo { max-width: 500px; max-height: 156px; }
body.tv-mode .hero-content p { font-size: 17px; }
body.tv-mode .hero-btns .btn { padding: 16px 32px; font-size: 16px; }
body.tv-mode .hero-nav-btn { opacity: 1; width: 52px; height: 52px; } /* always visible on TV */

/* TV cards — bigger, always show overlay, larger focus ring */
body.tv-mode .card { flex: 0 0 220px; width: 220px; border-radius: 14px; }
body.tv-mode .card:focus,
body.tv-mode .card:focus-within {
  transform: scale(1.09) translateY(-6px);
  box-shadow: 0 24px 50px rgba(0,0,0,.7), 0 0 0 3px var(--highlight);
  border-color: var(--highlight);
  z-index: 5;
  outline: none !important;
}
body.tv-mode .card .card-overlay { opacity: 1; } /* always show title/play on TV */
body.tv-mode .card .card-play { width: 44px; height: 44px; }
body.tv-mode .card .card-play svg { width: 20px; height: 20px; }
body.tv-mode .card .card-title { font-size: 14px; }
body.tv-mode .card .card-meta { font-size: 12px; }
body.tv-mode .card-badge { font-size: 11px; padding: 4px 10px; }
body.tv-mode .row-head h3 { font-size: 22px; }
body.tv-mode .row-head { padding: 0 48px; }
body.tv-mode .row-track { padding: 10px 48px 28px 48px; gap: 20px; }

/* TV buttons — larger tap targets */
body.tv-mode .btn { padding: 14px 24px; font-size: 15px; border-radius: 10px; }
body.tv-mode .btn:focus { outline: 3px solid var(--highlight) !important; }
body.tv-mode .btn-icon { width: 48px; height: 48px; }

/* TV detail page */
body.tv-mode .detail-backdrop { margin: 24px 48px; }
body.tv-mode .detail-body { padding: 0 48px; gap: 36px; }
body.tv-mode .detail-top { gap: 36px; }
body.tv-mode .detail-poster { width: 220px; }
body.tv-mode .detail-top h2 { font-size: 38px; }
body.tv-mode .detail-desc { font-size: 16px; }
body.tv-mode .tag { font-size: 14px; padding: 6px 14px; }

/* TV episode list */
body.tv-mode .episode-card { padding: 14px; gap: 20px; }
body.tv-mode .episode-card:focus { 
  background: var(--highlight-dim); 
  border-color: rgba(61,219,217,.5);
  outline: 3px solid var(--highlight) !important;
  transform: translateX(6px);
}
body.tv-mode .ep-thumb { width: 150px; height: 85px; }
body.tv-mode .ep-info .ep-title { font-size: 17px; }
body.tv-mode .ep-overview { font-size: 14px; }

/* TV player controls — larger */
body.tv-mode .player-title { font-size: 20px; }
body.tv-mode .player-sub { font-size: 15px; }
body.tv-mode .player-top { padding: 28px 40px; }
body.tv-mode .player-top-actions .btn-icon { width: 52px; height: 52px; }
body.tv-mode .player-top-actions .btn-icon svg { width: 22px; height: 22px; }
body.tv-mode .player-bottom { padding: 24px 40px; }
body.tv-mode .player-bottom .btn-icon { width: 52px; height: 52px; }
body.tv-mode .player-bottom .btn-icon svg { width: 22px; height: 22px; }
body.tv-mode .player-time { font-size: 16px; }
body.tv-mode .player-progress-track { height: 22px; }

/* TV settings */
body.tv-mode .settings-section { max-width: 720px; padding: 28px; }
body.tv-mode .settings-section h3 { font-size: 18px; }
body.tv-mode .field label { font-size: 13px; }
body.tv-mode .field input,
body.tv-mode .field textarea,
body.tv-mode .field select { font-size: 16px; padding: 14px 16px; }

/* TV on-screen D-pad hint bar */
#tvDpadHint {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 999;
  background: rgba(8,9,13,.92);
  border-top: 1px solid #1a1d26;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 10px 32px;
  font-size: 13px;
  color: var(--muted);
  backdrop-filter: blur(10px);
}
body.tv-mode #tvDpadHint { display: flex; }
#tvDpadHint span { display: flex; align-items: center; gap: 6px; }
#tvDpadHint kbd {
  background: #1e2330; border: 1px solid #2c3244; border-radius: 6px;
  padding: 3px 8px; font-size: 12px; color: var(--text); font-family: inherit;
  box-shadow: 0 2px 0 #0a0b10;
}
body.tv-mode .main { padding-bottom: 52px; } /* room for D-pad hint bar */
</style>
</head>

const LIB_KEY = 'sv_library';
