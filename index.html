<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090d;
  --surface:#0f1117;
  --surface2:#161923;
  --primary:#0D4A4A;
  --highlight:#3ddbd9;
  --highlight-dim:rgba(61,219,217,.16);
  --text:#e8f0ef;
  --muted:#5a7a78;
  --radius:10px;
  --display-font:'Inter Tight','Inter',system-ui,sans-serif;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(1100px 620px at 12% -8%, rgba(13,74,74,.35), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(61,219,217,.05), transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  font-feature-settings:'ss01' 1, 'cv05' 1;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img{-webkit-user-drag:none;user-select:none;}
button{font-family:inherit; cursor:pointer; border:none; outline:none; background:none; color:inherit;}
input,select,textarea{font-family:inherit; color:var(--text); outline:none;}
a{color:inherit; text-decoration:none;}
::-webkit-scrollbar{height:8px; width:8px;}
::-webkit-scrollbar-thumb{background:#1d2230; border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
:focus-visible{outline:2px solid var(--highlight); outline-offset:2px;}

/* ---------- Layout shell ---------- */
#app{display:flex; min-height:100vh;}

.sidebar{
  width:230px; flex-shrink:0; background:var(--surface);
  border-right:1px solid #1a1d26; padding:26px 16px;
  display:flex; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh;
}
.brand{
  display:flex; align-items:center; gap:11px; padding:2px 8px 24px 8px; margin-bottom:12px;
  border-bottom:1px solid #1a1d26;
}
.brand .mark{
  width:34px; height:34px; border-radius:9px;
  background:linear-gradient(135deg,var(--highlight),var(--primary) 78%);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; color:#04211f; font-size:15px; font-family:var(--display-font);
  box-shadow:0 4px 16px rgba(61,219,217,.28);
}
.brand span{font-weight:800; font-size:17px; letter-spacing:.1px; font-family:var(--display-font);}

.nav-item{
  display:flex; align-items:center; gap:12px;
  padding:11px 13px; border-radius:9px; color:var(--muted); position:relative;
  font-size:13.5px; font-weight:600; transition:background var(--transition), color var(--transition);
}
.nav-item svg{width:18px; height:18px; flex-shrink:0; transition:transform var(--transition);}
.nav-item:hover{background:#161923; color:var(--text);}
.nav-item:hover svg{transform:translateY(-1px);}
.nav-item.active{background:linear-gradient(90deg, var(--highlight-dim), transparent); color:var(--highlight); font-weight:700;}
.nav-item.active::before{
  content:''; position:absolute; left:-16px; top:50%; transform:translateY(-50%);
  width:3px; height:18px; border-radius:0 3px 3px 0; background:var(--highlight);
}

.main{flex:1; min-width:0; padding-bottom:60px;}
.topbar{
  position:sticky; top:0; z-index:20; backdrop-filter:blur(16px) saturate(140%);
  background:rgba(8,9,13,.68); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; gap:16px;
  border-bottom:1px solid #14161f; transition:box-shadow var(--transition);
}
.topbar.scrolled{box-shadow:0 8px 24px rgba(0,0,0,.35);}
.topbar h1{font-size:23px; font-weight:800; letter-spacing:.1px; font-family:var(--display-font);}
.topbar-actions{display:flex; gap:10px; align-items:center;}

.btn{
  padding:10px 18px; border-radius:8px; font-weight:700; font-size:13.5px;
  transition:transform var(--transition), background var(--transition), opacity var(--transition), box-shadow var(--transition);
  display:inline-flex; align-items:center; gap:8px; white-space:nowrap;
}
.btn svg{width:15px; height:15px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(135deg, var(--highlight), #2bc4c1); color:#04211f; box-shadow:0 4px 18px rgba(61,219,217,.22);}
.btn-primary:hover{box-shadow:0 6px 22px rgba(61,219,217,.36); transform:translateY(-1px);}
.btn-ghost{background:#161923; color:var(--text); border:1px solid #232837;}
.btn-ghost:hover{background:#1c2130; border-color:#2c3244;}
.btn-danger{background:#3a1218; color:#ff8b93; border:1px solid #4d1a20;}
.btn-danger:hover{background:#481318;}
.btn-icon{width:38px; height:38px; border-radius:8px; background:#161923; display:flex; align-items:center; justify-content:center; border:1px solid #232837; transition:background var(--transition), border-color var(--transition), transform var(--transition);}
.btn-icon:hover{background:#1c2130; border-color:#2c3244; transform:translateY(-1px);}
.btn-icon svg{width:16px; height:16px;}

.topbar-search{display:flex; align-items:center; overflow:hidden; transition:width var(--transition);}
.global-search-input{
  width:0; opacity:0; background:#12141c; border:1px solid #232837; border-radius:20px;
  padding:0; font-size:13.5px; color:var(--text); transition:width var(--transition), opacity var(--transition), padding var(--transition);
  pointer-events:none;
}
.topbar-search.open .global-search-input{width:230px; opacity:1; padding:9px 16px; pointer-events:auto; margin-right:2px;}
.global-search-results{
  position:absolute; top:66px; right:32px; width:340px; max-height:420px; overflow-y:auto;
  background:var(--surface); border:1px solid #1e2330; border-radius:14px; box-shadow:0 24px 60px rgba(0,0,0,.5);
  z-index:60; display:none; padding:8px;
}
.global-search-results.show{display:block;}
.gsr-item{display:flex; gap:12px; align-items:center; padding:8px; border-radius:10px; cursor:pointer; transition:background var(--transition);}
.gsr-item:hover{background:#161923;}
.gsr-poster{width:38px; height:56px; border-radius:6px; overflow:hidden; flex-shrink:0; background:var(--surface2);}
.gsr-poster img{width:100%; height:100%; object-fit:cover;}
.gsr-poster .poster-fallback{font-size:16px;}
.gsr-title{font-size:13px; font-weight:700;}
.gsr-meta{font-size:11px; color:var(--muted); margin-top:2px;}
.gsr-empty{padding:16px; text-align:center; color:var(--muted); font-size:13px;}
@media (max-width:860px){
  .global-search-results{right:16px; left:16px; width:auto;}
  .topbar-search.open .global-search-input{width:150px;}
}

.page{padding:0 32px; animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Hero ---------- */
.hero-carousel{
  position:relative; height:64vh; min-height:420px; max-height:600px;
  border-radius:18px; overflow:hidden; margin:20px 32px 8px 32px;
  border:1px solid #171a24; background:#0c0e13;
}
.hero-track{display:flex; height:100%; transition:transform .65s cubic-bezier(.65,0,.35,1);}
.hero-slide{position:relative; flex:0 0 100%; width:100%; height:100%; display:flex; align-items:flex-end; cursor:pointer;}
.hero-slide img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.6;}
.hero-slide::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(0deg, var(--bg) 2%, rgba(8,9,13,.45) 42%, rgba(8,9,13,.1) 100%),
             linear-gradient(90deg, rgba(8,9,13,.92) 0%, rgba(8,9,13,.35) 55%, rgba(8,9,13,.05) 100%);
}
.hero-content{position:relative; z-index:2; padding:44px; max-width:600px;}
.hero-badge{
  display:inline-flex; align-items:center; gap:6px; background:var(--highlight-dim); color:var(--highlight);
  font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  padding:5px 11px; border-radius:20px; margin-bottom:16px; border:1px solid rgba(61,219,217,.25);
}
.hero-content h2{font-family:var(--display-font); font-size:44px; font-weight:900; margin-bottom:12px; line-height:1.05; letter-spacing:-.01em; text-shadow:0 4px 24px rgba(0,0,0,.5);}
.hero-content p{color:#c7d5d3; font-size:15px; line-height:1.6; margin-bottom:22px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
.hero-btns{display:flex; gap:12px;}
.hero-btns .btn{position:relative; z-index:3;}
.hero-btns .btn-primary{padding:12px 24px; font-size:14px;}
.hero-progress{margin-top:16px; width:260px; height:4px; border-radius:3px; background:rgba(255,255,255,.12); overflow:hidden;}
.hero-progress > div{height:100%; background:linear-gradient(90deg, var(--highlight), #2bc4c1); box-shadow:0 0 10px rgba(61,219,217,.5);}
.hero-dots{position:absolute; z-index:4; bottom:22px; right:32px; display:flex; gap:7px;}
.hero-dot{width:24px; height:4px; border-radius:3px; background:rgba(255,255,255,.25); transition:all var(--transition);}
.hero-dot.active{background:var(--highlight); width:34px; box-shadow:0 0 8px rgba(61,219,217,.5);}
.hero-nav-btn{
  position:absolute; top:50%; transform:translateY(-50%); z-index:4; width:40px; height:40px; border-radius:50%;
  background:rgba(8,9,13,.55); border:1px solid rgba(255,255,255,.15); color:var(--text);
  display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity var(--transition), background var(--transition);
  backdrop-filter:blur(6px);
}
.hero-nav-btn svg{width:18px; height:18px;}
.hero-carousel:hover .hero-nav-btn{opacity:1;}
.hero-nav-btn:hover{background:rgba(8,9,13,.85);}
.hero-nav-prev{left:16px;}
.hero-nav-next{right:16px;}
@media (max-width:860px){
  .hero-nav-btn{display:none;}
  .hero-dots{right:16px; bottom:14px;}
}

/* ---------- Rows / Cards ---------- */
.row{margin:38px 0;}
.row-head{display:flex; align-items:center; justify-content:space-between; padding:0 32px; margin-bottom:16px;}
.row-head h3{font-size:18px; font-weight:800; font-family:var(--display-font); letter-spacing:.1px; position:relative; padding-left:14px;}
.row-head h3::before{content:''; position:absolute; left:0; top:2px; bottom:2px; width:3px; border-radius:2px; background:linear-gradient(180deg, var(--highlight), var(--primary));}
.row-track{display:flex; gap:16px; overflow-x:auto; padding:8px 32px 22px 32px; scroll-behavior:smooth;}
.row-track::-webkit-scrollbar{display:none;}

.card{
  position:relative; flex:0 0 190px; width:190px; border-radius:12px; overflow:hidden;
  background:var(--surface); cursor:pointer; border:1px solid #191c26;
  transition:transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  aspect-ratio:2/3;
}
.card:hover{transform:scale(1.07) translateY(-2px); z-index:5; box-shadow:0 20px 44px rgba(0,0,0,.6), 0 0 0 1px rgba(61,219,217,.35); border-color:rgba(61,219,217,.35);}
.card img{width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity .4s ease;}
.card img.loaded, .card img[data-loaded]{opacity:1;}
.card .poster-fallback{
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  font-size:44px; font-weight:900; color:var(--highlight); font-family:var(--display-font);
  background:linear-gradient(135deg,var(--primary),var(--surface));
}
.card-badge{
  position:absolute; top:9px; left:9px; background:rgba(8,9,13,.8); backdrop-filter:blur(4px);
  color:var(--highlight); font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.06em;
  padding:3px 8px; border-radius:20px; border:1px solid rgba(61,219,217,.25);
}
.card-new{
  position:absolute; top:9px; right:9px; background:var(--highlight); color:#04211f;
  font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.06em;
  padding:3px 8px; border-radius:20px; box-shadow:0 2px 10px rgba(61,219,217,.4);
}
.card-remove{
  position:absolute; top:9px; right:9px; width:24px; height:24px; border-radius:50%;
  background:rgba(8,9,13,.85); border:1px solid #2c3244; color:var(--text);
  display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity var(--transition), background var(--transition);
  z-index:2;
}
.card-remove svg{width:11px; height:11px;}
.card:hover .card-remove{opacity:1;}
.card-remove:hover{background:#3a1218; border-color:#4d1a20; color:#ff8b93;}
.card-progress{position:absolute; left:0; right:0; bottom:0; height:4px; background:rgba(255,255,255,.15);}
.card-progress > div{height:100%; background:linear-gradient(90deg, var(--highlight), #2bc4c1);}
.card-overlay{
  position:absolute; inset:0; opacity:0; transition:opacity var(--transition);
  background:linear-gradient(0deg, rgba(5,6,9,.97) 8%, rgba(5,6,9,.25) 58%, transparent 100%);
  display:flex; flex-direction:column; justify-content:flex-end; padding:13px;
}
.card:hover .card-overlay{opacity:1;}
.card-play{
  width:34px; height:34px; border-radius:50%; background:var(--highlight); color:#04211f;
  display:flex; align-items:center; justify-content:center; margin-bottom:9px; transition:transform var(--transition), box-shadow var(--transition);
  box-shadow:0 4px 16px rgba(61,219,217,.4);
}
.card-play svg{width:14px; height:14px;}
.card:hover .card-play{transform:scale(1.1);}
.card-title{font-size:12.5px; font-weight:700; line-height:1.3; margin-bottom:2px;}
.card-meta{font-size:10.5px; color:var(--muted);}

.empty-state{
  text-align:center; padding:90px 24px; color:var(--muted);
}
.empty-state .empty-icon{
  width:56px; height:56px; border-radius:16px; margin:0 auto 20px auto; display:flex; align-items:center; justify-content:center;
  background:var(--highlight-dim); color:var(--highlight); border:1px solid rgba(61,219,217,.25);
}
.empty-state .empty-icon svg{width:26px; height:26px;}
.empty-state h3{color:var(--text); font-size:20px; margin-bottom:8px; font-family:var(--display-font); font-weight:800;}
.empty-state p{margin-bottom:22px; font-size:14px; max-width:340px; margin-left:auto; margin-right:auto;}

/* ---------- Library ---------- */
.filter-bar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:20px 0 26px 0; padding:0 32px 0 0;}
.chip-btn{padding:8px 16px; border-radius:20px; background:#12141c; color:var(--muted); font-size:13px; font-weight:700; border:1px solid #232837; transition:all var(--transition);}
.chip-btn:hover{border-color:#333a4d; color:var(--text);}
.chip-btn.active{background:var(--highlight-dim); color:var(--highlight); border-color:rgba(61,219,217,.4);}
.search-input{
  flex:1; min-width:180px; max-width:320px; background:#12141c; border:1px solid #232837; border-radius:20px;
  padding:10px 16px; font-size:13.5px; color:var(--text); transition:border-color var(--transition);
}
.search-input:focus{border-color:rgba(61,219,217,.45);}
.search-input::placeholder{color:var(--muted);}
.select-input{background:#12141c; border:1px solid #232837; border-radius:20px; padding:9px 14px; font-size:13px; color:var(--text);}

.grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:18px; padding-bottom:20px;
}
.grid .card{width:100%; flex:none;}

/* ---------- Detail ---------- */
.detail-backdrop{position:relative; height:44vh; min-height:300px; border-radius:16px; overflow:hidden; margin:20px 32px;}
.detail-backdrop img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.5;}
.detail-backdrop::after{content:''; position:absolute; inset:0; background:linear-gradient(0deg,var(--bg) 2%, transparent 80%);}
.detail-body{padding:0 32px; margin-top:-90px; position:relative; z-index:2; display:flex; gap:28px;}
.detail-poster{width:180px; flex-shrink:0; border-radius:10px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,.5); aspect-ratio:2/3;}
.detail-poster img{width:100%; height:100%; object-fit:cover; display:block;}
.detail-info{flex:1; min-width:0; padding-top:96px;}
.detail-info h2{font-size:30px; font-weight:800; margin-bottom:10px;}
.detail-tags{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
.tag{background:#161923; border:1px solid #232837; padding:4px 10px; border-radius:6px; font-size:11.5px; color:var(--muted); font-weight:700;}
.detail-desc{color:#c7d5d3; font-size:14px; line-height:1.6; max-width:680px; margin-bottom:22px;}
.detail-cast{margin-bottom:22px;}
.detail-cast-label{display:block; font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:9px;}
.detail-cast-tags{display:flex; flex-wrap:wrap; gap:8px;}
.detail-actions{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;}

.season-tabs{display:flex; gap:8px; margin:30px 32px 16px 32px; flex-wrap:wrap;}
.episode-list{padding:0 32px; display:flex; flex-direction:column; gap:10px;}
.episode-card{
  display:flex; gap:14px; background:var(--surface); border:1px solid #1a1d26; border-radius:10px; padding:10px;
  align-items:center; cursor:pointer; transition:background var(--transition), transform var(--transition);
}
.episode-card:hover{background:#141721; transform:translateX(3px);}
.ep-thumb{width:120px; height:68px; border-radius:6px; overflow:hidden; flex-shrink:0; background:#161923; position:relative;}
.ep-thumb img{width:100%; height:100%; object-fit:cover;}
.ep-thumb .ep-num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--muted); font-size:20px;}
.ep-progress{position:absolute; left:0; right:0; bottom:0; height:3px; background:rgba(255,255,255,.15);}
.ep-progress > div{height:100%; background:var(--highlight);}
.ep-info{flex:1; min-width:0;}
.ep-info .ep-title{font-weight:700; font-size:14px; margin-bottom:3px; display:flex; align-items:center; gap:8px;}
.ep-info .ep-sub{font-size:12px; color:var(--muted);}
.ep-check{width:20px; height:20px; border-radius:50%; background:var(--highlight); color:#04211f; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.ep-check svg{width:12px; height:12px;}
.ep-watch-toggle{
  width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background:#161923; border:1px solid #232837; color:var(--muted); transition:all var(--transition);
}
.ep-watch-toggle svg{width:14px; height:14px;}
.ep-watch-toggle:hover{border-color:rgba(61,219,217,.4); color:var(--highlight);}
.ep-watch-toggle.is-watched{background:var(--highlight); border-color:var(--highlight); color:#04211f;}

/* ---------- Modal / overlay ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(4,5,8,.78); backdrop-filter:blur(10px); z-index:100;
  display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity var(--transition);
  padding:20px;
}
.overlay.open{opacity:1; pointer-events:auto;}
.modal{
  background:var(--surface); border:1px solid #1e2330; border-radius:16px; width:100%; max-width:640px;
  max-height:88vh; overflow-y:auto; padding:30px; transform:translateY(16px) scale(.98); transition:transform var(--transition);
  box-shadow:0 30px 80px rgba(0,0,0,.55);
}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:18px; border-bottom:1px solid #1a1d26;}
.modal-head h2{font-size:19px; font-weight:800; font-family:var(--display-font);}

.field{margin-bottom:16px;}
.field label{display:block; font-size:11.5px; font-weight:700; color:var(--muted); margin-bottom:7px; text-transform:uppercase; letter-spacing:.05em;}
.field input, .field textarea, .field select{
  width:100%; background:#0c0e14; border:1px solid #232837; border-radius:8px; padding:11px 13px; font-size:14px;
  transition:border-color var(--transition), box-shadow var(--transition);
}
.field input:focus, .field textarea:focus, .field select:focus{border-color:rgba(61,219,217,.5); box-shadow:0 0 0 3px rgba(61,219,217,.1);}
.field textarea{resize:vertical; min-height:70px;}
.field-row{display:flex; gap:12px;}
.field-row .field{flex:1;}
.field-hint{font-size:11px; color:var(--muted); margin-top:5px;}
.field-hint code{background:#161923; border:1px solid #232837; border-radius:4px; padding:1px 5px; font-family:ui-monospace,Menlo,Consolas,monospace; color:#9fb3b1;}

.type-toggle{display:flex; gap:10px; margin-bottom:20px;}
.type-toggle button{flex:1; padding:12px; border-radius:8px; background:#0c0e14; border:1px solid #232837; font-weight:700; font-size:13.5px; color:var(--muted);}
.type-toggle button.active{background:var(--primary); color:var(--highlight); border-color:var(--primary);}

.chip-select{display:flex; gap:8px; flex-wrap:wrap;}
.chip-select .chip-btn{padding:7px 13px; font-size:12.5px;}

.actor-chips-wrap{display:flex; flex-wrap:wrap; gap:8px;}
.actor-chip{
  display:inline-flex; align-items:center; gap:7px; background:#12141c; border:1px solid #232837;
  padding:6px 8px 6px 13px; border-radius:20px; font-size:12.5px; font-weight:600; color:var(--text);
}
.actor-chip button{
  width:17px; height:17px; border-radius:50%; background:#1e2330; display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:all var(--transition); flex-shrink:0;
}
.actor-chip button svg{width:9px; height:9px;}
.actor-chip button:hover{background:#3a1218; color:#ff8b93;}

.source-row{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
.source-row input{flex:1;}
.source-row .rm{width:32px; height:32px; flex-shrink:0; border-radius:6px; background:#3a1218; color:#ff8b93; display:flex; align-items:center; justify-content:center;}

.season-block{border:1px solid #1e2330; border-radius:10px; padding:14px; margin-bottom:14px; background:#0c0e14;}
.season-block-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.season-block-head b{font-size:14px;}
.ep-editor{border:1px solid #1a1d26; border-radius:8px; padding:10px; margin-bottom:8px; background:var(--surface);}
.ep-editor-head{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.ep-editor-head input{flex:1;}

.modal-footer{display:flex; justify-content:flex-end; gap:10px; margin-top:20px; border-top:1px solid #1a1d26; padding-top:18px;}

/* ---------- Player ---------- */
.player-overlay{
  position:fixed; inset:0; background:#000; z-index:200; display:flex; flex-direction:column;
  opacity:0; pointer-events:none; transition:opacity var(--transition);
}
.player-overlay.open{opacity:1; pointer-events:auto;}
.player-top{
  position:absolute; top:0; left:0; right:0; z-index:5; padding:20px 26px; display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg, rgba(0,0,0,.85), transparent); transition:opacity .4s ease;
}
.player-title{font-size:15px; font-weight:800; font-family:var(--display-font);}
.player-sub{font-size:12px; color:#8fa5a3; margin-top:2px;}
.player-stage{flex:1; position:relative; background:#000;}
.player-stage iframe, .player-stage video{width:100%; height:100%; border:0; display:block;}
.player-bottom{position:absolute; bottom:0; left:0; right:0; padding:18px 24px; display:flex; justify-content:center; gap:10px; background:linear-gradient(0deg, rgba(0,0,0,.8), transparent); transition:opacity .4s ease;}
.player-next-side{
  position:absolute; top:50%; right:24px; transform:translateY(-50%); z-index:6;
  display:flex; flex-direction:column; align-items:center; gap:8px; padding:16px 14px; border-radius:14px;
  background:rgba(8,9,13,.55); border:1px solid rgba(61,219,217,.25); backdrop-filter:blur(8px);
  color:var(--text); transition:opacity .4s ease, background var(--transition), transform var(--transition);
}
.player-next-side:hover{background:rgba(8,9,13,.8); transform:translateY(-50%) scale(1.04);}
.player-next-side .pns-icon{
  width:40px; height:40px; border-radius:50%; background:var(--highlight); color:#04211f;
  display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(61,219,217,.4);
}
.player-next-side .pns-icon svg{width:16px; height:16px;}
.player-next-side span{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; writing-mode:horizontal-tb; white-space:nowrap;}
.player-hover-zone{position:absolute; top:0; left:0; right:0; height:90px; z-index:4;}
.player-overlay.controls-hidden .player-top,
.player-overlay.controls-hidden .player-bottom,
.player-overlay.controls-hidden .player-next-side{
  opacity:0; pointer-events:none;
}
.up-next{
  position:absolute; bottom:90px; right:24px; z-index:6; display:flex; align-items:center; gap:12px;
  background:rgba(10,11,16,.9); border:1px solid #232837; border-radius:12px; padding:12px 16px; max-width:360px;
  box-shadow:0 20px 50px rgba(0,0,0,.5); font-size:13px;
}
.up-next b{color:var(--highlight);}
@media (max-width:860px){
  .player-next-side{right:12px; padding:12px 10px;}
  .player-next-side span{display:none;}
  .up-next{right:12px; left:12px; max-width:none; bottom:80px;}
}

/* ---------- Collections ---------- */
.collection-card{
  background:var(--surface); border:1px solid #1a1d26; border-radius:12px; padding:20px; cursor:pointer;
  transition:transform var(--transition), background var(--transition); position:relative; overflow:hidden;
}
.collection-card:hover{transform:translateY(-3px); background:#141721;}
.collection-card h4{font-size:16px; font-weight:800; margin-bottom:4px;}
.collection-card span{font-size:12px; color:var(--muted);}
.collection-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px;}

/* ---------- Settings ---------- */
.settings-section{background:var(--surface); border:1px solid #1a1d26; border-radius:12px; padding:22px; margin-bottom:18px; max-width:560px;}
.settings-section h3{font-size:15px; font-weight:800; margin-bottom:16px;}
.settings-row{display:flex; gap:10px; margin-bottom:12px;}

/* ---------- Toast ---------- */
#toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); z-index:300;
  background:var(--surface2); border:1px solid #232837; padding:12px 20px; border-radius:8px; font-size:13.5px; font-weight:600;
  opacity:0; transition:all var(--transition); pointer-events:none; box-shadow:0 10px 30px rgba(0,0,0,.4);
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0); bottom:76px;}

/* ---------- Mobile bottom nav ---------- */
.bottom-nav{display:none;}
@media (max-width:860px){
  .sidebar{display:none;}
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; z-index:50; background:var(--surface);
    border-top:1px solid #1a1d26; padding:8px 6px calc(8px + env(safe-area-inset-bottom)) 6px; justify-content:space-around;
  }
  .bottom-nav .nav-item{flex-direction:column; gap:3px; font-size:10px; padding:6px 8px; flex:1; align-items:center; text-align:center; border-radius:8px;}
  .bottom-nav .nav-item.active{background:transparent; color:var(--highlight);}
  .bottom-nav .nav-item::before{display:none;}
  .bottom-nav .nav-item.active svg{filter:drop-shadow(0 0 6px rgba(61,219,217,.6));}
  .main{padding-bottom:90px;}
  .page, .topbar{padding-left:16px; padding-right:16px;}
  .hero-carousel{margin:14px 16px 0 16px; height:50vh;}
  .hero-content{padding:22px;}
  .hero-content h2{font-size:26px;}
  .detail-backdrop{margin:14px 16px;}
  .detail-body{padding:0 16px; flex-direction:column;}
  .detail-poster{width:120px;}
  .detail-info{padding-top:16px;}
  .row-head, .row-track, .season-tabs, .episode-list{padding-left:16px; padding-right:16px;}
  .filter-bar{padding-right:16px;}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none !important; animation:none !important;}
}
</style>
</head>
<body>

<div id="app">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar" id="topbar"></div>
    <div id="globalSearchResults" class="global-search-results"></div>
    <div id="pageRoot"></div>
  </div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<div class="overlay" id="modalOverlay"><div class="modal" id="modalBody"></div></div>
<div class="player-overlay" id="playerOverlay"></div>
<div id="toast"></div>

<script>
/* =========================================================
   ICONS
========================================================= */
const ICON = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>',
  library:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>',
  collections:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18M9 4v14"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 0 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1z"/></svg>',
  play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  close:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V6z"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  bookmark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21 12 16l-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>',
  movie:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="15" rx="2"/><path d="M7 5v15M17 5v15M3 10h4M17 10h4M3 15h4M17 15h4"/></svg>',
  tv:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="m8 2 4 4 4-4M8 20h8"/></svg>',
  chevronLeft:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
  chevronRight:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>',
};

/* =========================================================
   STATE / STORAGE
========================================================= */
const LIB_KEY = 'sv_library';
const SET_KEY = 'sv_settings';

function loadLib(){
  try{
    const raw = localStorage.getItem(LIB_KEY);
    if(!raw) return {items:[], collections:[]};
    const d = JSON.parse(raw);
    if(!d.items) d.items = [];
    if(!d.collections) d.collections = [];
    return d;
  }catch(e){ return {items:[], collections:[]}; }
}
function saveLib(){ localStorage.setItem(LIB_KEY, JSON.stringify(state.lib)); }
function loadSettings(){
  try{
    const s = JSON.parse(localStorage.getItem(SET_KEY)) || {};
    if(!s.omdb) s.omdb = '';
    if(!s.tmdb) s.tmdb = '';
    if(!s.vidsrcDomain) s.vidsrcDomain = 'vidsrc-embed.su';
    return s;
  }catch(e){ return {omdb:'',tmdb:'',vidsrcDomain:'vidsrc-embed.su'}; }
}
function saveSettings(){ localStorage.setItem(SET_KEY, JSON.stringify(state.settings)); }

const state = {
  lib: loadLib(),
  settings: loadSettings(),
  route: 'home',
  routeParam: null,
  library: { filter:'all', search:'', sort:'recent' },
  detailSeason: 0,
  editingId: null,
  editType: 'movie',
  editGenres: [],
  editSources: [],
  editSeasons: [],
  player: null,
};

function uuid(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=>{
    const r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 2400);
}
function getItem(id){ return state.lib.items.find(i=>i.id===id); }
function allGenres(){
  const set = new Set();
  state.lib.items.forEach(i=> (i.genre||[]).forEach(g=>set.add(g)));
  return [...set];
}
const DEFAULT_GENRES = ['Action','Drama','Comedy','Sci-Fi','Thriller','Horror','Romance','Animation','Documentary','Fantasy','Crime','Adventure'];

function posterEl(item, cls){
  if(item.poster){
    return `<img src="${esc(item.poster)}" alt="" loading="lazy" onload="this.classList.add('loaded')" onerror="this.parentElement.innerHTML=fallbackHtml('${esc(item.title).replace(/'/g,"&#39;")}')">`;
  }
  return fallbackHtml(item.title);
}
function fallbackHtml(title){
  const letter = (title||'?').trim().charAt(0).toUpperCase() || '?';
  return `<div class="poster-fallback">${esc(letter)}</div>`;
}

function itemProgressPct(item){
  const seg = flattenProgress(item);
  if(!seg.length) return 0;
  const last = seg[seg.length-1];
  if(!last.duration) return 0;
  return Math.min(100, Math.round((last.timestamp/last.duration)*100));
}
function flattenProgress(item){
  const prog = item.progress || {};
  return Object.keys(prog).map(k=>({key:k, ...prog[k]})).sort((a,b)=> (a.t||0)-(b.t||0));
}
function movieProgressPct(item){
  const p = (item.progress||{}).movie;
  if(!p || !p.duration) return p && p.watched ? 100 : 0;
  return Math.min(100, Math.round((p.timestamp/p.duration)*100));
}
function isStarted(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && (p.timestamp>5 || p.watched);
  } else {
    const prog = item.progress||{};
    return Object.values(prog).some(p=>p.timestamp>5 || p.watched);
  }
}
function isFullyWatched(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && p.watched;
  } else {
    const eps = (item.seasons||[]).flatMap(s=>s.episodes||[]);
    if(!eps.length) return false;
    const prog = item.progress||{};
    return eps.every(e=>{
      const key = 's'+e._seasonNum+'e'+e.number;
      return prog[key] && prog[key].watched;
    });
  }
}

/* =========================================================
   NAV / RENDER SHELL
========================================================= */
const NAV_ITEMS = [
  {id:'home', label:'Home', icon:'home'},
  {id:'movies', label:'Movies', icon:'movie'},
  {id:'series', label:'TV Shows', icon:'tv'},
  {id:'library', label:'Library', icon:'library'},
  {id:'collections', label:'Collections', icon:'collections'},
  {id:'settings', label:'Settings', icon:'settings'},
];

function renderShell(){
  const navHtml = NAV_ITEMS.map(n=>`
    <a class="nav-item ${state.route===n.id?'active':''}" href="#${n.id}">
      ${ICON[n.icon]}<span>${n.label}</span>
    </a>`).join('');
  document.getElementById('sidebar').innerHTML = `
    <div class="brand"><div class="mark">SV</div><span>Stream Vault</span></div>
    ${navHtml}
    <div style="flex:1"></div>
    <button class="btn btn-primary" style="justify-content:center" onclick="openEditModal()">${ICON.plus} Add Title</button>
  `;
  document.getElementById('bottomNav').innerHTML = navHtml;

  const titles = {home:'Home', movies:'Movies', series:'TV Shows', library:'Library', collections:'Collections', settings:'Settings'};
  let topActions = `<button class="btn-icon" id="searchToggleBtn" title="Search" onclick="toggleGlobalSearch()">${ICON.search}</button>`;
  if(['library','home','movies','series'].includes(state.route)){
    topActions += `<button class="btn btn-primary" onclick="openEditModal()">${ICON.plus} Add Title</button>`;
  }
  document.getElementById('topbar').innerHTML = `
    <h1>${titles[state.route] || ''}</h1>
    <div class="topbar-actions">
      <div class="topbar-search ${state.globalSearchOpen?'open':''}">
        <input id="globalSearchInput" class="global-search-input" placeholder="Search titles..." oninput="onGlobalSearchInput(this.value)" value="${esc(state.globalSearchQuery||'')}">
      </div>
      ${topActions}
    </div>
  `;
  const resultsBox = document.getElementById('globalSearchResults');
  if(resultsBox && state.globalSearchOpen) renderGlobalSearchResults();
}

function router(){
  const hash = location.hash.replace('#','') || 'home';
  const [route, param] = hash.split('/');
  state.route = route;
  state.routeParam = param || null;
  if(route==='detail') state.detailSeason = 0;
  stopHeroAutoplay();
  renderShell();
  const root = document.getElementById('pageRoot');
  switch(route){
    case 'library': root.innerHTML = renderLibrary(); break;
    case 'movies': root.innerHTML = renderTypePage('movie'); break;
    case 'series': root.innerHTML = renderTypePage('series'); break;
    case 'collections': root.innerHTML = renderCollections(param); break;
    case 'settings': root.innerHTML = renderSettings(); break;
    case 'detail': root.innerHTML = renderDetail(param); break;
    default: root.innerHTML = renderHome();
  }
  startHeroAutoplay();
  window.scrollTo({top:0});
}
window.addEventListener('hashchange', router);
window.addEventListener('scroll', ()=>{
  const tb = document.getElementById('topbar');
  if(tb) tb.classList.toggle('scrolled', window.scrollY > 4);
}, {passive:true});

/* =========================================================
   HOME / MOVIES / TV SHOWS
========================================================= */
function renderHome(){
  const items = state.lib.items;
  if(!items.length){
    return `<div class="page">${emptyState('Your vault is empty','Add your first movie or series to start building your personal streaming library.')}</div>`;
  }
  const recentMovies = items.filter(i=>i.type==='movie').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const recentSeries = items.filter(i=>i.type==='series').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const heroItems = [...recentMovies, ...recentSeries];
  const watched = items.filter(isStarted).sort((a,b)=> new Date(b.lastWatched||0)-new Date(a.lastWatched||0));
  const continueWatching = watched.filter(i=>!isFullyWatched(i));
  const recentlyAdded = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  let rows = '';
  if(continueWatching.length) rows += rowHtml('Continue Watching', continueWatching, {removable:true});
  rows += rowHtml('Recently Added', recentlyAdded);
  allGenres().forEach(g=>{
    const inGenre = items.filter(i=>(i.genre||[]).includes(g));
    if(inGenre.length) rows += rowHtml(g, inGenre);
  });

  return `${heroCarouselHtml(heroItems)}<div class="page">${rows}</div>`;
}

function renderTypePage(type){
  const items = state.lib.items.filter(i=>i.type===type);
  const label = type==='movie' ? 'movies' : 'TV shows';
  if(!items.length){
    return `<div class="page">${emptyState(`No ${label} yet`, `Add your first ${type==='movie'?'movie':'series'} to get started.`)}</div>`;
  }
  const heroItems = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const watched = items.filter(isStarted).sort((a,b)=> new Date(b.lastWatched||0)-new Date(a.lastWatched||0));
  const continueWatching = watched.filter(i=>!isFullyWatched(i));
  const recentlyAdded = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  let rows = '';
  if(continueWatching.length) rows += rowHtml('Continue Watching', continueWatching, {removable:true});
  rows += rowHtml('Recently Added', recentlyAdded);
  allGenres().forEach(g=>{
    const inGenre = items.filter(i=>(i.genre||[]).includes(g));
    if(inGenre.length) rows += rowHtml(g, inGenre);
  });

  return `${heroCarouselHtml(heroItems)}<div class="page">${rows}</div>`;
}

/* ---- Hero carousel ---- */
let heroAutoplayTimer = null;
function stopHeroAutoplay(){ clearInterval(heroAutoplayTimer); heroAutoplayTimer = null; }
function startHeroAutoplay(){
  stopHeroAutoplay();
  if(!state.heroItems || state.heroItems.length<2) return;
  heroAutoplayTimer = setInterval(()=> nextHeroSlide(), 6500);
}
function heroCarouselHtml(items){
  if(!items.length) return '';
  state.heroItems = items;
  state.heroIndex = 0;
  return `
    <div class="hero-carousel" id="heroCarousel" onmouseenter="stopHeroAutoplay()" onmouseleave="startHeroAutoplay()">
      <button class="hero-nav-btn hero-nav-prev" onclick="prevHeroSlide()">${ICON.chevronLeft}</button>
      <button class="hero-nav-btn hero-nav-next" onclick="nextHeroSlide()">${ICON.chevronRight}</button>
      <div class="hero-track" id="heroTrack">${items.map(heroSlideHtml).join('')}</div>
      ${items.length>1 ? `<div class="hero-dots" id="heroDots">${items.map((_,i)=>`<button class="hero-dot ${i===0?'active':''}" onclick="setHeroSlide(${i})"></button>`).join('')}</div>` : ''}
    </div>`;
}
function heroSlideHtml(item){
  const pct = item.type==='movie' ? movieProgressPct(item) : itemProgressPct(item);
  const showResume = isStarted(item) && !isFullyWatched(item);
  return `
    <div class="hero-slide" onclick="location.hash='detail/${item.id}'">
      ${item.backdrop ? `<img src="${esc(item.backdrop)}" alt="">` : ''}
      <div class="hero-content">
        <span class="hero-badge">${item.type==='series'?'Series':'Movie'}</span>
        <h2>${esc(item.title)}</h2>
        <p>${esc(item.description||'No description added yet.')}</p>
        <div class="hero-btns">
          <button class="btn btn-primary" onclick="event.stopPropagation(); quickPlay('${item.id}')">${ICON.play} ${showResume?'Resume':'Play'}</button>
          <button class="btn btn-ghost" onclick="event.stopPropagation(); location.hash='detail/${item.id}'">More Info</button>
        </div>
        ${pct>0 ? `<div class="hero-progress"><div style="width:${pct}%"></div></div>` : ''}
      </div>
    </div>`;
}
function setHeroSlide(i){
  state.heroIndex = i;
  updateHeroTrack();
  startHeroAutoplay();
}
function nextHeroSlide(){
  if(!state.heroItems || !state.heroItems.length) return;
  state.heroIndex = (state.heroIndex+1) % state.heroItems.length;
  updateHeroTrack();
}
function prevHeroSlide(){
  if(!state.heroItems || !state.heroItems.length) return;
  state.heroIndex = (state.heroIndex-1+state.heroItems.length) % state.heroItems.length;
  updateHeroTrack();
  startHeroAutoplay();
}
function updateHeroTrack(){
  const track = document.getElementById('heroTrack');
  if(track) track.style.transform = `translateX(-${state.heroIndex*100}%)`;
  const dots = document.getElementById('heroDots');
  if(dots) [...dots.children].forEach((d,i)=> d.classList.toggle('active', i===state.heroIndex));
}

function rowHtml(title, items, opts){
  opts = opts || {};
  return `
    <div class="row">
      <div class="row-head"><h3>${esc(title)}</h3></div>
      <div class="row-track">${items.map(i=>cardHtml(i, opts)).join('')}</div>
    </div>`;
}

function isNew(item){
  if(!item.dateAdded) return false;
  return (Date.now() - new Date(item.dateAdded).getTime()) < 7*24*60*60*1000;
}

function cardHtml(item, opts){
  opts = opts || {};
  const pct = item.type==='movie' ? movieProgressPct(item) : itemProgressPct(item);
  return `
    <div class="card" onclick="location.hash='detail/${item.id}'">
      ${posterEl(item)}
      <span class="card-badge">${item.type==='series'?'Series':'Movie'}</span>
      ${isNew(item) ? `<span class="card-new">New</span>` : ''}
      ${opts.removable ? `<button type="button" class="card-remove" title="Remove from Continue Watching" onclick="event.stopPropagation(); removeFromContinueWatching('${item.id}')">${ICON.close}</button>` : ''}
      <div class="card-overlay">
        <div class="card-play" onclick="event.stopPropagation(); quickPlay('${item.id}')">${ICON.play}</div>
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-meta">${esc(item.year||'')}${item.genre&&item.genre.length?' • '+esc(item.genre[0]):''}</div>
      </div>
      ${pct>0 ? `<div class="card-progress"><div style="width:${pct}%"></div></div>` : ''}
    </div>`;
}
function removeFromContinueWatching(id){
  const item = getItem(id);
  if(!item) return;
  item.progress = {};
  saveLib();
  router();
  toast('Removed from Continue Watching');
}

/* ---- Global search ---- */
function toggleGlobalSearch(){
  state.globalSearchOpen = !state.globalSearchOpen;
  if(!state.globalSearchOpen){
    state.globalSearchQuery = '';
    const box = document.getElementById('globalSearchResults');
    if(box){ box.innerHTML=''; box.classList.remove('show'); }
  }
  renderShell();
  if(state.globalSearchOpen){
    setTimeout(()=>{ const el = document.getElementById('globalSearchInput'); if(el) el.focus(); }, 60);
  }
}
function onGlobalSearchInput(v){
  state.globalSearchQuery = v;
  renderGlobalSearchResults();
}
function renderGlobalSearchResults(){
  const q = (state.globalSearchQuery||'').trim().toLowerCase();
  const box = document.getElementById('globalSearchResults');
  if(!box) return;
  if(!q){ box.innerHTML=''; box.classList.remove('show'); return; }
  const matches = state.lib.items.filter(i=> i.title.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){
    box.innerHTML = `<div class="gsr-empty">No matches for "${esc(q)}"</div>`;
    box.classList.add('show');
    return;
  }
  box.innerHTML = matches.map(i=>`
    <div class="gsr-item" onclick="goToSearchResult('${i.id}')">
      <div class="gsr-poster">${posterEl(i)}</div>
      <div><div class="gsr-title">${esc(i.title)}</div><div class="gsr-meta">${i.type==='series'?'Series':'Movie'}${i.year?' · '+esc(i.year):''}</div></div>
    </div>`).join('');
  box.classList.add('show');
}
function goToSearchResult(id){
  toggleGlobalSearch();
  location.hash = 'detail/'+id;
}
document.addEventListener('click', e=>{
  if(!state.globalSearchOpen) return;
  const box = document.getElementById('globalSearchResults');
  const btn = document.getElementById('searchToggleBtn');
  const input = document.getElementById('globalSearchInput');
  if(box && box.contains(e.target)) return;
  if(btn && btn.contains(e.target)) return;
  if(input && input.contains(e.target)) return;
  toggleGlobalSearch();
});

function emptyState(title, sub){
  return `<div class="empty-state">
    <div class="empty-icon">${ICON.library}</div>
    <h3>${esc(title)}</h3>
    <p>${esc(sub)}</p>
    <button class="btn btn-primary" onclick="openEditModal()">${ICON.plus} Add Title</button>
  </div>`;
}

function quickPlay(id){
  const item = getItem(id);
  if(!item) return;
  if(item.type==='movie'){
    openPlayer(item, null, null, item.sources||[]);
  } else {
    // find first unwatched episode, else first episode
    const flat = [];
    (item.seasons||[]).forEach(s=> (s.episodes||[]).forEach(e=> flat.push({s:s.number,e})));
    let target = flat.find(f=>{
      const key = 's'+f.s+'e'+f.e.number;
      const p = (item.progress||{})[key];
      return !p || !p.watched;
    }) || flat[0];
    if(target) openPlayer(item, target.s, target.e, target.e.sources||[]);
    else toast('No episodes added yet');
  }
}

/* =========================================================
   LIBRARY
========================================================= */
function renderLibrary(){
  const st = state.library;
  let items = [...state.lib.items];
  if(st.filter==='movie') items = items.filter(i=>i.type==='movie');
  if(st.filter==='series') items = items.filter(i=>i.type==='series');
  if(st.filter==='collections') return renderCollectionsList();
  if(st.search) items = items.filter(i=> i.title.toLowerCase().includes(st.search.toLowerCase()));
  if(st.sort==='az') items.sort((a,b)=> a.title.localeCompare(b.title));
  else if(st.sort==='watched') items.sort((a,b)=> new Date(b.lastWatched||0)-new Date(a.lastWatched||0));
  else items.sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  const chips = [['all','All'],['movie','Movies'],['series','Series'],['collections','Collections']];

  return `
    <div class="page">
      <div class="filter-bar">
        ${chips.map(([k,l])=>`<button class="chip-btn ${st.filter===k?'active':''}" onclick="setLibFilter('${k}')">${l}</button>`).join('')}
        <input class="search-input" placeholder="Search titles..." value="${esc(st.search)}" oninput="setLibSearch(this.value)">
        <select class="select-input" onchange="setLibSort(this.value)">
          <option value="recent" ${st.sort==='recent'?'selected':''}>Recently Added</option>
          <option value="az" ${st.sort==='az'?'selected':''}>A-Z</option>
          <option value="watched" ${st.sort==='watched'?'selected':''}>Last Watched</option>
        </select>
      </div>
      ${items.length ? `<div class="grid">${items.map(cardHtml).join('')}</div>` : emptyState('No titles found','Try a different search or add something new.')}
    </div>`;
}
function setLibFilter(f){ state.library.filter=f; router.__manual__(); renderLibraryOnly(); }
function setLibSearch(v){ state.library.search=v; renderLibraryOnly(true); }
function setLibSort(v){ state.library.sort=v; renderLibraryOnly(); }
function renderLibraryOnly(keepFocus){
  document.getElementById('pageRoot').innerHTML = renderLibrary();
  if(keepFocus){
    const el = document.querySelector('.search-input');
    if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
  }
}

/* =========================================================
   COLLECTIONS
========================================================= */
function renderCollections(param){
  if(param) return renderCollectionDetail(param);
  return renderCollectionsList();
}
function renderCollectionsList(){
  const cols = state.lib.collections;
  return `
    <div class="page">
      <div class="filter-bar">
        <button class="btn btn-primary" onclick="createCollection()">${ICON.plus} New Collection</button>
      </div>
      ${cols.length ? `<div class="collection-grid">${cols.map(c=>`
        <div class="collection-card" onclick="location.hash='collections/${c.id}'">
          <h4>${esc(c.name)}</h4>
          <span>${c.itemIds.length} title${c.itemIds.length===1?'':'s'}</span>
        </div>`).join('')}</div>` : emptyState('No collections yet','Create a collection to organize your favorites.')}
    </div>`;
}
function renderCollectionDetail(id){
  const col = state.lib.collections.find(c=>c.id===id);
  if(!col) return `<div class="page">${emptyState('Collection not found','It may have been deleted.')}</div>`;
  const items = col.itemIds.map(getItem).filter(Boolean);
  return `
    <div class="page">
      <div class="filter-bar">
        <a class="btn btn-ghost" href="#collections">&larr; All Collections</a>
        <button class="btn btn-danger" onclick="deleteCollection('${col.id}')">${ICON.trash} Delete Collection</button>
      </div>
      <h2 style="margin-bottom:16px;">${esc(col.name)}</h2>
      ${items.length ? `<div class="grid">${items.map(cardHtml).join('')}</div>` : emptyState('This collection is empty','Add titles to it from any detail page.')}
    </div>`;
}
function createCollection(){
  const name = prompt('Collection name:');
  if(!name || !name.trim()) return;
  state.lib.collections.push({id:uuid(), name:name.trim(), itemIds:[]});
  saveLib(); router(); toast('Collection created');
}
function deleteCollection(id){
  if(!confirm('Delete this collection? Items will not be deleted.')) return;
  state.lib.collections = state.lib.collections.filter(c=>c.id!==id);
  saveLib(); location.hash='collections'; toast('Collection deleted');
}
function toggleItemInCollection(colId, itemId){
  const col = state.lib.collections.find(c=>c.id===colId);
  if(!col) return;
  const idx = col.itemIds.indexOf(itemId);
  if(idx>-1) col.itemIds.splice(idx,1); else col.itemIds.push(itemId);
  saveLib();
}

/* =========================================================
   DETAIL
========================================================= */
function renderDetail(id){
  const item = getItem(id);
  if(!item) return `<div class="page">${emptyState('Title not found','It may have been removed.')}</div>`;

  let body = '';
  if(item.type==='movie'){
    const watched = isFullyWatched(item);
    body = `<div class="detail-actions" style="margin-top:6px;">
      <button class="btn btn-primary" onclick="quickPlay('${item.id}')">${ICON.play} ${isStarted(item)&&!watched?'Resume':'Play'}</button>
      <button class="btn btn-ghost" onclick="toggleMovieWatched('${item.id}')">${watched?ICON.close+' Mark as Unwatched':ICON.check+' Mark as Watched'}</button>
    </div>`;
  } else {
    const seasons = item.seasons||[];
    seasons.forEach((s,i)=>{ (s.episodes||[]).forEach(e=> e._seasonNum = s.number); });
    const activeIdx = Math.min(state.detailSeason, Math.max(seasons.length-1,0));
    const active = seasons[activeIdx];
    body = `
      <div class="season-tabs">
        ${seasons.map((s,i)=>`<button class="chip-btn ${i===activeIdx?'active':''}" onclick="setDetailSeason(${i})">Season ${s.number}</button>`).join('') || '<span style="color:var(--muted);font-size:13px;">No seasons added yet.</span>'}
      </div>
      <div class="episode-list">
        ${active ? (active.episodes||[]).map(ep=>{
          const key = 's'+active.number+'e'+ep.number;
          const p = (item.progress||{})[key];
          const pct = p && p.duration ? Math.min(100,Math.round((p.timestamp/p.duration)*100)) : 0;
          const watched = p && p.watched;
          return `<div class="episode-card" onclick="openPlayer(getItem('${item.id}'), ${active.number}, ${ep.number}, ${JSON.stringify(ep.sources||[]).replace(/"/g,'&quot;')})">
            <div class="ep-thumb">
              ${ep.thumbnail?`<img src="${esc(ep.thumbnail)}" alt="">`:`<div class="ep-num">${ep.number}</div>`}
              ${pct>0?`<div class="ep-progress"><div style="width:${pct}%"></div></div>`:''}
            </div>
            <div class="ep-info">
              <div class="ep-title">${ep.number}. ${esc(ep.title||'Episode '+ep.number)}</div>
              <div class="ep-sub">${(ep.sources||[]).length} source${(ep.sources||[]).length===1?'':'s'}</div>
            </div>
            <button type="button" class="ep-watch-toggle ${watched?'is-watched':''}" title="${watched?'Mark as unwatched':'Mark as watched'}" onclick="event.stopPropagation(); toggleEpisodeWatched('${item.id}', ${active.number}, ${ep.number})">${ICON.check}</button>
          </div>`;
        }).join('') : ''}
      </div>`;
  }

  return `
    <div class="detail-backdrop">${item.backdrop?`<img src="${esc(item.backdrop)}" alt="">`:''}</div>
    <div class="detail-body">
      <div class="detail-poster">${posterEl(item)}</div>
      <div class="detail-info">
        <h2>${esc(item.title)}</h2>
        <div class="detail-tags">
          ${item.year?`<span class="tag">${esc(item.year)}</span>`:''}
          ${item.rating?`<span class="tag">★ ${esc(item.rating)}</span>`:''}
          ${(item.genre||[]).map(g=>`<span class="tag">${esc(g)}</span>`).join('')}
        </div>
        <p class="detail-desc">${esc(item.description||'No description added.')}</p>
        ${(item.actors&&item.actors.length) ? `<div class="detail-cast"><span class="detail-cast-label">Starring</span><div class="detail-cast-tags">${item.actors.map(a=>`<span class="tag">${esc(a)}</span>`).join('')}</div></div>` : ''}
        <div class="detail-actions">
          <button class="btn-icon" title="Edit" onclick="openEditModal('${item.id}')">${ICON.edit}</button>
          <button class="btn-icon" title="Delete" style="color:#ff8b93; border-color:#3a1a1e;" onclick="deleteItem('${item.id}')">${ICON.trash}</button>
          <button class="btn-icon" title="Add to Collection" onclick="openAddToCollection('${item.id}')">${ICON.bookmark}</button>
        </div>
      </div>
    </div>
    <div class="page">${body}</div>
  `;
}
function setDetailSeason(i){ state.detailSeason=i; document.getElementById('pageRoot').innerHTML = renderDetail(state.routeParam); }
function toggleMovieWatched(id){
  const item = getItem(id);
  const watched = isFullyWatched(item);
  item.progress = item.progress || {};
  item.progress.movie = watched
    ? {timestamp:0, duration:(item.progress.movie&&item.progress.movie.duration)||0, watched:false}
    : {timestamp:(item.progress.movie&&item.progress.movie.duration)||1, duration:(item.progress.movie&&item.progress.movie.duration)||1, watched:true};
  item.lastWatched = new Date().toISOString();
  saveLib();
  document.getElementById('pageRoot').innerHTML = renderDetail(id);
  toast(watched?'Marked as unwatched':'Marked as watched');
}
function toggleEpisodeWatched(itemId, seasonNum, epNum){
  const item = getItem(itemId);
  const key = 's'+seasonNum+'e'+epNum;
  item.progress = item.progress || {};
  const cur = item.progress[key];
  const watched = !!(cur && cur.watched);
  item.progress[key] = {timestamp:watched?0:((cur&&cur.duration)||1), duration:(cur&&cur.duration)||1, watched:!watched};
  item.lastWatched = new Date().toISOString();
  saveLib();
  document.getElementById('pageRoot').innerHTML = renderDetail(itemId);
  toast(watched?'Marked as unwatched':'Marked as watched');
}
function deleteItem(id){
  if(!confirm('Delete this title permanently?')) return;
  state.lib.items = state.lib.items.filter(i=>i.id!==id);
  state.lib.collections.forEach(c=> c.itemIds = c.itemIds.filter(x=>x!==id));
  saveLib(); location.hash='library'; toast('Title deleted');
}
function openAddToCollection(itemId){
  if(!state.lib.collections.length){
    if(confirm('No collections yet. Create one now?')) createCollection();
    return;
  }
  const html = state.lib.collections.map(c=>{
    const inCol = c.itemIds.includes(itemId);
    return `<button class="chip-btn ${inCol?'active':''}" style="width:100%;justify-content:flex-start;margin-bottom:8px;" onclick="toggleItemInCollection('${c.id}','${itemId}'); this.classList.toggle('active')">${inCol?ICON.check:''} ${esc(c.name)}</button>`;
  }).join('');
  openModal(`
    <div class="modal-head"><h2>Add to Collection</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div>${html}</div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal(); router()">Done</button></div>
  `);
}

function saveApiKeys(){
  state.settings.omdb = document.getElementById('omdbKey').value.trim();
  state.settings.tmdb = document.getElementById('tmdbKey').value.trim();
  saveSettings(); toast('API keys saved');
}
function saveVidsrcDomain(){
  state.settings.vidsrcDomain = document.getElementById('vidsrcDomain').value;
  saveSettings(); toast('VidSrc domain saved');
}
function exportLibrary(){
  const blob = new Blob([JSON.stringify(state.lib,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'stream-vault-library.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Library exported');
}
function importLibrary(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.items) throw new Error('invalid');
      state.lib = {items:data.items||[], collections:data.collections||[]};
      saveLib(); router(); toast('Library imported');
    }catch(err){ toast('Invalid library file'); }
  };
  reader.readAsText(file);
}
function clearAllData(){
  if(!confirm('This will permanently delete your entire library. Continue?')) return;
  if(!confirm('Are you absolutely sure? This cannot be undone.')) return;
  state.lib = {items:[], collections:[]};
  saveLib(); location.hash='home'; toast('All data cleared');
}

function normalizeSeasonsJson(data){
  const arr = Array.isArray(data) ? data : (data && Array.isArray(data.seasons) ? data.seasons : null);
  if(!arr) throw new Error('JSON must be an array of seasons, or an object like {"seasons":[...]}');
  return arr.map((s,si)=>{
    const number = parseInt(s.number ?? s.season ?? s.season_number ?? (si+1), 10) || (si+1);
    const eps = Array.isArray(s.episodes) ? s.episodes : [];
    const episodes = eps.map((e,ei)=>{
      const num = parseInt(e.number ?? e.episode ?? e.episode_number ?? (ei+1), 10) || (ei+1);
      let sources = [];
      if(Array.isArray(e.sources)) sources = e.sources.map(src=>({label:(src.label||'Source').toString(), url:(src.url||src.link||'').toString()})).filter(s=>s.url);
      else if(Array.isArray(e.urls)) sources = e.urls.filter(Boolean).map((u,i)=>({label:'Source '+(i+1), url:u}));
      else if(typeof e.url==='string' && e.url) sources = [{label:'Source 1', url:e.url}];
      else if(typeof e.link==='string' && e.link) sources = [{label:'Source 1', url:e.link}];
      if(!sources.length) sources = [{label:'',url:''}];
      return {number:num, title:(e.title||('Episode '+num)).toString(), thumbnail:(e.thumbnail||e.image||'').toString(), sources};
    });
    return {number, episodes};
  });
}
function applySeasonsJsonImport(){
  const text = document.getElementById('seasonsJsonText').value.trim();

  let data;

  toast(`Imported ${normalized.length} season(s), ${epCount} episode(s)`);
}

const VIDSRC_DOMAINS = ['vidsrc-embed.ru','vidsrc-embed.su','vidsrcme.su','vsrc.su'];
const VIDSRC_MATCH = /vidsrc[-a-z]*\.(ru|su|to|me|pro|cc|xyz|net|in|vip)|vsrc\.su/i;

function detectEmbed(url){
  url = url.trim();
  let m;
  if((m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{6,})/))){
    return {kind:'iframe', src:`https://www.youtube.com/embed/${m[1]}?autoplay=1`};
  }
  if((m = url.match(/dailymotion\.com\/video\/([\w]+)/))){
    return {kind:'iframe', src:`https://www.dailymotion.com/embed/video/${m[1]}`};
  }
  // VidSrc family — always rewritten onto the configured mirror domain
  if(VIDSRC_MATCH.test(url)){
    return {kind:'iframe', src: normalizeVidsrc(url), isVidsrc:true};
  }
  if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)){
    return {kind:'video', src:url};
  }
  return {kind:'iframe', src:url};
}

function normalizeVidsrc(url){
  const domain = VIDSRC_DOMAINS.includes(state.settings.vidsrcDomain) ? state.settings.vidsrcDomain : VIDSRC_DOMAINS[0];
  let m;
  // imdb/tmdb query-style embed links: keep params, just swap the host
  if((m = url.match(/[?&](imdb|tmdb)=([\w]+)/i))){
    const rest = url.split(/\/\/[^/]+/)[1] || '';
    return `https://${domain}${rest}`;
  }
  // /embed/movie/{id} or /movie/{id}
  if((m = url.match(/\/(?:embed\/)?movie\/([\w]+)/i))){
    return `https://${domain}/embed/movie/${m[1]}`;
  }
  // /embed/tv/{id}/{season}/{episode} or /tv/{id}/{season}/{episode}
  if((m = url.match(/\/(?:embed\/)?tv\/([\w]+)\/(\d+)\/(\d+)/i))){
    return `https://${domain}/embed/tv/${m[1]}/${m[2]}/${m[3]}`;
  }
  // /embed/tv/{id} or /tv/{id}
  if((m = url.match(/\/(?:embed\/)?tv\/([\w]+)/i))){
    return `https://${domain}/embed/tv/${m[1]}`;
  }
  // Unrecognized path shape — just swap the host onto the preferred domain, keep the rest.
  const rest = url.split(/\/\/[^/]+/)[1] || '';
  return `https://${domain}${rest}`;
}

function getNextEpisode(item, seasonNum, epNum){
  if(item.type!=='series' || seasonNum==null) return null;
  const seasons = (item.seasons||[]).slice().sort((a,b)=>a.number-b.number);
  const si = seasons.findIndex(s=>s.number===seasonNum);
  if(si===-1) return null;
  const eps = (seasons[si].episodes||[]).slice().sort((a,b)=>a.number-b.number);
  const ei = eps.findIndex(e=>e.number===epNum);
  if(ei>-1 && ei+1<eps.length){
    return {seasonNum:seasons[si].number, ep:eps[ei+1]};
  }
  if(si+1<seasons.length){
    const nextEps = (seasons[si+1].episodes||[]).slice().sort((a,b)=>a.number-b.number);
    if(nextEps.length) return {seasonNum:seasons[si+1].number, ep:nextEps[0]};
  }
  return null;
}
function playNextEpisode(){
  const p = state.player;
  if(!p) return;
  const item = getItem(p.itemId);
  const next = getNextEpisode(item, p.seasonNum, p.epNum);
  if(!next){ toast('No more episodes'); return; }
  cleanupPlayerTimers();
  openPlayer(item, next.seasonNum, next.ep.number, next.ep.sources||[]);
}

function openPlayer(item, seasonNum, epNum, sources){
  sources = sources || [];
  if(!sources.length){ toast('No sources available'); return; }
  state.player = {
    itemId: item.id, seasonNum, epNum, sources, sourceIdx:0,
    key: seasonNum!=null ? 's'+seasonNum+'e'+epNum : 'movie',
    subtitle: seasonNum!=null ? `Season ${seasonNum} · Episode ${epNum}` : (item.year||''),
  };
  item.lastWatched = new Date().toISOString();
  saveLib();
  renderPlayer();
  document.getElementById('playerOverlay').classList.add('open');
}
function renderPlayer(){
  const p = state.player;
  const item = getItem(p.itemId);
  const src = p.sources[p.sourceIdx];
  const embed = detectEmbed(src.url);
  const overlay = document.getElementById('playerOverlay');
  const next = getNextEpisode(item, p.seasonNum, p.epNum);

  let stageHtml = '';
  if(embed.kind==='video'){
    stageHtml = `<video id="playerVideoEl" src="${esc(embed.src)}" controls autoplay></video>`;
  } else {
    // No sandbox here on purpose: ad-supported mirrors like VidSrc detect a sandboxed/popup-blocked
    // iframe and refuse to play ("Media Unavailable") as an anti-adblock measure. Without sandbox this
    // behaves like opening the link directly in your browser — playback works, but their popup/redirect
    // ads can appear. Use a browser popup blocker or an extension like uBlock Origin if that bothers you.
    stageHtml = `<iframe id="playerIframeEl" src="${esc(embed.src)}" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen loading="eager"></iframe>`;
  }

  overlay.innerHTML = `
    <div class="player-top">
      <div>
        <div class="player-title">${esc(item.title)}</div>
        <div class="player-sub">${esc(p.subtitle)} ${src.label?'· '+esc(src.label):''}</div>
      </div>
      <button class="btn-icon" onclick="closePlayer()">${ICON.close}</button>
    </div>
    <div class="player-stage">
      ${stageHtml}
      <div class="player-hover-zone" onmouseenter="scheduleHideControls()"></div>
    </div>
    <div id="upNextBanner"></div>
    ${next ? `<button class="player-next-side" title="Play next episode" onclick="playNextEpisode()"><span class="pns-icon">${ICON.play}</span><span>Next</span></button>` : ''}
    ${p.sources.length>1 ? `<div class="player-bottom"><button class="btn btn-ghost" onclick="tryNextSource()">Try Next Source</button></div>` : ''}
  `;
  scheduleHideControls();

  if(embed.kind==='video'){
    const vid = document.getElementById('playerVideoEl');
    const saved = (item.progress||{})[p.key];
    if(saved && saved.timestamp) vid.currentTime = saved.timestamp;
    p._interval = setInterval(()=>{
      if(!vid.duration) return;
      saveProgress(item, p.key, vid.currentTime, vid.duration, vid.currentTime >= vid.duration-5);
    }, 5000);
    vid.addEventListener('ended', ()=>{
      saveProgress(item, p.key, vid.duration, vid.duration, true);
      if(next) showUpNextBanner(next);
    });
  } else {
    clearTimeout(p._watchTimer);
    p._watchTimer = setTimeout(()=>{
      saveProgress(item, p.key, 300, 300, true);
    }, 5*60*1000);
  }
}
function showUpNextBanner(next){
  const el = document.getElementById('upNextBanner');
  if(!el) return;
  let seconds = 6;
  el.innerHTML = `
    <div class="up-next">
      <span>Up next: ${esc(next.ep.title||('Episode '+next.ep.number))} · playing in <b id="upNextCount">${seconds}</b>s</span>
      <button class="btn btn-ghost" onclick="cancelUpNext()">Cancel</button>
      <button class="btn btn-primary" onclick="playNextEpisode()">Play Now</button>
    </div>`;
  const countEl = document.getElementById('upNextCount');
  state.player._upNextInterval = setInterval(()=>{
    seconds--;
    if(countEl) countEl.textContent = seconds;
    if(seconds<=0){
      clearInterval(state.player._upNextInterval);
      playNextEpisode();
    }
  }, 1000);
}
function cancelUpNext(){
  if(state.player && state.player._upNextInterval) clearInterval(state.player._upNextInterval);
  const el = document.getElementById('upNextBanner');
  if(el) el.innerHTML = '';
}
function saveProgress(item, key, timestamp, duration, watched){
  item.progress = item.progress || {};
  item.progress[key] = {timestamp: Math.round(timestamp||0), duration: Math.round(duration||0), watched: !!watched};
  item.lastWatched = new Date().toISOString();
  saveLib();
}
function tryNextSource(){
  const p = state.player;
  p.sourceIdx = (p.sourceIdx+1) % p.sources.length;
  cleanupPlayerTimers();
  renderPlayer();
}
function cleanupPlayerTimers(){
  if(state.player){
    clearInterval(state.player._interval);
    clearTimeout(state.player._watchTimer);
    clearInterval(state.player._upNextInterval);
  }
  clearTimeout(controlsHideTimer);
}
let controlsHideTimer = null;
function scheduleHideControls(){
  clearTimeout(controlsHideTimer);
  const overlay = document.getElementById('playerOverlay');
  if(overlay) overlay.classList.remove('controls-hidden');
  controlsHideTimer = setTimeout(()=>{
    const ov = document.getElementById('playerOverlay');
    if(ov && ov.classList.contains('open')) ov.classList.add('controls-hidden');
  }, 3200);
}
document.addEventListener('mousemove', e=>{
  const overlay = document.getElementById('playerOverlay');
  if(overlay && overlay.classList.contains('open')) scheduleHideControls();
});
document.addEventListener('touchstart', e=>{
  const overlay = document.getElementById('playerOverlay');

});
function closePlayer(){
  cleanupPlayerTimers();
  document.getElementById('playerOverlay').classList.remove('open','controls-hidden');
  setTimeout(()=>{ document.getElementById('playerOverlay').innerHTML=''; }, 260);
  state.player = null;
  router();
}

/* =========================================================
   GLOBAL KEYS
========================================================= */
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(document.getElementById('playerOverlay').classList.contains('open')) closePlayer();
    else if(document.getElementById('modalOverlay').classList.contains('open')) closeModal();
  }
});

/* =========================================================
   INIT
========================================================= */
router.__manual__ = function(){};
router();
</script>
</body>
