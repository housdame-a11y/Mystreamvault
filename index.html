      <textarea id="seasonsJsonText" style="min-height:230px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px;" placeholder='[
  {
    "number": 1,
    "episodes": [
      { "title": "Pilot", "url": "https://..." },
      { "title": "Episode 2", "sources": [{ "label": "VidSrc", "url": "https://..." }] }
    ]
  },
  {
    "number": 2,
    "episodes": [ { "title": "S2E1", "url": "https://..." } ]
  }
]'></textarea>
      <div class="field-hint">Array of seasons (or <code>{"seasons":[...]}</code>). Each episode accepts <code>"url"</code>, <code>"urls":[...]</code>, or <code>"sources":[{"label","url"}]</code>. If you've already fetched metadata (title, thumbnail, synopsis, runtime) from TMDB/IMDb, importing here only updates the stream links for matching episodes — everything else fetched stays intact. New seasons/episodes not already present get added.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="renderEditModal(state.editingId?getItem(state.editingId):null)">Cancel</button>
      <button class="btn btn-primary" onclick="applySeasonsJsonImport()">Import Seasons</button>
    </div>
  `);
}
function normalizeSeasonsJson(data){
  const arr = Array.isArray(data) ? data : (data && Array.isArray(data.seasons) ? data.seasons : null);
  if(!arr) throw new Error('JSON must be an array of seasons, or an object like {"seasons":[...]}');
  return arr.map((s,si)=>{
    const number = parseInt(s.number ?? s.season ?? s.season_number ?? (si+1), 10) || (si+1);
    const eps = Array.isArray(s.episodes) ? s.episodes : [];
    const episodes = eps.map((e,ei)=>{
      const num = parseInt(e.number ?? e.episode ?? e.episode_number ?? (ei+1), 10) || (ei+1);
      let sources = [];
      if(Array.isArray(e.sources)) sources = e.sources.map(src=>({label:(src.label||'Source').toString(), url:(src.url||src.link||'').toString()})).filter(s=>s.url);
      else if(Array.isArray(e.urls)) sources = e.urls.filter(Boolean).map((u,i)=>({label:'Source '+(i+1), url:u}));
      else if(typeof e.url==='string' && e.url) sources = [{label:'Source 1', url:e.url}];
      else if(typeof e.link==='string' && e.link) sources = [{label:'Source 1', url:e.link}];
      if(!sources.length) sources = [{label:'',url:''}];
      return {number:num, title:(e.title||('Episode '+num)).toString(), thumbnail:(e.thumbnail||e.image||'').toString(), sources};
    });
    return {number, episodes};
  });
}
function applySeasonsJsonImport(){
  const text = document.getElementById('seasonsJsonText').value.trim();
  if(!text){ toast('Paste some JSON first'); return; }
  let data;
  try{ data = JSON.parse(text); }
  catch(e){ toast('Invalid JSON: '+e.message); return; }
  let normalized;
  try{ normalized = normalizeSeasonsJson(data); }
  catch(e){ toast(e.message); return; }

  let linksUpdated = 0, episodesAdded = 0, seasonsAdded = 0;
  normalized.forEach(ns=>{
    const season = state.editSeasons.find(s=>s.number===ns.number);
    if(!season){
      // Brand new season we don't have yet — nothing to merge with, add it as-is.
      state.editSeasons.push(ns);
      seasonsAdded++;
      episodesAdded += ns.episodes.length;
      return;
    }
    season.episodes = season.episodes || [];
    ns.episodes.forEach(newEp=>{
      const existingEp = season.episodes.find(e=>e.number===newEp.number);
      if(existingEp){
        // Only replace the links. Title/thumbnail/overview/runtime/rating already fetched from
        // TMDB/IMDb stay untouched — this is the whole point: re-pasting a links-only JSON after
        // fetching metadata shouldn't wipe that metadata back out.
        existingEp.sources = newEp.sources;
        // Fill in title/thumbnail only if we don't already have a real one (a generic
        // "Episode N" placeholder counts as not having one).
        if(newEp.title && (!existingEp.title || /^Episode \d+$/i.test(existingEp.title))) existingEp.title = newEp.title;
        if(newEp.thumbnail && !existingEp.thumbnail) existingEp.thumbnail = newEp.thumbnail;
        linksUpdated++;
      } else {
        season.episodes.push(newEp);
        episodesAdded++;
      }
    });
    season.episodes.sort((a,b)=>a.number-b.number);
  });
  state.editSeasons.sort((a,b)=>a.number-b.number);
  renderEditModal(state.editingId?getItem(state.editingId):null);
  const parts = [];
  if(linksUpdated) parts.push(`updated links for ${linksUpdated} episode(s)`);
  if(episodesAdded) parts.push(`added ${episodesAdded} new episode(s)`);
  if(seasonsAdded) parts.push(`${seasonsAdded} new season(s)`);
  toast(parts.length ? parts.join(', ').replace(/^./, c=>c.toUpperCase()) : 'Nothing to import');
}

// Normalizes OMDb's Ratings array (IMDb/Rotten Tomatoes/Metacritic, whichever it has) into plain
// {source,value} pairs for the multi-source ratings row on the detail page. OMDb labels its own IMDb
// entry "Internet Movie Database" — renamed here to the name people actually recognize.
function normalizeOmdbRatings(data){
  const src = (data && data.Ratings) || [];
  return src.map(r=>({ source: r.Source==='Internet Movie Database' ? 'IMDb' : r.Source, value: r.Value }));
}
async function fetchOmdb(){
  const title = document.getElementById('f_title').value.trim();
  if(!title){ toast('Enter a title first'); return; }
  if(!state.settings.omdb){ toast('Add your OMDb API key in Settings'); return; }
  try{
    const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${encodeURIComponent(state.settings.omdb)}`);
    const data = await res.json();
    if(data.Response==='False'){ toast(data.Error||'Not found'); return; }
    document.getElementById('f_title').value = data.Title || title;
    document.getElementById('f_year').value = (data.Year||'').split('–')[0].split('-')[0];
    document.getElementById('f_poster').value = data.Poster && data.Poster!=='N/A' ? data.Poster : '';
    document.getElementById('f_desc').value = data.Plot && data.Plot!=='N/A' ? data.Plot : '';
    document.getElementById('f_rating').value = data.imdbRating && data.imdbRating!=='N/A' ? data.imdbRating : '';
    if(document.getElementById('f_runtime')) document.getElementById('f_runtime').value = data.Runtime && data.Runtime!=='N/A' ? data.Runtime : '';
    if(document.getElementById('f_contentRating')) document.getElementById('f_contentRating').value = data.Rated && data.Rated!=='N/A' ? data.Rated : '';
    if(document.getElementById('f_awards')) document.getElementById('f_awards').value = data.Awards && data.Awards!=='N/A' ? data.Awards : '';
    if(data.Director && data.Director!=='N/A' && document.getElementById('f_director')) document.getElementById('f_director').value = data.Director;
    state.editRatings = normalizeOmdbRatings(data);
    if(data.Genre) state.editGenres = data.Genre.split(',').map(g=>g.trim()).filter(Boolean);
    if(data.Actors && data.Actors!=='N/A') state.editActors = data.Actors.split(',').map(a=>a.trim()).filter(Boolean);
    if(data.imdbID) state.editImdbMeta = Object.assign({}, state.editImdbMeta, {imdbId:data.imdbID});
    if(data.Genre || (data.Actors && data.Actors!=='N/A')){
      renderEditModal(state.editingId?getItem(state.editingId):null);
      // restore field values after full re-render since it wipes typed inputs
      document.getElementById('f_title').value = data.Title || title;
      document.getElementById('f_year').value = (data.Year||'').split('–')[0].split('-')[0];
      document.getElementById('f_poster').value = data.Poster && data.Poster!=='N/A' ? data.Poster : '';
      document.getElementById('f_desc').value = data.Plot && data.Plot!=='N/A' ? data.Plot : '';
      document.getElementById('f_rating').value = data.imdbRating && data.imdbRating!=='N/A' ? data.imdbRating : '';
      if(document.getElementById('f_runtime')) document.getElementById('f_runtime').value = data.Runtime && data.Runtime!=='N/A' ? data.Runtime : '';
      if(document.getElementById('f_contentRating')) document.getElementById('f_contentRating').value = data.Rated && data.Rated!=='N/A' ? data.Rated : '';
      if(document.getElementById('f_awards')) document.getElementById('f_awards').value = data.Awards && data.Awards!=='N/A' ? data.Awards : '';
      if(data.Director && data.Director!=='N/A' && document.getElementById('f_director')) document.getElementById('f_director').value = data.Director;
    }
    toast('Metadata fetched from OMDb');
  }catch(e){ toast('Failed to fetch metadata'); }
}

// Shared TMDB detail pull used by both "Fetch from TMDB" (by title) and the IMDb auto-import.
// Populates genres/cast/poster/backdrop/logo/rating/runtime/description, and for TV shows,
// walks every season and pulls real episode titles + thumbnails (sources are left for you to add).
async function applyTmdbDetails(tmdbId, tmdbType){
  const key = state.settings.tmdb;
  // release_dates (movie) / content_ratings (tv) is how TMDB exposes age/content ratings — only one
  // of the two exists per title type, so it's picked based on tmdbType rather than requesting both.
  const ratingsAppend = tmdbType==='movie' ? 'release_dates' : 'content_ratings';
  const detailsRes = await fetch(`https://api.themoviedb.org/3/${tmdbType}/${tmdbId}?api_key=${encodeURIComponent(key)}&append_to_response=credits,videos,images,${ratingsAppend}&include_image_language=en,null`);
  const d = await detailsRes.json();
  if(d.success===false) throw new Error(d.status_message||'TMDB lookup failed');

  const titleVal = tmdbType==='movie' ? d.title : d.name;
  const dateVal = tmdbType==='movie' ? d.release_date : d.first_air_date;
  const year = dateVal ? dateVal.split('-')[0] : '';
  const poster = d.poster_path ? `https://image.tmdb.org/t/p/w780${d.poster_path}` : '';
  const backdrop = d.backdrop_path ? `https://image.tmdb.org/t/p/w1280${d.backdrop_path}` : '';
  const genres = (d.genres||[]).map(g=>g.name);
  const rating = d.vote_average ? d.vote_average.toFixed(1) : '';
  const runtimeMinutes = tmdbType==='movie' ? d.runtime : (d.episode_run_time && d.episode_run_time[0]);
  const runtime = runtimeMinutes ? `${runtimeMinutes} min` : '';
  const overview = d.overview || '';
  const tagline = d.tagline || '';
  const cast = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>c.name);
  // Same cast slice, but keeping the character name too — used for the detail-page "Full Cast" row
  // (state.editCast) rather than the plain "Starring" chip list (state.editActors), which stays
  // free-text/manually-editable since not everyone importing has a TMDB key.
  const castDetailed = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>({name:c.name, character:c.character||'', photo:c.profile_path?`https://image.tmdb.org/t/p/w185${c.profile_path}`:''}));
  // Director (movies) pulled from the crew list; TV shows don't have a single "director" credit on
  // the show level, so created_by (the showrunner/creator) is used instead — same field in the UI,
  // just a different underlying source depending on type.
  const director = tmdbType==='movie'
    ? ((d.credits && d.credits.crew) || []).filter(c=>c.job==='Director').map(c=>c.name).join(', ')
    : ((d.created_by||[]).map(c=>c.name).join(', '));
  // US content rating (PG-13, TV-MA, etc.) — falls back to blank rather than another country's
  // rating system, since mixing rating scales would be more confusing than just leaving it empty.
  let contentRating = '';
  if(tmdbType==='movie' && d.release_dates && d.release_dates.results){
    const us = d.release_dates.results.find(r=>r.iso_3166_1==='US');
    const cert = us && (us.release_dates||[]).map(rd=>rd.certification).find(c=>c);
    if(cert) contentRating = cert;
  } else if(tmdbType==='tv' && d.content_ratings && d.content_ratings.results){
    const us = d.content_ratings.results.find(r=>r.iso_3166_1==='US');
    if(us && us.rating) contentRating = us.rating;
  }
  // TV-only: whether the show is still airing, and when the next episode drops.
  let tvStatus = '', nextEpisode = null;
  if(tmdbType==='tv'){
    tvStatus = d.status || '';
    if(d.next_episode_to_air){
      nextEpisode = {
        season: d.next_episode_to_air.season_number,
        episode: d.next_episode_to_air.episode_number,
        name: d.next_episode_to_air.name || '',
        airDate: d.next_episode_to_air.air_date || ''
      };
    }
  }
  const logos = (d.images && d.images.logos) || [];
  const bestLogo = logos.find(l=>l.iso_639_1==='en') || logos[0];
  const logo = bestLogo ? `https://image.tmdb.org/t/p/original${bestLogo.file_path}` : '';
  const videos = ((d.videos && d.videos.results) || []).filter(v=>v.site==='YouTube');
  const trailerVid = videos.find(v=>v.type==='Trailer' && v.official) || videos.find(v=>v.type==='Trailer') || videos.find(v=>v.type==='Teaser') || videos[0];

  if(genres.length) state.editGenres = genres;
  if(cast.length) state.editActors = cast;
  state.editCast = castDetailed;
  state.editTvStatus = tvStatus;
  state.editNextEpisode = nextEpisode;

  let episodeCount = 0, seasonCount = 0;
  if(tmdbType==='tv' && Array.isArray(d.seasons)){
    const realSeasons = d.seasons.filter(s=>s.season_number>0);
    const seasonsData = [];
    for(const s of realSeasons){
      try{
        const seasonRes = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${s.season_number}?api_key=${encodeURIComponent(key)}`);
        const seasonJson = await seasonRes.json();
        const episodes = (seasonJson.episodes||[]).map(e=>({
          number: e.episode_number,
          title: e.name || `Episode ${e.episode_number}`,
          thumbnail: e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : '',
          overview: e.overview || '',
          runtime: e.runtime || null,
          airDate: e.air_date || '',
          tmdbRating: e.vote_average || 0,
          sources: [{label:'',url:''}]
        }));
        seasonsData.push({number: s.season_number, poster: seasonJson.poster_path ? `https://image.tmdb.org/t/p/w300${seasonJson.poster_path}` : '', overview: seasonJson.overview || '', episodes});
        episodeCount += episodes.length;
      }catch(e){ /* skip a season that fails to load rather than aborting the whole import */ }
    }
    seasonCount = seasonsData.length;
    state.editSeasons = seasonsData;
  }

  // Re-render so the genre pool / cast chips / season editor reflect the new data, then restore field values.
  // NOTE: this recreates every element in the modal (including any button that triggered this call),
  // so callers must not hold onto a DOM reference captured before this point — re-query by id instead.
  renderEditModal(state.editingId ? getItem(state.editingId) : null);
  const setVal = (id, val)=>{ const el=document.getElementById(id); if(el && val) el.value = val; };
  setVal('f_title', titleVal);
  setVal('f_year', year);
  setVal('f_poster', poster);
  setVal('f_backdrop', backdrop);
  setVal('f_logo', logo);
  setVal('f_desc', overview);
  setVal('f_rating', rating);
  setVal('f_runtime', runtime);
  setVal('f_tagline', tagline);
  setVal('f_director', director);
  setVal('f_contentRating', contentRating);

  return { tmdbId, trailerKey: trailerVid ? trailerVid.key : '', logo, seasonCount, episodeCount, tvStatus, nextEpisode };
}

function setTmdbFetchBtnState(text, disabled){
  // Re-queried on demand rather than captured once, since applyTmdbDetails re-renders the whole
  // modal partway through and replaces this button with a fresh element.
  const b = document.getElementById('tmdbFetchBtn');
  if(b){ b.disabled = disabled; b.textContent = text; }
}
async function fetchTmdbByTitle(){
  const title = document.getElementById('f_title').value.trim();
  if(!title){ toast('Enter a title first'); return; }
  if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings'); return; }
  setTmdbFetchBtnState('Fetching...', true);
  try{
    const tmdbType = state.editType==='series' ? 'tv' : 'movie';
    const yearVal = document.getElementById('f_year').value.trim();
    const yearParam = yearVal ? (tmdbType==='movie' ? `&year=${encodeURIComponent(yearVal)}` : `&first_air_date_year=${encodeURIComponent(yearVal)}`) : '';
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/${tmdbType}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(title)}${yearParam}`);
    const searchData = await searchRes.json();
    if(searchData.success===false){
      toast(`TMDB error: ${searchData.status_message||'request failed'} — check your API key in Settings (it needs the "API Key (v3 auth)", not the Read Access Token)`);
      return;
    }
    const match = searchData.results && searchData.results[0];
    if(!match){ toast(`No TMDB match found for "${title}"${yearVal?' ('+yearVal+')':''}${yearVal?' — try clearing the year and searching again':''}`); return; }
    const info = await applyTmdbDetails(match.id, tmdbType);
    state.editImdbMeta = Object.assign({}, state.editImdbMeta, {tmdbId: info.tmdbId, trailerKey: info.trailerKey, trailerChecked: !!info.trailerKey});
    toast(info.seasonCount ? `Fetched from TMDB — ${info.seasonCount} season(s), ${info.episodeCount} episode(s)` : 'Metadata fetched from TMDB');
  }catch(e){
    toast('Failed to fetch from TMDB: ' + (e.message || 'network error'));
  }finally{
    setTmdbFetchBtnState('Fetch from TMDB', false);
  }
}

// IMDb Auto Import: paste any IMDb title URL, get metadata + (for TV) full season/episode
// structure pulled automatically from OMDb + TMDB. The imdbId captured here (state.editImdbMeta.imdbId,
// saved onto the item as item.imdbId) is what getMovieSources()/getEpisodeSources() use to generate
// a playable "Streaming Provider" link at playback time — see the DYNAMIC STREAMING PROVIDER section.
// Manually pasted sources still work too and are kept as fallbacks after the generated link.
async function importFromImdb(){
  const raw = document.getElementById('imdbUrlInput').value.trim();
  const idMatch = raw.match(/tt\d{6,10}/);
  if(!idMatch){ toast('Paste a valid IMDb URL (e.g. imdb.com/title/tt0111161/)'); return; }
  const imdbId = idMatch[0];
  if(!state.settings.omdb){ toast('Add your OMDb API key in Settings first'); return; }
  if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings first — needed for backdrops, logos, trailers, and season data'); return; }

  const setBtnState = (text, disabled)=>{
    // Re-queried on demand since applyTmdbDetails re-renders the whole modal partway through.
    const b = document.getElementById('imdbImportBtn');
    if(b){ b.disabled = disabled; b.textContent = text; }
  };
  setBtnState('Importing...', true);
  try{
    // OMDb by IMDb ID gives us a reliable Movie/Series type plus baseline fields.
    const omdbRes = await fetch(`https://www.omdbapi.com/?i=${encodeURIComponent(imdbId)}&plot=full&apikey=${encodeURIComponent(state.settings.omdb)}`);
    const omdb = await omdbRes.json();
    if(omdb.Response==='False'){ toast(omdb.Error || 'IMDb ID not found on OMDb — double-check your OMDb key in Settings'); return; }
    const type = omdb.Type==='series' ? 'series' : 'movie';
    state.editType = type;

    // Resolve the TMDB numeric ID from the IMDb ID so we can pull backdrops/logos/trailers/seasons.
    const tmdbType = type==='series' ? 'tv' : 'movie';
    const findRes = await fetch(`https://api.themoviedb.org/3/find/${imdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}&external_source=imdb_id`);
    const find = await findRes.json();
    if(find.success===false){
      toast(`TMDB error: ${find.status_message||'request failed'} — check your API key in Settings (it needs the "API Key (v3 auth)", not the Read Access Token)`);
      return;
    }
    const results = tmdbType==='movie' ? find.movie_results : find.tv_results;
    const tmdbMatch = results && results[0];

    let info = null;
    if(tmdbMatch){
      info = await applyTmdbDetails(tmdbMatch.id, tmdbType);
    } else {
      if(omdb.Genre) state.editGenres = omdb.Genre.split(',').map(g=>g.trim()).filter(Boolean);
      if(omdb.Actors && omdb.Actors!=='N/A') state.editActors = omdb.Actors.split(',').map(a=>a.trim()).filter(Boolean);
      renderEditModal(state.editingId?getItem(state.editingId):null);
    }

    // Fill in anything TMDB left blank (or wasn't available at all) using OMDb's data,
    // and prefer OMDb's IMDb rating since that's the number most people recognize.
    const setIfEmpty = (id, val)=>{ const el=document.getElementById(id); if(el && !el.value && val && val!=='N/A') el.value = val; };
    setIfEmpty('f_title', omdb.Title);
    setIfEmpty('f_year', (omdb.Year||'').split('–')[0].split('-')[0]);
    setIfEmpty('f_poster', omdb.Poster);
    setIfEmpty('f_desc', omdb.Plot);
    setIfEmpty('f_runtime', omdb.Runtime);
    if(omdb.imdbRating && omdb.imdbRating!=='N/A'){ const r=document.getElementById('f_rating'); if(r) r.value = omdb.imdbRating; }
    // Director/content-rating: prefer whatever TMDB already filled in above; OMDb only fills the gap.
    setIfEmpty('f_director', omdb.Director);
    setIfEmpty('f_contentRating', omdb.Rated);
    // Awards and the multi-source ratings row (Rotten Tomatoes / Metacritic alongside IMDb) only
    // exist on OMDb — TMDB has no equivalent data — so these always come from here, not TMDB.
    setIfEmpty('f_awards', omdb.Awards);
    const omdbRatings = normalizeOmdbRatings(omdb);
    if(omdbRatings.length) state.editRatings = omdbRatings;

    state.editImdbMeta = {
      imdbId,
      tmdbId: info ? info.tmdbId : null,
      trailerKey: info ? info.trailerKey : '',
      trailerChecked: !!(info && info.trailerKey),
    };

    const seasonNote = (info && info.seasonCount) ? ` — ${info.seasonCount} season(s), ${info.episodeCount} episode(s)` : '';
    const tmdbNote = tmdbMatch ? '' : ' (no TMDB match — used OMDb data only, so no backdrop/logo/trailer)';
    toast(`Imported from IMDb${seasonNote}${tmdbNote}. Now add your stream source(s) below.`);
  }catch(e){
    toast('Import failed: ' + (e.message || 'check your API keys and the IMDb URL'));
  }finally{
    setBtnState('Import', false);
  }
}

/* =========================================================
   BULK IMPORT FROM IMDb
   ---------------------------------------------------------
   Lets you paste many IMDb links/IDs (or a JSON array/blob containing them) at once. Each one goes
   through the exact same OMDb + TMDB lookups importFromImdb() uses for a single title — same
   endpoints, same field derivation, same season/episode shape — just without touching the edit
   modal's DOM/state.edit* draft, since nothing here is being edited by hand. Streaming links for
   every item this produces are still generated at playback time from item.imdbId exactly like any
   title added one at a time (see DYNAMIC STREAMING PROVIDER, below the player section) — nothing
   about how sources are produced changes for bulk-added titles.
========================================================= */
// Headless twin of applyTmdbDetails(): same TMDB endpoints and same field derivation, but returns
// a plain data object instead of writing into the edit modal's DOM fields / state.edit* draft.
async function fetchTmdbDetailsHeadless(tmdbId, tmdbType){
  const key = state.settings.tmdb;
  const ratingsAppend = tmdbType==='movie' ? 'release_dates' : 'content_ratings';
  const detailsRes = await fetch(`https://api.themoviedb.org/3/${tmdbType}/${tmdbId}?api_key=${encodeURIComponent(key)}&append_to_response=credits,videos,images,${ratingsAppend}&include_image_language=en,null`);
  const d = await detailsRes.json();
  if(d.success===false) throw new Error(d.status_message || 'TMDB lookup failed');

  const title = tmdbType==='movie' ? d.title : d.name;
  const dateVal = tmdbType==='movie' ? d.release_date : d.first_air_date;
  const year = dateVal ? dateVal.split('-')[0] : '';
  const poster = d.poster_path ? `https://image.tmdb.org/t/p/w780${d.poster_path}` : '';
  const backdrop = d.backdrop_path ? `https://image.tmdb.org/t/p/w1280${d.backdrop_path}` : '';
  const genre = (d.genres||[]).map(g=>g.name);
  const rating = d.vote_average ? d.vote_average.toFixed(1) : '';
  const runtimeMinutes = tmdbType==='movie' ? d.runtime : (d.episode_run_time && d.episode_run_time[0]);
  const runtime = runtimeMinutes ? `${runtimeMinutes} min` : '';
  const description = d.overview || '';
  const tagline = d.tagline || '';
  const actors = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>c.name);
  const cast = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>({name:c.name, character:c.character||'', photo:c.profile_path?`https://image.tmdb.org/t/p/w185${c.profile_path}`:''}));
  const director = tmdbType==='movie'
    ? ((d.credits && d.credits.crew) || []).filter(c=>c.job==='Director').map(c=>c.name).join(', ')
    : ((d.created_by||[]).map(c=>c.name).join(', '));
  let contentRating = '';
  if(tmdbType==='movie' && d.release_dates && d.release_dates.results){
    const us = d.release_dates.results.find(r=>r.iso_3166_1==='US');
    const cert = us && (us.release_dates||[]).map(rd=>rd.certification).find(c=>c);
    if(cert) contentRating = cert;
  } else if(tmdbType==='tv' && d.content_ratings && d.content_ratings.results){
    const us = d.content_ratings.results.find(r=>r.iso_3166_1==='US');
    if(us && us.rating) contentRating = us.rating;
  }
  let tvStatus = '', nextEpisodeInfo = null;
  if(tmdbType==='tv'){
    tvStatus = d.status || '';
    if(d.next_episode_to_air){
      nextEpisodeInfo = {
        season: d.next_episode_to_air.season_number, episode: d.next_episode_to_air.episode_number,
        name: d.next_episode_to_air.name || '', airDate: d.next_episode_to_air.air_date || ''
      };
    }
  }
  const logos = (d.images && d.images.logos) || [];
  const bestLogo = logos.find(l=>l.iso_639_1==='en') || logos[0];
  const logo = bestLogo ? `https://image.tmdb.org/t/p/original${bestLogo.file_path}` : '';
  // Up to 8 candidates each, best-match first — used by the Add Title wizard's Poster/Backdrop/Logo
  // steps (wizardStepPosterHtml etc). Ignored by any other caller of this function, so purely additive.
  const posterCandidates = ((d.images && d.images.posters) || []).slice(0,8).map(p=>`https://image.tmdb.org/t/p/w500${p.file_path}`);
  const backdropCandidates = ((d.images && d.images.backdrops) || []).slice(0,8).map(p=>`https://image.tmdb.org/t/p/w780${p.file_path}`);
  const logoCandidates = logos.slice(0,8).map(l=>`https://image.tmdb.org/t/p/w500${l.file_path}`);
  const videos = ((d.videos && d.videos.results) || []).filter(v=>v.site==='YouTube');
  const trailerVid = videos.find(v=>v.type==='Trailer' && v.official) || videos.find(v=>v.type==='Trailer') || videos.find(v=>v.type==='Teaser') || videos[0];

  let seasons = [], seasonCount = 0, episodeCount = 0;
  if(tmdbType==='tv' && Array.isArray(d.seasons)){
    const realSeasons = d.seasons.filter(s=>s.season_number>0);
    for(const s of realSeasons){
      try{
        const seasonRes = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${s.season_number}?api_key=${encodeURIComponent(key)}`);
        const seasonJson = await seasonRes.json();
        const episodes = (seasonJson.episodes||[]).map(e=>({
          number: e.episode_number, title: e.name || `Episode ${e.episode_number}`,
          thumbnail: e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : '',
          overview: e.overview || '', runtime: e.runtime || null, airDate: e.air_date || '',
          tmdbRating: e.vote_average || 0, myRating: 0, sources: []
        }));
        seasons.push({number: s.season_number, poster: seasonJson.poster_path ? `https://image.tmdb.org/t/p/w300${seasonJson.poster_path}` : '', overview: seasonJson.overview || '', episodes});
        episodeCount += episodes.length;
      }catch(e){ /* skip a season that fails to load rather than aborting the whole import */ }
    }
    seasonCount = seasons.length;
  }

  return {
    tmdbId, trailerKey: trailerVid ? trailerVid.key : '', seasons, seasonCount, episodeCount,
    posterCandidates, backdropCandidates, logoCandidates,
    fields: { title, year, poster, backdrop, logo, genre, rating, runtime, description, tagline, director, contentRating, actors, cast, tvStatus, nextEpisodeInfo }
  };
}
// Headless twin of importFromImdb(): same OMDb + TMDB lookups, same "TMDB first, OMDb fills the
// gaps" merge order, but builds and returns a plain item payload instead of writing into the edit
// modal. Throws with a message identifying the IMDb ID on any failure, so the caller can attribute
// it in the results list.
async function buildLibraryItemFromImdb(imdbId){
  const omdbRes = await fetch(`https://www.omdbapi.com/?i=${encodeURIComponent(imdbId)}&plot=full&apikey=${encodeURIComponent(state.settings.omdb)}`);
  const omdb = await omdbRes.json();
  if(omdb.Response==='False') throw new Error(`${imdbId}: ${omdb.Error || 'not found on OMDb'}`);
  const type = omdb.Type==='series' ? 'series' : 'movie';
  const tmdbType = type==='series' ? 'tv' : 'movie';

  const findRes = await fetch(`https://api.themoviedb.org/3/find/${imdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}&external_source=imdb_id`);
  const find = await findRes.json();
  if(find.success===false) throw new Error(`${imdbId}: TMDB error — ${find.status_message||'request failed'}`);
  const results = tmdbType==='movie' ? find.movie_results : find.tv_results;
  const tmdbMatch = results && results[0];

  const payload = { type, imdbId, genre:[], actors:[] };
  let info = null;
  if(tmdbMatch){
    info = await fetchTmdbDetailsHeadless(tmdbMatch.id, tmdbType);
    Object.assign(payload, info.fields);
    if(type==='series') payload.seasons = info.seasons;
  } else {
    if(omdb.Genre) payload.genre = omdb.Genre.split(',').map(g=>g.trim()).filter(Boolean);
    if(omdb.Actors && omdb.Actors!=='N/A') payload.actors = omdb.Actors.split(',').map(a=>a.trim()).filter(Boolean);
  }

  // Fill in anything TMDB left blank (or wasn't available at all) using OMDb's data, same as
  // importFromImdb()'s setIfEmpty pass — and prefer OMDb's IMDb rating either way.
  const setIfEmpty = (key, val)=>{ if(!payload[key] && val && val!=='N/A') payload[key] = val; };
  setIfEmpty('title', omdb.Title);
  setIfEmpty('year', (omdb.Year||'').split('–')[0].split('-')[0]);
  setIfEmpty('poster', omdb.Poster);
  setIfEmpty('description', omdb.Plot);
  setIfEmpty('runtime', omdb.Runtime);
  if(omdb.imdbRating && omdb.imdbRating!=='N/A') payload.rating = omdb.imdbRating;
  setIfEmpty('director', omdb.Director);
  setIfEmpty('contentRating', omdb.Rated);
  setIfEmpty('awards', omdb.Awards);
  const omdbRatings = normalizeOmdbRatings(omdb);
  if(omdbRatings.length) payload.ratings = omdbRatings;

  if(!payload.title) throw new Error(`${imdbId}: no title found on either OMDb or TMDB`);
  payload.tmdbId = info ? info.tmdbId : null;
  payload.trailerKey = info ? info.trailerKey : '';
  payload.trailerChecked = !!(info && info.trailerKey);
  if(type==='movie') payload.sources = [];
  else payload.seasons = payload.seasons || [];

  return payload;
}
// Pulls every tt-prefixed IMDb ID out of arbitrary pasted text — plain URLs, bare IDs, one per
// line, comma-separated, or the same IDs sitting inside a JSON array/blob (as either bare strings
// or as a field on an object). Because the ID itself always has the same tt######## shape no matter
// which of those formats it's wrapped in, a single regex sweep over the raw text handles all of
// them at once without needing to first decide whether the input is JSON or plain text.
function extractImdbIds(raw){
  const found = (raw.match(/tt\d{6,10}/g) || []);
  return [...new Set(found)]; // de-dupe, keep first-seen order
}
function openBulkImdbImport(){
  openModal(`
    <div class="modal-head"><h2>Bulk Import from IMDb</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div class="field">
      <label>IMDb Links or IDs</label>
      <textarea id="bulkImdbInput" rows="10" placeholder="One per line, e.g.&#10;https://www.imdb.com/title/tt0111161/&#10;https://www.imdb.com/title/tt0068646/&#10;tt0071562&#10;&#10;...or paste a JSON array/blob containing them — either works, IDs are pulled out automatically."></textarea>
      <div class="field-hint">Each one gets the same OMDb + TMDB lookup as importing a single title — title, poster, cast, and for TV shows every season/episode. Streaming links are generated automatically from each title's IMDb ID at playback time, same as always. The <strong>last one in the list becomes the newest</strong> title in your library (top of Recently Added); titles already in your library (matched by IMDb ID) are skipped rather than duplicated.</div>
    </div>
    <button class="btn btn-primary" onclick="runBulkImdbImport()">Import All</button>
  `);
}
async function runBulkImdbImport(){
  if(!state.settings.omdb){ toast('Add your OMDb API key in Settings first'); return; }
  if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings first — needed for backdrops, logos, and season data'); return; }
  const raw = document.getElementById('bulkImdbInput').value;
  const ids = extractImdbIds(raw);
  if(!ids.length){ toast('No IMDb IDs found — paste links, bare IDs, or JSON containing them'); return; }

  openModal(`
    <div class="modal-head"><h2>Importing…</h2></div>
    <div style="text-align:center; padding:36px 0;">
      <div class="spinner" style="margin:0 auto 18px auto;"></div>
      <div id="bulkImdbProgressText" style="color:var(--muted); font-size:13px;">Starting…</div>
    </div>
  `);
  const setProgress = (text)=>{ const el=document.getElementById('bulkImdbProgressText'); if(el) el.textContent = text; };

  const existingIds = new Set(state.lib.items.map(i=>i.imdbId).filter(Boolean));
  const added = [], skipped = [], failed = [];
  // Sequential, not parallel: keeps this well under OMDb/TMDB rate limits and gives each item a
  // strictly increasing dateAdded (see below) so "last in the list = newest" is exact, not a race.
  const baseTime = Date.now();
  for(let i=0;i<ids.length;i++){
    const imdbId = ids[i];
    setProgress(`Importing ${i+1} / ${ids.length}… (${imdbId})`);
    if(existingIds.has(imdbId)){ skipped.push(imdbId); continue; }
    try{
      const payload = await buildLibraryItemFromImdb(imdbId);
      const item = {
        id: uuid(), dateAdded: new Date(baseTime + i*1000).toISOString(), lastWatched: null, progress:{},
        ...payload
      };
      state.lib.items.push(item);
      existingIds.add(imdbId);
      added.push(item);
    }catch(e){
      failed.push({imdbId, message: e.message || 'unknown error'});
    }
  }
  if(added.length) saveLib();
  renderBulkImdbImportReport(added, skipped, failed);
}
function renderBulkImdbImportReport(added, skipped, failed){
  openModal(`
    <div class="modal-head"><h2>Import Complete</h2><button class="btn-icon" onclick="closeModal(); router();">${ICON.close}</button></div>
    <div class="field-hint" style="margin-bottom:16px;">
      ${added.length} added, ${skipped.length} already in your library, ${failed.length} failed.
    </div>
    ${added.length ? `
      <div style="display:flex; flex-direction:column; gap:6px; max-height:260px; overflow-y:auto; margin-bottom:16px;">
        ${added.map(it=>`
          <div class="link-health-row">
            <div style="min-width:0;">
              <div class="link-health-title">${esc(it.title)}${it.year?` (${esc(it.year)})`:''}</div>
              <div class="link-health-url">${it.type==='series' ? 'TV Show' : 'Movie'} · ${esc(it.imdbId)}</div>
            </div>
          </div>`).join('')}
      </div>
    ` : ''}
    ${failed.length ? `
      <div class="field-hint" style="margin-bottom:8px;">Failed:</div>
      <div style="display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto;">
        ${failed.map(f=>`
          <div class="link-health-row">
            <div style="min-width:0;">
              <div class="link-health-title">${esc(f.imdbId)}</div>
              <div class="link-health-url">${esc(f.message)}</div>
            </div>
          </div>`).join('')}
      </div>
    ` : ''}
    <button class="btn btn-primary" style="margin-top:16px;" onclick="closeModal(); router();">Done</button>
  `);
}

/* =========================================================
   ADD TITLE WIZARD
   ---------------------------------------------------------
   The old single "Add Title" modal is still used for editing a title you already added
   (openEditModal(id) / renderEditModal) — untouched. This is the new flow for ADDING one, or many
   at once: a guided, deliberately fine-grained wizard (Links -> Basic Info -> Details -> Cast & Story -> Genre
   -> Poster -> Backdrop -> Logo -> Extra Art -> Sources -> Confirm) that replaces both the old blank
   Add Title form and the standalone Bulk Import modal. Each step is kept short on purpose so it fits
   without scrolling — the old single "Info" and "Artwork" steps were split into several smaller ones
   for exactly that reason, and Sources further paginates by season for TV shows (see
   wizardSourcesSeasonNav) rather than dumping every episode on screen at once. As a last-resort
   safety net for anything that still doesn't fit on a very short screen, only the step's own content
   area scrolls (#wizardStepBody) — the stepper, tabs, live preview, and Back/Next buttons never move.
   Metadata still comes from the exact same OMDb + TMDB lookups as always (buildWizardItemFromImdb
   mirrors buildLibraryItemFromImdb, just carrying image candidate galleries through too) — this only
   changes how you review/edit it before it lands in your library. Multiple pasted links flow through
   the same steps together via a title-switcher tab strip — each tab has its own remove button, so a
   title can be dropped from the batch at any point, not just at the final Confirm step. Streaming
   links are still generated at playback time from imdbId exactly as always (see DYNAMIC STREAMING
   PROVIDER).
========================================================= */
const WIZARD_STEPS = [
  {n:1,label:'Links'}, {n:2,label:'Basic Info'}, {n:3,label:'Details'}, {n:4,label:'Cast & Story'}, {n:5,label:'Genre'},
  {n:6,label:'Poster'}, {n:7,label:'Backdrop'}, {n:8,label:'Logo'}, {n:9,label:'Extra Art'},
  {n:10,label:'Sources'}, {n:11,label:'Confirm'}
];
const WIZARD_LAST_STEP = 11;
function openAddWizard(){
  state.wizard = { step:1, current:0, items:[], rawInput:'', duplicates:[] };
  renderWizardModal();
}
function wizardClose(){
  if(state.wizard && state.wizard.items.length && state.wizard.step>1){
    if(!confirm('Discard this import? Nothing will be added to your library.')) return;
  }
  state.wizard = null;
  closeModal();
}
function wizardCurrentItem(){ return state.wizard.items[state.wizard.current]; }

function wizardModalHeadHtml(){
  const w = state.wizard;
  return `<div class="modal-head"><h2>Add Title <span class="wizard-step-count">${w.step} / ${WIZARD_STEPS.length}</span></h2><button class="btn-icon" onclick="wizardClose()">${ICON.close}</button></div>`;
}
function renderWizardModal(){
  const w = state.wizard;
  if(!w) return;
  if(w.step===1){ openModal(wizardStep1Html()); document.getElementById('modalBody').classList.add('modal-wizard'); return; }
  const draft = w.items[w.current];

    <div id="wizardStepBody">${draft && draft.status==='error' && w.step<WIZARD_LAST_STEP ? wizardErrorStepHtml(draft) : wizardStepBodyHtml(draft)}</div>

// Live-updating mini summary shown across steps 2-5 (see .wizard-hero) — keeps editing connected to

    : `<button class="btn btn-primary" onclick="wizardGoStep(${w.step+1})" ${isError && w.items.length===1?'disabled':''}>Next ${ICON.chevronRight}</button>`;

function wizardGoStep(n){
  const w = state.wizard;
  if(n>w.step && w.step===2){

    if(firstReady>-1) w.current = firstReady;

}
async function wizardBeginFetch(){
  if(!state.settings.omdb){ toast('Add your OMDb API key in Settings first'); return; }
  if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings first — needed for backdrops, logos, cast photos, and season data'); return; }
  const raw = document.getElementById('wizardLinksInput').value;
  const ids = extractImdbIds(raw);
  if(!ids.length){ toast('No IMDb IDs found — paste links, bare IDs, or JSON containing them'); return; }
  state.wizard.rawInput = raw;

  const existingIds = new Set(state.lib.items.map(i=>i.imdbId).filter(Boolean));
  const duplicates = ids.filter(id=>existingIds.has(id));
  const toFetch = ids.filter(id=>!existingIds.has(id));
  state.wizard.duplicates = duplicates;
  if(!toFetch.length){ toast('All of those are already in your library'); return; }

  openModal(`
    <div class="modal-head"><h2>Fetching…</h2></div>
    <div style="text-align:center; padding:36px 0;">
      <div class="spinner" style="margin:0 auto 18px auto;"></div>
      <div id="wizardFetchProgressText" style="color:var(--muted); font-size:13px;">Starting…</div>
      <div class="wizard-progress-track" style="max-width:280px; margin:16px auto 0;"><div class="wizard-progress-fill" id="wizardFetchProgressFill" style="width:0%;"></div></div>
    </div>
  `);
  const setProgress = (i,total,label)=>{
    const t = document.getElementById('wizardFetchProgressText'); if(t) t.textContent = `Fetching ${i} / ${total}… (${label})`;
    const f = document.getElementById('wizardFetchProgressFill'); if(f) f.style.width = Math.round(i/total*100)+'%';
  };
  const items = [];
  for(let i=0;i<toFetch.length;i++){
    const imdbId = toFetch[i];
    setProgress(i+1, toFetch.length, imdbId);
    try{
      const payload = await buildWizardItemFromImdb(imdbId);
      items.push(Object.assign({status:'ready', imdbId}, payload));
    }catch(e){
      items.push({status:'error', imdbId, error:(e.message||'Failed').replace(imdbId+': ','')});
    }
  }
  state.wizard.items = items;
  const readyCount = items.filter(i=>i.status==='ready').length;
  if(!readyCount){
    const firstErr = items.find(i=>i.status==='error');
    toast('Import failed for all links' + (firstErr ? ': '+firstErr.error : ''));
    state.wizard.items = [];
    state.wizard.step = 1;
    renderWizardModal();
    return;
  }
  state.wizard.current = items.findIndex(i=>i.status==='ready');
  state.wizard.step = 2;
  renderWizardModal();
}
// Headless fetch used only by the wizard — same OMDb + TMDB lookups and merge order as
// buildLibraryItemFromImdb (Settings-triggered bulk import), plus it carries the image candidate
// galleries through so the Artwork step has something to show, and starts sources/panoramic blank
// so the wizard's own steps are the single place those get filled in.
async function buildWizardItemFromImdb(imdbId){
  const omdbRes = await fetch(`https://www.omdbapi.com/?i=${encodeURIComponent(imdbId)}&plot=full&apikey=${encodeURIComponent(state.settings.omdb)}`);
  const omdb = await omdbRes.json();
  if(omdb.Response==='False') throw new Error(`${imdbId}: ${omdb.Error || 'not found on OMDb'}`);
  const type = omdb.Type==='series' ? 'series' : 'movie';
  const tmdbType = type==='series' ? 'tv' : 'movie';

  const findRes = await fetch(`https://api.themoviedb.org/3/find/${imdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}&external_source=imdb_id`);
  const find = await findRes.json();
  if(find.success===false) throw new Error(`${imdbId}: TMDB error — ${find.status_message||'request failed'}`);
  const results = tmdbType==='movie' ? find.movie_results : find.tv_results;
  const tmdbMatch = results && results[0];

  const payload = { type, imdbId, genre:[], actors:[], posterCandidates:[], backdropCandidates:[], logoCandidates:[], panoramicBanners:[] };
  let info = null;
  if(tmdbMatch){
    info = await fetchTmdbDetailsHeadless(tmdbMatch.id, tmdbType);
    Object.assign(payload, info.fields);
    payload.posterCandidates = info.posterCandidates || [];
    payload.backdropCandidates = info.backdropCandidates || [];
    payload.logoCandidates = info.logoCandidates || [];
    if(type==='series') payload.seasons = info.seasons;
  } else {
    if(omdb.Genre) payload.genre = omdb.Genre.split(',').map(g=>g.trim()).filter(Boolean);
    if(omdb.Actors && omdb.Actors!=='N/A') payload.actors = omdb.Actors.split(',').map(a=>a.trim()).filter(Boolean);
  }

  const setIfEmpty = (key, val)=>{ if(!payload[key] && val && val!=='N/A') payload[key] = val; };
  setIfEmpty('title', omdb.Title);
  setIfEmpty('year', (omdb.Year||'').split('–')[0].split('-')[0]);
  setIfEmpty('poster', omdb.Poster);
  setIfEmpty('description', omdb.Plot);
  setIfEmpty('runtime', omdb.Runtime);
  if(omdb.imdbRating && omdb.imdbRating!=='N/A') payload.rating = omdb.imdbRating;
  setIfEmpty('director', omdb.Director);
  setIfEmpty('contentRating', omdb.Rated);
  setIfEmpty('awards', omdb.Awards);
  const omdbRatings = normalizeOmdbRatings(omdb);
  if(omdbRatings.length) payload.ratings = omdbRatings;

  if(!payload.title) throw new Error(`${imdbId}: no title found on either OMDb or TMDB`);
  payload.tmdbId = info ? info.tmdbId : null;
  payload.trailerKey = info ? info.trailerKey : '';
  payload.trailerChecked = !!(info && info.trailerKey);
  if(type==='movie') payload.sources = [];
  else payload.seasons = payload.seasons || [];

  return payload;
}

async function wizardRetryItem(idx){
  const w = state.wizard;
  const imdbId = w.items[idx].imdbId;
  toast('Retrying '+imdbId+'…');
  try{
    const payload = await buildWizardItemFromImdb(imdbId);
    w.items[idx] = Object.assign({status:'ready', imdbId}, payload);
    toast('Imported '+(payload.title||imdbId));
  }catch(e){
    w.items[idx] = {status:'error', imdbId, error:(e.message||'Failed').replace(imdbId+': ','')};
  }
  renderWizardModal();
}
function wizardRemoveItem(idx){
  const w = state.wizard;
  w.items.splice(idx,1);
  if(w.current>=w.items.length) w.current = Math.max(0, w.items.length-1);
  if(!w.items.length){ w.step=1; w.rawInput=''; }
  renderWizardModal();
}

function wizardFinish(){

// Bulk "Update Info" (Settings → Library Metadata): re-pulls TMDB metadata for a TV show you
// already added, so the newer info-page fields (logo, tagline, cast, content rating, tvStatus,
// next-episode countdown, episode thumbnails/overviews, etc.) get filled in on older library
// entries — WITHOUT touching anything you've manually added: per-episode stream sources,
// watch progress/ratings, or seasons/episodes that only exist locally. Mirrors the season/episode
// shape applyTmdbDetails() builds for new imports, but merges into the saved item directly instead
// of going through the (add/edit-only) state.editSeasons draft.
async function refreshTvMetadataFromTmdb(item){
  const key = state.settings.tmdb;
  if(!key) throw new Error('No TMDB API key set');

  let tmdbId = item.tmdbId;
  if(!tmdbId){
    // Item predates the tmdbId field (or was added manually) — resolve one by title/year search,
    // same lookup "Fetch from TMDB" uses when adding.
    const yearParam = item.year ? `&first_air_date_year=${encodeURIComponent(item.year)}` : '';
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${encodeURIComponent(key)}&query=${encodeURIComponent(item.title)}${yearParam}`);
    const searchData = await searchRes.json();
    if(searchData.success===false) throw new Error(searchData.status_message || 'TMDB search failed');
    const match = searchData.results && searchData.results[0];
    if(!match) throw new Error('No TMDB match found for "'+item.title+'"');
    tmdbId = match.id;
  }

  const detailsRes = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${encodeURIComponent(key)}&append_to_response=credits,videos,images,content_ratings&include_image_language=en,null`);
  const d = await detailsRes.json();
  if(d.success===false) throw new Error(d.status_message || 'TMDB lookup failed');

  const year = d.first_air_date ? d.first_air_date.split('-')[0] : item.year;
  const poster = d.poster_path ? `https://image.tmdb.org/t/p/w780${d.poster_path}` : item.poster;
  const backdrop = d.backdrop_path ? `https://image.tmdb.org/t/p/w1280${d.backdrop_path}` : item.backdrop;
  const genres = (d.genres||[]).map(g=>g.name);
  const rating = d.vote_average ? d.vote_average.toFixed(1) : item.rating;
  const runtimeMinutes = d.episode_run_time && d.episode_run_time[0];
  const runtime = runtimeMinutes ? `${runtimeMinutes} min` : item.runtime;
  const overview = d.overview || item.description;
  const tagline = d.tagline || item.tagline;
  const cast = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>c.name);
  const castDetailed = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>({name:c.name, character:c.character||'', photo:c.profile_path?`https://image.tmdb.org/t/p/w185${c.profile_path}`:''}));
  const director = (d.created_by||[]).map(c=>c.name).join(', ');
  let contentRating = item.contentRating;
  if(d.content_ratings && d.content_ratings.results){
    const us = d.content_ratings.results.find(r=>r.iso_3166_1==='US');
    if(us && us.rating) contentRating = us.rating;
  }
  const tvStatus = d.status || item.tvStatus;
  let nextEpisodeInfo = item.nextEpisodeInfo || null;
  if(d.next_episode_to_air){
    nextEpisodeInfo = {
      season: d.next_episode_to_air.season_number,
      episode: d.next_episode_to_air.episode_number,
      name: d.next_episode_to_air.name || '',
      airDate: d.next_episode_to_air.air_date || ''
    };
  } else if(d.status && d.status!=='Returning Series'){
    nextEpisodeInfo = null;
  }
  const logos = (d.images && d.images.logos) || [];
  const bestLogo = logos.find(l=>l.iso_639_1==='en') || logos[0];
  const logo = bestLogo ? `https://image.tmdb.org/t/p/original${bestLogo.file_path}` : item.logo;

  // Index existing episodes by season+episode number so their sources/rating/manual edits survive
  // the rebuild below no matter how TMDB's own numbering has shifted around them.
  const existing = {};
  (item.seasons||[]).forEach(s=>{
    (s.episodes||[]).forEach(e=>{ existing[s.number+'|'+e.number] = e; });
  });

  let seasons = item.seasons || [];
  if(Array.isArray(d.seasons)){
    const realSeasons = d.seasons.filter(s=>s.season_number>0);
    const seasonsData = [];
    for(const s of realSeasons){
      try{
        const seasonRes = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${s.season_number}?api_key=${encodeURIComponent(key)}`);
        const seasonJson = await seasonRes.json();
        const oldSeason = (item.seasons||[]).find(x=>x.number===s.season_number);
        const episodes = (seasonJson.episodes||[]).map(e=>{
          const old = existing[s.season_number+'|'+e.episode_number];
          return {
            number: e.episode_number,
            title: e.name || (old && old.title) || `Episode ${e.episode_number}`,
            thumbnail: e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : ((old && old.thumbnail) || ''),
            overview: e.overview || (old && old.overview) || '',
            runtime: e.runtime || (old && old.runtime) || null,
            airDate: e.air_date || (old && old.airDate) || '',
            tmdbRating: e.vote_average || (old && old.tmdbRating) || 0,
            // The only two fields that matter to keep exactly as-is:
            myRating: (old && old.myRating) || 0,
            sources: (old && old.sources) || []
          };
        });
        seasonsData.push({
          number: s.season_number,
          poster: seasonJson.poster_path ? `https://image.tmdb.org/t/p/w300${seasonJson.poster_path}` : ((oldSeason && oldSeason.poster) || ''),
          overview: seasonJson.overview || (oldSeason && oldSeason.overview) || '',
          episodes
        });
      }catch(e){
        // A season failed to fetch — keep the local copy (sources and all) rather than dropping it.
        const keep = (item.seasons||[]).find(x=>x.number===s.season_number);
        if(keep) seasonsData.push(keep);
      }
    }
    // Any local season TMDB doesn't report at all (manually added, or a lookup quirk) is kept as-is
    // rather than silently deleted.
    (item.seasons||[]).forEach(localS=>{
      if(!seasonsData.find(x=>x.number===localS.number)) seasonsData.push(localS);
    });
    seasonsData.sort((a,b)=>a.number-b.number);
    seasons = seasonsData;
  }

  Object.assign(item, {
    tmdbId, year, poster, backdrop, logo,
    genre: genres.length ? genres : item.genre,
    actors: cast.length ? cast : item.actors,
    cast: castDetailed.length ? castDetailed : item.cast,
    description: overview, rating, runtime, tagline,
    director: director || item.director,
    contentRating, tvStatus, nextEpisodeInfo, seasons
  });
  return item;
}

// Bulk "Update Info" (Settings → Library Metadata): movie counterpart to refreshTvMetadataFromTmdb
// above. Re-pulls TMDB metadata for a movie already in the library so newer info-page fields
// (logo, tagline, cast, content rating, etc.) get filled in on older entries — WITHOUT touching
// anything manually added: stream sources, watch progress, or rating.
async function refreshMovieMetadataFromTmdb(item){
  const key = state.settings.tmdb;
  if(!key) throw new Error('No TMDB API key set');

  let tmdbId = item.tmdbId;
  if(!tmdbId){
    // Item predates the tmdbId field (or was added manually) — resolve one by title/year search,
    // same lookup "Fetch from TMDB" uses when adding.
    const yearParam = item.year ? `&year=${encodeURIComponent(item.year)}` : '';
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${encodeURIComponent(key)}&query=${encodeURIComponent(item.title)}${yearParam}`);
    const searchData = await searchRes.json();
    if(searchData.success===false) throw new Error(searchData.status_message || 'TMDB search failed');
    const match = searchData.results && searchData.results[0];
    if(!match) throw new Error('No TMDB match found for "'+item.title+'"');
    tmdbId = match.id;
  }

  const detailsRes = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${encodeURIComponent(key)}&append_to_response=credits,videos,images,release_dates&include_image_language=en,null`);
  const d = await detailsRes.json();
  if(d.success===false) throw new Error(d.status_message || 'TMDB lookup failed');

  const year = d.release_date ? d.release_date.split('-')[0] : item.year;
  const poster = d.poster_path ? `https://image.tmdb.org/t/p/w780${d.poster_path}` : item.poster;
  const backdrop = d.backdrop_path ? `https://image.tmdb.org/t/p/w1280${d.backdrop_path}` : item.backdrop;
  const genres = (d.genres||[]).map(g=>g.name);
  const rating = d.vote_average ? d.vote_average.toFixed(1) : item.rating;
  const runtimeMinutes = d.runtime;
  const runtime = runtimeMinutes ? `${runtimeMinutes} min` : item.runtime;
  const overview = d.overview || item.description;
  const tagline = d.tagline || item.tagline;
  const cast = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>c.name);
  const castDetailed = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>({name:c.name, character:c.character||'', photo:c.profile_path?`https://image.tmdb.org/t/p/w185${c.profile_path}`:''}));
  const director = ((d.credits && d.credits.crew) || []).filter(c=>c.job==='Director').map(c=>c.name).join(', ');
  let contentRating = item.contentRating;
  if(d.release_dates && d.release_dates.results){
    const us = d.release_dates.results.find(r=>r.iso_3166_1==='US');
    const cert = us && (us.release_dates||[]).map(rd=>rd.certification).find(c=>c);
    if(cert) contentRating = cert;
  }
  const logos = (d.images && d.images.logos) || [];
  const bestLogo = logos.find(l=>l.iso_639_1==='en') || logos[0];
  const logo = bestLogo ? `https://image.tmdb.org/t/p/original${bestLogo.file_path}` : item.logo;

  Object.assign(item, {
    tmdbId, year, poster, backdrop, logo,
    genre: genres.length ? genres : item.genre,
    actors: cast.length ? cast : item.actors,
    cast: castDetailed.length ? castDetailed : item.cast,
    description: overview, rating, runtime, tagline,
    director: director || item.director,
    contentRating
  });
  return item;
}

  if(state.editType==='series'){
    payload.tvStatus = state.editTvStatus || '';
    payload.nextEpisodeInfo = state.editNextEpisode || null;
  }
  if(state.editImdbMeta){
    if(state.editImdbMeta.imdbId) payload.imdbId = state.editImdbMeta.imdbId;
    if(state.editImdbMeta.tmdbId) payload.tmdbId = state.editImdbMeta.tmdbId;
    if(state.editImdbMeta.trailerKey){
      payload.trailerKey = state.editImdbMeta.trailerKey;
      payload.trailerChecked = true;
    }
  }
  if(state.editType==='movie'){
    payload.sources = state.editSources.filter(s=>s.url.trim()).map(s=>({label:s.label.trim()||'Source', url:s.url.trim()}));
  } else {
    payload.seasons = state.editSeasons.map(s=>({
      number: s.number,
      episodes: (s.episodes||[]).map(e=>({
        number:e.number, title:e.title.trim(), thumbnail:e.thumbnail||'', overview:e.overview||'', myRating:e.myRating||0, runtime:e.runtime||null,
        sources:(e.sources||[]).filter(src=>src.url.trim()).map(src=>({label:src.label.trim()||'Source', url:src.url.trim()}))
      }))
    }));
  }

  if(state.editingId){
    const item = getItem(state.editingId);
    if(item.title !== title){
      delete item.trailerChecked;
      delete item.trailerKey;
      delete item.tmdbId;
    }
    delete item.panoramicBanner;
    Object.assign(item, payload);
  } else {
    state.lib.items.push({
      id: uuid(), dateAdded: new Date().toISOString(), lastWatched: null, progress:{},
      ...payload
    });
  }
  saveLib(); state.editFormDraft = null; closeModal(); router(); toast(state.editingId?'Changes saved':'Title added');
}

/* =========================================================
   PLAYER
========================================================= */
const VIDSRC_DOMAINS = ['vidsrc-embed.ru','vidsrc-embed.su','vidsrcme.su','vsrc.su'];
const VIDSRC_MATCH = /vidsrc[-a-z]*\.(ru|su|to|me|pro|cc|xyz|net|in|vip)|vsrc\.su/i;

/* =========================================================
   DYNAMIC STREAMING PROVIDER
   ---------------------------------------------------------
   This does NOT change how metadata (title, seasons, episode numbers,
   titles, overviews, posters, air dates, etc.) is fetched -- that all
   still comes from importFromImdb()/fetchTmdbEpisode()/refreshLibraryFromTmdb()
   exactly as before. It only changes how a playable URL is produced.
   The user sets an ORDERED list of bare domains in Settings > Playback >
   Streaming Providers (state.settings.streamingProviders). No full
   streaming URL is ever written to storage -- only that list of domains
   is persisted (via saveSettings(), same as every other setting). Every
   time a movie or episode is opened, one embed URL per configured domain
   is generated fresh from the saved domain plus the title's IMDb ID
   (plus season/episode for TV) and handed to the player as "Source 1",
   "Source 2", etc, ahead of any sources added manually -- which keep
   working exactly as before, as further fallbacks. The edit modal shows
   a live (read-only) preview of these via getEditAutoSources() /
   autoSourcesPreviewHtml(), so it's clear what will play without leaving
   the modal to check Settings.
========================================================= */
function normalizeProviderDomain(v){
  return (v||'').trim().replace(/^https?:\/\//i,'').replace(/\/+$/,'');
}
// Builds the embed URL for one domain at call time — nothing here is ever cached or saved.
// seasonNum/epNum both null/undefined => movie template; both provided => episode template.
function buildProviderStreamUrl(domain, item, seasonNum, epNum){
  domain = normalizeProviderDomain(domain);
  if(!domain || !item || !item.imdbId) return null;
  const suffix = 'autoplay=1&controls=false&overlay=false&showTitle=false';
  if(seasonNum!=null && epNum!=null){
    return `https://${domain}/embed/tv/${item.imdbId}/${seasonNum}/${epNum}?${suffix}`;
  }
  return `https://${domain}/embed/movie/${item.imdbId}?${suffix}`;
}
// One auto-generated source per configured provider domain, in order — the first configured
// domain becomes "Source 1", the second "Source 2", and so on. Skips silently (returns []) if
// there's no IMDb ID yet or no provider domains configured.
function getAutoProviderSources(item, seasonNum, epNum){
  const domains = state.settings.streamingProviders || [];
  const out = [];
  domains.forEach((domain,i)=>{
    const url = buildProviderStreamUrl(domain, item, seasonNum, epNum);
    if(url) out.push({label:'Source '+(i+1), url, isAuto:true});
  });
  return out;
}
// Effective source list for a movie: every auto-generated Streaming Provider link first (if a
// domain + IMDb ID are available), then whatever sources were added manually in the edit modal.
function getMovieSources(item){
  return [...getAutoProviderSources(item, null, null), ...(item.sources||[])];
}
// Same idea for a single episode — ep.number/season come from the metadata exactly as fetched
// today; only the URLs attached to them are generated instead of read from storage.
function getEpisodeSources(item, ep, seasonNum){
  return [...getAutoProviderSources(item, seasonNum, ep.number), ...(ep.sources||[])];
}
// Live preview for the edit modal — uses the IMDb ID captured by the current import session
// (state.editImdbMeta), since the item itself may not be saved yet.
function getEditAutoSources(seasonNum, epNum){
  const imdbId = state.editImdbMeta && state.editImdbMeta.imdbId;
  if(!imdbId) return [];
  return getAutoProviderSources({imdbId}, seasonNum, epNum);
}

function detectEmbed(url){
  url = url.trim();
  let m;
  if((m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/live\/)([\w-]{6,})/))){
    return {kind:'iframe', src:`https://www.youtube.com/embed/${m[1]}?autoplay=1`};
  }
  // Live stream tied to a channel ID rather than a video ID (e.g. youtube.com/channel/UC.../live)
  if((m = url.match(/youtube\.com\/channel\/([\w-]+)\/live/))){
    return {kind:'iframe', src:`https://www.youtube.com/embed/live_stream?channel=${m[1]}&autoplay=1`};
  }
  if((m = url.match(/dailymotion\.com\/video\/([\w]+)/))){
    return {kind:'iframe', src:`https://www.dailymotion.com/embed/video/${m[1]}`};
  }
  // VidSrc family — always rewritten onto the configured mirror domain
  if(VIDSRC_MATCH.test(url)){
    return {kind:'iframe', src: normalizeVidsrc(url), isVidsrc:true};
  }
  if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)){
    return {kind:'video', src:url};
  }
  if(/\.m3u8(\?|$)/i.test(url)){
    return {kind:'hls', src:url};
  }
  return {kind:'iframe', src:url};
}

function normalizeVidsrc(url){
  const domain = VIDSRC_DOMAINS.includes(state.settings.vidsrcDomain) ? state.settings.vidsrcDomain : VIDSRC_DOMAINS[0];
  let m;
  // Preserve existing query string (skin, color, title, autoplay, etc.) after rewriting path/host
  const qIdx = url.indexOf('?');
  const existingQuery = qIdx !== -1 ? url.slice(qIdx + 1) : '';
  const urlNoQuery = qIdx !== -1 ? url.slice(0, qIdx) : url;
  function appendQuery(base){
    return existingQuery ? `${base}?${existingQuery}` : base;
  }
  // imdb/tmdb query-style embed links: keep params, just swap the host
  if((m = url.match(/[?&](imdb|tmdb)=([\w]+)/i))){
    const rest = urlNoQuery.split(/\/\/[^/]+/)[1] || '';
    return appendQuery(`https://${domain}${rest}`);
  }
  // /embed/movie/{id} or /movie/{id}
  if((m = urlNoQuery.match(/\/(?:embed\/)?movie\/([\w]+)/i))){
    return appendQuery(`https://${domain}/embed/movie/${m[1]}`);
  }
  // /embed/tv/{id}/{season}/{episode} or /tv/{id}/{season}/{episode}
  if((m = urlNoQuery.match(/\/(?:embed\/)?tv\/([\w]+)\/(\d+)\/(\d+)/i))){
    return appendQuery(`https://${domain}/embed/tv/${m[1]}/${m[2]}/${m[3]}`);
  }
  // /embed/tv/{id} or /tv/{id}
  if((m = urlNoQuery.match(/\/(?:embed\/)?tv\/([\w]+)/i))){
    return appendQuery(`https://${domain}/embed/tv/${m[1]}`);
  }
  // Unrecognized path shape — just swap the host, keep everything (path + query)
  const rest = url.split(/\/\/[^/]+/)[1] || '';
  return `https://${domain}${rest}`;
}

function getNextEpisode(item, seasonNum, epNum){
  if(item.type!=='series' || seasonNum==null) return null;
  const seasons = (item.seasons||[]).slice().sort((a,b)=>a.number-b.number);
  const si = seasons.findIndex(s=>s.number===seasonNum);
  if(si===-1) return null;
  const eps = (seasons[si].episodes||[]).slice().sort((a,b)=>a.number-b.number);
  const ei = eps.findIndex(e=>e.number===epNum);
  if(ei>-1 && ei+1<eps.length){
    return {seasonNum:seasons[si].number, ep:eps[ei+1]};
  }
  if(si+1<seasons.length){
    const nextEps = (seasons[si+1].episodes||[]).slice().sort((a,b)=>a.number-b.number);
    if(nextEps.length) return {seasonNum:seasons[si+1].number, ep:nextEps[0]};
  }
  return null;
}
// Backward-traversal mirror of getNextEpisode — powers the episode-info modal's Previous arrow,
// crossing back over a season boundary the same way getNextEpisode crosses forward over one.
function getPrevEpisode(item, seasonNum, epNum){
  if(item.type!=='series' || seasonNum==null) return null;
  const seasons = (item.seasons||[]).slice().sort((a,b)=>a.number-b.number);
  const si = seasons.findIndex(s=>s.number===seasonNum);
  if(si===-1) return null;
  const eps = (seasons[si].episodes||[]).slice().sort((a,b)=>a.number-b.number);
  const ei = eps.findIndex(e=>e.number===epNum);
  if(ei>0){
    return {seasonNum:seasons[si].number, ep:eps[ei-1]};
  }
  if(si-1>=0){
    const prevEps = (seasons[si-1].episodes||[]).slice().sort((a,b)=>a.number-b.number);
    if(prevEps.length) return {seasonNum:seasons[si-1].number, ep:prevEps[prevEps.length-1]};
  }
  return null;
}
function playNextEpisode(){
  const p = state.player;
  if(!p) return;
  const item = getItem(p.itemId);
  const next = getNextEpisode(item, p.seasonNum, p.epNum);
  if(!next){ toast('No more episodes'); return; }
  cleanupPlayerTimers();
  requestPlayback(item, next.seasonNum, next.ep.number, getEpisodeSources(item, next.ep, next.seasonNum));
}

function openPlayer(item, seasonNum, epNum, sources){
  sources = sources || [];
  if(!sources.length){ toast('No sources available'); return; }
  if(seasonNum!=null && item.type==='series' && !item.watchlist){
    item.watchlist = true;
    toast('Added to Watchlist — tracking your progress');
  }
  // cleanupPlayerTimers() reads the *current* state.player (about to be replaced below) — safe to
  // call even if none is active yet (it no-ops). playNextEpisode/tryNextSource/closePlayer already
  // call this before swapping state.player; doing it here too means it's guaranteed for every path
  // that opens a player (e.g. clicking a different episode card directly), so a previous title's
  // watch timer can never keep running against an object nothing on screen points to anymore.
  cleanupPlayerTimers();
  state.player = {
    itemId: item.id, seasonNum, epNum, sources, sourceIdx:0,
    key: seasonNum!=null ? 's'+seasonNum+'e'+epNum : 'movie',
    subtitle: seasonNum!=null ? `Season ${seasonNum} · Episode ${epNum}` : (item.year||''),
    playbackState: 'loading',
  };
  // Was a subtitle picked ahead of time from the detail page / episode modal (see PRE-PLAYBACK
  // SUBTITLE SELECTION)? If so, attach it now, before renderPlayer() ever runs, so it's already
  // showing the instant playback starts instead of requiring a trip to the in-player panel.
  const preSub = preloadedSubtitles[preselectSubtitleKey(item.id, seasonNum, epNum)];
  if(preSub){
    state.player.subtitleCues = preSub.cues;
    state.player.subtitleLabel = preSub.label;
    state.player.subtitleLangCode = preSub.langCode;
    state.player.subtitleOffset = getPersistedSubtitleOffset(item.id, state.player);
  }
  item.lastWatched = new Date().toISOString();
  saveLib();
  renderPlayer();
  document.getElementById('playerOverlay').classList.add('open');
  if(preSub) toast(`Subtitles loaded: ${preSub.label}`);
}
function playChannel(id){
  const ch = getChannel(id);
  if(!ch || !ch.sources || !ch.sources.length){ toast('No stream sources available'); return; }
  state.player = {
    isLive:true, channelId:id, sources:ch.sources, sourceIdx:0,
    subtitle: ch.category || 'General',
    title: ch.name,
  };
  renderPlayer();
  document.getElementById('playerOverlay').classList.add('open');
}
function renderPlayer(){
  const p = state.player;
  const isLive = !!p.isLive;
  const item = isLive ? null : getItem(p.itemId);
  const titleText = isLive ? p.title : item.title;
  const src = p.sources[p.sourceIdx];
  const embed = detectEmbed(src.url);
  const overlay = document.getElementById('playerOverlay');
  const next = isLive ? null : getNextEpisode(item, p.seasonNum, p.epNum);

  let stageHtml = '';
  // For iframe embeds, inject saved resume timestamp into the URL as ?resumeAt=SECONDS (or
  // &resumeAt=SECONDS). vaplayer.ru honours this parameter and seeks to it on load — so when
  // autoplay=1 is set and the player can't show its own "resume?" dialog, we do the seek ourselves
  // by baking the timestamp directly into the src before the iframe is created.
  // buildResumeEmbedUrl() is the same helper the fake-pause/resume flow (PLAYBACK MANAGER, below)
  // uses to rebuild the iframe src when the user hits Resume — this is just its first use, on open.
  let iframeSrc = embed.src;
  let resumeAtOpen = 0;
  if(embed.kind === 'iframe' && !isLive){
    // Base URL (no t= param) — kept on state.player so the fake-pause/resume cycle can always
    // rebuild a clean src from the *original* embed link, never stacking timestamps on top of
    // each other across multiple pause/resume cycles.
    p._embedBaseUrl = embed.src;
    const savedForResume = (item && item.progress && item.progress[p.key]);
    resumeAtOpen = savedForResume && !savedForResume.watched ? Math.floor(savedForResume.timestamp) : 0;
    iframeSrc = buildResumeEmbedUrl(embed.src, resumeAtOpen);
    console.debug('[StreamVault] iframe src ->', iframeSrc); // verify in DevTools: no resumeAt param should ever appear here for a seek-to-0
  }
  // Fresh mount (open / next episode / retry source) always starts in the real "playing" state —
  // any previous fake-pause cover or in-flight rebuild lock no longer applies to whatever is being
  // rendered now (renderPlayer replaces the whole overlay, so nothing from before still exists to
  // finish rebuilding).
  p.fakePaused = false;
  p._playbackBusy = false;
  setPlayerSyncPoint(resumeAtOpen);
  p._embedKind = embed.kind;
  // Duration/progress for iframe embeds now come EXCLUSIVELY from Vaplayer's own PLAYER_EVENT
  // postMessage (see the global listener in PLAYBACK MANAGER, below) — never from OMDb/TMDB
  // runtime and never from a local timer. Until the first such event arrives, total is simply
  // unknown (0), and the progress bar/time-total render as unset rather than a runtime guess.
  if(embed.kind==='iframe' && !isLive) p._totalSeconds = 0;
  if(embed.kind==='video'){
    stageHtml = `<video id="playerVideoEl" src="${esc(embed.src)}" controls autoplay></video>`;
  } else if(embed.kind==='hls'){
    stageHtml = `<video id="playerVideoEl" controls autoplay playsinline></video>`;
  } else {
    // Sandbox is opt-in via Settings > Block Popup/Redirect Ads. It stops third-party embeds from
    // opening popups or redirecting the tab, but some ad-supported mirrors (like certain VidSrc
    // clones) detect a sandboxed/popup-blocked iframe and refuse to play ("Media Unavailable") as a
    // countermeasure — so it's off by default to match normal-browser playback behavior.
    const sandboxAttr = state.settings.blockPopupAds ? ' sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"' : '';
    stageHtml = `<iframe id="playerIframeEl" src="${esc(iframeSrc)}" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen loading="eager"${sandboxAttr}></iframe>`;
  }

  overlay.innerHTML = `
    <div class="player-top">
      <div class="player-top-info">
        <div class="player-title">${isLive?'<span class="live-badge">● LIVE</span> ':''}${esc(titleText)} ${embed.kind==='hls'?'<span class="hls-badge">HLS</span>':''}</div>
        <div class="player-sub">${esc(p.subtitle)} ${src.label?'· '+esc(src.label):''}</div>
      </div>
      <div class="player-top-actions">
        <div class="player-top-pinned">
          <button class="btn-icon${p.subtitleCues?' is-active':''}" id="playerSubtitleBtn" title="Subtitles" onclick="toggleSubtitlePanel()">${ICON.subtitles}</button>
          <button class="btn-icon" id="playerBrightnessBtn" title="Brightness" onclick="event.stopPropagation(); toggleBrightnessPanel();">${ICON.brightness}</button>
          <button class="btn-icon" id="playerHideScreenBtn" title="Hide screen" onclick="togglePlayerHide()">${ICON.eyeOff}</button>
          <button class="btn-icon" id="playerLockBtn" title="Lock controls" onclick="event.stopPropagation(); togglePlayerLock();">${ICON.lock}</button>
        </div>
        <div class="player-top-fade">
          <button class="btn-icon" onclick="closePlayer()">${ICON.close}</button>
        </div>
      </div>
    </div>
    <div class="player-stage" id="playerStage">
      <div class="player-media-wrap" id="playerMediaWrap" style="filter:brightness(${state.settings.playerBrightness});">${stageHtml}</div>
      <div class="player-loading" id="playerLoading"><div class="spinner"></div><span class="player-loading-label" id="playerLoadingLabel">Loading stream…</span></div>
      <div class="player-subtitle-overlay" id="playerSubtitleOverlay"></div>
      ${embed.kind==='iframe' && !isLive ? `
      <div class="player-center-skip-group" id="playerCenterSkipGroup">
        <button class="player-center-skip-btn" id="playerSkipBackBtn" title="Back 20 seconds" onclick="event.stopPropagation(); seekPlayer(-20);">${ICON.skipBack20}</button>
        <button class="player-center-skip-btn" id="playerSkipForwardBtn" title="Forward 20 seconds" onclick="event.stopPropagation(); seekPlayer(20);">${ICON.skipForward20}</button>
      </div>` : ''}
      <div class="player-subtitle-panel" id="subtitlePanel">
        <div class="player-subtitle-panel-head">
          <b>Subtitles</b>
          <button class="btn-icon" onclick="closeSubtitlePanel()">${ICON.close}</button>
        </div>
        <div class="field" style="margin-bottom:10px;">
          <input id="subtitleQuery" placeholder="Movie or show title" onkeydown="if(event.key==='Enter'){ event.preventDefault(); searchSubtitles(); }">
        </div>
        <div class="field-row" style="margin-bottom:12px;">
          <select id="subtitleLang" class="select-input" style="flex:1; border-radius:8px;">
            <option value="">Any language</option>
            ${SUBTITLE_LANGS.map(l=>`<option value="${l.code}">${l.label}</option>`).join('')}
          </select>

            <button class="subtitle-sync-btn" title="Shift 1/6s later" onclick="adjustSubtitleOffset(1/6)">+⅙s</button>
            <button class="subtitle-sync-btn" title="Shift 0.25s later" onclick="adjustSubtitleOffset(0.25)">+¼s</button>

        </div>

      <div class="player-brightness-panel" id="brightnessPanel" onmouseenter="clearTimeout(brightnessHideTimer)" onmouseleave="scheduleBrightnessPanelHide()">

        <div class="brightness-slider-track">
          <input type="range" id="brightnessSlider" min="50" max="150" step="1"
                 value="${Math.round(state.settings.playerBrightness*100)}"
                 aria-label="Brightness"
                 oninput="onBrightnessSliderInput(event)" onchange="onBrightnessSliderChange(event)">
        </div>
        <span class="player-brightness-icon-min">${ICON.brightness}</span>
      </div>
      <div class="player-hover-zone" onmouseenter="scheduleHideControls()"></div>
    </div>
    ${next ? `
    <div class="player-next-side" title="Next: S${next.seasonNum}E${next.ep.number} — ${esc(next.ep.title||('Episode '+next.ep.number)).replace(/"/g,'&quot;')}" onclick="playNextEpisode()">
      <div class="pns-thumb">${next.ep.thumbnail?`<img src="${esc(next.ep.thumbnail)}" alt="">`:''}<span class="pns-play-icon">${ICON.play}</span></div>
    </div>` : ''}
    <div class="player-bottom">
      <div class="player-bottom-left">
        <button class="btn-icon" id="playerPlayBtn" title="Pause" onclick="togglePlayerPlayPause()">${ICON.pause}</button>
      </div>
      ${embed.kind==='iframe' && !isLive ? `
      <div class="player-bottom-progress">
        <span class="player-time player-time-current" id="playerTimeCurrent">${esc(formatResumeTime(p._elapsedSeconds||0))}</span>
        <div class="player-progress-track" id="playerProgressTrack" role="slider" tabindex="0"
             aria-label="Seek" aria-valuemin="0" aria-valuemax="100"
             aria-valuenow="${p._totalSeconds>0 ? Math.round(((p._elapsedSeconds||0)/p._totalSeconds)*100) : 0}">
          <div class="player-progress-fill" id="playerProgressFill" style="width:${p._totalSeconds>0 ? Math.min(100,((p._elapsedSeconds||0)/p._totalSeconds)*100) : 0}%"></div>
          <div class="player-progress-handle" id="playerProgressHandle" style="left:${p._totalSeconds>0 ? Math.min(100,((p._elapsedSeconds||0)/p._totalSeconds)*100) : 0}%"></div>
        </div>
        <span class="player-time player-time-total" id="playerTimeTotal">${esc(formatResumeTime(p._totalSeconds||0))}</span>
      </div>` : `<div class="player-bottom-progress"></div>`}
      <div class="player-bottom-right">
        ${p.sources.length>1 ? `<button class="btn btn-ghost" onclick="tryNextSource()">Try Next Source</button>` : ''}
        ${embed.kind==='iframe' && !isLive ? `<button class="btn-icon" id="playerRestartBtn" title="Restart" onclick="event.stopPropagation(); restartPlayer();">${ICON.restart}</button>` : ''}
        <button class="btn-icon" id="playerFullscreenBtn" title="Fullscreen" onclick="togglePlayerFullscreen()">${ICON.expand}</button>
      </div>
    </div>
  `;
  scheduleHideControls();
  // Permanent click shield for every iframe embed — sits in front of the third-party page so
  // ad-script clicks/popups never reach it. There is no button or setting to disable this.

    const script = document.createElement('script');

    script.onload = ()=> resolve(window.Hls);

    const Hls = await loadHlsJs();
    if(!Hls || !Hls.isSupported()){
      toast('HLS playback is not supported in this browser');
      hideSpinner && hideSpinner();
      return;

        hideSpinner && hideSpinner();
        if(state.player && state.player.sources.length>1){ toast('Stream failed — trying the next source'); tryNextSource(); }
        else toast('Stream failed to load');
        hls.destroy();
      }
    });
