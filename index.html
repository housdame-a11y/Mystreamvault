  // browser always animates the fade-in instead of occasionally skipping straight to it.
  requestAnimationFrame(()=> requestAnimationFrame(()=> card.classList.add('visible')));
  if(autoplay) startEndCardAutoplay(8);
}
// Ticks the Next Episode button's ring/label down from AUTOPLAY_SECONDS and calls playNextEpisode()
// once it reaches zero — cancelEndCardAutoplay() (Cancel link) or manually clicking Next Episode /
// Exit all stop this first (the latter two via cleanupPlayerTimers(), which clears _endCardTimer
// same as every other player interval). Uses a real elapsed-time comparison rather than just
// decrementing an integer each tick, so the countdown can't drift even if the tab is backgrounded.
function startEndCardAutoplay(seconds){
  const p = state.player;
  if(!p) return;
  const startedAt = Date.now();
  const totalMs = seconds*1000;
  clearInterval(p._endCardTimer);
  p._endCardTimer = setInterval(()=>{
    const elapsed = Date.now()-startedAt;
    const pct = Math.min(100, (elapsed/totalMs)*100);
    const remaining = Math.max(0, Math.ceil((totalMs-elapsed)/1000));
    const ring = document.getElementById('playerEndCardNextRing');
    const label = document.getElementById('playerEndCardNextLabel');
    if(ring) ring.style.setProperty('--pct', pct.toFixed(1));
    if(label) label.textContent = remaining>0 ? `Next Episode (${remaining})` : 'Next Episode';
    if(elapsed>=totalMs){
      clearInterval(p._endCardTimer);
      playNextEpisode();
    }
  }, 100);
}
// Stops the autoplay countdown without leaving the player — the Next Episode button reverts to a
// plain manual button (ring/countdown removed) instead of disappearing, since the next episode is
// still one tap away, just no longer automatic.
function cancelEndCardAutoplay(){
  if(state.player) clearInterval(state.player._endCardTimer);
  const ring = document.getElementById('playerEndCardNextRing');
  const label = document.getElementById('playerEndCardNextLabel');
  const cancelBtn = document.getElementById('playerEndCardCancelBtn');
  if(ring) ring.outerHTML = ICON.play;
  if(label) label.textContent = 'Next Episode';
  if(cancelBtn) cancelBtn.remove();
}
// ---------- Optional Supabase progress sync ----------
// Purely additive and best-effort: localStorage (saveLib, above) is always the real source of
// truth and this never blocks or throws into the UI. Only mirrors data when both fields are
// filled in under Settings > Cloud Progress Sync — otherwise supabaseConfigured() short-circuits
// every call before any network request is attempted.
function supabaseConfigured(){
  return !!(state.settings.supabaseUrl && state.settings.supabaseKey);
}
async function syncProgressToCloud(item, key){
  if(!supabaseConfigured()) return;
  const entry = (item.progress || {})[key];
  if(!entry) return;
  const m = /^s(\d+)e(\d+)$/.exec(key); // season/episode info for TV shows; null for movies
  try{
    await fetch(`${state.settings.supabaseUrl}/rest/v1/watch_progress`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': state.settings.supabaseKey,
        'Authorization': `Bearer ${state.settings.supabaseKey}`,
        'Prefer': 'resolution=merge-duplicates' // upsert on (item_id, episode_key)
      },
      body: JSON.stringify({
        item_id: item.id,
        episode_key: key,               // 'movie' or 's<season>e<episode>'
        title: item.title,
        type: item.type,                // 'movie' | 'series'
        season: m ? parseInt(m[1], 10) : null,
        episode: m ? parseInt(m[2], 10) : null,
        timestamp: entry.timestamp,     // seconds — same value used in the t= resume param
        duration: entry.duration,
        watched: entry.watched,
        updated_at: new Date().toISOString()
      })
    });
  }catch(e){ /* offline, misconfigured, or blocked by RLS — fail silently, localStorage stands */ }
}
function saveProgress(item, key, timestamp, duration, watched){
  item.progress = item.progress || {};
  const prevWatched = !!(item.progress[key] && item.progress[key].watched);
  item.progress[key] = {timestamp: Math.round(timestamp||0), duration: Math.round(duration||0), watched: !!watched};
  item.lastWatched = new Date().toISOString();
  saveLib();
  // localStorage (above) is always the source of truth and never blocks on this — best-effort,
  // fire-and-forget mirror to Supabase if the user configured it in Settings > Cloud Progress Sync.
  syncProgressToCloud(item, key);
  // Only check on the moment an episode newly becomes watched — not on every 5-10s progress tick —
  // so this can't fire repeatedly while the same episode keeps playing.
  if(watched && !prevWatched) maybeAutoAddNextSeason(item, key);
}
// Wipes the saved watch-progress entry for this exact playback session (movie, or one episode key)
// entirely — not just reset to a zero timestamp. Used by restartPlayer() so a restart genuinely
// forgets where you were, rather than leaving a stale {timestamp:0} entry behind.
function deleteProgress(item, key){
  if(item && item.progress) delete item.progress[key];
  saveLib();
}
// If the episode that just got marked watched was the last untracked one in its season, and TMDB
// metadata is available for this show, silently pull in the next season's episode list (titles,
// thumbnails, overviews, runtimes) so it's ready to track. It can NEVER add playable stream links —
// TMDB doesn't have those — so every auto-added episode starts with an empty source slot and a
// notification is raised asking the user to paste one in.
function isSeasonFullyWatched(item, seasonNum){
  const season = (item.seasons||[]).find(s=>s.number===seasonNum);
  if(!season || !season.episodes || !season.episodes.length) return false;
  const prog = item.progress || {};
  return season.episodes.every(e=>{
    const p = prog['s'+seasonNum+'e'+e.number];
    return p && p.watched;
  });
}
async function fetchTmdbSeasonEpisodes(tmdbId, seasonNumber){
  const key = state.settings.tmdb;
  if(!key) return null;
  try{
    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNumber}?api_key=${encodeURIComponent(key)}`);
    if(!res.ok) return null;
    const json = await res.json();
    if(json.success===false || !Array.isArray(json.episodes) || !json.episodes.length) return null;
    const episodes = json.episodes.map(e=>({
      number: e.episode_number,
      title: e.name || `Episode ${e.episode_number}`,
      thumbnail: e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : '',
      overview: e.overview || '',
      runtime: e.runtime || null,
      airDate: e.air_date || '',
      tmdbRating: e.vote_average || 0,
      myRating: 0,
      sources: [{label:'', url:''}]
    }));
    return { poster: json.poster_path ? `https://image.tmdb.org/t/p/w300${json.poster_path}` : '', overview: json.overview || '', episodes };
  }catch(e){ return null; }
}
async function maybeAutoAddNextSeason(item, key){
  if(item.type!=='series') return;
  const m = /^s(\d+)e(\d+)$/.exec(key);
  if(!m) return;
  const seasonNum = parseInt(m[1],10);
  if(!isSeasonFullyWatched(item, seasonNum)) return;
  const nextNum = seasonNum + 1;
  if((item.seasons||[]).some(s=>s.number===nextNum)) return; // already tracked — nothing to add
  if(!item.tmdbId || !state.settings.tmdb) return; // can't look anything up without both of these
  const seasonData = await fetchTmdbSeasonEpisodes(item.tmdbId, nextNum);
  if(!seasonData) return; // no next season on TMDB (show's finished) or the lookup failed — stay quiet
  item.seasons = item.seasons || [];
  item.seasons.push({number: nextNum, poster: seasonData.poster, overview: seasonData.overview, episodes: seasonData.episodes});
  item.seasons.sort((a,b)=>a.number-b.number);
  saveLib();
  addNeedsLinkNotification(item, nextNum);
  if(state.route==='detail' && state.routeParam===item.id){
    document.getElementById('pageRoot').innerHTML = renderDetail(item.id);
  }
  toast(`Season ${nextNum} of "${item.title}" added — add a stream link to watch it`);
}
function tryNextSource(){
  const p = state.player;
  p.sourceIdx = (p.sourceIdx+1) % p.sources.length;
  cleanupPlayerTimers();
  renderPlayer();
}
function cleanupPlayerTimers(){
  if(state.player){
    clearInterval(state.player._interval);
    clearInterval(state.player._watchTimer);
    clearInterval(state.player._blurInterval);
    clearInterval(state.player._endCardTimer);
    state.player.playbackState = 'stopped';
    if(state.player._hls){ try{ state.player._hls.destroy(); }catch(e){} state.player._hls = null; }
  }
  stopProgressInterpolation(); // no local ticking should ever survive a teardown/source-switch
  clearTimeout(controlsHideTimer);
  clearTimeout(centerSkipHideTimer);
  if(subtitleTrackUrl){ URL.revokeObjectURL(subtitleTrackUrl); subtitleTrackUrl = null; }
  subtitleResults = [];
}
let controlsHideTimer = null;
// Netflix-style auto-hide: controls are visible whenever playback starts (renderPlayer calls this
// once on mount) and after every user interaction, then fade after 3s of inactivity. Never actually
// hides while something else needs the controls/stage on top — a loading spinner, the end-of-
// playback card, or an open popover/modal — so those always stay reachable and nothing flickers
// hidden-then-immediately-shown underneath them.
function isPlayerAutoHideSuspended(){
  const loading = document.getElementById('playerLoading');
  if(loading && !loading.classList.contains('done')) return true; // still buffering — keep controls up
  if(document.getElementById('playerEndCard')) return true; // end card owns the stage now
  const subPanel = document.getElementById('subtitlePanel');
  if(subPanel && subPanel.classList.contains('open')) return true;
  const brightPanel = document.getElementById('brightnessPanel');
  if(brightPanel && brightPanel.classList.contains('open')) return true;
  if(document.getElementById('modalOverlay')?.classList.contains('open')) return true;
  if(document.getElementById('shortcutsOverlay')?.classList.contains('open')) return true;
  if(document.getElementById('subtitlePromptOverlay')?.classList.contains('open')) return true;
  return false;
}
function scheduleHideControls(){
  clearTimeout(controlsHideTimer);
  const overlay = document.getElementById('playerOverlay');
  if(overlay) overlay.classList.remove('controls-hidden');
  controlsHideTimer = setTimeout(()=>{
    const ov = document.getElementById('playerOverlay');
    if(!ov || !ov.classList.contains('open')) return;
    if(isPlayerAutoHideSuspended()){ scheduleHideControls(); return; } // check again once whatever's blocking it clears
    ov.classList.add('controls-hidden');
  }, 3000);
}
// Any interaction anywhere on the player — mouse movement, a tap/click, touch, or dragging a
// slider (progress/brightness) — resets the timer and, if controls had already faded, brings them
// straight back. Bound on document (not just the stage) so it also covers the top/bottom bars,
// side "next episode" button, and any popovers, exactly like the existing mousemove/touchstart pair.
['mousemove','touchstart','touchmove','click','input'].forEach(evt=>{
  document.addEventListener(evt, e=>{
    const overlay = document.getElementById('playerOverlay');
    if(overlay && overlay.classList.contains('open')) scheduleHideControls();
  }, evt==='touchstart' || evt==='touchmove' ? {passive:true} : false);
});
function closePlayer(){
  // Last-chance save: the watch timer only ticks every 10s, so up to ~10s of progress could
  // otherwise be lost if the user closes mid-tick. p._elapsedSeconds is always current (or the
  // last saved position if fake-paused), so this makes closing behave exactly like a real pause.
  const p = state.player;
  if(p && !p.isLive){
    const item = getItem(p.itemId);
    if(item) saveProgress(item, p.key, p._elapsedSeconds || 0, p._totalSeconds || 0, false);
  }
  cleanupPlayerTimers();
  // togglePlayerFullscreen() puts the whole #playerOverlay into fullscreen, not just the video —
  // if Close is pressed while still fullscreen, the browser keeps that (now-empty) element in
  // fullscreen unless we explicitly back out of it here, which is what made Close appear to do
  // nothing: the overlay's own 'open' class/content were gone, but the screen stayed fullscreen
  // and blank until the user hit Esc themselves.
  if(document.fullscreenElement) document.exitFullscreen?.().catch(()=>{});
  document.getElementById('playerOverlay').classList.remove('open','controls-hidden','center-skip-visible','controls-locked','is-fullscreen');
  setTimeout(()=>{ document.getElementById('playerOverlay').innerHTML=''; }, 260);
  state.player = null;
  router();
}

/* =========================================================
   SUBTITLES (SubDL) — searches api.subdl.com, then loads the subtitle one of two ways:
     - Direct video sources (kind 'video'/'hls'): a real <track> on the built-in <video> element
       (id="playerVideoEl") — the browser renders and times it natively, frame-accurate.
     - Iframe embeds (VidSrc, YouTube, etc.): we don't control that player, so there's no track to
       attach it to. Instead the SRT is parsed into cues and drawn as a floating overlay (see
       .player-subtitle-overlay, z-index 4 — above the transparent click shield at z-index 2, so it's
       always visible over the embed) that's kept in sync with p._elapsedSeconds — for Vaplayer/
       VidSrc-family sources that's the real playback position from the embed's own PLAYER_EVENT
       postMessage (see PLAYBACK MANAGER), not an approximation. Non-Vaplayer iframes (YouTube,
       Dailymotion) don't send that event, so p._elapsedSeconds there just stays at whatever it was
       last set to and sync can drift — a real gap, with no fix short of that source's cooperation.
========================================================= */
const SUBTITLE_LANGS = [
  {code:'EN',label:'English'},{code:'ES',label:'Spanish'},{code:'FR',label:'French'},
  {code:'DE',label:'German'},{code:'IT',label:'Italian'},{code:'PT',label:'Portuguese'},
  {code:'AR',label:'Arabic'},{code:'RU',label:'Russian'},{code:'TR',label:'Turkish'},
  {code:'HI',label:'Hindi'},{code:'JA',label:'Japanese'},{code:'KO',label:'Korean'},
  {code:'ZH',label:'Chinese'},{code:'NL',label:'Dutch'},{code:'PL',label:'Polish'},
];
let subtitleResults = [];
let subtitleTrackUrl = null; // current blob: URL backing the active <track> (video/hls path), revoked on replace/close

/* ---- Pre-playback subtitle selection (movie detail page + episode modal) ----
   Lets a subtitle be searched/chosen via SubDL BEFORE pressing Play, so it's already attached the
   instant the player opens instead of needing the in-player panel after starting. Selections are
   kept in memory only (cleared on page reload), keyed per title (movie) or per episode. */
let preloadedSubtitles = {}; // key (see preselectSubtitleKey) -> {cues, label, langCode}
let preselectSubtitleCtx = null; // {itemId, seasonNum, epNum} for whichever preselect modal is open
let preselectSubtitleResults = [];
let subtitleDecisionMade = {}; // key (see preselectSubtitleKey) -> true once the user has answered the play-time subtitle prompt with "No" (a "Yes" answer is instead recorded implicitly by preloadedSubtitles already having an entry) — either way, requestPlayback() won't ask again this session
let subtitlePromptCtx = null; // {itemId, seasonNum, epNum, sources} for whichever pre-playback subtitle prompt is currently open

/* ---- Subtitle display customization (Settings -> Subtitle Display) ----
   Drives both the SubDL overlay (.player-subtitle-overlay span, for embedded/iframe sources) and
   native <track> cues (::cue, for direct video/hls sources) from the same three settings, so the
   two rendering paths always look identical to the user regardless of which one a given title uses.
   (SUBTITLE_SIZE_PX itself is declared up near LIB_KEY/SET_KEY — see the comment there — since
   loadSettings() needs it before this point in the script has run.) */
function hexToRgba(hex, alpha){
  hex = (hex||'#000000').replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.substring(0,2),16)||0, g = parseInt(hex.substring(2,4),16)||0, b = parseInt(hex.substring(4,6),16)||0;
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}
// Pushes the current subtitle-display settings out to (1) CSS custom properties on :root, which
// the overlay span reads live via var(), and (2) a dynamically-written ::cue style block, since
// native WebVTT cue styling can't be reached with a plain CSS class. Called on load and on every
// change from the settings page.
function applySubtitleDisplayStyle(){
  const s = state.settings;
  const px = SUBTITLE_SIZE_PX[s.subtitleSize] || SUBTITLE_SIZE_PX.medium;
  const bg = hexToRgba(s.subtitleBgColor || '#000000', (typeof s.subtitleBgOpacity==='number'?s.subtitleBgOpacity:72)/100);
  const color = s.subtitleColor || '#ffffff';
  document.documentElement.style.setProperty('--sub-font-size', px+'px');
  document.documentElement.style.setProperty('--sub-color', color);
  document.documentElement.style.setProperty('--sub-bg', bg);
  let styleTag = document.getElementById('subtitleCueStyle');
  if(!styleTag){ styleTag = document.createElement('style'); styleTag.id = 'subtitleCueStyle'; document.head.appendChild(styleTag); }
  styleTag.textContent = 'video::cue{ font-size:' + px + 'px; color:' + color + '; background:' + bg + '; }';
}

/* ---- Per-source sync memory ----
   The overlay path (iframe embeds) has no real play-head to read, so all of its drift comes from
   one systematic thing: how long the embed actually takes to start playing (buffering, an ad,
   sometimes a click-to-play screen) after we mount/seek it and start our own clock. That startup
   lag is a property of the *source* (this vidsrc mirror, this direct link, etc.) more than of any
   one episode, so once a user dials in an offset for a given item+source, we remember it and
   auto-apply it next time — next episode, next session, after a resume — instead of making them
   re-nudge from zero every single time. Keyed by item + embed host so different sources for the
   same title (which can have very different startup behavior) keep their own calibration. */
const SUBTITLE_SYNC_MEMORY_KEY = 'sv_subtitle_sync_v1';
function loadSubtitleSyncMemory(){
  try{ return JSON.parse(localStorage.getItem(SUBTITLE_SYNC_MEMORY_KEY)) || {}; }catch(e){ return {}; }
}
function subtitleSyncMemoryKey(itemId, p){
  let host = 'direct';
  try{ host = new URL(p._embedBaseUrl || (p.sources && p.sources[p.sourceIdx] && p.sources[p.sourceIdx].url) || '').hostname || 'direct'; }catch(e){}
  return `${itemId||'x'}::${host}`;
}
function getPersistedSubtitleOffset(itemId, p){
  const mem = loadSubtitleSyncMemory();
  const key = subtitleSyncMemoryKey(itemId, p);
  return typeof mem[key]==='number' ? mem[key] : 0;
}
function persistSubtitleOffset(itemId, p, offset){
  const mem = loadSubtitleSyncMemory();
  const key = subtitleSyncMemoryKey(itemId, p);
  if(offset){ mem[key] = offset; } else { delete mem[key]; } // 0 = back to file's own timing, nothing worth remembering
  try{ localStorage.setItem(SUBTITLE_SYNC_MEMORY_KEY, JSON.stringify(mem)); }catch(e){}
}

function toggleSubtitlePanel(){
  const p = state.player;
  if(!p) return;
  if(p.isLive){
    toast("Live channels don't have a fixed timeline for subtitles to sync to.");
    return;
  }
  const panel = document.getElementById('subtitlePanel');
  if(!panel) return;
  const opening = !panel.classList.contains('open');
  if(opening) closeBrightnessPanel(); // only one popover open at a time
  panel.classList.toggle('open');
  if(opening && !panel.dataset.primed){
    panel.dataset.primed = '1';
    const item = getItem(p.itemId);
    document.getElementById('subtitleQuery').value = item ? item.title : '';
    const hintEl = document.getElementById('subtitlePanelSyncHint');
    if(hintEl) hintEl.style.display = (p._embedKind==='iframe') ? 'block' : 'none';
    if(!(state.settings.subdl||'').trim()){
      document.getElementById('subtitleResults').innerHTML = `<div class="field-hint">Add a free SubDL API key in Settings → Subtitles to search.</div>`;
    }
  }
  if(opening) updateSubtitleSyncUI();
}
function closeSubtitlePanel(){
  const panel = document.getElementById('subtitlePanel');
  if(panel) panel.classList.remove('open');
}

/* =========================================================
   PLAYER BRIGHTNESS
   ---------------------------------------------------------
   A purely cosmetic CSS filter on #playerMediaWrap (never the iframe itself — see the CSS comment
   on .player-media-wrap) — vaplayer.ru is cross-origin, so there is no way to touch the actual
   video's brightness, only how it LOOKS from our side of the iframe boundary. Because the filter
   lives on the wrapper rather than the iframe/video element, every restart/resume/seek — which
   destroy and recreate the iframe/video, never the wrapper — leaves the current brightness in
   place automatically; nothing here ever needs to know those rebuilds are happening, and nothing
   about a brightness change ever triggers one.
========================================================= */
let brightnessHideTimer = null;
function toggleBrightnessPanel(){
  const panel = document.getElementById('brightnessPanel');
  if(!panel) return;
  const opening = !panel.classList.contains('open');
  if(!opening){ closeBrightnessPanel(); return; }
  closeSubtitlePanel(); // only one popover open at a time
  panel.classList.add('open');
  const btn = document.getElementById('playerBrightnessBtn');
  if(btn) btn.classList.add('is-active');
  syncBrightnessUI(state.settings.playerBrightness);
  scheduleBrightnessPanelHide();
}
function closeBrightnessPanel(){
  const panel = document.getElementById('brightnessPanel');
  if(panel) panel.classList.remove('open');
  const btn = document.getElementById('playerBrightnessBtn');
  if(btn) btn.classList.remove('is-active');
  clearTimeout(brightnessHideTimer);
}
// Resets the "hide a few seconds after the user stops interacting" timer — called on open and on
// every slider interaction, so the panel only ever closes once input genuinely stops.
function scheduleBrightnessPanelHide(){
  clearTimeout(brightnessHideTimer);
  brightnessHideTimer = setTimeout(closeBrightnessPanel, 2500);
}
// Pushes a brightness value (0.5–1.5) to the slider position + percentage label without touching
// the wrap's filter — used when opening the panel to reflect whatever's already applied.
function syncBrightnessUI(value){
  const pct = Math.round(Math.min(150, Math.max(50, value*100)));
  const slider = document.getElementById('brightnessSlider');
  const label = document.getElementById('brightnessValueLabel');
  if(slider) slider.value = pct;
  if(label) label.textContent = pct+'%';
}
// Applies a brightness percentage (50–150) to the live filter + UI immediately — used on every
// slider 'input' tick, i.e. potentially many times a second while dragging, so it deliberately does
// NOT touch localStorage; onBrightnessSliderChange (below) is what persists the final value.
function applyPlayerBrightnessLive(percentValue){
  const pct = Math.min(150, Math.max(50, Math.round(Number(percentValue)||100)));
  const value = pct/100;
  const wrap = document.getElementById('playerMediaWrap');
  if(wrap) wrap.style.filter = `brightness(${value})`;
  const label = document.getElementById('brightnessValueLabel');
  if(label) label.textContent = pct+'%';
  return value;
}
function onBrightnessSliderInput(e){
  applyPlayerBrightnessLive(e.target.value);
  scheduleBrightnessPanelHide();
}
// Fires on release (or a keyboard nudge) — this is the only place a brightness change is actually
// saved, so dragging doesn't hammer localStorage on every intermediate tick.
function onBrightnessSliderChange(e){
  state.settings.playerBrightness = applyPlayerBrightnessLive(e.target.value);
  saveSettings();
  scheduleBrightnessPanelHide();
}

async function searchSubtitles(){
  const resultsEl = document.getElementById('subtitleResults');
  const apiKey = (state.settings.subdl||'').trim();
  if(!apiKey){
    resultsEl.innerHTML = `<div class="field-hint">Add a free SubDL API key in Settings → Subtitles to search.</div>`;
    return;
  }
  const query = (document.getElementById('subtitleQuery').value||'').trim();
  if(!query){ toast('Enter a title to search'); return; }
  const lang = document.getElementById('subtitleLang').value;
  const p = state.player;
  const item = getItem(p.itemId);
  const params = new URLSearchParams({api_key: apiKey, film_name: query, unpack:'1'});
  if(lang) params.set('languages', lang);
  if(item){
    params.set('type', item.type==='series' ? 'tv' : 'movie');
    if(item.type==='series' && p.seasonNum!=null){
      params.set('season_number', String(p.seasonNum));
      params.set('episode_number', String(p.epNum));
    }
  }
  resultsEl.innerHTML = `<div style="text-align:center; padding:20px 0;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  try{
    const res = await fetch(`https://api.subdl.com/api/v1/subtitles?${params.toString()}`);
    const data = await res.json();
    if(!data.status) throw new Error(data.error || 'Search failed');
    subtitleResults = flattenSubtitleResults(data);
    renderSubtitleResults();
  }catch(e){
    resultsEl.innerHTML = `<div class="field-hint">Couldn't reach SubDL (${esc(e.message||'network error')}). Double-check your API key in Settings, or try again in a moment.</div>`;
  }
}

// SubDL wraps most matches in a season/movie "pack" — with unpack=1, full_season packs also come
// with unpack_files: one entry per actual episode file, which is what we want to list/download
// directly. Non-packed results (most single-movie subtitles) don't have that and stay a plain zip.
function flattenSubtitleResults(data){
  const out = [];
  (data.subtitles||[]).forEach(s=>{
    if(s.unpack_files && s.unpack_files.length){
      s.unpack_files.forEach(f=>{
        out.push({label: f.release_name || f.name, lang: f.language||'', format: f.format||'srt', hi: f.hi, url: f.url});
      });
    } else {
      out.push({label: s.release_name || s.name, lang: s.language||'', format:'zip', url: s.url});
    }
  });
  return out;
}

function renderSubtitleResults(){
  const el = document.getElementById('subtitleResults');
  if(!subtitleResults.length){
    el.innerHTML = `<div class="field-hint">No subtitles found. Try a different title, or clear the language filter.</div>`;
    return;
  }
  el.innerHTML = subtitleResults.map((r,i)=>`
    <div class="subtitle-result-row">
      <div style="min-width:0;">
        <div class="subtitle-result-name">${esc(r.label)}</div>
        <div class="subtitle-result-meta">${esc((r.lang||'').toUpperCase())} · ${esc(r.format.toUpperCase())}${r.hi?' · HI':''}</div>
      </div>
      <button class="btn btn-ghost" style="flex-shrink:0;" onclick="useSubtitleResult(${i})">Use</button>
    </div>
  `).join('');
}

async function useSubtitleResult(i){
  const r = subtitleResults[i];
  const p = state.player;
  if(!r || !p) return;
  toast('Downloading subtitle…');
  try{
    const fullUrl = r.url.startsWith('http') ? r.url : `https://dl.subdl.com${r.url}`;
    const res = await fetch(fullUrl);
    if(!res.ok) throw new Error('download failed ('+res.status+')');
    const buf = await res.arrayBuffer();
    const head = new Uint8Array(buf.slice(0,2));
    const isZip = (head[0]===0x50 && head[1]===0x4B) || r.format==='zip'; // 'PK' magic bytes
    let srtText;
    if(isZip){
      await loadJSZip();
      const zip = await window.JSZip.loadAsync(buf);
      const srtFile = Object.values(zip.files).find(f=>!f.dir && /\.srt$/i.test(f.name));
      if(!srtFile) throw new Error('no .srt file found in the downloaded pack');
      srtText = await srtFile.async('text');
    } else {
      srtText = new TextDecoder('utf-8').decode(buf);
    }
    // Cues are kept in state (not just baked into a <track> once) so the sync controls can re-time
    // them on the fly, on either path — regenerate the VTT track for video/hls, or just re-check
    // the offset against p._elapsedSeconds for the iframe overlay.
    p.subtitleCues = parseSrtCues(srtText);
    const remembered = getPersistedSubtitleOffset(p.itemId, p);
    p.subtitleOffset = remembered;
    p.subtitleLabel = r.label;
    p.subtitleLangCode = r.lang;
    applyCurrentSubtitleOffset();
    updateSubtitleSyncUI();
    toast(remembered ? `Subtitles loaded — applied your saved ${formatSubtitleOffset(remembered)} sync for this source` : 'Subtitles loaded');
    closeSubtitlePanel();
  }catch(e){
    toast('Subtitle error: '+(e.message||'could not load file'));
  }
}

// Parses raw SRT text into [{start, end, text}] (seconds, plain text with cue-position tags
// stripped). Used as the single source of truth for both delivery paths below, so the sync
// controls only ever need to touch one number (p.subtitleOffset) to re-time either of them.
function parseSrtCues(srt){
  const text = (srt||'').replace(/\r+/g,'').replace(/^\uFEFF/,'').trim();
  const toSeconds = (h,m,s,ms)=> (+h)*3600 + (+m)*60 + (+s) + (+ms)/1000;
  const cues = [];
  text.split(/\n\n+/).forEach(block=>{
    const lines = block.split('\n').filter(l=>l.trim()!=='');
    const timeLine = lines.find(l=>/\d{2}:\d{2}:\d{2}[,.]\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}[,.]\d{3}/.test(l));
    if(!timeLine) return;
    const m = timeLine.match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
    if(!m) return;
    const start = toSeconds(m[1],m[2],m[3],m[4]);
    const end = toSeconds(m[5],m[6],m[7],m[8]);
    const textLines = lines.slice(lines.indexOf(timeLine)+1);
    const cueText = textLines.join('\n').replace(/<[^>]+>/g,'').trim(); // strip any <i>/<font> tags
    if(cueText) cues.push({start, end, text: cueText});
  });
  return cues;
}

// Called ONLY from three places: (1) the PLAYER_EVENT listener, when player_status === "playing" —
// the ongoing sync while actual playback is confirmed running; and one-shot immediate
// recalculations at (2) a seek/restart/resume snap point and (3) applyCurrentSubtitleOffset (when
// the sync offset itself changes). Deliberately NOT called from updatePlayerProgressUI, and never
// from a setInterval/timer of any kind — elapsed here is always either a real player_progress value
// from Vaplayer, or a position we ourselves just explicitly set (a seek target, 0 on restart, etc.),
// never "time since the iframe was created" or "time since the loading screen disappeared".
function updateSubtitleOverlay(elapsed){
  const el = document.getElementById('playerSubtitleOverlay');
  const p = state.player;
  if(!el || !p || !p.subtitleCues) return;
  const offset = p.subtitleOffset || 0;
  const cue = p.subtitleCues.find(c=>elapsed>=c.start+offset && elapsed<=c.end+offset);
  el.innerHTML = cue ? cue.text.split('\n').map(line=>`<span>${esc(line)}</span>`).join('') : '';
}

/* ---- Sync (timing offset) ----
   Shifts every cue by a running p.subtitleOffset (seconds, +later / -earlier), adjustable in
   0.25s/1s steps from the panel. Re-applied on every change rather than mutated once, so Reset
   can always get back to the original file exactly. */
function adjustSubtitleOffset(delta){
  const p = state.player;
  if(!p || !p.subtitleCues) return;
  p.subtitleOffset = Math.round(((p.subtitleOffset||0) + delta) * 100) / 100;
  applyCurrentSubtitleOffset();
  updateSubtitleSyncUI();
  persistSubtitleOffset(p.itemId, p, p.subtitleOffset);
}
function resetSubtitleOffset(){
  const p = state.player;
  if(!p || !p.subtitleCues) return;
  p.subtitleOffset = 0;
  applyCurrentSubtitleOffset();
  updateSubtitleSyncUI();
  persistSubtitleOffset(p.itemId, p, 0);
  toast('Sync reset');
}
function applyCurrentSubtitleOffset(){
  const p = state.player;
  if(!p || !p.subtitleCues) return;
  const video = document.getElementById('playerVideoEl');
  if((p._embedKind==='video' || p._embedKind==='hls') && video){
    mountSubtitleTrack(video, p.subtitleCues, p.subtitleOffset||0, p.subtitleLabel, p.subtitleLangCode);
  } else {
    updateSubtitleOverlay(p._elapsedSeconds || 0);
  }
}
function updateSubtitleSyncUI(){
  const p = state.player;
  const row = document.getElementById('subtitleSyncRow');
  const val = document.getElementById('subtitleOffsetValue');
  if(!row) return;
  if(!p || !p.subtitleCues){ row.style.display = 'none'; return; }
  row.style.display = 'block';
  if(val) val.textContent = formatSubtitleOffset(p.subtitleOffset||0);
}
function formatSubtitleOffset(off){
  const sign = off > 0 ? '+' : (off < 0 ? '−' : '');
  return sign + Math.abs(off).toFixed(2).replace(/0$/,'').replace(/\.$/,'.0') + 's';
}

let jszipLoadPromise = null;
function loadJSZip(){
  if(window.JSZip) return Promise.resolve();
  if(jszipLoadPromise) return jszipLoadPromise;
  jszipLoadPromise = new Promise((resolve,reject)=>{
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
    s.onload = resolve;
    s.onerror = ()=>{ jszipLoadPromise = null; reject(new Error('failed to load the unzip library')); };
    document.head.appendChild(s);
  });
  return jszipLoadPromise;
}

// mm:ss.mmm / hh:mm:ss.mmm — the timestamp format WebVTT requires.
function formatVttTime(seconds){
  seconds = Math.max(0, seconds);
  const h = Math.floor(seconds/3600);
  const m = Math.floor((seconds%3600)/60);
  const s = Math.floor(seconds%60);
  const ms = Math.round((seconds - Math.floor(seconds))*1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}
// Rebuilds a full WebVTT file from cues + the current offset — cheap enough (a handful of KB of
// text) to regenerate on every sync-button tap rather than trying to patch an existing track.
function cuesToVtt(cues, offset){
  offset = offset || 0;
  let out = 'WEBVTT\n\n';
  cues.forEach(c=>{
    const start = Math.max(0, c.start + offset);
    const end = Math.max(start + 0.05, c.end + offset);
    out += `${formatVttTime(start)} --> ${formatVttTime(end)}\n${c.text}\n\n`;
  });
  return out;
}
function mountSubtitleTrack(video, cues, offset, label, lang){
  const blob = new Blob([cuesToVtt(cues, offset)], {type:'text/vtt'});
  if(subtitleTrackUrl) URL.revokeObjectURL(subtitleTrackUrl);
  subtitleTrackUrl = URL.createObjectURL(blob);
  Array.from(video.querySelectorAll('track')).forEach(t=>t.remove());
  const track = document.createElement('track');
  track.kind = 'subtitles';
  track.label = label || lang || 'Subtitle';
  track.srclang = (lang||'en').toLowerCase().slice(0,2) || 'en';
  track.src = subtitleTrackUrl;
  track.default = true;
  video.appendChild(track);
  // Some browsers need a tick after the track mounts before textTracks[] reflects it.
  setTimeout(()=>{ if(video.textTracks && video.textTracks[0]) video.textTracks[0].mode = 'showing'; }, 50);
}

function turnOffSubtitles(){
  const p = state.player;
  const video = document.getElementById('playerVideoEl');
  if(video) Array.from(video.querySelectorAll('track')).forEach(t=>t.remove());
  if(subtitleTrackUrl){ URL.revokeObjectURL(subtitleTrackUrl); subtitleTrackUrl = null; }
  if(p){ p.subtitleCues = null; p.subtitleOffset = 0; }
  updateSubtitleSyncUI();
  const overlayEl = document.getElementById('playerSubtitleOverlay');
  if(overlayEl) overlayEl.innerHTML = '';
  toast('Subtitles off');
}

/* =========================================================
   PRE-PLAYBACK SUBTITLE PROMPT (SubDL)
   ---------------------------------------------------------
   Pressing Play (movie or episode) for the first time no longer plays immediately — requestPlayback()
   is the gate every play path (quickPlay, playEpisodeFromModal, playNextEpisode) now goes through. If
   this itemId/season/episode has never been decided, it opens a dedicated overlay (subtitlePromptCtx)
   over the title's backdrop asking "Would you like to add a subtitle?":
     No  -> playWithoutSubtitles(): remembers the decision in subtitleDecisionMade and plays immediately.
     Yes -> showSubtitlePromptSearch(): swaps to the same SubDL search/download/parse pipeline as the
            in-player panel above (searchSubtitles / useSubtitleResult), just pointed at the title before
            a player exists. A picked result lands in preloadedSubtitles, keyed by preselectSubtitleKey,
            then playback starts — openPlayer() checks that map and, if a match exists, seeds
            state.player.subtitleCues before renderPlayer() ever runs, so the subtitle is already
            attached the instant playback starts.
   Once a key has an answer (either preloadedSubtitles or subtitleDecisionMade), requestPlayback() skips
   straight to openPlayer() next time — the prompt is genuinely "first time only" per title/episode.
========================================================= */
function preselectSubtitleKey(itemId, seasonNum, epNum){
  return seasonNum!=null ? `${itemId}::s${seasonNum}e${epNum}` : `${itemId}::movie`;
}
// The single entry point every Play button/action should call instead of openPlayer() directly.
function requestPlayback(item, seasonNum, epNum, sources){
  sources = sources || [];
  if(!sources.length){ toast('No sources available'); return; }
  const key = preselectSubtitleKey(item.id, seasonNum, epNum);
  if(preloadedSubtitles[key] || subtitleDecisionMade[key]){
    openPlayer(item, seasonNum, epNum, sources);
    return;
  }
  subtitlePromptCtx = {itemId:item.id, seasonNum, epNum, sources};
  document.getElementById('subtitlePromptModal').innerHTML = subtitlePromptQuestionHtml(item, seasonNum, epNum);
  document.getElementById('subtitlePromptOverlay').classList.add('open');
}
function subtitlePromptQuestionHtml(item, seasonNum, epNum){
  const bg = item.backdrop || item.poster || '';
  const epLabel = seasonNum!=null ? `Season ${seasonNum} · Episode ${epNum}` : '';
  return `
    <div class="subtitle-prompt-bg" ${bg?`style="background-image:url('${esc(bg)}')"`:''}>
      <button class="btn-icon subtitle-prompt-close" title="Cancel" onclick="cancelSubtitlePrompt()">${ICON.close}</button>
      <div class="subtitle-prompt-content">
        <span class="subtitle-prompt-eyebrow">Before you press play</span>
        <div class="subtitle-prompt-title">${esc(item.title)}</div>
        ${epLabel ? `<div class="subtitle-prompt-episode">${esc(epLabel)}</div>` : ''}
        <div class="subtitle-prompt-question">Would you like to add a subtitle for this ${seasonNum!=null?'episode':'movie'}?</div>
        <div class="subtitle-prompt-actions">
          <button class="btn btn-ghost" onclick="playWithoutSubtitles()">No, just play</button>
          <button class="btn btn-primary" onclick="showSubtitlePromptSearch()">${ICON.subtitles} Yes, add subtitle</button>
        </div>
      </div>
    </div>
  `;
}
function subtitlePromptSearchHtml(item, seasonNum, epNum){
  const bg = item.backdrop || item.poster || '';
  const hasKey = !!(state.settings.subdl||'').trim();
  const heading = seasonNum!=null ? `Subtitles &middot; S${seasonNum}E${epNum}` : 'Subtitles';
  return `
    <div class="subtitle-prompt-bg" ${bg?`style="background-image:url('${esc(bg)}')"`:''}>
      <button class="btn-icon subtitle-prompt-close" title="Cancel" onclick="cancelSubtitlePrompt()">${ICON.close}</button>
      <div class="subtitle-prompt-content">
        <span class="subtitle-prompt-eyebrow">${esc(item.title)}</span>
        <div class="subtitle-prompt-title" style="font-size:17px;">${heading}</div>
        ${hasKey ? '' : `<div class="field-hint">Add a free SubDL API key in Settings &rarr; Subtitles to search.</div>`}
        <div class="field" style="margin-bottom:0;">
          <input id="preselectSubtitleQuery" placeholder="Movie or show title" value="${esc(item.title||'')}" onkeydown="if(event.key==='Enter'){ event.preventDefault(); searchPreselectSubtitles(); }">
        </div>
        <div class="field-row" style="margin-bottom:0;">
          <select id="preselectSubtitleLang" class="select-input" style="flex:1; border-radius:8px;">
            <option value="">Any language</option>
            ${SUBTITLE_LANGS.map(l=>`<option value="${l.code}">${l.label}</option>`).join('')}
          </select>
          <button class="btn btn-primary" style="flex-shrink:0;" onclick="searchPreselectSubtitles()">${ICON.search}</button>
        </div>
        <div id="preselectSubtitleResults" class="subtitle-results-list" style="max-height:200px;"></div>
        <button class="btn btn-ghost" style="width:100%; justify-content:center;" onclick="playWithoutSubtitles()">Play without subtitles</button>
      </div>
    </div>
  `;
}
// "Yes" was chosen on the question step — swap the same overlay's content to the search UI. Reuses
// preselectSubtitleCtx/preselectSubtitleResults (and every search/download function below) exactly
// as before; only what happens once a subtitle is picked (or skipped) has changed, see below.
function showSubtitlePromptSearch(){
  const ctx = subtitlePromptCtx;
  if(!ctx) return;
  const item = getItem(ctx.itemId);
  if(!item) return;
  preselectSubtitleCtx = {itemId: ctx.itemId, seasonNum: ctx.seasonNum, epNum: ctx.epNum};
  preselectSubtitleResults = [];
  document.getElementById('subtitlePromptModal').innerHTML = subtitlePromptSearchHtml(item, ctx.seasonNum, ctx.epNum);
}
// "No" on the question step, or "Play without subtitles" from the search step — either way, remember
// this key needs no further asking and start playback right away with no subtitle attached.
function playWithoutSubtitles(){
  const ctx = subtitlePromptCtx;
  if(!ctx) return;
  subtitleDecisionMade[preselectSubtitleKey(ctx.itemId, ctx.seasonNum, ctx.epNum)] = true;
  finishSubtitlePromptAndPlay();
}
// The overlay's own close (X) button, backdrop click, or Escape — backs out without playing anything
// and without recording a decision, so the next Play press asks again from a clean slate.
function cancelSubtitlePrompt(){
  document.getElementById('subtitlePromptOverlay').classList.remove('open');
  subtitlePromptCtx = null;
  preselectSubtitleCtx = null;
}
function finishSubtitlePromptAndPlay(){
  const ctx = subtitlePromptCtx;
  if(!ctx) return;
  const item = getItem(ctx.itemId);
  document.getElementById('subtitlePromptOverlay').classList.remove('open');
  subtitlePromptCtx = null;
  preselectSubtitleCtx = null;
  if(item) openPlayer(item, ctx.seasonNum, ctx.epNum, ctx.sources);
}
async function searchPreselectSubtitles(){
  const resultsEl = document.getElementById('preselectSubtitleResults');
  const apiKey = (state.settings.subdl||'').trim();
  if(!apiKey){
    resultsEl.innerHTML = `<div class="field-hint">Add a free SubDL API key in Settings &rarr; Subtitles to search.</div>`;
    return;
  }
  const ctx = preselectSubtitleCtx;
  if(!ctx) return;
  const query = (document.getElementById('preselectSubtitleQuery').value||'').trim();
  if(!query){ toast('Enter a title to search'); return; }
  const lang = document.getElementById('preselectSubtitleLang').value;
  const item = getItem(ctx.itemId);
  const params = new URLSearchParams({api_key: apiKey, film_name: query, unpack:'1'});
  if(lang) params.set('languages', lang);
  if(item){
    params.set('type', item.type==='series' ? 'tv' : 'movie');
    if(item.type==='series' && ctx.seasonNum!=null){
      params.set('season_number', String(ctx.seasonNum));
      params.set('episode_number', String(ctx.epNum));
    }
  }
  resultsEl.innerHTML = `<div style="text-align:center; padding:20px 0;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  try{
    const res = await fetch(`https://api.subdl.com/api/v1/subtitles?${params.toString()}`);
    const data = await res.json();
    if(!data.status) throw new Error(data.error || 'Search failed');
    preselectSubtitleResults = flattenSubtitleResults(data);
    renderPreselectSubtitleResults();
  }catch(e){
    resultsEl.innerHTML = `<div class="field-hint">Couldn't reach SubDL (${esc(e.message||'network error')}). Double-check your API key in Settings, or try again in a moment.</div>`;
  }
}
function renderPreselectSubtitleResults(){
  const el = document.getElementById('preselectSubtitleResults');
  if(!el) return;
  if(!preselectSubtitleResults.length){
    el.innerHTML = `<div class="field-hint">No subtitles found. Try a different title, or clear the language filter.</div>`;
    return;
  }
  el.innerHTML = preselectSubtitleResults.map((r,i)=>`
    <div class="subtitle-result-row">
      <div style="min-width:0;">
        <div class="subtitle-result-name">${esc(r.label)}</div>
        <div class="subtitle-result-meta">${esc((r.lang||'').toUpperCase())} &middot; ${esc(r.format.toUpperCase())}${r.hi?' &middot; HI':''}</div>
      </div>
      <button class="btn btn-ghost" style="flex-shrink:0;" onclick="usePreselectSubtitleResult(${i})">Use</button>
    </div>
  `).join('');
}
// Downloads/unzips/parses exactly like useSubtitleResult (in-player), but stores the parsed cues in
// preloadedSubtitles instead of directly on state.player, since no player exists yet at this point.
async function usePreselectSubtitleResult(i){
  const r = preselectSubtitleResults[i];
  const ctx = preselectSubtitleCtx;
  if(!r || !ctx) return;
  toast('Downloading subtitle…');
  try{
    const fullUrl = r.url.startsWith('http') ? r.url : `https://dl.subdl.com${r.url}`;
    const res = await fetch(fullUrl);
    if(!res.ok) throw new Error('download failed ('+res.status+')');
    const buf = await res.arrayBuffer();
    const head = new Uint8Array(buf.slice(0,2));
    const isZip = (head[0]===0x50 && head[1]===0x4B) || r.format==='zip'; // 'PK' magic bytes
    let srtText;
    if(isZip){
      await loadJSZip();
      const zip = await window.JSZip.loadAsync(buf);
      const srtFile = Object.values(zip.files).find(f=>!f.dir && /\.srt$/i.test(f.name));
      if(!srtFile) throw new Error('no .srt file found in the downloaded pack');
      srtText = await srtFile.async('text');
    } else {
      srtText = new TextDecoder('utf-8').decode(buf);
    }
    const key = preselectSubtitleKey(ctx.itemId, ctx.seasonNum, ctx.epNum);
    preloadedSubtitles[key] = { cues: parseSrtCues(srtText), label: r.label, langCode: r.lang };
    finishSubtitlePromptAndPlay();
  }catch(e){
    toast('Subtitle error: '+(e.message||'could not load file'));
  }
}

/* =========================================================
   PLAYBACK MANAGER
   ---------------------------------------------------------
   vaplayer.ru (and virtually every VidSrc-family mirror) exposes no JS control API — there is no
   way to actually pause it from the parent page. This module fakes the experience instead:

     Pause  → save position, fully unload the iframe (kills network/audio/ads dead), show a
              Netflix-style cover (backdrop + "Resume at mm:ss" + a big Resume button).
     Resume → rebuild the exact same embed URL with ?resumeAt=<seconds> appended (the same
              resume-seek mechanism already used the first time the player opens, see
              buildResumeEmbedUrl) and mount a fresh iframe.

   Nothing here touches iframe internals — the iframe is only ever created or destroyed, never
   reached into. All state lives on state.player, so it survives sequential pause/resume cycles.
========================================================= */

// Waits for a freshly-mounted third-party iframe embed to actually be ready before the caller
// hides the Stream Vault loading overlay — this is what stops the user from ever glimpsing the
// embed's OWN loading spinner underneath ours (the bug this function exists to fix).
//
// vaplayer.ru (and the rest of the VidSrc-family mirrors) exposes no documented JS control API —
// see the banner above — so there's no guaranteed "ready"/"playing" postMessage we can wait for.
// This still listens for one: some mirrors chatter over postMessage anyway (analytics, ad events,
// occasional player-state pings) even without a documented API, and a message genuinely sourced
// from the iframe's own window is a strong sign it has finished booting past its own spinner, so
// it resolves immediately. But because that signal is opportunistic rather than guaranteed, the
// iframe's 'load' event is always the hard minimum required — and since 'load' alone is what
// caused the original flash (it fires the instant the embed's outer document loads, well before
// its player has actually cleared its own spinner), 'load' is followed by a short grace window to
// give the embed's JS time to get video on screen before we clear ours. A generous last-resort
// timer covers the rare case where 'load' never fires at all cross-origin — a true safety net,
// not a race against 'load', so it never hides the overlay ahead of a normal load.
//
// onReady fires exactly once, however readiness ends up being determined.
//
// IMPORTANT: this only governs the Stream Vault loading overlay (a UI/cosmetic concern — hiding
// our spinner before the embed's own spinner can flash through underneath it). It is NOT a signal
// that playback has actually started, and must never be wired directly to starting the progress
// timer / watch-time accrual — that's now driven entirely by real Vaplayer PLAYER_EVENT
// postMessages (see the global `window.addEventListener('message', ...)` listener below).
function waitForPlayerReady(iframe, onReady){
  let done = false;
  let graceTimer = null;
  const finish = ()=>{
    if(done) return;
    done = true;
    window.removeEventListener('message', onMessage);
    iframe.removeEventListener('load', onLoad);
    clearTimeout(graceTimer);
    clearTimeout(safetyTimer);
    onReady();
  };
  const onMessage = (e)=>{ if(e.source === iframe.contentWindow) finish(); };
  const onLoad = ()=>{ clearTimeout(graceTimer); graceTimer = setTimeout(finish, 700); };
  window.addEventListener('message', onMessage);
  iframe.addEventListener('load', onLoad, {once:true});
  const safetyTimer = setTimeout(finish, 8000);
}
// ---------------------------------------------------------------------------------------------
// Hides the Stream Vault loading overlay and resets its label back to the default for next time.
// The ONLY two callers are the real PLAYER_EVENT "playing" handler and its fallback timeout below
// — nothing else hides this overlay for a non-live iframe anymore.
function hidePlayerLoadingOverlay(){
  const l = document.getElementById('playerLoading');
  const lbl = document.getElementById('playerLoadingLabel');
  if(l) l.classList.add('done');
  if(lbl) lbl.textContent = 'Loading stream…';
}
// Vaplayer PLAYER_EVENT listener — the one and only source of truth for iframe playback
// progress/duration/status, replacing the old local elapsed-time timer entirely.
//
// Vaplayer (and the VidSrc-family mirrors built on it) posts messages shaped like:
//   { type: "PLAYER_EVENT", data: { player_progress, player_duration, player_status } }
//
// This listener is bound once for the app's whole lifetime. Every incoming message is matched
// against the CURRENTLY mounted #playerIframeEl by event.source, so a message from a previous/
// torn-down iframe (a stale pause/resume/seek/restart cycle) can never touch the live player's
// state. No local timer, no OMDb/TMDB runtime lookup, no "time since iframe was created"
// approximation — p._elapsedSeconds and p._totalSeconds are written ONLY from player_progress and
// player_duration, and the progress bar/current-time are just a direct read of those two fields

// (that's updated on every single event via updatePlayerProgressUI, above). The caller already

// cycles rebuild cleanly from the original link instead of stacking params on top of each other.
// Strips both resumeAt= (current param) and the legacy t= (kept in case an older saved source URL
// somehow already has one baked in) so neither can linger or double up.

    const u = new URL(url);

// progress, which the t= param (used by some other VidSrc-family mirrors) does NOT reliably do on
// this mirror; t= only takes effect on a genuinely first-ever load of a session. Shared by the
// initial player open (renderPlayer), every fake-resume, and every seek, so a title always resumes
// the same way no matter which triggered it.
//
// Restarting from the beginning is a hard, explicit case — deliberately NOT "send resumeAt=0" —
// because 0 is a falsy value, and mirrors in this family appear to treat an explicit resumeAt=0
// the same as receiving no instruction at all, which can fall back to the mirror's OWN idea of

// Builds a restart embed src from the ORIGINAL base embed URL (never from a resumeAt-bearing one) —
// used by restartPlayer() for both the Restart button and a progress-bar seek to 0. Every other
// param the source URL carries (controls, overlay, showTitle, primaryColor, etc.) is left untouched:
// this only ever strips resumeAt/t/startAt, forces autoplay=1, and appends a fresh cb= cache-buster
// so the mirror can't silently reuse/resume a session it has cached under the old URL.

    const u = new URL(stripped);
    u.searchParams.delete('startAt'); // never let a leftover startAt survive a restart
    u.searchParams.set('autoplay', '1');
    u.searchParams.set('cb', String(Date.now()));
    return u.toString();
  }catch(e){
    // Fallback for a malformed/relative URL the URL() constructor can't parse.
    let out = stripped
      .replace(/([?&])startAt=[^&]*&?/i, (m, sep) => sep==='?' ? '?' : '')
      .replace(/[?&]$/, '');
    if(!/[?&]autoplay=1(&|$)/i.test(out)){
      out += `${out.includes('?') ? '&' : '?'}autoplay=1`;
    }

// mm:ss, or h:mm:ss past the first hour — matches the "Resume at 30:42" style from the spec.
function formatResumeTime(seconds){
  seconds = Math.max(0, Math.floor(seconds || 0));
  const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
  const mm = h ? String(m).padStart(2,'0') : String(m);
  const ss = String(s).padStart(2,'0');
  return h ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;

// here on. p._watchTimer / clearInterval(p._watchTimer) calls elsewhere are harmless no-ops now

// Syncs the bottom-bar progress fill/handle/time-labels to p._elapsedSeconds / p._totalSeconds

// smoothly-advancing local guess each frame WITHOUT ever touching p._elapsedSeconds itself, so
// saving/end-of-playback/subtitle logic elsewhere keeps reading only the last real synced value).

// visibly lags behind whatever state.player actually holds, and on every animation frame in between
// while actively playing.
function updatePlayerProgressUI(displayElapsed){
  const p = state.player;
  if(!p) return;
  const total = p._totalSeconds || 0;
  const elapsed = Math.max(displayElapsed != null ? displayElapsed : (p._elapsedSeconds || 0), 0);
  const pct = total > 0 ? Math.min(100, (elapsed/total)*100) : 0;

  const handle = document.getElementById('playerProgressHandle');
  const curEl = document.getElementById('playerTimeCurrent');
  const totEl = document.getElementById('playerTimeTotal');

// ---------------------------------------------------------------------------------------------
// LOCAL PROGRESS INTERPOLATION — makes the bottom-bar progress bar move fluidly between the real
// PLAYER_EVENT updates (which Vaplayer/VidSrc-family embeds only send every ~5s), instead of the
// bar visibly jumping forward once per event.
//
// How it works: p._elapsedSeconds / p._syncedAt together are a "sync point" — the last real
// position Vaplayer told us about (or a position we ourselves just explicitly set, e.g. a seek
// target) paired with the real clock time (performance.now()) it was set at. While playback is
// actively confirmed running, a requestAnimationFrame loop below computes
//   displayed = p._elapsedSeconds + (now - p._syncedAt)
// every frame and feeds ONLY that number into updatePlayerProgressUI — never into
// p._elapsedSeconds itself. That keeps every other consumer of p._elapsedSeconds (localStorage
// saves via saveIframeProgressThrottled, isNearPlaybackEnd, the subtitle overlay) reading nothing
// but real synced positions, exactly as before; only the visual bar gets the smoothing.
// Re-syncing is automatic and cheap: since the loop re-reads p._elapsedSeconds/p._syncedAt fresh
// every frame rather than capturing them once, the next PLAYER_EVENT (or seek/restart/resume,
// each of which updates both fields together — see setPlayerSyncPoint) is picked up on the very
// next frame with no special-casing needed here.
let progressAnimFrameId = null;
// Stamps the current real position as the new interpolation sync point. MUST be called every time
// p._elapsedSeconds is set to a value that should be treated as "accurate right now" — a real
// PLAYER_EVENT, a seek target, a restart-to-0, an initial mount/resume position, etc. — so the
// interpolation loop's elapsed-since-sync math always starts counting from the right moment
// instead of drifting forward from a stale clock reading.
function setPlayerSyncPoint(elapsedSeconds){
  const p = state.player;
  if(!p) return;
  p._elapsedSeconds = Math.max(0, elapsedSeconds);
  p._syncedAt = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
}
// Starts the rAF loop if it isn't already running. Safe to call repeatedly (e.g. on every
// "playing" PLAYER_EVENT) — it's a no-op once the loop is already ticking.
function startProgressInterpolation(){
  if(progressAnimFrameId != null) return;
  const tick = ()=>{
    const p = state.player;
    // Only iframe embeds use this custom bar at all (native <video>/hls sources render the
    // browser's own controls, which are already frame-smooth) — and only while playback is
    // actually confirmed playing. Anything else (paused/loading/buffering/stopped/no player)
    // stops the loop rather than keep spinning rAF for nothing.
    if(!p || p._embedKind !== 'iframe' || p.playbackState !== 'playing'){
      progressAnimFrameId = null;
      return;
    }
    const now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
    const elapsedSinceSync = Math.max(0, (now - (p._syncedAt || now)) / 1000);
    let displayed = (p._elapsedSeconds || 0) + elapsedSinceSync;
    if(p._totalSeconds > 0) displayed = Math.min(displayed, p._totalSeconds);
    updatePlayerProgressUI(displayed);
    progressAnimFrameId = requestAnimationFrame(tick);
  };
  progressAnimFrameId = requestAnimationFrame(tick);
}
// Stops the rAF loop (pause, buffer/loading, seek, restart, resume-in-flight, teardown — anything
// short of a confirmed "playing" status). The bar is left exactly where it last was; whoever
// called this is responsible for calling updatePlayerProgressUI itself if it needs to snap the bar

function stopProgressInterpolation(){

// Wires up click-to-seek and drag-to-scrub on the bottom-bar progress track. Dragging only updates
// the visual fill/handle/current-time label (a preview) — the actual seek (fade out → destroy
// iframe → recreate with resumeAt= → fade in) only fires once, on release, via performPlayerSeek.
function initPlayerProgressBar(){
  const track = document.getElementById('playerProgressTrack');
  if(!track || track._seekBound) return; // avoid double-binding if this ever runs twice on the same node
  track._seekBound = true;

  const pctFromEvent = (e)=>{
    const rect = track.getBoundingClientRect();
    const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
    if(rect.width <= 0) return 0;
    return Math.min(Math.max((clientX - rect.left) / rect.width, 0), 1);
  };
  const previewAt = (pct)=>{
    const p = state.player;
    if(!p) return;
    const total = p._totalSeconds || 0;
    const fill = document.getElementById('playerProgressFill');
    const handle = document.getElementById('playerProgressHandle');
    const curEl = document.getElementById('playerTimeCurrent');
    if(fill) fill.style.width = (pct*100)+'%';
    if(handle) handle.style.left = (pct*100)+'%';
    if(curEl) curEl.textContent = formatResumeTime(total*pct);
  };
  let dragPct = null;
  const onMove = (e)=>{
    if(dragPct===null) return;
    dragPct = pctFromEvent(e);
    previewAt(dragPct);
  };

    window.removeEventListener('pointermove', onMove);

    const pct = pctFromEvent(e);

    track.classList.remove('dragging');

    // p._playbackBusy guard that Pause/Resume/±20 already respect.
    if(!p || p.isLive || p._playbackBusy) return;
    e.preventDefault();

    previewAt(dragPct);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp, {once:true});

    const p = state.player;
    if(!p || p.isLive || p._playbackBusy) return;
    if(e.key==='ArrowLeft'){ e.preventDefault(); seekPlayer(-5); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); seekPlayer(5); }
    else if(e.key==='Home'){ e.preventDefault(); performPlayerSeek(0); }
    else if(e.key==='End'){ e.preventDefault(); performPlayerSeek(p._totalSeconds||0); }
  });
}
// Toggles the disabled/dimmed look on Play-Pause + both skip buttons while a rebuild (pause,

function fakePausePlayer(){

  if(!iframe) return; // nothing to fake-pause (video/hls sources use real pause, handled earlier)
