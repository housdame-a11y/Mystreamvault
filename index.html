/* "Because You Liked X" — picks your most recently favorited title as the seed, then surfaces
   other library titles sharing at least one genre with it, ranked by how much genre overlap they
   have. Distinct from the TMDB-similar row on the detail page: that one calls out to TMDB for a
   single title you're actively viewing; this one runs entirely on your own library + favorites,
   on the Home page, and rotates automatically as your favorites change. */
function getBecauseYouLikedRow(items){
  const favorites = items.filter(i=>i.favorite);
  if(!favorites.length) return null;
  const seed = [...favorites].sort((a,b)=> new Date(b.favoritedAt||b.dateAdded||0) - new Date(a.favoritedAt||a.dateAdded||0))[0];
  const seedGenres = seed.genre || [];
  if(!seedGenres.length) return null;
  let related = items.filter(i=> i.id!==seed.id && (i.genre||[]).some(g=>seedGenres.includes(g)));
  if(!related.length) return null;
  related = related.sort((a,b)=>{
    const overlapA = (a.genre||[]).filter(g=>seedGenres.includes(g)).length;
    const overlapB = (b.genre||[]).filter(g=>seedGenres.includes(g)).length;
    if(overlapB!==overlapA) return overlapB-overlapA;
    return new Date(b.dateAdded||0)-new Date(a.dateAdded||0);
  });
  return {seed, items: related.slice(0, GENRE_ROW_CAP)};
}

function renderHome(){
  const items = state.lib.items;
  if(!items.length){
    return `<div class="page">${emptyState('Your vault is empty','Add your first movie or series to start building your personal streaming library.')}</div>`;
  }
  const recentMovies = items.filter(i=>i.type==='movie').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const recentSeries = items.filter(i=>i.type==='series').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const heroItems = [...recentMovies, ...recentSeries];
  const watched = items.filter(isStarted).sort((a,b)=> new Date(b.lastWatched||0)-new Date(a.lastWatched||0));
  const continueWatching = watched.filter(i=>!isFullyWatched(i));
  const recentlyAdded = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  const favorites = items.filter(i=>i.favorite).sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  // The most-recently-added title always gets a panoramic row if it has *any* banner art —
  // including the automatic TMDB-backdrop fallback. But it only gets pulled out of Recently
  // Added when you've manually curated banners for it yourself; the automatic fallback is just
  // a visual nicety and never hides a title from the normal list.
  const newest = recentlyAdded[0];
  const panoramicItem = newest && getPanoramicBanners(newest).length ? newest : null;
  const featured = newest && hasManualPanoramicBanners(newest) ? newest : null;
  const recentlyAddedRowItems = featured ? recentlyAdded.filter(i=>i.id!==featured.id) : recentlyAdded;

  let rows = '';
  if(continueWatching.length) rows += rowHtml('Continue Watching', continueWatching, {removable:true});
  rows += featuredReleaseHtml(panoramicItem);
  const newSeasonHome = getNewSeasonItems(items);
  if(newSeasonHome.length) rows += cappedRowHtml('New Season Available', newSeasonHome, 'newseasonall', ICON.bell);
  if(favorites.length) rows += rowHtml('Favorites', favorites);
  const becauseYouLiked = getBecauseYouLikedRow(items);
  if(becauseYouLiked) rows += rowHtml(`Because You Liked "${becauseYouLiked.seed.title}"`, becauseYouLiked.items, {icon: ICON.sparkles});
  rows += rowHtml('Recently Added', recentlyAddedRowItems.slice(0, GENRE_ROW_CAP));
  allGenres().forEach(g=>{
    const inGenre = recentlyAdded.filter(i=>(i.genre||[]).includes(g));
    if(inGenre.length) rows += genreRowHtml(g, inGenre, 'all');
  });
  const bingeNowHome = getBingeNowItems(items);
  if(bingeNowHome.length) rows += cappedRowHtml('Binge Now', bingeNowHome, 'bingeall');

  return `${heroCarouselHtml(heroItems)}<div class="page">${rows}</div>`;
}

/* Up to 6 panoramic banner URLs per title. Falls back to the old single `panoramicBanner`
   field, then to the TMDB backdrop if neither is set — so the row still shows *something*
   for a freshly-imported title even if you never paste custom banner art. */
function getPanoramicBanners(item){
  if(!item) return [];
  if(Array.isArray(item.panoramicBanners) && item.panoramicBanners.length) return item.panoramicBanners.slice(0,6);
  if(item.panoramicBanner) return [item.panoramicBanner];
  if(item.backdrop) return [item.backdrop];
  return [];
}
/* Whether the panoramic banners were something *you* actually set, as opposed to the
   automatic backdrop fallback above. This is what decides whether a title gets pulled out of
   Recently Added to be featured — the auto fallback alone should never do that; only your own
   curated banner links should. */
function hasManualPanoramicBanners(item){
  if(!item) return false;
  if(Array.isArray(item.panoramicBanners) && item.panoramicBanners.length) return true;
  if(item.panoramicBanner) return true;
  return false;
}

          ${item.description ? `<p class="featured-desc">${esc(item.description)}</p>` : ''}
          <div class="featured-actions">

            <button class="btn btn-ghost" onclick="event.stopPropagation(); openTrailerModal('${item.id}')">${ICON.play} Trailer</button>

      </div>

}
let featuredAutoplayTimer = null;
function stopFeaturedAutoplay(){ clearInterval(featuredAutoplayTimer); featuredAutoplayTimer = null; }
/* Positions/sizes .featured-bg-rect so it starts 2px below line 1's bottom edge and ends 2px above
   line 5's top edge, then insets both edges inward by the SAME amount (5% of that full span each) so
   the rectangle shrinks 10% total while staying perfectly centered between the two lines — the gap
   above the rectangle (to line 1) and the gap below it (to line 5) are always equal by construction,
   since both start from the same symmetric 2px baseline and get the same inset subtracted. Horizontal
   sizing is handled by CSS (left:0; right:0 — full row width), so this only needs the vertical span.
   Re-run on render and on resize since line 1/line 5's real pixel positions depend on responsive
   font-size clamps. */
function positionFeaturedBgRect(){
  const rectEl = document.getElementById('featuredBgRect');
  const row = document.querySelector('.featured-row');
  if(!rectEl || !row) return;
  const line1 = row.querySelector('.featured-bg-text span');
  const line5 = row.querySelector('.featured-bg-text-dup--last span');
  if(!line1 || !line5) return;
  const rowRect = row.getBoundingClientRect();
  const r1 = line1.getBoundingClientRect();
  const r5 = line5.getBoundingClientRect();
  const fullTop = (r1.bottom - rowRect.top) + 2;
  const fullBottom = (r5.top - rowRect.top) - 2;
  const fullHeight = fullBottom - fullTop;
  const inset = fullHeight * 0.05; // same inset applied to both edges → gaps stay equal
  const extraTopInset = fullHeight * 0.06;
  const extraBottomInset = fullHeight * 0.04;
  const rectTop = fullTop + inset + extraTopInset;
  const rectBottom = fullBottom - inset - extraBottomInset;
  rectEl.style.top = rectTop + 'px';
  rectEl.style.height = Math.max(0, rectBottom - rectTop) + 'px';
}
window.addEventListener('resize', ()=> positionFeaturedBgRect());
function startFeaturedAutoplay(){
  stopFeaturedAutoplay();
  const banners = state.featuredItem ? getPanoramicBanners(state.featuredItem) : [];
  if(banners.length<2) return;
  featuredAutoplayTimer = setInterval(()=> setFeaturedSlide(((state.featuredIndex||0)+1) % banners.length), 5500);
}
// Crossfades art layers + slides/fades the content and dot indicators — the 380-420ms transitions
// live in CSS (see .featured-art-layer / .featured-content), this just toggles the classes.
function setFeaturedSlide(i){
  const card = document.getElementById('featuredCard');
  if(!card) return;
  state.featuredIndex = i;
  card.querySelectorAll('.featured-art-layer').forEach(el=> el.classList.toggle('active', +el.dataset.idx===i));
  card.querySelectorAll('.featured-dot').forEach((el,idx)=> el.classList.toggle('active', idx===i));
  const content = document.getElementById('featuredContent');
  if(content){
    content.style.opacity = '0'; content.style.transform = 'translateY(6px)';
    setTimeout(()=>{ content.style.opacity = ''; content.style.transform = ''; }, 40);
  }
  startFeaturedAutoplay();
}

function heroCarouselHtml(items){

function heroSlideHtml(item){

let heroDragStartX = null, heroDragging = false, heroDidDrag = false;
function heroPointerDown(e){
  heroDragStartX = (e.touches ? e.touches[0].clientX : e.clientX);
  heroDragging = true;
  heroDidDrag = false;
  stopHeroAutoplay();
  const track = document.getElementById('heroTrack');
  if(track) track.classList.add('dragging');
}
function heroPointerMove(e){
  if(!heroDragging || heroDragStartX==null) return;
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  if(Math.abs(x - heroDragStartX) > 8) heroDidDrag = true;
}
function heroPointerUp(e){
  if(!heroDragging){ startHeroAutoplay(); return; }
  heroDragging = false;
  const track = document.getElementById('heroTrack');
  if(track) track.classList.remove('dragging');
  const endX = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
  const delta = heroDragStartX!=null ? endX - heroDragStartX : 0;
  if(Math.abs(delta) > 50){
    // Sliding left-to-right (positive delta) goes back; right-to-left goes forward.
    if(delta > 0) prevHeroSlide(); else nextHeroSlide();
  } else {
    startHeroAutoplay();
  }
  heroDragStartX = null;
  setTimeout(()=>{ heroDidDrag = false; }, 60);
}
function heroSlideClick(id){
  if(heroDidDrag) return;
  location.hash = 'detail/'+id;
}

}
function prevHeroSlide(){
  if(!state.heroItems || !state.heroItems.length) return;
  state.heroIndex = (state.heroIndex-1+state.heroItems.length) % state.heroItems.length;

function updateHeroTrack(){

// Toggles .is-active onto whichever slide matches state.heroIndex -- this is what drives the content

// ---- Incremental (virtualized-ish) list/grid rendering ----
// Genre pages, actor pages, collection pages, and the watchlist all render "every item matching X"
// with no cap -- fine for a small library, but with a very large one, building thousands of card/row
// elements into the DOM in one innerHTML write is real, measurable lag (parse + layout + paint all
// scale with total item count). This renders an initial batch immediately (so the page never opens
// empty) and appends more as a sentinel element scrolls into view, so DOM node count -- and the cost
// of opening the page -- tracks what's actually been scrolled to, not the size of the underlying list.
// Usage: return virtualListHtml('someId', items, 'grid-3col') from a render* function, then call
// initVirtualList('someId', cardHtml) right after that HTML lands in the DOM (see router()).
const VIRTUAL_BATCH_SIZE = 60;
const virtualLists = {};
function virtualListHtml(id, items, wrapperClass){
  virtualLists[id] = {items, rendered:0};
  return `<div class="${wrapperClass}" id="${id}"></div><div id="${id}_sentinel" style="height:1px;"></div>`;
}
function initVirtualList(id, renderFn){
  const vl = virtualLists[id];
  const container = document.getElementById(id);
  const sentinel = document.getElementById(id+'_sentinel');
  if(!vl || !container || !sentinel) return;
  function renderNextBatch(){
    if(vl.rendered >= vl.items.length) return;
    const next = vl.items.slice(vl.rendered, vl.rendered + VIRTUAL_BATCH_SIZE);
    container.insertAdjacentHTML('beforeend', next.map(renderFn).join(''));
    vl.rendered += next.length;
    makeFocusable(); // no-op outside tv-mode; in tv-mode, newly-appended cards need tabindex too
    if(vl.rendered >= vl.items.length && vl.observer) vl.observer.disconnect();
  }
  renderNextBatch(); // first screenful right away, no waiting on IntersectionObserver's first tick
  if(typeof IntersectionObserver === 'undefined'){
    // No IntersectionObserver support (some older TV WebViews) — render everything immediately
    // rather than leaving the list stuck after the first batch with no way to load the rest.
    while(vl.rendered < vl.items.length) renderNextBatch();
    return;
  }
  const observer = new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting) renderNextBatch();
  }, {rootMargin:'1000px'}); // generous margin so the next batch is ready before the user reaches it
  observer.observe(sentinel);
  vl.observer = observer;
}

/* ---- Card tilt (mouse) / tap-shine (touch) ---- */
const CARD_HOVER_CAPABLE = window.matchMedia('(hover:hover) and (pointer:fine)').matches;
// Once the Featured Release card's one-shot entrance finishes, swap it for a continuous gentle float
// so the card keeps quietly moving afterward instead of sitting completely still.
document.addEventListener('animationend', e=>{
  if(e.animationName === 'featuredCardReveal' && e.target && e.target.id === 'featuredCard'){
    e.target.style.animation = 'featuredCardFloat 9s ease-in-out infinite';
  }
});
if(CARD_HOVER_CAPABLE){
  document.addEventListener('pointermove', e=>{
    const card = e.target.closest && e.target.closest('.card');
    if(!card) return;
    const r = card.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    card.style.setProperty('--tiltY', (px * 10).toFixed(2) + 'deg');
    card.style.setProperty('--tiltX', (-py * 10).toFixed(2) + 'deg');
  });
  // pointerleave doesn't bubble, but a capture-phase listener on document still sees it on the way down.
  document.addEventListener('pointerleave', e=>{
    const card = e.target && e.target.closest && e.target.closest('.card');
    if(card){ card.style.removeProperty('--tiltX'); card.style.removeProperty('--tiltY'); }
  }, true);
} else {
  document.addEventListener('touchstart', e=>{
    const card = e.target.closest && e.target.closest('.card');
    if(!card) return;
    card.classList.remove('tap-shine');
    void card.offsetWidth; // restart the CSS transition if the same card is tapped again quickly
    card.classList.add('tap-shine');
    setTimeout(()=> card.classList.remove('tap-shine'), 650);
  }, {passive:true});
}

/* ---- Trailer hover preview (TMDB) ---- */
const cardHoverTimers = {};
function clearAllCardHoverTimers(){
  Object.values(cardHoverTimers).forEach(t=>clearTimeout(t));
  for(const k in cardHoverTimers) delete cardHoverTimers[k];
}
function cardHoverStart(e, id){
  if(!state.settings.tmdb) return; // no TMDB key configured — plain hover only
  const cardEl = e.currentTarget;
  clearTimeout(cardHoverTimers[id]);
  cardHoverTimers[id] = setTimeout(()=> showCardTrailer(cardEl, id), 1500);
}
function cardHoverEnd(e, id){
  clearTimeout(cardHoverTimers[id]);
  hideCardTrailer(e.currentTarget);
}
async function showCardTrailer(cardEl, id){
  const item = getItem(id);
  if(!item || !cardEl) return;
  if(!item.trailerChecked){
    await fetchTmdbTrailer(item);
  }
  if(!cardEl.matches(':hover')) return; // mouse already left while we were fetching
  if(!item.trailerKey) return; // checked, none available
  if(cardEl.querySelector('.card-trailer')) return; // already showing
  const wrap = document.createElement('div');
  wrap.className = 'card-trailer';
  wrap.innerHTML = `
    <iframe src="https://www.youtube.com/embed/${item.trailerKey}?autoplay=1&mute=1&controls=0&modestbranding=1&playsinline=1&loop=1&playlist=${item.trailerKey}&rel=0&enablejsapi=1" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    <button type="button" class="card-trailer-mute" data-muted="true" title="Unmute" onclick="event.stopPropagation(); toggleCardTrailerMute(this)">${ICON.volumeOff}</button>`;
  cardEl.appendChild(wrap);
}
function hideCardTrailer(cardEl){
  const el = cardEl && cardEl.querySelector && cardEl.querySelector('.card-trailer');
  if(el) el.remove();
}
function toggleCardTrailerMute(btn){
  const wrap = btn.closest('.card-trailer');
  const iframe = wrap && wrap.querySelector('iframe');
  if(!iframe) return;
  const wasMuted = btn.dataset.muted !== 'false';
  const cmd = wasMuted ? 'unMute' : 'mute';
  try{ iframe.contentWindow.postMessage(JSON.stringify({event:'command', func:cmd, args:[]}), '*'); }catch(e){}
  btn.dataset.muted = wasMuted ? 'false' : 'true';
  btn.title = wasMuted ? 'Mute' : 'Unmute';
  btn.innerHTML = wasMuted ? ICON.volumeOn : ICON.volumeOff;
}
async function fetchTmdbTrailer(item){
  item.trailerChecked = true; // mark so we never re-fetch a title with no trailer on every hover
  if(!state.settings.tmdb){ return; }
  try{
    const type = item.type==='series' ? 'tv' : 'movie';
    const yearParam = item.year ? (type==='movie' ? `&year=${encodeURIComponent(item.year)}` : `&first_air_date_year=${encodeURIComponent(item.year)}`) : '';
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(item.title)}${yearParam}`);
    const searchData = await searchRes.json();
    const match = searchData.results && searchData.results[0];
    if(!match){ saveLib(); return; }
    item.tmdbId = match.id;
    const videoRes = await fetch(`https://api.themoviedb.org/3/${type}/${match.id}/videos?api_key=${encodeURIComponent(state.settings.tmdb)}`);
    const videoData = await videoRes.json();
    const vids = (videoData.results||[]).filter(v=>v.site==='YouTube');
    const trailer = vids.find(v=>v.type==='Trailer' && v.official) || vids.find(v=>v.type==='Trailer') || vids.find(v=>v.type==='Teaser') || vids[0];
    if(trailer) item.trailerKey = trailer.key;
    saveLib();
  }catch(e){
    // Silent fail — a missing preview shouldn't interrupt browsing.
    saveLib();
  }
}
// "Watch Trailer" button on the detail page — reuses the same trailerKey the card hover-preview
// fetches/caches, so titles already hovered on a row open instantly. A title opened straight from
// search (never hovered) won't have been checked yet, so this fetches on demand the first time.
async function openTrailerModal(id){
  const item = getItem(id);
  if(!item) return;
  if(!item.trailerKey && !item.trailerChecked){
    if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings to fetch trailers'); return; }
    toast('Looking for a trailer…');
    await fetchTmdbTrailer(item);
  }
  if(!item.trailerKey){ toast('No trailer found for this title'); return; }
  openModal(`
    <div class="trailer-modal-head">
      <h2>${esc(item.title)} — Trailer</h2>
      <button class="btn-icon" onclick="closeModal()">${ICON.close}</button>
    </div>
    <div class="trailer-frame-wrap">
      <iframe src="https://www.youtube.com/embed/${item.trailerKey}?autoplay=1&rel=0&modestbranding=1" title="${esc(item.title)} trailer" allow="autoplay; encrypted-media; fullscreen" allowfullscreen frameborder="0" onload="this.classList.add('loaded'); this.closest('.trailer-frame-wrap').classList.add('iframe-loaded')"></iframe>
    </div>
  `);
  document.getElementById('modalBody').classList.add('modal-video');
}

function toggleGlobalSearch(){

let _searchDebounceTimer = null;
function debounceSearch(fn, delay){
  clearTimeout(_searchDebounceTimer);
  _searchDebounceTimer = setTimeout(fn, delay==null?120:delay);
}
// Shared arrow-key highlight for search result dropdowns/lists. Moves a
// 'kbd-active' class among the rows currently in the DOM — re-rendering the
// list (every keystroke) naturally clears it, so there's no separate index
// to keep in sync. Returns the newly active element, or null if the list is
// empty. dir is +1 (down) or -1 (up).
function moveSearchHighlight(containerSelector, itemSelector, dir){
  const container = document.querySelector(containerSelector);
  if(!container) return null;
  const items = [...container.querySelectorAll(itemSelector)];
  if(!items.length) return null;
  let idx = items.findIndex(el=> el.classList.contains('kbd-active'));
  items.forEach(el=> el.classList.remove('kbd-active'));
  idx = idx===-1 ? (dir>0 ? 0 : items.length-1) : idx+dir;
  if(idx<0) idx = items.length-1;
  if(idx>=items.length) idx = 0;
  const active = items[idx];
  active.classList.add('kbd-active');
  active.scrollIntoView({block:'nearest'});
  return active;
}
/* =========================================================
   TMDB "not in your library yet" SEARCH FALLBACK
   Runs alongside the instant local library search above: once a query is
   long enough and a TMDB key is configured, a separately-debounced network
   call hits TMDB search/multi and any movie/show not already in state.lib
   is offered as a distinct, dashed-border "Discover on TMDB" row. Shared by
   both the desktop dropdown (renderGlobalSearchResults) and the mobile
   full-screen search (renderMobileSearchBody) — state.searchTmdb holds the
   latest query/loading/results/error so either renderer can read it
   without re-fetching, and tmdbFallbackToken discards any response that's
   no longer for the current query (fast typing can fire several in a row).
========================================================= */
let tmdbFallbackDebounceTimer = null;
let tmdbFallbackToken = 0;
const TMDB_FALLBACK_MIN_CHARS = 2;
const TMDB_FALLBACK_DEBOUNCE_MS = 450;
function renderActiveSearchSurface(){
  if(state.globalSearchOpen) renderGlobalSearchResults();
  if(state.mobileSearchOpen) renderMobileSearchBody();
}
// A TMDB multi-search hit counts as "already in your library" if a lib item was previously
// fetched from that exact TMDB id, or — for items added before a TMDB key existed, which never
// got a tmdbId — if its title and release year line up. Either way it's left out of the fallback
// section so the same title never appears in both "Your Library" and "Discover on TMDB" at once.
function isTmdbResultInLibrary(r, mediaType){
  const type = mediaType==='tv' ? 'series' : 'movie';
  const title = ((mediaType==='tv' ? r.name : r.title)||'').trim().toLowerCase();
  const year = ((mediaType==='tv' ? r.first_air_date : r.release_date)||'').split('-')[0];
  return state.lib.items.some(i=>{
    if(i.tmdbId!=null && String(i.tmdbId)===String(r.id)) return true;
    if(i.type!==type) return false;
    if((i.title||'').trim().toLowerCase()!==title) return false;
    return !year || String(i.year||'')===String(year);
  });
}
function resetTmdbFallback(){
  clearTimeout(tmdbFallbackDebounceTimer);
  tmdbFallbackToken++;
  state.searchTmdb = { query:'', loading:false, results:[], error:false };
}
// Called on every keystroke alongside the instant local search — schedules (or cancels) the
// network call without blocking the local results, which render immediately regardless.
function queueTmdbFallbackSearch(q){
  clearTimeout(tmdbFallbackDebounceTimer);
  q = (q||'').trim();
  if(q.length < TMDB_FALLBACK_MIN_CHARS || !state.settings.tmdb){
    tmdbFallbackToken++;
    state.searchTmdb = { query:q, loading:false, results:[], error:false };
    return;
  }
  tmdbFallbackDebounceTimer = setTimeout(()=> runTmdbFallbackSearch(q), TMDB_FALLBACK_DEBOUNCE_MS);
}
async function runTmdbFallbackSearch(q){
  const myToken = ++tmdbFallbackToken;
  state.searchTmdb = { query:q, loading:true, results:[], error:false };
  renderActiveSearchSurface();
  try{
    const data = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(q)}&include_adult=false`).then(r=>r.json());
    if(myToken !== tmdbFallbackToken) return; // a newer keystroke superseded this response
    const results = (data.results||[])
      .filter(r=> (r.media_type==='movie' || r.media_type==='tv') && r.poster_path)
      .filter(r=> !isTmdbResultInLibrary(r, r.media_type))
      .slice(0,5);
    state.searchTmdb = { query:q, loading:false, results, error:false };
  }catch(e){
    if(myToken !== tmdbFallbackToken) return;
    state.searchTmdb = { query:q, loading:false, results:[], error:true };
  }
  renderActiveSearchSurface();
}
// One TMDB fallback result row. `variant` picks the desktop (.gsr-item) or mobile (.msearch-row)
// markup so it slots into either results list and inherits that list's hover/keyboard-nav CSS.
function tmdbFallbackRowHtml(r, variant){
  const mediaType = r.media_type;
  const title = mediaType==='tv' ? r.name : r.title;
  const year = ((mediaType==='tv' ? r.first_air_date : r.release_date)||'').split('-')[0];
  const poster = r.poster_path ? `https://image.tmdb.org/t/p/w185${r.poster_path}` : '';
  const q = (state.searchTmdb.query||'');
  const badge = `<span class="${variant==='mobile'?'msearch-tmdb-badge':'gsr-tmdb-badge'}">${ICON.plus}Add to Library</span>`;
  if(variant==='mobile'){
    return `
    <div class="msearch-row msearch-tmdb" onclick="addFromSearchTmdb(${r.id}, '${mediaType}')">
      <div class="msearch-row-poster">${poster?`<img src="${esc(poster)}" alt="" loading="lazy">`:fallbackHtml(title||'')}</div>
      <div>
        <div class="msearch-row-title">${q?highlightMatch(title||'',q.toLowerCase()):esc(title||'')}</div>
        <div class="msearch-row-meta">${mediaType==='tv'?'Series':'Movie'}${year?' · '+esc(year):''} · Not in your library</div>
        ${badge}
      </div>
    </div>`;
  }
  return `
    <div class="gsr-item gsr-tmdb" onclick="addFromSearchTmdb(${r.id}, '${mediaType}')">
      <div class="gsr-poster">${poster?`<img src="${esc(poster)}" alt="" loading="lazy" onload="this.classList.add('loaded')">`:fallbackHtml(title||'')}</div>
      <div>
        <div class="gsr-title">${q?highlightMatch(title||'',q.toLowerCase()):esc(title||'')}</div>
        <div class="gsr-meta">${mediaType==='tv'?'Series':'Movie'}${year?' · '+esc(year):''}</div>
        ${badge}
      </div>
    </div>`;
}
// Skeleton placeholder rows shown while the debounced TMDB call is in flight, so the dropdown
// doesn't sit frozen for the ~450ms debounce + round-trip after local results have already settled.
function tmdbFallbackSkeletonHtml(variant, count){
  const row = variant==='mobile'
    ? `<div class="msearch-tmdb-skel"><div class="msearch-row-poster"></div><div style="flex:1;"><div class="msearch-skel-line w1"></div><div class="msearch-skel-line w2"></div></div></div>`
    : `<div class="gsr-tmdb-skel"><div class="gsr-poster"></div><div style="flex:1;"><div class="gsr-skel-line w1"></div><div class="gsr-skel-line w2"></div></div></div>`;
  return Array.from({length:count||2}).map(()=>row).join('');
}
// Renders the whole "Discover on TMDB" section (label + rows/skeleton) for the current query, or
// '' when there's nothing to show — no TMDB key, query too short, or a settled empty result.
function tmdbFallbackSectionHtml(variant){
  const q = (state.globalSearchQuery||'').trim();
  if(q.length < TMDB_FALLBACK_MIN_CHARS || !state.settings.tmdb) return '';
  const t = state.searchTmdb;
  if(t.query !== q) return ''; // stale — the debounce for this query hasn't fired yet
  const labelCls = variant==='mobile' ? 'msearch-section-label' : 'gsr-section-label';
  if(t.loading) return `<div class="${labelCls}">Discover on TMDB</div>${tmdbFallbackSkeletonHtml(variant,2)}`;
  if(t.error || !t.results.length) return '';
  return `<div class="${labelCls}">Not in your library yet</div>${t.results.map(r=>tmdbFallbackRowHtml(r,variant)).join('')}`;
}
// What happens when you tap a "Discover on TMDB" row: close whichever search surface is open,
// then hand off straight into the same TMDB-prefilled add-to-library modal the TMDB Top 100
// browsing grids use (quickAddFromTmdb) — search becomes a second way into that same flow rather
// than a separate "info only" dead end.
function addFromSearchTmdb(tmdbId, mediaType){
  const q = state.globalSearchQuery;
  if(state.globalSearchOpen) toggleGlobalSearch();
  if(state.mobileSearchOpen) closeMobileSearch();

  quickAddFromTmdb(tmdbId, mediaType==='tv' ? 'tv' : 'movie');
}

function addRecentSearch(term){

  recents = recents.filter(t=> t.toLowerCase() !== term.toLowerCase());
  recents.unshift(term);
  state.settings.recentSearches = recents.slice(0,8);

function renderGlobalSearchResults(){

  if(!box) return;
  if(!q){
    const recents = state.settings.recentSearches || [];
    if(!recents.length){ box.innerHTML=''; box.classList.remove('show'); return; }
    box.innerHTML = `
      <div class="notif-header"><span>Recent Searches</span><button type="button" class="notif-clear" onclick="event.stopPropagation(); clearRecentSearches()">Clear</button></div>
      ${recents.map(term=>`

    box.classList.add('show');
    return;
  }
  const itemMatches = rankedTitleSearch(state.lib.items, q, i=>i.title, libItemTieBreak, libItemExtraSearchText).slice(0,6);
  const channelMatches = rankedTitleSearch(state.lib.channels||[], q, c=>c.name).slice(0,4);
  const tmdbSection = tmdbFallbackSectionHtml('desktop');
  if(!itemMatches.length && !channelMatches.length && !tmdbSection){
    const hint = state.settings.tmdb ? '' : `<span class="gsr-empty-hint">Add a TMDB API key in Settings to also discover titles you don't have yet.</span>`;
    box.innerHTML = `<div class="gsr-empty">No matches for "${esc(q)}"${hint}</div>`;
    box.classList.add('show');
    return;
  }
  box.innerHTML =
    itemMatches.map(i=>{
      const reason = i.title.toLowerCase().includes(q) ? null : findExtraMatchReason(i, q);
      return `
    <div class="gsr-item" onclick="goToSearchResult('${i.id}')">
      <div class="gsr-poster">${posterEl(i)}</div>
      <div><div class="gsr-title">${highlightMatch(i.title, q)}</div><div class="gsr-meta">${reason ? `${reason.label}: ${reason.html}` : `${i.type==='series'?'Series':'Movie'}${i.year?' · '+esc(i.year):''}`}</div></div>
    </div>`;
    }).join('') +
    channelMatches.map(c=>`
    <div class="gsr-item" onclick="goToChannelResult('${c.id}')">
      <div class="gsr-poster">${c.logo?`<img src="${esc(c.logo)}" alt="" style="object-fit:contain;">`:fallbackHtml(c.name)}</div>
      <div><div class="gsr-title">${esc(c.name)}</div><div class="gsr-meta"><span class="channel-live-dot" style="display:inline-block; margin-right:5px; vertical-align:middle;"></span>Live · ${esc(c.category||'General')}</div></div>
    </div>`).join('') +
    tmdbSection;
  box.classList.add('show');
}
function goToSearchResult(id){

function goToChannelResult(id){

// Enter jumps straight to the top-ranked match, same ranking used to build the
// dropdown itself, so "hit enter" always lands on whatever's shown first.
function handleGlobalSearchKeydown(e){
  if(e.key==='ArrowDown' || e.key==='ArrowUp'){
    const box = document.getElementById('globalSearchResults');
    if(!box || !box.classList.contains('show')) return;
    e.preventDefault();
    moveSearchHighlight('#globalSearchResults', '.gsr-item', e.key==='ArrowDown'?1:-1);
    return;
  }
  if(e.key!=='Enter') return;
  e.preventDefault();
  const box = document.getElementById('globalSearchResults');
  const highlighted = box && box.querySelector('.gsr-item.kbd-active');
  if(highlighted){ highlighted.click(); return; }
  const q = (state.globalSearchQuery||'').trim();
  if(!q) return;
  const topItem = rankedTitleSearch(state.lib.items, q, i=>i.title, libItemTieBreak, libItemExtraSearchText)[0];
  const topChannel = rankedTitleSearch(state.lib.channels||[], q, c=>c.name)[0];
  if(topItem) goToSearchResult(topItem.id);
  else if(topChannel) goToChannelResult(topChannel.id);
}
document.addEventListener('click', e=>{
  if(!state.globalSearchOpen) return;
  const box = document.getElementById('globalSearchResults');
  const container = document.getElementById('topbarSearch');
  if(box && box.contains(e.target)) return;
  if(container && container.contains(e.target)) return;
  toggleGlobalSearch();
});

function allDecades(){
  // Fixed, IMDb-style decade list — always shown regardless of whether the
  // library's items currently have a matching release year.
  const currentDecade = Math.floor(new Date().getFullYear()/10)*10;
  const decades = [];
  for(let d=currentDecade; d>=1920; d-=10) decades.push(d);
  return decades;
}

  const adv = state.mobileSearchAdv;

function sortMobileAdvItems(items, sort){
  const arr = items.slice();
  if(sort==='title') arr.sort((a,b)=> a.title.localeCompare(b.title));
  else if(sort==='year') arr.sort((a,b)=> (advItemYear(b)||0)-(advItemYear(a)||0));
  else if(sort==='rating') arr.sort((a,b)=> (advItemRating(b)||0)-(advItemRating(a)||0));
  else arr.sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));
  return arr;
}
function getMobileAdvFiltered(){
  const adv = state.mobileSearchAdv;
  let items = adv.type==='channel' ? [] : state.lib.items.filter(i=> adv.type==='all' || i.type===adv.type);
  if(adv.genres.length) items = items.filter(i=> (i.genre||[]).some(g=> adv.genres.includes(g)));
  if(adv.rating!=null) items = items.filter(i=>{ const r=advItemRating(i); return r!=null && r>=adv.rating; });
  if(adv.decade!=null) items = items.filter(i=>{ const y=advItemYear(i); return y!=null && Math.floor(y/10)*10===adv.decade; });
  if(adv.favorite) items = items.filter(i=> !!i.favorite);
  if(adv.watchlist) items = items.filter(i=> !!i.watchlist);
  if(adv.unwatched) items = items.filter(i=> !isStarted(i));
  items = sortMobileAdvItems(items, adv.sort);
  let channels = adv.type==='channel' ? (state.lib.channels||[]) : (adv.type==='all' ? (state.lib.channels||[]) : []);
  if(adv.category) channels = channels.filter(c=> (c.category||'General')===adv.category);
  channels = channels.slice().sort((a,b)=> a.name.localeCompare(b.name));
  return {items, channels};
}

  // Recent tab (default)
  const recents = state.settings.recentSearches || [];

    return;

    ${recents.map(term=>`

      <div class="msearch-row-poster">${ICON.schedule}</div>

// Mirrors handleGlobalSearchKeydown for the mobile overlay — Enter jumps to the

function handleMobileSearchKeydown(e){
  if(e.key==='ArrowDown' || e.key==='ArrowUp'){

    e.preventDefault();
    moveSearchHighlight('#mobileSearchBody', '.msearch-row', e.key==='ArrowDown'?1:-1);

   there's no stale-element mismatch for the outside-click closer to trip over.

function unreadNotifCount(){ return (state.lib.notifications||[]).filter(n=>!n.read).length; }
function toggleNotifications(){

// openNotification() needs this rather than a blind toggle — it can be reached two ways: clicking a
// row inside an already-open panel (where a toggle would correctly close it), or clicking "View" on
// a toast fired by pushNotification while the panel was never open at all (where a toggle would
// incorrectly *open* it right before navigating away).

function timeAgo(iso){
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff/60000);
  if(mins<1) return 'just now';
  if(mins<60) return mins+'m ago';
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+'h ago';
  return Math.floor(hrs/24)+'d ago';
}

function markAllNotificationsRead(){

function dismissNotification(id){

  saveLib();

/* =========================================================
   NOTIFICATION GENERATORS
   Every notification shares the {id, type, itemId, dedupeKey, message, createdAt, read} shape.
   dedupeKey is how each generator avoids re-raising the same thing on a later check/re-render —
   see notificationExists()/pushNotification() below. openNotification() branches on `type` to
   decide where a click should land (see further down).
========================================================= */
// True if a notification with this exact dedupeKey already exists (read or unread) — every
// generator below calls this before pushing so re-running a check never creates duplicates.
function notificationExists(dedupeKey){
  return (state.lib.notifications||[]).some(n=> n.dedupeKey===dedupeKey);
}
// Shared push: fills in id/createdAt/read, saves, and (by default) repaints the shell so the bell
// badge updates immediately. Batch scans that might fire many of these in one synchronous pass
// (see checkAirDateReminders) build their own array and skip this instead, so a big batch doesn't
// re-render once per item — see that function's own comment. Every call here is by definition a
// single, "live" notification (rateIt/youMayLike/needsLink/missingSource fire from a user action
// mid-session; newSeason/endingSoon fire from an awaited network call that resolves well after
// startup) — batch scans never call this — so it's also the right, non-spammy place for the toast
// that makes a fresh notification feel alive instead of only bumping the bell badge silently.
function pushNotification(n){
  state.lib.notifications = state.lib.notifications || [];
  const entry = Object.assign({id:uuid(), createdAt:new Date().toISOString(), read:false}, n);
  state.lib.notifications.unshift(entry);
  saveLib();
  renderShell();
  toast(entry.message, {undoLabel:'View', onUndo:()=> openNotification(entry.id)});
}
function addNeedsLinkNotification(item, seasonNum){
  pushNotification({
    type:'needsLink', itemId:item.id, seasonNumber:seasonNum,
    dedupeKey:`needsLink:${item.id}:s${seasonNum}`,
    message: `Season ${seasonNum} of "${item.title}" was added automatically — it needs a stream link before you can watch it.`,
  });
}
// Checks a freshly-added library item for any playable stream link at all — a movie with no
// sources, or a series where every episode in every season has none. Only meant to run once, right
// when an item is newly added (see the two add paths that call it: saveEditModal, wizardFinish) —
// never on a plain edit, so deliberately clearing a source mid-edit doesn't nag.
function checkMissingSourceNotification(item){
  const hasAnySource = item.type==='movie'
    ? (item.sources||[]).some(s=>s.url && s.url.trim())
    : (item.seasons||[]).some(s=>(s.episodes||[]).some(e=>(e.sources||[]).some(src=>src.url && src.url.trim())));
  if(hasAnySource) return;
  const dedupeKey = `missingSource:${item.id}`;
  if(notificationExists(dedupeKey)) return;
  pushNotification({
    type:'missingSource', itemId:item.id, dedupeKey,
    message: `"${item.title}" was added without a stream link — add one to watch it.`,
  });
}
// Fires the moment something finishes (called from saveProgress, right where maybeAutoAddNextSeason
// already hooks "just became watched"): a movie with no rating, or a season finale going
// unwatched-to-watched while that last episode has no rating. Never fires on a re-watch, since the
// caller only invokes this when watched newly flips true.
function maybeNotifyRateIt(item, key){
  if(key==='movie'){
    if(item.myRating) return;
    const dedupeKey = `rateIt:${item.id}:movie`;
    if(notificationExists(dedupeKey)) return;
    pushNotification({ type:'rateIt', itemId:item.id, seasonNumber:null, dedupeKey,
      message: `You finished "${item.title}" — rate it?` });
    return;
  }
  const m = /^s(\d+)e(\d+)$/.exec(key);
  if(!m) return;
  const seasonNum = parseInt(m[1],10);
  if(!isSeasonFullyWatched(item, seasonNum)) return;
  const season = (item.seasons||[]).find(s=>s.number===seasonNum);
  const finale = season && season.episodes && season.episodes[season.episodes.length-1];
  if(!finale || finale.myRating) return;
  const dedupeKey = `rateIt:${item.id}:s${seasonNum}`;
  if(notificationExists(dedupeKey)) return;
  pushNotification({ type:'rateIt', itemId:item.id, seasonNumber:seasonNum, dedupeKey,
    message: `You finished Season ${seasonNum} of "${item.title}" — rate the finale?` });
}
// Fires at the same moment as maybeNotifyRateIt (called right alongside it from saveProgress, on
// the exact instant a movie or season finale newly becomes watched) — looks at what genres the
// just-finished title carries and, if another library title sharing at least one of those genres
// hasn't been started yet (isStarted false), suggests it. The genre-overlap ranking mirrors
// getBecauseYouLikedRow (Home's "Because You Liked" row), but is seeded by what was just finished
// rather than by favorites, and — like rateIt — only ever fires once per finish event via dedupeKey.
function maybeNotifyYouMayLike(item, key){
  const genres = item.genre || [];
  if(!genres.length) return;
  let dedupeKey, finishedLabel;
  if(key==='movie'){
    dedupeKey = `youMayLike:${item.id}:movie`;
    finishedLabel = `Finished "${item.title}"?`;
  } else {
    const m = /^s(\d+)e(\d+)$/.exec(key);
    if(!m) return;
    const seasonNum = parseInt(m[1],10);
    if(!isSeasonFullyWatched(item, seasonNum)) return;
    dedupeKey = `youMayLike:${item.id}:s${seasonNum}`;
    finishedLabel = `Finished Season ${seasonNum} of "${item.title}"?`;
  }
  if(notificationExists(dedupeKey)) return;
  const candidates = state.lib.items.filter(i=> i.id!==item.id && !isStarted(i) && (i.genre||[]).some(g=>genres.includes(g)));
  if(!candidates.length) return;
  const pick = candidates.sort((a,b)=>{
    const overlapA = (a.genre||[]).filter(g=>genres.includes(g)).length;
    const overlapB = (b.genre||[]).filter(g=>genres.includes(g)).length;
    if(overlapB!==overlapA) return overlapB-overlapA;
    return new Date(b.dateAdded||0)-new Date(a.dateAdded||0);
  })[0];
  pushNotification({ type:'youMayLike', itemId:pick.id, dedupeKey,
    message: `${finishedLabel} You might also like "${pick.title}".` });
}
// Once per app load, scans every library series' already-known episode air dates (from TMDB season
// fetches — no network call here, purely local) for anything airing today. Fully synchronous and
// could in principle match many episodes in one pass, so unlike the other generators it builds its
// own list and does a single save+repaint at the end instead of one per match — see pushNotification's
// comment. Runs before the very first router() call in the init sequence at the bottom of this file,
// which repaints the shell right after anyway, so it skips renderShell() itself entirely here.
function checkAirDateReminders(){
  const today = todayISO();
  const fresh = [];
  state.lib.items.forEach(item=>{
    if(item.type!=='series') return;
    (item.seasons||[]).forEach(season=>{
      (season.episodes||[]).forEach(ep=>{
        if(ep.airDate !== today) return;
        const dedupeKey = `airingToday:${item.id}:s${season.number}e${ep.number}`;
        if(notificationExists(dedupeKey)) return;
        fresh.push({
          id: uuid(), type:'airingToday', itemId:item.id, seasonNumber:season.number, episodeNumber:ep.number, dedupeKey,
          message: `"${item.title}" S${season.number}E${ep.number}${ep.title?` — "${ep.title}"`:''} airs today.`,
          createdAt: new Date().toISOString(), read:false
        });
      });
    });
  });
  if(!fresh.length) return;
  state.lib.notifications = fresh.concat(state.lib.notifications||[]);
  saveLib();
}
const NEW_SEASON_CHECK_INTERVAL_MS = 20*60*60*1000; // ~20h — about once/day with normal daily use
const NEW_SEASON_CHECK_MAX_PER_LOAD = 15; // caps how many shows get TMDB-checked per app load
// Once per app load, asks TMDB whether any library series (with a tmdbId and API key set) now has
// more seasons than we've locally tracked — the "it's out, but you haven't finished the current
// season yet (or auto-add never got the chance to run)" case, distinct from maybeAutoAddNextSeason's
// reactive one. Purely informational: never adds anything to the library itself, just notifies.
// item.lastNewSeasonCheckAt throttles each show to roughly once a day, and only the least-recently-
// checked shows are picked per load, so a large library can't turn every app open into a burst of
// requests. Async and awaited sequentially, so — unlike checkAirDateReminders — each push here is
// naturally spaced out by network latency rather than a tight loop, so it's fine for it to save and
// repaint (via pushNotification) as each one resolves rather than batching.
//
// This same per-show fetch also carries d.status, so it doubles as the "ending soon" check: if a
// show's status flips to Ended/Canceled on TMDB while the viewer is mid-way through it (started but
// not finished), that's the "no more episodes are ever coming" moment worth a notification for — the
// mirror image of newSeason. Reusing this fetch means it costs zero extra network calls; it's only
// ever the *transition* into ended (the `due` filter above already excludes already-ended shows, so
// this loop can only ever see a show go from not-ended to ended, never re-fire on one that already
// was).
async function checkForNewSeasons(){
  if(!state.settings.tmdb) return;
  const now = Date.now();
  const due = state.lib.items
    .filter(i=> i.type==='series' && i.tmdbId && !isEndedSeries(i) &&
      (!i.lastNewSeasonCheckAt || now - new Date(i.lastNewSeasonCheckAt).getTime() > NEW_SEASON_CHECK_INTERVAL_MS))
    .sort((a,b)=> new Date(a.lastNewSeasonCheckAt||0) - new Date(b.lastNewSeasonCheckAt||0))
    .slice(0, NEW_SEASON_CHECK_MAX_PER_LOAD);
  for(const item of due){
    item.lastNewSeasonCheckAt = new Date().toISOString();
    try{
      const d = await fetch(`https://api.themoviedb.org/3/tv/${item.tmdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}`).then(r=>r.json());
      if(d.success===false) continue;
      const realSeasonNums = (d.seasons||[]).filter(s=>s.season_number>0 && s.episode_count>0).map(s=>s.season_number);
      const tmdbMax = realSeasonNums.length ? Math.max(...realSeasonNums) : 0;
      const localMax = (item.seasons||[]).reduce((m,s)=>Math.max(m,s.number), 0);
      if(tmdbMax > localMax){
        const dedupeKey = `newSeason:${item.id}:s${tmdbMax}`;
        if(!notificationExists(dedupeKey)){
          pushNotification({ type:'newSeason', itemId:item.id, seasonNumber:tmdbMax, dedupeKey,
            message: `Season ${tmdbMax} of "${item.title}" is now available on TMDB.` });
        }
      }
      if(d.status) item.tvStatus = d.status;
      if(isEndedSeries(item) && isStarted(item) && !isFullyWatched(item)){
        const dedupeKey = `endingSoon:${item.id}`;
        if(!notificationExists(dedupeKey)){
          pushNotification({ type:'endingSoon', itemId:item.id, dedupeKey,
            message: `"${item.title}" has ended on TMDB — no more episodes are coming.` });
        }
      }
    }catch(e){ /* stay quiet — this is a background convenience check, not a user-initiated action */ }
  }
  saveLib(); // persists lastNewSeasonCheckAt (and any tvStatus updates) even for shows with no notification
}
const CONTINUE_WATCHING_REMINDER_MS = 3*24*60*60*1000; // ~3 days of no activity before nudging
// Once per app load, looks for anything the viewer started but never finished (isStarted &&
// !isFullyWatched — same pair the Home "Continue Watching" row itself uses) where item.lastWatched
// (set by every saveProgress call, movie or episode alike — see saveProgress) is older than the
// threshold above, i.e. they picked it up and then went quiet. Local-only, purely informational,
// same batched-push shape as checkAirDateReminders since it can match many items in one synchronous
// pass. dedupeKey is keyed to the exact lastWatched timestamp rather than just the item id, so if
// the viewer comes back, watches a bit more, and then goes quiet again, a fresh nudge can fire for
// that new stale period instead of being permanently suppressed by the first one.
function checkContinueWatchingNudges(){
  const cutoff = Date.now() - CONTINUE_WATCHING_REMINDER_MS;
  const fresh = [];
  state.lib.items.forEach(item=>{
    if(!item.lastWatched || !isStarted(item) || isFullyWatched(item)) return;
    const lastWatchedMs = new Date(item.lastWatched).getTime();
    if(!lastWatchedMs || lastWatchedMs > cutoff) return;
    const dedupeKey = `continueWatching:${item.id}:${item.lastWatched}`;
    if(notificationExists(dedupeKey)) return;
    const days = Math.floor((Date.now()-lastWatchedMs)/(24*60*60*1000));
    fresh.push({
      id: uuid(), type:'continueWatching', itemId:item.id, dedupeKey,
      message: `You haven't watched "${item.title}" in ${days} day${days===1?'':'s'} — pick up where you left off?`,
      createdAt: new Date().toISOString(), read:false
    });
  });
  if(!fresh.length) return;
  state.lib.notifications = fresh.concat(state.lib.notifications||[]);
  saveLib();
}
// ---- Watchlist Reminder ----
// Mirrors checkContinueWatchingNudges but for the opposite case: something added to the watchlist
// that was never started at all (isStarted false), sitting untouched since item.watchlistedAt (set
// by toggleWatchlist/removeFromWatchlistRow's undo/openPlayer's auto-add — see those call sites).
// Falls back to item.dateAdded for anything watchlisted before this field existed, same fallback
// getBecauseYouLikedRow already uses for favoritedAt. dedupeKey buckets by which 30-day period the
// item is currently in (days-since / 30, floored) rather than a single fixed timestamp, so if it's
// still sitting there untouched 60 or 90 days on, a fresh reminder can fire for each new period
// instead of only ever nagging once.
const WATCHLIST_REMINDER_MS = 30*24*60*60*1000; // ~30 days untouched before nudging
function checkWatchlistReminders(){
  const fresh = [];
  state.lib.items.forEach(item=>{
    if(!item.watchlist || isStarted(item)) return;
    const sinceRaw = item.watchlistedAt || item.dateAdded;
    if(!sinceRaw) return;
    const sinceMs = new Date(sinceRaw).getTime();
    if(!sinceMs) return;
    const age = Date.now() - sinceMs;
    if(age < WATCHLIST_REMINDER_MS) return;
    const bucket = Math.floor(age / WATCHLIST_REMINDER_MS);
    const dedupeKey = `watchlistReminder:${item.id}:${bucket}`;
    if(notificationExists(dedupeKey)) return;
    const days = Math.floor(age/(24*60*60*1000));
    fresh.push({
      id: uuid(), type:'watchlistReminder', itemId:item.id, dedupeKey,
      message: `"${item.title}" has been on your watchlist for ${days} days — still interested?`,
      createdAt: new Date().toISOString(), read:false
    });
  });
  if(!fresh.length) return;
  state.lib.notifications = fresh.concat(state.lib.notifications||[]);
  saveLib();
}
// ---- Welcome Back ----
// Tracks how long it's actually been since the app was last open, independent of anything in
// state.lib (this is session bookkeeping, not library data, so it gets its own localStorage key
// rather than living in the synced/exported library blob). LAST_ACTIVE_KEY is refreshed while the
// app is in use — on load, and whenever the tab goes into the background — so "gap since last
// active" reflects real away-time rather than just time-since-last-page-load (which a simple
// refresh would otherwise trigger on its own).
const LAST_ACTIVE_KEY = 'sv_last_active_at';
const WELCOME_BACK_THRESHOLD_MS = 8*60*60*1000; // ~8h — a real gap (overnight, a day away), not a quick reload
function markAppActiveNow(){
  try{ localStorage.setItem(LAST_ACTIVE_KEY, new Date().toISOString()); }catch(e){ /* private mode etc — just skip */ }
}
// Runs once per app load, before markAppActiveNow() below overwrites the stored timestamp — so it's
// comparing "now" against the moment the app was last genuinely active, not against itself. Single
// notification per gap (dedupeKey is keyed to that exact stored timestamp), so re-checking on the
// same load or a same-session hash change never duplicates it.
function checkWelcomeBackNotification(){
  let lastActiveRaw = null;
  try{ lastActiveRaw = localStorage.getItem(LAST_ACTIVE_KEY); }catch(e){ /* private mode etc */ }
  if(lastActiveRaw){
    const gap = Date.now() - new Date(lastActiveRaw).getTime();
    if(gap >= WELCOME_BACK_THRESHOLD_MS){
      const dedupeKey = `welcomeBack:${lastActiveRaw}`;
      if(!notificationExists(dedupeKey)){
        const days = Math.floor(gap/(24*60*60*1000));
        const away = days>=1 ? `${days} day${days===1?'':'s'}` : `${Math.max(1,Math.floor(gap/(60*60*1000)))} hour${Math.floor(gap/(60*60*1000))===1?'':'s'}`;
        pushNotification({ type:'welcomeBack', itemId:null, dedupeKey,
          message: `Welcome back! It's been ${away} since your last visit.` });
      }
    }
  }
  markAppActiveNow();
}
// Keeps LAST_ACTIVE_KEY current while the app is actually being used, so a long-open-but-idle tab
// doesn't quietly rack up "away" time, and a background tab does.
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) markAppActiveNow(); });
window.addEventListener('beforeunload', markAppActiveNow);
// Runs once per app load, right before the first router() call — see the init sequence at the
// bottom of this file. checkAirDateReminders, checkContinueWatchingNudges, checkWatchlistReminders,
// and checkWelcomeBackNotification are all local-only and always run; checkForNewSeasons (which also
// covers endingSoon — see its own comment) no-ops on its own when there's no TMDB key, so it's
// always safe to call.
function runStartupNotificationChecks(){
  checkAirDateReminders();
  checkContinueWatchingNudges();
  checkWatchlistReminders();
  checkWelcomeBackNotification();
  checkForNewSeasons();
}
function openNotification(id){
  const n = (state.lib.notifications||[]).find(x=>x.id===id);
  if(!n) return;
  n.read = true;
  saveLib();
  closeNotifications();
  renderShell();
  // welcomeBack carries no itemId at all (it's not about any one title) — mark it read, close the
  // panel, and stop, same as everything above just did. Falling through would hit getItem(null) and
  // show the "That title no longer exists" toast, which is wrong for a notification that was never
  // about a title in the first place.
  if(n.type==='welcomeBack') return;
  const item = getItem(n.itemId);
  if(!item){ toast('That title no longer exists'); return; }
  // needsLink/missingSource both want the edit modal open right away — that's where a stream link
  // gets added. rateIt/airingToday just want the right season in view (rating happens on the detail
  // page itself; airing-today is informational). newSeason, continueWatching, youMayLike,
  // watchlistReminder, endingSoon, and anything without a type (notifications saved before this
  // field existed — only ever the original needsLink case) fall through to a plain detail-page visit
  // — continueWatching has no single season to jump to (progress can span several), youMayLike's
  // itemId is the *recommended* title rather than the one just finished, and watchlistReminder/
  // endingSoon are both simple "go look at this title" prompts with no season of their own either.
  const type = n.type || 'needsLink';
  if(type==='needsLink' || type==='missingSource'){
    location.hash = 'detail/'+n.itemId;
    setTimeout(()=> openEditModal(n.itemId), 120);
    return;
  }
  if((type==='rateIt' || type==='airingToday') && n.seasonNumber!=null){
    location.hash = 'detail/'+n.itemId+'/'+n.seasonNumber;
    return;
  }
  location.hash = 'detail/'+n.itemId;
}

function quickPlay(id){
  const item = getItem(id);
  if(!item) return;
  if(item.type==='movie'){
    requestPlayback(item, null, null, getMovieSources(item));
  } else {
    // find first unwatched episode, else first episode
    const flat = [];
    (item.seasons||[]).forEach(s=> (s.episodes||[]).forEach(e=> flat.push({s:s.number,e})));
    let target = flat.find(f=>{
      const key = 's'+f.s+'e'+f.e.number;
      const p = (item.progress||{})[key];
      return !p || !p.watched;
    }) || flat[0];
    if(target) requestPlayback(item, target.s, target.e.number, getEpisodeSources(item, target.e, target.s));
    else toast('No episodes added yet');
  }
}

/* =========================================================
   TV SCHEDULE (TVmaze)
========================================================= */
function todayISO(offsetDays){
  const d = new Date();
  d.setDate(d.getDate() + (offsetDays||0));
  return d.toISOString().slice(0,10);
}
function formatScheduleDateLabel(iso){
  const d = new Date(iso+'T00:00:00');
  const diffDays = Math.round((d - new Date(todayISO()+'T00:00:00')) / 86400000);
  const dateStr = d.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric'});
  if(diffDays===0) return 'Today · '+dateStr;
  if(diffDays===1) return 'Tomorrow · '+dateStr;
  if(diffDays===-1) return 'Yesterday · '+dateStr;
  return dateStr;
}
function renderSchedule(){
  const st = state.schedule;
  const tab = st.tab || 'mine';
  return `
    <div class="page">
      <div class="filter-bar">
        <select id="scheduleTabSelect" class="select-input" style="width:auto; border-radius:8px;" onchange="setScheduleTab(this.value)">
          <option value="mine" ${tab==='mine'?'selected':''}>My TV Shows</option>
          <option value="broad" ${tab==='broad'?'selected':''}>Live TV</option>
        </select>
        ${tab==='broad' ? `
          <button class="btn-icon" title="Previous day" onclick="shiftScheduleDate(-1)">${ICON.chevronLeft}</button>
          <div class="schedule-date-label">${formatScheduleDateLabel(st.date)}</div>
          <button class="btn-icon" title="Next day" onclick="shiftScheduleDate(1)">${ICON.chevronRight}</button>
          <span class="tag" title="Change the country in Settings → TV Schedule">${esc(state.settings.scheduleCountry)}</span>
        ` : ''}
        <input class="search-input" placeholder="${tab==='mine'?'Search my shows...':'Search schedule...'}" value="${esc(st.search)}" oninput="setScheduleSearch(this.value)">
      </div>
      <div id="scheduleListing"></div>
    </div>`;
}
function setScheduleTab(val){
  state.schedule.tab = val;
  stopMyShowsCountdown();
  document.getElementById('pageRoot').innerHTML = renderSchedule();
  if(val==='mine') loadMyShowsSchedule(); else loadScheduleData();
}
function shiftScheduleDate(delta){
  const d = new Date(state.schedule.date+'T00:00:00');
  d.setDate(d.getDate()+delta);
  state.schedule.date = d.toISOString().slice(0,10);
  document.getElementById('pageRoot').innerHTML = renderSchedule();
  loadScheduleData();
}
function saveScheduleCountry(){
  const val = document.getElementById('scheduleCountryInput').value;
  state.settings.scheduleCountry = val.trim().toUpperCase().slice(0,2) || 'US';
  saveSettings();
  state.schedule.cache = {};
  toast('Schedule country saved');
  if(state.route==='schedule' && (state.schedule.tab||'mine')==='broad'){
    document.getElementById('pageRoot').innerHTML = renderSchedule();
    loadScheduleData();
  }
}
function setScheduleSearch(val){
  state.schedule.search = val;
  const tab = state.schedule.tab||'mine';
  if(tab==='mine'){
    if(state.schedule._myShowsResults) renderMyShowsListing(state.schedule._myShowsResults);
  } else {
    renderScheduleListing(state.schedule.cache[scheduleCacheKey()] || []);
  }
}
function scheduleCacheKey(){
  return state.settings.scheduleCountry+'_'+state.schedule.date;
}
async function loadScheduleData(){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const key = scheduleCacheKey();
  if(state.schedule.cache[key]){ renderScheduleListing(state.schedule.cache[key]); return; }
  container.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto;"></div><p style="margin-top:16px; color:var(--muted);">Loading schedule…</p></div>`;
  try{
    const res = await fetch(`https://api.tvmaze.com/schedule?country=${encodeURIComponent(state.settings.scheduleCountry)}&date=${state.schedule.date}`);
    if(!res.ok) throw new Error('TVmaze request failed (status '+res.status+')');
    const data = await res.json();
    state.schedule.cache[key] = data;
    if(document.getElementById('scheduleListing')) renderScheduleListing(data);
  }catch(e){
    if(container.isConnected) container.innerHTML = `<div class="empty-state"><h3>Couldn't load the schedule</h3><p>${esc(e.message||'Check your connection and try again.')}</p></div>`;
  }
}
function renderScheduleListing(data){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const search = (state.schedule.search||'').trim().toLowerCase();
  let list = data;
  if(search) list = rankedTitleSearch(list, search, ep=> (ep.show&&ep.show.name)||'');
  if(!list.length){
    container.innerHTML = emptyState('Nothing found', 'Try a different date, country code, or search.', 'Today', "state.schedule.date=todayISO(); document.getElementById('pageRoot').innerHTML=renderSchedule(); loadScheduleData();");
    return;
  }
  list = [...list].sort((a,b)=> (a.airtime||'').localeCompare(b.airtime||''));
  container.innerHTML = `<div class="schedule-list">${list.map(scheduleRowHtml).join('')}</div>`;
}

/* ---------- My TV Shows (watchlist + TVmaze next-episode countdown) ---------- */
function getWatchlistShows(){
  return state.lib.items.filter(i=> i.type==='series' && i.watchlist);
}
async function loadMyShowsSchedule(){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const shows = getWatchlistShows();
  if(!shows.length){
    container.innerHTML = emptyState('No TV shows on your watchlist', 'Add a series to your watchlist from its detail page to see its next-episode countdown here.', 'Browse TV Shows', "location.hash='series'");
    return;
  }
  container.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto;"></div><p style="margin-top:16px; color:var(--muted);">Loading your shows…</p></div>`;
  const results = await Promise.all(shows.map(fetchMyShowSchedule));
  if(!document.getElementById('scheduleListing')) return;
  state.schedule._myShowsResults = results;
  renderMyShowsListing(results);
}
async function fetchMyShowSchedule(item){
  const cacheKey = (item.title||'').toLowerCase().trim();
  const cached = state.schedule.myShowsCache[cacheKey];
  if(cached && (Date.now()-cached.fetchedAt) < 6*60*60*1000) return {item, show:cached.show};
  try{
    const res = await fetch(`https://api.tvmaze.com/singlesearch/shows?q=${encodeURIComponent(item.title)}&embed[]=nextepisode&embed[]=previousepisode`);
    if(!res.ok) throw new Error('not found');
    const show = await res.json();
    state.schedule.myShowsCache[cacheKey] = {show, fetchedAt:Date.now()};
    return {item, show};
  }catch(e){
    state.schedule.myShowsCache[cacheKey] = {show:null, fetchedAt:Date.now()};
    return {item, show:null};
  }
}
function nextEpisodeAirstamp(show){
  const ep = show && show._embedded && show._embedded.nextepisode;
  if(!ep || !ep.airstamp) return null;
  const t = new Date(ep.airstamp).getTime();
  return isNaN(t) ? null : t;
}
function renderMyShowsListing(results){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const search = (state.schedule.search||'').trim().toLowerCase();
  let list = results;
  if(search) list = rankedTitleSearch(list, search, r=> r.item.title||'');
  if(!list.length){
    container.innerHTML = emptyState('Nothing found', 'Try a different search.', '', '');
    return;
  }
  list = [...list].sort((a,b)=>{
    const an = nextEpisodeAirstamp(a.show), bn = nextEpisodeAirstamp(b.show);
    if(an && bn) return an-bn;
    if(an) return -1;
    if(bn) return 1;
    return (a.item.title||'').localeCompare(b.item.title||'');
  });
  container.innerHTML = `<div class="schedule-list">${list.map(myShowRowHtml).join('')}</div>`;
  startMyShowsCountdown();
}
function myShowRowHtml(r){
  const {item, show} = r;
  const img = (show && show.image && (show.image.medium||show.image.original)) || item.poster || '';
  const nextEp = show && show._embedded && show._embedded.nextepisode;
  const airstamp = nextEpisodeAirstamp(show);
  const epLabel = (nextEp && nextEp.season && nextEp.number) ? `S${nextEp.season}E${nextEp.number}` : '';
  const network = (show && ((show.network&&show.network.name)||(show.webChannel&&show.webChannel.name))) || '';
  const statusHtml = airstamp
    ? `<span class="schedule-countdown" data-airstamp="${airstamp}">--</span>`
    : (show ? `<span class="schedule-network" style="margin-top:0;">No upcoming episode</span>` : `<span class="schedule-network" style="margin-top:0; color:#ff8b93;">Not found on TVmaze</span>`);
  return `
    <div class="schedule-row" style="cursor:pointer;" onclick="openMyShowModal('${item.id}')">
      <div class="schedule-thumb">${img?`<img src="${esc(img)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>`:fallbackHtml(item.title||'?')}</div>
      <div class="schedule-info">
        <div class="schedule-show-title">${esc(item.title)}</div>
        <div class="schedule-ep-title">${epLabel?`<span class="schedule-ep-tag">${esc(epLabel)}</span> `:''}${esc((nextEp&&nextEp.name)||'')}</div>
        <div class="schedule-network">${esc(network)}</div>
      </div>
      ${statusHtml}
    </div>`;
}
let myShowsCountdownTimer = null;
function startMyShowsCountdown(){
  stopMyShowsCountdown();
  updateMyShowsCountdown();
  myShowsCountdownTimer = setInterval(updateMyShowsCountdown, 1000);
}
function stopMyShowsCountdown(){
  if(myShowsCountdownTimer){ clearInterval(myShowsCountdownTimer); myShowsCountdownTimer = null; }
}
function updateMyShowsCountdown(){
  const els = document.querySelectorAll('.schedule-countdown');
  if(!els.length){ stopMyShowsCountdown(); return; }
  els.forEach(el=>{
    const target = parseInt(el.dataset.airstamp, 10);
    const diff = target - Date.now();
    el.textContent = diff<=0 ? 'Airing now' : formatCountdown(diff);
  });
}
function formatCountdown(ms){
  const totalSec = Math.floor(ms/1000);
  const d = Math.floor(totalSec/86400), h = Math.floor((totalSec%86400)/3600), m = Math.floor((totalSec%3600)/60), s = totalSec%60;
  if(d>0) return `${d}d ${h}h`;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${s}s`;
  return `${s}s`;
}
function openMyShowModal(itemId){
  const item = getItem(itemId);
  if(!item) return;
  const cacheKey = (item.title||'').toLowerCase().trim();
  const cached = state.schedule.myShowsCache[cacheKey];
  const show = cached && cached.show;
  if(!show){
    openModal(`
      <div class="modal-head"><h2>${esc(item.title)}</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
      <p style="color:var(--muted); padding:4px 2px;">Couldn't find this show on TVmaze.</p>`);
    return;
  }
  const nextEp = show._embedded && show._embedded.nextepisode;
  const stripTags = (h)=> (h||'').replace(/<[^>]+>/g,'');
  const summary = stripTags(nextEp && nextEp.summary ? nextEp.summary : show.summary) || 'No synopsis available.';
  const epImg = nextEp && nextEp.image && (nextEp.image.medium||nextEp.image.original);
  const airDate = nextEp && nextEp.airstamp ? new Date(nextEp.airstamp).toLocaleString(undefined,{weekday:'long', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : null;
  openModal(`
    <div class="modal-head"><h2>${esc(show.name||item.title)}</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div style="display:flex; gap:16px; padding:2px; flex-wrap:wrap;">
      ${epImg?`<img src="${esc(epImg)}" alt="" style="width:170px; border-radius:8px; flex-shrink:0; object-fit:cover; aspect-ratio:16/9;" ${contentBlurImgAttrs()}>`:''}
      <div style="min-width:0; flex:1;">
        ${nextEp?`<div class="schedule-ep-tag" style="margin-bottom:6px; font-size:13px;">${nextEp.season&&nextEp.number?`S${nextEp.season}E${nextEp.number} — `:''}${esc(nextEp.name||'')}</div>`:''}
        ${airDate?`<div style="color:var(--highlight); font-weight:700; font-size:13px; margin-bottom:10px;">Airs ${esc(airDate)}</div>`:'<div style="color:var(--muted); font-size:13px; margin-bottom:10px;">No upcoming episode scheduled</div>'}
        <p style="color:#c7d5d3; font-size:13.5px; line-height:1.6;">${esc(summary)}</p>
      </div>
    </div>`);
}
function findChannelForNetwork(network){
  if(!network) return null;
  const channels = state.lib.channels||[];
  const n = network.toLowerCase();
  return channels.find(c=>c.name.toLowerCase()===n)
    || channels.find(c=> c.name.toLowerCase().includes(n) || n.includes(c.name.toLowerCase()))
    || null;
}
function scheduleRowHtml(ep){
  const show = ep.show || {};
  const img = (show.image && (show.image.medium||show.image.original)) || '';
  const network = (show.network&&show.network.name) || (show.webChannel&&show.webChannel.name) || '';
  const matched = findChannelForNetwork(network);
  const epLabel = (ep.season && ep.number) ? `S${ep.season}E${ep.number}` : '';
  return `
    <div class="schedule-row">
      <div class="schedule-time">${esc(ep.airtime||'--:--')}</div>
      <div class="schedule-thumb">${img?`<img src="${esc(img)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>`:fallbackHtml(show.name||'?')}</div>
      <div class="schedule-info">
        <div class="schedule-show-title">${esc(show.name||'Untitled')}</div>
        <div class="schedule-ep-title">${epLabel?`<span class="schedule-ep-tag">${esc(epLabel)}</span> `:''}${esc(ep.name||'')}</div>
        <div class="schedule-network">${esc(network||'Unknown network')}</div>
      </div>
      ${matched ? `<button class="btn btn-primary" style="flex-shrink:0;" onclick="playChannel('${matched.id}')">${ICON.play} Watch</button>` : ''}
    </div>`;
}

function starSvg(filled){
  return `<svg viewBox="0 0 24 24" fill="${filled?'currentColor':'none'}" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><polygon points="12 2 14.9 8.6 22 9.3 16.5 14.1 18.2 21 12 17.3 5.8 21 7.5 14.1 2 9.3 9.1 8.6"/></svg>`;

function setMyRating(itemId, rating){
  const item = getItem(itemId);
  if(!item) return;
  item.myRating = (item.myRating===rating) ? 0 : rating; // clicking the current rating again clears it
  saveLib();
  const root = document.getElementById('pageRoot');
  if(root && state.route==='detail') root.innerHTML = renderDetail(state.routeParam);

function toggleFavorite(itemId){
  const item = getItem(itemId);
  if(!item) return;
  item.favorite = !item.favorite;
  if(item.favorite) item.favoritedAt = new Date().toISOString();
  saveLib();
  // Update every on-screen favorite button for this item directly (card + detail action button)
  // instead of forcing a full re-render — keeps grid scroll position and hover state intact.
  document.querySelectorAll(`[data-fav-id="${itemId}"]`).forEach(btn=>{
    btn.classList.toggle('is-fav', !!item.favorite);
    btn.title = item.favorite ? 'Remove from Favorites' : 'Add to Favorites';
    // Card favorite buttons are icon-only; the detail action button also carries a text label
    // (see .btn-icon-label) — only rebuild that span if this particular button has one.
    const hasLabel = btn.querySelector('.btn-icon-label-text');
    btn.innerHTML = heartSvg(!!item.favorite) + (hasLabel ? `<span class="btn-icon-label-text">${item.favorite?'Favorited':'Favorite'}</span>` : '');
  });
  toast(item.favorite ? 'Added to Favorites' : 'Removed from Favorites');
}
function toggleWatchlist(itemId){
  const item = getItem(itemId);
  if(!item) return;
  item.watchlist = !item.watchlist;
  // Mirrors toggleFavorite's favoritedAt — needed so checkWatchlistReminders can measure how long
  // something has sat untouched on the watchlist, not just whether it's currently on it.
  if(item.watchlist) item.watchlistedAt = new Date().toISOString();
  saveLib();
  const root = document.getElementById('pageRoot');
  if(root && state.route==='detail') root.innerHTML = renderDetail(state.routeParam);
  loadTmdbSimilarRow(item);

   concatenating. Shared between the Shows and Movies versions via the mediaType param ('tv' | 'movie').
   Render the shell synchronously (so the back button/header show up immediately) and let
   loadTmdbTopListGrid() fill #tmdbTopListGrid once the fetch resolves. */
function tmdbTopListLabel(mediaType){ return mediaType==='movie' ? 'TMDB Top 100 Movies' : 'TMDB Top 100 Shows'; }
function renderTmdbTopListShell(mediaType){
  const label = tmdbTopListLabel(mediaType);
