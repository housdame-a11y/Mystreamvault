  const bg = item.backdrop || item.poster || '';

  const card = document.createElement('div');
  card.id = 'playerEndCard';
  card.className = 'player-end-card';
  card.innerHTML = `
    ${bg ? `<div class="player-end-card-bg" style="background-image:url('${esc(bg)}')"></div>` : ''}
    <div class="player-end-card-content">
      <span class="player-end-card-eyebrow">${isMovie ? "You've finished watching" : (next ? 'Episode complete' : 'Season complete')}</span>
      <div class="player-end-card-title">${esc(item.title)}</div>
      ${!isMovie && p.subtitle ? `<div class="player-end-card-sub">${esc(p.subtitle)}</div>` : ''}
      <div class="player-end-card-stars" id="playerEndCardStars">${playerEndCardStarsHtml(item)}</div>
      <div class="player-end-card-actions">
        ${!isMovie && next ? `<button class="btn btn-primary" onclick="playNextEpisode()">${ICON.play} Next Episode</button>` : ''}
        <button class="btn btn-ghost" onclick="closePlayer()">Exit</button>
      </div>
    </div>`;
  stage.appendChild(card);
  // Double rAF ensures the initial opacity:0 has actually painted before adding .visible, so the
  // browser always animates the fade-in instead of occasionally skipping straight to it.
  requestAnimationFrame(()=> requestAnimationFrame(()=> card.classList.add('visible')));
}
// ---------- Optional Supabase progress sync ----------
// Purely additive and best-effort: localStorage (saveLib, above) is always the real source of
// truth and this never blocks or throws into the UI. Only mirrors data when both fields are
// filled in under Settings > Cloud Progress Sync — otherwise supabaseConfigured() short-circuits
// every call before any network request is attempted.
function supabaseConfigured(){
  return !!(state.settings.supabaseUrl && state.settings.supabaseKey);
}
async function syncProgressToCloud(item, key){
  if(!supabaseConfigured()) return;
  const entry = (item.progress || {})[key];
  if(!entry) return;
  const m = /^s(\d+)e(\d+)$/.exec(key); // season/episode info for TV shows; null for movies
  try{
    await fetch(`${state.settings.supabaseUrl}/rest/v1/watch_progress`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': state.settings.supabaseKey,
        'Authorization': `Bearer ${state.settings.supabaseKey}`,
        'Prefer': 'resolution=merge-duplicates' // upsert on (item_id, episode_key)
      },
      body: JSON.stringify({
        item_id: item.id,
        episode_key: key,               // 'movie' or 's<season>e<episode>'
        title: item.title,
        type: item.type,                // 'movie' | 'series'
        season: m ? parseInt(m[1], 10) : null,
        episode: m ? parseInt(m[2], 10) : null,
        timestamp: entry.timestamp,     // seconds — same value used in the t= resume param
        duration: entry.duration,
        watched: entry.watched,
        updated_at: new Date().toISOString()
      })
    });
  }catch(e){ /* offline, misconfigured, or blocked by RLS — fail silently, localStorage stands */ }
}
function saveProgress(item, key, timestamp, duration, watched){
  item.progress = item.progress || {};
  const prevWatched = !!(item.progress[key] && item.progress[key].watched);
  item.progress[key] = {timestamp: Math.round(timestamp||0), duration: Math.round(duration||0), watched: !!watched};
  item.lastWatched = new Date().toISOString();
  saveLib();
  // localStorage (above) is always the source of truth and never blocks on this — best-effort,
  // fire-and-forget mirror to Supabase if the user configured it in Settings > Cloud Progress Sync.
  syncProgressToCloud(item, key);
  // Only check on the moment an episode newly becomes watched — not on every 5-10s progress tick —
  // so this can't fire repeatedly while the same episode keeps playing.
  if(watched && !prevWatched) maybeAutoAddNextSeason(item, key);
}
// Wipes the saved watch-progress entry for this exact playback session (movie, or one episode key)
// entirely — not just reset to a zero timestamp. Used by restartPlayer() so a restart genuinely
// forgets where you were, rather than leaving a stale {timestamp:0} entry behind.
function deleteProgress(item, key){
  if(item && item.progress) delete item.progress[key];
  saveLib();
}
// If the episode that just got marked watched was the last untracked one in its season, and TMDB
// metadata is available for this show, silently pull in the next season's episode list (titles,
// thumbnails, overviews, runtimes) so it's ready to track. It can NEVER add playable stream links —
// TMDB doesn't have those — so every auto-added episode starts with an empty source slot and a
// notification is raised asking the user to paste one in.
function isSeasonFullyWatched(item, seasonNum){
  const season = (item.seasons||[]).find(s=>s.number===seasonNum);
  if(!season || !season.episodes || !season.episodes.length) return false;
  const prog = item.progress || {};
  return season.episodes.every(e=>{
    const p = prog['s'+seasonNum+'e'+e.number];
    return p && p.watched;
  });
}
async function fetchTmdbSeasonEpisodes(tmdbId, seasonNumber){
  const key = state.settings.tmdb;
  if(!key) return null;
  try{
    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNumber}?api_key=${encodeURIComponent(key)}`);
    if(!res.ok) return null;
    const json = await res.json();
    if(json.success===false || !Array.isArray(json.episodes) || !json.episodes.length) return null;
    return json.episodes.map(e=>({
      number: e.episode_number,
      title: e.name || `Episode ${e.episode_number}`,
      thumbnail: e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : '',
      overview: e.overview || '',
      runtime: e.runtime || null,
      myRating: 0,
      sources: [{label:'', url:''}]
    }));
  }catch(e){ return null; }
}
async function maybeAutoAddNextSeason(item, key){
  if(item.type!=='series') return;
  const m = /^s(\d+)e(\d+)$/.exec(key);
  if(!m) return;
  const seasonNum = parseInt(m[1],10);
  if(!isSeasonFullyWatched(item, seasonNum)) return;
  const nextNum = seasonNum + 1;
  if((item.seasons||[]).some(s=>s.number===nextNum)) return; // already tracked — nothing to add
  if(!item.tmdbId || !state.settings.tmdb) return; // can't look anything up without both of these
  const episodes = await fetchTmdbSeasonEpisodes(item.tmdbId, nextNum);
  if(!episodes) return; // no next season on TMDB (show's finished) or the lookup failed — stay quiet
  item.seasons = item.seasons || [];
  item.seasons.push({number: nextNum, episodes});
  item.seasons.sort((a,b)=>a.number-b.number);
  saveLib();
  addNeedsLinkNotification(item, nextNum);
  if(state.route==='detail' && state.routeParam===item.id){
    document.getElementById('pageRoot').innerHTML = renderDetail(item.id);
  }
  toast(`Season ${nextNum} of "${item.title}" added — add a stream link to watch it`);
}
function tryNextSource(){
  const p = state.player;
  p.sourceIdx = (p.sourceIdx+1) % p.sources.length;
  cleanupPlayerTimers();
  renderPlayer();
}
function cleanupPlayerTimers(){
  if(state.player){
    clearInterval(state.player._interval);
    clearInterval(state.player._watchTimer);
    clearInterval(state.player._blurInterval);
    state.player.playbackState = 'stopped';
    if(state.player._hls){ try{ state.player._hls.destroy(); }catch(e){} state.player._hls = null; }
  }
  clearTimeout(controlsHideTimer);
  clearTimeout(centerSkipHideTimer);
  if(subtitleTrackUrl){ URL.revokeObjectURL(subtitleTrackUrl); subtitleTrackUrl = null; }
  subtitleResults = [];
}
let controlsHideTimer = null;
function scheduleHideControls(){
  clearTimeout(controlsHideTimer);
  const overlay = document.getElementById('playerOverlay');
  if(overlay) overlay.classList.remove('controls-hidden');
  controlsHideTimer = setTimeout(()=>{
    const ov = document.getElementById('playerOverlay');
    if(ov && ov.classList.contains('open')) ov.classList.add('controls-hidden');
  }, 3200);
}
document.addEventListener('mousemove', e=>{
  const overlay = document.getElementById('playerOverlay');
  if(overlay && overlay.classList.contains('open')) scheduleHideControls();
});
document.addEventListener('touchstart', e=>{
  const overlay = document.getElementById('playerOverlay');
  if(overlay && overlay.classList.contains('open')) scheduleHideControls();
});
function closePlayer(){
  // Last-chance save: the watch timer only ticks every 10s, so up to ~10s of progress could
  // otherwise be lost if the user closes mid-tick. p._elapsedSeconds is always current (or the
  // last saved position if fake-paused), so this makes closing behave exactly like a real pause.
  const p = state.player;
  if(p && !p.isLive){
    const item = getItem(p.itemId);
    if(item) saveProgress(item, p.key, p._elapsedSeconds || 0, p._totalSeconds || 0, false);
  }
  cleanupPlayerTimers();
  // togglePlayerFullscreen() puts the whole #playerOverlay into fullscreen, not just the video —
  // if Close is pressed while still fullscreen, the browser keeps that (now-empty) element in
  // fullscreen unless we explicitly back out of it here, which is what made Close appear to do
  // nothing: the overlay's own 'open' class/content were gone, but the screen stayed fullscreen
  // and blank until the user hit Esc themselves.
  if(document.fullscreenElement) document.exitFullscreen?.().catch(()=>{});
  document.getElementById('playerOverlay').classList.remove('open','controls-hidden','center-skip-visible','controls-locked');
  setTimeout(()=>{ document.getElementById('playerOverlay').innerHTML=''; }, 260);
  state.player = null;
  router();
}

/* =========================================================
   SUBTITLES (SubDL) — searches api.subdl.com, then loads the subtitle one of two ways:
     - Direct video sources (kind 'video'/'hls'): a real <track> on the built-in <video> element
       (id="playerVideoEl") — the browser renders and times it natively, frame-accurate.
     - Iframe embeds (VidSrc, YouTube, etc.): we don't control that player, so there's no track to
       attach it to. Instead the SRT is parsed into cues and drawn as a floating overlay (see
       .player-subtitle-overlay, z-index 4 — above the transparent click shield at z-index 2, so it's
       always visible over the embed) that's kept in sync with p._elapsedSeconds, the same real-time
       clock startIframeWatchTimer() already drives the progress bar with. It's an approximation —
       we have no way to read the iframe's actual play head — but it tracks the same clock the
       resume/seek/progress-bar system already relies on, so it drifts no more than that does.
========================================================= */
const SUBTITLE_LANGS = [
  {code:'EN',label:'English'},{code:'ES',label:'Spanish'},{code:'FR',label:'French'},
  {code:'DE',label:'German'},{code:'IT',label:'Italian'},{code:'PT',label:'Portuguese'},
  {code:'AR',label:'Arabic'},{code:'RU',label:'Russian'},{code:'TR',label:'Turkish'},
  {code:'HI',label:'Hindi'},{code:'JA',label:'Japanese'},{code:'KO',label:'Korean'},
  {code:'ZH',label:'Chinese'},{code:'NL',label:'Dutch'},{code:'PL',label:'Polish'},
];
let subtitleResults = [];
let subtitleTrackUrl = null; // current blob: URL backing the active <track> (video/hls path), revoked on replace/close

/* ---- Per-source sync memory ----
   The overlay path (iframe embeds) has no real play-head to read, so all of its drift comes from
   one systematic thing: how long the embed actually takes to start playing (buffering, an ad,
   sometimes a click-to-play screen) after we mount/seek it and start our own clock. That startup
   lag is a property of the *source* (this vidsrc mirror, this direct link, etc.) more than of any
   one episode, so once a user dials in an offset for a given item+source, we remember it and
   auto-apply it next time — next episode, next session, after a resume — instead of making them
   re-nudge from zero every single time. Keyed by item + embed host so different sources for the
   same title (which can have very different startup behavior) keep their own calibration. */
const SUBTITLE_SYNC_MEMORY_KEY = 'sv_subtitle_sync_v1';
function loadSubtitleSyncMemory(){
  try{ return JSON.parse(localStorage.getItem(SUBTITLE_SYNC_MEMORY_KEY)) || {}; }catch(e){ return {}; }
}
function subtitleSyncMemoryKey(itemId, p){
  let host = 'direct';
  try{ host = new URL(p._embedBaseUrl || (p.sources && p.sources[p.sourceIdx] && p.sources[p.sourceIdx].url) || '').hostname || 'direct'; }catch(e){}
  return `${itemId||'x'}::${host}`;
}
function getPersistedSubtitleOffset(itemId, p){
  const mem = loadSubtitleSyncMemory();
  const key = subtitleSyncMemoryKey(itemId, p);
  return typeof mem[key]==='number' ? mem[key] : 0;
}
function persistSubtitleOffset(itemId, p, offset){
  const mem = loadSubtitleSyncMemory();
  const key = subtitleSyncMemoryKey(itemId, p);
  if(offset){ mem[key] = offset; } else { delete mem[key]; } // 0 = back to file's own timing, nothing worth remembering
  try{ localStorage.setItem(SUBTITLE_SYNC_MEMORY_KEY, JSON.stringify(mem)); }catch(e){}
}

function toggleSubtitlePanel(){
  const p = state.player;
  if(!p) return;
  if(p.isLive){
    toast("Live channels don't have a fixed timeline for subtitles to sync to.");
    return;
  }
  const panel = document.getElementById('subtitlePanel');
  if(!panel) return;
  const opening = !panel.classList.contains('open');
  if(opening) closeBrightnessPanel(); // only one popover open at a time
  panel.classList.toggle('open');
  if(opening && !panel.dataset.primed){
    panel.dataset.primed = '1';
    const item = getItem(p.itemId);
    document.getElementById('subtitleQuery').value = item ? item.title : '';
    const hintEl = document.getElementById('subtitlePanelSyncHint');
    if(hintEl) hintEl.style.display = (p._embedKind==='iframe') ? 'block' : 'none';
    if(!(state.settings.subdl||'').trim()){
      document.getElementById('subtitleResults').innerHTML = `<div class="field-hint">Add a free SubDL API key in Settings → Subtitles to search.</div>`;
    }
  }
  if(opening) updateSubtitleSyncUI();
}
function closeSubtitlePanel(){
  const panel = document.getElementById('subtitlePanel');
  if(panel) panel.classList.remove('open');
}

/* =========================================================
   PLAYER BRIGHTNESS
   ---------------------------------------------------------
   A purely cosmetic CSS filter on #playerMediaWrap (never the iframe itself — see the CSS comment
   on .player-media-wrap) — vaplayer.ru is cross-origin, so there is no way to touch the actual
   video's brightness, only how it LOOKS from our side of the iframe boundary. Because the filter
   lives on the wrapper rather than the iframe/video element, every restart/resume/seek — which
   destroy and recreate the iframe/video, never the wrapper — leaves the current brightness in
   place automatically; nothing here ever needs to know those rebuilds are happening, and nothing
   about a brightness change ever triggers one.
========================================================= */
let brightnessHideTimer = null;
function toggleBrightnessPanel(){
  const panel = document.getElementById('brightnessPanel');
  if(!panel) return;
  const opening = !panel.classList.contains('open');
  if(!opening){ closeBrightnessPanel(); return; }
  closeSubtitlePanel(); // only one popover open at a time
  panel.classList.add('open');
  const btn = document.getElementById('playerBrightnessBtn');
  if(btn) btn.classList.add('is-active');
  syncBrightnessUI(state.settings.playerBrightness);
  scheduleBrightnessPanelHide();
}
function closeBrightnessPanel(){
  const panel = document.getElementById('brightnessPanel');
  if(panel) panel.classList.remove('open');
  const btn = document.getElementById('playerBrightnessBtn');
  if(btn) btn.classList.remove('is-active');
  clearTimeout(brightnessHideTimer);
}
// Resets the "hide a few seconds after the user stops interacting" timer — called on open and on
// every slider interaction, so the panel only ever closes once input genuinely stops.
function scheduleBrightnessPanelHide(){
  clearTimeout(brightnessHideTimer);
  brightnessHideTimer = setTimeout(closeBrightnessPanel, 2500);
}
// Pushes a brightness value (0.5–1.5) to the slider position + percentage label without touching
// the wrap's filter — used when opening the panel to reflect whatever's already applied.
function syncBrightnessUI(value){
  const pct = Math.round(Math.min(150, Math.max(50, value*100)));
  const slider = document.getElementById('brightnessSlider');
  const label = document.getElementById('brightnessValueLabel');
  if(slider) slider.value = pct;
  if(label) label.textContent = pct+'%';
}
// Applies a brightness percentage (50–150) to the live filter + UI immediately — used on every
// slider 'input' tick, i.e. potentially many times a second while dragging, so it deliberately does
// NOT touch localStorage; onBrightnessSliderChange (below) is what persists the final value.
function applyPlayerBrightnessLive(percentValue){
  const pct = Math.min(150, Math.max(50, Math.round(Number(percentValue)||100)));
  const value = pct/100;
  const wrap = document.getElementById('playerMediaWrap');
  if(wrap) wrap.style.filter = `brightness(${value})`;
  const label = document.getElementById('brightnessValueLabel');
  if(label) label.textContent = pct+'%';
  return value;
}
function onBrightnessSliderInput(e){
  applyPlayerBrightnessLive(e.target.value);
  scheduleBrightnessPanelHide();
}
// Fires on release (or a keyboard nudge) — this is the only place a brightness change is actually
// saved, so dragging doesn't hammer localStorage on every intermediate tick.
function onBrightnessSliderChange(e){
  state.settings.playerBrightness = applyPlayerBrightnessLive(e.target.value);
  saveSettings();
  scheduleBrightnessPanelHide();
}

async function searchSubtitles(){
  const resultsEl = document.getElementById('subtitleResults');
  const apiKey = (state.settings.subdl||'').trim();
  if(!apiKey){
    resultsEl.innerHTML = `<div class="field-hint">Add a free SubDL API key in Settings → Subtitles to search.</div>`;
    return;
  }
  const query = (document.getElementById('subtitleQuery').value||'').trim();
  if(!query){ toast('Enter a title to search'); return; }
  const lang = document.getElementById('subtitleLang').value;
  const p = state.player;
  const item = getItem(p.itemId);
  const params = new URLSearchParams({api_key: apiKey, film_name: query, unpack:'1'});
  if(lang) params.set('languages', lang);
  if(item){
    params.set('type', item.type==='series' ? 'tv' : 'movie');
    if(item.type==='series' && p.seasonNum!=null){
      params.set('season_number', String(p.seasonNum));
      params.set('episode_number', String(p.epNum));
    }
  }
  resultsEl.innerHTML = `<div style="text-align:center; padding:20px 0;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  try{
    const res = await fetch(`https://api.subdl.com/api/v1/subtitles?${params.toString()}`);
    const data = await res.json();
    if(!data.status) throw new Error(data.error || 'Search failed');
    subtitleResults = flattenSubtitleResults(data);
    renderSubtitleResults();
  }catch(e){
    resultsEl.innerHTML = `<div class="field-hint">Couldn't reach SubDL (${esc(e.message||'network error')}). Double-check your API key in Settings, or try again in a moment.</div>`;
  }
}

// SubDL wraps most matches in a season/movie "pack" — with unpack=1, full_season packs also come
// with unpack_files: one entry per actual episode file, which is what we want to list/download
// directly. Non-packed results (most single-movie subtitles) don't have that and stay a plain zip.
function flattenSubtitleResults(data){
  const out = [];
  (data.subtitles||[]).forEach(s=>{
    if(s.unpack_files && s.unpack_files.length){
      s.unpack_files.forEach(f=>{
        out.push({label: f.release_name || f.name, lang: f.language||'', format: f.format||'srt', hi: f.hi, url: f.url});
      });
    } else {
      out.push({label: s.release_name || s.name, lang: s.language||'', format:'zip', url: s.url});
    }
  });
  return out;
}

function renderSubtitleResults(){
  const el = document.getElementById('subtitleResults');
  if(!subtitleResults.length){
    el.innerHTML = `<div class="field-hint">No subtitles found. Try a different title, or clear the language filter.</div>`;
    return;
  }
  el.innerHTML = subtitleResults.map((r,i)=>`
    <div class="subtitle-result-row">
      <div style="min-width:0;">
        <div class="subtitle-result-name">${esc(r.label)}</div>
        <div class="subtitle-result-meta">${esc((r.lang||'').toUpperCase())} · ${esc(r.format.toUpperCase())}${r.hi?' · HI':''}</div>
      </div>
      <button class="btn btn-ghost" style="flex-shrink:0;" onclick="useSubtitleResult(${i})">Use</button>
    </div>
  `).join('');
}

async function useSubtitleResult(i){
  const r = subtitleResults[i];
  const p = state.player;
  if(!r || !p) return;
  toast('Downloading subtitle…');
  try{
    const fullUrl = r.url.startsWith('http') ? r.url : `https://dl.subdl.com${r.url}`;
    const res = await fetch(fullUrl);
    if(!res.ok) throw new Error('download failed ('+res.status+')');
    const buf = await res.arrayBuffer();
    const head = new Uint8Array(buf.slice(0,2));
    const isZip = (head[0]===0x50 && head[1]===0x4B) || r.format==='zip'; // 'PK' magic bytes
    let srtText;
    if(isZip){
      await loadJSZip();
      const zip = await window.JSZip.loadAsync(buf);
      const srtFile = Object.values(zip.files).find(f=>!f.dir && /\.srt$/i.test(f.name));
      if(!srtFile) throw new Error('no .srt file found in the downloaded pack');
      srtText = await srtFile.async('text');
    } else {
      srtText = new TextDecoder('utf-8').decode(buf);
    }
    // Cues are kept in state (not just baked into a <track> once) so the sync controls can re-time
    // them on the fly, on either path — regenerate the VTT track for video/hls, or just re-check
    // the offset against p._elapsedSeconds for the iframe overlay.
    p.subtitleCues = parseSrtCues(srtText);
    const remembered = getPersistedSubtitleOffset(p.itemId, p);
    p.subtitleOffset = remembered;
    p.subtitleLabel = r.label;
    p.subtitleLangCode = r.lang;
    applyCurrentSubtitleOffset();
    updateSubtitleSyncUI();
    toast(remembered ? `Subtitles loaded — applied your saved ${formatSubtitleOffset(remembered)} sync for this source` : 'Subtitles loaded');
    closeSubtitlePanel();
  }catch(e){
    toast('Subtitle error: '+(e.message||'could not load file'));
  }
}

// Parses raw SRT text into [{start, end, text}] (seconds, plain text with cue-position tags
// stripped). Used as the single source of truth for both delivery paths below, so the sync
// controls only ever need to touch one number (p.subtitleOffset) to re-time either of them.
function parseSrtCues(srt){
  const text = (srt||'').replace(/\r+/g,'').replace(/^\uFEFF/,'').trim();
  const toSeconds = (h,m,s,ms)=> (+h)*3600 + (+m)*60 + (+s) + (+ms)/1000;
  const cues = [];
  text.split(/\n\n+/).forEach(block=>{
    const lines = block.split('\n').filter(l=>l.trim()!=='');
    const timeLine = lines.find(l=>/\d{2}:\d{2}:\d{2}[,.]\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}[,.]\d{3}/.test(l));
    if(!timeLine) return;
    const m = timeLine.match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
    if(!m) return;
    const start = toSeconds(m[1],m[2],m[3],m[4]);
    const end = toSeconds(m[5],m[6],m[7],m[8]);
    const textLines = lines.slice(lines.indexOf(timeLine)+1);
    const cueText = textLines.join('\n').replace(/<[^>]+>/g,'').trim(); // strip any <i>/<font> tags
    if(cueText) cues.push({start, end, text: cueText});
  });
  return cues;
}

// Called from updatePlayerProgressUI() on every watch-timer tick, seek, and mount — same clock the
// progress bar uses — so the overlay stays synced to whatever state.player already considers "now".
function updateSubtitleOverlay(elapsed){
  const el = document.getElementById('playerSubtitleOverlay');
  const p = state.player;
  if(!el || !p || !p.subtitleCues) return;
  const offset = p.subtitleOffset || 0;
  const cue = p.subtitleCues.find(c=>elapsed>=c.start+offset && elapsed<=c.end+offset);
  el.innerHTML = cue ? cue.text.split('\n').map(line=>`<span>${esc(line)}</span>`).join('') : '';
}

/* ---- Sync (timing offset) ----
   Shifts every cue by a running p.subtitleOffset (seconds, +later / -earlier), adjustable in
   0.25s/1s steps from the panel. Re-applied on every change rather than mutated once, so Reset
   can always get back to the original file exactly. */
function adjustSubtitleOffset(delta){
  const p = state.player;
  if(!p || !p.subtitleCues) return;
  p.subtitleOffset = Math.round(((p.subtitleOffset||0) + delta) * 100) / 100;
  applyCurrentSubtitleOffset();
  updateSubtitleSyncUI();
  persistSubtitleOffset(p.itemId, p, p.subtitleOffset);
}
function resetSubtitleOffset(){
  const p = state.player;
  if(!p || !p.subtitleCues) return;
  p.subtitleOffset = 0;
  applyCurrentSubtitleOffset();
  updateSubtitleSyncUI();
  persistSubtitleOffset(p.itemId, p, 0);
  toast('Sync reset');
}
function applyCurrentSubtitleOffset(){
  const p = state.player;
  if(!p || !p.subtitleCues) return;
  const video = document.getElementById('playerVideoEl');
  if((p._embedKind==='video' || p._embedKind==='hls') && video){
    mountSubtitleTrack(video, p.subtitleCues, p.subtitleOffset||0, p.subtitleLabel, p.subtitleLangCode);
  } else {
    updateSubtitleOverlay(p._elapsedSeconds || 0);
  }
}
function updateSubtitleSyncUI(){
  const p = state.player;
  const row = document.getElementById('subtitleSyncRow');
  const val = document.getElementById('subtitleOffsetValue');
  if(!row) return;
  if(!p || !p.subtitleCues){ row.style.display = 'none'; return; }
  row.style.display = 'block';
  if(val) val.textContent = formatSubtitleOffset(p.subtitleOffset||0);
}
function formatSubtitleOffset(off){
  const sign = off > 0 ? '+' : (off < 0 ? '−' : '');
  return sign + Math.abs(off).toFixed(2).replace(/0$/,'').replace(/\.$/,'.0') + 's';
}

let jszipLoadPromise = null;
function loadJSZip(){
  if(window.JSZip) return Promise.resolve();
  if(jszipLoadPromise) return jszipLoadPromise;
  jszipLoadPromise = new Promise((resolve,reject)=>{
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
    s.onload = resolve;
    s.onerror = ()=>{ jszipLoadPromise = null; reject(new Error('failed to load the unzip library')); };
    document.head.appendChild(s);
  });
  return jszipLoadPromise;
}

// mm:ss.mmm / hh:mm:ss.mmm — the timestamp format WebVTT requires.
function formatVttTime(seconds){
  seconds = Math.max(0, seconds);
  const h = Math.floor(seconds/3600);
  const m = Math.floor((seconds%3600)/60);
  const s = Math.floor(seconds%60);
  const ms = Math.round((seconds - Math.floor(seconds))*1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}
// Rebuilds a full WebVTT file from cues + the current offset — cheap enough (a handful of KB of
// text) to regenerate on every sync-button tap rather than trying to patch an existing track.
function cuesToVtt(cues, offset){
  offset = offset || 0;
  let out = 'WEBVTT\n\n';
  cues.forEach(c=>{
    const start = Math.max(0, c.start + offset);
    const end = Math.max(start + 0.05, c.end + offset);
    out += `${formatVttTime(start)} --> ${formatVttTime(end)}\n${c.text}\n\n`;
  });
  return out;
}
function mountSubtitleTrack(video, cues, offset, label, lang){
  const blob = new Blob([cuesToVtt(cues, offset)], {type:'text/vtt'});
  if(subtitleTrackUrl) URL.revokeObjectURL(subtitleTrackUrl);
  subtitleTrackUrl = URL.createObjectURL(blob);
  Array.from(video.querySelectorAll('track')).forEach(t=>t.remove());
  const track = document.createElement('track');
  track.kind = 'subtitles';
  track.label = label || lang || 'Subtitle';
  track.srclang = (lang||'en').toLowerCase().slice(0,2) || 'en';
  track.src = subtitleTrackUrl;
  track.default = true;
  video.appendChild(track);
  // Some browsers need a tick after the track mounts before textTracks[] reflects it.
  setTimeout(()=>{ if(video.textTracks && video.textTracks[0]) video.textTracks[0].mode = 'showing'; }, 50);
}

function turnOffSubtitles(){
  const p = state.player;
  const video = document.getElementById('playerVideoEl');
  if(video) Array.from(video.querySelectorAll('track')).forEach(t=>t.remove());
  if(subtitleTrackUrl){ URL.revokeObjectURL(subtitleTrackUrl); subtitleTrackUrl = null; }
  if(p){ p.subtitleCues = null; p.subtitleOffset = 0; }
  updateSubtitleSyncUI();
  const overlayEl = document.getElementById('playerSubtitleOverlay');
  if(overlayEl) overlayEl.innerHTML = '';
  toast('Subtitles off');
}

/* =========================================================
   PLAYBACK MANAGER
   ---------------------------------------------------------
   vaplayer.ru (and virtually every VidSrc-family mirror) exposes no JS control API — there is no
   way to actually pause it from the parent page. This module fakes the experience instead:

     Pause  → save position, fully unload the iframe (kills network/audio/ads dead), show a
              Netflix-style cover (backdrop + "Resume at mm:ss" + a big Resume button).
     Resume → rebuild the exact same embed URL with ?resumeAt=<seconds> appended (the same
              resume-seek mechanism already used the first time the player opens, see
              buildResumeEmbedUrl) and mount a fresh iframe.

   Nothing here touches iframe internals — the iframe is only ever created or destroyed, never
   reached into. All state lives on state.player, so it survives sequential pause/resume cycles.
========================================================= */

// Waits for a freshly-mounted third-party iframe embed to actually be ready before the caller
// hides the Stream Vault loading overlay — this is what stops the user from ever glimpsing the
// embed's OWN loading spinner underneath ours (the bug this function exists to fix).
//
// vaplayer.ru (and the rest of the VidSrc-family mirrors) exposes no documented JS control API —
// see the banner above — so there's no guaranteed "ready"/"playing" postMessage we can wait for.
// This still listens for one: some mirrors chatter over postMessage anyway (analytics, ad events,
// occasional player-state pings) even without a documented API, and a message genuinely sourced
// from the iframe's own window is a strong sign it has finished booting past its own spinner, so
// it resolves immediately. But because that signal is opportunistic rather than guaranteed, the
// iframe's 'load' event is always the hard minimum required — and since 'load' alone is what
// caused the original flash (it fires the instant the embed's outer document loads, well before
// its player has actually cleared its own spinner), 'load' is followed by a short grace window to
// give the embed's JS time to get video on screen before we clear ours. A generous last-resort
// timer covers the rare case where 'load' never fires at all cross-origin — a true safety net,
// not a race against 'load', so it never hides the overlay ahead of a normal load.
//
// onReady fires exactly once, however readiness ends up being determined.
function waitForPlayerReady(iframe, onReady){
  let done = false;
  let graceTimer = null;
  const finish = ()=>{
    if(done) return;
    done = true;
    window.removeEventListener('message', onMessage);
    iframe.removeEventListener('load', onLoad);
    clearTimeout(graceTimer);
    clearTimeout(safetyTimer);
    onReady();
  };
  const onMessage = (e)=>{ if(e.source === iframe.contentWindow) finish(); };
  const onLoad = ()=>{ clearTimeout(graceTimer); graceTimer = setTimeout(finish, 700); };
  window.addEventListener('message', onMessage);
  iframe.addEventListener('load', onLoad, {once:true});
  const safetyTimer = setTimeout(finish, 8000);
}
// Remove any previously-appended resume param from an embed URL, so repeated pause/resume/seek
// cycles rebuild cleanly from the original link instead of stacking params on top of each other.
// Strips both resumeAt= (current param) and the legacy t= (kept in case an older saved source URL
// somehow already has one baked in) so neither can linger or double up.
function stripResumeParam(url){
  try{
    const u = new URL(url);
    u.searchParams.delete('resumeAt');
    u.searchParams.delete('t');
    return u.toString();
  }catch(e){
    // Fallback for a malformed/relative URL the URL() constructor can't parse.
    return url
      .replace(/([?&])resumeAt=\d+&?/i, (m, sep) => sep==='?' ? '?' : '')
      .replace(/([?&])t=\d+&?/i, (m, sep) => sep==='?' ? '?' : '')
      .replace(/[?&]$/, '');
  }
}
// Build (or rebuild) an embed src with a resume timestamp baked in via the resumeAt= param that
// vaplayer.ru actually honours on every load — including a reload of a session that's already in
// progress, which the t= param (used by some other VidSrc-family mirrors) does NOT reliably do on
// this mirror; t= only takes effect on a genuinely first-ever load of a session. Shared by the
// initial player open (renderPlayer), every fake-resume, and every seek, so a title always resumes
// the same way no matter which triggered it.
//
// Restarting from the beginning is a hard, explicit case — deliberately NOT "send resumeAt=0" —
// because 0 is a falsy value, and mirrors in this family appear to treat an explicit resumeAt=0
// the same as receiving no instruction at all, which can fall back to the mirror's OWN idea of
// where you left off rather than actually restarting. The only reliable way to force a true
// restart is to omit the parameter entirely so there's nothing for the mirror to (mis)interpret.
const SEEK_TO_START_THRESHOLD_SECONDS = 5; // also absorbs drag imprecision landing at e.g. 0.3s
function buildResumeEmbedUrl(baseUrl, seconds){
  const clean = stripResumeParam(baseUrl);
  const secs = Math.floor(seconds || 0);
  if(secs <= SEEK_TO_START_THRESHOLD_SECONDS){
    return clean; // no resumeAt param at all — base URL only, a genuine restart from frame 0
  }
  try{
    const u = new URL(clean);
    u.searchParams.set('resumeAt', String(secs));
    return u.toString();
  }catch(e){
    const sep = clean.includes('?') ? '&' : '?';
    return `${clean}${sep}resumeAt=${secs}`;
  }
}
// Builds a restart embed src from the ORIGINAL base embed URL (never from a resumeAt-bearing one) —
// used by restartPlayer() for both the Restart button and a progress-bar seek to 0. Every other
// param the source URL carries (controls, overlay, showTitle, primaryColor, etc.) is left untouched:
// this only ever strips resumeAt/t/startAt, forces autoplay=1, and appends a fresh cb= cache-buster
// so the mirror can't silently reuse/resume a session it has cached under the old URL.
function buildRestartEmbedUrl(baseUrl){
  const stripped = stripResumeParam(baseUrl); // drops resumeAt= and legacy t=
  try{
    const u = new URL(stripped);
    u.searchParams.delete('startAt'); // never let a leftover startAt survive a restart
    u.searchParams.set('autoplay', '1');
    u.searchParams.set('cb', String(Date.now()));
    return u.toString();
  }catch(e){
    // Fallback for a malformed/relative URL the URL() constructor can't parse.
    let out = stripped
      .replace(/([?&])startAt=[^&]*&?/i, (m, sep) => sep==='?' ? '?' : '')
      .replace(/[?&]$/, '');
    if(!/[?&]autoplay=1(&|$)/i.test(out)){
      out += `${out.includes('?') ? '&' : '?'}autoplay=1`;
    }
    out += `${out.includes('?') ? '&' : '?'}cb=${Date.now()}`;
    return out;
  }
}
// mm:ss, or h:mm:ss past the first hour — matches the "Resume at 30:42" style from the spec.
function formatResumeTime(seconds){
  seconds = Math.max(0, Math.floor(seconds || 0));
  const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
  const mm = h ? String(m).padStart(2,'0') : String(m);
  const ss = String(s).padStart(2,'0');
  return h ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
}
// (Re)starts the elapsed-time tracker for an iframe embed. Factored out of renderPlayer so
// fakeResumePlayer() can restart it with identical behavior after rebuilding the iframe — a
// pause/resume cycle looks, to this timer, exactly like the player having just opened.
// This is the ONLY place p._watchTimer is ever created — every caller (initial mount, resume,
// each tick's own reschedule) routes through here, and it always clears any prior interval on
// the same player object first, so there is never more than one of these running at once.
// playbackState is the explicit state machine the rest of the Playback Manager checks against:
// 'loading' (set by every destroy/rebuild site below) freezes the clock, 'playing' is set here
// the instant the timer actually starts, 'paused'/'stopped' are set by fakePausePlayer and the
// watched-completion branch below respectively.
function startIframeWatchTimer(item, p, next){
  clearInterval(p._watchTimer);
  const totalSeconds = p._totalSeconds || getPlaybackDurationSeconds(item, p.seasonNum, p.epNum);
  p._totalSeconds = totalSeconds;
  next = next !== undefined ? next : getNextEpisode(item, p.seasonNum, p.epNum);
  let lastTick = Date.now();
  let sinceSave = 0;
  p.playbackState = 'playing';
  updatePlayerProgressUI(); // paint the bottom-bar progress track immediately, don't wait for the first tick
  // Ticks every 1s (was 10s) so the new progress bar advances smoothly like a real scrubber, but
  // still only writes to localStorage roughly every ~10s via sinceSave — the faster tick is purely
  // a UI-refresh change, save/watched-detection cadence is unchanged from before.
  p._watchTimer = setInterval(()=>{
    // Only ever accrue time (and therefore move the bar / save progress) while the state machine
    // says we're actually playing. fakePaused is kept as a second, redundant check on purpose —
    // belt-and-braces in case some future path flips one flag but not the other.
    if(p.fakePaused || p.playbackState !== 'playing') return;
    const now = Date.now();
    const delta = (now - lastTick) / 1000;
    lastTick = now;
    if(!document.hidden) p._elapsedSeconds = Math.min((p._elapsedSeconds||0) + delta, totalSeconds);
    updatePlayerProgressUI();
    sinceSave += delta;
    if(sinceSave < 10) return;
    sinceSave = 0;
    const watched = totalSeconds>0 && p._elapsedSeconds >= totalSeconds*getWatchedThreshold(p.seasonNum);
    saveProgress(item, p.key, p._elapsedSeconds, totalSeconds, watched);
    if(watched){ p.playbackState = 'stopped'; clearInterval(p._watchTimer); showPlaybackEndCard(item, next); }
  }, 1000);
}
// Syncs the bottom-bar progress fill/handle/time-labels to p._elapsedSeconds / p._totalSeconds.
// Called every watch-timer tick, right after mount/resume, and immediately on a seek so the bar
// never visibly lags behind whatever state.player actually holds.
function updatePlayerProgressUI(){
  const p = state.player;
  if(!p) return;
  const total = p._totalSeconds || 0;
  const elapsed = Math.max(p._elapsedSeconds || 0, 0);
  const pct = total > 0 ? Math.min(100, (elapsed/total)*100) : 0;
  const fill = document.getElementById('playerProgressFill');
  const handle = document.getElementById('playerProgressHandle');
  const curEl = document.getElementById('playerTimeCurrent');
  const totEl = document.getElementById('playerTimeTotal');
  const track = document.getElementById('playerProgressTrack');
  if(fill) fill.style.width = pct+'%';
  if(handle) handle.style.left = pct+'%';
  if(curEl) curEl.textContent = formatResumeTime(elapsed);
  if(totEl) totEl.textContent = formatResumeTime(total);
  if(track) track.setAttribute('aria-valuenow', String(Math.round(pct)));
  if(p.subtitleCues) updateSubtitleOverlay(elapsed);
}
// Wires up click-to-seek and drag-to-scrub on the bottom-bar progress track. Dragging only updates
// the visual fill/handle/current-time label (a preview) — the actual seek (fade out → destroy
// iframe → recreate with resumeAt= → fade in) only fires once, on release, via performPlayerSeek.
function initPlayerProgressBar(){
  const track = document.getElementById('playerProgressTrack');
  if(!track || track._seekBound) return; // avoid double-binding if this ever runs twice on the same node
  track._seekBound = true;

  const pctFromEvent = (e)=>{
    const rect = track.getBoundingClientRect();
    const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
    if(rect.width <= 0) return 0;
    return Math.min(Math.max((clientX - rect.left) / rect.width, 0), 1);
  };
  const previewAt = (pct)=>{
    const p = state.player;
    if(!p) return;
    const total = p._totalSeconds || 0;
    const fill = document.getElementById('playerProgressFill');
    const handle = document.getElementById('playerProgressHandle');
    const curEl = document.getElementById('playerTimeCurrent');
    if(fill) fill.style.width = (pct*100)+'%';
    if(handle) handle.style.left = (pct*100)+'%';
    if(curEl) curEl.textContent = formatResumeTime(total*pct);
  };
  let dragPct = null;
  const onMove = (e)=>{
    if(dragPct===null) return;
    dragPct = pctFromEvent(e);
    previewAt(dragPct);
  };
  const onUp = (e)=>{
    window.removeEventListener('pointermove', onMove);
    if(dragPct===null) return;
    const pct = pctFromEvent(e);
    dragPct = null;
    track.classList.remove('dragging');
    seekPlayerToPercent(pct);
  };
  track.addEventListener('pointerdown', e=>{
    const p = state.player;
    // Never start a drag on top of a rebuild that's already in flight — matches the same
    // p._playbackBusy guard that Pause/Resume/±20 already respect.
    if(!p || p.isLive || p._playbackBusy) return;
    e.preventDefault();
    dragPct = pctFromEvent(e);
    track.classList.add('dragging');
    previewAt(dragPct);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp, {once:true});
  });
  track.addEventListener('keydown', e=>{
    const p = state.player;
    if(!p || p.isLive || p._playbackBusy) return;
    if(e.key==='ArrowLeft'){ e.preventDefault(); seekPlayer(-5); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); seekPlayer(5); }
    else if(e.key==='Home'){ e.preventDefault(); performPlayerSeek(0); }
    else if(e.key==='End'){ e.preventDefault(); performPlayerSeek(p._totalSeconds||0); }
  });
}
// Toggles the disabled/dimmed look on Play-Pause + both skip buttons while a rebuild (pause,
// resume, or seek) is in flight. Paired with p._playbackBusy — see the guard at the top of each
// of the three functions below — this is what actually stops rapid clicks from starting a second
// iframe rebuild on top of one that's already running.
function setPlaybackControlsBusy(busy){
  ['playerPlayBtn','playerSkipBackBtn','playerSkipForwardBtn','playerProgressTrack','playerRestartBtn'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.classList.toggle('is-busy', busy);
  });
}
// PAUSE: save position, fade the iframe out, unload it, fade in the paused cover.
function fakePausePlayer(){
  const p = state.player;
  if(!p || p.fakePaused || p.isLive || p._playbackBusy) return;
  const iframe = document.getElementById('playerIframeEl');
  if(!iframe) return; // nothing to fake-pause (video/hls sources use real pause, handled earlier)
  const item = getItem(p.itemId);
  if(!item) return;

  p._playbackBusy = true;
  setPlaybackControlsBusy(true);
  clearInterval(p._watchTimer); // stop accruing "watched" time the instant Pause is pressed
  p.fakePaused = true;
  p.playbackState = 'paused';
  saveProgress(item, p.key, p._elapsedSeconds || 0, p._totalSeconds || 0, false); // save immediately —
  // covers a refresh happening while paused, since nothing else will save again until Resume.

  iframe.classList.add('player-fade-out');
  setTimeout(()=>{
    // isConnected guard: closePlayer()/tryNextSource() etc. may have already torn the whole
    // overlay down during this 380ms fade — don't touch a detached node or resurrect a cover.
    if(!iframe.isConnected || !state.player || !state.player.fakePaused){ p._playbackBusy = false; setPlaybackControlsBusy(false); return; }
    iframe.remove(); // fully unload — stops network requests, audio, and any embed-page ads dead
    renderPauseCover(item, p._elapsedSeconds || 0, p._totalSeconds || 0);
    p._playbackBusy = false;
    setPlaybackControlsBusy(false);
  }, 380);
  setPlayerPlayIcon(false);
}
// Builds and fades in the Netflix-style paused cover: blurred backdrop + Resume button + progress.
function renderPauseCover(item, elapsedSeconds, totalSeconds){
  const stage = document.getElementById('playerStage');
  if(!stage) return;
  const pct = totalSeconds > 0 ? Math.min(100, Math.round((elapsedSeconds/totalSeconds)*100)) : 0;
  const bg = item.backdrop || item.poster || '';
  const p = state.player;
  const sub = p && p.subtitle ? `<div class="player-pause-sub">${esc(p.subtitle)}</div>` : ''; // season/episode line
  const cover = document.createElement('div');
  cover.id = 'playerPauseCover';
  cover.className = 'player-pause-cover';
  cover.title = 'Resume';
  cover.innerHTML = `
    ${bg ? `<div class="player-pause-cover-bg" style="background-image:url('${esc(bg)}')"></div>` : ''}
    <div class="player-pause-cover-content">
      <button class="player-pause-resume-btn" type="button" aria-label="Resume">${ICON.play}</button>
      <div class="player-pause-title">${esc(item.title)}</div>
      ${sub}
      <div class="player-pause-resume-label">Resume at ${formatResumeTime(elapsedSeconds)}</div>
      <div class="player-pause-progress"><div style="width:${pct}%"></div></div>
    </div>`;
  cover.addEventListener('click', fakeResumePlayer); // click anywhere on the cover, not just the button
  stage.appendChild(cover);
  // Double rAF ensures the initial opacity:0 has actually painted before adding .visible,
  // so the browser always animates the transition instead of occasionally skipping straight to it.
  requestAnimationFrame(()=> requestAnimationFrame(()=> cover.classList.add('visible')));
}
// RESUME: fade the cover out, remove it, mount a freshly-seeked iframe in its place.
function fakeResumePlayer(){
  const p = state.player;
  if(!p || !p.fakePaused || p._playbackBusy) return;
  const item = getItem(p.itemId);
  if(!item) return;
  p._playbackBusy = true;
  setPlaybackControlsBusy(true);
  p.fakePaused = false;
  p.playbackState = 'loading'; // clock stays frozen through the fade + iframe rebuild; startIframeWatchTimer
  // (called from mountResumedIframe's clearLoading, once the fresh iframe actually loads) flips it back
  const finish = ()=>{ p._playbackBusy = false; setPlaybackControlsBusy(false); };
  // Bring the loading overlay back up now, before the pause cover is even destroyed — see the
  // matching comment in restartPlayer().
  const loadingElNow = document.getElementById('playerLoading');
  const loadingLabelElNow = document.getElementById('playerLoadingLabel');
  if(loadingLabelElNow) loadingLabelElNow.textContent = 'Loading stream…';
  if(loadingElNow) loadingElNow.classList.remove('done');
  const cover = document.getElementById('playerPauseCover');
  if(cover){
    cover.classList.remove('visible');
    setTimeout(()=>{
      if(cover.isConnected) cover.remove();
      if(state.player) mountResumedIframe(item, state.player, finish);
      else finish();
    }, 380);
  } else {
    mountResumedIframe(item, p, finish);
  }
  setPlayerPlayIcon(true);
}
// SEEK (±20s, or any delta): the seek-relative sibling of Pause/Resume above — same fade-out /
// unload / rebuild-with-t= mechanics, just computing a new timestamp instead of reusing the saved
// one, and always leaving playback in the "playing" state afterward regardless of where it started.
// Works whether the player is currently playing (fades an iframe out) or fake-paused (fades the
// paused cover out instead) — either way it ends in the same place: a fresh iframe seeked to the
// new time. Guarded by the same p._playbackBusy lock as fakePausePlayer/fakeResumePlayer, so a
// seek can never overlap a pause/resume/another seek that's already mid-rebuild.
// SEEK core: fade out whatever's currently showing (iframe or paused cover), destroy it, and
// rebuild at an absolute target time via renderPlayer() (which bakes resumeAt=<seconds> into the
// fresh iframe src). Shared by seekPlayer(±20s / arrow keys) and seekPlayerToPercent (progress-bar
// click/drag) — everything after "what's the target time" is identical either way.
function performPlayerSeek(newTime){
  const p = state.player;
  if(!p || p.isLive || p._playbackBusy) return; // live channels have no meaningful "position" to seek
  const item = getItem(p.itemId);
  if(!item || !p._embedBaseUrl) return; // not a trackable iframe embed — video/hls seek natively instead

  const iframe = document.getElementById('playerIframeEl');
  const cover = document.getElementById('playerPauseCover');
  if(!iframe && !cover) return; // stage not in a state we can seek from (e.g. mid-teardown)

  // Clamp into [0, duration] when duration is known; otherwise just floor at 0.
  const totalSeconds = p._totalSeconds || 0;
  const target = totalSeconds > 0
    ? Math.min(Math.max(0, newTime), totalSeconds)
    : Math.max(0, newTime);

  // Seeking all the way back to 0 IS a restart — whether it came from dragging/clicking the
  // progress bar to 0%, the Home key, or a -20s skip near the very start. Route through the exact
  // same restartPlayer() implementation the Restart button uses rather than duplicating any of its
  // steps here, so "restart" behaves identically no matter which control triggered it.
  if(target <= 0){ restartPlayer(); return; }

  p._playbackBusy = true;
  setPlaybackControlsBusy(true);

  clearInterval(p._watchTimer);
  p.playbackState = 'loading'; // freeze the instant we commit to tearing the iframe down — nothing
  // restarts the clock (see startIframeWatchTimer) until the rebuilt iframe actually finishes loading
  p._elapsedSeconds = target;
  p.fakePaused = false; // a seek always resumes playback, even if the title was paused when pressed
  // Persist the new position immediately — Resume Playback and Watch Progress (continue-watching
  // rows, "watched" checkmarks, etc.) all read straight from item.progress, so this keeps them in
  // sync the instant the seek happens rather than waiting for the next timer tick.
  const watched = totalSeconds > 0 && target >= totalSeconds * getWatchedThreshold(p.seasonNum);
  saveProgress(item, p.key, target, totalSeconds, watched);
  updatePlayerProgressUI(); // snap the bar to the landed position right away, don't wait for the reload

  const seekingLabel = `Seeking to ${formatResumeTime(target)}…`;
  // Bring the loading overlay back up now, before the old iframe/cover is even destroyed — see the
  // matching comment in restartPlayer().
  const loadingElNow = document.getElementById('playerLoading');
  const loadingLabelElNow = document.getElementById('playerLoadingLabel');
  if(loadingLabelElNow) loadingLabelElNow.textContent = seekingLabel;
  if(loadingElNow) loadingElNow.classList.remove('done');

  const rebuild = ()=>{
    if(!state.player) return;
    // Root cause (confirmed): vaplayer.ru does not resume playback via t=, it uses resumeAt= —
    // buildResumeEmbedUrl now generates that param, so any reload (fresh open, resume, or seek)
    // lands at the right position. Seeks go through a full renderPlayer() re-render rather than
    // the lighter mountResumedIframe swap simply because that's what was in place when the real
    // fix landed; safe to leave as-is since it's already proven to work correctly end-to-end.
    renderPlayer();
    const labelEl = document.getElementById('playerLoadingLabel');
    if(labelEl) labelEl.textContent = seekingLabel;
  };

  if(iframe){
    iframe.classList.add('player-fade-out');
    setTimeout(()=>{
      if(iframe.isConnected) iframe.remove();
      rebuild();
    }, 380);
  } else {
    cover.classList.remove('visible');
    setTimeout(()=>{
      if(cover.isConnected) cover.remove();
      rebuild();
    }, 380);
  }
  setPlayerPlayIcon(true);
}
// ±20s (or any relative delta) — used by the skip buttons and the progress track's arrow-key handler.
function seekPlayer(deltaSeconds){
  const p = state.player;
  if(!p) return;
  performPlayerSeek((p._elapsedSeconds||0) + deltaSeconds);
}
// Absolute seek from a 0–1 fraction of total duration — used by the progress-bar click/drag handler.
function seekPlayerToPercent(pct){
  const p = state.player;
  if(!p) return;
  const total = p._totalSeconds || 0;
  performPlayerSeek(total * Math.min(Math.max(pct, 0), 1));
}
// RESTART: the one and only "start over from frame zero" implementation. Shared by the Restart
// button AND by performPlayerSeek (whenever a seek — progress-bar drag/click, Home key, or a skip
// that lands at/before 0 — resolves to target 0), so restarting behaves identically no matter which
// control triggered it. Steps, in order:
//   1. stop the playback timer
//   2. reset the elapsed position to 0
//   3. delete (not just zero out) the saved watch progress for this session
//   4. fully remove the existing iframe from the DOM
//   5. mount a brand-new iframe on the same base embed URL, forced to autoplay=1, with no
//      resumeAt/startAt, every other param preserved, plus a fresh cb= cache-buster
//   6. once that iframe loads, restart the watch timer from 0:00 and leave the progress bar at 0
function restartPlayer(){
  const p = state.player;
  if(!p || p.isLive || p._playbackBusy) return; // live channels have no "position" to restart
  const item = getItem(p.itemId);
  if(!item || !p._embedBaseUrl) return; // not a trackable iframe embed — nothing to rebuild

  const iframe = document.getElementById('playerIframeEl');
  const cover = document.getElementById('playerPauseCover');
  if(!iframe && !cover) return; // stage not in a state we can restart from (e.g. mid-teardown)

  p._playbackBusy = true;
  setPlaybackControlsBusy(true);

  // 1. Stop the playback timer.
  clearInterval(p._watchTimer);
  p.playbackState = 'loading'; // frozen until the fresh iframe actually finishes loading, below
  // 2. Reset the current playback position to 0.
  p._elapsedSeconds = 0;
  p.fakePaused = false;
  // 3. Clear/delete the saved watch progress for the current playback session.
  deleteProgress(item, p.key);
  updatePlayerProgressUI(); // snap the bar back to 0 immediately, don't wait for the reload

  // Bring the loading overlay back up now, before the old iframe is even destroyed — the stage
  // background is solid #000 either way, but this guarantees the overlay (and not a bare black
  // stage) is what's on top for the whole teardown+rebuild, matching every other player action.
  const loadingElNow = document.getElementById('playerLoading');
  const loadingLabelElNow = document.getElementById('playerLoadingLabel');
  if(loadingLabelElNow) loadingLabelElNow.textContent = 'Restarting…';
  if(loadingElNow) loadingElNow.classList.remove('done');

  const rebuild = ()=>{
    if(!state.player) return;
    mountRestartedIframe(item, state.player, ()=>{ p._playbackBusy = false; setPlaybackControlsBusy(false); });
    const labelEl = document.getElementById('playerLoadingLabel');
    if(labelEl) labelEl.textContent = 'Restarting…';
  };

  // 4. Completely remove the existing iframe (or paused cover) from the DOM.
  if(iframe){
    iframe.classList.add('player-fade-out');
    setTimeout(()=>{
      if(iframe.isConnected) iframe.remove();
      rebuild();
    }, 380);
  } else {
    cover.classList.remove('visible');
    setTimeout(()=>{
      if(cover.isConnected) cover.remove();
      rebuild();
    }, 380);
  }
  setPlayerPlayIcon(true);
}
// Creates a brand-new iframe at buildRestartEmbedUrl(p._embedBaseUrl) — autoplay=1 forced, no
// resumeAt/startAt, every other param preserved, plus a fresh cb= cache-buster — fades it in, and
// restarts the watch timer from 0:00 once it loads. The restarted session then behaves identically
// to a fresh open. onMounted (optional) fires once the iframe has been created and inserted — used
// to clear the busy-lock in restartPlayer without waiting on the cross-origin 'load' event, which is
// unreliable in timing (and sometimes never fires at all) for third-party embeds.
function mountRestartedIframe(item, p, onMounted){
  const stage = document.getElementById('playerStage');
  // Mount inside the persistent brightness wrapper (see .player-media-wrap / PLAYER BRIGHTNESS),
  // not the bare stage — that's what lets the current brightness filter just keep applying to
  // whatever iframe happens to be inside it, with no extra wiring needed here at all.
  const mediaWrap = document.getElementById('playerMediaWrap') || stage;
  if(!stage || !p._embedBaseUrl){ if(onMounted) onMounted(); return; }
  const src = buildRestartEmbedUrl(p._embedBaseUrl);
  console.debug('[StreamVault] iframe src ->', src); // verify: autoplay=1 present, no resumeAt/startAt, cb= present
  const sandbox = state.settings.blockPopupAds ? 'allow-scripts allow-same-origin allow-forms allow-presentation' : '';

  const iframe = document.createElement('iframe');
  iframe.id = 'playerIframeEl';
  iframe.className = 'player-fade-out'; // start invisible; fade to visible once inserted
  iframe.src = src;
  iframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
  iframe.allowFullscreen = true;
  iframe.loading = 'eager';
  if(sandbox) iframe.setAttribute('sandbox', sandbox);

  // Reuse the existing loading spinner (solid #000 background) so there's no white flash while
  // the third-party page behind the iframe boots back up — same treatment as the very first open.
  const loadingEl = document.getElementById('playerLoading');
  const loadingLabelEl = document.getElementById('playerLoadingLabel');
  if(loadingLabelEl) loadingLabelEl.textContent = 'Restarting…';
  if(loadingEl) loadingEl.classList.remove('done');
  mediaWrap.appendChild(iframe);

  requestAnimationFrame(()=> iframe.classList.remove('player-fade-out'));
  let timerStarted = false;
  const clearLoading = ()=>{
    if(loadingEl) loadingEl.classList.add('done');
    if(loadingLabelEl) loadingLabelEl.textContent = 'Loading stream…'; // reset for next time
    // Iframe has finished loading — restart the playback timer from 0:00 (p._elapsedSeconds is
    // already 0, set by restartPlayer before this ever mounted).
    if(!timerStarted){ timerStarted = true; startIframeWatchTimer(item, p); }
  };
  waitForPlayerReady(iframe, clearLoading);

  applyPlayerClickShield(); // permanent shield — re-assert it in front of the freshly mounted iframe
  if(onMounted) onMounted();
}
// Creates a brand-new iframe from the saved base embed URL + current elapsed time, fades it in,
// and restarts the watch timer — the resumed/seeked session then behaves identically to a fresh
// open. onMounted (optional) fires once the iframe has been created and inserted — used to clear
// the busy-lock in fakeResumePlayer without waiting on the cross-origin 'load' event, which is
// unreliable in timing (and sometimes never fires at all) for third-party embeds.
// Used by fakeResumePlayer; seekPlayer goes through renderPlayer() instead (see its comment).
function mountResumedIframe(item, p, onMounted, loadingLabel){
  const stage = document.getElementById('playerStage');
  // See the matching comment in mountRestartedIframe — mount inside the persistent brightness
  // wrapper, not the bare stage.
  const mediaWrap = document.getElementById('playerMediaWrap') || stage;
  if(!stage || !p._embedBaseUrl){ if(onMounted) onMounted(); return; }
  const src = buildResumeEmbedUrl(p._embedBaseUrl, p._elapsedSeconds);
  console.debug('[StreamVault] iframe src ->', src); // same verification hook as the initial-mount path
  const sandbox = state.settings.blockPopupAds ? 'allow-scripts allow-same-origin allow-forms allow-presentation' : '';

  const iframe = document.createElement('iframe');
  iframe.id = 'playerIframeEl';
  iframe.className = 'player-fade-out'; // start invisible; fade to visible once inserted
  iframe.src = src;
  iframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
  iframe.allowFullscreen = true;
  iframe.loading = 'eager';
  if(sandbox) iframe.setAttribute('sandbox', sandbox);

  // Reuse the existing loading spinner (solid #000 background) so there's no white flash while
  // the third-party page behind the iframe boots up — same treatment as the very first open.
  const loadingEl = document.getElementById('playerLoading');
  const loadingLabelEl = document.getElementById('playerLoadingLabel');
  if(loadingLabelEl) loadingLabelEl.textContent = loadingLabel || 'Loading stream…';
  if(loadingEl) loadingEl.classList.remove('done');
  mediaWrap.appendChild(iframe);

  requestAnimationFrame(()=> iframe.classList.remove('player-fade-out'));
  let timerStarted = false;
  const clearLoading = ()=>{
    if(loadingEl) loadingEl.classList.add('done');
    if(loadingLabelEl) loadingLabelEl.textContent = 'Loading stream…'; // reset for next time
    if(!timerStarted){ timerStarted = true; startIframeWatchTimer(item, p); }
  };
  waitForPlayerReady(iframe, clearLoading);

  applyPlayerClickShield(); // permanent shield — re-assert it in front of the freshly mounted iframe
  if(onMounted) onMounted();
}

/* =========================================================
   GLOBAL KEYS
========================================================= */
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(document.getElementById('shortcutsOverlay').classList.contains('open')){ closeShortcutsOverlay(); return; }
    if(document.getElementById('playerOverlay').classList.contains('open')) closePlayer();
    else if(document.getElementById('modalOverlay').classList.contains('open')) closeModal();
    return;
  }
  // '?' — keyboard shortcuts cheat sheet. Works from anywhere (browsing or mid-playback), except
  // while actually typing in a field, where a literal '?' character should just be typed normally.
  if(e.key==='?'){
    const focusedTag = (document.activeElement && document.activeElement.tagName) || '';
    if(focusedTag==='INPUT' || focusedTag==='TEXTAREA' || focusedTag==='SELECT') return;
    e.preventDefault();
    toggleShortcutsOverlay();
    return;
  }
  const playerOpen = document.getElementById('playerOverlay').classList.contains('open');
  if(!playerOpen) return;
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
  const vid = document.getElementById('playerVideoEl');
  scheduleHideControls();
  if(e.key==='f' || e.key==='F'){ e.preventDefault(); togglePlayerFullscreen(); return; }
  if(e.key==='h' || e.key==='H'){ e.preventDefault(); togglePlayerHide(); return; }
  // Quick subtitle nudge — deliberately available for iframe embeds too (that's the path that
  // actually drifts), so a user can correct sync mid-scene without pausing to hunt through the
  // subtitle panel. '[' / ']' = 1/6s (a natural single "tap" adjustment), Shift+ = a full 1s jump.
  if((e.key==='[' || e.key===']') && state.player && state.player.subtitleCues){
    e.preventDefault();
    const step = e.shiftKey ? 1 : (1/6);
    adjustSubtitleOffset(e.key===']' ? step : -step);
    return;
  }
  // Space / Left / Right work for BOTH direct <video> sources and third-party iframe embeds — the
  // iframe branch routes through togglePlayerPlayPause()/seekPlayer(), the exact same fake-pause/
  // seek machinery the on-screen buttons already use (see PLAYBACK MANAGER). 'M' (mute) stays
  // direct-video-only below: there's no way for a parent page to mute audio inside a cross-origin
  // iframe at all, so it's left off entirely for embeds rather than silently doing nothing.
  if(e.key===' ' || e.code==='Space'){ e.preventDefault(); togglePlayerPlayPause(); return; }
  if(e.key==='ArrowRight'){
    e.preventDefault();
    if(vid) vid.currentTime = Math.min(vid.duration||Infinity, vid.currentTime+10);
    else if(state.player && state.player._embedBaseUrl && !state.player.isLive) seekPlayer(10);
    return;
  }
  if(e.key==='ArrowLeft'){
    e.preventDefault();
    if(vid) vid.currentTime = Math.max(0, vid.currentTime-10);
    else if(state.player && state.player._embedBaseUrl && !state.player.isLive) seekPlayer(-10);
    return;
  }
  if(vid && (e.key==='m' || e.key==='M')){ e.preventDefault(); vid.muted = !vid.muted; }
});

/* =========================================================
   INIT
========================================================= */
router.__manual__ = function(){};

/* =========================================================
   ANDROID TV MODE
   Activated by: ?tv=1 in the URL, OR localStorage flag,
   OR auto-detected (large screen + no fine pointer = TV/projector)
========================================================= */
function isTvMode(){
  // Auto-detect only: large screen + coarse pointer (remote/gamepad) or no hover capability
  const coarse = window.matchMedia('(pointer: coarse)').matches;
  const wide = window.innerWidth >= 1280;
  const noHover = window.matchMedia('(hover: none)').matches;
  return wide && (coarse || noHover);
}

// Make all interactive elements reachable via D-pad (tabindex=0)
function makeFocusable(){
  if(!document.body.classList.contains('tv-mode')) return;
  // Cards, episode cards, channel cards, nav items, buttons, links
  document.querySelectorAll('.card, .episode-card, .channel-card, .collection-card, .watchlist-row, .schedule-row, .nav-item').forEach(el=>{
    if(!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
  });
}

// Re-run makeFocusable whenever the page re-renders
const _origRouter = router;
window.addEventListener('hashchange', ()=> setTimeout(makeFocusable, 120));
// Patch router to always re-apply after render
const _patchedRouter = router;

// D-pad / keyboard navigation in TV mode
document.addEventListener('keydown', e=>{
  if(!document.body.classList.contains('tv-mode')) return;

  // Back button (Escape or AndroidTV back = Escape in WebView)
  if(e.key === 'Escape' || e.key === 'GoBack'){
    if(document.getElementById('playerOverlay').classList.contains('open')){ closePlayer(); return; }
    if(document.getElementById('modalOverlay').classList.contains('open')){ closeModal(); return; }
    if(state.route !== 'home'){ history.back(); return; }
  }

  // Play button on remote — quick play focused card
  if(e.key === 'MediaPlayPause' || e.key === 'Play'){
    const focused = document.activeElement;
    if(focused && focused.classList.contains('card')){
      const id = focused.getAttribute('onclick')||'';
      const m = id.match(/detail\/([^']+)/);
      if(m) quickPlay(m[1]);
    }
    return;
  }

  // Enter/OK on focused card or nav item
  if(e.key === 'Enter'){
    const focused = document.activeElement;
    if(focused && (focused.classList.contains('card') || focused.classList.contains('nav-item') || focused.classList.contains('episode-card') || focused.classList.contains('channel-card') || focused.classList.contains('collection-card') || focused.classList.contains('watchlist-row') || focused.classList.contains('schedule-row'))){
      e.preventDefault();
      focused.click();
      return;
    }
  }

  // Arrow key spatial navigation between focusable elements
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    const player = document.getElementById('playerOverlay');
    if(player && player.classList.contains('open')) return; // let player handle arrows

    const focusable = Array.from(document.querySelectorAll(
      '.card, .episode-card, .channel-card, .collection-card, .watchlist-row, .schedule-row, .nav-item, .btn, .btn-icon, input, select, textarea, [tabindex="0"]'
    )).filter(el=>{
      const r = el.getBoundingClientRect();
      return r.width > 0 && r.height > 0 && !el.closest('.player-overlay');
    });

    const current = document.activeElement;
    if(!focusable.length) return;

    if(!focusable.includes(current)){
      // Nothing focused yet — focus the first card or nav item
      const first = focusable.find(el=>el.classList.contains('nav-item') || el.classList.contains('card'));
      if(first){ e.preventDefault(); first.focus(); }
      return;
    }

    const cr = current.getBoundingClientRect();
    const cx = cr.left + cr.width/2;
    const cy = cr.top + cr.height/2;

    // Find the best candidate in the pressed direction
    let best = null, bestScore = Infinity;
    for(const el of focusable){
      if(el === current) continue;
      const r = el.getBoundingClientRect();
      const ex = r.left + r.width/2;
      const ey = r.top + r.height/2;
      const dx = ex - cx, dy = ey - cy;

      let inDir = false;
      if(e.key==='ArrowRight' && dx > 10) inDir = true;
      if(e.key==='ArrowLeft'  && dx < -10) inDir = true;
      if(e.key==='ArrowDown'  && dy > 10) inDir = true;
      if(e.key==='ArrowUp'    && dy < -10) inDir = true;
      if(!inDir) continue;

      // Score: prioritise alignment on the perpendicular axis, then distance
      const perpendicular = (e.key==='ArrowLeft'||e.key==='ArrowRight') ? Math.abs(dy) : Math.abs(dx);
      const distance = Math.sqrt(dx*dx + dy*dy);
      const score = perpendicular * 2 + distance;
      if(score < bestScore){ bestScore = score; best = el; }
    }

    if(best){
      e.preventDefault();
      best.focus();
      best.scrollIntoView({block:'nearest', inline:'nearest', behavior:'smooth'});
    }
  }
}, true);

// Init TV mode on load — fully automatic, no user action needed
if(isTvMode()){
  document.body.classList.add('tv-mode');
}
setTimeout(makeFocusable, 200);
window.addEventListener('hashchange', ()=> setTimeout(makeFocusable, 200));

router();
</script>
