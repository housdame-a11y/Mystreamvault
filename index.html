// hit a temporal-dead-zone ReferenceError on every fresh page load (this function always runs before
// that later `const` was initialized), got swallowed by loadSettings()'s catch(e), and silently reset
// ALL settings — including saved OMDb/TMDB/SubDL API keys — back to blank defaults on every reload.
const SUBTITLE_SIZE_PX = {small:15, medium:19, large:24, xlarge:30};

function loadLib(){
  try{
    const raw = localStorage.getItem(LIB_KEY);
    if(!raw) return {items:[], collections:[], channels:[], notifications:[]};
    const d = JSON.parse(raw);
    if(!d.items) d.items = [];
    if(!d.collections) d.collections = [];
    if(!d.channels) d.channels = [];
    if(!d.notifications) d.notifications = [];
    return d;
  }catch(e){ return {items:[], collections:[], channels:[], notifications:[]}; }
}
function saveLib(){ localStorage.setItem(LIB_KEY, JSON.stringify(state.lib)); }
function loadSettings(){
  try{
    const s = JSON.parse(localStorage.getItem(SET_KEY)) || {};
    if(!s.omdb) s.omdb = '';
    if(!s.tmdb) s.tmdb = '';
    if(!s.subdl) s.subdl = '';
    if(!s.vidsrcDomain) s.vidsrcDomain = 'vidsrc-embed.su';
    // Streaming Providers (see DYNAMIC STREAMING PROVIDER section, near VIDSRC_DOMAINS below) — an
    // ORDERED list of bare domains. No full streaming URL is ever saved; movie/episode embed URLs
    // are built from each domain + the title's IMDb ID fresh on every playback request. The first
    // domain becomes "Source 1" on every title, the second "Source 2", and so on. Transparently
    // migrates the older single-domain `streamingProvider` field from earlier versions.
    if(!Array.isArray(s.streamingProviders)) s.streamingProviders = s.streamingProvider ? [s.streamingProvider] : [];
    delete s.streamingProvider;
    if(typeof s.blockPopupAds !== 'boolean') s.blockPopupAds = false;
    if(typeof s.contentBlur !== 'boolean') s.contentBlur = false;
    if(!s.contentBlurLevel) s.contentBlurLevel = 'moderate';
    if(!s.contentBlurModelUrl) s.contentBlurModelUrl = '';
    if(!s.scheduleCountry) s.scheduleCountry = 'US';
    if(!Array.isArray(s.recentSearches)) s.recentSearches = [];
    // Optional cloud mirror for watch progress (see PLAYBACK MANAGER > syncProgressToCloud).
    // Left blank by default — everything works purely from localStorage until these are filled in.
    if(!s.supabaseUrl) s.supabaseUrl = '';
    if(!s.supabaseKey) s.supabaseKey = '';
    // Player brightness (CSS filter on the stage, see PLAYER BRIGHTNESS section) — persisted so the
    // user's preferred level carries over to the next title, not just the rest of this session.
    if(typeof s.playerBrightness !== 'number' || isNaN(s.playerBrightness)) s.playerBrightness = 1;
    s.playerBrightness = Math.min(1.5, Math.max(0.5, s.playerBrightness));
    // Subtitle display customization (see SETTINGS > Subtitle Display and the ::cue / overlay CSS
    // vars it drives) — how big, what color, and how opaque the subtitle background is, for both
    // the SubDL overlay (embedded sources) and native <track> cues (direct video/hls sources).
    if(!SUBTITLE_SIZE_PX[s.subtitleSize]) s.subtitleSize = 'medium';
    if(!/^#[0-9a-fA-F]{6}$/.test(s.subtitleColor||'')) s.subtitleColor = '#ffffff';
    if(!/^#[0-9a-fA-F]{6}$/.test(s.subtitleBgColor||'')) s.subtitleBgColor = '#000000';
    if(typeof s.subtitleBgOpacity !== 'number' || isNaN(s.subtitleBgOpacity)) s.subtitleBgOpacity = 72;
    s.subtitleBgOpacity = Math.min(100, Math.max(0, s.subtitleBgOpacity));
    // Titles removed from the TMDB Top 100 Shows/Movies collections (see COLLECTIONS section below) —
    // kept per media type so the grid can filter them out and backfill from later pages automatically.
    if(!s.tmdbTop100Excluded || typeof s.tmdbTop100Excluded !== 'object') s.tmdbTop100Excluded = {};
    if(!Array.isArray(s.tmdbTop100Excluded.movie)) s.tmdbTop100Excluded.movie = [];
    if(!Array.isArray(s.tmdbTop100Excluded.tv)) s.tmdbTop100Excluded.tv = [];
    // Whether the Home/Movies/TV "Featured Release" card lets its artwork bleed slightly above the
    // card's top edge (see the ARTWORK NOTE in the .featured-* CSS block). Defaults on; off falls
    // back to a clean, fully-contained card if the bleed effect looks awkward for a given title.
    if(typeof s.featuredArtworkBleed !== 'boolean') s.featuredArtworkBleed = true;
    return s;
  }catch(e){ return {omdb:'',tmdb:'',subdl:'',vidsrcDomain:'vidsrc-embed.su', streamingProviders:[], blockPopupAds:false, contentBlur:false, contentBlurLevel:'moderate', contentBlurModelUrl:'', scheduleCountry:'US', recentSearches:[], supabaseUrl:'', supabaseKey:'', playerBrightness:1, subtitleSize:'medium', subtitleColor:'#ffffff', subtitleBgColor:'#000000', subtitleBgOpacity:72, tmdbTop100Excluded:{movie:[],tv:[]}, featuredArtworkBleed:true}; }
}

function uuid(){

function esc(s){ return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
// opts.undoLabel/opts.onUndo are optional — every existing toast(msg) call elsewhere in the app
// keeps working unchanged. When present, the toast holds a real button (pointer-events re-enabled
// just for this toast via .has-action) and stays up longer than a plain confirmation, since it now
// needs to survive an actual read-and-decide instead of just a glance.
let toastUndoHandler = null;
function toast(msg, opts){
  opts = opts || {};
  const t = document.getElementById('toast');
  if(!t) return;
  toastUndoHandler = opts.onUndo || null;
  t.innerHTML = opts.undoLabel
    ? `<span class="toast-msg"></span><button type="button" class="toast-undo-btn" onclick="runToastUndo()">${esc(opts.undoLabel)}</button>`
    : '';
  if(opts.undoLabel){ t.querySelector('.toast-msg').textContent = msg; } else { t.textContent = msg; }
  t.classList.toggle('has-action', !!opts.undoLabel);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{ t.classList.remove('show'); toastUndoHandler = null; }, opts.undoLabel ? 5000 : 2400);
}
// Bound to the toast's own Undo button (see toast() above) rather than a closure passed straight
// into onclick, since the button is rendered via innerHTML — a real function reference wouldn't
// survive that round-trip the way an inline string handler does.
function runToastUndo(){
  const t = document.getElementById('toast');
  const handler = toastUndoHandler;
  toastUndoHandler = null;
  clearTimeout(toast._t);
  if(t) t.classList.remove('show');
  if(handler) handler();
}
function getItem(id){ return state.lib.items.find(i=>i.id===id); }

/* ---- Content Blur (Beta) — on-device NSFW classification for images we actually render ourselves ----
   Loads tf.js + nsfwjs from a CDN only when the feature is turned on, and only once. This can only ever
   see pixels our own page has legitimate (CORS-cleared) access to — a plain <img>/<video> we control.
   It cannot and will never be able to see inside a cross-origin third-party <iframe> (VidSrc, live TV
   embeds); that's a hard browser security boundary, not a limitation of this code. */
let contentBlurModel = null;
let contentBlurLoadPromise = null;
function loadScriptOnce(src, timeoutMs){
  timeoutMs = timeoutMs || 12000;
  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    let done = false;
    const timer = setTimeout(()=>{
      if(done) return;
      done = true;
      s.remove();
      reject(new Error('Timed out loading '+src+' (no response within '+(timeoutMs/1000)+'s — likely blocked by a domain/network restriction rather than a slow connection)'));
    }, timeoutMs);
    s.src = src;
    s.onload = ()=>{ if(done) return; done=true; clearTimeout(timer); resolve(); };
    s.onerror = ()=>{ if(done) return; done=true; clearTimeout(timer); reject(new Error('Failed to load '+src)); };
    document.head.appendChild(s);
  });
}
// Tries each CDN in order and only fails if all of them do — different CDNs are different domains/
// infrastructure, so if one is blocked by a WebView's domain whitelist or a network filter, another
// may still get through.
async function loadScriptWithFallback(urls){
  let lastErr = null;
  for(const url of urls){
    try{ await loadScriptOnce(url); return url; }
    catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('All sources failed');
}
async function loadContentBlurModel(){
  if(contentBlurModel) return contentBlurModel;
  if(contentBlurLoadPromise) return contentBlurLoadPromise;
  contentBlurLoadPromise = (async ()=>{
    if(!window.tf){
      try{
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
          'https://unpkg.com/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
        ]);
      }catch(e){ throw new Error('Step 1/3 (TensorFlow.js) failed: '+e.message); }
    }
    if(!window.nsfwjs){
      try{
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/nsfwjs@4.2.1/dist/nsfwjs.min.js',
          'https://unpkg.com/nsfwjs@4.2.1/dist/nsfwjs.min.js',
        ]);
      }catch(e){ throw new Error('Step 2/3 (nsfwjs library) failed: '+e.message); }
    }
    // Model source priority:
    //  1. An explicit URL set in Settings (highest priority — always wins if present).
    //  2. A relative "models/nsfwjs/model.json" next to wherever this page itself is hosted —
    //     works automatically on GitHub Pages (or any host) with zero configuration, since it
    //     resolves relative to this page's own URL rather than needing you to know/paste it.
    //  3. The model bundled inside nsfwjs's own package, as a last resort (no separate network
    //     request needed once the JS above has loaded, since it ships base64-encoded inside
    //     nsfwjs.min.js itself) — but depends on nsfwjs's own CDN-hosted script working at all.
    const explicitUrl = (state.settings.contentBlurModelUrl||'').trim();
    const relativeUrl = new URL('models/nsfwjs/model.json', location.href).href;
    try{
      if(explicitUrl){
        contentBlurModel = await window.nsfwjs.load(explicitUrl);
      } else {
        try{
          const check = await fetch(relativeUrl, {method:'HEAD', cache:'no-store'});
          if(!check.ok) throw new Error('not found at '+relativeUrl);
          contentBlurModel = await window.nsfwjs.load(relativeUrl);
        }catch(relErr){
          contentBlurModel = await window.nsfwjs.load('MobileNetV2');
        }
      }
    }catch(e){ throw new Error('Step 3/3 (model init) failed: '+(e.message||e)); }
    return contentBlurModel;
  })();
  return contentBlurLoadPromise;
}
function contentBlurThreshold(){
  return state.settings.contentBlurLevel==='strict' ? 0.2 : 0.4;
}
// Returns a 0–1 "sensitive" score, or null if the element couldn't be analyzed (e.g. the image/video's
// server doesn't allow cross-origin pixel access — this is common for third-party posters/streams and
// just means we skip that one rather than error out).
async function classifyElementForBlur(el){
  try{
    const model = await loadContentBlurModel();
    const predictions = await model.classify(el);
    return predictions.filter(p=>['Porn','Hentai','Sexy'].includes(p.className)).reduce((sum,p)=>sum+p.probability, 0);
  }catch(e){
    return null;
  }
}
async function classifyAndBlurImage(imgEl){
  if(!state.settings.contentBlur || !imgEl || !imgEl.isConnected) return;
  const score = await classifyElementForBlur(imgEl);
  if(score===null || !imgEl.isConnected) return;
  if(score >= contentBlurThreshold()){
    imgEl.classList.add('content-blurred');
  }
}
function revealBlurredEl(el, ev){

function contentBlurImgAttrs(){

  // The closest() check is a no-op outside the detail page; inside it, it swaps the shimmer skeleton

  return `onload="this.classList.add('loaded'); classifyAndBlurImage(this); const _sk=this.closest('.detail-backdrop,.detail-poster'); if(_sk) _sk.classList.add('bg-loaded');" onclick="if(this.classList.contains('content-blurred')){ revealBlurredEl(this, event); }"`;
}
function startVideoContentBlurWatch(videoEl){
  if(!state.settings.contentBlur || !videoEl) return null;

  canvas.width = 160; canvas.height = 90;

}

// Dominant-color extraction — samples the poster on a tiny offscreen canvas and averages the non-neutral
// pixels, giving a rough "album art glow" color (Spotify/Plex-style) with no API calls involved. Purely
// client-side: draws the already-loading <img> into a canvas and reads pixel data back out.
const posterGlowCache = new Map();
function extractPosterGlowColor(url){
  return new Promise(resolve=>{
    if(!url){ resolve(null); return; }
    if(posterGlowCache.has(url)){ resolve(posterGlowCache.get(url)); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=>{
      try{
        const w = 24, h = 24;
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const data = ctx.getImageData(0, 0, w, h).data;
        let r=0, g=0, b=0, n=0;
        for(let i=0; i<data.length; i+=4){
          if(data[i+3] < 128) continue; // skip transparent pixels
          const rr=data[i], gg=data[i+1], bb=data[i+2];
          const max = Math.max(rr,gg,bb), min = Math.min(rr,gg,bb);
          if(max < 26 || min > 235) continue; // skip near-black/near-white so the glow isn't washed out gray
          r+=rr; g+=gg; b+=bb; n++;
        }
        if(!n){ r=data[0]; g=data[1]; b=data[2]; n=1; } // poster was all neutral tones — fall back to a raw pixel
        const color = `rgb(${Math.round(r/n)}, ${Math.round(g/n)}, ${Math.round(b/n)})`;
        posterGlowCache.set(url, color);
        resolve(color);
      }catch(e){
        // Canvas got tainted — the poster host didn't send CORS headers, so pixel data can't be read.
        // Fail silently; the backdrop just won't get a glow for this title.
        posterGlowCache.set(url, null);
        resolve(null);
      }
    };
    img.onerror = ()=>{ posterGlowCache.set(url, null); resolve(null); };
    img.src = url;
  });
}
// Called (via setTimeout, so it runs after the caller's innerHTML assignment lands) once renderDetail's
// markup is in the DOM. Sets --poster-glow on #pageRoot, which the backdrop, Play button, season-select
// and rating stars' box-shadow/filter declarations all read (with a transparent fallback until resolved).
function applyDetailPosterGlow(item){
  extractPosterGlowColor(item.poster).then(color=>{
    if(!color) return;
    // Bail if the user has already navigated elsewhere while this was resolving.
    if(state.route!=='detail' || state.routeParam!==item.id) return;
    // Set on #pageRoot rather than .detail-backdrop: the backdrop, .detail-actions, .season-select and
    // .my-rating-star are siblings/descendants under pageRoot, not nested inside the backdrop itself,
    // so the custom property needs to live on their common ancestor to cascade to all of them.
    const root = document.getElementById('pageRoot');
    if(root){
      root.style.setProperty('--poster-glow', color);
      root.dataset.glowItemId = item.id; // lets renderDetail() tell "same title, re-render" apart from "new title, navigate"
    }
  });
}
function posterEl(item, cls){
  if(item.poster){
    return `<img src="${esc(item.poster)}" alt="" loading="lazy" ${contentBlurImgAttrs()} onerror="this.parentElement.innerHTML=fallbackHtml('${esc(item.title).replace(/'/g,"&#39;")}')">`;
  }
  return fallbackHtml(item.title);
}
// Landscape counterpart to posterEl — prefers the backdrop (what the show/movie actually looks
// like on screen), falling back to the poster, then the letter tile, so Continue Watching still
// renders something sensible for titles that were only ever given a poster.
function backdropEl(item){
  const src = item.backdrop || item.poster;
  if(src){
    return `<img src="${esc(src)}" alt="" loading="lazy" ${contentBlurImgAttrs()} onerror="this.parentElement.innerHTML=fallbackHtml('${esc(item.title).replace(/'/g,"&#39;")}')">`;
  }
  return fallbackHtml(item.title);
}
function fallbackHtml(title){
  const letter = (title||'?').trim().charAt(0).toUpperCase() || '?';
  return `<div class="poster-fallback">${esc(letter)}</div>`;
}

function itemProgressPct(item){
  if(item.type==='movie') return movieProgressPct(item);
  const prog = item.progress || {};
  let last = null;
  (item.seasons||[]).forEach(s=>{
    (s.episodes||[]).forEach(e=>{
      const key = 's'+s.number+'e'+e.number;
      if(prog[key]) last = prog[key];
    });
  });
  if(!last || !last.duration) return 0;
  return Math.min(100, Math.round((last.timestamp/last.duration)*100));
}
function movieProgressPct(item){
  const p = (item.progress||{}).movie;
  if(!p || !p.duration) return p && p.watched ? 100 : 0;
  return Math.min(100, Math.round((p.timestamp/p.duration)*100));
}
// Pulls a minute value out of strings like "148 min" / "45m" / "1h 30m" — falls back when missing
// or unparsable, since not every title has runtime data (e.g. titles added without OMDb/TMDB fetch).
function parseRuntimeMinutes(runtimeStr, fallback){
  if(!runtimeStr) return fallback;
  const s = String(runtimeStr);
  const hm = s.match(/(\d+)\s*h(?:r)?\s*(\d+)?\s*m?/i);
  if(hm) return parseInt(hm[1],10)*60 + (hm[2]?parseInt(hm[2],10):0);
  const m = s.match(/(\d+)/);
  return m ? parseInt(m[1],10) : fallback;
}
// Total known runtime (in seconds) for a movie or one specific episode, estimated from OMDb/TMDB
// runtime metadata. NOTE: no longer used anywhere in the player — Vaplayer/VidSrc-family iframe
// embeds now get real duration from PLAYER_EVENT's player_duration (see PLAYBACK MANAGER), and
// direct <video>/HLS sources already read the browser's own vid.duration natively. Left in place
// (along with hasKnownRuntime/fetchTmdbRuntimeMinutes/maybeUpgradeRuntimeFromTmdb below) in case
// runtime metadata is needed elsewhere later — currently dead code as far as playback is concerned.
function getPlaybackDurationSeconds(item, seasonNum, epNum){
  if(seasonNum!=null){
    const season = (item.seasons||[]).find(s=>s.number===seasonNum);
    const ep = season && (season.episodes||[]).find(e=>e.number===epNum);
    const movieFallback = parseRuntimeMinutes(item.runtime, null);
    const epRuntime = ep && ep.runtime;
    return parseRuntimeMinutes(epRuntime, movieFallback || 45) * 60;
  }
  return parseRuntimeMinutes(item.runtime, 120) * 60;
}
// True once we have a *real* runtime for whatever's playing (fetched metadata), as opposed to
// getPlaybackDurationSeconds silently falling back to a flat 120min/45min guess.
function hasKnownRuntime(item, seasonNum, epNum){
  if(seasonNum!=null){
    const season = (item.seasons||[]).find(s=>s.number===seasonNum);
    const ep = season && (season.episodes||[]).find(e=>e.number===epNum);
    return !!(ep && ep.runtime) || !!item.runtime;
  }
  return !!item.runtime;
}
// Looks up the real runtime from TMDB for a movie, or one specific episode, resolving item.tmdbId
// by title search first if we don't already have it cached (same lookup fetchTmdbTrailer already
// does for hover previews). Returns whole minutes, or null if it couldn't be found — callers should
// just keep using whatever fallback they already had in that case.
async function fetchTmdbRuntimeMinutes(item, seasonNum, epNum){
  if(!state.settings.tmdb) return null;
  try{
    let tmdbId = item.tmdbId;
    const type = item.type==='series' ? 'tv' : 'movie';
    if(!tmdbId){
      const yearParam = item.year ? (type==='movie' ? `&year=${encodeURIComponent(item.year)}` : `&first_air_date_year=${encodeURIComponent(item.year)}`) : '';
      const searchRes = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(item.title)}${yearParam}`);
      const searchData = await searchRes.json();
      const match = searchData.results && searchData.results[0];
      if(!match) return null;
      tmdbId = match.id;
      item.tmdbId = tmdbId; // cache — benefits trailers/recommendations too, not just this lookup
    }
    if(seasonNum!=null){
      const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNum}/episode/${epNum}?api_key=${encodeURIComponent(state.settings.tmdb)}`);
      const data = await res.json();
      return data.runtime || null;
    } else {
      const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}`);
      const data = await res.json();
      return data.runtime || null;
    }
  }catch(e){
    return null; // silent fail, same spirit as fetchTmdbTrailer — a lookup miss shouldn't break playback
  }
}
// Kicks off the TMDB lookup above only when getPlaybackDurationSeconds is currently relying on the
// flat fallback (no real runtime cached yet). Once it resolves, caches the minutes on the item/episode
// (so this never needs to re-fetch for the same title), then upgrades the *live* player's total
// duration and bottom-bar progress bar from the guess to the real runtime.
function maybeUpgradeRuntimeFromTmdb(item, p){
  if(hasKnownRuntime(item, p.seasonNum, p.epNum)) return;
  fetchTmdbRuntimeMinutes(item, p.seasonNum, p.epNum).then(minutes=>{
    if(!minutes || state.player!==p) return; // no match, or the player moved on while we were fetching
    if(p.seasonNum!=null){
      const season = (item.seasons||[]).find(s=>s.number===p.seasonNum);
      const ep = season && season.episodes.find(e=>e.number===p.epNum);
      if(ep) ep.runtime = `${minutes} min`;
    } else {
      item.runtime = `${minutes} min`;
    }
    saveLib();
    const newTotal = minutes*60;
    p._totalSeconds = newTotal;
    p._elapsedSeconds = Math.min(p._elapsedSeconds||0, newTotal); // re-clamp against the corrected total
    updatePlayerProgressUI();
  });
}
// TV episodes count as watched at 90% (credits tend to run longer relative to a shorter runtime);
// movies at 95%, a bit stricter since their credits are a smaller share of the total length.
// NOTE: only used for direct <video>/HLS sources below, where the browser's own 'ended' event is
// the real end-of-playback trigger anyway and this percentage is just for the "watched" checkmark
// mid-playback. Iframe (Vaplayer/VidSrc-family) embeds use isNearPlaybackEnd instead — see there
// for why a percentage of duration is the wrong shape of threshold for the end screen itself.
function getWatchedThreshold(seasonNum){
  return seasonNum!=null ? 0.90 : 0.95;
}
// How many seconds of REAL remaining playback time (player_duration - player_progress, straight
// from Vaplayer's own PLAYER_EVENT) trigger the end screen for an iframe embed. A percentage of
// duration (the old approach) is the wrong shape here: 90% of a 2-hour movie is ~12 minutes of
// credits/remaining runtime, which is both way too early AND wrong whenever the embed's actual
// video (different cut, extra/missing intro, region variant, etc.) doesn't match TMDB's runtime —
// which is exactly why TMDB runtime must never be compared against real playback position at all.
// A small fixed window of remaining real seconds is accurate regardless of what the true duration
// turns out to be, movie or TV episode alike.
const END_SCREEN_REMAINING_SECONDS = 15;
function isNearPlaybackEnd(elapsedSeconds, totalSeconds){
  return totalSeconds > 0 && (totalSeconds - elapsedSeconds) <= END_SCREEN_REMAINING_SECONDS;
}
function isStarted(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && (p.timestamp>5 || p.watched);
  } else {
    const prog = item.progress||{};
    return Object.values(prog).some(p=>p.timestamp>5 || p.watched);
  }
}
function isFullyWatched(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && p.watched;
  } else {
    const seasons = item.seasons||[];
    const prog = item.progress||{};
    let hasEpisodes = false;
    for(const s of seasons){
      for(const e of (s.episodes||[])){
        hasEpisodes = true;
        const key = 's'+s.number+'e'+e.number;
        if(!prog[key] || !prog[key].watched) return false;
      }
    }
    return hasEpisodes;
  }
}
// A series counts as "ended" once TMDB reports its status as Ended/Canceled (same test the
// detail-page status pill already uses) — i.e. every episode that will ever exist is already
// in the library, so there's no cliffhanger wait for a next season. "Binge Now" surfaces those,
// minus anything already fully watched, since there's nothing left to binge there.
function isEndedSeries(item){
  return item.type==='series' && !!item.tvStatus && /end|cancel/i.test(item.tvStatus);
}
function getBingeNowItems(items){
  return items.filter(i=> isEndedSeries(i) && !isFullyWatched(i))
    .sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));
}
// A show belongs in "New Season Available" once its next unwatched episode sits in a later
// season than anything the viewer has actually watched — that's the real "a new season just
// dropped" moment, distinct from plain Continue Watching (which also fires mid-season on the
// very next episode of the season you're already in). Only applies to shows still airing
// (ended shows can't get new seasons) that the viewer has watched at least some of before —
// a completely untouched show isn't "new", it's just unwatched.
function getNewSeasonItems(items){
  return items.filter(i=>{
    if(i.type!=='series' || isEndedSeries(i) || !isStarted(i)) return false;
    const summary = getWatchProgressSummary(i);
    if(!summary || !summary.next) return false;
    const prog = i.progress || {};
    const watchedSeasons = (i.seasons||[]).flatMap(s=> (s.episodes||[])
      .filter(e=>{ const key='s'+s.number+'e'+e.number; return prog[key] && prog[key].watched; })
      .map(()=>s.number));
    if(!watchedSeasons.length) return false;
    return summary.next.season > Math.max(...watchedSeasons);
  }).sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));
}

const NAV_ITEMS = [
  {id:'movies', label:'Movies', icon:'movie'},
  {id:'series', label:'TV Shows', icon:'tv'},

  {id:'live', label:'Live TV', icon:'antenna'},

function renderShell(){
  const navHtml = NAV_ITEMS.map(n=>`
    <a class="nav-item ${n.id==='home'?'nav-item-home':''} ${state.route===n.id?'active':''}" href="#${n.id}">

  document.getElementById('sidebar').innerHTML = `

  const titles = {home:'Home', movies:'Movies', series:'TV Shows', live:'Live TV', schedule:'TV Schedule', collections:'Collections', settings:'Settings'};
  let topActions = '';
  if(['home','movies','series'].includes(state.route)){
    topActions += `<button class="btn btn-primary btn-icon-only" title="Add Title" onclick="openAddWizard()">${ICON.plus}</button>`;
  } else if(state.route==='live'){
    topActions += `<button class="btn btn-primary btn-icon-only" title="Add Channel" onclick="openChannelModal()">${ICON.plus}</button>`;
  }
  document.getElementById('topbar').innerHTML = `
    <h1>${titles[state.route] || ''}</h1>
    <div class="topbar-actions">
      <div class="topbar-search ${state.globalSearchOpen?'open':''}" id="topbarSearch">
        <button class="topbar-search-icon" title="Search" onclick="event.stopPropagation(); toggleGlobalSearch()">${ICON.search}</button>
        <input id="globalSearchInput" class="global-search-input" dir="ltr" placeholder="Search movies, shows & channels" oninput="onGlobalSearchInput(this.value)" value="${esc(state.globalSearchQuery||'')}">
      </div>
      <button class="btn-icon notif-bell-btn" id="notifBellBtn" title="Notifications" onclick="event.stopPropagation(); toggleNotifications()">
        ${ICON.bell}${unreadNotifCount()>0 ? `<span class="notif-badge">${unreadNotifCount()>9?'9+':unreadNotifCount()}</span>` : ''}
      </button>
      <a class="btn-icon ${state.route==='collections'?'is-active':''}" href="#collections" title="Collections">${ICON.collections}</a>
      <a class="btn-icon ${state.route==='settings'?'is-active':''}" href="#settings" title="Settings">${ICON.settings}</a>
      ${topActions}
    </div>
  `;
  const resultsBox = document.getElementById('globalSearchResults');
  if(resultsBox && state.globalSearchOpen) renderGlobalSearchResults();
  if(state.notificationsOpen) renderNotificationsPanel();
}

function router(){
  const hash = location.hash.replace('#','') || 'home';
  const hashParts = hash.split('/');
  const route = hashParts[0];
  const param = hashParts.slice(1).join('/'); // rejoin so multi-segment routes (e.g. genre/movie/Drama) keep every part
  state.route = route;
  state.routeParam = param || null;
  // detail/{id}/{seasonNumber}/{episodeNumber} — id is a uuid (never contains '/'), so the first
  // segment is always the id. seasonNumber/episodeNumber are the real season/episode NUMBERS (not
  // array indices), so a shared/refreshed link stays correct even if seasons get reordered. Both
  // trailing segments are optional; state.routeParam is narrowed to just the id so every existing
  // `getItem(state.routeParam)` / `state.routeParam===item.id` check elsewhere keeps working unchanged.
  state.detailDeepLinkEpisode = null;
  if(route==='detail'){
    const detailParts = param ? param.split('/') : [];
    const itemId = detailParts[0] || null;
    const seasonNumParam = detailParts[1];
    const epNumParam = detailParts[2];
    state.routeParam = itemId;
    state.detailSeason = null;
    state.detailEpisodesOpen = false;
    if(itemId && seasonNumParam!=null){
      const it = getItem(itemId);
      const idx = it && (it.seasons||[]).findIndex(s=>String(s.number)===String(seasonNumParam));
      if(idx>=0){ state.detailSeason = idx; state.detailEpisodesOpen = true; }
    }
    if(epNumParam!=null && !isNaN(parseInt(epNumParam,10))) state.detailDeepLinkEpisode = parseInt(epNumParam,10);
  }
  stopHeroAutoplay();
  stopFeaturedAutoplay();
  clearAllCardHoverTimers();
  stopMyShowsCountdown();
  renderShell();
  const root = document.getElementById('pageRoot');
  switch(route){
    case 'movies': root.innerHTML = renderTypePage('movie'); break;
    case 'series': root.innerHTML = renderTypePage('series'); break;
    case 'live': root.innerHTML = renderLiveTV(); break;
    case 'schedule': root.innerHTML = renderSchedule(); if((state.schedule.tab||'mine')==='mine') loadMyShowsSchedule(); else loadScheduleData(); break;
    case 'collections': root.innerHTML = renderCollections(param); if(param==='top100shows') loadTmdbTopListGrid('tv'); else if(param==='top100movies') loadTmdbTopListGrid('movie'); break;
    case 'bingeall': root.innerHTML = renderBingeAllPage(); break;
    case 'newseasonall': root.innerHTML = renderNewSeasonAllPage(); break;
    case 'settings': root.innerHTML = renderSettings(); break;
    case 'genre': {
      const genreParts = param.split('/');
      const genreTypeParam = genreParts[0];
      const genreName = decodeURIComponent(genreParts.slice(1).join('/') || '');
      root.innerHTML = renderGenrePage(genreTypeParam, genreName);
      break;
    }
    case 'actor': {
      const actorName = decodeURIComponent(param || '');
      root.innerHTML = renderActorPage(actorName);
      break;
    }
    case 'detail': {
      root.innerHTML = renderDetail(state.routeParam);
      const detailItem = getItem(state.routeParam);
      if(detailItem){
        loadTmdbSimilarRow(detailItem);
        // Auto-open the episode-info modal when the URL points at a specific episode (deep link/share/
        // refresh). Deferred a tick so it opens after renderDetail's own markup has actually landed.
        if(state.detailDeepLinkEpisode!=null){
          const season = (detailItem.seasons||[])[state.detailSeason];
          if(season) setTimeout(()=> openEpisodeInfoModal(state.routeParam, season.number, state.detailDeepLinkEpisode), 0);
        }
      }
      break;
    }
    default: root.innerHTML = renderHome();
  }
  startHeroAutoplay();
  startFeaturedAutoplay();
  setTimeout(positionFeaturedBgRect, 0);
  window.scrollTo({top:0});
}
window.addEventListener('hashchange', router);
window.addEventListener('scroll', ()=>{
  const tb = document.getElementById('topbar');
  if(tb) tb.classList.toggle('scrolled', window.scrollY > 4);
}, {passive:true});

/* "Because You Liked X" — picks your most recently favorited title as the seed, then surfaces
   other library titles sharing at least one genre with it, ranked by how much genre overlap they
   have. Distinct from the TMDB-similar row on the detail page: that one calls out to TMDB for a
   single title you're actively viewing; this one runs entirely on your own library + favorites,
   on the Home page, and rotates automatically as your favorites change. */
function getBecauseYouLikedRow(items){
  const favorites = items.filter(i=>i.favorite);
  if(!favorites.length) return null;
  const seed = [...favorites].sort((a,b)=> new Date(b.favoritedAt||b.dateAdded||0) - new Date(a.favoritedAt||a.dateAdded||0))[0];
  const seedGenres = seed.genre || [];
  if(!seedGenres.length) return null;
  let related = items.filter(i=> i.id!==seed.id && (i.genre||[]).some(g=>seedGenres.includes(g)));
  if(!related.length) return null;
  related = related.sort((a,b)=>{
    const overlapA = (a.genre||[]).filter(g=>seedGenres.includes(g)).length;
    const overlapB = (b.genre||[]).filter(g=>seedGenres.includes(g)).length;
    if(overlapB!==overlapA) return overlapB-overlapA;
    return new Date(b.dateAdded||0)-new Date(a.dateAdded||0);
  });
  return {seed, items: related.slice(0, GENRE_ROW_CAP)};
}

function renderHome(){
  const items = state.lib.items;
  if(!items.length){
    return `<div class="page">${emptyState('Your vault is empty','Add your first movie or series to start building your personal streaming library.')}</div>`;
  }
  const recentMovies = items.filter(i=>i.type==='movie').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const recentSeries = items.filter(i=>i.type==='series').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const heroItems = [...recentMovies, ...recentSeries];
  const watched = items.filter(isStarted).sort((a,b)=> new Date(b.lastWatched||0)-new Date(a.lastWatched||0));
  const continueWatching = watched.filter(i=>!isFullyWatched(i));
  const recentlyAdded = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  const favorites = items.filter(i=>i.favorite).sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  // The most-recently-added title always gets a panoramic row if it has *any* banner art —
  // including the automatic TMDB-backdrop fallback. But it only gets pulled out of Recently
  // Added when you've manually curated banners for it yourself; the automatic fallback is just
  // a visual nicety and never hides a title from the normal list.
  const newest = recentlyAdded[0];
  const panoramicItem = newest && getPanoramicBanners(newest).length ? newest : null;
  const featured = newest && hasManualPanoramicBanners(newest) ? newest : null;
  const recentlyAddedRowItems = featured ? recentlyAdded.filter(i=>i.id!==featured.id) : recentlyAdded;

  let rows = '';
  if(continueWatching.length) rows += rowHtml('Continue Watching', continueWatching, {removable:true});
  rows += featuredReleaseHtml(panoramicItem);
  const newSeasonHome = getNewSeasonItems(items);
  if(newSeasonHome.length) rows += cappedRowHtml('New Season Available', newSeasonHome, 'newseasonall', ICON.bell);
  if(favorites.length) rows += rowHtml('Favorites', favorites);
  const becauseYouLiked = getBecauseYouLikedRow(items);
  if(becauseYouLiked) rows += rowHtml(`Because You Liked "${becauseYouLiked.seed.title}"`, becauseYouLiked.items, {icon: ICON.sparkles});
  rows += rowHtml('Recently Added', recentlyAddedRowItems.slice(0, GENRE_ROW_CAP));
  allGenres().forEach(g=>{
    const inGenre = recentlyAdded.filter(i=>(i.genre||[]).includes(g));
    if(inGenre.length) rows += genreRowHtml(g, inGenre, 'all');
  });
  const bingeNowHome = getBingeNowItems(items);
  if(bingeNowHome.length) rows += cappedRowHtml('Binge Now', bingeNowHome, 'bingeall');

  return `${heroCarouselHtml(heroItems)}<div class="page">${rows}</div>`;
}

function renderTypePage(type){
  const items = state.lib.items.filter(i=>i.type===type);
  const label = type==='movie' ? 'movies' : 'TV shows';
  if(!items.length){
    return `<div class="page">${emptyState(`No ${label} yet`, `Add your first ${type==='movie'?'movie':'series'} to get started.`)}</div>`;
  }

  const heroItems = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const watched = items.filter(isStarted).sort((a,b)=> new Date(b.lastWatched||0)-new Date(a.lastWatched||0));
  const continueWatching = watched.filter(i=>!isFullyWatched(i));
  const recentlyAdded = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  const newest = recentlyAdded[0];
  const panoramicItem = newest && getPanoramicBanners(newest).length ? newest : null;
  const featured = newest && hasManualPanoramicBanners(newest) ? newest : null;
  const recentlyAddedRowItems = featured ? recentlyAdded.filter(i=>i.id!==featured.id) : recentlyAdded;

  let rows = '';
  if(continueWatching.length) rows += rowHtml('Continue Watching', continueWatching, {removable:true});
  rows += featuredReleaseHtml(panoramicItem);
  if(type==='series'){
    const newSeasonSeries = getNewSeasonItems(items);
    if(newSeasonSeries.length) rows += cappedRowHtml('New Season Available', newSeasonSeries, 'newseasonall', ICON.bell);
  }
  rows += rowHtml('Recently Added', recentlyAddedRowItems.slice(0, GENRE_ROW_CAP));
  allGenres().forEach(g=>{
    const inGenre = recentlyAdded.filter(i=>(i.genre||[]).includes(g));
    if(inGenre.length) rows += genreRowHtml(g, inGenre, type);
  });
  if(type==='series'){
    const bingeNowSeries = getBingeNowItems(items);
    if(bingeNowSeries.length) rows += cappedRowHtml('Binge Now', bingeNowSeries, 'bingeall');
  }

  return `${heroCarouselHtml(heroItems)}<div class="page">${rows}</div>`;
}

// "See All" page for the Binge Now row — every ended series (per isEndedSeries) that isn't

/* Up to 6 panoramic banner URLs per title. Falls back to the old single `panoramicBanner`
   field, then to the TMDB backdrop if neither is set — so the row still shows *something*
   for a freshly-imported title even if you never paste custom banner art. */
function getPanoramicBanners(item){
  if(!item) return [];
  if(Array.isArray(item.panoramicBanners) && item.panoramicBanners.length) return item.panoramicBanners.slice(0,6);
  if(item.panoramicBanner) return [item.panoramicBanner];
  if(item.backdrop) return [item.backdrop];
  return [];
}
/* Whether the panoramic banners were something *you* actually set, as opposed to the
   automatic backdrop fallback above. This is what decides whether a title gets pulled out of
   Recently Added to be featured — the auto fallback alone should never do that; only your own
   curated banner links should. */
function hasManualPanoramicBanners(item){
  if(!item) return false;
  if(Array.isArray(item.panoramicBanners) && item.panoramicBanners.length) return true;
  if(item.panoramicBanner) return true;
  return false;
}

/* ---- Featured Release: the "Just Added" redesign. One featured card for the most-recently-added
   title with curated banner art (getPanoramicBanners), cycled through via dot indicators rather than
   shown as separate scrollable cards. Absent entirely if that title has no banner art — never falls
   back to an older title. See the CSS block above for the artwork-bleed approach/limits. ---- */
function featuredReleaseHtml(item){
  const banners = getPanoramicBanners(item);
  if(!banners.length) return '';
  const bgLabel = item.type==='movie' ? 'New Movie' : 'New Show';
  const metaBits = [];
  if(item.genre && item.genre.length) item.genre.slice(0,2).forEach(g=> metaBits.push(esc(g)));
  if(item.type==='movie'){
    if(item.runtime) metaBits.push(esc(item.runtime));
  } else {
    const seasonCount = (item.seasons||[]).length;
    if(seasonCount) metaBits.push(`${seasonCount} Season${seasonCount===1?'':'s'}`);
  }
  if(item.year) metaBits.push(esc(item.year));
  state.featuredItem = item;
  state.featuredIndex = 0;
  const cutoutClass = item.featuredCutout ? 'has-cutout' : '';
  const bleedClass = cutoutClass ? '' : (state.settings.featuredArtworkBleed ? 'bleed-on' : 'bleed-off');
  const titleJsSafe = esc(item.title).replace(/'/g,"&#39;");
  return `
    <div class="row featured-row">
      <div class="featured-bg-rect" id="featuredBgRect"></div>
      <div class="featured-bg-text-stack">
        <div class="featured-bg-text">
          <span>${esc(bgLabel)}</span>
        </div>
        <div class="featured-bg-text-dup featured-bg-text-dup--hidden"><span>${esc(bgLabel)}</span></div>
        <div class="featured-bg-text-dup featured-bg-text-dup--hidden"><span>${esc(bgLabel)}</span></div>
        <div class="featured-bg-text-dup featured-bg-text-dup--hidden"><span>${esc(bgLabel)}</span></div>
        <div class="featured-bg-text-dup featured-bg-text-dup--last"><span>${esc(bgLabel)}</span></div>
      </div>
      <div class="featured-card ${bleedClass} ${cutoutClass}" id="featuredCard" onclick="featuredCardClick(event,'${item.id}')" onmouseenter="stopFeaturedAutoplay()" onmouseleave="startFeaturedAutoplay()">
        <div class="featured-art">
          ${banners.map((url,i)=>`
            <div class="featured-art-layer${i===0?' active':''}" data-idx="${i}">
              <img class="featured-art-img" src="${esc(url)}" alt="${esc(item.title)}" draggable="false" ${contentBlurImgAttrs()}>
            </div>`).join('')}
        </div>
        <div class="featured-card-inner">
          <div class="featured-scrim"></div>
        </div>
        ${item.featuredCutout ? `<div class="featured-cutout"><img src="${esc(item.featuredCutout)}" alt="" draggable="false" ${contentBlurImgAttrs()}></div>` : ''}
        <div class="featured-content" id="featuredContent">
          ${item.logo
            ? `<img class="featured-logo" src="${esc(item.logo)}" alt="${esc(item.title)}" ${contentBlurImgAttrs()} onerror="this.replaceWith(Object.assign(document.createElement('h2'),{className:'featured-title',textContent:'${titleJsSafe}'}))">`
            : `<h2 class="featured-title">${esc(item.title)}</h2>`}
          ${metaBits.length ? `<div class="featured-meta">${metaBits.map((m,i)=>`${i>0?'<span class="dot">&bull;</span>':''}<span>${m}</span>`).join('')}</div>` : ''}
          ${item.description ? `<p class="featured-desc">${esc(item.description)}</p>` : ''}
          <div class="featured-actions">
            <button class="btn btn-primary" onclick="event.stopPropagation(); quickPlay('${item.id}')">${ICON.play} Play</button>
            <button class="btn btn-ghost" onclick="event.stopPropagation(); openTrailerModal('${item.id}')">${ICON.play} Trailer</button>
          </div>
        </div>
        ${banners.length>1 ? `<div class="featured-indicators">${banners.map((_,i)=>`<button type="button" class="featured-dot${i===0?' active':''}" title="Slide ${i+1}" onclick="event.stopPropagation(); setFeaturedSlide(${i})"></button>`).join('')}</div>` : ''}
      </div>
    </div>`;
}
let featuredAutoplayTimer = null;
function stopFeaturedAutoplay(){ clearInterval(featuredAutoplayTimer); featuredAutoplayTimer = null; }
/* Positions/sizes .featured-bg-rect so it starts 2px below line 1's bottom edge and ends 2px above
   line 5's top edge, then insets both edges inward by the SAME amount (5% of that full span each) so
   the rectangle shrinks 10% total while staying perfectly centered between the two lines — the gap
   above the rectangle (to line 1) and the gap below it (to line 5) are always equal by construction,
   since both start from the same symmetric 2px baseline and get the same inset subtracted. Horizontal
   sizing is handled by CSS (left:0; right:0 — full row width), so this only needs the vertical span.
   Re-run on render and on resize since line 1/line 5's real pixel positions depend on responsive
   font-size clamps. */
function positionFeaturedBgRect(){
  const rectEl = document.getElementById('featuredBgRect');
  const row = document.querySelector('.featured-row');
  if(!rectEl || !row) return;
  const line1 = row.querySelector('.featured-bg-text span');
  const line5 = row.querySelector('.featured-bg-text-dup--last span');
  if(!line1 || !line5) return;
  const rowRect = row.getBoundingClientRect();
  const r1 = line1.getBoundingClientRect();
  const r5 = line5.getBoundingClientRect();
  const fullTop = (r1.bottom - rowRect.top) + 2;
  const fullBottom = (r5.top - rowRect.top) - 2;
  const fullHeight = fullBottom - fullTop;
  const inset = fullHeight * 0.05; // same inset applied to both edges → gaps stay equal
  const extraTopInset = fullHeight * 0.06;
  const extraBottomInset = fullHeight * 0.04;
  const rectTop = fullTop + inset + extraTopInset;
  const rectBottom = fullBottom - inset - extraBottomInset;
  rectEl.style.top = rectTop + 'px';
  rectEl.style.height = Math.max(0, rectBottom - rectTop) + 'px';
}
window.addEventListener('resize', ()=> positionFeaturedBgRect());
function startFeaturedAutoplay(){
  stopFeaturedAutoplay();
  const banners = state.featuredItem ? getPanoramicBanners(state.featuredItem) : [];
  if(banners.length<2) return;
  featuredAutoplayTimer = setInterval(()=> setFeaturedSlide(((state.featuredIndex||0)+1) % banners.length), 5500);
}
// Crossfades art layers + slides/fades the content and dot indicators — the 380-420ms transitions
// live in CSS (see .featured-art-layer / .featured-content), this just toggles the classes.
function setFeaturedSlide(i){
  const card = document.getElementById('featuredCard');
  if(!card) return;
  state.featuredIndex = i;
  card.querySelectorAll('.featured-art-layer').forEach(el=> el.classList.toggle('active', +el.dataset.idx===i));
  card.querySelectorAll('.featured-dot').forEach((el,idx)=> el.classList.toggle('active', idx===i));
  const content = document.getElementById('featuredContent');
  if(content){
    content.style.opacity = '0'; content.style.transform = 'translateY(6px)';
    setTimeout(()=>{ content.style.opacity = ''; content.style.transform = ''; }, 40);
  }
  startFeaturedAutoplay();
}
function featuredCardClick(e, id){ location.hash = 'detail/'+id; }

/* ---- Hero carousel ---- */
let heroAutoplayTimer = null;
function stopHeroAutoplay(){ clearInterval(heroAutoplayTimer); heroAutoplayTimer = null; }
function startHeroAutoplay(){
  stopHeroAutoplay();
  if(!state.heroItems || state.heroItems.length<2) return;
  heroAutoplayTimer = setInterval(()=> nextHeroSlide(), 6500);
}
function heroCarouselHtml(items){
  if(!items.length) return '';
  state.heroItems = items;
  state.heroIndex = 0;
  return `
    <div class="hero-carousel" id="heroCarousel" onmouseenter="stopHeroAutoplay()" onmouseleave="heroPointerUp(event); startHeroAutoplay()">
      <button class="hero-nav-btn hero-nav-prev" onclick="prevHeroSlide()">${ICON.chevronLeft}</button>
      <button class="hero-nav-btn hero-nav-next" onclick="nextHeroSlide()">${ICON.chevronRight}</button>
      <div class="hero-track" id="heroTrack"
        onmousedown="heroPointerDown(event)" onmousemove="heroPointerMove(event)" onmouseup="heroPointerUp(event)"
        ontouchstart="heroPointerDown(event)" ontouchmove="heroPointerMove(event)" ontouchend="heroPointerUp(event)">
        ${items.map(heroSlideHtml).join('')}
      </div>
    </div>`;
}
function heroSlideHtml(item){
  const pct = item.type==='movie' ? movieProgressPct(item) : itemProgressPct(item);
  const showResume = isStarted(item) && !isFullyWatched(item);
  const titleJsSafe = esc(item.title).replace(/'/g,"&#39;");
  return `
    <div class="hero-slide" onclick="heroSlideClick('${item.id}')">
      ${item.backdrop ? `<img src="${esc(item.backdrop)}" alt="" draggable="false" ${contentBlurImgAttrs()}>` : ''}
      <span class="hero-badge">${item.type==='series'?'Series':'Movie'}</span>
      <div class="hero-content">
        ${item.logo
          ? `<div class="hero-logo-slot"><img class="hero-logo" src="${esc(item.logo)}" alt="${esc(item.title)}" ${contentBlurImgAttrs()} onerror="const h2=Object.assign(document.createElement('h2'),{textContent:'${titleJsSafe}'}); (this.closest('.hero-logo-slot')||this).replaceWith(h2);"></div>`
          : `<h2>${esc(item.title)}</h2>`}
        <p>${esc(item.description||'No description added yet.')}</p>
        <div class="hero-btns">
          <button class="btn btn-primary" onclick="event.stopPropagation(); quickPlay('${item.id}')">${ICON.play} ${showResume?'Resume':'Play'}</button>
          <button class="btn btn-ghost" onclick="event.stopPropagation(); location.hash='detail/${item.id}'">More Info</button>
        </div>
        ${pct>0 ? `<div class="hero-progress"><div style="width:${pct}%"></div></div>` : ''}
      </div>
    </div>`;
}
let heroDragStartX = null, heroDragging = false, heroDidDrag = false;
function heroPointerDown(e){
  heroDragStartX = (e.touches ? e.touches[0].clientX : e.clientX);
  heroDragging = true;
  heroDidDrag = false;
  stopHeroAutoplay();
  const track = document.getElementById('heroTrack');
  if(track) track.classList.add('dragging');
}
function heroPointerMove(e){
  if(!heroDragging || heroDragStartX==null) return;
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  if(Math.abs(x - heroDragStartX) > 8) heroDidDrag = true;
}
function heroPointerUp(e){
  if(!heroDragging){ startHeroAutoplay(); return; }
  heroDragging = false;
  const track = document.getElementById('heroTrack');
  if(track) track.classList.remove('dragging');
  const endX = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
  const delta = heroDragStartX!=null ? endX - heroDragStartX : 0;
  if(Math.abs(delta) > 50){
    // Sliding left-to-right (positive delta) goes back; right-to-left goes forward.
    if(delta > 0) prevHeroSlide(); else nextHeroSlide();
  } else {
    startHeroAutoplay();
  }
  heroDragStartX = null;
  setTimeout(()=>{ heroDidDrag = false; }, 60);
}
function heroSlideClick(id){
  if(heroDidDrag) return;
  location.hash = 'detail/'+id;
}
function setHeroSlide(i){
  state.heroIndex = i;
  updateHeroTrack();
  startHeroAutoplay();
}
function nextHeroSlide(){
  if(!state.heroItems || !state.heroItems.length) return;
  state.heroIndex = (state.heroIndex+1) % state.heroItems.length;
  updateHeroTrack();
  startHeroAutoplay();
}
function prevHeroSlide(){
  if(!state.heroItems || !state.heroItems.length) return;
  state.heroIndex = (state.heroIndex-1+state.heroItems.length) % state.heroItems.length;
  updateHeroTrack();
  startHeroAutoplay();
}
function updateHeroTrack(){
  const track = document.getElementById('heroTrack');
  if(track) track.style.transform = `translateX(-${state.heroIndex*100}%)`;
}

function rowHtml(title, items, opts){
  opts = opts || {};
  const cardsHtml = opts.removable
    ? items.map(i=>continueWatchingCardHtml(i)).join('')
    : items.map(i=>cardHtml(i, opts)).join('');
  return `
    <div class="row">
      <div class="row-head"><h3>${opts.icon ? `<span class="row-head-icon">${opts.icon}</span>` : ''}${esc(title)}</h3></div>
      <div class="row-track">${cardsHtml}</div>
    </div>`;
}

// A row is capped at 10 tiles: if there are more than 10 titles, only the first 9 are shown and
// the 10th tile becomes a "See All" card linking to a page with the full list. If there are 10 or
// fewer titles, they're all shown as-is (no See All tile needed since nothing is hidden).
const GENRE_ROW_CAP = 10;
function cappedRowHtml(title, items, seeAllHref, icon){
  let cardsHtml;
  if(items.length > GENRE_ROW_CAP){
    const shown = items.slice(0, GENRE_ROW_CAP-1);
    cardsHtml = shown.map(i=>cardHtml(i)).join('') + seeAllTileHtml(seeAllHref, items.length);
  } else {
    cardsHtml = items.map(i=>cardHtml(i)).join('');
  }
  return `
    <div class="row">
      <div class="row-head"><h3>${icon ? `<span class="row-head-icon">${icon}</span>` : ''}${esc(title)}</h3></div>
      <div class="row-track">${cardsHtml}</div>
    </div>`;
}
function seeAllTileHtml(href, totalCount){
  return `
    <div class="card card-see-all" onclick="location.hash='${href}'">
      <div class="see-all-inner">
        <span class="see-all-count">+${totalCount - (GENRE_ROW_CAP-1)}</span>
        <span class="see-all-label">See All${ICON.chevronRight}</span>
      </div>
    </div>`;
}
function genreRowHtml(genre, items, typeParam){
  const href = `genre/${encodeURIComponent(typeParam)}/${encodeURIComponent(genre)}`;
  return cappedRowHtml(genre, items, href);
}

function isNew(item){
  if(!item.dateAdded) return false;

}

function cardHtml(item, opts){

function removeFromContinueWatching(id){
  const item = getItem(id);

  const prevProgress = item.progress; // kept by reference for Undo — item.progress below just repoints
  item.progress = {};

// Landscape tile used only by the Continue Watching row (see .card-landscape in CSS for why).
// The onmouseenter/onmouseleave trailer-preview hooks live on .card-landscape-media rather than
// the outer tile, so a hovered trailer fills just the thumbnail and doesn't stretch under the

function continueWatchingCardHtml(item){

    <div class="card card-landscape" onclick="location.hash='detail/${item.id}'">

        <button type="button" class="card-favorite-btn ${item.favorite?'is-fav':''}" data-fav-id="${item.id}" title="${item.favorite?'Remove from Favorites':'Add to Favorites'}" onclick="event.stopPropagation(); toggleFavorite('${item.id}')">${heartSvg(!!item.favorite)}</button>

/* ---- Card tilt (mouse) / tap-shine (touch) ---- */
const CARD_HOVER_CAPABLE = window.matchMedia('(hover:hover) and (pointer:fine)').matches;
// Once the Featured Release card's one-shot entrance finishes, swap it for a continuous gentle float
// so the card keeps quietly moving afterward instead of sitting completely still.
document.addEventListener('animationend', e=>{
  if(e.animationName === 'featuredCardReveal' && e.target && e.target.id === 'featuredCard'){
    e.target.style.animation = 'featuredCardFloat 9s ease-in-out infinite';
  }
});
if(CARD_HOVER_CAPABLE){
  document.addEventListener('pointermove', e=>{
    const card = e.target.closest && e.target.closest('.card');
    if(!card) return;
    const r = card.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    card.style.setProperty('--tiltY', (px * 10).toFixed(2) + 'deg');
    card.style.setProperty('--tiltX', (-py * 10).toFixed(2) + 'deg');
  });
  // pointerleave doesn't bubble, but a capture-phase listener on document still sees it on the way down.
  document.addEventListener('pointerleave', e=>{
    const card = e.target && e.target.closest && e.target.closest('.card');
    if(card){ card.style.removeProperty('--tiltX'); card.style.removeProperty('--tiltY'); }
  }, true);
} else {
  document.addEventListener('touchstart', e=>{
    const card = e.target.closest && e.target.closest('.card');
    if(!card) return;
    card.classList.remove('tap-shine');
    void card.offsetWidth; // restart the CSS transition if the same card is tapped again quickly
    card.classList.add('tap-shine');
    setTimeout(()=> card.classList.remove('tap-shine'), 650);
  }, {passive:true});
}

/* ---- Trailer hover preview (TMDB) ---- */
const cardHoverTimers = {};
function clearAllCardHoverTimers(){
  Object.values(cardHoverTimers).forEach(t=>clearTimeout(t));
  for(const k in cardHoverTimers) delete cardHoverTimers[k];
}
function cardHoverStart(e, id){
  if(!state.settings.tmdb) return; // no TMDB key configured — plain hover only
  const cardEl = e.currentTarget;
  clearTimeout(cardHoverTimers[id]);
  cardHoverTimers[id] = setTimeout(()=> showCardTrailer(cardEl, id), 1500);
}
function cardHoverEnd(e, id){
  clearTimeout(cardHoverTimers[id]);
  hideCardTrailer(e.currentTarget);
}
async function showCardTrailer(cardEl, id){
  const item = getItem(id);
  if(!item || !cardEl) return;
  if(!item.trailerChecked){
    await fetchTmdbTrailer(item);
  }
  if(!cardEl.matches(':hover')) return; // mouse already left while we were fetching
  if(!item.trailerKey) return; // checked, none available
  if(cardEl.querySelector('.card-trailer')) return; // already showing
  const wrap = document.createElement('div');
  wrap.className = 'card-trailer';
  wrap.innerHTML = `
    <iframe src="https://www.youtube.com/embed/${item.trailerKey}?autoplay=1&mute=1&controls=0&modestbranding=1&playsinline=1&loop=1&playlist=${item.trailerKey}&rel=0&enablejsapi=1" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    <button type="button" class="card-trailer-mute" data-muted="true" title="Unmute" onclick="event.stopPropagation(); toggleCardTrailerMute(this)">${ICON.volumeOff}</button>`;
  cardEl.appendChild(wrap);
}
function hideCardTrailer(cardEl){
  const el = cardEl && cardEl.querySelector && cardEl.querySelector('.card-trailer');
  if(el) el.remove();
}
function toggleCardTrailerMute(btn){
  const wrap = btn.closest('.card-trailer');
  const iframe = wrap && wrap.querySelector('iframe');
  if(!iframe) return;
  const wasMuted = btn.dataset.muted !== 'false';
  const cmd = wasMuted ? 'unMute' : 'mute';
  try{ iframe.contentWindow.postMessage(JSON.stringify({event:'command', func:cmd, args:[]}), '*'); }catch(e){}
  btn.dataset.muted = wasMuted ? 'false' : 'true';
  btn.title = wasMuted ? 'Mute' : 'Unmute';
  btn.innerHTML = wasMuted ? ICON.volumeOn : ICON.volumeOff;
}
async function fetchTmdbTrailer(item){
  item.trailerChecked = true; // mark so we never re-fetch a title with no trailer on every hover
  if(!state.settings.tmdb){ return; }
  try{
    const type = item.type==='series' ? 'tv' : 'movie';
    const yearParam = item.year ? (type==='movie' ? `&year=${encodeURIComponent(item.year)}` : `&first_air_date_year=${encodeURIComponent(item.year)}`) : '';
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(item.title)}${yearParam}`);
    const searchData = await searchRes.json();
    const match = searchData.results && searchData.results[0];
    if(!match){ saveLib(); return; }
    item.tmdbId = match.id;
    const videoRes = await fetch(`https://api.themoviedb.org/3/${type}/${match.id}/videos?api_key=${encodeURIComponent(state.settings.tmdb)}`);
    const videoData = await videoRes.json();
    const vids = (videoData.results||[]).filter(v=>v.site==='YouTube');
    const trailer = vids.find(v=>v.type==='Trailer' && v.official) || vids.find(v=>v.type==='Trailer') || vids.find(v=>v.type==='Teaser') || vids[0];
    if(trailer) item.trailerKey = trailer.key;
    saveLib();
  }catch(e){
    // Silent fail — a missing preview shouldn't interrupt browsing.
    saveLib();
  }
}
// "Watch Trailer" button on the detail page — reuses the same trailerKey the card hover-preview
// fetches/caches, so titles already hovered on a row open instantly. A title opened straight from
// search (never hovered) won't have been checked yet, so this fetches on demand the first time.
async function openTrailerModal(id){
  const item = getItem(id);
  if(!item) return;
  if(!item.trailerKey && !item.trailerChecked){
    if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings to fetch trailers'); return; }
    toast('Looking for a trailer…');
    await fetchTmdbTrailer(item);
  }
  if(!item.trailerKey){ toast('No trailer found for this title'); return; }
  openModal(`
    <div class="trailer-modal-head">
      <h2>${esc(item.title)} — Trailer</h2>
      <button class="btn-icon" onclick="closeModal()">${ICON.close}</button>
    </div>
    <div class="trailer-frame-wrap">
      <iframe src="https://www.youtube.com/embed/${item.trailerKey}?autoplay=1&rel=0&modestbranding=1" title="${esc(item.title)} trailer" allow="autoplay; encrypted-media; fullscreen" allowfullscreen frameborder="0" onload="this.classList.add('loaded'); this.closest('.trailer-frame-wrap').classList.add('iframe-loaded')"></iframe>
    </div>
  `);
  document.getElementById('modalBody').classList.add('modal-video');
}

function timeAgo(iso){
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff/60000);
  if(mins<1) return 'just now';
  if(mins<60) return mins+'m ago';
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+'h ago';
  return Math.floor(hrs/24)+'d ago';
}

function quickPlay(id){
  const item = getItem(id);
  if(!item) return;
  if(item.type==='movie'){
    requestPlayback(item, null, null, getMovieSources(item));
  } else {
    // find first unwatched episode, else first episode
    const flat = [];
    (item.seasons||[]).forEach(s=> (s.episodes||[]).forEach(e=> flat.push({s:s.number,e})));
    let target = flat.find(f=>{
      const key = 's'+f.s+'e'+f.e.number;
      const p = (item.progress||{})[key];
      return !p || !p.watched;
    }) || flat[0];
    if(target) requestPlayback(item, target.s, target.e.number, getEpisodeSources(item, target.e, target.s));
    else toast('No episodes added yet');
  }
}

/* =========================================================
   TV SCHEDULE (TVmaze)
========================================================= */
function todayISO(offsetDays){
  const d = new Date();
  d.setDate(d.getDate() + (offsetDays||0));
  return d.toISOString().slice(0,10);
}
function formatScheduleDateLabel(iso){
  const d = new Date(iso+'T00:00:00');
  const diffDays = Math.round((d - new Date(todayISO()+'T00:00:00')) / 86400000);
  const dateStr = d.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric'});
  if(diffDays===0) return 'Today · '+dateStr;
  if(diffDays===1) return 'Tomorrow · '+dateStr;
  if(diffDays===-1) return 'Yesterday · '+dateStr;
  return dateStr;
}
function renderSchedule(){
  const st = state.schedule;
  const tab = st.tab || 'mine';
  return `
    <div class="page">
      <div class="filter-bar">
        <select id="scheduleTabSelect" class="select-input" style="width:auto; border-radius:8px;" onchange="setScheduleTab(this.value)">
          <option value="mine" ${tab==='mine'?'selected':''}>My TV Shows</option>
          <option value="broad" ${tab==='broad'?'selected':''}>Live TV</option>
        </select>
        ${tab==='broad' ? `
          <button class="btn-icon" title="Previous day" onclick="shiftScheduleDate(-1)">${ICON.chevronLeft}</button>
          <div class="schedule-date-label">${formatScheduleDateLabel(st.date)}</div>
          <button class="btn-icon" title="Next day" onclick="shiftScheduleDate(1)">${ICON.chevronRight}</button>
          <span class="tag" title="Change the country in Settings → TV Schedule">${esc(state.settings.scheduleCountry)}</span>
        ` : ''}
        <input class="search-input" placeholder="${tab==='mine'?'Search my shows...':'Search schedule...'}" value="${esc(st.search)}" oninput="setScheduleSearch(this.value)">
      </div>
      <div id="scheduleListing"></div>
    </div>`;
}
function setScheduleTab(val){
  state.schedule.tab = val;
  stopMyShowsCountdown();
  document.getElementById('pageRoot').innerHTML = renderSchedule();
  if(val==='mine') loadMyShowsSchedule(); else loadScheduleData();
}
function shiftScheduleDate(delta){
  const d = new Date(state.schedule.date+'T00:00:00');
  d.setDate(d.getDate()+delta);
  state.schedule.date = d.toISOString().slice(0,10);
  document.getElementById('pageRoot').innerHTML = renderSchedule();
  loadScheduleData();
}
function saveScheduleCountry(){
  const val = document.getElementById('scheduleCountryInput').value;
  state.settings.scheduleCountry = val.trim().toUpperCase().slice(0,2) || 'US';
  saveSettings();
  state.schedule.cache = {};
  toast('Schedule country saved');
  if(state.route==='schedule' && (state.schedule.tab||'mine')==='broad'){
    document.getElementById('pageRoot').innerHTML = renderSchedule();
    loadScheduleData();
  }
}
function setScheduleSearch(val){
  state.schedule.search = val;
  const tab = state.schedule.tab||'mine';
  if(tab==='mine'){
    if(state.schedule._myShowsResults) renderMyShowsListing(state.schedule._myShowsResults);
  } else {
    renderScheduleListing(state.schedule.cache[scheduleCacheKey()] || []);
  }
}
function scheduleCacheKey(){
  return state.settings.scheduleCountry+'_'+state.schedule.date;
}
async function loadScheduleData(){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const key = scheduleCacheKey();
  if(state.schedule.cache[key]){ renderScheduleListing(state.schedule.cache[key]); return; }
  container.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto;"></div><p style="margin-top:16px; color:var(--muted);">Loading schedule…</p></div>`;
  try{
    const res = await fetch(`https://api.tvmaze.com/schedule?country=${encodeURIComponent(state.settings.scheduleCountry)}&date=${state.schedule.date}`);
    if(!res.ok) throw new Error('TVmaze request failed (status '+res.status+')');
    const data = await res.json();
    state.schedule.cache[key] = data;
    if(document.getElementById('scheduleListing')) renderScheduleListing(data);
  }catch(e){
    if(container.isConnected) container.innerHTML = `<div class="empty-state"><h3>Couldn't load the schedule</h3><p>${esc(e.message||'Check your connection and try again.')}</p></div>`;
  }
}
function renderScheduleListing(data){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const search = (state.schedule.search||'').trim().toLowerCase();
  let list = data;
  if(search) list = list.filter(ep=> ((ep.show&&ep.show.name)||'').toLowerCase().includes(search));
  if(!list.length){
    container.innerHTML = emptyState('Nothing found', 'Try a different date, country code, or search.', 'Today', "state.schedule.date=todayISO(); document.getElementById('pageRoot').innerHTML=renderSchedule(); loadScheduleData();");
    return;
  }
  list = [...list].sort((a,b)=> (a.airtime||'').localeCompare(b.airtime||''));
  container.innerHTML = `<div class="schedule-list">${list.map(scheduleRowHtml).join('')}</div>`;
}

/* ---------- My TV Shows (watchlist + TVmaze next-episode countdown) ---------- */
function getWatchlistShows(){
  return state.lib.items.filter(i=> i.type==='series' && i.watchlist);
}
async function loadMyShowsSchedule(){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const shows = getWatchlistShows();
  if(!shows.length){
    container.innerHTML = emptyState('No TV shows on your watchlist', 'Add a series to your watchlist from its detail page to see its next-episode countdown here.', 'Browse TV Shows', "location.hash='series'");
    return;
  }

  if(!document.getElementById('scheduleListing')) return;
  state.schedule._myShowsResults = results;
  renderMyShowsListing(results);
}
async function fetchMyShowSchedule(item){
  const cacheKey = (item.title||'').toLowerCase().trim();
  const cached = state.schedule.myShowsCache[cacheKey];
  if(cached && (Date.now()-cached.fetchedAt) < 6*60*60*1000) return {item, show:cached.show};
  try{
    const res = await fetch(`https://api.tvmaze.com/singlesearch/shows?q=${encodeURIComponent(item.title)}&embed[]=nextepisode&embed[]=previousepisode`);
    if(!res.ok) throw new Error('not found');
    const show = await res.json();
    state.schedule.myShowsCache[cacheKey] = {show, fetchedAt:Date.now()};
    return {item, show};
  }catch(e){
    state.schedule.myShowsCache[cacheKey] = {show:null, fetchedAt:Date.now()};
    return {item, show:null};
  }
}
function nextEpisodeAirstamp(show){
  const ep = show && show._embedded && show._embedded.nextepisode;
  if(!ep || !ep.airstamp) return null;
  const t = new Date(ep.airstamp).getTime();
  return isNaN(t) ? null : t;
}
function renderMyShowsListing(results){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const search = (state.schedule.search||'').trim().toLowerCase();
  let list = results;
  if(search) list = list.filter(r=> (r.item.title||'').toLowerCase().includes(search));
  if(!list.length){
    container.innerHTML = emptyState('Nothing found', 'Try a different search.', '', '');
    return;
  }
  list = [...list].sort((a,b)=>{
    const an = nextEpisodeAirstamp(a.show), bn = nextEpisodeAirstamp(b.show);
    if(an && bn) return an-bn;
    if(an) return -1;
    if(bn) return 1;
    return (a.item.title||'').localeCompare(b.item.title||'');
  });
  container.innerHTML = `<div class="schedule-list">${list.map(myShowRowHtml).join('')}</div>`;
  startMyShowsCountdown();
}
function myShowRowHtml(r){
  const {item, show} = r;
  const img = (show && show.image && (show.image.medium||show.image.original)) || item.poster || '';
  const nextEp = show && show._embedded && show._embedded.nextepisode;
  const airstamp = nextEpisodeAirstamp(show);
  const epLabel = (nextEp && nextEp.season && nextEp.number) ? `S${nextEp.season}E${nextEp.number}` : '';
  const network = (show && ((show.network&&show.network.name)||(show.webChannel&&show.webChannel.name))) || '';
  const statusHtml = airstamp
    ? `<span class="schedule-countdown" data-airstamp="${airstamp}">--</span>`
    : (show ? `<span class="schedule-network" style="margin-top:0;">No upcoming episode</span>` : `<span class="schedule-network" style="margin-top:0; color:#ff8b93;">Not found on TVmaze</span>`);
  return `
    <div class="schedule-row" style="cursor:pointer;" onclick="openMyShowModal('${item.id}')">
      <div class="schedule-thumb">${img?`<img src="${esc(img)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>`:fallbackHtml(item.title||'?')}</div>
      <div class="schedule-info">
        <div class="schedule-show-title">${esc(item.title)}</div>
        <div class="schedule-ep-title">${epLabel?`<span class="schedule-ep-tag">${esc(epLabel)}</span> `:''}${esc((nextEp&&nextEp.name)||'')}</div>
        <div class="schedule-network">${esc(network)}</div>
      </div>
      ${statusHtml}
    </div>`;
}
let myShowsCountdownTimer = null;
function startMyShowsCountdown(){
  stopMyShowsCountdown();
  updateMyShowsCountdown();
  myShowsCountdownTimer = setInterval(updateMyShowsCountdown, 1000);
}
function stopMyShowsCountdown(){
  if(myShowsCountdownTimer){ clearInterval(myShowsCountdownTimer); myShowsCountdownTimer = null; }
}
function updateMyShowsCountdown(){
  const els = document.querySelectorAll('.schedule-countdown');
  if(!els.length){ stopMyShowsCountdown(); return; }
  els.forEach(el=>{
    const target = parseInt(el.dataset.airstamp, 10);
    const diff = target - Date.now();
    el.textContent = diff<=0 ? 'Airing now' : formatCountdown(diff);
  });
}
function formatCountdown(ms){
  const totalSec = Math.floor(ms/1000);
  const d = Math.floor(totalSec/86400), h = Math.floor((totalSec%86400)/3600), m = Math.floor((totalSec%3600)/60), s = totalSec%60;
  if(d>0) return `${d}d ${h}h`;
  if(h>0) return `${h}h ${m}m`;
