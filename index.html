/* ---- Content Blur (Beta) — on-device NSFW classification for images we actually render ourselves ----
   Loads tf.js + nsfwjs from a CDN only when the feature is turned on, and only once. This can only ever
   see pixels our own page has legitimate (CORS-cleared) access to — a plain <img>/<video> we control.
   It cannot and will never be able to see inside a cross-origin third-party <iframe> (VidSrc, live TV
   embeds); that's a hard browser security boundary, not a limitation of this code. */
let contentBlurModel = null;
let contentBlurLoadPromise = null;
function loadScriptOnce(src, timeoutMs){
  timeoutMs = timeoutMs || 12000;
  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    let done = false;
    const timer = setTimeout(()=>{
      if(done) return;
      done = true;
      s.remove();
      reject(new Error('Timed out loading '+src+' (no response within '+(timeoutMs/1000)+'s — likely blocked by a domain/network restriction rather than a slow connection)'));
    }, timeoutMs);
    s.src = src;
    s.onload = ()=>{ if(done) return; done=true; clearTimeout(timer); resolve(); };
    s.onerror = ()=>{ if(done) return; done=true; clearTimeout(timer); reject(new Error('Failed to load '+src)); };
    document.head.appendChild(s);
  });
}
// Tries each CDN in order and only fails if all of them do — different CDNs are different domains/
// infrastructure, so if one is blocked by a WebView's domain whitelist or a network filter, another
// may still get through.
async function loadScriptWithFallback(urls){
  let lastErr = null;
  for(const url of urls){
    try{ await loadScriptOnce(url); return url; }
    catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('All sources failed');
}
async function loadContentBlurModel(){
  if(contentBlurModel) return contentBlurModel;
  if(contentBlurLoadPromise) return contentBlurLoadPromise;
  contentBlurLoadPromise = (async ()=>{
    if(!window.tf){
      try{
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
          'https://unpkg.com/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
        ]);
      }catch(e){ throw new Error('Step 1/3 (TensorFlow.js) failed: '+e.message); }
    }
    if(!window.nsfwjs){
      try{
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/nsfwjs@4.2.1/dist/nsfwjs.min.js',
          'https://unpkg.com/nsfwjs@4.2.1/dist/nsfwjs.min.js',
        ]);
      }catch(e){ throw new Error('Step 2/3 (nsfwjs library) failed: '+e.message); }
    }
    // Model source priority:
    //  1. An explicit URL set in Settings (highest priority — always wins if present).
    //  2. A relative "models/nsfwjs/model.json" next to wherever this page itself is hosted —
    //     works automatically on GitHub Pages (or any host) with zero configuration, since it
    //     resolves relative to this page's own URL rather than needing you to know/paste it.
    //  3. The model bundled inside nsfwjs's own package, as a last resort (no separate network
    //     request needed once the JS above has loaded, since it ships base64-encoded inside
    //     nsfwjs.min.js itself) — but depends on nsfwjs's own CDN-hosted script working at all.
    const explicitUrl = (state.settings.contentBlurModelUrl||'').trim();
    const relativeUrl = new URL('models/nsfwjs/model.json', location.href).href;
    try{
      if(explicitUrl){
        contentBlurModel = await window.nsfwjs.load(explicitUrl);
      } else {
        try{
          const check = await fetch(relativeUrl, {method:'HEAD', cache:'no-store'});
          if(!check.ok) throw new Error('not found at '+relativeUrl);
          contentBlurModel = await window.nsfwjs.load(relativeUrl);
        }catch(relErr){
          contentBlurModel = await window.nsfwjs.load('MobileNetV2');
        }
      }
    }catch(e){ throw new Error('Step 3/3 (model init) failed: '+(e.message||e)); }
    return contentBlurModel;
  })();
  return contentBlurLoadPromise;
}
function contentBlurThreshold(){
  return state.settings.contentBlurLevel==='strict' ? 0.2 : 0.4;
}
// Returns a 0–1 "sensitive" score, or null if the element couldn't be analyzed (e.g. the image/video's
// server doesn't allow cross-origin pixel access — this is common for third-party posters/streams and
// just means we skip that one rather than error out).
async function classifyElementForBlur(el){
  try{
    const model = await loadContentBlurModel();
    const predictions = await model.classify(el);
    return predictions.filter(p=>['Porn','Hentai','Sexy'].includes(p.className)).reduce((sum,p)=>sum+p.probability, 0);
  }catch(e){
    return null;
  }
}
async function classifyAndBlurImage(imgEl){
  if(!state.settings.contentBlur || !imgEl || !imgEl.isConnected) return;
  const score = await classifyElementForBlur(imgEl);
  if(score===null || !imgEl.isConnected) return;
  if(score >= contentBlurThreshold()){
    imgEl.classList.add('content-blurred');
  }
}
function revealBlurredEl(el, ev){
  if(ev) ev.stopPropagation();
  el.classList.remove('content-blurred');
  el.classList.add('content-blur-revealed');
}
function contentBlurImgAttrs(){
  // Attach to any <img> we want covered — safe to include even when the feature is off (no-ops then).
  return `onload="this.classList.add('loaded'); classifyAndBlurImage(this);" onclick="if(this.classList.contains('content-blurred')){ revealBlurredEl(this, event); }"`;
}
function startVideoContentBlurWatch(videoEl){
  if(!state.settings.contentBlur || !videoEl) return null;
  const canvas = document.createElement('canvas');
  canvas.width = 160; canvas.height = 90;
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('playerStage');
  const interval = setInterval(async ()=>{
    if(!videoEl.isConnected || videoEl.paused || videoEl.readyState < 2) return;
    try{
      ctx.drawImage(videoEl, 0, 0, 160, 90);
    }catch(e){
      clearInterval(interval); // tainted canvas — this source's server doesn't allow analysis; stop trying
      return;
    }
    const score = await classifyElementForBlur(canvas);
    if(score===null){ clearInterval(interval); return; }
    if(stage) stage.classList.toggle('content-blurred-video', score >= contentBlurThreshold());
  }, 2500);
  return interval;
}
function allGenres(){

function itemProgressPct(item){
  if(item.type==='movie') return movieProgressPct(item);
  const prog = item.progress || {};
  let last = null;
  (item.seasons||[]).forEach(s=>{
    (s.episodes||[]).forEach(e=>{
      const key = 's'+s.number+'e'+e.number;
      if(prog[key]) last = prog[key];
    });
  });
  if(!last || !last.duration) return 0;
  return Math.min(100, Math.round((last.timestamp/last.duration)*100));
}
function movieProgressPct(item){
  const p = (item.progress||{}).movie;
  if(!p || !p.duration) return p && p.watched ? 100 : 0;
  return Math.min(100, Math.round((p.timestamp/p.duration)*100));
}
// Pulls a minute value out of strings like "148 min" / "45m" / "1h 30m" — falls back when missing
// or unparsable, since not every title has runtime data (e.g. titles added without OMDb/TMDB fetch).
function parseRuntimeMinutes(runtimeStr, fallback){
  if(!runtimeStr) return fallback;
  const s = String(runtimeStr);
  const hm = s.match(/(\d+)\s*h(?:r)?\s*(\d+)?\s*m?/i);
  if(hm) return parseInt(hm[1],10)*60 + (hm[2]?parseInt(hm[2],10):0);
  const m = s.match(/(\d+)/);
  return m ? parseInt(m[1],10) : fallback;
}
// Total known runtime (in seconds) for whatever's currently playing — a movie, or one specific
// episode. Used to convert "time the player has been open" into a real percentage instead of the
// old flat "5 minutes = fully watched" placeholder.
function getPlaybackDurationSeconds(item, seasonNum, epNum){
  if(seasonNum!=null){
    const season = (item.seasons||[]).find(s=>s.number===seasonNum);
    const ep = season && (season.episodes||[]).find(e=>e.number===epNum);
    const movieFallback = parseRuntimeMinutes(item.runtime, null);
    const epRuntime = ep && ep.runtime;
    return parseRuntimeMinutes(epRuntime, movieFallback || 45) * 60;
  }
  return parseRuntimeMinutes(item.runtime, 120) * 60;
}
// True once we have a *real* runtime for whatever's playing (fetched metadata), as opposed to
// getPlaybackDurationSeconds silently falling back to a flat 120min/45min guess.
function hasKnownRuntime(item, seasonNum, epNum){
  if(seasonNum!=null){
    const season = (item.seasons||[]).find(s=>s.number===seasonNum);
    const ep = season && (season.episodes||[]).find(e=>e.number===epNum);
    return !!(ep && ep.runtime) || !!item.runtime;
  }
  return !!item.runtime;
}
// Looks up the real runtime from TMDB for a movie, or one specific episode, resolving item.tmdbId
// by title search first if we don't already have it cached (same lookup fetchTmdbTrailer already
// does for hover previews). Returns whole minutes, or null if it couldn't be found — callers should
// just keep using whatever fallback they already had in that case.
async function fetchTmdbRuntimeMinutes(item, seasonNum, epNum){
  if(!state.settings.tmdb) return null;
  try{
    let tmdbId = item.tmdbId;
    const type = item.type==='series' ? 'tv' : 'movie';
    if(!tmdbId){
      const yearParam = item.year ? (type==='movie' ? `&year=${encodeURIComponent(item.year)}` : `&first_air_date_year=${encodeURIComponent(item.year)}`) : '';
      const searchRes = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(item.title)}${yearParam}`);
      const searchData = await searchRes.json();
      const match = searchData.results && searchData.results[0];
      if(!match) return null;
      tmdbId = match.id;
      item.tmdbId = tmdbId; // cache — benefits trailers/recommendations too, not just this lookup
    }
    if(seasonNum!=null){
      const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNum}/episode/${epNum}?api_key=${encodeURIComponent(state.settings.tmdb)}`);
      const data = await res.json();
      return data.runtime || null;
    } else {
      const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}`);
      const data = await res.json();
      return data.runtime || null;
    }
  }catch(e){
    return null; // silent fail, same spirit as fetchTmdbTrailer — a lookup miss shouldn't break playback
  }
}
// Kicks off the TMDB lookup above only when getPlaybackDurationSeconds is currently relying on the
// flat fallback (no real runtime cached yet). Once it resolves, caches the minutes on the item/episode
// (so this never needs to re-fetch for the same title), then upgrades the *live* player's total
// duration and bottom-bar progress bar from the guess to the real runtime.
function maybeUpgradeRuntimeFromTmdb(item, p){
  if(hasKnownRuntime(item, p.seasonNum, p.epNum)) return;
  fetchTmdbRuntimeMinutes(item, p.seasonNum, p.epNum).then(minutes=>{
    if(!minutes || state.player!==p) return; // no match, or the player moved on while we were fetching
    if(p.seasonNum!=null){
      const season = (item.seasons||[]).find(s=>s.number===p.seasonNum);
      const ep = season && season.episodes.find(e=>e.number===p.epNum);
      if(ep) ep.runtime = `${minutes} min`;
    } else {
      item.runtime = `${minutes} min`;
    }
    saveLib();
    const newTotal = minutes*60;
    p._totalSeconds = newTotal;
    p._elapsedSeconds = Math.min(p._elapsedSeconds||0, newTotal); // re-clamp against the corrected total
    updatePlayerProgressUI();
  });
}
// TV episodes count as watched at 90% (credits tend to run longer relative to a shorter runtime);
// movies at 95%, a bit stricter since their credits are a smaller share of the total length.
function getWatchedThreshold(seasonNum){
  return seasonNum!=null ? 0.90 : 0.95;
}
function isStarted(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && (p.timestamp>5 || p.watched);
  } else {
    const prog = item.progress||{};
    return Object.values(prog).some(p=>p.timestamp>5 || p.watched);
  }
}
function isFullyWatched(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && p.watched;
  } else {
    const seasons = item.seasons||[];
    const prog = item.progress||{};
    let hasEpisodes = false;
    for(const s of seasons){
      for(const e of (s.episodes||[])){
        hasEpisodes = true;
        const key = 's'+s.number+'e'+e.number;
        if(!prog[key] || !prog[key].watched) return false;
      }
    }
    return hasEpisodes;
  }
}

function router(){
  const hash = location.hash.replace('#','') || 'home';
  const hashParts = hash.split('/');
  const route = hashParts[0];
  const param = hashParts.slice(1).join('/'); // rejoin so multi-segment routes (e.g. genre/movie/Drama) keep every part
  state.route = route;

  if(route==='detail') state.detailSeason = 0;
  stopHeroAutoplay();
  clearAllCardHoverTimers();
  stopMyShowsCountdown();
  renderShell();
  const root = document.getElementById('pageRoot');
  switch(route){
    case 'movies': root.innerHTML = renderTypePage('movie'); break;
    case 'series': root.innerHTML = renderTypePage('series'); break;
    case 'live': root.innerHTML = renderLiveTV(); break;
    case 'schedule': root.innerHTML = renderSchedule(); if((state.schedule.tab||'mine')==='mine') loadMyShowsSchedule(); else loadScheduleData(); break;
    case 'collections': root.innerHTML = renderCollections(param); break;
    case 'settings': root.innerHTML = renderSettings(); break;
    case 'genre': {
      const genreParts = param.split('/');
      const genreTypeParam = genreParts[0];
      const genreName = decodeURIComponent(genreParts.slice(1).join('/') || '');
      root.innerHTML = renderGenrePage(genreTypeParam, genreName);
      break;
    }
    case 'detail':
      root.innerHTML = renderDetail(param);
      { const detailItem = getItem(param); if(detailItem) loadTmdbSimilarRow(detailItem); }
      break;
    default: root.innerHTML = renderHome();
  }
  startHeroAutoplay();
  window.scrollTo({top:0});
}

window.addEventListener('scroll', ()=>{

/* "Because You Liked X" — picks your most recently favorited title as the seed, then surfaces
   other library titles sharing at least one genre with it, ranked by how much genre overlap they
   have. Distinct from the TMDB-similar row on the detail page: that one calls out to TMDB for a
   single title you're actively viewing; this one runs entirely on your own library + favorites,
   on the Home page, and rotates automatically as your favorites change. */
function getBecauseYouLikedRow(items){
  const favorites = items.filter(i=>i.favorite);
  if(!favorites.length) return null;
  const seed = [...favorites].sort((a,b)=> new Date(b.favoritedAt||b.dateAdded||0) - new Date(a.favoritedAt||a.dateAdded||0))[0];
  const seedGenres = seed.genre || [];
  if(!seedGenres.length) return null;
  let related = items.filter(i=> i.id!==seed.id && (i.genre||[]).some(g=>seedGenres.includes(g)));
  if(!related.length) return null;
  related = related.sort((a,b)=>{
    const overlapA = (a.genre||[]).filter(g=>seedGenres.includes(g)).length;
    const overlapB = (b.genre||[]).filter(g=>seedGenres.includes(g)).length;
    if(overlapB!==overlapA) return overlapB-overlapA;
    return new Date(b.dateAdded||0)-new Date(a.dateAdded||0);
  });
  return {seed, items: related.slice(0, GENRE_ROW_CAP)};
}

function renderHome(){
  const items = state.lib.items;
  if(!items.length){
    return `<div class="page">${emptyState('Your vault is empty','Add your first movie or series to start building your personal streaming library.')}</div>`;
  }
  const recentMovies = items.filter(i=>i.type==='movie').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const recentSeries = items.filter(i=>i.type==='series').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const heroItems = [...recentMovies, ...recentSeries];
  const watched = items.filter(isStarted).sort((a,b)=> new Date(b.lastWatched||0)-new Date(a.lastWatched||0));
  const continueWatching = watched.filter(i=>!isFullyWatched(i));
  const recentlyAdded = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  const favorites = items.filter(i=>i.favorite).sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  // The most-recently-added title always gets a panoramic row if it has *any* banner art —
  // including the automatic TMDB-backdrop fallback. But it only gets pulled out of Recently
  // Added when you've manually curated banners for it yourself; the automatic fallback is just
  // a visual nicety and never hides a title from the normal list.
  const newest = recentlyAdded[0];
  const panoramicItem = newest && getPanoramicBanners(newest).length ? newest : null;
  const featured = newest && hasManualPanoramicBanners(newest) ? newest : null;
  const recentlyAddedRowItems = featured ? recentlyAdded.filter(i=>i.id!==featured.id) : recentlyAdded;

  let rows = '';
  if(continueWatching.length) rows += rowHtml('Continue Watching', continueWatching, {removable:true});
  rows += panoramicBannerHtml(panoramicItem);
  if(favorites.length) rows += rowHtml('Favorites', favorites);
  const becauseYouLiked = getBecauseYouLikedRow(items);
  if(becauseYouLiked) rows += rowHtml(`Because You Liked "${becauseYouLiked.seed.title}"`, becauseYouLiked.items);
  rows += rowHtml('Recently Added', recentlyAddedRowItems.slice(0, GENRE_ROW_CAP));
  allGenres().forEach(g=>{
    const inGenre = recentlyAdded.filter(i=>(i.genre||[]).includes(g));
    if(inGenre.length) rows += genreRowHtml(g, inGenre, 'all');
  });

  return `${heroCarouselHtml(heroItems)}<div class="page">${rows}</div>`;
}

function renderTypePage(type){
  const items = state.lib.items.filter(i=>i.type===type);
  const label = type==='movie' ? 'movies' : 'TV shows';
  if(!items.length){
    return `<div class="page">${emptyState(`No ${label} yet`, `Add your first ${type==='movie'?'movie':'series'} to get started.`)}</div>`;
  }
  const bp = state.browse[type];
  const isDefaultView = bp.sort==='recent' && bp.filter==='all';
  const filterBarHtml = `
    <div class="filter-bar">
      <select class="select-input" title="Sort" onchange="setBrowseSort('${type}', this.value)">
        <option value="recent" ${bp.sort==='recent'?'selected':''}>Recently Added</option>
        <option value="year" ${bp.sort==='year'?'selected':''}>Year</option>
        <option value="rating" ${bp.sort==='rating'?'selected':''}>My Rating</option>
        <option value="az" ${bp.sort==='az'?'selected':''}>A–Z</option>
      </select>
      <select class="select-input" title="Filter" onchange="setBrowseFilter('${type}', this.value)">
        <option value="all" ${bp.filter==='all'?'selected':''}>All Titles</option>
        <option value="unwatched" ${bp.filter==='unwatched'?'selected':''}>Unwatched Only</option>
      </select>
    </div>`;

  // Sorting/filtering flattens the page into a single grid — genre rows and the hero carousel
  // are a "browse by recency/genre" experience that doesn't map cleanly onto "sorted by rating"
  // or "unwatched only", so once either control leaves its default we switch views entirely
  // rather than trying to sort/filter inside every row.
  if(!isDefaultView){
    let list = [...items];
    if(bp.filter==='unwatched') list = list.filter(i=>!isStarted(i));
    list = sortBrowseItems(list, bp.sort);
    return `
      <div class="page">
        ${filterBarHtml}
        ${list.length ? `<div class="grid">${list.map(i=>cardHtml(i)).join('')}</div>` : emptyState('Nothing matches', 'Try a different sort or filter.', 'Reset', `setBrowseFilter('${type}','all'); setBrowseSort('${type}','recent');`)}
      </div>`;
  }

  const heroItems = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const watched = items.filter(isStarted).sort((a,b)=> new Date(b.lastWatched||0)-new Date(a.lastWatched||0));
  const continueWatching = watched.filter(i=>!isFullyWatched(i));
  const recentlyAdded = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  const newest = recentlyAdded[0];
  const panoramicItem = newest && getPanoramicBanners(newest).length ? newest : null;
  const featured = newest && hasManualPanoramicBanners(newest) ? newest : null;
  const recentlyAddedRowItems = featured ? recentlyAdded.filter(i=>i.id!==featured.id) : recentlyAdded;

  let rows = '';
  if(continueWatching.length) rows += rowHtml('Continue Watching', continueWatching, {removable:true});
  rows += panoramicBannerHtml(panoramicItem);
  rows += rowHtml('Recently Added', recentlyAddedRowItems.slice(0, GENRE_ROW_CAP));
  allGenres().forEach(g=>{
    const inGenre = recentlyAdded.filter(i=>(i.genre||[]).includes(g));
    if(inGenre.length) rows += genreRowHtml(g, inGenre, type);
  });

  return `${heroCarouselHtml(heroItems)}<div class="page">${filterBarHtml}${rows}</div>`;
}
function sortBrowseItems(list, sort){
  if(sort==='year') return list.sort((a,b)=> (parseInt(b.year)||0) - (parseInt(a.year)||0));
  if(sort==='rating') return list.sort((a,b)=> (b.myRating||0)-(a.myRating||0) || (parseFloat(b.rating)||0)-(parseFloat(a.rating)||0));
  if(sort==='az') return list.sort((a,b)=> (a.title||'').localeCompare(b.title||''));
  return list.sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)); // 'recent'
}
function setBrowseSort(type, val){
  state.browse[type].sort = val;
  document.getElementById('pageRoot').innerHTML = renderTypePage(type);
}
function setBrowseFilter(type, val){
  state.browse[type].filter = val;
  document.getElementById('pageRoot').innerHTML = renderTypePage(type);
}

function renderGenrePage(typeParam, genre){
  const backHref = typeParam==='movie' ? 'movies' : typeParam==='series' ? 'series' : 'home';
  const backLabel = typeParam==='movie' ? 'Movies' : typeParam==='series' ? 'TV Shows' : 'Home';
  let items = state.lib.items.filter(i=>(i.genre||[]).includes(genre));
  if(typeParam==='movie' || typeParam==='series') items = items.filter(i=>i.type===typeParam);
  items = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));
  return `
    <div class="page">
      <div class="filter-bar">
        <a class="btn btn-ghost" href="#${backHref}">&larr; ${esc(backLabel)}</a>
      </div>
      <h2 style="margin-bottom:16px;">${esc(genre)}</h2>
      ${items.length ? `<div class="grid">${items.map(i=>cardHtml(i)).join('')}</div>` : emptyState(`No ${esc(genre)} titles`, 'Nothing in this genre yet.')}
    </div>`;
}
/* Up to 6 panoramic banner URLs per title. Falls back to the old single `panoramicBanner`
   field, then to the TMDB backdrop if neither is set — so the row still shows *something*
   for a freshly-imported title even if you never paste custom banner art. */
function getPanoramicBanners(item){
  if(!item) return [];
  if(Array.isArray(item.panoramicBanners) && item.panoramicBanners.length) return item.panoramicBanners.slice(0,6);
  if(item.panoramicBanner) return [item.panoramicBanner];
  if(item.backdrop) return [item.backdrop];
  return [];
}
/* Whether the panoramic banners were something *you* actually set, as opposed to the
   automatic backdrop fallback above. This is what decides whether a title gets pulled out of
   Recently Added to be featured — the auto fallback alone should never do that; only your own
   curated banner links should. */
function hasManualPanoramicBanners(item){
  if(!item) return false;
  if(Array.isArray(item.panoramicBanners) && item.panoramicBanners.length) return true;
  if(item.panoramicBanner) return true;
  return false;
}

/* ---- Panoramic Row: up to 6 wide, panoramic-aspect cards for the same most-recently-added
   title, living in their own horizontally-scrollable row (same row/card mechanics as the rest
   of the app). Only rendered when that title has at least one Panoramic Banner URL set — if it
   doesn't, the row is simply absent (it doesn't fall back to an older title), and it reappears
   the moment a Panoramic Banner URL is added to that title. Plain art only — no title, no genre,
   no "Newly Added" tag, no Play / More Info buttons; like any other card, the whole thing is just
   clickable through to the detail page. ---- */
function panoramicBannerHtml(item){
  const banners = getPanoramicBanners(item);
  if(!banners.length) return '';
  return `
    <div class="row panoramic-row">
      <div class="panoramic-caption">Just Added &middot; <b>${esc(item.title)}</b></div>
      <div class="row-track">
        ${banners.map(url => `
        <div class="card panoramic-card" onclick="location.hash='detail/${item.id}'">
          <img src="${esc(url)}" alt="${esc(item.title)}" draggable="false" ${contentBlurImgAttrs()}>
          <span class="card-shine"></span>
        </div>`).join('')}
      </div>
    </div>`;
}

/* ---- Hero carousel ---- */
let heroAutoplayTimer = null;
function stopHeroAutoplay(){ clearInterval(heroAutoplayTimer); heroAutoplayTimer = null; }
function startHeroAutoplay(){
  stopHeroAutoplay();
  if(!state.heroItems || state.heroItems.length<2) return;
  heroAutoplayTimer = setInterval(()=> nextHeroSlide(), 6500);
}
function heroCarouselHtml(items){
  if(!items.length) return '';
  state.heroItems = items;
  state.heroIndex = 0;
  return `
    <div class="hero-carousel" id="heroCarousel" onmouseenter="stopHeroAutoplay()" onmouseleave="heroPointerUp(event); startHeroAutoplay()">
      <button class="hero-nav-btn hero-nav-prev" onclick="prevHeroSlide()">${ICON.chevronLeft}</button>
      <button class="hero-nav-btn hero-nav-next" onclick="nextHeroSlide()">${ICON.chevronRight}</button>
      <div class="hero-track" id="heroTrack"
        onmousedown="heroPointerDown(event)" onmousemove="heroPointerMove(event)" onmouseup="heroPointerUp(event)"
        ontouchstart="heroPointerDown(event)" ontouchmove="heroPointerMove(event)" ontouchend="heroPointerUp(event)">
        ${items.map(heroSlideHtml).join('')}
      </div>
    </div>`;
}
function heroSlideHtml(item){
  const pct = item.type==='movie' ? movieProgressPct(item) : itemProgressPct(item);
  const showResume = isStarted(item) && !isFullyWatched(item);
  return `
    <div class="hero-slide" onclick="heroSlideClick('${item.id}')">
      ${item.backdrop ? `<img src="${esc(item.backdrop)}" alt="" draggable="false" ${contentBlurImgAttrs()}>` : ''}
      <div class="hero-content">
        <span class="hero-badge">${item.type==='series'?'Series':'Movie'}</span>
        <h2>${esc(item.title)}</h2>
        <p>${esc(item.description||'No description added yet.')}</p>
        <div class="hero-btns">
          <button class="btn btn-primary" onclick="event.stopPropagation(); quickPlay('${item.id}')">${ICON.play} ${showResume?'Resume':'Play'}</button>
          <button class="btn btn-ghost" onclick="event.stopPropagation(); location.hash='detail/${item.id}'">More Info</button>
        </div>
        ${pct>0 ? `<div class="hero-progress"><div style="width:${pct}%"></div></div>` : ''}
      </div>
    </div>`;
}
let heroDragStartX = null, heroDragging = false, heroDidDrag = false;
function heroPointerDown(e){
  heroDragStartX = (e.touches ? e.touches[0].clientX : e.clientX);
  heroDragging = true;
  heroDidDrag = false;
  stopHeroAutoplay();
  const track = document.getElementById('heroTrack');
  if(track) track.classList.add('dragging');
}
function heroPointerMove(e){
  if(!heroDragging || heroDragStartX==null) return;
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  if(Math.abs(x - heroDragStartX) > 8) heroDidDrag = true;
}
function heroPointerUp(e){
  if(!heroDragging){ startHeroAutoplay(); return; }
  heroDragging = false;
  const track = document.getElementById('heroTrack');
  if(track) track.classList.remove('dragging');
  const endX = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
  const delta = heroDragStartX!=null ? endX - heroDragStartX : 0;
  if(Math.abs(delta) > 50){
    // Sliding left-to-right (positive delta) goes back; right-to-left goes forward.
    if(delta > 0) prevHeroSlide(); else nextHeroSlide();
  } else {
    startHeroAutoplay();
  }
  heroDragStartX = null;
  setTimeout(()=>{ heroDidDrag = false; }, 60);
}
function heroSlideClick(id){
  if(heroDidDrag) return;
  location.hash = 'detail/'+id;
}
function setHeroSlide(i){
  state.heroIndex = i;
  updateHeroTrack();
  startHeroAutoplay();
}
function nextHeroSlide(){
  if(!state.heroItems || !state.heroItems.length) return;
  state.heroIndex = (state.heroIndex+1) % state.heroItems.length;
  updateHeroTrack();
  startHeroAutoplay();
}
function prevHeroSlide(){
  if(!state.heroItems || !state.heroItems.length) return;
  state.heroIndex = (state.heroIndex-1+state.heroItems.length) % state.heroItems.length;
  updateHeroTrack();
  startHeroAutoplay();
}
function updateHeroTrack(){
  const track = document.getElementById('heroTrack');
  if(track) track.style.transform = `translateX(-${state.heroIndex*100}%)`;
}

function rowHtml(title, items, opts){
  opts = opts || {};
  return `
    <div class="row">
      <div class="row-head"><h3>${esc(title)}</h3></div>
      <div class="row-track">${items.map(i=>cardHtml(i, opts)).join('')}</div>
    </div>`;
}

// A row is capped at 10 tiles: if there are more than 10 titles, only the first 9 are shown and
// the 10th tile becomes a "See All" card linking to a page with the full list. If there are 10 or
// fewer titles, they're all shown as-is (no See All tile needed since nothing is hidden).
const GENRE_ROW_CAP = 10;
function cappedRowHtml(title, items, seeAllHref){
  let cardsHtml;
  if(items.length > GENRE_ROW_CAP){
    const shown = items.slice(0, GENRE_ROW_CAP-1);
    cardsHtml = shown.map(i=>cardHtml(i)).join('') + seeAllTileHtml(seeAllHref, items.length);
  } else {
    cardsHtml = items.map(i=>cardHtml(i)).join('');
  }
  return `
    <div class="row">
      <div class="row-head"><h3>${esc(title)}</h3></div>
      <div class="row-track">${cardsHtml}</div>
    </div>`;
}
function seeAllTileHtml(href, totalCount){
  return `
    <div class="card card-see-all" onclick="location.hash='${href}'">
      <div class="see-all-inner">
        <span class="see-all-count">+${totalCount - (GENRE_ROW_CAP-1)}</span>
        <span class="see-all-label">See All${ICON.chevronRight}</span>
      </div>
    </div>`;
}
function genreRowHtml(genre, items, typeParam){
  const href = `genre/${encodeURIComponent(typeParam)}/${encodeURIComponent(genre)}`;
  return cappedRowHtml(genre, items, href);
}

function isNew(item){
  if(!item.dateAdded) return false;
  return (Date.now() - new Date(item.dateAdded).getTime()) < 7*24*60*60*1000;
}

function cardHtml(item, opts){
  opts = opts || {};
  const pct = item.type==='movie' ? movieProgressPct(item) : itemProgressPct(item);
  return `
    <div class="card" onclick="location.hash='detail/${item.id}'" onmouseenter="cardHoverStart(event,'${item.id}')" onmouseleave="cardHoverEnd(event,'${item.id}')">
      ${posterEl(item)}
      <span class="card-shine"></span>
      <span class="card-badge">${item.type==='series'?'Series':'Movie'}</span>
      ${isNew(item) ? `<span class="card-new">New</span>` : ''}
      ${item.watchlist ? `<span class="card-watchlist-badge" title="On your watchlist">${ICON.watchlist}</span>` : ''}
      <button type="button" class="card-favorite-btn ${item.favorite?'is-fav':''}" data-fav-id="${item.id}" title="${item.favorite?'Remove from Favorites':'Add to Favorites'}" onclick="event.stopPropagation(); toggleFavorite('${item.id}')">${heartSvg(!!item.favorite)}</button>
      ${opts.removable ? `<button type="button" class="card-remove" title="Remove from Continue Watching" onclick="event.stopPropagation(); removeFromContinueWatching('${item.id}')">${ICON.close}</button>` : ''}
      <div class="card-overlay">
        <div class="card-play" onclick="event.stopPropagation(); quickPlay('${item.id}')">${ICON.play}</div>
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-meta">${esc(item.year||'')}${item.genre&&item.genre.length?' • '+esc(item.genre[0]):''}</div>
      </div>
      ${pct>0 ? `<div class="card-progress"><div style="width:${pct}%"></div></div>` : ''}
    </div>`;
}
function removeFromContinueWatching(id){
  const item = getItem(id);
  if(!item) return;
  item.progress = {};
  saveLib();
  router();
  toast('Removed from Continue Watching');
}

/* ---- Card tilt (mouse) / tap-shine (touch) ---- */
const CARD_HOVER_CAPABLE = window.matchMedia('(hover:hover) and (pointer:fine)').matches;
if(CARD_HOVER_CAPABLE){
  document.addEventListener('pointermove', e=>{
    const card = e.target.closest && e.target.closest('.card');
    if(!card) return;
    const r = card.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    card.style.setProperty('--tiltY', (px * 10).toFixed(2) + 'deg');
    card.style.setProperty('--tiltX', (-py * 10).toFixed(2) + 'deg');
  });
  // pointerleave doesn't bubble, but a capture-phase listener on document still sees it on the way down.
  document.addEventListener('pointerleave', e=>{
    const card = e.target && e.target.closest && e.target.closest('.card');
    if(card){ card.style.removeProperty('--tiltX'); card.style.removeProperty('--tiltY'); }
  }, true);
} else {
  document.addEventListener('touchstart', e=>{
    const card = e.target.closest && e.target.closest('.card');
    if(!card) return;
    card.classList.remove('tap-shine');
    void card.offsetWidth; // restart the CSS transition if the same card is tapped again quickly
    card.classList.add('tap-shine');
    setTimeout(()=> card.classList.remove('tap-shine'), 650);
  }, {passive:true});
}

/* ---- Trailer hover preview (TMDB) ---- */
const cardHoverTimers = {};
function clearAllCardHoverTimers(){
  Object.values(cardHoverTimers).forEach(t=>clearTimeout(t));
  for(const k in cardHoverTimers) delete cardHoverTimers[k];
}
function cardHoverStart(e, id){
  if(!state.settings.tmdb) return; // no TMDB key configured — plain hover only
  const cardEl = e.currentTarget;
  clearTimeout(cardHoverTimers[id]);
  cardHoverTimers[id] = setTimeout(()=> showCardTrailer(cardEl, id), 1500);
}
function cardHoverEnd(e, id){
  clearTimeout(cardHoverTimers[id]);
  hideCardTrailer(e.currentTarget);
}
async function showCardTrailer(cardEl, id){
  const item = getItem(id);
  if(!item || !cardEl) return;
  if(!item.trailerChecked){
    await fetchTmdbTrailer(item);
  }
  if(!cardEl.matches(':hover')) return; // mouse already left while we were fetching
  if(!item.trailerKey) return; // checked, none available
  if(cardEl.querySelector('.card-trailer')) return; // already showing
  const wrap = document.createElement('div');
  wrap.className = 'card-trailer';
  wrap.innerHTML = `
    <iframe src="https://www.youtube.com/embed/${item.trailerKey}?autoplay=1&mute=1&controls=0&modestbranding=1&playsinline=1&loop=1&playlist=${item.trailerKey}&rel=0&enablejsapi=1" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    <button type="button" class="card-trailer-mute" data-muted="true" title="Unmute" onclick="event.stopPropagation(); toggleCardTrailerMute(this)">${ICON.volumeOff}</button>`;
  cardEl.appendChild(wrap);
}
function hideCardTrailer(cardEl){
  const el = cardEl && cardEl.querySelector && cardEl.querySelector('.card-trailer');
  if(el) el.remove();
}
function toggleCardTrailerMute(btn){
  const wrap = btn.closest('.card-trailer');
  const iframe = wrap && wrap.querySelector('iframe');
  if(!iframe) return;
  const wasMuted = btn.dataset.muted !== 'false';
  const cmd = wasMuted ? 'unMute' : 'mute';
  try{ iframe.contentWindow.postMessage(JSON.stringify({event:'command', func:cmd, args:[]}), '*'); }catch(e){}
  btn.dataset.muted = wasMuted ? 'false' : 'true';
  btn.title = wasMuted ? 'Mute' : 'Unmute';
  btn.innerHTML = wasMuted ? ICON.volumeOn : ICON.volumeOff;
}
async function fetchTmdbTrailer(item){
  item.trailerChecked = true; // mark so we never re-fetch a title with no trailer on every hover
  if(!state.settings.tmdb){ return; }
  try{
    const type = item.type==='series' ? 'tv' : 'movie';
    const yearParam = item.year ? (type==='movie' ? `&year=${encodeURIComponent(item.year)}` : `&first_air_date_year=${encodeURIComponent(item.year)}`) : '';
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(item.title)}${yearParam}`);
    const searchData = await searchRes.json();
    const match = searchData.results && searchData.results[0];
    if(!match){ saveLib(); return; }
    item.tmdbId = match.id;
    const videoRes = await fetch(`https://api.themoviedb.org/3/${type}/${match.id}/videos?api_key=${encodeURIComponent(state.settings.tmdb)}`);
    const videoData = await videoRes.json();
    const vids = (videoData.results||[]).filter(v=>v.site==='YouTube');
    const trailer = vids.find(v=>v.type==='Trailer' && v.official) || vids.find(v=>v.type==='Trailer') || vids.find(v=>v.type==='Teaser') || vids[0];
    if(trailer) item.trailerKey = trailer.key;
    saveLib();
  }catch(e){
    // Silent fail — a missing preview shouldn't interrupt browsing.
    saveLib();
  }
}

/* ---- Global search ---- */
function toggleGlobalSearch(){
  state.globalSearchOpen = !state.globalSearchOpen;
  const container = document.getElementById('topbarSearch');
  const input = document.getElementById('globalSearchInput');
  if(container) container.classList.toggle('open', state.globalSearchOpen);
  if(!state.globalSearchOpen){
    state.globalSearchQuery = '';
    if(input) input.value = '';
    const box = document.getElementById('globalSearchResults');
    if(box){ box.innerHTML=''; box.classList.remove('show'); }
  } else {
    setTimeout(()=>{ if(input){ input.focus(); const len = input.value.length; input.setSelectionRange(len, len); } }, 60);
    renderGlobalSearchResults(); // shows recent searches immediately if the box is empty
  }
}
function onGlobalSearchInput(v){
  state.globalSearchQuery = v;
  renderGlobalSearchResults();
}
function addRecentSearch(term){
  term = (term||'').trim();
  if(!term) return;
  let recents = state.settings.recentSearches || [];
  recents = recents.filter(t=> t.toLowerCase() !== term.toLowerCase());
  recents.unshift(term);
  state.settings.recentSearches = recents.slice(0,4);
  saveSettings();
}
function clearRecentSearches(){
  state.settings.recentSearches = [];
  saveSettings();
  renderGlobalSearchResults();
}
function applyRecentSearch(term){
  state.globalSearchQuery = term;
  const input = document.getElementById('globalSearchInput');
  if(input){ input.value = term; input.focus(); }
  renderGlobalSearchResults();
}
function renderGlobalSearchResults(){
  const q = (state.globalSearchQuery||'').trim().toLowerCase();
  const box = document.getElementById('globalSearchResults');
  if(!box) return;
  if(!q){
    const recents = state.settings.recentSearches || [];
    if(!recents.length){ box.innerHTML=''; box.classList.remove('show'); return; }
    box.innerHTML = `
      <div class="notif-header"><span>Recent Searches</span><button type="button" class="notif-clear" onclick="event.stopPropagation(); clearRecentSearches()">Clear</button></div>
      ${recents.map(term=>`
      <div class="gsr-item" onclick="applyRecentSearch('${esc(term).replace(/'/g,"&#39;")}')">
        <div class="gsr-poster">${ICON.schedule}</div>
        <div class="gsr-title">${esc(term)}</div>
      </div>`).join('')}`;
    box.classList.add('show');
    return;
  }
  const itemMatches = state.lib.items.filter(i=> i.title.toLowerCase().includes(q)).slice(0,6);
  const channelMatches = (state.lib.channels||[]).filter(c=> c.name.toLowerCase().includes(q)).slice(0,4);
  if(!itemMatches.length && !channelMatches.length){
    box.innerHTML = `<div class="gsr-empty">No matches for "${esc(q)}"</div>`;
    box.classList.add('show');
    return;
  }
  box.innerHTML =
    itemMatches.map(i=>`
    <div class="gsr-item" onclick="goToSearchResult('${i.id}')">
      <div class="gsr-poster">${posterEl(i)}</div>
      <div><div class="gsr-title">${esc(i.title)}</div><div class="gsr-meta">${i.type==='series'?'Series':'Movie'}${i.year?' · '+esc(i.year):''}</div></div>
    </div>`).join('') +
    channelMatches.map(c=>`
    <div class="gsr-item" onclick="goToChannelResult('${c.id}')">
      <div class="gsr-poster">${c.logo?`<img src="${esc(c.logo)}" alt="" style="object-fit:contain;">`:fallbackHtml(c.name)}</div>
      <div><div class="gsr-title">${esc(c.name)}</div><div class="gsr-meta"><span class="channel-live-dot" style="display:inline-block; margin-right:5px; vertical-align:middle;"></span>Live · ${esc(c.category||'General')}</div></div>
    </div>`).join('');
  box.classList.add('show');
}
function goToSearchResult(id){
  addRecentSearch(state.globalSearchQuery);
  toggleGlobalSearch();
  location.hash = 'detail/'+id;
}
function goToChannelResult(id){
  addRecentSearch(state.globalSearchQuery);
  toggleGlobalSearch();
  if(state.route!=='live'){ location.hash = 'live'; setTimeout(()=>playChannel(id), 80); }
  else playChannel(id);
}
document.addEventListener('click', e=>{
  if(!state.globalSearchOpen) return;
  const box = document.getElementById('globalSearchResults');
  const container = document.getElementById('topbarSearch');
  if(box && box.contains(e.target)) return;
  if(container && container.contains(e.target)) return;
  toggleGlobalSearch();
});

/* =========================================================
   NOTIFICATIONS
   The panel is a static container outside #topbar (like #globalSearchResults),
   and toggling it never re-renders #topbar — so unlike the old search-icon bug,
   there's no stale-element mismatch for the outside-click closer to trip over.
========================================================= */
function unreadNotifCount(){ return (state.lib.notifications||[]).filter(n=>!n.read).length; }
function toggleNotifications(){
  state.notificationsOpen = !state.notificationsOpen;
  const panel = document.getElementById('notificationsPanel');
  if(!panel) return;
  if(state.notificationsOpen){ renderNotificationsPanel(); panel.classList.add('show'); }
  else panel.classList.remove('show');
}
function timeAgo(iso){
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff/60000);
  if(mins<1) return 'just now';
  if(mins<60) return mins+'m ago';
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+'h ago';
  return Math.floor(hrs/24)+'d ago';
}
function renderNotificationsPanel(){
  const panel = document.getElementById('notificationsPanel');
  if(!panel) return;
  const list = state.lib.notifications||[];
  if(!list.length){ panel.innerHTML = `<div class="notif-empty">No notifications yet</div>`; return; }
  panel.innerHTML = `
    <div class="notif-header"><span>Notifications</span><button type="button" class="notif-clear" onclick="event.stopPropagation(); clearAllNotifications()">Clear all</button></div>
    ${list.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" onclick="openNotification('${n.id}')">
      <div class="notif-icon">${ICON.link}</div>
      <div class="notif-body"><div class="notif-msg">${esc(n.message)}</div><div class="notif-time">${timeAgo(n.createdAt)}</div></div>
    </div>`).join('')}`;
}
function addNeedsLinkNotification(item, seasonNum){
  state.lib.notifications = state.lib.notifications || [];
  state.lib.notifications.unshift({
    id: uuid(),
    itemId: item.id,
    seasonNumber: seasonNum,
    message: `Season ${seasonNum} of "${item.title}" was added automatically — it needs a stream link before you can watch it.`,
    createdAt: new Date().toISOString(),
    read: false
  });
  saveLib();
  renderShell();
}
function openNotification(id){
  const n = (state.lib.notifications||[]).find(x=>x.id===id);
  if(!n) return;
  n.read = true;
  saveLib();
  toggleNotifications();
  renderShell();
  const item = getItem(n.itemId);
  if(!item){ toast('That title no longer exists'); return; }
  location.hash = 'detail/'+n.itemId;
  setTimeout(()=> openEditModal(n.itemId), 120);
}
function clearAllNotifications(){
  state.lib.notifications = [];
  saveLib();
  renderNotificationsPanel();
  renderShell();
}
document.addEventListener('click', e=>{
  if(!state.notificationsOpen) return;
  const panel = document.getElementById('notificationsPanel');
  const bell = document.getElementById('notifBellBtn');
  if(panel && panel.contains(e.target)) return;
  if(bell && bell.contains(e.target)) return;
  toggleNotifications();
});

function emptyState(title, sub, btnLabel, btnOnclick, secondaryLabel, secondaryOnclick){
  btnLabel = btnLabel || 'Add Title';
  btnOnclick = btnOnclick || 'openEditModal()';
  return `<div class="empty-state">
    <div class="empty-icon">${ICON.library}</div>
    <h3>${esc(title)}</h3>
    <p>${esc(sub)}</p>
    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="${btnOnclick}">${ICON.plus} ${esc(btnLabel)}</button>
      ${secondaryLabel ? `<button class="btn btn-ghost" onclick="${secondaryOnclick}">${esc(secondaryLabel)}</button>` : ''}
    </div>
  </div>`;
}

function quickPlay(id){
  const item = getItem(id);
  if(!item) return;
  if(item.type==='movie'){
    openPlayer(item, null, null, item.sources||[]);
  } else {
    // find first unwatched episode, else first episode
    const flat = [];
    (item.seasons||[]).forEach(s=> (s.episodes||[]).forEach(e=> flat.push({s:s.number,e})));
    let target = flat.find(f=>{
      const key = 's'+f.s+'e'+f.e.number;
      const p = (item.progress||{})[key];
      return !p || !p.watched;
    }) || flat[0];
    if(target) openPlayer(item, target.s, target.e, target.e.sources||[]);
    else toast('No episodes added yet');
  }
}

/* =========================================================
   TV SCHEDULE (TVmaze)
========================================================= */
function todayISO(offsetDays){
  const d = new Date();
  d.setDate(d.getDate() + (offsetDays||0));
  return d.toISOString().slice(0,10);
}
function formatScheduleDateLabel(iso){
  const d = new Date(iso+'T00:00:00');
  const diffDays = Math.round((d - new Date(todayISO()+'T00:00:00')) / 86400000);
  const dateStr = d.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric'});
  if(diffDays===0) return 'Today · '+dateStr;
  if(diffDays===1) return 'Tomorrow · '+dateStr;
  if(diffDays===-1) return 'Yesterday · '+dateStr;
  return dateStr;
}
function renderSchedule(){
  const st = state.schedule;
  const tab = st.tab || 'mine';
  return `
    <div class="page">
      <div class="filter-bar">
        <select id="scheduleTabSelect" class="select-input" style="width:auto; border-radius:8px;" onchange="setScheduleTab(this.value)">
          <option value="mine" ${tab==='mine'?'selected':''}>My TV Shows</option>
          <option value="broad" ${tab==='broad'?'selected':''}>Live TV</option>
        </select>
        ${tab==='broad' ? `
          <button class="btn-icon" title="Previous day" onclick="shiftScheduleDate(-1)">${ICON.chevronLeft}</button>
          <div class="schedule-date-label">${formatScheduleDateLabel(st.date)}</div>
          <button class="btn-icon" title="Next day" onclick="shiftScheduleDate(1)">${ICON.chevronRight}</button>
          <span class="tag" title="Change the country in Settings → TV Schedule">${esc(state.settings.scheduleCountry)}</span>
        ` : ''}
        <input class="search-input" placeholder="${tab==='mine'?'Search my shows...':'Search schedule...'}" value="${esc(st.search)}" oninput="setScheduleSearch(this.value)">
      </div>
      <div id="scheduleListing"></div>
    </div>`;
}
function setScheduleTab(val){
  state.schedule.tab = val;
  stopMyShowsCountdown();
  document.getElementById('pageRoot').innerHTML = renderSchedule();
  if(val==='mine') loadMyShowsSchedule(); else loadScheduleData();
}
function shiftScheduleDate(delta){
  const d = new Date(state.schedule.date+'T00:00:00');
  d.setDate(d.getDate()+delta);
  state.schedule.date = d.toISOString().slice(0,10);
  document.getElementById('pageRoot').innerHTML = renderSchedule();
  loadScheduleData();
}
function saveScheduleCountry(){
  const val = document.getElementById('scheduleCountryInput').value;
  state.settings.scheduleCountry = val.trim().toUpperCase().slice(0,2) || 'US';
  saveSettings();
  state.schedule.cache = {};
  toast('Schedule country saved');
  if(state.route==='schedule' && (state.schedule.tab||'mine')==='broad'){
    document.getElementById('pageRoot').innerHTML = renderSchedule();
    loadScheduleData();
  }
}
function setScheduleSearch(val){
  state.schedule.search = val;
  const tab = state.schedule.tab||'mine';
  if(tab==='mine'){
    if(state.schedule._myShowsResults) renderMyShowsListing(state.schedule._myShowsResults);
  } else {
    renderScheduleListing(state.schedule.cache[scheduleCacheKey()] || []);
  }
}
function scheduleCacheKey(){
  return state.settings.scheduleCountry+'_'+state.schedule.date;
}
async function loadScheduleData(){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const key = scheduleCacheKey();
  if(state.schedule.cache[key]){ renderScheduleListing(state.schedule.cache[key]); return; }
  container.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto;"></div><p style="margin-top:16px; color:var(--muted);">Loading schedule…</p></div>`;
  try{
    const res = await fetch(`https://api.tvmaze.com/schedule?country=${encodeURIComponent(state.settings.scheduleCountry)}&date=${state.schedule.date}`);
    if(!res.ok) throw new Error('TVmaze request failed (status '+res.status+')');
    const data = await res.json();
    state.schedule.cache[key] = data;
    if(document.getElementById('scheduleListing')) renderScheduleListing(data);
  }catch(e){
    if(container.isConnected) container.innerHTML = `<div class="empty-state"><h3>Couldn't load the schedule</h3><p>${esc(e.message||'Check your connection and try again.')}</p></div>`;
  }
}
function renderScheduleListing(data){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const search = (state.schedule.search||'').trim().toLowerCase();
  let list = data;
  if(search) list = list.filter(ep=> ((ep.show&&ep.show.name)||'').toLowerCase().includes(search));
  if(!list.length){
    container.innerHTML = emptyState('Nothing found', 'Try a different date, country code, or search.', 'Today', "state.schedule.date=todayISO(); document.getElementById('pageRoot').innerHTML=renderSchedule(); loadScheduleData();");
    return;
  }
  list = [...list].sort((a,b)=> (a.airtime||'').localeCompare(b.airtime||''));
  container.innerHTML = `<div class="schedule-list">${list.map(scheduleRowHtml).join('')}</div>`;
}

/* ---------- My TV Shows (watchlist + TVmaze next-episode countdown) ---------- */
function getWatchlistShows(){
  return state.lib.items.filter(i=> i.type==='series' && i.watchlist);
}
async function loadMyShowsSchedule(){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const shows = getWatchlistShows();
  if(!shows.length){
    container.innerHTML = emptyState('No TV shows on your watchlist', 'Add a series to your watchlist from its detail page to see its next-episode countdown here.', 'Browse TV Shows', "location.hash='series'");
    return;
  }
  container.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto;"></div><p style="margin-top:16px; color:var(--muted);">Loading your shows…</p></div>`;
  const results = await Promise.all(shows.map(fetchMyShowSchedule));
  if(!document.getElementById('scheduleListing')) return;
  state.schedule._myShowsResults = results;
  renderMyShowsListing(results);
}
async function fetchMyShowSchedule(item){
  const cacheKey = (item.title||'').toLowerCase().trim();
  const cached = state.schedule.myShowsCache[cacheKey];
  if(cached && (Date.now()-cached.fetchedAt) < 6*60*60*1000) return {item, show:cached.show};
  try{
    const res = await fetch(`https://api.tvmaze.com/singlesearch/shows?q=${encodeURIComponent(item.title)}&embed[]=nextepisode&embed[]=previousepisode`);
    if(!res.ok) throw new Error('not found');
    const show = await res.json();
    state.schedule.myShowsCache[cacheKey] = {show, fetchedAt:Date.now()};
    return {item, show};
  }catch(e){
    state.schedule.myShowsCache[cacheKey] = {show:null, fetchedAt:Date.now()};
    return {item, show:null};
  }
}
function nextEpisodeAirstamp(show){
  const ep = show && show._embedded && show._embedded.nextepisode;
  if(!ep || !ep.airstamp) return null;
  const t = new Date(ep.airstamp).getTime();
  return isNaN(t) ? null : t;
}
function renderMyShowsListing(results){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const search = (state.schedule.search||'').trim().toLowerCase();
  let list = results;
  if(search) list = list.filter(r=> (r.item.title||'').toLowerCase().includes(search));
  if(!list.length){
    container.innerHTML = emptyState('Nothing found', 'Try a different search.', '', '');
    return;
  }
  list = [...list].sort((a,b)=>{
    const an = nextEpisodeAirstamp(a.show), bn = nextEpisodeAirstamp(b.show);
    if(an && bn) return an-bn;
    if(an) return -1;
    if(bn) return 1;
    return (a.item.title||'').localeCompare(b.item.title||'');
  });
  container.innerHTML = `<div class="schedule-list">${list.map(myShowRowHtml).join('')}</div>`;
  startMyShowsCountdown();
}
function myShowRowHtml(r){
  const {item, show} = r;
  const img = (show && show.image && (show.image.medium||show.image.original)) || item.poster || '';
  const nextEp = show && show._embedded && show._embedded.nextepisode;
  const airstamp = nextEpisodeAirstamp(show);
  const epLabel = (nextEp && nextEp.season && nextEp.number) ? `S${nextEp.season}E${nextEp.number}` : '';
  const network = (show && ((show.network&&show.network.name)||(show.webChannel&&show.webChannel.name))) || '';
  const statusHtml = airstamp
    ? `<span class="schedule-countdown" data-airstamp="${airstamp}">--</span>`
    : (show ? `<span class="schedule-network" style="margin-top:0;">No upcoming episode</span>` : `<span class="schedule-network" style="margin-top:0; color:#ff8b93;">Not found on TVmaze</span>`);
  return `
    <div class="schedule-row" style="cursor:pointer;" onclick="openMyShowModal('${item.id}')">
      <div class="schedule-thumb">${img?`<img src="${esc(img)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>`:fallbackHtml(item.title||'?')}</div>
      <div class="schedule-info">
        <div class="schedule-show-title">${esc(item.title)}</div>
        <div class="schedule-ep-title">${epLabel?`<span class="schedule-ep-tag">${esc(epLabel)}</span> `:''}${esc((nextEp&&nextEp.name)||'')}</div>
        <div class="schedule-network">${esc(network)}</div>
      </div>
      ${statusHtml}
    </div>`;
}
let myShowsCountdownTimer = null;
function startMyShowsCountdown(){
  stopMyShowsCountdown();
  updateMyShowsCountdown();
  myShowsCountdownTimer = setInterval(updateMyShowsCountdown, 1000);
}
function stopMyShowsCountdown(){
  if(myShowsCountdownTimer){ clearInterval(myShowsCountdownTimer); myShowsCountdownTimer = null; }
}
function updateMyShowsCountdown(){
  const els = document.querySelectorAll('.schedule-countdown');
  if(!els.length){ stopMyShowsCountdown(); return; }
  els.forEach(el=>{
    const target = parseInt(el.dataset.airstamp, 10);
    const diff = target - Date.now();
    el.textContent = diff<=0 ? 'Airing now' : formatCountdown(diff);
  });
}
function formatCountdown(ms){
  const totalSec = Math.floor(ms/1000);
  const d = Math.floor(totalSec/86400), h = Math.floor((totalSec%86400)/3600), m = Math.floor((totalSec%3600)/60), s = totalSec%60;
  if(d>0) return `${d}d ${h}h`;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${s}s`;
  return `${s}s`;
}
function openMyShowModal(itemId){
  const item = getItem(itemId);
  if(!item) return;
  const cacheKey = (item.title||'').toLowerCase().trim();
  const cached = state.schedule.myShowsCache[cacheKey];
  const show = cached && cached.show;
  if(!show){
    openModal(`
      <div class="modal-head"><h2>${esc(item.title)}</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
      <p style="color:var(--muted); padding:4px 2px;">Couldn't find this show on TVmaze.</p>`);
    return;
  }
  const nextEp = show._embedded && show._embedded.nextepisode;
  const stripTags = (h)=> (h||'').replace(/<[^>]+>/g,'');
  const summary = stripTags(nextEp && nextEp.summary ? nextEp.summary : show.summary) || 'No synopsis available.';
  const epImg = nextEp && nextEp.image && (nextEp.image.medium||nextEp.image.original);
  const airDate = nextEp && nextEp.airstamp ? new Date(nextEp.airstamp).toLocaleString(undefined,{weekday:'long', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : null;
  openModal(`
    <div class="modal-head"><h2>${esc(show.name||item.title)}</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div style="display:flex; gap:16px; padding:2px; flex-wrap:wrap;">
      ${epImg?`<img src="${esc(epImg)}" alt="" style="width:170px; border-radius:8px; flex-shrink:0; object-fit:cover; aspect-ratio:16/9;" ${contentBlurImgAttrs()}>`:''}
      <div style="min-width:0; flex:1;">
        ${nextEp?`<div class="schedule-ep-tag" style="margin-bottom:6px; font-size:13px;">${nextEp.season&&nextEp.number?`S${nextEp.season}E${nextEp.number} — `:''}${esc(nextEp.name||'')}</div>`:''}
        ${airDate?`<div style="color:var(--highlight); font-weight:700; font-size:13px; margin-bottom:10px;">Airs ${esc(airDate)}</div>`:'<div style="color:var(--muted); font-size:13px; margin-bottom:10px;">No upcoming episode scheduled</div>'}
        <p style="color:#c7d5d3; font-size:13.5px; line-height:1.6;">${esc(summary)}</p>
      </div>
    </div>`);
}
function findChannelForNetwork(network){
  if(!network) return null;
  const channels = state.lib.channels||[];
  const n = network.toLowerCase();
  return channels.find(c=>c.name.toLowerCase()===n)
    || channels.find(c=> c.name.toLowerCase().includes(n) || n.includes(c.name.toLowerCase()))
    || null;
}
function scheduleRowHtml(ep){
  const show = ep.show || {};
  const img = (show.image && (show.image.medium||show.image.original)) || '';
  const network = (show.network&&show.network.name) || (show.webChannel&&show.webChannel.name) || '';
  const matched = findChannelForNetwork(network);
  const epLabel = (ep.season && ep.number) ? `S${ep.season}E${ep.number}` : '';
  return `
    <div class="schedule-row">
      <div class="schedule-time">${esc(ep.airtime||'--:--')}</div>
      <div class="schedule-thumb">${img?`<img src="${esc(img)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>`:fallbackHtml(show.name||'?')}</div>
      <div class="schedule-info">
        <div class="schedule-show-title">${esc(show.name||'Untitled')}</div>
        <div class="schedule-ep-title">${epLabel?`<span class="schedule-ep-tag">${esc(epLabel)}</span> `:''}${esc(ep.name||'')}</div>
        <div class="schedule-network">${esc(network||'Unknown network')}</div>
      </div>
      ${matched ? `<button class="btn btn-primary" style="flex-shrink:0;" onclick="playChannel('${matched.id}')">${ICON.play} Watch</button>` : ''}
    </div>`;
}

/* =========================================================
   WATCHLIST
========================================================= */
function ratingWidgetHtml(item){
  const rating = item.myRating || 0;
  let stars = '';
  for(let i=1;i<=5;i++){
    stars += `<button type="button" class="my-rating-star ${i<=rating?'is-filled':''}" title="Rate ${i} star${i>1?'s':''}" onclick="setMyRating('${item.id}', ${i})">${starSvg(i<=rating)}</button>`;
  }
  return `<div class="my-rating-widget">
    <span class="my-rating-label">My Rating</span>
    <div class="my-rating-stars">${stars}</div>
    ${rating>0 ? `<button type="button" class="my-rating-clear" title="Clear rating" onclick="setMyRating('${item.id}', 0)">${ICON.close}</button>` : ''}
  </div>`;
}
function starSvg(filled){
  return `<svg viewBox="0 0 24 24" fill="${filled?'currentColor':'none'}" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><polygon points="12 2 14.9 8.6 22 9.3 16.5 14.1 18.2 21 12 17.3 5.8 21 7.5 14.1 2 9.3 9.1 8.6"/></svg>`;
}
function setMyRating(itemId, rating){

  saveLib();
  const root = document.getElementById('pageRoot');

  loadTmdbSimilarRow(item);

function toggleFavorite(itemId){

  if(!item) return;

function openChannelsJsonImport(){
  openModal(`
    <div class="modal-head"><h2>Import Channels</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div class="field">

    </div>

      <label>...or paste directly</label>
      <textarea id="channelsJsonText" style="min-height:220px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px;" placeholder='#EXTM3U
#EXTINF:-1 tvg-logo="https://..." group-title="News" tvg-language="English",ABC
https://.../stream.m3u8
#EXTINF:-1 tvg-logo="https://..." group-title="Sports" tvg-language="French",Sports One
https://.../stream2.m3u8

— or JSON —
[
  { "name": "ABC", "logo": "https://...", "url": "https://...", "type": "News", "language": "English" }
]'></textarea>
      <div class="field-hint">
        <b>M3U/M3U8:</b> standard <code>#EXTINF</code> playlists — reads <code>tvg-logo</code>, <code>group-title</code>, and <code>tvg-language</code> automatically.<br>
        <b>JSON:</b> array of channels (or <code>{"channels":[...]}</code>). Each entry accepts <code>"url"</code>, <code>"urls":[...]</code>, or <code>"sources":[{"label","url"}]</code>, plus optional <code>"logo"</code>, <code>"type"</code> (category), and <code>"language"</code>.<br>
        Channels with no valid URL are skipped either way.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="applyChannelsJsonImport()">Import Channels</button>
    </div>
  `);
}
function handleChannelsJsonFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const ta = document.getElementById('channelsJsonText');
    if(ta) ta.value = e.target.result;
  };
  reader.readAsText(file);
}
function normalizeChannelsJson(data){
  const arr = Array.isArray(data) ? data : (data && Array.isArray(data.channels) ? data.channels : null);
  if(!arr) throw new Error('JSON must be an array of channels, or an object like {"channels":[...]}');
  return arr.map(c=>{
    const name = (c.name || c.title || 'Untitled Channel').toString();
    const logo = (c.logo || c.icon || c.image || '').toString();
    const category = (c.type || c.category || c.genre || 'General').toString();
    const language = (c.language || c.lang || '').toString();
    let sources = [];
    if(Array.isArray(c.sources)) sources = c.sources.map(s=>({label:(s.label||'Source').toString(), url:(s.url||s.link||'').toString()})).filter(s=>s.url);
    else if(Array.isArray(c.urls)) sources = c.urls.filter(Boolean).map((u,i)=>({label:'Source '+(i+1), url:u.toString()}));
    else if(typeof c.url==='string' && c.url) sources = [{label:'Source 1', url:c.url}];
    else if(typeof c.link==='string' && c.link) sources = [{label:'Source 1', url:c.link}];
    return {name, logo, category, language, sources};
  }).filter(c=>c.sources.length);
}
// Parses a standard M3U/M3U8 playlist (#EXTM3U header, #EXTINF metadata lines followed by a URL).
// Grabs tvg-logo, group-title, and tvg-language/tvg-country from each #EXTINF line when present.
function parseM3UPlaylist(text){
  const lines = text.split(/\r\n|\r|\n/);
  const entries = [];
  let current = null;
  const attrRegex = /([a-zA-Z0-9_-]+)="([^"]*)"/g;
  for(const raw of lines){
    const line = raw.trim();
    if(!line) continue;
    if(/^#EXTM3U/i.test(line)) continue;
    if(/^#EXTINF/i.test(line)){
      const commaIdx = line.indexOf(',');
      const attrsPart = commaIdx>-1 ? line.slice(0, commaIdx) : line;
      const namePart = commaIdx>-1 ? line.slice(commaIdx+1).trim() : '';
      const attrs = {};
      let m;
      attrRegex.lastIndex = 0;
      while((m = attrRegex.exec(attrsPart))) attrs[m[1].toLowerCase()] = m[2];
      current = {
        name: namePart || attrs['tvg-name'] || 'Untitled Channel',
        logo: attrs['tvg-logo'] || attrs['tvg-logo-small'] || '',
        category: attrs['group-title'] || '',
        language: attrs['tvg-language'] || attrs['tvg-country'] || '',
      };
    } else if(/^#EXTGRP:/i.test(line)){
      if(current && !current.category) current.category = line.slice(line.indexOf(':')+1).trim();
    } else if(line.startsWith('#')){
      continue; // other directives (#EXTVLCOPT, #KODIPROP, #EXTHTTP, etc.) aren't needed for playback here
    } else {
      // A plain, non-comment line is the stream URL for whichever #EXTINF preceded it.
      if(current){
        entries.push(Object.assign({}, current, {url:line}));
        current = null;
      } else {
        entries.push({name:`Channel ${entries.length+1}`, logo:'', category:'', language:'', url:line});
      }
    }
  }
  return entries;
}
function normalizeM3U(entries){
  return entries.filter(e=>e.url).map(e=>({
    name: e.name || 'Untitled Channel',
    logo: e.logo || '',
    category: e.category || 'General',
    language: e.language || '',
    sources: [{label:'Source 1', url:e.url}],
  }));
}
function applyChannelsJsonImport(){
  const text = document.getElementById('channelsJsonText').value.trim();
  if(!text){ toast('Paste or upload a file first'); return; }
  let normalized;
  if(/^#EXTM3U/i.test(text) || /#EXTINF/i.test(text)){
    try{ normalized = normalizeM3U(parseM3UPlaylist(text)); }
    catch(e){ toast('Failed to parse M3U playlist: '+e.message); return; }
  } else {
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ toast('Could not read that as JSON or M3U — check the file format'); return; }
    try{ normalized = normalizeChannelsJson(data); }
    catch(e){ toast(e.message); return; }
  }
  if(!normalized.length){ toast('No valid channels found (each needs at least one URL)'); return; }
  state.lib.channels = state.lib.channels || [];
  normalized.forEach(c=>{
    state.lib.channels.push({id:uuid(), dateAdded:new Date().toISOString(), ...c});
  });
  saveLib(); closeModal(); router();
  toast(`Imported ${normalized.length} channel(s)`);
}

// Suggests titles already in the user's own library sharing genres with this one — always playable
// since they're already in the collection, unlike a generic "similar movies" list from the internet.
// Computes "next episode to watch" and how many are left — TV Time-style tracking, based on the
// same watched/progress data already tracked per episode, just walked in real season/episode order.
function getWatchProgressSummary(item){
  if(item.type!=='series') return null;
  const allEpisodes = [];
  (item.seasons||[]).forEach(s=> (s.episodes||[]).forEach(e=> allEpisodes.push({season:s.number, episode:e})));
  if(!allEpisodes.length) return null;
  allEpisodes.sort((a,b)=> a.season-b.season || a.episode.number-b.episode.number);
  const prog = item.progress || {};
  const remaining = allEpisodes.filter(x=>{
    const key = 's'+x.season+'e'+x.episode.number;
    return !(prog[key] && prog[key].watched);
  });
  return { total: allEpisodes.length, remaining: remaining.length, next: remaining[0] || null };
}
function watchProgressBannerHtml(item){
  if(!item.watchlist) return '';
  const summary = getWatchProgressSummary(item);
  if(!summary || !summary.total) return '';
  if(summary.remaining===0){
    return `<div class="watch-progress-banner watch-progress-done">${ICON.check} All caught up!</div>`;
  }
  const next = summary.next;
  return `<div class="watch-progress-banner">
    <div class="wpb-next">
      <span class="wpb-label">Next Up</span>
      <span class="wpb-title">S${next.season}E${next.episode.number} — ${esc(next.episode.title||('Episode '+next.episode.number))}</span>
    </div>
    <div class="wpb-remaining">${summary.remaining} episode${summary.remaining===1?'':'s'} remaining</div>
  </div>`;
}
function getSimilarLibraryItems(item, limit){
  limit = limit || 12;
  const genres = new Set(item.genre||[]);
  if(!genres.size) return [];
  return state.lib.items
    .filter(i=>i.id!==item.id)
    .map(i=>({item:i, score:(i.genre||[]).filter(g=>genres.has(g)).length}))
    .filter(x=>x.score>0)
    .sort((a,b)=> b.score-a.score || new Date(b.item.dateAdded||0)-new Date(a.item.dateAdded||0))
    .slice(0,limit)
    .map(x=>x.item);
}
// TMDB's own "recommendations" for this title — external discovery, not yet in the library. Cards
// open the Add Title flow pre-filled via TMDB rather than a player, since there's no source for them yet.
async function loadTmdbSimilarRow(item){
  const container = document.getElementById('tmdbSimilarRow');
  if(!container) return;
  if(!item.tmdbId || !state.settings.tmdb) return;
  const type = item.type==='series' ? 'tv' : 'movie';
  try{
    const res = await fetch(`https://api.themoviedb.org/3/${type}/${item.tmdbId}/recommendations?api_key=${encodeURIComponent(state.settings.tmdb)}`);
    const data = await res.json();
    const results = (data.results||[]).filter(r=>r.poster_path).slice(0,12);
    if(!container.isConnected || !results.length) return;
    container.innerHTML = `
      <div class="row">
        <div class="row-head"><h3>You Might Also Like</h3></div>
        <div class="row-track">${results.map(r=>externalSimilarCardHtml(r, type)).join('')}</div>
      </div>`;
  }catch(e){ /* discovery row is optional polish — fail quietly rather than showing an error */ }
}
function externalSimilarCardHtml(tmdbItem, type){
  const title = type==='tv' ? tmdbItem.name : tmdbItem.title;
  const year = ((type==='tv' ? tmdbItem.first_air_date : tmdbItem.release_date)||'').split('-')[0];
  const poster = tmdbItem.poster_path ? `https://image.tmdb.org/t/p/w342${tmdbItem.poster_path}` : '';
  return `
    <div class="card" onclick="quickAddFromTmdb(${tmdbItem.id}, '${type}')" title="Add to your library">
      ${poster ? `<img src="${esc(poster)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>` : fallbackHtml(title)}
      <span class="card-badge">${type==='tv'?'Series':'Movie'}</span>
      <div class="card-overlay">
        <div class="card-play" style="background:var(--highlight);">${ICON.plus}</div>
        <div class="card-title">${esc(title)}</div>
        <div class="card-meta">${esc(year||'')}${year?' • ':''}Add to library</div>
      </div>
    </div>`;
}
function quickAddFromTmdb(tmdbId, type){
  state.editingId = null;
  state.editType = type==='tv' ? 'series' : 'movie';
  state.editGenres = [];
  state.editActors = [];
  state.editSources = [{label:'',url:''}];
  state.editSeasons = [];
  state.editImdbMeta = null;
  state.editFormDraft = null;
  renderEditModal(null);
  applyTmdbDetails(tmdbId, type).then(info=>{
    state.editImdbMeta = {imdbId:null, tmdbId:info.tmdbId, trailerKey:info.trailerKey, trailerChecked:!!info.trailerKey};
    toast('Metadata fetched from TMDB');
  }).catch(()=> toast('Could not fetch details for that title — add it manually below'));
}
function setDetailSeason(i){
  state.detailSeason=i;
  document.getElementById('pageRoot').innerHTML = renderDetail(state.routeParam);
  const item = getItem(state.routeParam);

}
function toggleMovieWatched(id){
  const item = getItem(id);
  const watched = isFullyWatched(item);
  item.progress = item.progress || {};
  item.progress.movie = watched
    ? {timestamp:0, duration:(item.progress.movie&&item.progress.movie.duration)||0, watched:false}
    : {timestamp:(item.progress.movie&&item.progress.movie.duration)||1, duration:(item.progress.movie&&item.progress.movie.duration)||1, watched:true};
  item.lastWatched = new Date().toISOString();
  saveLib();
  document.getElementById('pageRoot').innerHTML = renderDetail(id);
  toast(watched?'Marked as unwatched':'Marked as watched');
}
function toggleEpisodeWatched(itemId, seasonNum, epNum){
  const item = getItem(itemId);
  const key = 's'+seasonNum+'e'+epNum;
  item.progress = item.progress || {};
  const cur = item.progress[key];
  const watched = !!(cur && cur.watched);
  item.progress[key] = {timestamp:watched?0:((cur&&cur.duration)||1), duration:(cur&&cur.duration)||1, watched:!watched};
  item.lastWatched = new Date().toISOString();
  saveLib();
  document.getElementById('pageRoot').innerHTML = renderDetail(itemId);
  toast(watched?'Marked as unwatched':'Marked as watched');
}
function episodeMiniStarsHtml(itemId, seasonNum, ep){
  const rating = ep.myRating || 0;
  let stars = '';
  for(let i=1;i<=5;i++){
    stars += `<button type="button" class="ep-mini-star ${i<=rating?'is-filled':''}" title="Rate episode ${i} star${i>1?'s':''}" onclick="setEpisodeRating('${itemId}', ${seasonNum}, ${ep.number}, ${i})">${starSvg(i<=rating)}</button>`;
  }
  return stars;
}
function setEpisodeRating(itemId, seasonNum, epNum, rating){
  const item = getItem(itemId);
  if(!item) return;
  const season = (item.seasons||[]).find(s=>s.number===seasonNum);
  const ep = season && (season.episodes||[]).find(e=>e.number===epNum);
  if(!ep) return;
  ep.myRating = (ep.myRating===rating) ? 0 : rating;
  saveLib();
  document.getElementById('pageRoot').innerHTML = renderDetail(itemId);
  toast(ep.myRating ? `Episode rated ${ep.myRating} star${ep.myRating>1?'s':''}` : 'Episode rating cleared');
}
// Small lookup shared by the player's end-card — finds the exact episode object currently loaded
// (by season/episode number) so its rating can be read/written directly.
function findPlayerEpisode(item, seasonNum, epNum){
  const season = (item.seasons||[]).find(s=>s.number===seasonNum);
  return season && (season.episodes||[]).find(e=>e.number===epNum);
}
// Star row for the PLAYBACK END CARD specifically — deliberately separate from ratingWidgetHtml()/
// episodeMiniStarsHtml() above, whose onclick handlers re-render the whole detail page. That's fine
// on the detail page itself, but the player overlay sits on top of (and hides) pageRoot, so doing
// that here would silently update a page the user can't see instead of the stars they're looking
// at. setPlayerRating() below repaints just this row in place instead.
function playerEndCardStarsHtml(item){
  const p = state.player;
  const rating = item.type==='movie' ? (item.myRating||0) : ((findPlayerEpisode(item, p.seasonNum, p.epNum)||{}).myRating||0);
  let stars = '';
  for(let i=1;i<=5;i++){
    stars += `<button type="button" class="my-rating-star ${i<=rating?'is-filled':''}" title="Rate ${i} star${i>1?'s':''}" onclick="event.stopPropagation(); setPlayerRating(${i})">${starSvg(i<=rating)}</button>`;
  }
  return stars;
}
// Rates whatever the player currently has loaded (movie, or the specific episode) and repaints
// just the end-card's star row — saveLib() persists it exactly like every other rating write, so
// the detail page picks up the change next time it renders normally.
function setPlayerRating(rating){
  const p = state.player;
  if(!p) return;
  const item = getItem(p.itemId);
  if(!item) return;
  let newRating;
  if(item.type === 'movie'){
    item.myRating = (item.myRating===rating) ? 0 : rating;
    newRating = item.myRating;
  } else {
    const ep = findPlayerEpisode(item, p.seasonNum, p.epNum);
    if(!ep) return;
    ep.myRating = (ep.myRating===rating) ? 0 : rating;
    newRating = ep.myRating;
  }
  saveLib();
  const starsEl = document.getElementById('playerEndCardStars');
  if(starsEl) starsEl.innerHTML = playerEndCardStarsHtml(item);
  toast(newRating ? `Rated ${newRating} star${newRating>1?'s':''}` : 'Rating cleared');
}
function deleteItem(id){
  if(!confirm('Delete this title permanently?')) return;
  state.lib.items = state.lib.items.filter(i=>i.id!==id);
  state.lib.collections.forEach(c=> c.itemIds = c.itemIds.filter(x=>x!==id));
  saveLib(); location.hash='home'; toast('Title deleted');
}
function openAddToCollection(itemId){
  if(!state.lib.collections.length){
    if(confirm('No collections yet. Create one now?')) createCollection();
    return;
  }
  const html = state.lib.collections.map(c=>{
    const inCol = c.itemIds.includes(itemId);
    return `<button class="chip-btn ${inCol?'active':''}" style="width:100%;justify-content:flex-start;margin-bottom:8px;" onclick="toggleItemInCollection('${c.id}','${itemId}'); this.classList.toggle('active')">${inCol?ICON.check:''} ${esc(c.name)}</button>`;
  }).join('');
  openModal(`
    <div class="modal-head"><h2>Add to Collection</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div>${html}</div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal(); router()">Done</button></div>
  `);
}
