.link-health-title{font-size:13px; font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.link-health-url{font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.toggle-row{display:flex; align-items:center; gap:12px; margin-top:2px;}
.toggle-row-label{font-size:13px; font-weight:700; color:var(--text);}
.switch{position:relative; display:inline-block; width:44px; height:25px; flex-shrink:0;}
.switch input{opacity:0; width:0; height:0;}
.switch-slider{position:absolute; cursor:pointer; inset:0; background:#232837; border:1px solid #2c3244; border-radius:25px; transition:background var(--transition), border-color var(--transition);}
.switch-slider::before{
  content:''; position:absolute; height:17px; width:17px; left:3px; top:3px; border-radius:50%;
  background:#8a9997; transition:transform var(--transition), background var(--transition);
}
.switch input:checked + .switch-slider{background:var(--highlight-dim); border-color:rgba(61,219,217,.5);}
.switch input:checked + .switch-slider::before{transform:translateX(19px); background:var(--highlight); box-shadow:0 0 8px rgba(61,219,217,.5);}

/* ---------- Toast ---------- */
#toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); z-index:300;
  background:var(--surface2); border:1px solid #232837; padding:12px 20px; border-radius:8px; font-size:13.5px; font-weight:600;
  opacity:0; transition:all var(--transition); pointer-events:none; box-shadow:0 10px 30px rgba(0,0,0,.4);
  display:flex; align-items:center; gap:14px;
  /* Was previously only ever fed short action-confirmation strings ("Removed from Watchlist"); now
     pushNotification() also routes full notification messages through here, which run noticeably
     longer, so this needs an explicit cap + wrap instead of shrink-to-fit-content's unbounded width. */
  max-width:min(440px, calc(100vw - 32px)); white-space:normal; line-height:1.4;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0); bottom:76px;}
#toast.has-action{pointer-events:auto;}
.toast-undo-btn{
  background:none; border:none; color:var(--highlight); font-size:13px; font-weight:800;
  white-space:nowrap; letter-spacing:.02em; padding:2px; cursor:pointer; flex-shrink:0;
}
.toast-undo-btn:hover{text-decoration:underline;}

/* ---------- Mobile bottom nav ---------- */
.bottom-nav{display:none;}
@media (max-width:860px){
  .sidebar{display:none;}
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; z-index:50; background:var(--surface);
    border-top:1px solid #1a1d26; padding:8px 6px calc(8px + env(safe-area-inset-bottom)) 6px; justify-content:space-around;
  }
  .bottom-nav .nav-item{flex-direction:column; gap:3px; font-size:10px; padding:6px 8px; flex:1; align-items:center; text-align:center; border-radius:8px; position:relative;}
  .bottom-nav .nav-item.active{background:transparent; color:var(--highlight);}
  .bottom-nav .nav-item::before{display:none;}
  .bottom-nav .nav-item.active svg{filter:drop-shadow(0 0 6px rgba(61,219,217,.6));}
  .bottom-nav .nav-item.active::after{
    content:''; position:absolute; bottom:-1px; left:50%; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background:var(--highlight); box-shadow:0 0 6px rgba(61,219,217,.7);
  }
  .main{padding-bottom:90px;}
  .page, .topbar{padding-left:16px; padding-right:16px;}
  .hero-carousel{margin:14px 16px 0 16px; height:50vh;}
  .hero-content{padding:22px;}
  .hero-content h2{font-size:26px;}
  .hero-logo-slot{min-height:78px; margin-bottom:12px;}
  .hero-logo{max-width:240px; max-height:78px;}
  .detail-backdrop{margin:14px 16px;}
  .detail-body{padding:0 16px;}
  .row-head, .row-track, .episode-list{padding-left:16px; padding-right:16px;}
  .filter-bar{padding-right:16px;}
  /* iOS Safari auto-zooms the whole page in when a focused text field's computed font-size is under
     16px, and — since this is a hash-routed SPA with no real page reload — that zoomed-in state just
     carries over when you then navigate to another route. The fixed .bottom-nav (with the Home
     button) doesn't scroll away like normal content, so it's what makes the leftover zoom obvious:
     it ends up looking blown up on whatever page you land on next, most noticeably the detail/"more
     info" page reached right after tapping a search result. Forcing every field to 16px here stops
     the zoom from triggering in the first place, without changing how anything actually looks (the
     16px only applies while the field has focus/text entry on a touch device).*/
  input, select, textarea{font-size:16px !important;}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none !important; animation:none !important;}
}

/* Hide mobile bottom nav and regular sidebar in TV mode */
body.tv-mode .bottom-nav { display: none !important; }

body.tv-mode .sidebar {

}

body.tv-mode *:focus {
  outline: 3px solid var(--highlight) !important;
  outline-offset: 3px !important;
}
body.tv-mode .nav-item:focus {
  background: var(--highlight-dim);
  color: var(--highlight);

body.tv-mode .topbar {

body.tv-mode .card { flex: 0 0 220px; width: 220px; border-radius: 14px; }
body.tv-mode .card:focus,

body.tv-mode .row-head { padding: 0 48px; }
body.tv-mode .row-track { padding: 10px 48px 28px 48px; gap: 20px; }

/* TV buttons — larger tap targets */
body.tv-mode .btn { padding: 14px 24px; font-size: 15px; border-radius: 10px; }
body.tv-mode .btn:focus { outline: 3px solid var(--highlight) !important; }
body.tv-mode .btn-icon { width: 48px; height: 48px; }

/* TV detail page */
body.tv-mode .detail-backdrop { margin: 24px 48px; }
body.tv-mode .detail-body { padding: 0 48px; gap: 36px; }
body.tv-mode .detail-top { gap: 36px; }

body.tv-mode .detail-desc { font-size: 16px; }
body.tv-mode .tag { font-size: 14px; padding: 6px 14px; }

/* TV episode list */
body.tv-mode .episode-card { padding: 14px; gap: 20px; }
body.tv-mode .episode-card:focus { 
  background: var(--highlight-dim); 
  border-color: rgba(61,219,217,.5);
  outline: 3px solid var(--highlight) !important;
  transform: translateX(6px);
}
body.tv-mode .ep-thumb { width: 150px; height: 85px; }
body.tv-mode .ep-info .ep-title { font-size: 17px; }

body.tv-mode .player-progress-track { height: 22px; }

/* TV settings */
body.tv-mode .settings-section { max-width: 720px; padding: 28px; }
body.tv-mode .settings-section h3 { font-size: 18px; }
body.tv-mode .field label { font-size: 13px; }
body.tv-mode .field input,
body.tv-mode .field textarea,
body.tv-mode .field select { font-size: 16px; padding: 14px 16px; }

/* TV on-screen D-pad hint bar */
#tvDpadHint {
  position: fixed;
  bottom: 0; left: 0; right: 0;

  background: rgba(8,9,13,.92);

  box-shadow: 0 2px 0 #0a0b10;
}
body.tv-mode .main { padding-bottom: 52px; } /* room for D-pad hint bar */

/* =========================================================
   STATE / STORAGE
========================================================= */
// Safe logging helper for all the storage/migration diagnostics below. Some environments
// (certain WebViews, sandboxed devtools consoles, older browsers) don't implement every console
// method as a function -- console.info in particular has been seen missing/stubbed in the wild.
// Calling a non-function there throws INSIDE whatever .then()/.catch() handler is logging, which
// then gets swallowed by an outer .catch() and misreported as if the actual operation had failed,
// even though it hadn't -- purely diagnostic logging should never be able to do that. Every
// console.info/console.warn call in the storage code below goes through this instead.
function svLog(method, ...args){
  try{
    if(typeof console !== 'undefined' && typeof console[method] === 'function') console[method](...args);
    else if(typeof console !== 'undefined' && typeof console.log === 'function') console.log(`[${method}]`, ...args);
  }catch(e){ /* logging must never be able to throw and disrupt app behavior */ }
}
const LIB_KEY = 'sv_library';
const SET_KEY = 'sv_settings';

/* =========================================================
   INDEXEDDB SHADOW STORE — shared low-level helpers (idbOpen/idbPut/idbGet), plus the original
   Stage 1 pure-mirror primitives (idbShadowWrite/idbShadowVerify) from the localStorage ->
   IndexedDB migration. All three stores (skipData, progress, and now the library/catalog blob --
   see SKIPDATA STORE, PROGRESS STORE, and LIBRARY STORE below) have since moved past Stage 1 and no
   longer call idbShadowWrite/idbShadowVerify for their own keys; those two functions are kept here,
   unused for now, only because PROG_KEY's one-time legacy migration seed (see
   hydrateProgressIntoItems below) still calls idbShadowWrite, and per the staged-migration approach
   nothing gets deleted until Stage 4, once everything's been running on IndexedDB with no issues
   for a while. idbOpen/idbPut/idbGet remain the shared foundation every store's Stage 3 code below
   is actually built on.
========================================================= */
const IDB_DB_NAME = 'sv_shadow';
const IDB_DB_VERSION = 1;
const IDB_STORE = 'kv';
let idbDbPromise = null;

function idbOpen(){
  if(idbDbPromise) return idbDbPromise;
  idbDbPromise = new Promise((resolve, reject)=>{
    if(!window.indexedDB){ reject(new Error('IndexedDB unavailable in this browser/context')); return; }
    const req = indexedDB.open(IDB_DB_NAME, IDB_DB_VERSION);
    req.onupgradeneeded = ()=>{ if(!req.result.objectStoreNames.contains(IDB_STORE)) req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
  return idbDbPromise;
}
function idbPut(key, value){
  return idbOpen().then(db => new Promise((resolve, reject)=>{
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
    tx.onabort = ()=> reject(tx.error);
  }));
}
function idbGet(key){
  return idbOpen().then(db => new Promise((resolve, reject)=>{
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  }));
}
// Best-effort mirror write. Callers never await this -- a failure here (private
// mode, IndexedDB unsupported, quota, whatever) is logged and otherwise ignored.
// Deliberately does not touch state, does not retry, does not surface a toast.
function idbShadowWrite(key, value){
  idbPut(key, value).catch(err=>{
    svLog('warn', `[idb-shadow] mirror write failed for "${key}" -- localStorage is unaffected:`, err);
  });
}
// One-shot diagnostic run at startup: is what's already sitting in the IndexedDB
// mirror (from a previous session's shadow write) identical to what localStorage
// just produced? Purely informational in Stage 1 -- the result is never read by
// anything else and never changes app behavior. This is how mismatches (odd
// serialization edge cases, structured-clone quirks, etc.) get caught before
// Stage 3 makes IndexedDB load-bearing.
function idbShadowVerify(key, expected){
  idbGet(key).then(stored=>{
    if(stored === undefined){
      svLog('info', `[idb-shadow] "${key}": no prior mirror in IndexedDB yet (expected on first run after this change ships)`);
      return;
    }
    const a = JSON.stringify(stored), b = JSON.stringify(expected);
    if(a !== b){
      svLog('warn', `[idb-shadow] "${key}": MISMATCH between IndexedDB mirror and localStorage`, {indexedDB:stored, localStorage:expected});
    }else{
      svLog('info', `[idb-shadow] "${key}": mirror matches localStorage ✓`);
    }
  }).catch(err=>{
    svLog('warn', `[idb-shadow] mirror read failed for "${key}":`, err);
  });
}
// Must be defined before loadSettings() below, since it references this constant while validating
// s.subtitleSize. It used to live down near applySubtitleDisplayStyle(), which meant loadSettings()
// hit a temporal-dead-zone ReferenceError on every fresh page load (this function always runs before
// that later `const` was initialized), got swallowed by loadSettings()'s catch(e), and silently reset
// ALL settings — including saved OMDb/TMDB/SubDL API keys — back to blank defaults on every reload.
const SUBTITLE_SIZE_PX = {small:15, medium:19, large:24, xlarge:30};

function loadLib(){
  try{
    const raw = localStorage.getItem(LIB_KEY);
    if(!raw) return {items:[], collections:[], channels:[], notifications:[], skipData:{}};
    const d = JSON.parse(raw);
    if(!d.items) d.items = [];
    if(!d.collections) d.collections = [];
    if(!d.channels) d.channels = [];
    if(!d.notifications) d.notifications = [];
    // Custom Skip Segments (see CUSTOM SKIP SEGMENTS section, near the playback manager) — keyed
    // by skipDataKey(item, seasonNum, epNum): the bare IMDb ID for a movie, or "<imdbId>:s<N>e<N>"
    // for a single TV episode, so every episode carries its own independent skip list.
    if(!d.skipData || typeof d.skipData !== 'object') d.skipData = {};
    return d;
  }catch(e){ return {items:[], collections:[], channels:[], notifications:[], skipData:{}}; }
}
// saveLib() writes the library's CATALOG metadata (titles, seasons, episodes, ratings,
// collections, channels, notifications, skipData, everything except playback progress) to
// localStorage as one JSON string. Called ~50 places throughout this file. Debouncing coalesces
// bursts of calls into a single write ~800ms later. state.lib itself is updated synchronously as
// before -- only the disk write is deferred, so nothing that reads state.lib in-memory is
// affected. Flushed immediately on tab hide/unload.
//
// PROGRESS SPLIT (see PROGRESS STORE below): item.progress and item.lastWatched are stripped out
// of what actually gets WRITTEN here and persisted separately instead, via saveProgressStore().
// This is a persistence-layer-only split -- item.progress/item.lastWatched are NOT removed from
// the live item objects in state.lib.items, so every renderer/reader elsewhere in this file
// (isFullyWatched, isStarted, sorting, etc.) keeps working exactly as before with zero changes.
// Only the two things that write to disk changed: a progress tick no longer re-serializes the
// whole catalog, and a catalog edit (rename, rating, add episode...) no longer re-serializes
// every item's playback progress. Export/backup-code paths are unaffected by this split -- they
// read the live state.lib object directly, which still has progress inline, so old and new
// exports/backup codes remain byte-for-byte the same format.
function stripProgressForLibWrite(item){
  const { progress, lastWatched, ...rest } = item;
  return rest;
}
function buildLibSnapshotForWrite(){
  // skipData is excluded here too -- see the SKIPDATA STORE block below (Stage 3: this is the
  // first store fully cut over to IndexedDB, no longer written to localStorage at all).
  const { skipData, ...libRest } = state.lib;
  return { ...libRest, items: (state.lib.items||[]).map(stripProgressForLibWrite) };
}
let saveLibTimer = null, saveLibDirty = false;
function saveLib(){
  saveLibDirty = true;
  if(saveLibTimer) return;
  saveLibTimer = setTimeout(flushSaveLib, 800);
}
function flushSaveLib(){
  saveLibTimer = null;
  if(!saveLibDirty) return;
  saveLibDirty = false;
  const toWrite = buildLibSnapshotForWrite();
  try{
    localStorage.setItem(LIB_KEY, JSON.stringify(toWrite));
    // Sidecar write-timestamp, updated ONLY when the localStorage write above actually succeeded --
    // see LIBRARY STORE (Stage 3) below for why this matters: if this throws (quota exceeded on a
    // large catalog is the realistic case here), this timestamp intentionally falls behind the
    // IndexedDB write's own timestamp a few lines down, so startup reconciliation correctly detects
    // that localStorage is stale rather than assuming it's current just because a copy exists.
    try{ localStorage.setItem(LIB_SAVED_AT_KEY, String(Date.now())); }catch(e){ /* best-effort only */ }
  }
  catch(e){ svLog('warn', '[library] localStorage write failed (quota exceeded or private-mode storage) -- this edit only landed in IndexedDB until the next load reconciles it:', e); }
  // Stage 3 of the IndexedDB migration for this store (see LIBRARY STORE section below):
  // IndexedDB now gets a timestamped copy so a startup reconciliation can tell which side is
  // actually newer if the localStorage write above ever fails.
  idbPutLib(toWrite).catch(err=>{
    svLog('warn', '[library] IndexedDB write failed -- localStorage (if it succeeded above) remains available for next load:', err);
  });
}
window.addEventListener('beforeunload', flushSaveLib);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flushSaveLib(); });

/* =========================================================
   PROGRESS STORE — Stage 2 of the localStorage -> IndexedDB migration.
   Holds ONLY playback progress + lastWatched, keyed by item id, in its own localStorage key
   (PROG_KEY) so a progress tick (saveProgress() fires every ~5-10s during playback) never touches
   the catalog blob, and a catalog edit never touches progress. See flushSaveLib() above for the
   other half of this split.
   Shape on disk: { [itemId]: { entries: {<key>: {timestamp,duration,watched}, ...}, lastWatched } }
   `entries` is exactly what used to live at item.progress -- same key format
   ('movie' or 's<N>e<N>'), same value shape. Nothing about that shape changed, only where it's
   stored and how it's persisted.
========================================================= */
const PROG_KEY = 'sv_progress';
function loadProgressStore(){
  try{
    const raw = localStorage.getItem(PROG_KEY);
    return raw ? JSON.parse(raw) : null; // null = key doesn't exist yet (first run after this shipped)
  }catch(e){ return null; }
}
function buildProgressStoreSnapshot(){
  const store = {};
  (state.lib.items||[]).forEach(item=>{
    if((item.progress && Object.keys(item.progress).length) || item.lastWatched){
      store[item.id] = { entries: item.progress || {}, lastWatched: item.lastWatched || null };
    }
  });
  return store;
}
// Merges the separate progress store into the live item objects in state.lib.items, in memory,
// once at startup. After this runs, item.progress / item.lastWatched behave exactly as they
// always have everywhere else in the app. If there's no separate store yet (very first load after
// this change ships), each item's progress/lastWatched are already inline from the old combined
// format -- nothing to merge, but that inline data is what seeds the new store below.
function hydrateProgressIntoItems(store){
  const firstRun = store === null;
  const s = store || {};
  (state.lib.items||[]).forEach(item=>{
    const rec = s[item.id];
    if(rec){
      item.progress = rec.entries || {};
      item.lastWatched = rec.lastWatched || null;
    }
    // else: no entry in the store for this item yet -- leave whatever's already on it
    // (an empty {} for a brand-new item, or legacy inline progress on first run, handled below).
  });
  if(firstRun){
    // One-time seed: write out whatever was inline on each item as the new store's starting
    // content, immediately (not debounced), so the two keys are consistent on disk from this
    // point on rather than waiting for the next incidental progress write.
    const seeded = buildProgressStoreSnapshot();
    try{ localStorage.setItem(PROG_KEY, JSON.stringify(seeded)); }catch(e){}
    idbShadowWrite(PROG_KEY, seeded);
  }
}
let saveProgTimer = null, saveProgDirty = false;
function saveProgressStore(){
  saveProgDirty = true;
  if(saveProgTimer) return;
  saveProgTimer = setTimeout(flushSaveProgressStore, 800);
}

/* ---- Stage 3 cutover: progress is now persisted to IndexedDB as the primary store. ----
   Unlike skipData, progress writes are frequent (every ~5-10s during playback) and losing the
   last few seconds on a fast tab-close is the one failure mode worth real design attention here
   (flagged explicitly in the migration plan). IndexedDB writes are async, so a tab that closes
   immediately after a progress tick can't be guaranteed to have that async write land in time.

   The fix: every write -- routine or at-unload -- is timestamped (`savedAt`), and BOTH sides
   (IndexedDB and a localStorage fallback key) can independently end up holding data. At startup,
   whichever side has the newer `savedAt` wins and gets reconciled back into IndexedDB. This means
   the race can't lose data regardless of which write actually landed first:
     - Normal tick (tab stays open): IndexedDB write completes normally, fallback stays empty.
     - Fast tab-close: the unload handler writes a synchronous, guaranteed-to-land localStorage
       fallback copy *in addition to* firing off the IndexedDB write. Whichever of the two actually
       persisted, the newer-`savedAt` side wins on next load and gets copied to the other.
   PROG_KEY (the plain, unwrapped Stage 2 localStorage key) is now read-only -- consulted only as a
   migration seed for users whose last session predates this cutover -- and is never written again.
========================================================= */
const PROG_FALLBACK_KEY = 'sv_progress_fallback';
function writeProgressFallback(store){
  try{ localStorage.setItem(PROG_FALLBACK_KEY, JSON.stringify({savedAt: Date.now(), data: store})); }
  catch(e){ svLog('warn', '[progress] fallback localStorage write failed -- this save could not be persisted anywhere:', e); }
}
function clearProgressFallback(){
  try{ localStorage.removeItem(PROG_FALLBACK_KEY); }catch(e){}
}
function readProgressFallback(){
  try{
    const raw = localStorage.getItem(PROG_FALLBACK_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    return (parsed && typeof parsed==='object' && 'data' in parsed) ? parsed : null;
  }catch(e){ return null; }
}
function idbPutProgress(store){
  return idbPut(PROG_KEY, {savedAt: Date.now(), data: store});
}
// Normalizes whatever's in IndexedDB into {savedAt, data} shape. Defends against a hypothetical
// unwrapped legacy value (e.g. from an earlier version's Stage 1/2 shadow-write, which stored the
// raw object with no wrapper) by treating it as maximally old, so a properly timestamped record
// always wins the comparison in hydrateProgressFromIndexedDB() below.
function normalizeProgressRecord(raw){
  if(raw === undefined) return undefined;
  if(raw && typeof raw==='object' && 'data' in raw && 'savedAt' in raw) return raw;
  return { savedAt: 0, data: raw };
}
function flushSaveProgressStore(){
  saveProgTimer = null;
  if(!saveProgDirty) return;
  saveProgDirty = false;
  const store = buildProgressStoreSnapshot();
  try{
    idbPutProgress(store).then(()=>{
      clearProgressFallback(); // IndexedDB now holds this exact save -- any older fallback entry is moot
    }).catch(err=>{
      svLog('warn', '[progress] IndexedDB write failed -- writing an emergency localStorage fallback so progress is not lost:', err);
      writeProgressFallback(store);
    });
  }catch(syncErr){
    svLog('warn', '[progress] idbPut threw synchronously (unexpected) -- falling back to localStorage:', syncErr);
    writeProgressFallback(store);
  }
}
// Called specifically on tab close/hide, NOT the routine debounced path above. localStorage.setItem
// is synchronous and guaranteed to complete before the page can actually unload; the IndexedDB
// write below is best-effort in case this fired from a visibilitychange (tab hidden, not closed)
// rather than a genuine close, in which case it can still land normally.
function flushSaveProgressStoreForUnload(){
  clearTimeout(saveProgTimer);
  saveProgTimer = null;
  if(!saveProgDirty) return; // nothing pending -- no need for an emergency write
  saveProgDirty = false;
  const store = buildProgressStoreSnapshot();
  writeProgressFallback(store);
  idbPutProgress(store).then(clearProgressFallback).catch(()=>{ /* the fallback write above already covers this */ });
}
window.addEventListener('beforeunload', flushSaveProgressStoreForUnload);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flushSaveProgressStoreForUnload(); });

// Runs once at startup, fire-and-forget. state.lib already has a synchronous value for every item's
// progress/lastWatched from hydrateProgressIntoItems(loadProgressStore()) above (the Stage 2
// localStorage path) -- this swaps in whichever of {IndexedDB, the fallback key} is newer, and
// re-renders only if that turned out to differ from what's already showing. See the block comment
// above for why both sides need to be compared rather than just trusting IndexedDB blindly.
async function hydrateProgressFromIndexedDB(){
  let idbRecord;
  try{ idbRecord = normalizeProgressRecord(await idbGet(PROG_KEY)); }
  catch(err){
    svLog('warn', '[progress] IndexedDB read failed at startup -- keeping whatever loaded from localStorage:', err);
    return;
  }
  const fallback = readProgressFallback();

  let winner = null;
  if(idbRecord && fallback) winner = (fallback.savedAt > idbRecord.savedAt) ? fallback : idbRecord;
  else if(fallback) winner = fallback;
  else if(idbRecord) winner = idbRecord;

  if(winner){
    const current = buildProgressStoreSnapshot();
    if(JSON.stringify(winner.data) !== JSON.stringify(current)){
      hydrateProgressIntoItems(winner.data);
      router();
    }
    // Reconcile: make sure IndexedDB ends up holding the winner, then clear the fallback key now
    // that it's safely represented in IndexedDB (whether or not it was actually the winner).
    try{ await idbPutProgress(winner.data); clearProgressFallback(); }
    catch(e){ svLog('warn', '[progress] could not reconcile winner back into IndexedDB:', e); }
    return;
  }

  // Neither IndexedDB nor the fallback key has anything yet -- true first run after this cutover
  // shipped. Seed IndexedDB from whatever's already in memory (populated synchronously above).
  const seed = buildProgressStoreSnapshot();
  try{ await idbPutProgress(seed); }
  catch(e){ svLog('warn', '[progress] could not seed IndexedDB on first run -- will retry on next save:', e); }
}

/* =========================================================
   SKIPDATA STORE — Stage 3 of the migration: the first store cut over to being persisted in
   IndexedDB ONLY, no longer written to localStorage at all (see the migration plan -- skipData was
   picked to go first because the call-site audit found it's the only store where none of its 9
   read/write sites ever also touch progress or catalog metadata; it's already fully isolated in
   memory, so cutting it over doesn't ripple into anything else).

   The one real wrinkle vs. Stages 1-2: IndexedDB reads are async, but state.lib.skipData has
   always been available synchronously the instant the app starts. Rather than block startup on an
   IndexedDB read, this renders optimistically with whatever loadLib() already produced (empty, or
   legacy inline data left over from before this shipped), then swaps in the authoritative
   IndexedDB value the moment it resolves -- normally a few milliseconds later -- and re-renders
   ONLY if that turned out to differ from what was already showing. Skip segments are never part of
   the very first paint (home page etc.), only shown once a user opens a player or the skip
   manager, so this tiny async window carries essentially no practical risk of anyone seeing stale
   data. This mirrors the same "fetch async, then re-render if needed" pattern already used
   elsewhere in this file (see fetchTmdbTrailer, checkForNewSeasons).

   Falls back to a plain localStorage key (SKIPDATA_FALLBACK_KEY) ONLY if IndexedDB itself is
   unavailable or a write to it fails (unsupported browser, storage blocked, etc.) -- so a user in
   that situation doesn't silently lose custom skip segments; it's a safety net, not the normal path.
========================================================= */
const SKIPDATA_KEY = 'sv_skipdata';
const SKIPDATA_FALLBACK_KEY = 'sv_skipdata_fallback';
let saveSkipDataTimer = null, saveSkipDataDirty = false;
function saveSkipDataStore(){
  saveSkipDataDirty = true;
  if(saveSkipDataTimer) return;
  saveSkipDataTimer = setTimeout(flushSaveSkipDataStore, 800);
}
function flushSaveSkipDataStore(){
  saveSkipDataTimer = null;
  if(!saveSkipDataDirty) return;
  saveSkipDataDirty = false;
  const snapshot = state.lib.skipData || {};
  try{
    idbPut(SKIPDATA_KEY, snapshot).then(()=>{
      // IndexedDB write succeeded -- clear any stale safety-net entry from a past failure so it can
      // never be mistaken for newer data than what's actually in IndexedDB now.
      try{ localStorage.removeItem(SKIPDATA_FALLBACK_KEY); }catch(e){}
    }).catch(err=>{
      svLog('warn', '[skipdata] IndexedDB write failed -- falling back to a localStorage safety-net key so custom skip segments are not silently lost:', err);
      try{ localStorage.setItem(SKIPDATA_FALLBACK_KEY, JSON.stringify(snapshot)); }
      catch(e){ svLog('warn', '[skipdata] localStorage safety-net write also failed -- this save could not be persisted anywhere:', e); }
    });
  }catch(syncErr){
    // Defensive only: idbPut should always return a Promise (a synchronous throw inside a Promise
    // executor auto-converts to a rejection per spec), but guard against a genuinely synchronous
    // throw anyway -- e.g. an unexpected environment/polyfill quirk -- so a single failed save can
    // never silently skip the safety net or throw out of a debounced timer callback.
    svLog('warn', '[skipdata] idbPut threw synchronously (unexpected) -- falling back to localStorage safety-net:', syncErr);
    try{ localStorage.setItem(SKIPDATA_FALLBACK_KEY, JSON.stringify(snapshot)); }
    catch(e){ svLog('warn', '[skipdata] localStorage safety-net write also failed -- this save could not be persisted anywhere:', e); }
  }
}
window.addEventListener('beforeunload', flushSaveSkipDataStore);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flushSaveSkipDataStore(); });

// Runs once at startup, fire-and-forget (not awaited by anything). See the block comment above for
// why this is safe to resolve asynchronously rather than blocking the initial render.
async function hydrateSkipDataFromIndexedDB(){
  let stored;
  try{
    stored = await idbGet(SKIPDATA_KEY);
  }catch(err){
    svLog('warn', '[skipdata] IndexedDB read failed at startup -- keeping whatever loadLib() already produced:', err);
    return;
  }

  // Diagnostic only: if a legacy inline skipData blob is still sitting in the sv_library
  // localStorage key (written by a version of this app from before this cutover), compare it
  // against IndexedDB so a divergence gets logged rather than silently favoring one side.
  try{
    const legacyRaw = localStorage.getItem(LIB_KEY);
    const legacyParsed = legacyRaw ? JSON.parse(legacyRaw) : null;
    if(legacyParsed && legacyParsed.skipData && Object.keys(legacyParsed.skipData).length){
      const compareAgainst = stored !== undefined ? stored : (state.lib.skipData||{});
      if(JSON.stringify(legacyParsed.skipData) !== JSON.stringify(compareAgainst)){
        svLog('warn', '[skipdata] legacy inline skipData in sv_library differs from the IndexedDB store -- IndexedDB is authoritative going forward, flagging in case this indicates data that would otherwise be lost:', {legacy:legacyParsed.skipData, indexedDB:compareAgainst});
      }
    }
  }catch(e){ /* best-effort diagnostic only, never blocks the real hydration below */ }

  if(stored !== undefined){
    const changed = JSON.stringify(stored) !== JSON.stringify(state.lib.skipData||{});
    state.lib.skipData = stored;
    if(changed) router(); // only re-render if the authoritative value actually differs from what's already showing
    return;
  }

  // No IndexedDB entry yet -- first load after this shipped. Seed IndexedDB from, in priority
  // order: a localStorage safety-net entry from a previous failed write (shouldn't normally exist
  // yet, but covers a partial-migration edge case), else whatever's already on state.lib.skipData
  // (legacy inline data from the old combined sv_library format, or {} for a fresh install).
  let seed = state.lib.skipData || {};
  try{
    const fallbackRaw = localStorage.getItem(SKIPDATA_FALLBACK_KEY);
    if(fallbackRaw){
      const parsed = JSON.parse(fallbackRaw);
      if(parsed && typeof parsed==='object' && Object.keys(parsed).length) seed = parsed;
    }
  }catch(e){ /* ignore -- fall through to whatever seed already is */ }
  state.lib.skipData = seed;
  try{ await idbPut(SKIPDATA_KEY, seed); }
  catch(e){ svLog('warn', '[skipdata] could not seed IndexedDB on first run -- will retry on the next save:', e); }
}

/* =========================================================
   LIBRARY STORE — Stage 3 cutover for LIB_KEY (the catalog metadata blob: items/collections/
   channels/notifications). Same shape as PROGRESS STORE's Stage 3 above, but simpler: catalog
   edits aren't a hot 5-10s loop, and flushSaveLib() already writes localStorage synchronously on
   every flush -- routine AND at unload, same single code path -- so there's no separate tab-close
   race to design around here, and no need for a dedicated always-written fallback key the way
   progress needed one.

   The real risk for THIS store specifically is quota, not timing: it's the largest of the three
   stores and the only one whose size scales with the size of the whole library, so
   localStorage.setItem(LIB_KEY, ...) is the most likely of the three writes to actually throw on a
   big catalog -- while the IndexedDB write right after it (unconditional, not inside that try)
   still succeeds. That's the divergence this reconciles: LIB_SAVED_AT_KEY is a tiny sidecar
   timestamp that flushSaveLib() only updates when the localStorage write itself didn't throw, so if
   it ever does, that sidecar timestamp falls behind the IndexedDB write's own timestamp. At
   startup, whichever side is actually newer wins, exactly like PROGRESS STORE above -- except here
   "newer" is resolved against that sidecar key instead of a second wrapped copy, since localStorage
   is already written on the very same path as IndexedDB rather than a separate emergency-only one.

   LIB_KEY's on-disk format in localStorage is UNCHANGED (still the plain catalog object, not
   wrapped) -- loadLib() and the legacy-diagnostic read in hydrateSkipDataFromIndexedDB() above both
   keep working exactly as before. Only the IndexedDB side is wrapped with {savedAt, data}.
========================================================= */
const LIB_SAVED_AT_KEY = 'sv_library_saved_at';
function idbPutLib(data){
  return idbPut(LIB_KEY, {savedAt: Date.now(), data});
}
// See normalizeProgressRecord above -- identical defensive shape-normalization, here for LIB_KEY's
// IndexedDB record: a legacy unwrapped value (from this store's own Stage 1 shadow writes, before
// this cutover) is treated as maximally old so a properly timestamped record always wins below.
function normalizeLibRecord(raw){
  if(raw === undefined) return undefined;
  if(raw && typeof raw==='object' && 'data' in raw && 'savedAt' in raw) return raw;
  return { savedAt: 0, data: raw };
}
function readLibSavedAt(){
  try{
    const n = parseInt(localStorage.getItem(LIB_SAVED_AT_KEY), 10);
    return isNaN(n) ? 0 : n;
  }catch(e){ return 0; }
}
// Applies an IndexedDB-sourced catalog snapshot into state.lib, in memory. Per-item
// progress/lastWatched are a wholly separate store now (see PROGRESS STORE above) and must survive
// this regardless of which snapshot wins here, so they're carried over from whatever's already on
// state.lib.items rather than coming from `data` (buildLibSnapshotForWrite() never includes them).
// skipData is likewise its own Stage-3 store (see SKIPDATA STORE above) and is deliberately left
// untouched here.
function applyLibSnapshot(data){
  const progressById = {};
  (state.lib.items||[]).forEach(it=>{ progressById[it.id] = {progress: it.progress, lastWatched: it.lastWatched}; });
  state.lib.items = (data.items||[]).map(it=>{
    const p = progressById[it.id];
    return p ? {...it, progress: p.progress, lastWatched: p.lastWatched} : it;
  });
  state.lib.collections = data.collections || [];
  state.lib.channels = data.channels || [];
  state.lib.notifications = data.notifications || [];
}
// Runs once at startup, fire-and-forget. state.lib already has a synchronous value from loadLib()
// (localStorage) for the very first render, same as every other store above. This reconciles it
// against IndexedDB and re-renders only if the winner actually differs from what's already showing
// -- see the block comment above for how the two sides get compared without a second wrapped copy.
// Supersedes the old Stage-1 idbShadowVerify(LIB_KEY, ...) diagnostic-only check that used to run
// here (see PROG_KEY's equivalent note above the old shadow-verify call for the same reasoning).
async function hydrateLibFromIndexedDB(){
  let idbRecord;
  try{ idbRecord = normalizeLibRecord(await idbGet(LIB_KEY)); }
  catch(err){
    svLog('warn', '[library] IndexedDB read failed at startup -- keeping whatever loaded from localStorage:', err);
    return;
  }
  const localSavedAt = readLibSavedAt();
  const currentSnapshot = buildLibSnapshotForWrite();

  if(idbRecord && idbRecord.savedAt > localSavedAt){
    // IndexedDB holds a save that localStorage never actually reflected -- most likely a
    // quota-exceeded localStorage write on a large catalog. IndexedDB is authoritative here.
    if(JSON.stringify(idbRecord.data) !== JSON.stringify(currentSnapshot)){
      applyLibSnapshot(idbRecord.data);
      router();
    }
    // Best-effort repair so localStorage stops lagging behind. If this fails again (still over
    // quota), that's fine -- IndexedDB remains the source of truth and this same repair is retried
    // on every future flush and every future load, same as any other localStorage write failure.
    try{
      localStorage.setItem(LIB_KEY, JSON.stringify(idbRecord.data));
      localStorage.setItem(LIB_SAVED_AT_KEY, String(idbRecord.savedAt));
    }catch(e){ /* still over quota or blocked -- IndexedDB stays authoritative regardless */ }
    return;
  }

  // localStorage is at least as fresh (the common case) -- make sure IndexedDB matches it, in case
  // this is the very first load after this cutover shipped, or a previous IndexedDB write failed.
  if(!idbRecord || JSON.stringify(idbRecord.data) !== JSON.stringify(currentSnapshot)){
    try{ await idbPutLib(currentSnapshot); }
    catch(e){ svLog('warn', '[library] could not reconcile IndexedDB with localStorage on startup:', e); }
  }
}

function loadSettings(){

    // domain becomes "Source 1" on every title, the second "Source 2", and so on. Transparently

    if(typeof s.playerBrightness !== 'number' || isNaN(s.playerBrightness)) s.playerBrightness = 1;

    if(!Array.isArray(s.tmdbTop100Excluded.tv)) s.tmdbTop100Excluded.tv = [];
    // Titles dismissed from the detail page's "You Might Also Like" row (see loadTmdbSimilarRow /
    // removeFromSimilarRow below) — same shape/idea as tmdbTop100Excluded above, but scoped to the
    // per-title recommendations row rather than the Top 100 collection.
    if(!s.similarExcluded || typeof s.similarExcluded !== 'object') s.similarExcluded = {};
    if(!Array.isArray(s.similarExcluded.movie)) s.similarExcluded.movie = [];
    if(!Array.isArray(s.similarExcluded.tv)) s.similarExcluded.tv = [];
    // Whether the Home/Movies/TV "Featured Release" card lets its artwork bleed slightly above the

    if(typeof s.featuredArtworkBleed !== 'boolean') s.featuredArtworkBleed = true;

    if(typeof s.skipSegmentsEnabled !== 'boolean') s.skipSegmentsEnabled = true;

  }catch(e){ return {omdb:'',tmdb:'',subdl:'',vidsrcDomain:'vidsrc-embed.su', streamingProviders:[], blockPopupAds:false, contentBlur:false, contentBlurLevel:'moderate', contentBlurModelUrl:'', scheduleCountry:'US', recentSearches:[], supabaseUrl:'', supabaseKey:'', playerBrightness:1, subtitleSize:'medium', subtitleColor:'#ffffff', subtitleBgColor:'#000000', subtitleBgOpacity:72, tmdbTop100Excluded:{movie:[],tv:[]}, similarExcluded:{movie:[],tv:[]}, featuredArtworkBleed:true, bannedWords:[], bannedGenres:[], skipSegmentsEnabled:true, skipNotify:true}; }
}

function uuid(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=>{
    const r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
/* =========================================================
   SHARED TITLE SEARCH: relevance ranking + typo tolerance
   Used by every text-search entry point in the app (global topbar
   search, mobile search, manage-library search, skip-manager add
   search, live TV channel search, schedule search, My Shows search)
   so results rank and behave the same everywhere.
========================================================= */
function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
// Cheap O(n) check for edit distance <= 1 (handles one substitution, one
// insertion, or one deletion) — enough for "one misspelled/missing/extra
// letter" without pulling in a real fuzzy-search library.
function isTypoOf(a, b){
  if(a===b) return true;
  const la=a.length, lb=b.length;
  if(Math.abs(la-lb)>1) return false;
  let i=0, j=0, mismatches=0;
  while(i<la && j<lb){
    if(a[i]===b[j]){ i++; j++; continue; }
    mismatches++;
    if(mismatches>1) return false;
    if(la===lb){ i++; j++; }        // substitution
    else if(la>lb){ i++; }          // extra letter in a
    else { j++; }                   // extra letter in b
  }
  mismatches += (la-i) + (lb-j);
  return mismatches<=1;
}
// Scores how well `text` matches query `q` (both should be pre-lowercased):
// exact match > starts-with > word-boundary match > plain substring > no match.
function textMatchScore(text, q, qRe){
  if(!text) return 0;
  if(text===q) return 100;
  if(text.startsWith(q)) return 80;
  if(qRe.test(text)) return 60;
  if(text.includes(q)) return 40;
  return 0;
}
// Ranked, typo-tolerant search over a list. `textFn` extracts the searchable
// string (title/name) from each entry; `tieBreakFn` optionally extracts
// [rating, year] for sorting entries that score equally (higher/newer first).
// `extraTextFn` is optional and extracts secondary searchable text (genre,
// cast, description, ...) — a match found only there scores lower than any
// title match (title's weakest score is 40; extra-field scores are capped
// at 25), so title hits always surface first while still letting a query
// like a genre or actor name pull in relevant results.
// Falls back to a Levenshtein-distance-1 pass over individual words only
// when the strict pass finds nothing, so exact/substring matches are never
// pushed aside by fuzzy noise.
function rankedTitleSearch(list, query, textFn, tieBreakFn, extraTextFn){
  const q = (query||'').trim().toLowerCase();
  if(!q) return [];
  const qRe = new RegExp('(^|[^a-z0-9])'+escapeRegExp(q));
  let scored = [];
  for(const it of list){
    const text = (textFn(it)||'').toLowerCase();
    let score = textMatchScore(text, q, qRe);
    if(!score && extraTextFn){
      const extra = (extraTextFn(it)||'').toLowerCase();
      if(extra){
        const extraScore = textMatchScore(extra, q, qRe);
        if(extraScore) score = Math.round(extraScore/4); // capped well under title's min (40)
      }
    }
    if(score>0) scored.push({it, score});
  }
  if(!scored.length && q.length>=3){
    for(const it of list){
      const text = (textFn(it)||'').toLowerCase();
      if(!text) continue;
      const words = text.split(/[^a-z0-9]+/).filter(Boolean);
      if(words.some(w=> Math.abs(w.length-q.length)<=1 && isTypoOf(w,q))){
        scored.push({it, score:30});
      }
    }
  }
  scored.sort((a,b)=>{
    if(b.score!==a.score) return b.score-a.score;
    if(tieBreakFn){
      const [ar,ay] = tieBreakFn(a.it), [br,by] = tieBreakFn(b.it);
      if((br||0)!==(ar||0)) return (br||0)-(ar||0);
      if((by||0)!==(ay||0)) return (by||0)-(ay||0);
    }
    return 0;
  });
  return scored.map(s=>s.it);
}
function libItemTieBreak(i){ return [parseFloat(i.rating)||0, parseInt(i.year,10)||0]; }
// Secondary searchable text for a library item: genre, cast (TMDB-fetched
// {name,character} objects), the plain actors[] name list, and the
// description — combined so rankedTitleSearch can match on any of them
// (at a lower score than a title match; see rankedTitleSearch above).
function libItemExtraSearchText(i){
  const genre = (i.genre||[]).join(' ');
  const cast = (i.cast||[]).map(c=>c.name).join(' ');
  const actors = (i.actors||[]).join(' ');
  return [genre, cast, actors, i.description||''].filter(Boolean).join(' ');
}
// Wraps the first case-insensitive occurrence of `q` inside `text` in a
// <mark> so search result rows can show why a title matched. Falls back to
// plain escaped text when there's no hit (e.g. a fuzzy/typo match, or a
// match that only occurred in genre/cast/description).
function highlightMatch(text, q){
  text = text||'';
  if(!q) return esc(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx<0) return esc(text);
  return esc(text.slice(0,idx))+'<mark class="search-hl">'+esc(text.slice(idx,idx+q.length))+'</mark>'+esc(text.slice(idx+q.length));
}
// When a library item matched search only via genre/cast/description (its
// title itself doesn't contain the query), this finds the first field that
// did match so the result row can show *why* it's there instead of just
// appearing unexplained under a title that doesn't visibly match.
function findExtraMatchReason(item, q){
  if(!q) return null;
  const ql = q.toLowerCase();
  const genre = (item.genre||[]).find(g=>g && g.toLowerCase().includes(ql));
  if(genre) return {label:'Genre', html: highlightMatch(genre, q)};
  const castName = (item.cast||[]).map(c=>c.name).find(n=>n && n.toLowerCase().includes(ql))
    || (item.actors||[]).find(n=>n && n.toLowerCase().includes(ql));
  if(castName) return {label:'Cast', html: highlightMatch(castName, q)};
  const desc = item.description||'';
  const idx = desc.toLowerCase().indexOf(ql);
  if(idx>=0){
    const start = Math.max(0, idx-20);
    const end = Math.min(desc.length, idx+ql.length+20);
    const snippet = (start>0?'…':'')+desc.slice(start,end)+(end<desc.length?'…':'');
    return {label:'Plot', html: highlightMatch(snippet, q)};
  }
  return null;
}

// opts.undoLabel/opts.onUndo are optional — every existing toast(msg) call elsewhere in the app
// keeps working unchanged. When present, the toast holds a real button (pointer-events re-enabled
// just for this toast via .has-action) and stays up longer than a plain confirmation, since it now
// needs to survive an actual read-and-decide instead of just a glance.
let toastUndoHandler = null;
function toast(msg, opts){
  opts = opts || {};
  const t = document.getElementById('toast');
  if(!t) return;
  toastUndoHandler = opts.onUndo || null;
  t.innerHTML = opts.undoLabel
    ? `<span class="toast-msg"></span><button type="button" class="toast-undo-btn" onclick="runToastUndo()">${esc(opts.undoLabel)}</button>`
    : '';
  if(opts.undoLabel){ t.querySelector('.toast-msg').textContent = msg; } else { t.textContent = msg; }
  t.classList.toggle('has-action', !!opts.undoLabel);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{ t.classList.remove('show'); toastUndoHandler = null; }, opts.undoLabel ? 5000 : 2400);
}
// Bound to the toast's own Undo button (see toast() above) rather than a closure passed straight
// into onclick, since the button is rendered via innerHTML — a real function reference wouldn't
// survive that round-trip the way an inline string handler does.
function runToastUndo(){
  const t = document.getElementById('toast');
  const handler = toastUndoHandler;
  toastUndoHandler = null;
  clearTimeout(toast._t);
  if(t) t.classList.remove('show');
  if(handler) handler();
}
function getItem(id){ return state.lib.items.find(i=>i.id===id); }
function getChannel(id){ return (state.lib.channels||[]).find(c=>c.id===id); }

/* ---- Content Blur (Beta) — on-device NSFW classification for images we actually render ourselves ----
   Loads tf.js + nsfwjs from a CDN only when the feature is turned on, and only once. This can only ever
   see pixels our own page has legitimate (CORS-cleared) access to — a plain <img>/<video> we control.
   It cannot and will never be able to see inside a cross-origin third-party <iframe> (VidSrc, live TV
   embeds); that's a hard browser security boundary, not a limitation of this code. */
let contentBlurModel = null;
let contentBlurLoadPromise = null;
function loadScriptOnce(src, timeoutMs){
  timeoutMs = timeoutMs || 12000;
  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    let done = false;
    const timer = setTimeout(()=>{
      if(done) return;
      done = true;
      s.remove();
      reject(new Error('Timed out loading '+src+' (no response within '+(timeoutMs/1000)+'s — likely blocked by a domain/network restriction rather than a slow connection)'));
    }, timeoutMs);
    s.src = src;
    s.onload = ()=>{ if(done) return; done=true; clearTimeout(timer); resolve(); };
    s.onerror = ()=>{ if(done) return; done=true; clearTimeout(timer); reject(new Error('Failed to load '+src)); };
    document.head.appendChild(s);
  });
}
// Tries each CDN in order and only fails if all of them do — different CDNs are different domains/
// infrastructure, so if one is blocked by a WebView's domain whitelist or a network filter, another
// may still get through.
async function loadScriptWithFallback(urls){
  let lastErr = null;
  for(const url of urls){
    try{ await loadScriptOnce(url); return url; }
    catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('All sources failed');
}
async function loadContentBlurModel(){
  if(contentBlurModel) return contentBlurModel;
  if(contentBlurLoadPromise) return contentBlurLoadPromise;
  contentBlurLoadPromise = (async ()=>{
    if(!window.tf){
      try{
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
          'https://unpkg.com/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
        ]);
      }catch(e){ throw new Error('Step 1/3 (TensorFlow.js) failed: '+e.message); }
    }
    if(!window.nsfwjs){
      try{
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/nsfwjs@4.2.1/dist/nsfwjs.min.js',
          'https://unpkg.com/nsfwjs@4.2.1/dist/nsfwjs.min.js',
        ]);
      }catch(e){ throw new Error('Step 2/3 (nsfwjs library) failed: '+e.message); }
    }
    // Model source priority:
    //  1. An explicit URL set in Settings (highest priority — always wins if present).
    //  2. A relative "models/nsfwjs/model.json" next to wherever this page itself is hosted —
    //     works automatically on GitHub Pages (or any host) with zero configuration, since it
    //     resolves relative to this page's own URL rather than needing you to know/paste it.
    //  3. The model bundled inside nsfwjs's own package, as a last resort (no separate network
    //     request needed once the JS above has loaded, since it ships base64-encoded inside
    //     nsfwjs.min.js itself) — but depends on nsfwjs's own CDN-hosted script working at all.
    const explicitUrl = (state.settings.contentBlurModelUrl||'').trim();
    const relativeUrl = new URL('models/nsfwjs/model.json', location.href).href;
    try{
      if(explicitUrl){
        contentBlurModel = await window.nsfwjs.load(explicitUrl);
      } else {
        try{
          const check = await fetch(relativeUrl, {method:'HEAD', cache:'no-store'});
          if(!check.ok) throw new Error('not found at '+relativeUrl);
          contentBlurModel = await window.nsfwjs.load(relativeUrl);
        }catch(relErr){
          contentBlurModel = await window.nsfwjs.load('MobileNetV2');
        }

    }catch(e){ throw new Error('Step 3/3 (model init) failed: '+(e.message||e)); }
    return contentBlurModel;
  })();

}
function contentBlurThreshold(){

// Returns a 0–1 "sensitive" score, or null if the element couldn't be analyzed (e.g. the image/video's
// server doesn't allow cross-origin pixel access — this is common for third-party posters/streams and
// just means we skip that one rather than error out).
async function classifyElementForBlur(el){
  try{
    const model = await loadContentBlurModel();
    const predictions = await model.classify(el);
    return predictions.filter(p=>['Porn','Hentai','Sexy'].includes(p.className)).reduce((sum,p)=>sum+p.probability, 0);
  }catch(e){
    return null;
  }
}
async function classifyAndBlurImage(imgEl){

function revealBlurredEl(el, ev){

function startVideoContentBlurWatch(videoEl){

  const canvas = document.createElement('canvas');
  canvas.width = 160; canvas.height = 90;

/* =========================================================
   CONTENT FILTERS
   ---------------------------------------------------------
   Banned words (matched case-insensitively as a substring of the title) and banned genres (matched
   against the title's genre list), configured in Settings > Content Filters. Checked at every point
   a title is actually added to the library — manual add/edit (saveEditModal), single IMDb import
   (importFromImdb, as an early warning before the OMDb/TMDB lookups even run), and the multi-title
   wizard (wizardFinish, which also covers the wizard's own bulk-paste-of-links Step 1) — so there's
   no add path that can slip past it. Returns a short human-readable reason string, or null if the
   title is allowed.
========================================================= */
function getBlockedReason(title, genres){
  const words = (state.settings.bannedWords||[]).map(w=>w.toLowerCase()).filter(Boolean);
  if(words.length && title){
    const lower = title.toLowerCase();
    const hit = words.find(w=>lower.includes(w));
    if(hit) return `title contains banned word "${hit}"`;
  }
  const bannedGenres = state.settings.bannedGenres||[];
  if(bannedGenres.length && genres && genres.length){
    const hit = genres.find(g=>bannedGenres.includes(g));
    if(hit) return `genre "${hit}" is banned`;
  }
  return null;
}

/* =========================================================
   CUSTOM SKIP SEGMENTS
   ---------------------------------------------------------
   Personal Scene Skip: user-defined "skip from Start to End" segments that auto-seek during
   playback, using the exact same seek mechanism as Restart/±20s/progress-bar seeking (see
   performPlayerSeek / vid.currentTime, wired up near PLAYER_EVENT and the video-element listeners
   below). Nothing here ever touches the embedded player's internals directly.

   STORAGE — data lives in state.lib.skipData (persisted via saveLib(), travels with Export/Import
   Library and Backup, and is cleared by Clear All Data), keyed by skipDataKey():
     state.lib.skipData = {
       "<imdbId>": { enabled:true, segments:[ {id,name,start,end,enabled}, ... ] },        // movie
       "<imdbId>:s2e3": { enabled:true, segments:[ ... ] },                                 // TV ep
     }
   Falls back to item.id when a title has no imdbId, so the feature still works for hand-added
   titles that were never linked to IMDb.
========================================================= */
function skipDataKey(item, seasonNum, epNum){
  const base = (item && (item.imdbId || item.id)) || '';
  return (seasonNum!=null && epNum!=null) ? `${base}:s${seasonNum}e${epNum}` : base;
}
function getSkipEntry(key){
  return (state.lib.skipData||{})[key] || null;
}
function ensureSkipEntry(key){
  if(!state.lib.skipData) state.lib.skipData = {};
  if(!state.lib.skipData[key]) state.lib.skipData[key] = {enabled:true, segments:[]};
  return state.lib.skipData[key];
}
// Removes an entry entirely once its last segment is deleted, so empty {enabled:true, segments:[]}
// husks don't pile up in storage/exports for titles the user has since cleared out.
function pruneSkipEntry(key){
  const entry = state.lib.skipData && state.lib.skipData[key];
  if(entry && (!entry.segments || !entry.segments.length)) delete state.lib.skipData[key];
}
// Every title/episode that has at least one segment, newest-added-looking-first is not tracked (no
// per-segment timestamp), so this returns library insertion order. Each row also carries a resolved
// item reference (or null if the title behind an old key was since deleted from the library) so the
// Skip Manager can show a real title/poster instead of a bare key.
function listSkipEntries(){
  const out = [];
  Object.keys(state.lib.skipData||{}).forEach(key=>{
    const entry = state.lib.skipData[key];
    if(!entry || !entry.segments || !entry.segments.length) return;
    const m = key.match(/^(.*):s(\d+)e(\d+)$/);
    const imdbId = m ? m[1] : key;
    const seasonNum = m ? Number(m[2]) : null;
    const epNum = m ? Number(m[3]) : null;
    const item = state.lib.items.find(i=>(i.imdbId||i.id)===imdbId) || null;
    out.push({key, entry, item, seasonNum, epNum});
  });
  return out;
}
// Parses "MM:SS" or "HH:MM:SS" (spec's two accepted manual-entry formats) into whole seconds.
// Returns null — never throws — for anything that doesn't cleanly match, so callers can just toast.
function parseSkipTime(str){
  if(str==null) return null;
  const parts = String(str).trim().split(':').map(p=>p.trim());
  if(parts.length<2 || parts.length>3 || parts.some(p=>p==='' || isNaN(Number(p)))) return null;
  const nums = parts.map(Number);
  const seconds = nums.length===3 ? (nums[0]*3600 + nums[1]*60 + nums[2]) : (nums[0]*60 + nums[1]);
  return seconds>=0 ? Math.round(seconds) : null;
}

/* ---- Playback-side detection (called every tick from the player; see PLAYBACK MANAGER) ---- */
// Checks the current elapsed position against this title's saved segments and, the first time
// playback crosses into an enabled segment's [start,end) window this session, performs the skip.
// `seekFn(target)` abstracts the actual seek — performPlayerSeek() for iframe embeds, a direct
// vid.currentTime assignment for native <video>/hls — so this function knows nothing about which
// kind of player is active. Each segment fires at most once per playback session, tracked in
// state.player._skippedSegmentIds (reset every time a fresh player opens), so re-watching the same
// scene after manually rewinding past it won't re-trigger the skip and fight the user.
function checkSkipSegments(elapsedSeconds, seekFn){
  const p = state.player;
  if(!p || !state.settings.skipSegmentsEnabled) return;
  const item = getItem(p.itemId);
  if(!item) return;
  const key = skipDataKey(item, p.seasonNum, p.epNum);
  const entry = getSkipEntry(key);
  if(!entry || !entry.enabled || !entry.segments.length) return;
  if(!p._skippedSegmentIds) p._skippedSegmentIds = new Set();
  const hit = entry.segments.find(seg=>
    seg.enabled && !p._skippedSegmentIds.has(seg.id) &&
    elapsedSeconds >= seg.start && elapsedSeconds < seg.end
  );
  if(!hit) return;
  p._skippedSegmentIds.add(hit.id);
  seekFn(hit.end);
  if(state.settings.skipNotify) toast(hit.name ? `Skipped "${hit.name}"` : 'Scene skipped');
}


// client-side: draws the already-loading <img> into a canvas and reads pixel data back out.
const posterGlowCache = new Map();
function extractPosterGlowColor(url){
  return new Promise(resolve=>{
    if(!url){ resolve(null); return; }
    if(posterGlowCache.has(url)){ resolve(posterGlowCache.get(url)); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=>{
      try{
        const w = 24, h = 24;
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const data = ctx.getImageData(0, 0, w, h).data;
        let r=0, g=0, b=0, n=0;
        for(let i=0; i<data.length; i+=4){
          if(data[i+3] < 128) continue; // skip transparent pixels
          const rr=data[i], gg=data[i+1], bb=data[i+2];
          const max = Math.max(rr,gg,bb), min = Math.min(rr,gg,bb);
          if(max < 26 || min > 235) continue; // skip near-black/near-white so the glow isn't washed out gray
          r+=rr; g+=gg; b+=bb; n++;
        }
        if(!n){ r=data[0]; g=data[1]; b=data[2]; n=1; } // poster was all neutral tones — fall back to a raw pixel
        const color = `rgb(${Math.round(r/n)}, ${Math.round(g/n)}, ${Math.round(b/n)})`;
        posterGlowCache.set(url, color);
        resolve(color);
      }catch(e){
        // Canvas got tainted — the poster host didn't send CORS headers, so pixel data can't be read.
        // Fail silently; the backdrop just won't get a glow for this title.
        posterGlowCache.set(url, null);
        resolve(null);
      }
    };
    img.onerror = ()=>{ posterGlowCache.set(url, null); resolve(null); };
    img.src = url;
  });
}
// Called (via setTimeout, so it runs after the caller's innerHTML assignment lands) once renderDetail's
// markup is in the DOM. Sets --poster-glow on #pageRoot, which the backdrop, Play button, season-select
// and rating stars' box-shadow/filter declarations all read (with a transparent fallback until resolved).
function applyDetailPosterGlow(item){
  extractPosterGlowColor(item.poster).then(color=>{
    if(!color) return;
    // Bail if the user has already navigated elsewhere while this was resolving.
    if(state.route!=='detail' || state.routeParam!==item.id) return;
    // Set on #pageRoot rather than .detail-backdrop: the backdrop, .detail-actions, .season-select and
    // .my-rating-star are siblings/descendants under pageRoot, not nested inside the backdrop itself,
    // so the custom property needs to live on their common ancestor to cascade to all of them.
    const root = document.getElementById('pageRoot');
    if(root){
      root.style.setProperty('--poster-glow', color);
      root.dataset.glowItemId = item.id; // lets renderDetail() tell "same title, re-render" apart from "new title, navigate"
    }
  });
}
function posterEl(item, cls){

// Landscape counterpart to posterEl — prefers the backdrop (what the show/movie actually looks

function backdropEl(item){

function fallbackHtml(title){

function itemProgressPct(item){
  if(item.type==='movie') return movieProgressPct(item);
  const prog = item.progress || {};
  let last = null;
  (item.seasons||[]).forEach(s=>{
    (s.episodes||[]).forEach(e=>{
      const key = 's'+s.number+'e'+e.number;
      if(prog[key]) last = prog[key];
    });
  });
  if(!last || !last.duration) return 0;
  return Math.min(100, Math.round((last.timestamp/last.duration)*100));
}
function movieProgressPct(item){
  const p = (item.progress||{}).movie;
  if(!p || !p.duration) return p && p.watched ? 100 : 0;
  return Math.min(100, Math.round((p.timestamp/p.duration)*100));
}
// Pulls a minute value out of strings like "148 min" / "45m" / "1h 30m" — falls back when missing
// or unparsable, since not every title has runtime data (e.g. titles added without OMDb/TMDB fetch).
function parseRuntimeMinutes(runtimeStr, fallback){
  if(!runtimeStr) return fallback;
  const s = String(runtimeStr);
  const hm = s.match(/(\d+)\s*h(?:r)?\s*(\d+)?\s*m?/i);
  if(hm) return parseInt(hm[1],10)*60 + (hm[2]?parseInt(hm[2],10):0);
  const m = s.match(/(\d+)/);
  return m ? parseInt(m[1],10) : fallback;
}
// Total known runtime (in seconds) for a movie or one specific episode, estimated from OMDb/TMDB
// runtime metadata. NOTE: no longer used anywhere in the player — Vaplayer/VidSrc-family iframe
// embeds now get real duration from PLAYER_EVENT's player_duration (see PLAYBACK MANAGER), and
// direct <video>/HLS sources already read the browser's own vid.duration natively. Left in place
// (along with hasKnownRuntime/fetchTmdbRuntimeMinutes/maybeUpgradeRuntimeFromTmdb below) in case
// runtime metadata is needed elsewhere later — currently dead code as far as playback is concerned.
function getPlaybackDurationSeconds(item, seasonNum, epNum){
  if(seasonNum!=null){
    const season = (item.seasons||[]).find(s=>s.number===seasonNum);
    const ep = season && (season.episodes||[]).find(e=>e.number===epNum);
    const movieFallback = parseRuntimeMinutes(item.runtime, null);
    const epRuntime = ep && ep.runtime;
    return parseRuntimeMinutes(epRuntime, movieFallback || 45) * 60;
  }
  return parseRuntimeMinutes(item.runtime, 120) * 60;
}
// True once we have a *real* runtime for whatever's playing (fetched metadata), as opposed to
// getPlaybackDurationSeconds silently falling back to a flat 120min/45min guess.
function hasKnownRuntime(item, seasonNum, epNum){
  if(seasonNum!=null){
    const season = (item.seasons||[]).find(s=>s.number===seasonNum);
    const ep = season && (season.episodes||[]).find(e=>e.number===epNum);
    return !!(ep && ep.runtime) || !!item.runtime;
  }
  return !!item.runtime;
}
// Looks up the real runtime from TMDB for a movie, or one specific episode, resolving item.tmdbId
// by title search first if we don't already have it cached (same lookup fetchTmdbTrailer already
// does for hover previews). Returns whole minutes, or null if it couldn't be found — callers should
// just keep using whatever fallback they already had in that case.
async function fetchTmdbRuntimeMinutes(item, seasonNum, epNum){
  if(!state.settings.tmdb) return null;
  try{
    let tmdbId = item.tmdbId;
    const type = item.type==='series' ? 'tv' : 'movie';
    if(!tmdbId){
      const yearParam = item.year ? (type==='movie' ? `&year=${encodeURIComponent(item.year)}` : `&first_air_date_year=${encodeURIComponent(item.year)}`) : '';
      const searchRes = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(item.title)}${yearParam}`);
      const searchData = await searchRes.json();
      const match = searchData.results && searchData.results[0];
      if(!match) return null;
      tmdbId = match.id;
      item.tmdbId = tmdbId; // cache — benefits trailers/recommendations too, not just this lookup
    }
    if(seasonNum!=null){
      const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNum}/episode/${epNum}?api_key=${encodeURIComponent(state.settings.tmdb)}`);
      const data = await res.json();
      return data.runtime || null;
    } else {
      const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}`);
      const data = await res.json();
      return data.runtime || null;
    }
  }catch(e){
    return null; // silent fail, same spirit as fetchTmdbTrailer — a lookup miss shouldn't break playback
  }
}
// Kicks off the TMDB lookup above only when getPlaybackDurationSeconds is currently relying on the
// flat fallback (no real runtime cached yet). Once it resolves, caches the minutes on the item/episode
// (so this never needs to re-fetch for the same title), then upgrades the *live* player's total
// duration and bottom-bar progress bar from the guess to the real runtime.
function maybeUpgradeRuntimeFromTmdb(item, p){
  if(hasKnownRuntime(item, p.seasonNum, p.epNum)) return;
  fetchTmdbRuntimeMinutes(item, p.seasonNum, p.epNum).then(minutes=>{
    if(!minutes || state.player!==p) return; // no match, or the player moved on while we were fetching
    if(p.seasonNum!=null){
      const season = (item.seasons||[]).find(s=>s.number===p.seasonNum);
      const ep = season && season.episodes.find(e=>e.number===p.epNum);
      if(ep) ep.runtime = `${minutes} min`;
    } else {
      item.runtime = `${minutes} min`;
    }
    saveLib();
    const newTotal = minutes*60;
    p._totalSeconds = newTotal;
    p._elapsedSeconds = Math.min(p._elapsedSeconds||0, newTotal); // re-clamp against the corrected total
    updatePlayerProgressUI();
  });
}
// TV episodes count as watched at 90% (credits tend to run longer relative to a shorter runtime);
// movies at 95%, a bit stricter since their credits are a smaller share of the total length.
// NOTE: only used for direct <video>/HLS sources below, where the browser's own 'ended' event is
// the real end-of-playback trigger anyway and this percentage is just for the "watched" checkmark
// mid-playback. Iframe (Vaplayer/VidSrc-family) embeds use isNearPlaybackEnd instead — see there
// for why a percentage of duration is the wrong shape of threshold for the end screen itself.
function getWatchedThreshold(seasonNum){
  return seasonNum!=null ? 0.90 : 0.95;
}
// How many seconds of REAL remaining playback time (player_duration - player_progress, straight
// from Vaplayer's own PLAYER_EVENT) trigger the end screen for an iframe embed. A percentage of
// duration (the old approach) is the wrong shape here: 90% of a 2-hour movie is ~12 minutes of
// credits/remaining runtime, which is both way too early AND wrong whenever the embed's actual
// video (different cut, extra/missing intro, region variant, etc.) doesn't match TMDB's runtime —
// which is exactly why TMDB runtime must never be compared against real playback position at all.
// A small fixed window of remaining real seconds is accurate regardless of what the true duration
// turns out to be, movie or TV episode alike.
const END_SCREEN_REMAINING_SECONDS = 15;
function isNearPlaybackEnd(elapsedSeconds, totalSeconds){
  return totalSeconds > 0 && (totalSeconds - elapsedSeconds) <= END_SCREEN_REMAINING_SECONDS;
}
function isStarted(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && (p.timestamp>5 || p.watched);
  } else {
    const prog = item.progress||{};
    return Object.values(prog).some(p=>p.timestamp>5 || p.watched);
  }
}
function isFullyWatched(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && p.watched;
  } else {
    const seasons = item.seasons||[];
    const prog = item.progress||{};
    let hasEpisodes = false;
    for(const s of seasons){
      for(const e of (s.episodes||[])){
        hasEpisodes = true;
        const key = 's'+s.number+'e'+e.number;
        if(!prog[key] || !prog[key].watched) return false;
      }
    }
    return hasEpisodes;
  }
}
// A series counts as "ended" once TMDB reports its status as Ended/Canceled (same test the
// detail-page status pill already uses) — i.e. every episode that will ever exist is already
// in the library, so there's no cliffhanger wait for a next season. "Binge Now" surfaces those,
// minus anything already fully watched, since there's nothing left to binge there.
function isEndedSeries(item){
  return item.type==='series' && !!item.tvStatus && /end|cancel/i.test(item.tvStatus);
}
function getBingeNowItems(items){
  return items.filter(i=> isEndedSeries(i) && !isFullyWatched(i))
    .sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));
}
// A show belongs in "New Season Available" once its next unwatched episode sits in a later
// season than anything the viewer has actually watched — that's the real "a new season just
// dropped" moment, distinct from plain Continue Watching (which also fires mid-season on the
// very next episode of the season you're already in). Only applies to shows still airing
// (ended shows can't get new seasons) that the viewer has watched at least some of before —
// a completely untouched show isn't "new", it's just unwatched.
function getNewSeasonItems(items){
  return items.filter(i=>{
    if(i.type!=='series' || isEndedSeries(i) || !isStarted(i)) return false;
    const summary = getWatchProgressSummary(i);
    if(!summary || !summary.next) return false;
    const prog = i.progress || {};
    const watchedSeasons = (i.seasons||[]).flatMap(s=> (s.episodes||[])
      .filter(e=>{ const key='s'+s.number+'e'+e.number; return prog[key] && prog[key].watched; })
      .map(()=>s.number));
    if(!watchedSeasons.length) return false;
    return summary.next.season > Math.max(...watchedSeasons);
  }).sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));
}

function router(){
  const hash = location.hash.replace('#','') || 'home';
  // router() is called both on real navigation (hashchange) AND as a plain refresh after in-place
  // actions elsewhere (saving an edit, deleting a channel, importing a library, etc. -- see the many
  // `saveLib(); router();` call sites throughout this file). Resetting scroll unconditionally used to
  // mean deleting a channel from a long scrolled-down list, for example, would snap the page back to
  // the top even though the route never changed. Only reset scroll when the hash actually changed.
  const isNavigation = hash !== router._lastHash;
  router._lastHash = hash;
  const hashParts = hash.split('/');
  const route = hashParts[0];
  const param = hashParts.slice(1).join('/'); // rejoin so multi-segment routes (e.g. genre/movie/Drama) keep every part
  state.route = route;
  state.routeParam = param || null;
  // detail/{id}/{seasonNumber}/{episodeNumber} — id is a uuid (never contains '/'), so the first
  // segment is always the id. seasonNumber/episodeNumber are the real season/episode NUMBERS (not
  // array indices), so a shared/refreshed link stays correct even if seasons get reordered. Both
  // trailing segments are optional; state.routeParam is narrowed to just the id so every existing
  // `getItem(state.routeParam)` / `state.routeParam===item.id` check elsewhere keeps working unchanged.
  state.detailDeepLinkEpisode = null;
  if(route==='detail'){
    const detailParts = param ? param.split('/') : [];
    const itemId = detailParts[0] || null;
    const seasonNumParam = detailParts[1];
    const epNumParam = detailParts[2];
    state.routeParam = itemId;
    state.detailSeason = null;
    state.detailEpisodesOpen = false;
    if(itemId && seasonNumParam!=null){
      const it = getItem(itemId);
      const idx = it && (it.seasons||[]).findIndex(s=>String(s.number)===String(seasonNumParam));
      if(idx>=0){ state.detailSeason = idx; state.detailEpisodesOpen = true; }
    }
    if(epNumParam!=null && !isNaN(parseInt(epNumParam,10))) state.detailDeepLinkEpisode = parseInt(epNumParam,10);
  }
  stopHeroAutoplay();
  stopFeaturedAutoplay();
  clearAllCardHoverTimers();
  stopMyShowsCountdown();
  renderShell();
  const root = document.getElementById('pageRoot');
  switch(route){
    case 'movies': root.innerHTML = renderTypePage('movie'); break;
    case 'series': root.innerHTML = renderTypePage('series'); break;
    case 'live': root.innerHTML = renderLiveTV(); break;
    case 'schedule': root.innerHTML = renderSchedule(); if((state.schedule.tab||'mine')==='mine') loadMyShowsSchedule(); else loadScheduleData(); break;
    case 'collections': root.innerHTML = renderCollections(param); if(param==='top100shows') loadTmdbTopListGrid('tv'); else if(param==='top100movies') loadTmdbTopListGrid('movie'); else if(param==='watchlist') initVirtualList('watchlistRows', watchlistRowHtml); else if(param) initVirtualList('collectionDetailGrid', cardHtml); break;
    case 'bingeall': root.innerHTML = renderBingeAllPage(); break;
    case 'newseasonall': root.innerHTML = renderNewSeasonAllPage(); break;
    case 'settings': root.innerHTML = renderSettings(); break;
    case 'genre': {
      const genreParts = param.split('/');
      const genreTypeParam = genreParts[0];
      const genreName = decodeURIComponent(genreParts.slice(1).join('/') || '');
      root.innerHTML = renderGenrePage(genreTypeParam, genreName);
      initVirtualList('genrePageGrid', cardHtml);
      break;
    }
    case 'actor': {
      const actorName = decodeURIComponent(param || '');
      root.innerHTML = renderActorPage(actorName);
      initVirtualList('actorPageGrid', cardHtml);
      break;
    }
    case 'detail': {
      root.innerHTML = renderDetail(state.routeParam);
      const detailItem = getItem(state.routeParam);
      if(detailItem){
        loadTmdbSimilarRow(detailItem);
        // Auto-open the episode-info modal when the URL points at a specific episode (deep link/share/
        // refresh). Deferred a tick so it opens after renderDetail's own markup has actually landed.
        if(state.detailDeepLinkEpisode!=null){
          const season = (detailItem.seasons||[])[state.detailSeason];
          if(season) setTimeout(()=> openEpisodeInfoModal(state.routeParam, season.number, state.detailDeepLinkEpisode), 0);
        }
      }
      break;
    }
    default: root.innerHTML = renderHome();
  }
  requestAnimationFrame(markHeroActiveSlide);
  startHeroAutoplay();
  startFeaturedAutoplay();
  setTimeout(positionFeaturedBgRect, 0);
  if(isNavigation) window.scrollTo({top:0});
}
