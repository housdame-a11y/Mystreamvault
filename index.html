/* ---------- My TV Shows (watchlist + TVmaze next-episode countdown) ---------- */
function getWatchlistShows(){
  return state.lib.items.filter(i=> i.type==='series' && i.watchlist);
}
async function loadMyShowsSchedule(){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const shows = getWatchlistShows();
  if(!shows.length){
    container.innerHTML = emptyState('No TV shows on your watchlist', 'Add a series to your watchlist from its detail page to see its next-episode countdown here.', 'Browse TV Shows', "location.hash='series'");
    return;
  }
  container.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto;"></div><p style="margin-top:16px; color:var(--muted);">Loading your shows…</p></div>`;
  const results = await Promise.all(shows.map(fetchMyShowSchedule));
  if(!document.getElementById('scheduleListing')) return;
  state.schedule._myShowsResults = results;
  renderMyShowsListing(results);
}
async function fetchMyShowSchedule(item){
  const cacheKey = (item.title||'').toLowerCase().trim();
  const cached = state.schedule.myShowsCache[cacheKey];
  if(cached && (Date.now()-cached.fetchedAt) < 6*60*60*1000) return {item, show:cached.show};
  try{
    const res = await fetch(`https://api.tvmaze.com/singlesearch/shows?q=${encodeURIComponent(item.title)}&embed[]=nextepisode&embed[]=previousepisode`);
    if(!res.ok) throw new Error('not found');
    const show = await res.json();
    state.schedule.myShowsCache[cacheKey] = {show, fetchedAt:Date.now()};
    return {item, show};
  }catch(e){
    state.schedule.myShowsCache[cacheKey] = {show:null, fetchedAt:Date.now()};
    return {item, show:null};
  }
}
function nextEpisodeAirstamp(show){
  const ep = show && show._embedded && show._embedded.nextepisode;
  if(!ep || !ep.airstamp) return null;
  const t = new Date(ep.airstamp).getTime();
  return isNaN(t) ? null : t;
}
function renderMyShowsListing(results){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const search = (state.schedule.search||'').trim().toLowerCase();
  let list = results;
  if(search) list = list.filter(r=> (r.item.title||'').toLowerCase().includes(search));
  if(!list.length){
    container.innerHTML = emptyState('Nothing found', 'Try a different search.', '', '');
    return;
  }
  list = [...list].sort((a,b)=>{
    const an = nextEpisodeAirstamp(a.show), bn = nextEpisodeAirstamp(b.show);
    if(an && bn) return an-bn;
    if(an) return -1;
    if(bn) return 1;
    return (a.item.title||'').localeCompare(b.item.title||'');
  });
  container.innerHTML = `<div class="schedule-list">${list.map(myShowRowHtml).join('')}</div>`;
  startMyShowsCountdown();
}
function myShowRowHtml(r){
  const {item, show} = r;
  const img = (show && show.image && (show.image.medium||show.image.original)) || item.poster || '';
  const nextEp = show && show._embedded && show._embedded.nextepisode;
  const airstamp = nextEpisodeAirstamp(show);
  const epLabel = (nextEp && nextEp.season && nextEp.number) ? `S${nextEp.season}E${nextEp.number}` : '';
  const network = (show && ((show.network&&show.network.name)||(show.webChannel&&show.webChannel.name))) || '';
  const statusHtml = airstamp
    ? `<span class="schedule-countdown" data-airstamp="${airstamp}">--</span>`
    : (show ? `<span class="schedule-network" style="margin-top:0;">No upcoming episode</span>` : `<span class="schedule-network" style="margin-top:0; color:#ff8b93;">Not found on TVmaze</span>`);
  return `
    <div class="schedule-row" style="cursor:pointer;" onclick="openMyShowModal('${item.id}')">
      <div class="schedule-thumb">${img?`<img src="${esc(img)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>`:fallbackHtml(item.title||'?')}</div>
      <div class="schedule-info">
        <div class="schedule-show-title">${esc(item.title)}</div>
        <div class="schedule-ep-title">${epLabel?`<span class="schedule-ep-tag">${esc(epLabel)}</span> `:''}${esc((nextEp&&nextEp.name)||'')}</div>
        <div class="schedule-network">${esc(network)}</div>
      </div>
      ${statusHtml}
    </div>`;
}
let myShowsCountdownTimer = null;
function startMyShowsCountdown(){
  stopMyShowsCountdown();
  updateMyShowsCountdown();
  myShowsCountdownTimer = setInterval(updateMyShowsCountdown, 1000);
}
function stopMyShowsCountdown(){
  if(myShowsCountdownTimer){ clearInterval(myShowsCountdownTimer); myShowsCountdownTimer = null; }
}
function updateMyShowsCountdown(){
  const els = document.querySelectorAll('.schedule-countdown');
  if(!els.length){ stopMyShowsCountdown(); return; }
  els.forEach(el=>{
    const target = parseInt(el.dataset.airstamp, 10);
    const diff = target - Date.now();
    el.textContent = diff<=0 ? 'Airing now' : formatCountdown(diff);
  });
}
function formatCountdown(ms){
  const totalSec = Math.floor(ms/1000);
  const d = Math.floor(totalSec/86400), h = Math.floor((totalSec%86400)/3600), m = Math.floor((totalSec%3600)/60), s = totalSec%60;
  if(d>0) return `${d}d ${h}h`;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${s}s`;
  return `${s}s`;
}
function openMyShowModal(itemId){
  const item = getItem(itemId);
  if(!item) return;
  const cacheKey = (item.title||'').toLowerCase().trim();
  const cached = state.schedule.myShowsCache[cacheKey];
  const show = cached && cached.show;
  if(!show){
    openModal(`
      <div class="modal-head"><h2>${esc(item.title)}</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
      <p style="color:var(--muted); padding:4px 2px;">Couldn't find this show on TVmaze.</p>`);
    return;
  }
  const nextEp = show._embedded && show._embedded.nextepisode;
  const stripTags = (h)=> (h||'').replace(/<[^>]+>/g,'');
  const summary = stripTags(nextEp && nextEp.summary ? nextEp.summary : show.summary) || 'No synopsis available.';
  const epImg = nextEp && nextEp.image && (nextEp.image.medium||nextEp.image.original);
  const airDate = nextEp && nextEp.airstamp ? new Date(nextEp.airstamp).toLocaleString(undefined,{weekday:'long', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : null;
  openModal(`
    <div class="modal-head"><h2>${esc(show.name||item.title)}</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div style="display:flex; gap:16px; padding:2px; flex-wrap:wrap;">
      ${epImg?`<img src="${esc(epImg)}" alt="" style="width:170px; border-radius:8px; flex-shrink:0; object-fit:cover; aspect-ratio:16/9;" ${contentBlurImgAttrs()}>`:''}
      <div style="min-width:0; flex:1;">
        ${nextEp?`<div class="schedule-ep-tag" style="margin-bottom:6px; font-size:13px;">${nextEp.season&&nextEp.number?`S${nextEp.season}E${nextEp.number} — `:''}${esc(nextEp.name||'')}</div>`:''}
        ${airDate?`<div style="color:var(--highlight); font-weight:700; font-size:13px; margin-bottom:10px;">Airs ${esc(airDate)}</div>`:'<div style="color:var(--muted); font-size:13px; margin-bottom:10px;">No upcoming episode scheduled</div>'}
        <p style="color:#c7d5d3; font-size:13.5px; line-height:1.6;">${esc(summary)}</p>
      </div>
    </div>`);
}
function findChannelForNetwork(network){
  if(!network) return null;
  const channels = state.lib.channels||[];
  const n = network.toLowerCase();
  return channels.find(c=>c.name.toLowerCase()===n)
    || channels.find(c=> c.name.toLowerCase().includes(n) || n.includes(c.name.toLowerCase()))
    || null;
}
function scheduleRowHtml(ep){
  const show = ep.show || {};
  const img = (show.image && (show.image.medium||show.image.original)) || '';
  const network = (show.network&&show.network.name) || (show.webChannel&&show.webChannel.name) || '';
  const matched = findChannelForNetwork(network);
  const epLabel = (ep.season && ep.number) ? `S${ep.season}E${ep.number}` : '';
  return `
    <div class="schedule-row">
      <div class="schedule-time">${esc(ep.airtime||'--:--')}</div>
      <div class="schedule-thumb">${img?`<img src="${esc(img)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>`:fallbackHtml(show.name||'?')}</div>
      <div class="schedule-info">
        <div class="schedule-show-title">${esc(show.name||'Untitled')}</div>
        <div class="schedule-ep-title">${epLabel?`<span class="schedule-ep-tag">${esc(epLabel)}</span> `:''}${esc(ep.name||'')}</div>
        <div class="schedule-network">${esc(network||'Unknown network')}</div>
      </div>
      ${matched ? `<button class="btn btn-primary" style="flex-shrink:0;" onclick="playChannel('${matched.id}')">${ICON.play} Watch</button>` : ''}
    </div>`;
}

function ratingWidgetHtml(item){

  return `<svg viewBox="0 0 24 24" fill="${filled?'currentColor':'none'}" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><polygon points="12 2 14.9 8.6 22 9.3 16.5 14.1 18.2 21 12 17.3 5.8 21 7.5 14.1 2 9.3 9.1 8.6"/></svg>`;

function toggleFavorite(itemId){

#EXTINF:-1 tvg-logo="https://..." group-title="News" tvg-language="English",ABC

— or JSON —
[

        <b>JSON:</b> array of channels (or <code>{"channels":[...]}</code>). Each entry accepts <code>"url"</code>, <code>"urls":[...]</code>, or <code>"sources":[{"label","url"}]</code>, plus optional <code>"logo"</code>, <code>"type"</code> (category), and <code>"language"</code>.<br>
        Channels with no valid URL are skipped either way.
      </div>
    </div>

      <button class="btn btn-primary" onclick="applyChannelsJsonImport()">Import Channels</button>

function handleChannelsJsonFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const ta = document.getElementById('channelsJsonText');
    if(ta) ta.value = e.target.result;
  };
  reader.readAsText(file);
}
function normalizeChannelsJson(data){
  const arr = Array.isArray(data) ? data : (data && Array.isArray(data.channels) ? data.channels : null);
  if(!arr) throw new Error('JSON must be an array of channels, or an object like {"channels":[...]}');
  return arr.map(c=>{
    const name = (c.name || c.title || 'Untitled Channel').toString();
    const logo = (c.logo || c.icon || c.image || '').toString();
    const category = (c.type || c.category || c.genre || 'General').toString();
    const language = (c.language || c.lang || '').toString();
    let sources = [];
    if(Array.isArray(c.sources)) sources = c.sources.map(s=>({label:(s.label||'Source').toString(), url:(s.url||s.link||'').toString()})).filter(s=>s.url);
    else if(Array.isArray(c.urls)) sources = c.urls.filter(Boolean).map((u,i)=>({label:'Source '+(i+1), url:u.toString()}));
    else if(typeof c.url==='string' && c.url) sources = [{label:'Source 1', url:c.url}];
    else if(typeof c.link==='string' && c.link) sources = [{label:'Source 1', url:c.link}];
    return {name, logo, category, language, sources};
  }).filter(c=>c.sources.length);
}
// Parses a standard M3U/M3U8 playlist (#EXTM3U header, #EXTINF metadata lines followed by a URL).
// Grabs tvg-logo, group-title, and tvg-language/tvg-country from each #EXTINF line when present.
function parseM3UPlaylist(text){
  const lines = text.split(/\r\n|\r|\n/);
  const entries = [];
  let current = null;
  const attrRegex = /([a-zA-Z0-9_-]+)="([^"]*)"/g;
  for(const raw of lines){
    const line = raw.trim();
    if(!line) continue;
    if(/^#EXTM3U/i.test(line)) continue;
    if(/^#EXTINF/i.test(line)){
      const commaIdx = line.indexOf(',');
      const attrsPart = commaIdx>-1 ? line.slice(0, commaIdx) : line;
      const namePart = commaIdx>-1 ? line.slice(commaIdx+1).trim() : '';
      const attrs = {};
      let m;
      attrRegex.lastIndex = 0;
      while((m = attrRegex.exec(attrsPart))) attrs[m[1].toLowerCase()] = m[2];
      current = {
        name: namePart || attrs['tvg-name'] || 'Untitled Channel',
        logo: attrs['tvg-logo'] || attrs['tvg-logo-small'] || '',
        category: attrs['group-title'] || '',
        language: attrs['tvg-language'] || attrs['tvg-country'] || '',
      };
    } else if(/^#EXTGRP:/i.test(line)){
      if(current && !current.category) current.category = line.slice(line.indexOf(':')+1).trim();
    } else if(line.startsWith('#')){
      continue; // other directives (#EXTVLCOPT, #KODIPROP, #EXTHTTP, etc.) aren't needed for playback here
    } else {
      // A plain, non-comment line is the stream URL for whichever #EXTINF preceded it.
      if(current){
        entries.push(Object.assign({}, current, {url:line}));
        current = null;
      } else {
        entries.push({name:`Channel ${entries.length+1}`, logo:'', category:'', language:'', url:line});
      }
    }
  }
  return entries;
}
function normalizeM3U(entries){
  return entries.filter(e=>e.url).map(e=>({
    name: e.name || 'Untitled Channel',
    logo: e.logo || '',
    category: e.category || 'General',
    language: e.language || '',
    sources: [{label:'Source 1', url:e.url}],
  }));
}
function applyChannelsJsonImport(){
  const text = document.getElementById('channelsJsonText').value.trim();
  if(!text){ toast('Paste or upload a file first'); return; }
  let normalized;
  if(/^#EXTM3U/i.test(text) || /#EXTINF/i.test(text)){
    try{ normalized = normalizeM3U(parseM3UPlaylist(text)); }
    catch(e){ toast('Failed to parse M3U playlist: '+e.message); return; }
  } else {
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ toast('Could not read that as JSON or M3U — check the file format'); return; }
    try{ normalized = normalizeChannelsJson(data); }
    catch(e){ toast(e.message); return; }
  }
  if(!normalized.length){ toast('No valid channels found (each needs at least one URL)'); return; }
  state.lib.channels = state.lib.channels || [];
  normalized.forEach(c=>{
    state.lib.channels.push({id:uuid(), dateAdded:new Date().toISOString(), ...c});
  });
  saveLib(); closeModal(); router();
  toast(`Imported ${normalized.length} channel(s)`);
}

// Suggests titles already in the user's own library sharing genres with this one — always playable
// since they're already in the collection, unlike a generic "similar movies" list from the internet.
// Computes "next episode to watch" and how many are left — TV Time-style tracking, based on the
// same watched/progress data already tracked per episode, just walked in real season/episode order.
function getWatchProgressSummary(item){
  if(item.type!=='series') return null;
  const allEpisodes = [];
  (item.seasons||[]).forEach(s=> (s.episodes||[]).forEach(e=> allEpisodes.push({season:s.number, episode:e})));
  if(!allEpisodes.length) return null;
  allEpisodes.sort((a,b)=> a.season-b.season || a.episode.number-b.episode.number);
  const prog = item.progress || {};
  const remaining = allEpisodes.filter(x=>{
    const key = 's'+x.season+'e'+x.episode.number;
    return !(prog[key] && prog[key].watched);
  });
  return { total: allEpisodes.length, remaining: remaining.length, next: remaining[0] || null };
}
function watchProgressBannerHtml(item){
  if(!item.watchlist) return '';
  const summary = getWatchProgressSummary(item);
  if(!summary || !summary.total) return '';
  if(summary.remaining===0){
    return `<div class="watch-progress-banner watch-progress-done">${ICON.check} All caught up!</div>`;
  }
  const next = summary.next;
  return `<div class="watch-progress-banner">
    <div class="wpb-next">
      <span class="wpb-label">Next Up</span>
      <span class="wpb-title">S${next.season}E${next.episode.number} — ${esc(next.episode.title||('Episode '+next.episode.number))}</span>
    </div>
    <div class="wpb-remaining">${summary.remaining} episode${summary.remaining===1?'':'s'} remaining</div>
  </div>`;
}
function getSimilarLibraryItems(item, limit){
  limit = limit || 12;
  const genres = new Set(item.genre||[]);
  if(!genres.size) return [];
  return state.lib.items
    .filter(i=>i.id!==item.id)
    .map(i=>({item:i, score:(i.genre||[]).filter(g=>genres.has(g)).length}))
    .filter(x=>x.score>0)
    .sort((a,b)=> b.score-a.score || new Date(b.item.dateAdded||0)-new Date(a.item.dateAdded||0))
    .slice(0,limit)
    .map(x=>x.item);
}
// TMDB's own "recommendations" for this title — external discovery, not yet in the library. Cards
// open the Add Title flow pre-filled via TMDB rather than a player, since there's no source for them yet.
async function loadTmdbSimilarRow(item){
  const container = document.getElementById('tmdbSimilarRow');
  if(!container) return;
  if(!item.tmdbId || !state.settings.tmdb) return;
  const type = item.type==='series' ? 'tv' : 'movie';
  try{
    const res = await fetch(`https://api.themoviedb.org/3/${type}/${item.tmdbId}/recommendations?api_key=${encodeURIComponent(state.settings.tmdb)}`);
    const data = await res.json();
    const results = (data.results||[]).filter(r=>r.poster_path).slice(0,12);
    if(!container.isConnected || !results.length) return;
    container.innerHTML = `
      <div class="row">
        <div class="row-head"><h3>You Might Also Like</h3></div>
        <div class="row-track">${results.map(r=>externalSimilarCardHtml(r, type)).join('')}</div>
      </div>`;
  }catch(e){ /* discovery row is optional polish — fail quietly rather than showing an error */ }
}
function externalSimilarCardHtml(tmdbItem, type){
  const title = type==='tv' ? tmdbItem.name : tmdbItem.title;
  const year = ((type==='tv' ? tmdbItem.first_air_date : tmdbItem.release_date)||'').split('-')[0];
  const poster = tmdbItem.poster_path ? `https://image.tmdb.org/t/p/w342${tmdbItem.poster_path}` : '';
  return `
    <div class="card" onclick="quickAddFromTmdb(${tmdbItem.id}, '${type}')" title="Add to your library">
      ${poster ? `<img src="${esc(poster)}" alt="" loading="lazy" ${contentBlurImgAttrs()}>` : fallbackHtml(title)}
      <span class="card-badge">${type==='tv'?'Series':'Movie'}</span>
      <div class="card-overlay">
        <div class="card-play" style="background:var(--highlight);">${ICON.plus}</div>
        <div class="card-title">${esc(title)}</div>
        <div class="card-meta">${esc(year||'')}${year?' • ':''}Add to library</div>
      </div>
    </div>`;
}
function quickAddFromTmdb(tmdbId, type){
  state.editingId = null;
  state.editType = type==='tv' ? 'series' : 'movie';
  state.editGenres = [];
  state.editActors = [];
  state.editSources = [{label:'',url:''}];
  state.editSeasons = [];
  state.editImdbMeta = null;
  state.editFormDraft = null;
  renderEditModal(null);

}
function setDetailSeason(i){

  if(item) loadTmdbSimilarRow(item);

function toggleMovieWatched(id){
  const item = getItem(id);
  const watched = isFullyWatched(item);
  item.progress = item.progress || {};
  item.progress.movie = watched
    ? {timestamp:0, duration:(item.progress.movie&&item.progress.movie.duration)||0, watched:false}
    : {timestamp:(item.progress.movie&&item.progress.movie.duration)||1, duration:(item.progress.movie&&item.progress.movie.duration)||1, watched:true};
  item.lastWatched = new Date().toISOString();
  saveLib();
  document.getElementById('pageRoot').innerHTML = renderDetail(id);
  toast(watched?'Marked as unwatched':'Marked as watched');
}
function toggleEpisodeWatched(itemId, seasonNum, epNum){
  const item = getItem(itemId);
  const key = 's'+seasonNum+'e'+epNum;
  item.progress = item.progress || {};
  const cur = item.progress[key];
  const watched = !!(cur && cur.watched);
  item.progress[key] = {timestamp:watched?0:((cur&&cur.duration)||1), duration:(cur&&cur.duration)||1, watched:!watched};
  item.lastWatched = new Date().toISOString();
  saveLib();
  document.getElementById('pageRoot').innerHTML = renderDetail(itemId);
  toast(watched?'Marked as unwatched':'Marked as watched');
}
function episodeMiniStarsHtml(itemId, seasonNum, ep){
  const rating = ep.myRating || 0;
  let stars = '';
  for(let i=1;i<=5;i++){
    stars += `<button type="button" class="ep-mini-star ${i<=rating?'is-filled':''}" title="Rate episode ${i} star${i>1?'s':''}" onclick="setEpisodeRating('${itemId}', ${seasonNum}, ${ep.number}, ${i})">${starSvg(i<=rating)}</button>`;
  }
  return stars;
}
function setEpisodeRating(itemId, seasonNum, epNum, rating){
  const item = getItem(itemId);
  if(!item) return;
  const season = (item.seasons||[]).find(s=>s.number===seasonNum);
  const ep = season && (season.episodes||[]).find(e=>e.number===epNum);
  if(!ep) return;
  ep.myRating = (ep.myRating===rating) ? 0 : rating;
  saveLib();
  document.getElementById('pageRoot').innerHTML = renderDetail(itemId);
  toast(ep.myRating ? `Episode rated ${ep.myRating} star${ep.myRating>1?'s':''}` : 'Episode rating cleared');
}
function deleteItem(id){
  if(!confirm('Delete this title permanently?')) return;
  state.lib.items = state.lib.items.filter(i=>i.id!==id);
  state.lib.collections.forEach(c=> c.itemIds = c.itemIds.filter(x=>x!==id));
  saveLib(); location.hash='home'; toast('Title deleted');
}
function openAddToCollection(itemId){
  if(!state.lib.collections.length){

  const html = state.lib.collections.map(c=>{
    const inCol = c.itemIds.includes(itemId);
    return `<button class="chip-btn ${inCol?'active':''}" style="width:100%;justify-content:flex-start;margin-bottom:8px;" onclick="toggleItemInCollection('${c.id}','${itemId}'); this.classList.toggle('active')">${inCol?ICON.check:''} ${esc(c.name)}</button>`;
  }).join('');
  openModal(`
    <div class="modal-head"><h2>Add to Collection</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div>${html}</div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal(); router()">Done</button></div>
  `);
}

/* ---- Median App Injection Script (for Website Overrides → Custom JavaScript) ----
   Same content-blur approach as the toggle above, but self-contained so it can run
   independently of this page — needed because Median injects it fresh into whichever
   frame it targets, which may include third-party iframes (VidSrc, live TV) that this
   app's own JavaScript can never reach into no matter how it's written. */
const MEDIAN_BLUR_SCRIPT = `/*
 * Stream Vault — Content Blur (all-frames injection script)
 * -----------------------------------------------------------
 * WHERE THIS GOES: Median App Studio -> Website Overrides -> Custom JavaScript
 * (only useful if Median confirms that field injects into iframes/subframes,
 * not just the top-level page -- ask their support if unsure).
 *
 * WHAT IT DOES: on-device NSFW detection (nsfwjs) applied to every <img> and
 * <video> element it finds, with tap-to-reveal. Runs entirely on-device --
 * nothing is uploaded anywhere.
 *
 * WHY IT'S SEPARATE FROM THE MAIN APP: this needs to be injected by Median
 * itself into every frame of the WebView (including third-party iframes like
 * VidSrc embeds). Code living inside Stream Vault's own HTML can only ever
 * see Stream Vault's own page -- it cannot reach into a cross-origin iframe
 * no matter where it's called from. This script works differently: it isn't
 * Stream Vault's code reaching out, it's Median's WebView engine placing a
 * fresh copy of this exact script directly inside each frame, including
 * frames that belong to another website entirely. That's what makes it
 * capable of reaching content this app's own JavaScript cannot.
 *
 * HONEST LIMITS THAT DON'T GO AWAY, EVEN HERE:
 *  - If a source's own server blocks cross-origin pixel access (no CORS
 *    headers), the classifier can't read that particular image/video and
 *    will just skip it -- this is common for random third-party media and
 *    is a browser security rule, not a bug.
 *  - Sites that render video via <canvas>, WebGL, or proprietary players
 *    instead of a plain <video> tag won't be caught by this script.
 *  - This only runs if Median actually injects it into subframes. If it
 *    only reaches the top-level page, it will still work great on Stream
 *    Vault's own posters/backdrops/logos, just not inside embedded players.
 */
(function () {
  'use strict';
  if (window.__streamVaultBlurInstalled) return; // avoid double-injection
  window.__streamVaultBlurInstalled = true;

  var SENSITIVITY = 'moderate'; // 'moderate' or 'strict'
  var THRESHOLD = SENSITIVITY === 'strict' ? 0.2 : 0.4;
  var SCAN_INTERVAL_MS = 3000; // how often to look for newly-added images/video
  var VIDEO_SAMPLE_INTERVAL_MS = 2500;
  // If the default model won't download inside your wrapped app (common when a WebView restricts
  // which domains it can fetch from), host model.json + its .bin shard files on your own domain and
  // put the full URL to model.json here. Leave blank to use the default (nsfwjs's bundled model).
  var MODEL_URL = '';

  var modelPromise = null;
  function loadScriptOnce(src, timeoutMs) {
    timeoutMs = timeoutMs || 12000;
    return new Promise(function (resolve, reject) {
      var s = document.createElement('script');
      var done = false;
      var timer = setTimeout(function () {
        if (done) return;
        done = true;
        s.remove();
        reject(new Error('Timed out loading ' + src));
      }, timeoutMs);
      s.src = src;
      s.onload = function () { if (done) return; done = true; clearTimeout(timer); resolve(); };
      s.onerror = function () { if (done) return; done = true; clearTimeout(timer); reject(new Error('Failed to load ' + src)); };
      document.head.appendChild(s);
    });
  }
  async function loadScriptWithFallback(urls) {
    var lastErr = null;
    for (var i = 0; i < urls.length; i++) {
      try { await loadScriptOnce(urls[i]); return urls[i]; }
      catch (e) { lastErr = e; }
    }
    throw lastErr || new Error('All sources failed');
  }
  function loadModel() {
    if (modelPromise) return modelPromise;
    modelPromise = (async function () {
      if (!window.tf) {
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
          'https://unpkg.com/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
        ]);
      }
      if (!window.nsfwjs) {
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/nsfwjs@4.2.1/dist/nsfwjs.min.js',
          'https://unpkg.com/nsfwjs@4.2.1/dist/nsfwjs.min.js',
        ]);
      }
      // Model source priority: explicit MODEL_URL above > an auto-detected same-directory
      // "models/nsfwjs/model.json" (works when this script runs on your own hosted page; can't
      // work when injected into a different-origin iframe, since "same directory" means nothing
      // there) > nsfwjs's own bundled model as a last resort.
      if (MODEL_URL) {
        return window.nsfwjs.load(MODEL_URL);
      }
      try {
        var relativeUrl = new URL('models/nsfwjs/model.json', location.href).href;
        var check = await fetch(relativeUrl, { method: 'HEAD', cache: 'no-store' });
        if (!check.ok) throw new Error('not found');
        return await window.nsfwjs.load(relativeUrl);
      } catch (relErr) {
        return window.nsfwjs.load('MobileNetV2');
      }
    })().catch(function (e) {
      console.error('[StreamVault Blur] failed to load:', e);
      throw e;
    });
    return modelPromise;
  }
  async function classify(el) {
    try {
      var model = await loadModel();
      var predictions = await model.classify(el);
      return predictions
        .filter(function (p) { return p.className === 'Porn' || p.className === 'Hentai' || p.className === 'Sexy'; })
        .reduce(function (sum, p) { return sum + p.probability; }, 0);
    } catch (e) {
      return null; // couldn't analyze this element (tainted canvas, load failure, etc.) -- skip it
    }
  }
  function reveal(el, ev) {
    if (ev) ev.stopPropagation();
    el.classList.remove('__sv_blurred');
    el.classList.add('__sv_revealed');
  }
  function ensureStyle() {
    if (document.getElementById('__sv_blur_style')) return;
    var style = document.createElement('style');
    style.id = '__sv_blur_style';
    style.textContent =
      '.__sv_blurred{filter:blur(32px) saturate(70%) !important;cursor:pointer !important;transition:filter .3s ease;}' +
      '.__sv_blurred:hover{filter:blur(18px) saturate(70%) !important;}' +
      '.__sv_revealed{filter:none !important;}';
    document.head.appendChild(style);
  }
  async function checkImage(img) {
    if (img.dataset.__svChecked) return;
    img.dataset.__svChecked = '1';
    var run = function () {
      classify(img).then(function (score) {
        if (score !== null && score >= THRESHOLD) {
          img.classList.add('__sv_blurred');
          img.addEventListener('click', function (ev) {
            if (img.classList.contains('__sv_blurred')) reveal(img, ev);
          });
        }
      });
    };
    if (img.complete && img.naturalWidth > 0) run();
    else img.addEventListener('load', run, { once: true });
  }
  function watchVideo(video) {
    if (video.dataset.__svWatching) return;
    video.dataset.__svWatching = '1';
    var canvas = document.createElement('canvas');
    canvas.width = 160; canvas.height = 90;
    var ctx = canvas.getContext('2d');
    var interval = setInterval(async function () {
      if (!video.isConnected) { clearInterval(interval); return; }
      if (video.paused || video.readyState < 2) return;
      try { ctx.drawImage(video, 0, 0, 160, 90); }
      catch (e) { clearInterval(interval); return; } // cross-origin source we can't read -- stop trying
      var score = await classify(canvas);
      if (score === null) { clearInterval(interval); return; }
      video.classList.toggle('__sv_blurred', score >= THRESHOLD);
    }, VIDEO_SAMPLE_INTERVAL_MS);
  }
  function scan() {
    ensureStyle();
    document.querySelectorAll('img:not([data-__svChecked])').forEach(checkImage);
    document.querySelectorAll('video:not([data-__svWatching])').forEach(watchVideo);
  }

  ensureStyle();
  scan();
  setInterval(scan, SCAN_INTERVAL_MS); // catches images/video added dynamically after page load
  var mo = new MutationObserver(function () { scan(); });
  mo.observe(document.documentElement, { childList: true, subtree: true });
})();
`;
function finalMedianBlurScript(){
  const modelUrl = (state.settings.contentBlurModelUrl||'').trim();
  if(!modelUrl) return MEDIAN_BLUR_SCRIPT;
  return MEDIAN_BLUR_SCRIPT.replace("var MODEL_URL = '';", `var MODEL_URL = ${JSON.stringify(modelUrl)};`);
}

/* ---- Link Health checker ----
   Browsers can't read the HTTP status of a cross-origin URL (CORS blocks the response body/status
   from being visible to our JS). A no-cors fetch still tells us one useful thing though: whether the
   request could even reach a server at all. That fails (throws/aborts) for a dead domain, a refused
   connection, or a timeout — the way these mirror/live-TV sources actually die most of the time.
   It can NOT tell us "the domain is up but returns a 404" or "shows an unavailable page" — that
   requires actually opening the link. So results here are a first-pass filter, not a guarantee. */
function checkUrlReachable(url, timeoutMs){
  timeoutMs = timeoutMs || 8000;
  return new Promise(resolve=>{
    const controller = new AbortController();
    const timer = setTimeout(()=>{ controller.abort(); }, timeoutMs);
    fetch(url, {mode:'no-cors', cache:'no-store', signal:controller.signal})
      .then(()=>{ clearTimeout(timer); resolve(true); })
      .catch(()=>{ clearTimeout(timer); resolve(false); });
  });
}
function collectAllSources(onlyItemId){
  const list = [];
  state.lib.items.forEach(item=>{
    if(onlyItemId && item.id!==onlyItemId) return;
    if(item.type==='movie'){
      (item.sources||[]).forEach(s=>{
        if(s.url) list.push({scope:'movie', itemId:item.id, title:item.title, label:s.label, url:s.url});
      });
    } else {
      (item.seasons||[]).forEach(season=>{
        (season.episodes||[]).forEach(ep=>{
          (ep.sources||[]).forEach(s=>{
            if(s.url) list.push({scope:'episode', itemId:item.id, title:`${item.title} — S${season.number}E${ep.number}`, label:s.label, url:s.url});
          });
        });
      });
    }
  });
  if(!onlyItemId){
    (state.lib.channels||[]).forEach(ch=>{
      (ch.sources||[]).forEach(s=>{
        if(s.url) list.push({scope:'channel', channelId:ch.id, title:ch.name, label:s.label, url:s.url});
      });
    });
  }
  return list;
}
async function runLinkHealthCheck(sources, onProgress){
  const results = [];
  const concurrency = 6;
  let idx = 0;
  async function worker(){
    while(idx < sources.length){
      const i = idx++;
      const s = sources[i];
      const ok = await checkUrlReachable(s.url);
      results.push(Object.assign({}, s, {ok}));
      if(onProgress) onProgress(results.length, sources.length);
    }
  }
  const workers = Array.from({length:Math.min(concurrency, sources.length)}, worker);
  await Promise.all(workers);
  return results;
}
async function openLinkHealthCheck(onlyItemId){
  const sources = collectAllSources(onlyItemId);
  if(!sources.length){ toast('No sources to check'); return; }
  openModal(`
    <div class="modal-head"><h2>Checking Sources</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
    <div style="text-align:center; padding:36px 0;">
      <div class="spinner" style="margin:0 auto 18px auto;"></div>
      <div id="linkCheckProgressText" style="color:var(--muted); font-size:13px;">Checking 0 / ${sources.length}…</div>
    </div>
  `);
  const results = await runLinkHealthCheck(sources, (done,total)=>{

/* ---- Device-to-device sync via backup code ---- */
function encodeBackupCode(data){
  // JSON → UTF-8 bytes → base64. We use btoa via a TextEncoder-safe approach
  // so non-ASCII characters in titles/descriptions survive the round-trip.
  const json = JSON.stringify(data);
  const bytes = new TextEncoder().encode(json);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}
function decodeBackupCode(code){
  // Reverse: base64 → binary → UTF-8 bytes → JSON
  const binary = atob(code.trim().replace(/\s+/g, ''));
  const bytes = new Uint8Array(binary.length);
  for(let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const json = new TextDecoder().decode(bytes);
  return JSON.parse(json);
}
async function copyBackupCode(){
  const itemCount = state.lib.items.length;
  const channelCount = (state.lib.channels||[]).length;
  if(!itemCount && !channelCount){ toast('Your library is empty — nothing to copy'); return; }
  try{
    const code = encodeBackupCode(state.lib);
    await navigator.clipboard.writeText(code);
    toast(`✅ Backup code copied! (${itemCount} title${itemCount===1?'':'s'}, ${channelCount} channel${channelCount===1?'':'s'}) — now paste it into WhatsApp, Telegram, or email and send it to yourself.`);
  }catch(e){
    // Fallback for devices where clipboard API is restricted (some Android WebViews)
    openModal(`
      <div class="modal-head"><h2>Your Backup Code</h2><button class="btn-icon" onclick="closeModal()">${ICON.close}</button></div>
      <p class="field-hint" style="margin-bottom:12px;">Clipboard access was blocked. Select all the text below, copy it, then send it to yourself via WhatsApp, Telegram, or email.</p>
      <textarea id="backupCodeOutput" readonly style="min-height:160px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; word-break:break-all;">${encodeBackupCode(state.lib)}</textarea>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="selectAndCopyBackupOutput()">Select All & Copy</button>
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      </div>
    `);
  }
}
function selectAndCopyBackupOutput(){
  const ta = document.getElementById('backupCodeOutput');
  if(!ta) return;
  ta.select();
  try{ document.execCommand('copy'); toast('Copied! Now paste it into WhatsApp, Telegram, or email.'); }
  catch(e){ toast('Select the text manually and copy it'); }

function normalizeSeasonsJson(data){
  const arr = Array.isArray(data) ? data : (data && Array.isArray(data.seasons) ? data.seasons : null);
  if(!arr) throw new Error('JSON must be an array of seasons, or an object like {"seasons":[...]}');
  return arr.map((s,si)=>{
    const number = parseInt(s.number ?? s.season ?? s.season_number ?? (si+1), 10) || (si+1);
    const eps = Array.isArray(s.episodes) ? s.episodes : [];
    const episodes = eps.map((e,ei)=>{
      const num = parseInt(e.number ?? e.episode ?? e.episode_number ?? (ei+1), 10) || (ei+1);
      let sources = [];
      if(Array.isArray(e.sources)) sources = e.sources.map(src=>({label:(src.label||'Source').toString(), url:(src.url||src.link||'').toString()})).filter(s=>s.url);
      else if(Array.isArray(e.urls)) sources = e.urls.filter(Boolean).map((u,i)=>({label:'Source '+(i+1), url:u}));
      else if(typeof e.url==='string' && e.url) sources = [{label:'Source 1', url:e.url}];
      else if(typeof e.link==='string' && e.link) sources = [{label:'Source 1', url:e.link}];
      if(!sources.length) sources = [{label:'',url:''}];
      return {number:num, title:(e.title||('Episode '+num)).toString(), thumbnail:(e.thumbnail||e.image||'').toString(), sources};
    });
    return {number, episodes};
  });
}
function applySeasonsJsonImport(){
  const text = document.getElementById('seasonsJsonText').value.trim();
  if(!text){ toast('Paste some JSON first'); return; }
  let data;
  try{ data = JSON.parse(text); }
  catch(e){ toast('Invalid JSON: '+e.message); return; }
  let normalized;
  try{ normalized = normalizeSeasonsJson(data); }
  catch(e){ toast(e.message); return; }

  let linksUpdated = 0, episodesAdded = 0, seasonsAdded = 0;
  normalized.forEach(ns=>{
    const season = state.editSeasons.find(s=>s.number===ns.number);
    if(!season){
      // Brand new season we don't have yet — nothing to merge with, add it as-is.
      state.editSeasons.push(ns);
      seasonsAdded++;
      episodesAdded += ns.episodes.length;
      return;
    }
    season.episodes = season.episodes || [];
    ns.episodes.forEach(newEp=>{
      const existingEp = season.episodes.find(e=>e.number===newEp.number);
      if(existingEp){
        // Only replace the links. Title/thumbnail/overview/runtime/rating already fetched from
        // TMDB/IMDb stay untouched — this is the whole point: re-pasting a links-only JSON after
        // fetching metadata shouldn't wipe that metadata back out.
        existingEp.sources = newEp.sources;
        // Fill in title/thumbnail only if we don't already have a real one (a generic
        // "Episode N" placeholder counts as not having one).
        if(newEp.title && (!existingEp.title || /^Episode \d+$/i.test(existingEp.title))) existingEp.title = newEp.title;
        if(newEp.thumbnail && !existingEp.thumbnail) existingEp.thumbnail = newEp.thumbnail;
        linksUpdated++;
      } else {
        season.episodes.push(newEp);
        episodesAdded++;
      }
    });
    season.episodes.sort((a,b)=>a.number-b.number);
  });
  state.editSeasons.sort((a,b)=>a.number-b.number);
  renderEditModal(state.editingId?getItem(state.editingId):null);
  const parts = [];
  if(linksUpdated) parts.push(`updated links for ${linksUpdated} episode(s)`);
  if(episodesAdded) parts.push(`added ${episodesAdded} new episode(s)`);
  if(seasonsAdded) parts.push(`${seasonsAdded} new season(s)`);
  toast(parts.length ? parts.join(', ').replace(/^./, c=>c.toUpperCase()) : 'Nothing to import');
}

// Shared TMDB detail pull used by both "Fetch from TMDB" (by title) and the IMDb auto-import.
// Populates genres/cast/poster/backdrop/logo/rating/runtime/description, and for TV shows,
// walks every season and pulls real episode titles + thumbnails (sources are left for you to add).
async function applyTmdbDetails(tmdbId, tmdbType){
  const key = state.settings.tmdb;
  const detailsRes = await fetch(`https://api.themoviedb.org/3/${tmdbType}/${tmdbId}?api_key=${encodeURIComponent(key)}&append_to_response=credits,videos,images&include_image_language=en,null`);
  const d = await detailsRes.json();
  if(d.success===false) throw new Error(d.status_message||'TMDB lookup failed');

  const titleVal = tmdbType==='movie' ? d.title : d.name;
  const dateVal = tmdbType==='movie' ? d.release_date : d.first_air_date;
  const year = dateVal ? dateVal.split('-')[0] : '';
  const poster = d.poster_path ? `https://image.tmdb.org/t/p/w780${d.poster_path}` : '';
  const backdrop = d.backdrop_path ? `https://image.tmdb.org/t/p/w1280${d.backdrop_path}` : '';
  const genres = (d.genres||[]).map(g=>g.name);
  const rating = d.vote_average ? d.vote_average.toFixed(1) : '';
  const runtimeMinutes = tmdbType==='movie' ? d.runtime : (d.episode_run_time && d.episode_run_time[0]);
  const runtime = runtimeMinutes ? `${runtimeMinutes} min` : '';
  const overview = d.overview || '';
  const cast = ((d.credits && d.credits.cast) || []).slice(0,10).map(c=>c.name);
  const logos = (d.images && d.images.logos) || [];
  const bestLogo = logos.find(l=>l.iso_639_1==='en') || logos[0];
  const logo = bestLogo ? `https://image.tmdb.org/t/p/original${bestLogo.file_path}` : '';
  const videos = ((d.videos && d.videos.results) || []).filter(v=>v.site==='YouTube');
  const trailerVid = videos.find(v=>v.type==='Trailer' && v.official) || videos.find(v=>v.type==='Trailer') || videos.find(v=>v.type==='Teaser') || videos[0];

  if(genres.length) state.editGenres = genres;
  if(cast.length) state.editActors = cast;

  let episodeCount = 0, seasonCount = 0;
  if(tmdbType==='tv' && Array.isArray(d.seasons)){
    const realSeasons = d.seasons.filter(s=>s.season_number>0);
    const seasonsData = [];
    for(const s of realSeasons){
      try{
        const seasonRes = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${s.season_number}?api_key=${encodeURIComponent(key)}`);
        const seasonJson = await seasonRes.json();
        const episodes = (seasonJson.episodes||[]).map(e=>({
          number: e.episode_number,
          title: e.name || `Episode ${e.episode_number}`,
          thumbnail: e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : '',
          overview: e.overview || '',
          runtime: e.runtime || null,
          sources: [{label:'',url:''}]
        }));
        seasonsData.push({number: s.season_number, episodes});
        episodeCount += episodes.length;
      }catch(e){ /* skip a season that fails to load rather than aborting the whole import */ }
    }
    seasonCount = seasonsData.length;
    state.editSeasons = seasonsData;
  }

  // Re-render so the genre pool / cast chips / season editor reflect the new data, then restore field values.
  // NOTE: this recreates every element in the modal (including any button that triggered this call),
  // so callers must not hold onto a DOM reference captured before this point — re-query by id instead.
  renderEditModal(state.editingId ? getItem(state.editingId) : null);
  const setVal = (id, val)=>{ const el=document.getElementById(id); if(el && val) el.value = val; };
  setVal('f_title', titleVal);
  setVal('f_year', year);
  setVal('f_poster', poster);
  setVal('f_backdrop', backdrop);
  setVal('f_logo', logo);
  setVal('f_desc', overview);
  setVal('f_rating', rating);
  setVal('f_runtime', runtime);

  return { tmdbId, trailerKey: trailerVid ? trailerVid.key : '', logo, seasonCount, episodeCount };
}

async function fetchTmdbByTitle(){
  const title = document.getElementById('f_title').value.trim();
  if(!title){ toast('Enter a title first'); return; }
  if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings'); return; }
  setTmdbFetchBtnState('Fetching...', true);
  try{
    const tmdbType = state.editType==='series' ? 'tv' : 'movie';
    const yearVal = document.getElementById('f_year').value.trim();
    const yearParam = yearVal ? (tmdbType==='movie' ? `&year=${encodeURIComponent(yearVal)}` : `&first_air_date_year=${encodeURIComponent(yearVal)}`) : '';
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/${tmdbType}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(title)}${yearParam}`);
    const searchData = await searchRes.json();
    if(searchData.success===false){
      toast(`TMDB error: ${searchData.status_message||'request failed'} — check your API key in Settings (it needs the "API Key (v3 auth)", not the Read Access Token)`);
      return;
    }
    const match = searchData.results && searchData.results[0];
    if(!match){ toast(`No TMDB match found for "${title}"${yearVal?' ('+yearVal+')':''}${yearVal?' — try clearing the year and searching again':''}`); return; }
    const info = await applyTmdbDetails(match.id, tmdbType);
    state.editImdbMeta = Object.assign({}, state.editImdbMeta, {tmdbId: info.tmdbId, trailerKey: info.trailerKey, trailerChecked: !!info.trailerKey});
    toast(info.seasonCount ? `Fetched from TMDB — ${info.seasonCount} season(s), ${info.episodeCount} episode(s)` : 'Metadata fetched from TMDB');
  }catch(e){
    toast('Failed to fetch from TMDB: ' + (e.message || 'network error'));
  }finally{
    setTmdbFetchBtnState('Fetch from TMDB', false);
  }
}

// IMDb Auto Import: paste any IMDb title URL, get metadata + (for TV) full season/episode
// structure pulled automatically from OMDb + TMDB. Stream sources are left for you to fill in —
// see the note in the UI for why links aren't auto-generated.
async function importFromImdb(){
  const raw = document.getElementById('imdbUrlInput').value.trim();
  const idMatch = raw.match(/tt\d{6,10}/);
  if(!idMatch){ toast('Paste a valid IMDb URL (e.g. imdb.com/title/tt0111161/)'); return; }
  const imdbId = idMatch[0];
  if(!state.settings.omdb){ toast('Add your OMDb API key in Settings first'); return; }
  if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings first — needed for backdrops, logos, trailers, and season data'); return; }

  const setBtnState = (text, disabled)=>{
    // Re-queried on demand since applyTmdbDetails re-renders the whole modal partway through.
    const b = document.getElementById('imdbImportBtn');
    if(b){ b.disabled = disabled; b.textContent = text; }
  };
  setBtnState('Importing...', true);
  try{
    // OMDb by IMDb ID gives us a reliable Movie/Series type plus baseline fields.
    const omdbRes = await fetch(`https://www.omdbapi.com/?i=${encodeURIComponent(imdbId)}&plot=full&apikey=${encodeURIComponent(state.settings.omdb)}`);
    const omdb = await omdbRes.json();
    if(omdb.Response==='False'){ toast(omdb.Error || 'IMDb ID not found on OMDb — double-check your OMDb key in Settings'); return; }
    const type = omdb.Type==='series' ? 'series' : 'movie';
    state.editType = type;

    // Resolve the TMDB numeric ID from the IMDb ID so we can pull backdrops/logos/trailers/seasons.
    const tmdbType = type==='series' ? 'tv' : 'movie';
    const findRes = await fetch(`https://api.themoviedb.org/3/find/${imdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}&external_source=imdb_id`);
    const find = await findRes.json();
    if(find.success===false){
      toast(`TMDB error: ${find.status_message||'request failed'} — check your API key in Settings (it needs the "API Key (v3 auth)", not the Read Access Token)`);
      return;
    }
    const results = tmdbType==='movie' ? find.movie_results : find.tv_results;
    const tmdbMatch = results && results[0];

    let info = null;
    if(tmdbMatch){
      info = await applyTmdbDetails(tmdbMatch.id, tmdbType);
    } else {
      if(omdb.Genre) state.editGenres = omdb.Genre.split(',').map(g=>g.trim()).filter(Boolean);
      if(omdb.Actors && omdb.Actors!=='N/A') state.editActors = omdb.Actors.split(',').map(a=>a.trim()).filter(Boolean);
      renderEditModal(state.editingId?getItem(state.editingId):null);
    }

    // Fill in anything TMDB left blank (or wasn't available at all) using OMDb's data,
    // and prefer OMDb's IMDb rating since that's the number most people recognize.
    const setIfEmpty = (id, val)=>{ const el=document.getElementById(id); if(el && !el.value && val && val!=='N/A') el.value = val; };
    setIfEmpty('f_title', omdb.Title);
    setIfEmpty('f_year', (omdb.Year||'').split('–')[0].split('-')[0]);
    setIfEmpty('f_poster', omdb.Poster);
    setIfEmpty('f_desc', omdb.Plot);
    setIfEmpty('f_runtime', omdb.Runtime);
    if(omdb.imdbRating && omdb.imdbRating!=='N/A'){ const r=document.getElementById('f_rating'); if(r) r.value = omdb.imdbRating; }

    state.editImdbMeta = {
      imdbId,
      tmdbId: info ? info.tmdbId : null,
      trailerKey: info ? info.trailerKey : '',
      trailerChecked: !!(info && info.trailerKey),
    };

    const seasonNote = (info && info.seasonCount) ? ` — ${info.seasonCount} season(s), ${info.episodeCount} episode(s)` : '';
    const tmdbNote = tmdbMatch ? '' : ' (no TMDB match — used OMDb data only, so no backdrop/logo/trailer)';
    toast(`Imported from IMDb${seasonNote}${tmdbNote}. Now add your stream source(s) below.`);
  }catch(e){
    toast('Import failed: ' + (e.message || 'check your API keys and the IMDb URL'));
  }finally{
    setBtnState('Import', false);
  }
}

const VIDSRC_DOMAINS = ['vidsrc-embed.ru','vidsrc-embed.su','vidsrcme.su','vsrc.su'];
const VIDSRC_MATCH = /vidsrc[-a-z]*\.(ru|su|to|me|pro|cc|xyz|net|in|vip)|vsrc\.su/i;

function detectEmbed(url){
  url = url.trim();
  let m;
  if((m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/live\/)([\w-]{6,})/))){
    return {kind:'iframe', src:`https://www.youtube.com/embed/${m[1]}?autoplay=1`};
  }
  // Live stream tied to a channel ID rather than a video ID (e.g. youtube.com/channel/UC.../live)
  if((m = url.match(/youtube\.com\/channel\/([\w-]+)\/live/))){
    return {kind:'iframe', src:`https://www.youtube.com/embed/live_stream?channel=${m[1]}&autoplay=1`};
  }
  if((m = url.match(/dailymotion\.com\/video\/([\w]+)/))){
    return {kind:'iframe', src:`https://www.dailymotion.com/embed/video/${m[1]}`};
  }
  // VidSrc family — always rewritten onto the configured mirror domain
  if(VIDSRC_MATCH.test(url)){
    return {kind:'iframe', src: normalizeVidsrc(url), isVidsrc:true};
  }
  if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)){
    return {kind:'video', src:url};
  }
  if(/\.m3u8(\?|$)/i.test(url)){
    return {kind:'hls', src:url};
  }
  return {kind:'iframe', src:url};
}

function normalizeVidsrc(url){
  const domain = VIDSRC_DOMAINS.includes(state.settings.vidsrcDomain) ? state.settings.vidsrcDomain : VIDSRC_DOMAINS[0];
  let m;
  // imdb/tmdb query-style embed links: keep params, just swap the host
  if((m = url.match(/[?&](imdb|tmdb)=([\w]+)/i))){
    const rest = url.split(/\/\/[^/]+/)[1] || '';
    return `https://${domain}${rest}`;
  }
  // /embed/movie/{id} or /movie/{id}
  if((m = url.match(/\/(?:embed\/)?movie\/([\w]+)/i))){
    return `https://${domain}/embed/movie/${m[1]}`;
  }
  // /embed/tv/{id}/{season}/{episode} or /tv/{id}/{season}/{episode}
  if((m = url.match(/\/(?:embed\/)?tv\/([\w]+)\/(\d+)\/(\d+)/i))){
    return `https://${domain}/embed/tv/${m[1]}/${m[2]}/${m[3]}`;
  }
  // /embed/tv/{id} or /tv/{id}
  if((m = url.match(/\/(?:embed\/)?tv\/([\w]+)/i))){
    return `https://${domain}/embed/tv/${m[1]}`;
  }
  // Unrecognized path shape — just swap the host onto the preferred domain, keep the rest.
  const rest = url.split(/\/\/[^/]+/)[1] || '';
  return `https://${domain}${rest}`;
}

function getNextEpisode(item, seasonNum, epNum){
  if(item.type!=='series' || seasonNum==null) return null;
  const seasons = (item.seasons||[]).slice().sort((a,b)=>a.number-b.number);
  const si = seasons.findIndex(s=>s.number===seasonNum);
  if(si===-1) return null;
  const eps = (seasons[si].episodes||[]).slice().sort((a,b)=>a.number-b.number);
  const ei = eps.findIndex(e=>e.number===epNum);
  if(ei>-1 && ei+1<eps.length){
    return {seasonNum:seasons[si].number, ep:eps[ei+1]};
  }
  if(si+1<seasons.length){
    const nextEps = (seasons[si+1].episodes||[]).slice().sort((a,b)=>a.number-b.number);
    if(nextEps.length) return {seasonNum:seasons[si+1].number, ep:nextEps[0]};
  }
  return null;
}
function playNextEpisode(){
  const p = state.player;
  if(!p) return;
  const item = getItem(p.itemId);
  const next = getNextEpisode(item, p.seasonNum, p.epNum);
  if(!next){ toast('No more episodes'); return; }
  cleanupPlayerTimers();
  openPlayer(item, next.seasonNum, next.ep.number, next.ep.sources||[]);
}

function openPlayer(item, seasonNum, epNum, sources){
  sources = sources || [];
  if(!sources.length){ toast('No sources available'); return; }
  if(seasonNum!=null && item.type==='series' && !item.watchlist){
    item.watchlist = true;
    toast('Added to Watchlist — tracking your progress');
  }
  state.player = {
    itemId: item.id, seasonNum, epNum, sources, sourceIdx:0,
    key: seasonNum!=null ? 's'+seasonNum+'e'+epNum : 'movie',
    subtitle: seasonNum!=null ? `Season ${seasonNum} · Episode ${epNum}` : (item.year||''),
  };
  item.lastWatched = new Date().toISOString();
  saveLib();
  renderPlayer();
  document.getElementById('playerOverlay').classList.add('open');
}
function playChannel(id){
  const ch = getChannel(id);
  if(!ch || !ch.sources || !ch.sources.length){ toast('No stream sources available'); return; }
  state.player = {
    isLive:true, channelId:id, sources:ch.sources, sourceIdx:0,
    subtitle: ch.category || 'General',
    title: ch.name,
  };
  renderPlayer();
  document.getElementById('playerOverlay').classList.add('open');
}
function renderPlayer(){
  const p = state.player;
  const isLive = !!p.isLive;
  const item = isLive ? null : getItem(p.itemId);
  const titleText = isLive ? p.title : item.title;
  const src = p.sources[p.sourceIdx];
  const embed = detectEmbed(src.url);
  const overlay = document.getElementById('playerOverlay');
  const next = isLive ? null : getNextEpisode(item, p.seasonNum, p.epNum);

  let stageHtml = '';
  if(embed.kind==='video'){
    stageHtml = `<video id="playerVideoEl" src="${esc(embed.src)}" controls autoplay></video>`;
  } else if(embed.kind==='hls'){
    stageHtml = `<video id="playerVideoEl" controls autoplay playsinline></video>`;
  } else {
    // Sandbox is opt-in via Settings > Block Popup/Redirect Ads. It stops third-party embeds from
    // opening popups or redirecting the tab, but some ad-supported mirrors (like certain VidSrc
    // clones) detect a sandboxed/popup-blocked iframe and refuse to play ("Media Unavailable") as a
    // countermeasure — so it's off by default to match normal-browser playback behavior.
    const sandboxAttr = state.settings.blockPopupAds ? ' sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"' : '';
    stageHtml = `<iframe id="playerIframeEl" src="${esc(embed.src)}" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen loading="eager"${sandboxAttr}></iframe>`;
  }

  overlay.innerHTML = `
    <div class="player-top">
      <div>
        <div class="player-title">${isLive?'<span class="live-badge">● LIVE</span> ':''}${esc(titleText)} ${embed.kind==='hls'?'<span class="hls-badge">HLS</span>':''}</div>
        <div class="player-sub">${esc(p.subtitle)} ${src.label?'· '+esc(src.label):''}</div>
      </div>
      <div class="player-top-actions">
        <button class="btn-icon" title="Hide screen" onclick="togglePlayerHide()">${ICON.eyeOff}</button>
        <button class="btn-icon" id="playerFullscreenBtn" title="Fullscreen" onclick="togglePlayerFullscreen()">${ICON.expand}</button>
        <button class="btn-icon" onclick="closePlayer()">${ICON.close}</button>
      </div>
    </div>
    <div class="player-stage" id="playerStage">
      ${stageHtml}
      <div class="player-loading" id="playerLoading"><div class="spinner"></div><span class="player-loading-label">Loading stream…</span></div>
      <div class="player-hover-zone" onmouseenter="scheduleHideControls()"></div>
    </div>
    <div id="upNextBanner"></div>
    ${next ? `
    <div class="player-next-side" title="Next: S${next.seasonNum}E${next.ep.number} — ${esc(next.ep.title||('Episode '+next.ep.number)).replace(/"/g,'&quot;')}" onclick="playNextEpisode()">
      <div class="pns-thumb">${next.ep.thumbnail?`<img src="${esc(next.ep.thumbnail)}" alt="">`:''}<span class="pns-play-icon">${ICON.play}</span></div>
    </div>` : ''}
    ${p.sources.length>1 ? `<div class="player-bottom"><button class="btn btn-ghost" onclick="tryNextSource()">Try Next Source</button></div>` : ''}
  `;
  scheduleHideControls();

  const isVideoLike = embed.kind==='video' || embed.kind==='hls';
  const stageEl = document.getElementById(isVideoLike ? 'playerVideoEl' : 'playerIframeEl');
  const hideSpinner = ()=>{ const l = document.getElementById('playerLoading'); if(l) l.classList.add('done'); };
  if(stageEl){
    stageEl.addEventListener('load', hideSpinner);
    stageEl.addEventListener('loadeddata', hideSpinner);
    stageEl.addEventListener('canplay', hideSpinner);
  }
  // Safety net: some cross-origin iframes never fire load reliably — clear the spinner regardless.
  setTimeout(hideSpinner, 4000);

  if(embed.kind==='hls') initHlsPlayer(embed.src, hideSpinner);
  if(isVideoLike){
    const vidEl = document.getElementById('playerVideoEl');
    if(vidEl && state.player) state.player._blurInterval = startVideoContentBlurWatch(vidEl);
  }

  if(isLive) return; // no progress tracking / watch timers for live channels

  if(isVideoLike){
    const vid = document.getElementById('playerVideoEl');
    const saved = (item.progress||{})[p.key];
    if(saved && saved.timestamp) vid.currentTime = saved.timestamp;
    p._interval = setInterval(()=>{
      if(!vid.duration || !isFinite(vid.duration)) return;
      saveProgress(item, p.key, vid.currentTime, vid.duration, vid.currentTime >= vid.duration*getWatchedThreshold(p.seasonNum));
    }, 5000);
    vid.addEventListener('ended', ()=>{
      if(isFinite(vid.duration)) saveProgress(item, p.key, vid.duration, vid.duration, true);
      if(next) showUpNextBanner(next);
    });
    vid.addEventListener('error', ()=>{
      hideSpinner();
      if(p.sources.length>1){ toast('This source failed — trying the next one'); tryNextSource(); }
      else toast('This source failed to play');
    });
  } else {
    // We have zero visibility inside a third-party iframe (VidSrc, etc.) — no currentTime, no
    // play/pause events, nothing. The only signal available at all is how long our own player
    // has been open. So progress here is real elapsed wall-clock time against the title's known
    // runtime (from OMDb/TMDB), not verified playback — it resumes from wherever a previous
    // session left off (supports watching across multiple sittings), and pauses counting while
    // the browser tab itself is hidden/unfocused (the one case we CAN detect reliably). It does
    // NOT know if you paused *inside* the iframe's own player while keeping our tab focused —
    // that's a real gap with no fix available short of the source's own cooperation.
    clearInterval(p._watchTimer);
    const totalSeconds = getPlaybackDurationSeconds(item, p.seasonNum, p.epNum);
    const savedIf = (item.progress||{})[p.key];
    let elapsed = (savedIf && savedIf.timestamp) || 0;
    let lastTick = Date.now();
    p._watchTimer = setInterval(()=>{
      const now = Date.now();
      const delta = (now - lastTick) / 1000;
      lastTick = now;
      if(!document.hidden) elapsed += delta;
      elapsed = Math.min(elapsed, totalSeconds);
      const watched = totalSeconds>0 && elapsed >= totalSeconds*getWatchedThreshold(p.seasonNum);
      saveProgress(item, p.key, elapsed, totalSeconds, watched);
      if(watched){ clearInterval(p._watchTimer); if(next) showUpNextBanner(next); }
    }, 10000);
  }
}
let hlsJsLoadPromise = null;
function loadHlsJs(){
  if(window.Hls) return Promise.resolve(window.Hls);
  if(hlsJsLoadPromise) return hlsJsLoadPromise;
  hlsJsLoadPromise = new Promise((resolve, reject)=>{
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js';
    script.onload = ()=> resolve(window.Hls);
    script.onerror = ()=> reject(new Error('Failed to load HLS.js'));
    document.head.appendChild(script);
  });
  return hlsJsLoadPromise;
}
async function initHlsPlayer(src, hideSpinner){
  const vid = document.getElementById('playerVideoEl');
  if(!vid) return;
  // Safari (and some mobile browsers) can play HLS natively — no library needed.
  if(vid.canPlayType('application/vnd.apple.mpegurl')){
    vid.src = src;
    return;
  }
  try{
    const Hls = await loadHlsJs();
    if(!Hls || !Hls.isSupported()){
      toast('HLS playback is not supported in this browser');
      hideSpinner && hideSpinner();
      return;
    }
    const hls = new Hls({ maxBufferLength: 30, enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ hideSpinner && hideSpinner(); vid.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (evt, data)=>{
      if(!data.fatal) return;
      if(data.type===Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
      else if(data.type===Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
      else{
        hideSpinner && hideSpinner();
        if(state.player && state.player.sources.length>1){ toast('Stream failed — trying the next source'); tryNextSource(); }
        else toast('Stream failed to load');
        hls.destroy();
      }
    });
    if(state.player) state.player._hls = hls;
  }catch(e){
    toast('Failed to load the HLS player');
    hideSpinner && hideSpinner();
  }
}
function togglePlayerFullscreen(){
  const stage = document.getElementById('playerStage');
  if(!stage) return;
  if(!document.fullscreenElement) stage.requestFullscreen?.().catch(()=>{});
  else document.exitFullscreen?.().catch(()=>{});
}
// A manual, on-demand "cover the screen" toggle — a plain opaque/blurred overlay placed on top of
// the video. Unlike the AI-based Content Blur feature, this needs no pixel analysis at all, so it
// works identically on direct video AND third-party iframes (VidSrc, live TV) — the one thing this
// app's smart detection can never reach, a manual cover always can, since it's just visually on top.
function togglePlayerHide(){
  const stage = document.getElementById('playerStage');
  if(!stage) return;
  const existing = document.getElementById('playerHideOverlay');
  if(existing){ existing.remove(); return; }
  const overlay = document.createElement('div');
  overlay.id = 'playerHideOverlay';
  overlay.className = 'player-hide-overlay';
  overlay.innerHTML = `<div class="player-hide-icon">${ICON.eyeOff}</div><span>Screen Hidden — tap to reveal</span>`;
  overlay.onclick = ()=> overlay.remove();
  stage.appendChild(overlay);
}
function showUpNextBanner(next){
  const el = document.getElementById('upNextBanner');
  if(!el) return;
  const totalSeconds = 8;
  let seconds = totalSeconds;
  el.innerHTML = `
    <div class="up-next">
      <div class="up-next-thumb">${next.ep.thumbnail?`<img src="${esc(next.ep.thumbnail)}" alt="">`:''}</div>
      <div class="up-next-info">
        <span class="up-next-label">Up Next</span>
        <span class="up-next-title">${esc(next.ep.title||('Episode '+next.ep.number))}</span>
        <div class="up-next-progress"><div id="upNextProgressBar"></div></div>
      </div>
      <div class="up-next-actions">
        <button class="btn btn-primary" onclick="playNextEpisode()">${ICON.play} Play Now</button>
        <button class="btn btn-ghost" onclick="cancelUpNext()">Cancel</button>
      </div>
    </div>`;
  const bar = document.getElementById('upNextProgressBar');
  if(bar) bar.style.transition = `width ${totalSeconds}s linear`;
  requestAnimationFrame(()=>{ if(bar) bar.style.width = '100%'; }); // triggers the CSS transition
  state.player._upNextInterval = setInterval(()=>{
    seconds--;
    if(seconds<=0){
      clearInterval(state.player._upNextInterval);
      playNextEpisode();
    }
  }, 1000);
}
function cancelUpNext(){
  if(state.player && state.player._upNextInterval) clearInterval(state.player._upNextInterval);
  const el = document.getElementById('upNextBanner');
  if(el) el.innerHTML = '';
}
function saveProgress(item, key, timestamp, duration, watched){
  item.progress = item.progress || {};
  const prevWatched = !!(item.progress[key] && item.progress[key].watched);
  item.progress[key] = {timestamp: Math.round(timestamp||0), duration: Math.round(duration||0), watched: !!watched};
  item.lastWatched = new Date().toISOString();
  saveLib();
  // Only check on the moment an episode newly becomes watched — not on every 5-10s progress tick —
  // so this can't fire repeatedly while the same episode keeps playing.
  if(watched && !prevWatched) maybeAutoAddNextSeason(item, key);
}
// If the episode that just got marked watched was the last untracked one in its season, and TMDB
// metadata is available for this show, silently pull in the next season's episode list (titles,
// thumbnails, overviews, runtimes) so it's ready to track. It can NEVER add playable stream links —
// TMDB doesn't have those — so every auto-added episode starts with an empty source slot and a
// notification is raised asking the user to paste one in.
function isSeasonFullyWatched(item, seasonNum){
  const season = (item.seasons||[]).find(s=>s.number===seasonNum);
  if(!season || !season.episodes || !season.episodes.length) return false;
  const prog = item.progress || {};
  return season.episodes.every(e=>{
    const p = prog['s'+seasonNum+'e'+e.number];
    return p && p.watched;
  });
}
async function fetchTmdbSeasonEpisodes(tmdbId, seasonNumber){
  const key = state.settings.tmdb;
  if(!key) return null;
  try{
    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNumber}?api_key=${encodeURIComponent(key)}`);
    if(!res.ok) return null;
    const json = await res.json();
    if(json.success===false || !Array.isArray(json.episodes) || !json.episodes.length) return null;
    return json.episodes.map(e=>({
      number: e.episode_number,
      title: e.name || `Episode ${e.episode_number}`,
      thumbnail: e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : '',
      overview: e.overview || '',
      runtime: e.runtime || null,
      myRating: 0,
      sources: [{label:'', url:''}]
    }));
  }catch(e){ return null; }
}
async function maybeAutoAddNextSeason(item, key){
  if(item.type!=='series') return;
  const m = /^s(\d+)e(\d+)$/.exec(key);
  if(!m) return;
  const seasonNum = parseInt(m[1],10);
  if(!isSeasonFullyWatched(item, seasonNum)) return;
  const nextNum = seasonNum + 1;
  if((item.seasons||[]).some(s=>s.number===nextNum)) return; // already tracked — nothing to add
  if(!item.tmdbId || !state.settings.tmdb) return; // can't look anything up without both of these
  const episodes = await fetchTmdbSeasonEpisodes(item.tmdbId, nextNum);
  if(!episodes) return; // no next season on TMDB (show's finished) or the lookup failed — stay quiet
  item.seasons = item.seasons || [];
  item.seasons.push({number: nextNum, episodes});
  item.seasons.sort((a,b)=>a.number-b.number);
  saveLib();
  addNeedsLinkNotification(item, nextNum);
  if(state.route==='detail' && state.routeParam===item.id){
    document.getElementById('pageRoot').innerHTML = renderDetail(item.id);
  }
  toast(`Season ${nextNum} of "${item.title}" added — add a stream link to watch it`);
}
function tryNextSource(){
  const p = state.player;
  p.sourceIdx = (p.sourceIdx+1) % p.sources.length;
  cleanupPlayerTimers();
  renderPlayer();
}
function cleanupPlayerTimers(){
  if(state.player){
    clearInterval(state.player._interval);
    clearInterval(state.player._watchTimer);
    clearInterval(state.player._upNextInterval);
    clearInterval(state.player._blurInterval);
    if(state.player._hls){ try{ state.player._hls.destroy(); }catch(e){} state.player._hls = null; }
  }
  clearTimeout(controlsHideTimer);
}
let controlsHideTimer = null;
function scheduleHideControls(){
  clearTimeout(controlsHideTimer);
  const overlay = document.getElementById('playerOverlay');
  if(overlay) overlay.classList.remove('controls-hidden');
  controlsHideTimer = setTimeout(()=>{
    const ov = document.getElementById('playerOverlay');
    if(ov && ov.classList.contains('open')) ov.classList.add('controls-hidden');
  }, 3200);
}
document.addEventListener('mousemove', e=>{
  const overlay = document.getElementById('playerOverlay');
  if(overlay && overlay.classList.contains('open')) scheduleHideControls();
});
document.addEventListener('touchstart', e=>{
  const overlay = document.getElementById('playerOverlay');
  if(overlay && overlay.classList.contains('open')) scheduleHideControls();
});
function closePlayer(){
  cleanupPlayerTimers();
  document.getElementById('playerOverlay').classList.remove('open','controls-hidden');
  setTimeout(()=>{ document.getElementById('playerOverlay').innerHTML=''; }, 260);
  state.player = null;
  router();
}

/* =========================================================
   GLOBAL KEYS
========================================================= */
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(document.getElementById('playerOverlay').classList.contains('open')) closePlayer();
    else if(document.getElementById('modalOverlay').classList.contains('open')) closeModal();
    return;
  }
  const playerOpen = document.getElementById('playerOverlay').classList.contains('open');
  if(!playerOpen) return;
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
  const vid = document.getElementById('playerVideoEl');
  scheduleHideControls();
  if(e.key==='f' || e.key==='F'){ e.preventDefault(); togglePlayerFullscreen(); return; }
  if(e.key==='h' || e.key==='H'){ e.preventDefault(); togglePlayerHide(); return; }
  if(!vid) return; // remaining shortcuts only apply to direct video sources, not third-party iframes
  if(e.key===' ' || e.code==='Space'){ e.preventDefault(); vid.paused ? vid.play() : vid.pause(); }
  else if(e.key==='ArrowRight'){ e.preventDefault(); vid.currentTime = Math.min(vid.duration||Infinity, vid.currentTime+10); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); vid.currentTime = Math.max(0, vid.currentTime-10); }
  else if(e.key==='m' || e.key==='M'){ e.preventDefault(); vid.muted = !vid.muted; }
});

/* =========================================================
   INIT
========================================================= */
router.__manual__ = function(){};

/* =========================================================
   ANDROID TV MODE
   Activated by: ?tv=1 in the URL, OR localStorage flag,
   OR auto-detected (large screen + no fine pointer = TV/projector)
========================================================= */
function isTvMode(){
  // Auto-detect only: large screen + coarse pointer (remote/gamepad) or no hover capability
  const coarse = window.matchMedia('(pointer: coarse)').matches;
  const wide = window.innerWidth >= 1280;
  const noHover = window.matchMedia('(hover: none)').matches;
  return wide && (coarse || noHover);
}

// Make all interactive elements reachable via D-pad (tabindex=0)
function makeFocusable(){
  if(!document.body.classList.contains('tv-mode')) return;
  // Cards, episode cards, channel cards, nav items, buttons, links
  document.querySelectorAll('.card, .episode-card, .channel-card, .collection-card, .watchlist-row, .schedule-row, .nav-item').forEach(el=>{
    if(!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
  });
}

// Re-run makeFocusable whenever the page re-renders
const _origRouter = router;
window.addEventListener('hashchange', ()=> setTimeout(makeFocusable, 120));
// Patch router to always re-apply after render
const _patchedRouter = router;

// D-pad / keyboard navigation in TV mode
document.addEventListener('keydown', e=>{
  if(!document.body.classList.contains('tv-mode')) return;

  // Back button (Escape or AndroidTV back = Escape in WebView)
  if(e.key === 'Escape' || e.key === 'GoBack'){
    if(document.getElementById('playerOverlay').classList.contains('open')){ closePlayer(); return; }
    if(document.getElementById('modalOverlay').classList.contains('open')){ closeModal(); return; }
    if(state.route !== 'home'){ history.back(); return; }
  }

  // Play button on remote — quick play focused card
  if(e.key === 'MediaPlayPause' || e.key === 'Play'){
    const focused = document.activeElement;
    if(focused && focused.classList.contains('card')){
      const id = focused.getAttribute('onclick')||'';
      const m = id.match(/detail\/([^']+)/);
      if(m) quickPlay(m[1]);
    }
    return;
  }

  // Enter/OK on focused card or nav item
  if(e.key === 'Enter'){
    const focused = document.activeElement;
    if(focused && (focused.classList.contains('card') || focused.classList.contains('nav-item') || focused.classList.contains('episode-card') || focused.classList.contains('channel-card') || focused.classList.contains('collection-card') || focused.classList.contains('watchlist-row') || focused.classList.contains('schedule-row'))){
      e.preventDefault();
      focused.click();
      return;
    }
  }

  // Arrow key spatial navigation between focusable elements
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    const player = document.getElementById('playerOverlay');
    if(player && player.classList.contains('open')) return; // let player handle arrows

    const focusable = Array.from(document.querySelectorAll(
      '.card, .episode-card, .channel-card, .collection-card, .watchlist-row, .schedule-row, .nav-item, .btn, .btn-icon, input, select, textarea, [tabindex="0"]'
    )).filter(el=>{
      const r = el.getBoundingClientRect();
      return r.width > 0 && r.height > 0 && !el.closest('.player-overlay');
    });

    const current = document.activeElement;
    if(!focusable.length) return;

    if(!focusable.includes(current)){
      // Nothing focused yet — focus the first card or nav item
      const first = focusable.find(el=>el.classList.contains('nav-item') || el.classList.contains('card'));
      if(first){ e.preventDefault(); first.focus(); }
      return;
    }

    const cr = current.getBoundingClientRect();
    const cx = cr.left + cr.width/2;
    const cy = cr.top + cr.height/2;

    // Find the best candidate in the pressed direction
    let best = null, bestScore = Infinity;
    for(const el of focusable){
      if(el === current) continue;
      const r = el.getBoundingClientRect();
      const ex = r.left + r.width/2;
      const ey = r.top + r.height/2;
      const dx = ex - cx, dy = ey - cy;

      let inDir = false;
      if(e.key==='ArrowRight' && dx > 10) inDir = true;
      if(e.key==='ArrowLeft'  && dx < -10) inDir = true;
      if(e.key==='ArrowDown'  && dy > 10) inDir = true;
      if(e.key==='ArrowUp'    && dy < -10) inDir = true;
      if(!inDir) continue;

      // Score: prioritise alignment on the perpendicular axis, then distance
      const perpendicular = (e.key==='ArrowLeft'||e.key==='ArrowRight') ? Math.abs(dy) : Math.abs(dx);
      const distance = Math.sqrt(dx*dx + dy*dy);
      const score = perpendicular * 2 + distance;
      if(score < bestScore){ bestScore = score; best = el; }
    }

    if(best){
      e.preventDefault();
      best.focus();
      best.scrollIntoView({block:'nearest', inline:'nearest', behavior:'smooth'});
    }
  }
}, true);

// Init TV mode on load — fully automatic, no user action needed
if(isTvMode()){
  document.body.classList.add('tv-mode');
}
setTimeout(makeFocusable, 200);
window.addEventListener('hashchange', ()=> setTimeout(makeFocusable, 200));

router();
</script>
