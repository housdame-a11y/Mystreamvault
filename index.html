<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090d;
  --surface:#0f1117;
  --surface2:#161923;
  --primary:#0D4A4A;
  --highlight:#3ddbd9;
  --highlight-dim:rgba(61,219,217,.16);
  --text:#e8f0ef;
  --muted:#5a7a78;
  --radius:10px;
  --display-font:'Inter Tight','Inter',system-ui,sans-serif;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(1100px 620px at 12% -8%, rgba(13,74,74,.35), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(61,219,217,.05), transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  font-feature-settings:'ss01' 1, 'cv05' 1;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img{-webkit-user-drag:none;user-select:none;}
button{font-family:inherit; cursor:pointer; border:none; outline:none; background:none; color:inherit;}
input,select,textarea{font-family:inherit; color:var(--text); outline:none; direction:ltr; text-align:left;}
a{color:inherit; text-decoration:none;}
::-webkit-scrollbar{height:8px; width:8px;}
::-webkit-scrollbar-thumb{background:#1d2230; border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
:focus-visible{outline:2px solid var(--highlight); outline-offset:2px;}

/* ---------- Layout shell ---------- */
#app{display:flex; min-height:100vh;}

.sidebar{
  width:230px; flex-shrink:0; background:var(--surface);
  border-right:1px solid #1a1d26; padding:26px 16px;
  display:flex; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh;
}
.brand{
  display:flex; align-items:center; gap:11px; padding:2px 8px 24px 8px; margin-bottom:12px;
  border-bottom:1px solid #1a1d26;
}
.brand .mark{
  width:34px; height:34px; border-radius:9px;
  background:linear-gradient(135deg,var(--highlight),var(--primary) 78%);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; color:#04211f; font-size:15px; font-family:var(--display-font);
  box-shadow:0 4px 16px rgba(61,219,217,.28);
}
.brand span{font-weight:800; font-size:17px; letter-spacing:.1px; font-family:var(--display-font);}

.nav-item{
  display:flex; align-items:center; gap:12px;
  padding:11px 13px; border-radius:9px; color:var(--muted); position:relative;
  font-size:13.5px; font-weight:600; transition:background var(--transition), color var(--transition);
}
.nav-item svg{width:18px; height:18px; flex-shrink:0; transition:transform var(--transition);}
.nav-item:hover{background:#161923; color:var(--text);}
.nav-item:hover svg{transform:translateY(-1px);}
.nav-item.active{background:linear-gradient(90deg, var(--highlight-dim), transparent); color:var(--highlight); font-weight:700;}
.nav-item.active::before{
  content:''; position:absolute; left:-16px; top:50%; transform:translateY(-50%);
  width:3px; height:18px; border-radius:0 3px 3px 0; background:var(--highlight);
}

.main{flex:1; min-width:0; padding-bottom:60px;}
.topbar{
  position:sticky; top:0; z-index:20; backdrop-filter:blur(16px) saturate(140%);
  background:rgba(8,9,13,.68); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; gap:16px;
  border-bottom:1px solid #14161f; transition:box-shadow var(--transition);
}
.topbar.scrolled{box-shadow:0 8px 24px rgba(0,0,0,.35);}
.topbar h1{font-size:23px; font-weight:800; letter-spacing:.1px; font-family:var(--display-font);}
.topbar-actions{display:flex; gap:10px; align-items:center;}

.btn{
  padding:10px 18px; border-radius:8px; font-weight:700; font-size:13.5px;
  transition:transform var(--transition), background var(--transition), opacity var(--transition), box-shadow var(--transition);
  display:inline-flex; align-items:center; gap:8px; white-space:nowrap;
}
.btn svg{width:15px; height:15px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(135deg, var(--highlight), #2bc4c1); color:#04211f; box-shadow:0 4px 18px rgba(61,219,217,.22);}
.btn-primary:hover{box-shadow:0 6px 22px rgba(61,219,217,.36); transform:translateY(-1px);}
.btn-icon-only{width:38px; height:38px; padding:0; border-radius:8px; flex-shrink:0; justify-content:center;}
.btn-icon-only svg{width:17px; height:17px;}
.btn-ghost{background:#161923; color:var(--text); border:1px solid #232837;}
.btn-ghost:hover{background:#1c2130; border-color:#2c3244;}
.btn-danger{background:#3a1218; color:#ff8b93; border:1px solid #4d1a20;}
.btn-danger:hover{background:#481318;}
.btn-icon{width:38px; height:38px; border-radius:8px; background:#161923; display:flex; align-items:center; justify-content:center; border:1px solid #232837; transition:background var(--transition), border-color var(--transition), transform var(--transition);}
.btn-icon:hover{background:#1c2130; border-color:#2c3244; transform:translateY(-1px);}
.btn-icon.is-active{background:var(--highlight-dim); border-color:rgba(61,219,217,.4); color:var(--highlight);}
.btn-icon.is-fav{background:rgba(255,107,129,.12); border-color:rgba(255,107,129,.4); color:#ff6b81;}
.btn-icon svg{width:16px; height:16px;}
.btn-icon.notif-bell-btn{position:relative;}
.notif-badge{
  position:absolute; top:-4px; right:-4px; min-width:16px; height:16px; padding:0 3px; border-radius:8px;
  background:#ff6b81; color:#1a0508; font-size:9.5px; font-weight:800; line-height:16px; text-align:center;
  box-shadow:0 0 0 2px var(--surface);
}

.topbar-search{
  display:flex; align-items:center; background:#12141c; border:1px solid #232837; border-radius:20px;
  transition:border-color var(--transition), background var(--transition);
}
.topbar-search-icon{
  width:38px; height:38px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--muted);
  transition:color var(--transition);
}
.topbar-search-icon svg{width:16px; height:16px;}
.topbar-search:hover .topbar-search-icon{color:var(--text);}
.topbar-search.open{border-color:rgba(61,219,217,.4); background:#0c0e14;}
.topbar-search.open .topbar-search-icon{color:var(--highlight);}
.global-search-input{
  width:0; opacity:0; background:transparent; border:0; padding:0; font-size:13.5px; color:var(--text);
  transition:width var(--transition), opacity var(--transition), padding var(--transition);
}
.topbar-search.open .global-search-input{width:230px; opacity:1; padding:9px 14px 9px 0;}
.global-search-input::placeholder{color:var(--muted);}
.global-search-results{
  position:absolute; top:66px; right:32px; width:340px; max-height:420px; overflow-y:auto;
  background:var(--surface); border:1px solid #1e2330; border-radius:14px; box-shadow:0 24px 60px rgba(0,0,0,.5);
  z-index:60; display:none; padding:8px;
}
.global-search-results.show{display:block;}
.gsr-item{display:flex; gap:12px; align-items:center; padding:8px; border-radius:10px; cursor:pointer; transition:background var(--transition);}
.gsr-item:hover{background:#161923;}
.gsr-poster{width:38px; height:56px; border-radius:6px; overflow:hidden; flex-shrink:0; background:var(--surface2); display:flex; align-items:center; justify-content:center;}
.gsr-poster img{width:100%; height:100%; object-fit:cover;}
.gsr-poster .poster-fallback{font-size:16px;}
.gsr-title{font-size:13px; font-weight:700; line-height:1.3;}
.gsr-meta{font-size:11px; color:var(--muted); margin-top:3px; display:flex; align-items:center;}
.gsr-empty{padding:16px; text-align:center; color:var(--muted); font-size:13px;}
@media (max-width:860px){
  .global-search-results{right:16px; left:16px; width:auto;}
  .topbar-search.open .global-search-input{width:130px;}
}

.page{padding:0 32px; animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Hero ---------- */
.hero-carousel{
  position:relative; height:64vh; min-height:420px; max-height:600px;
  border-radius:18px; overflow:hidden; margin:20px 32px 8px 32px;
  border:1px solid #171a24; background:#0c0e13;
}
.hero-track{display:flex; height:100%; transition:transform .65s cubic-bezier(.65,0,.35,1); cursor:grab; touch-action:pan-y;}
.hero-track.dragging{transition:none; cursor:grabbing;}
.hero-slide{position:relative; flex:0 0 100%; width:100%; height:100%; display:flex; align-items:flex-end; cursor:pointer;}
.hero-slide img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.6;}
.hero-slide::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(0deg, var(--bg) 2%, rgba(8,9,13,.45) 42%, rgba(8,9,13,.1) 100%),
             linear-gradient(90deg, rgba(8,9,13,.92) 0%, rgba(8,9,13,.35) 55%, rgba(8,9,13,.05) 100%);
}
.hero-content{position:relative; z-index:2; padding:44px; max-width:600px;}
.hero-badge{
  display:inline-flex; align-items:center; gap:6px; background:var(--highlight-dim); color:var(--highlight);
  font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  padding:5px 11px; border-radius:20px; margin-bottom:16px; border:1px solid rgba(61,219,217,.25);
}
.hero-content h2{font-family:var(--display-font); font-size:44px; font-weight:900; margin-bottom:12px; line-height:1.05; letter-spacing:-.01em; text-shadow:0 4px 24px rgba(0,0,0,.5);}
.hero-content p{color:#c7d5d3; font-size:15px; line-height:1.6; margin-bottom:22px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
.hero-btns{display:flex; gap:12px;}
.hero-btns .btn{position:relative; z-index:3;}
.hero-btns .btn-primary{padding:12px 24px; font-size:14px;}
.hero-progress{margin-top:16px; width:260px; height:4px; border-radius:3px; background:rgba(255,255,255,.12); overflow:hidden;}
.hero-progress > div{height:100%; background:linear-gradient(90deg, var(--highlight), #2bc4c1); box-shadow:0 0 10px rgba(61,219,217,.5);}
.hero-nav-btn{
  position:absolute; top:50%; transform:translateY(-50%); z-index:4; width:40px; height:40px; border-radius:50%;
  background:rgba(8,9,13,.55); border:1px solid rgba(255,255,255,.15); color:var(--text);
  display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity var(--transition), background var(--transition);
  backdrop-filter:blur(6px);
}
.hero-nav-btn svg{width:18px; height:18px;}
.hero-carousel:hover .hero-nav-btn{opacity:1;}
.hero-nav-btn:hover{background:rgba(8,9,13,.85);}
.hero-nav-prev{left:16px;}
.hero-nav-next{right:16px;}
@media (max-width:860px){
  .hero-nav-btn{display:none;}
}

/* ---------- Panoramic Banner (cinematic, full-width, for the most newly added title) ---------- */
.panoramic-banner{
  position:relative; width:100%; aspect-ratio:32/9; max-height:420px; min-height:180px;
  overflow:hidden; cursor:pointer; margin:0 0 8px 0; background:#0c0e13;
}
.panoramic-banner img{
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center 30%;
  transition:transform .6s cubic-bezier(.22,1,.36,1);
}
.panoramic-banner:hover img{transform:scale(1.035);}
.panoramic-banner::after{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(0deg, var(--bg) 0%, rgba(8,9,13,.55) 26%, rgba(8,9,13,0) 55%),
             linear-gradient(180deg, rgba(8,9,13,.5) 0%, rgba(8,9,13,0) 22%);
}
.panoramic-banner-overlay{
  position:absolute; left:0; right:0; bottom:0; z-index:2; padding:28px 40px;
  display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
}
.panoramic-banner-badge{
  display:inline-flex; align-items:center; gap:6px; background:rgba(8,9,13,.55); color:var(--highlight);
  font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  padding:6px 13px; border-radius:20px; border:1px solid rgba(61,219,217,.35); backdrop-filter:blur(6px);
}
.panoramic-banner-btns{display:flex; gap:12px;}
.panoramic-banner-btns .btn{position:relative; z-index:3; padding:11px 22px; font-size:13.5px;}
@media (max-width:860px){
  .panoramic-banner{aspect-ratio:16/9; margin:0;}
  .panoramic-banner-overlay{padding:16px 18px; flex-direction:column; align-items:flex-start;}
}
body.tv-mode .panoramic-banner-overlay{padding:36px 48px;}
body.tv-mode .panoramic-banner-btns .btn{padding:15px 30px; font-size:16px;}

/* ---------- Rows / Cards ---------- */
.row{margin:38px 0;}
.row-head{display:flex; align-items:center; justify-content:space-between; padding:0 32px; margin-bottom:16px;}
.row-head h3{font-size:18px; font-weight:800; font-family:var(--display-font); letter-spacing:.1px; position:relative; padding-left:14px;}
.row-head h3::before{content:''; position:absolute; left:0; top:2px; bottom:2px; width:3px; border-radius:2px; background:linear-gradient(180deg, var(--highlight), var(--primary));}
.row-track{display:flex; gap:16px; overflow-x:auto; padding:8px 32px 22px 32px; scroll-behavior:smooth;}
.row-track::-webkit-scrollbar{display:none;}

.card{
  position:relative; flex:0 0 190px; width:190px; border-radius:12px; overflow:hidden;
  background:var(--surface); cursor:pointer; border:1px solid #191c26;
  transition:transform .4s cubic-bezier(.34,1.3,.44,1), box-shadow .35s ease, border-color .35s ease;
  aspect-ratio:2/3;
}
/* Desktop / mouse: lift + tilt toward cursor. Scoped to real hover devices so it can't get "stuck"
   on a phone after a tap (touch has no hover-end event to cleanly reverse it). */
@media (hover:hover) and (pointer:fine){
  .card:hover{
    transform:scale(1.07) translateY(-4px) rotateX(var(--tiltX,0deg)) rotateY(var(--tiltY,0deg));
    z-index:5; box-shadow:0 20px 44px rgba(0,0,0,.6), 0 0 0 1px rgba(61,219,217,.35); border-color:rgba(61,219,217,.35);
  }
}
/* Touch: no hover state exists, so swap the lift for an immediate press-down — the tactile
   equivalent of the desktop lift, felt at the moment of the tap instead of before it. */
@media (hover:none){
  .card:active{
    transform:scale(.96); transition:transform .15s ease;
    box-shadow:0 8px 22px rgba(0,0,0,.5), 0 0 0 1px rgba(61,219,217,.3); border-color:rgba(61,219,217,.3);
  }
}
/* Diagonal shine sweep — desktop plays it on hover, touch plays it once per tap via .tap-shine
   (toggled in JS on touchstart), so both devices get the "light catching the case" moment. */
.card-shine{
  position:absolute; inset:-50% -70%; z-index:3; pointer-events:none;
  background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.22) 50%, transparent 58%);
  transform:translateX(-130%) rotate(8deg); opacity:0;
}
@media (hover:hover) and (pointer:fine){
  .card:hover .card-shine{opacity:1; transform:translateX(130%) rotate(8deg); transition:transform .85s cubic-bezier(.22,1,.36,1), opacity .15s;}
}
.card.tap-shine .card-shine{opacity:1; transform:translateX(130%) rotate(8deg); transition:transform .6s cubic-bezier(.22,1,.36,1), opacity .1s;}
.card img{width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity .4s ease;}
.card img.loaded, .card img[data-loaded]{opacity:1;}
.card .poster-fallback{
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  font-size:44px; font-weight:900; color:var(--highlight); font-family:var(--display-font);
  background:linear-gradient(135deg,var(--primary),var(--surface));
}
.card-badge{
  position:absolute; top:9px; left:9px; background:rgba(8,9,13,.8); backdrop-filter:blur(4px);
  color:var(--highlight); font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.06em;
  padding:3px 8px; border-radius:20px; border:1px solid rgba(61,219,217,.25); z-index:2;
}
.card-new{
  position:absolute; top:9px; right:9px; background:var(--highlight); color:#04211f;
  font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.06em;
  padding:3px 8px; border-radius:20px; box-shadow:0 2px 10px rgba(61,219,217,.4); z-index:2;
}
.card-remove{
  position:absolute; top:9px; right:9px; width:24px; height:24px; border-radius:50%;
  background:rgba(8,9,13,.85); border:1px solid #2c3244; color:var(--text);
  display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity var(--transition), background var(--transition);
  z-index:2;
}
.card-remove svg{width:11px; height:11px;}
.card:hover .card-remove{opacity:1;}
.card-remove:hover{background:#3a1218; border-color:#4d1a20; color:#ff8b93;}
.card-progress{position:absolute; left:0; right:0; bottom:0; height:4px; background:rgba(255,255,255,.15); z-index:2;}
.card-progress > div{height:100%; background:linear-gradient(90deg, var(--highlight), #2bc4c1);}
.card-watchlist-badge{
  position:absolute; bottom:9px; left:9px; z-index:2; width:22px; height:22px; border-radius:50%;
  background:rgba(8,9,13,.85); border:1px solid rgba(61,219,217,.45); color:var(--highlight);
  display:flex; align-items:center; justify-content:center;
}
.card-watchlist-badge svg{width:11px; height:11px;}
.card-favorite-btn{
  position:absolute; bottom:9px; right:9px; z-index:4; width:22px; height:22px; border-radius:50%;
  background:rgba(8,9,13,.85); border:1px solid #2c3244; color:var(--text);
  display:flex; align-items:center; justify-content:center; opacity:0;
  transition:opacity var(--transition), background var(--transition), color var(--transition), border-color var(--transition);
}
.card-favorite-btn svg{width:11px; height:11px;}
.card:hover .card-favorite-btn{opacity:1;}
.card-favorite-btn.is-fav{opacity:1; background:rgba(8,9,13,.85); border-color:rgba(255,107,129,.45); color:#ff6b81;}

.card-see-all{
  background:linear-gradient(155deg, var(--surface2), var(--surface));
  border:1px solid rgba(61,219,217,.22);
  display:flex; align-items:center; justify-content:center;
}
.card-see-all:hover{border-color:rgba(61,219,217,.5);}
.see-all-inner{display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; padding:12px;}
.see-all-count{
  font-family:var(--display-font); font-weight:900; font-size:22px; color:var(--highlight);
}
.see-all-label{
  display:flex; align-items:center; gap:3px; font-size:12.5px; font-weight:700; color:var(--text);
}
.see-all-label svg{width:13px; height:13px; color:var(--highlight);}

.notifications-panel{
  position:absolute; top:66px; right:80px; width:340px; max-height:420px; overflow-y:auto;
  background:var(--surface); border:1px solid #1e2330; border-radius:14px; box-shadow:0 24px 60px rgba(0,0,0,.5);
  z-index:60; display:none; padding:8px;
}
.notifications-panel.show{display:block;}
.notif-header{display:flex; align-items:center; justify-content:space-between; padding:8px 8px 12px 8px; font-size:12.5px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;}
.notif-clear{font-size:11.5px; font-weight:700; color:var(--highlight); text-transform:none; letter-spacing:0;}
.notif-clear:hover{text-decoration:underline;}
.notif-empty{padding:20px 16px; text-align:center; color:var(--muted); font-size:13px;}
.notif-item{display:flex; gap:11px; align-items:flex-start; padding:10px 8px; border-radius:10px; cursor:pointer; transition:background var(--transition);}
.notif-item:hover{background:#161923;}
.notif-item.unread{background:rgba(61,219,217,.06);}
.notif-icon{width:30px; height:30px; border-radius:50%; background:var(--highlight-dim); color:var(--highlight); flex-shrink:0; display:flex; align-items:center; justify-content:center;}
.notif-icon svg{width:14px; height:14px;}
.notif-body{min-width:0;}
.notif-msg{font-size:12.5px; font-weight:600; line-height:1.4;}
.notif-time{font-size:10.5px; color:var(--muted); margin-top:3px;}
@media (max-width:860px){
  .notifications-panel{right:16px; left:16px; width:auto;}
}
.card-trailer{position:absolute; inset:0; z-index:1; background:#000; opacity:0; animation:cardTrailerFadeIn .5s ease forwards;}
@keyframes cardTrailerFadeIn{from{opacity:0;} to{opacity:1;}}
.card-trailer iframe{width:100%; height:100%; border:0; pointer-events:none; transform:scale(1.35); transform-origin:center;}
.card-trailer-mute{
  position:absolute; bottom:9px; right:9px; z-index:2; width:24px; height:24px; border-radius:50%;
  background:rgba(8,9,13,.8); border:1px solid rgba(255,255,255,.2); color:#fff; display:flex; align-items:center; justify-content:center;
  pointer-events:auto; transition:background var(--transition);
}
.card-trailer-mute:hover{background:rgba(8,9,13,1);}
.card-trailer-mute svg{width:11px; height:11px;}
.card-overlay{
  position:absolute; inset:0; opacity:0; transition:opacity var(--transition); z-index:3;
  background:linear-gradient(0deg, rgba(5,6,9,.97) 8%, rgba(5,6,9,.25) 58%, transparent 100%);
  display:flex; flex-direction:column; justify-content:flex-end; padding:13px;
}
.card:hover .card-overlay{opacity:1;}
.card-play{
  width:34px; height:34px; border-radius:50%; background:var(--highlight); color:#04211f;
  display:flex; align-items:center; justify-content:center; margin-bottom:9px; transition:transform var(--transition), box-shadow var(--transition);
  box-shadow:0 4px 16px rgba(61,219,217,.4);
}
.card-play svg{width:14px; height:14px;}
.card:hover .card-play{transform:scale(1.1);}
.card-title{font-size:12.5px; font-weight:700; line-height:1.3; margin-bottom:2px;}
.card-meta{font-size:10.5px; color:var(--muted);}

.empty-state{
  text-align:center; padding:90px 24px; color:var(--muted);
}
.empty-state .empty-icon{
  width:56px; height:56px; border-radius:16px; margin:0 auto 20px auto; display:flex; align-items:center; justify-content:center;
  background:var(--highlight-dim); color:var(--highlight); border:1px solid rgba(61,219,217,.25);
}
.empty-state .empty-icon svg{width:26px; height:26px;}
.empty-state h3{color:var(--text); font-size:20px; margin-bottom:8px; font-family:var(--display-font); font-weight:800;}
.empty-state p{margin-bottom:22px; font-size:14px; max-width:340px; margin-left:auto; margin-right:auto;}

/* ---------- Library ---------- */
.filter-bar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:20px 0 26px 0; padding:0 32px 0 0;}
.chip-btn{padding:8px 16px; border-radius:20px; background:#12141c; color:var(--muted); font-size:13px; font-weight:700; border:1px solid #232837; transition:all var(--transition);}
.chip-btn:hover{border-color:#333a4d; color:var(--text);}
.chip-btn.active{background:var(--highlight-dim); color:var(--highlight); border-color:rgba(61,219,217,.4);}
.search-input{
  flex:1; min-width:180px; max-width:320px; background:#12141c; border:1px solid #232837; border-radius:20px;
  padding:10px 16px; font-size:13.5px; color:var(--text); transition:border-color var(--transition);
}
.search-input:focus{border-color:rgba(61,219,217,.45);}
.search-input::placeholder{color:var(--muted);}
.select-input{background:#12141c; border:1px solid #232837; border-radius:20px; padding:9px 14px; font-size:13px; color:var(--text);}

.grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:18px; padding-bottom:20px;
}
.grid .card{width:100%; flex:none;}

/* ---------- Detail ---------- */
.detail-backdrop{position:relative; height:44vh; min-height:300px; border-radius:16px; overflow:hidden; margin:20px 32px;}
.detail-backdrop img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.5;}
.detail-backdrop::after{content:''; position:absolute; inset:0; background:linear-gradient(0deg,var(--bg) 2%, transparent 80%);}
.detail-body{padding:0 32px; margin-top:-90px; position:relative; z-index:2; display:flex; gap:28px;}
.detail-poster{width:180px; flex-shrink:0; border-radius:10px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,.5); aspect-ratio:2/3;}
.detail-poster img{width:100%; height:100%; object-fit:cover; display:block;}
.detail-info{flex:1; min-width:0; padding-top:96px;}
.detail-info h2{font-size:30px; font-weight:800; margin-bottom:10px;}
.detail-logo{max-width:320px; max-height:120px; width:auto; height:auto; object-fit:contain; margin-bottom:14px; display:block; filter:drop-shadow(0 4px 20px rgba(0,0,0,.5));}
@media (max-width:860px){ .detail-logo{max-width:220px; max-height:80px;} }
.detail-tags{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
.tag{background:#161923; border:1px solid #232837; padding:4px 10px; border-radius:6px; font-size:11.5px; color:var(--muted); font-weight:700;}
.detail-desc{color:#c7d5d3; font-size:14px; line-height:1.6; max-width:680px; margin-bottom:22px;}
.detail-cast{margin-bottom:22px;}
.detail-cast-label{display:block; font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:9px;}
.detail-cast-tags{display:flex; flex-wrap:wrap; gap:8px;}
.my-rating-widget{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
.my-rating-label{font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;}
.my-rating-stars{display:flex; gap:2px;}
.my-rating-star{width:26px; height:26px; display:flex; align-items:center; justify-content:center; color:var(--muted); transition:color var(--transition), transform var(--transition);}
.my-rating-star svg{width:19px; height:19px;}
.my-rating-star:hover{color:var(--highlight); transform:scale(1.15);}
.my-rating-stars:has(.my-rating-star:hover) .my-rating-star{color:var(--muted);}
.my-rating-star.is-filled{color:var(--highlight);}
.my-rating-clear{width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--muted); background:#161923; border:1px solid #232837;}
.my-rating-clear svg{width:10px; height:10px;}
.my-rating-clear:hover{color:#ff8b93; background:#3a1218; border-color:#4d1a20;}
.detail-actions{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;}

.watch-progress-banner{
  display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  margin:26px 32px 0 32px; padding:14px 18px; background:var(--highlight-dim);
  border:1px solid rgba(61,219,217,.3); border-radius:12px;
}
.watch-progress-banner.watch-progress-done{
  justify-content:flex-start; color:var(--highlight); font-weight:700; font-size:14px;
}
.wpb-next{display:flex; flex-direction:column; gap:3px;}
.wpb-label{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--highlight);}
.wpb-title{font-size:14px; font-weight:700;}
.wpb-remaining{font-size:12.5px; color:var(--muted); font-weight:600; white-space:nowrap;}
@media (max-width:860px){ .watch-progress-banner{margin-left:16px; margin-right:16px;} }
.season-select-row{display:flex; align-items:center; gap:12px; margin:30px 32px 16px 32px;}
.season-select-label{font-size:11.5px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
.season-select{min-width:220px; font-weight:700; padding:10px 16px;}
.episode-list{padding:0 32px; display:flex; flex-direction:column; gap:10px;}
.episode-card{
  display:flex; gap:14px; background:var(--surface); border:1px solid #1a1d26; border-radius:10px; padding:10px;
  align-items:center; cursor:pointer; transition:background var(--transition), transform var(--transition);
}
.episode-card:hover{background:#141721; transform:translateX(3px);}
.ep-thumb{width:120px; height:68px; border-radius:6px; overflow:hidden; flex-shrink:0; background:#161923; position:relative;}
.ep-thumb img{width:100%; height:100%; object-fit:cover;}
.ep-thumb .ep-num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--muted); font-size:20px;}
.ep-progress{position:absolute; left:0; right:0; bottom:0; height:3px; background:rgba(255,255,255,.15);}
.ep-progress > div{height:100%; background:var(--highlight);}
.ep-info{flex:1; min-width:0;}
.ep-info .ep-title{font-weight:700; font-size:14px; margin-bottom:3px; display:flex; align-items:center; gap:8px;}
.ep-overview{
  font-size:12px; color:#a6b8b6; line-height:1.5; margin-bottom:6px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.ep-meta-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
.ep-info .ep-sub{font-size:12px; color:var(--muted);}
.ep-mini-stars{display:flex; gap:2px;}
.ep-mini-star{width:16px; height:16px; color:var(--muted); transition:color var(--transition), transform var(--transition);}
.ep-mini-star svg{width:14px; height:14px; display:block;}
.ep-mini-star:hover{color:var(--highlight); transform:scale(1.15);}
.ep-mini-star.is-filled{color:var(--highlight);}
.ep-check{width:20px; height:20px; border-radius:50%; background:var(--highlight); color:#04211f; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.ep-check svg{width:12px; height:12px;}
.ep-watch-toggle{
  width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background:#161923; border:1px solid #232837; color:var(--muted); transition:all var(--transition);
}
.ep-watch-toggle svg{width:14px; height:14px;}
.ep-watch-toggle:hover{border-color:rgba(61,219,217,.4); color:var(--highlight);}
.ep-watch-toggle.is-watched{background:var(--highlight); border-color:var(--highlight); color:#04211f;}

/* ---------- Modal / overlay ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(4,5,8,.78); backdrop-filter:blur(10px); z-index:100;
  display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity var(--transition);
  padding:20px;
}
.overlay.open{opacity:1; pointer-events:auto;}
.modal{
  background:var(--surface); border:1px solid #1e2330; border-radius:16px; width:100%; max-width:640px;
  max-height:88vh; overflow-y:auto; padding:30px; transform:translateY(16px) scale(.98); transition:transform var(--transition);
  box-shadow:0 30px 80px rgba(0,0,0,.55);
}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:18px; border-bottom:1px solid #1a1d26;}
.modal-head h2{font-size:19px; font-weight:800; font-family:var(--display-font);}

.field{margin-bottom:16px;}
.field label{display:block; font-size:11.5px; font-weight:700; color:var(--muted); margin-bottom:7px; text-transform:uppercase; letter-spacing:.05em;}
.field input, .field textarea, .field select{
  width:100%; background:#0c0e14; border:1px solid #232837; border-radius:8px; padding:11px 13px; font-size:14px;
  transition:border-color var(--transition), box-shadow var(--transition);
}
.field input:focus, .field textarea:focus, .field select:focus{border-color:rgba(61,219,217,.5); box-shadow:0 0 0 3px rgba(61,219,217,.1);}
.field textarea{resize:vertical; min-height:70px;}
.field-row{display:flex; gap:12px;}
.field-row .field{flex:1;}
.field-hint{font-size:11px; color:var(--muted); margin-top:5px;}
.imdb-import-field{
  background:var(--highlight-dim); border:1px solid rgba(61,219,217,.25); border-radius:10px; padding:14px; margin-bottom:20px;
}
.imdb-import-field label{color:var(--highlight);}
.imdb-import-field input{background:#0c0e14;}
.field-hint code{background:#161923; border:1px solid #232837; border-radius:4px; padding:1px 5px; font-family:ui-monospace,Menlo,Consolas,monospace; color:#9fb3b1;}

.type-toggle{display:flex; gap:10px; margin-bottom:20px;}
.type-toggle button{flex:1; padding:12px; border-radius:8px; background:#0c0e14; border:1px solid #232837; font-weight:700; font-size:13.5px; color:var(--muted);}
.type-toggle button.active{background:var(--primary); color:var(--highlight); border-color:var(--primary);}

.chip-select{display:flex; gap:8px; flex-wrap:wrap;}
.chip-select .chip-btn{padding:7px 13px; font-size:12.5px;}

.actor-chips-wrap{display:flex; flex-wrap:wrap; gap:8px;}
.actor-chip{
  display:inline-flex; align-items:center; gap:7px; background:#12141c; border:1px solid #232837;
  padding:6px 8px 6px 13px; border-radius:20px; font-size:12.5px; font-weight:600; color:var(--text);
}
.actor-chip button{
  width:17px; height:17px; border-radius:50%; background:#1e2330; display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:all var(--transition); flex-shrink:0;
}
.actor-chip button svg{width:9px; height:9px;}
.actor-chip button:hover{background:#3a1218; color:#ff8b93;}

.source-row{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
.source-row input{flex:1;}
.source-row .rm{width:32px; height:32px; flex-shrink:0; border-radius:6px; background:#3a1218; color:#ff8b93; display:flex; align-items:center; justify-content:center;}

.season-block{border:1px solid #1e2330; border-radius:10px; padding:14px; margin-bottom:14px; background:#0c0e14;}
.season-block-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.season-block-head b{font-size:14px;}
.ep-editor{border:1px solid #1a1d26; border-radius:8px; padding:10px; margin-bottom:8px; background:var(--surface);}
.ep-editor-head{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.ep-editor-head input{flex:1;}

.modal-footer{display:flex; justify-content:flex-end; gap:10px; margin-top:20px; border-top:1px solid #1a1d26; padding-top:18px;}

/* ---------- Player ---------- */
.player-overlay{
  position:fixed; inset:0; background:#000; z-index:200; display:flex; flex-direction:column;
  opacity:0; pointer-events:none; transition:opacity var(--transition);
}
.player-overlay.open{opacity:1; pointer-events:auto;}
.player-top{
  position:absolute; top:0; left:0; right:0; z-index:5; padding:20px 26px; display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg, rgba(0,0,0,.85), transparent); transition:opacity .4s ease;
}
.player-title{font-size:15px; font-weight:800; font-family:var(--display-font);}
.live-badge{
  display:inline-flex; align-items:center; background:#ff4757; color:#fff; font-size:10px; font-weight:800;
  letter-spacing:.04em; padding:2px 7px; border-radius:4px; margin-right:2px; animation:liveBlink 1.8s ease-in-out infinite;
}
@keyframes liveBlink{0%,100%{opacity:1;} 50%{opacity:.55;}}
.hls-badge{
  display:inline-flex; align-items:center; background:var(--highlight-dim); color:var(--highlight); font-size:9.5px; font-weight:800;
  letter-spacing:.04em; padding:2px 6px; border-radius:4px; margin-left:6px; border:1px solid rgba(61,219,217,.3);
}
.player-sub{font-size:12px; color:#8fa5a3; margin-top:2px;}
.player-top-actions{display:flex; align-items:center; gap:8px;}
.player-top-actions .btn-icon{background:rgba(22,25,35,.6); border-color:rgba(255,255,255,.12);}
.player-top-actions .btn-icon:hover{background:rgba(22,25,35,.9);}
.player-stage{flex:1; position:relative; background:#000;}
.player-stage iframe, .player-stage video{width:100%; height:100%; border:0; display:block;}
.content-blurred{filter:blur(32px) saturate(70%); transition:filter .3s ease; cursor:pointer;}
.content-blurred:hover{filter:blur(18px) saturate(70%);}
.content-blur-revealed{filter:none;}
.player-stage.content-blurred-video video{filter:blur(40px);}

.player-loading{
  position:absolute; inset:0; z-index:3; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  background:#000; opacity:1; pointer-events:none; transition:opacity .4s ease;
}
.player-loading.done{opacity:0;}
.player-loading-label{font-size:12.5px; font-weight:600; color:var(--muted); letter-spacing:.02em;}
.spinner{
  width:44px; height:44px; border-radius:50%; border:3px solid rgba(61,219,217,.18); border-top-color:var(--highlight);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.player-hide-overlay{
  position:absolute; inset:0; z-index:10; background:rgba(5,6,9,.97); backdrop-filter:blur(60px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  color:var(--text); cursor:pointer; animation:cardTrailerFadeIn .25s ease;
}
.player-hide-icon{width:56px; height:56px; border-radius:50%; background:var(--highlight-dim); display:flex; align-items:center; justify-content:center; color:var(--highlight);}
.player-hide-icon svg{width:26px; height:26px;}
.player-hide-overlay span{font-size:13px; font-weight:700; color:var(--muted);}
.player-bottom{position:absolute; bottom:0; left:0; right:0; padding:18px 24px; display:flex; justify-content:center; gap:10px; background:linear-gradient(0deg, rgba(0,0,0,.8), transparent); transition:opacity .4s ease;}
.player-next-side{
  position:absolute; top:50%; right:24px; transform:translateY(-50%); z-index:6;
  width:52px; height:52px; border-radius:50%; overflow:hidden; cursor:pointer;
  border:2px solid rgba(61,219,217,.5); box-shadow:0 8px 20px rgba(0,0,0,.4);
  transition:opacity .4s ease, transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  animation:pnsRise .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes pnsRise{from{opacity:0; transform:translateY(calc(-50% + 14px));} to{opacity:1; transform:translateY(-50%);}}
.player-next-side:hover{transform:translateY(-50%) scale(1.1); border-color:var(--highlight); box-shadow:0 10px 26px rgba(0,0,0,.5), 0 0 0 3px rgba(61,219,217,.25);}
.pns-thumb{position:relative; width:100%; height:100%; background:linear-gradient(135deg,var(--primary),var(--surface));}
.pns-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
.pns-play-icon{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.4);
}
.pns-play-icon svg{width:18px; height:18px; color:#fff; filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.pns-meta{display:none;}
.player-hover-zone{position:absolute; top:0; left:0; right:0; height:90px; z-index:4;}
.player-overlay.controls-hidden .player-top,
.player-overlay.controls-hidden .player-bottom,
.player-overlay.controls-hidden .player-next-side{
  opacity:0; pointer-events:none;
}
.up-next{
  position:absolute; bottom:100px; right:24px; z-index:6; display:flex; align-items:center; gap:14px;
  background:rgba(10,11,16,.94); border:1px solid #232837; border-radius:14px; padding:14px; max-width:400px;
  box-shadow:0 24px 60px rgba(0,0,0,.55); font-size:13px; animation:upNextRise .4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes upNextRise{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);}}
.up-next-thumb{width:84px; height:47px; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--surface2);}
.up-next-thumb img{width:100%; height:100%; object-fit:cover;}
.up-next-info{flex:1; min-width:0; display:flex; flex-direction:column; gap:5px;}
.up-next-label{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--highlight);}
.up-next-title{font-size:13px; font-weight:700; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.up-next-progress{height:3px; border-radius:3px; background:rgba(255,255,255,.12); overflow:hidden; margin-top:2px;}
.up-next-progress > div{height:100%; width:0%; background:linear-gradient(90deg,var(--highlight),#2bc4c1);}
.up-next-actions{display:flex; flex-direction:column; gap:6px; flex-shrink:0;}
.up-next-actions .btn{padding:7px 12px; font-size:11.5px; white-space:nowrap; justify-content:center;}
@media (max-width:860px){
  .player-next-side{right:14px; width:44px; height:44px;}
  .pns-play-icon svg{width:15px; height:15px;}
  .up-next{right:12px; left:12px; max-width:none; bottom:88px; flex-wrap:wrap;}
}

/* ---------- Collections ---------- */
.collection-card{
  background:var(--surface); border:1px solid #1a1d26; border-radius:12px; padding:20px; cursor:pointer;
  transition:transform var(--transition), background var(--transition); position:relative; overflow:hidden;
}
.collection-card:hover{transform:translateY(-3px); background:#141721;}
.collection-card h4{font-size:16px; font-weight:800; margin-bottom:4px; display:flex; align-items:center; gap:8px;}
.collection-card span{font-size:12px; color:var(--muted);}
.collection-card.watchlist-collection-card{border-color:rgba(61,219,217,.35); background:var(--highlight-dim);}
.collection-card.watchlist-collection-card h4{color:var(--highlight);}
.collection-card.watchlist-collection-card h4 svg{width:18px; height:18px;}
.collection-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px;}

.watchlist-rows{display:flex; flex-direction:column;}
.watchlist-row{
  display:flex; align-items:center; gap:16px; padding:14px 6px; cursor:pointer;
  border-bottom:1px solid #1a1d26; transition:background var(--transition);
}
.watchlist-row:last-child{border-bottom:none;}
.watchlist-row:hover{background:#12141c;}
.watchlist-row-poster{width:60px; aspect-ratio:2/3; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--surface2);}
.watchlist-row-poster img{width:100%; height:100%; object-fit:cover; display:block;}
.watchlist-row-poster .poster-fallback{font-size:18px; border-radius:8px;}
.watchlist-row-info{flex:1; min-width:0;}
.watchlist-row-title{font-size:17px; font-weight:800; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.watchlist-row-episode{font-size:15px; color:#c7d5d3; font-weight:600; display:flex; align-items:center; gap:8px;}
.watchlist-row-ep{color:#c7d5d3;}
.watchlist-row-remaining{color:var(--muted); font-weight:600; font-size:14px;}
.watchlist-row-done{color:var(--highlight); display:flex; align-items:center; gap:6px;}
.watchlist-row-done svg{width:15px; height:15px;}
.watchlist-row .btn-icon{flex-shrink:0; opacity:0; transition:opacity var(--transition);}
.watchlist-row:hover .btn-icon{opacity:1;}
@media (max-width:860px){
  .watchlist-row .btn-icon{opacity:1;}
  .watchlist-row-title{font-size:15px;}
  .watchlist-row-episode{font-size:13px;}
}

.live-filter-wrap{position:relative;}
.live-filter-btn{position:relative;}
.filter-badge{
  display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; padding:0 4px;
  border-radius:20px; background:var(--highlight); color:#04211f; font-size:10px; font-weight:800; margin-left:2px;
}
.live-filter-panel{
  position:absolute; top:calc(100% + 8px); left:0; z-index:40; width:230px;
  background:var(--surface); border:1px solid #1e2330; border-radius:12px; padding:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.45); display:flex; flex-direction:column; gap:14px;
  animation:filterPanelRise .2s ease both;
}
@keyframes filterPanelRise{from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);}}
.live-filter-group label{display:block; margin-bottom:6px;}

.channel-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px;}

.schedule-date-label{font-weight:800; font-size:14px; white-space:nowrap; padding:0 4px;}
.schedule-list{display:flex; flex-direction:column; gap:10px;}
.schedule-row{
  display:flex; align-items:center; gap:14px; background:var(--surface); border:1px solid #1a1d26;
  border-radius:10px; padding:10px 14px;
}
.schedule-time{width:64px; flex-shrink:0; font-weight:800; font-size:13px; color:var(--highlight); font-family:var(--display-font);}
.schedule-thumb{width:52px; height:52px; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--surface2);}
.schedule-thumb img{width:100%; height:100%; object-fit:cover;}
.schedule-thumb .poster-fallback{font-size:16px; border-radius:8px;}
.schedule-info{flex:1; min-width:0;}
.schedule-show-title{font-weight:800; font-size:14px; margin-bottom:2px;}
.schedule-ep-title{font-size:12.5px; color:#c7d5d3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.schedule-ep-tag{color:var(--highlight); font-weight:700;}
.schedule-network{font-size:11px; color:var(--muted); margin-top:2px;}
.schedule-countdown{
  flex-shrink:0; background:var(--highlight-dim); border:1px solid rgba(61,219,217,.3); color:var(--highlight);
  font-weight:800; font-size:12.5px; padding:6px 12px; border-radius:20px; font-family:var(--display-font); white-space:nowrap;
}
@media (max-width:860px){
  .schedule-time{width:48px; font-size:12px;}
  .schedule-thumb{width:44px; height:44px;}
  .schedule-network{display:none;}
}

/* Home nav button — big, blue, centered, raised above the mobile bottom bar, ALWAYS (not just
   when active) — !important needed because .bottom-nav .nav-item.active has higher specificity
   (3 classes vs 2) and would otherwise override this back to transparent specifically when the
   Home tab itself is the active route. */
.bottom-nav .nav-item-home{
  flex:0 0 auto; width:56px; height:56px; border-radius:50%; position:relative; top:-16px;
  background:linear-gradient(135deg, var(--highlight), #2bc4c1) !important; color:#04211f !important;
  box-shadow:0 6px 18px rgba(61,219,217,.45), 0 0 0 4px var(--bg);
  justify-content:center; align-items:center;
}
.bottom-nav .nav-item-home svg{width:24px; height:24px;}
.bottom-nav .nav-item-home span{display:none;}
.bottom-nav .nav-item-home::after{display:none;}
.bottom-nav .nav-item-home:hover{transform:translateY(-2px);}
.sidebar .nav-item-home{background:var(--highlight-dim) !important; color:var(--highlight) !important; font-weight:800;}
.channel-card{
  position:relative; background:var(--surface); border:1px solid #1a1d26; border-radius:12px; padding:14px;
  display:flex; align-items:center; gap:14px; cursor:pointer;
  transition:transform var(--transition), background var(--transition), border-color var(--transition);
}
.channel-card:hover{transform:translateY(-2px); background:#141721; border-color:rgba(61,219,217,.3);}
.channel-logo{
  width:52px; height:52px; border-radius:10px; overflow:hidden; background:var(--surface2);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.channel-logo img{width:100%; height:100%; object-fit:contain;}
.channel-logo .poster-fallback{font-size:20px; border-radius:10px;}
.channel-info{flex:1; min-width:0;}
.channel-name{font-weight:800; font-size:14px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.channel-cat{font-size:11px; color:var(--muted);}
.channel-live-dot{width:8px; height:8px; border-radius:50%; background:#ff4757; box-shadow:0 0 8px rgba(255,71,87,.6); flex-shrink:0; animation:liveBlink 1.8s ease-in-out infinite;}
.channel-card .btn-icon{width:30px; height:30px; flex-shrink:0;}
.channel-card .btn-icon svg{width:13px; height:13px;}
@media (max-width:860px){
  .channel-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
}

/* ---------- Settings ---------- */
.settings-section{background:var(--surface); border:1px solid #1a1d26; border-radius:12px; padding:22px; margin-bottom:18px; max-width:560px;}
.settings-section h3{font-size:15px; font-weight:800; margin-bottom:16px;}
.settings-row{display:flex; gap:10px; margin-bottom:12px;}
.link-health-row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  background:#0c0e14; border:1px solid #232837; border-radius:10px; padding:10px 12px;
}
.link-health-title{font-size:13px; font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.link-health-url{font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.toggle-row{display:flex; align-items:center; gap:12px; margin-top:2px;}
.toggle-row-label{font-size:13px; font-weight:700; color:var(--text);}
.switch{position:relative; display:inline-block; width:44px; height:25px; flex-shrink:0;}
.switch input{opacity:0; width:0; height:0;}
.switch-slider{position:absolute; cursor:pointer; inset:0; background:#232837; border:1px solid #2c3244; border-radius:25px; transition:background var(--transition), border-color var(--transition);}
.switch-slider::before{
  content:''; position:absolute; height:17px; width:17px; left:3px; top:3px; border-radius:50%;
  background:#8a9997; transition:transform var(--transition), background var(--transition);
}
.switch input:checked + .switch-slider{background:var(--highlight-dim); border-color:rgba(61,219,217,.5);}
.switch input:checked + .switch-slider::before{transform:translateX(19px); background:var(--highlight); box-shadow:0 0 8px rgba(61,219,217,.5);}

/* ---------- Toast ---------- */
#toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); z-index:300;
  background:var(--surface2); border:1px solid #232837; padding:12px 20px; border-radius:8px; font-size:13.5px; font-weight:600;
  opacity:0; transition:all var(--transition); pointer-events:none; box-shadow:0 10px 30px rgba(0,0,0,.4);
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0); bottom:76px;}

/* ---------- Mobile bottom nav ---------- */
.bottom-nav{display:none;}
@media (max-width:860px){
  .sidebar{display:none;}
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; z-index:50; background:var(--surface);
    border-top:1px solid #1a1d26; padding:8px 6px calc(8px + env(safe-area-inset-bottom)) 6px; justify-content:space-around;
  }
  .bottom-nav .nav-item{flex-direction:column; gap:3px; font-size:10px; padding:6px 8px; flex:1; align-items:center; text-align:center; border-radius:8px; position:relative;}
  .bottom-nav .nav-item.active{background:transparent; color:var(--highlight);}
  .bottom-nav .nav-item::before{display:none;}
  .bottom-nav .nav-item.active svg{filter:drop-shadow(0 0 6px rgba(61,219,217,.6));}
  .bottom-nav .nav-item.active::after{
    content:''; position:absolute; bottom:-1px; left:50%; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background:var(--highlight); box-shadow:0 0 6px rgba(61,219,217,.7);
  }
  .main{padding-bottom:90px;}
  .page, .topbar{padding-left:16px; padding-right:16px;}
  .hero-carousel{margin:14px 16px 0 16px; height:50vh;}
  .hero-content{padding:22px;}
  .hero-content h2{font-size:26px;}
  .detail-backdrop{margin:14px 16px;}
  .detail-body{padding:0 16px; flex-direction:column;}
  .detail-poster{width:120px;}
  .detail-info{padding-top:16px;}
  .row-head, .row-track, .season-select-row, .episode-list{padding-left:16px; padding-right:16px;}
  .filter-bar{padding-right:16px;}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none !important; animation:none !important;}
}

/* ==========================================================
   ANDROID TV LAYOUT
   Detected via: URL param ?tv=1  OR  screen width >= 1280px
   and no fine pointer (i.e. a TV / D-pad device, not a desktop mouse)
   ========================================================== */
body.tv-mode {
  font-size: 18px;
}
/* Hide mobile bottom nav and regular sidebar in TV mode */
body.tv-mode .bottom-nav { display: none !important; }

/* TV sidebar — wider, larger text, taller items */
body.tv-mode .sidebar {
  width: 280px;
  padding: 32px 20px;
  gap: 6px;
}
body.tv-mode .brand { padding-bottom: 28px; margin-bottom: 16px; }
body.tv-mode .brand .mark { width: 42px; height: 42px; font-size: 18px; }
body.tv-mode .brand span { font-size: 22px; }

body.tv-mode .nav-item {
  padding: 16px 18px;
  font-size: 16px;
  border-radius: 12px;
  gap: 16px;
}
body.tv-mode .nav-item svg { width: 24px; height: 24px; }

/* TV focus ring — D-pad navigation highlights focused elements */
body.tv-mode *:focus {
  outline: 3px solid var(--highlight) !important;
  outline-offset: 3px !important;
}
body.tv-mode .nav-item:focus {
  background: var(--highlight-dim);
  color: var(--highlight);
  outline: 3px solid var(--highlight) !important;
}

/* TV topbar */
body.tv-mode .topbar {
  padding: 22px 48px;
}
body.tv-mode .topbar h1 { font-size: 30px; }

/* TV page padding */
body.tv-mode .page { padding: 0 48px; }
body.tv-mode .hero-carousel { margin: 24px 48px 12px 48px; height: 58vh; }
body.tv-mode .hero-content h2 { font-size: 52px; }
body.tv-mode .hero-content p { font-size: 17px; }
body.tv-mode .hero-btns .btn { padding: 16px 32px; font-size: 16px; }
body.tv-mode .hero-nav-btn { opacity: 1; width: 52px; height: 52px; } /* always visible on TV */

/* TV cards — bigger, always show overlay, larger focus ring */
body.tv-mode .card { flex: 0 0 220px; width: 220px; border-radius: 14px; }
body.tv-mode .card:focus,
body.tv-mode .card:focus-within {
  transform: scale(1.09) translateY(-6px);
  box-shadow: 0 24px 50px rgba(0,0,0,.7), 0 0 0 3px var(--highlight);
  border-color: var(--highlight);
  z-index: 5;
  outline: none !important;
}
body.tv-mode .card .card-overlay { opacity: 1; } /* always show title/play on TV */
body.tv-mode .card .card-play { width: 44px; height: 44px; }
body.tv-mode .card .card-play svg { width: 20px; height: 20px; }
body.tv-mode .card .card-title { font-size: 14px; }
body.tv-mode .card .card-meta { font-size: 12px; }
body.tv-mode .card-badge { font-size: 11px; padding: 4px 10px; }
body.tv-mode .row-head h3 { font-size: 22px; }
body.tv-mode .row-head { padding: 0 48px; }
body.tv-mode .row-track { padding: 10px 48px 28px 48px; gap: 20px; }

/* TV buttons — larger tap targets */
body.tv-mode .btn { padding: 14px 24px; font-size: 15px; border-radius: 10px; }
body.tv-mode .btn:focus { outline: 3px solid var(--highlight) !important; }
body.tv-mode .btn-icon { width: 48px; height: 48px; }

/* TV detail page */
body.tv-mode .detail-backdrop { margin: 24px 48px; }
body.tv-mode .detail-body { padding: 0 48px; gap: 36px; }
body.tv-mode .detail-poster { width: 220px; }
body.tv-mode .detail-info { padding-top: 110px; }
body.tv-mode .detail-info h2 { font-size: 38px; }
body.tv-mode .detail-desc { font-size: 16px; }
body.tv-mode .tag { font-size: 14px; padding: 6px 14px; }

/* TV episode list */
body.tv-mode .episode-card { padding: 14px; gap: 20px; }
body.tv-mode .episode-card:focus { 
  background: var(--highlight-dim); 
  border-color: rgba(61,219,217,.5);
  outline: 3px solid var(--highlight) !important;
  transform: translateX(6px);
}
body.tv-mode .ep-thumb { width: 150px; height: 85px; }
body.tv-mode .ep-info .ep-title { font-size: 17px; }
body.tv-mode .ep-overview { font-size: 14px; }

/* TV player controls — larger */
body.tv-mode .player-title { font-size: 20px; }
body.tv-mode .player-sub { font-size: 15px; }
body.tv-mode .player-top { padding: 28px 40px; }
body.tv-mode .player-top-actions .btn-icon { width: 52px; height: 52px; }
body.tv-mode .player-top-actions .btn-icon svg { width: 22px; height: 22px; }

/* TV settings */
body.tv-mode .settings-section { max-width: 720px; padding: 28px; }
body.tv-mode .settings-section h3 { font-size: 18px; }
body.tv-mode .field label { font-size: 13px; }
body.tv-mode .field input,
body.tv-mode .field textarea,
body.tv-mode .field select { font-size: 16px; padding: 14px 16px; }

/* TV on-screen D-pad hint bar */
#tvDpadHint {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 999;
  background: rgba(8,9,13,.92);
  border-top: 1px solid #1a1d26;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 10px 32px;
  font-size: 13px;
  color: var(--muted);
  backdrop-filter: blur(10px);
}
body.tv-mode #tvDpadHint { display: flex; }
#tvDpadHint span { display: flex; align-items: center; gap: 6px; }
#tvDpadHint kbd {
  background: #1e2330; border: 1px solid #2c3244; border-radius: 6px;
  padding: 3px 8px; font-size: 12px; color: var(--text); font-family: inherit;
  box-shadow: 0 2px 0 #0a0b10;
}
body.tv-mode .main { padding-bottom: 52px; } /* room for D-pad hint bar */
</style>
</head>

/* ---- Content Blur (Beta) — on-device NSFW classification for images we actually render ourselves ----
   Loads tf.js + nsfwjs from a CDN only when the feature is turned on, and only once. This can only ever
   see pixels our own page has legitimate (CORS-cleared) access to — a plain <img>/<video> we control.
   It cannot and will never be able to see inside a cross-origin third-party <iframe> (VidSrc, live TV
   embeds); that's a hard browser security boundary, not a limitation of this code. */
let contentBlurModel = null;
let contentBlurLoadPromise = null;
function loadScriptOnce(src, timeoutMs){
  timeoutMs = timeoutMs || 12000;
  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    let done = false;
    const timer = setTimeout(()=>{
      if(done) return;
      done = true;
      s.remove();
      reject(new Error('Timed out loading '+src+' (no response within '+(timeoutMs/1000)+'s — likely blocked by a domain/network restriction rather than a slow connection)'));
    }, timeoutMs);
    s.src = src;
    s.onload = ()=>{ if(done) return; done=true; clearTimeout(timer); resolve(); };
    s.onerror = ()=>{ if(done) return; done=true; clearTimeout(timer); reject(new Error('Failed to load '+src)); };
    document.head.appendChild(s);
  });
}
// Tries each CDN in order and only fails if all of them do — different CDNs are different domains/
// infrastructure, so if one is blocked by a WebView's domain whitelist or a network filter, another
// may still get through.
async function loadScriptWithFallback(urls){
  let lastErr = null;
  for(const url of urls){
    try{ await loadScriptOnce(url); return url; }
    catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('All sources failed');
}
async function loadContentBlurModel(){
  if(contentBlurModel) return contentBlurModel;
  if(contentBlurLoadPromise) return contentBlurLoadPromise;
  contentBlurLoadPromise = (async ()=>{
    if(!window.tf){
      try{
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
          'https://unpkg.com/@tensorflow/tfjs@4.20.0/dist/tf.min.js',
        ]);
      }catch(e){ throw new Error('Step 1/3 (TensorFlow.js) failed: '+e.message); }
    }
    if(!window.nsfwjs){
      try{
        await loadScriptWithFallback([
          'https://cdn.jsdelivr.net/npm/nsfwjs@4.2.1/dist/nsfwjs.min.js',
          'https://unpkg.com/nsfwjs@4.2.1/dist/nsfwjs.min.js',
        ]);
      }catch(e){ throw new Error('Step 2/3 (nsfwjs library) failed: '+e.message); }
    }
    // Model source priority:
    //  1. An explicit URL set in Settings (highest priority — always wins if present).
    //  2. A relative "models/nsfwjs/model.json" next to wherever this page itself is hosted —
    //     works automatically on GitHub Pages (or any host) with zero configuration, since it
    //     resolves relative to this page's own URL rather than needing you to know/paste it.
    //  3. The model bundled inside nsfwjs's own package, as a last resort (no separate network
    //     request needed once the JS above has loaded, since it ships base64-encoded inside
    //     nsfwjs.min.js itself) — but depends on nsfwjs's own CDN-hosted script working at all.
    const explicitUrl = (state.settings.contentBlurModelUrl||'').trim();
    const relativeUrl = new URL('models/nsfwjs/model.json', location.href).href;
    try{
      if(explicitUrl){
        contentBlurModel = await window.nsfwjs.load(explicitUrl);
      } else {
        try{
          const check = await fetch(relativeUrl, {method:'HEAD', cache:'no-store'});
          if(!check.ok) throw new Error('not found at '+relativeUrl);
          contentBlurModel = await window.nsfwjs.load(relativeUrl);
        }catch(relErr){
          contentBlurModel = await window.nsfwjs.load('MobileNetV2');
        }
      }
    }catch(e){ throw new Error('Step 3/3 (model init) failed: '+(e.message||e)); }
    return contentBlurModel;
  })();
  return contentBlurLoadPromise;
}
function contentBlurThreshold(){
  return state.settings.contentBlurLevel==='strict' ? 0.2 : 0.4;
}
// Returns a 0–1 "sensitive" score, or null if the element couldn't be analyzed (e.g. the image/video's
// server doesn't allow cross-origin pixel access — this is common for third-party posters/streams and
// just means we skip that one rather than error out).
async function classifyElementForBlur(el){
  try{
    const model = await loadContentBlurModel();
    const predictions = await model.classify(el);
    return predictions.filter(p=>['Porn','Hentai','Sexy'].includes(p.className)).reduce((sum,p)=>sum+p.probability, 0);
  }catch(e){
    return null;
  }
}
async function classifyAndBlurImage(imgEl){
  if(!state.settings.contentBlur || !imgEl || !imgEl.isConnected) return;
  const score = await classifyElementForBlur(imgEl);
  if(score===null || !imgEl.isConnected) return;
  if(score >= contentBlurThreshold()){
    imgEl.classList.add('content-blurred');
  }
}
function revealBlurredEl(el, ev){
  if(ev) ev.stopPropagation();
  el.classList.remove('content-blurred');
  el.classList.add('content-blur-revealed');
}
function contentBlurImgAttrs(){
  // Attach to any <img> we want covered — safe to include even when the feature is off (no-ops then).
  return `onload="this.classList.add('loaded'); classifyAndBlurImage(this);" onclick="if(this.classList.contains('content-blurred')){ revealBlurredEl(this, event); }"`;
}
function startVideoContentBlurWatch(videoEl){
  if(!state.settings.contentBlur || !videoEl) return null;
  const canvas = document.createElement('canvas');
  canvas.width = 160; canvas.height = 90;
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('playerStage');
  const interval = setInterval(async ()=>{
    if(!videoEl.isConnected || videoEl.paused || videoEl.readyState < 2) return;
    try{
      ctx.drawImage(videoEl, 0, 0, 160, 90);
    }catch(e){
      clearInterval(interval); // tainted canvas — this source's server doesn't allow analysis; stop trying
      return;
    }
    const score = await classifyElementForBlur(canvas);
    if(score===null){ clearInterval(interval); return; }
    if(stage) stage.classList.toggle('content-blurred-video', score >= contentBlurThreshold());
  }, 2500);
  return interval;
}
function allGenres(){

const DEFAULT_GENRES = ['Action','Drama','Comedy','Sci-Fi','Thriller','Horror','Romance','Animation','Documentary','Fantasy','Crime','Adventure'];

function itemProgressPct(item){
  if(item.type==='movie') return movieProgressPct(item);
  const prog = item.progress || {};
  let last = null;
  (item.seasons||[]).forEach(s=>{
    (s.episodes||[]).forEach(e=>{
      const key = 's'+s.number+'e'+e.number;
      if(prog[key]) last = prog[key];
    });
  });
  if(!last || !last.duration) return 0;
  return Math.min(100, Math.round((last.timestamp/last.duration)*100));
}
function movieProgressPct(item){
  const p = (item.progress||{}).movie;
  if(!p || !p.duration) return p && p.watched ? 100 : 0;
  return Math.min(100, Math.round((p.timestamp/p.duration)*100));
}
// Pulls a minute value out of strings like "148 min" / "45m" / "1h 30m" — falls back when missing
// or unparsable, since not every title has runtime data (e.g. titles added without OMDb/TMDB fetch).
function parseRuntimeMinutes(runtimeStr, fallback){
  if(!runtimeStr) return fallback;
  const s = String(runtimeStr);
  const hm = s.match(/(\d+)\s*h(?:r)?\s*(\d+)?\s*m?/i);
  if(hm) return parseInt(hm[1],10)*60 + (hm[2]?parseInt(hm[2],10):0);
  const m = s.match(/(\d+)/);
  return m ? parseInt(m[1],10) : fallback;
}
// Total known runtime (in seconds) for whatever's currently playing — a movie, or one specific
// episode. Used to convert "time the player has been open" into a real percentage instead of the
// old flat "5 minutes = fully watched" placeholder.
function getPlaybackDurationSeconds(item, seasonNum, epNum){
  if(seasonNum!=null){
    const season = (item.seasons||[]).find(s=>s.number===seasonNum);
    const ep = season && (season.episodes||[]).find(e=>e.number===epNum);
    const movieFallback = parseRuntimeMinutes(item.runtime, null);
    const epRuntime = ep && ep.runtime;
    return parseRuntimeMinutes(epRuntime, movieFallback || 45) * 60;
  }
  return parseRuntimeMinutes(item.runtime, 120) * 60;
}
// TV episodes count as watched at 90% (credits tend to run longer relative to a shorter runtime);
// movies at 95%, a bit stricter since their credits are a smaller share of the total length.
function getWatchedThreshold(seasonNum){
  return seasonNum!=null ? 0.90 : 0.95;
}
function isStarted(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && (p.timestamp>5 || p.watched);
  } else {
    const prog = item.progress||{};
    return Object.values(prog).some(p=>p.timestamp>5 || p.watched);
  }
}
function isFullyWatched(item){
  if(item.type==='movie'){
    const p=(item.progress||{}).movie;
    return !!p && p.watched;
  } else {
    const seasons = item.seasons||[];
    const prog = item.progress||{};
    let hasEpisodes = false;
    for(const s of seasons){
      for(const e of (s.episodes||[])){
        hasEpisodes = true;
        const key = 's'+s.number+'e'+e.number;
        if(!prog[key] || !prog[key].watched) return false;
      }
    }
    return hasEpisodes;
  }
}

function router(){
  const hash = location.hash.replace('#','') || 'home';
  const hashParts = hash.split('/');
  const route = hashParts[0];
  const param = hashParts.slice(1).join('/'); // rejoin so multi-segment routes (e.g. genre/movie/Drama) keep every part
  state.route = route;
  state.routeParam = param || null;
  if(route==='detail') state.detailSeason = 0;
  stopHeroAutoplay();
  clearAllCardHoverTimers();
  stopMyShowsCountdown();
  renderShell();
  const root = document.getElementById('pageRoot');
  switch(route){
    case 'movies': root.innerHTML = renderTypePage('movie'); break;
    case 'series': root.innerHTML = renderTypePage('series'); break;
    case 'live': root.innerHTML = renderLiveTV(); break;
    case 'schedule': root.innerHTML = renderSchedule(); if((state.schedule.tab||'mine')==='mine') loadMyShowsSchedule(); else loadScheduleData(); break;
    case 'collections': root.innerHTML = renderCollections(param); break;
    case 'settings': root.innerHTML = renderSettings(); break;
    case 'genre': {
      const genreParts = param.split('/');
      const genreTypeParam = genreParts[0];
      const genreName = decodeURIComponent(genreParts.slice(1).join('/') || '');
      root.innerHTML = renderGenrePage(genreTypeParam, genreName);
      break;
    }
    case 'detail':
      root.innerHTML = renderDetail(param);
      { const detailItem = getItem(param); if(detailItem) loadTmdbSimilarRow(detailItem); }
      break;
    default: root.innerHTML = renderHome();
  }
  startHeroAutoplay();
  window.scrollTo({top:0});
}

function renderHome(){
  const items = state.lib.items;
  if(!items.length){
    return `<div class="page">${emptyState('Your vault is empty','Add your first movie or series to start building your personal streaming library.')}</div>`;
  }
  const recentMovies = items.filter(i=>i.type==='movie').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const recentSeries = items.filter(i=>i.type==='series').sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0)).slice(0,5);
  const heroItems = [...recentMovies, ...recentSeries];
  const watched = items.filter(isStarted).sort((a,b)=> new Date(b.lastWatched||0)-new Date(a.lastWatched||0));
  const continueWatching = watched.filter(i=>!isFullyWatched(i));
  const recentlyAdded = [...items].sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  const favorites = items.filter(i=>i.favorite).sort((a,b)=> new Date(b.dateAdded||0)-new Date(a.dateAdded||0));

  let rows = '';
  if(continueWatching.length) rows += rowHtml('Continue Watching', continueWatching, {removable:true});
  if(favorites.length) rows += rowHtml('Favorites', favorites);
  rows += rowHtml('Recently Added', recentlyAdded.slice(0, GENRE_ROW_CAP));
  allGenres().forEach(g=>{
    const inGenre = recentlyAdded.filter(i=>(i.genre||[]).includes(g));
    if(inGenre.length) rows += genreRowHtml(g, inGenre, 'all');
  });

  return `${heroCarouselHtml(heroItems)}${panoramicBannerHtml(recentlyAdded[0])}<div class="page">${rows}</div>`;
}

let heroDragStartX = null, heroDragging = false, heroDidDrag = false;
function heroPointerDown(e){
  heroDragStartX = (e.touches ? e.touches[0].clientX : e.clientX);
  heroDragging = true;
  heroDidDrag = false;
  stopHeroAutoplay();
  const track = document.getElementById('heroTrack');
  if(track) track.classList.add('dragging');
}
function heroPointerMove(e){
  if(!heroDragging || heroDragStartX==null) return;
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  if(Math.abs(x - heroDragStartX) > 8) heroDidDrag = true;
}
function heroPointerUp(e){
  if(!heroDragging){ startHeroAutoplay(); return; }
  heroDragging = false;
  const track = document.getElementById('heroTrack');
  if(track) track.classList.remove('dragging');
  const endX = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
  const delta = heroDragStartX!=null ? endX - heroDragStartX : 0;
  if(Math.abs(delta) > 50){
    // Sliding left-to-right (positive delta) goes back; right-to-left goes forward.
    if(delta > 0) prevHeroSlide(); else nextHeroSlide();
  } else {
    startHeroAutoplay();
  }
  heroDragStartX = null;
  setTimeout(()=>{ heroDidDrag = false; }, 60);
}
function heroSlideClick(id){
  if(heroDidDrag) return;
  location.hash = 'detail/'+id;
}
function setHeroSlide(i){
  state.heroIndex = i;
  updateHeroTrack();

function nextHeroSlide(){
  if(!state.heroItems || !state.heroItems.length) return;
  state.heroIndex = (state.heroIndex+1) % state.heroItems.length;
  updateHeroTrack();
  startHeroAutoplay();
}
function prevHeroSlide(){
  if(!state.heroItems || !state.heroItems.length) return;
  state.heroIndex = (state.heroIndex-1+state.heroItems.length) % state.heroItems.length;
  updateHeroTrack();
  startHeroAutoplay();
}
function updateHeroTrack(){
  const track = document.getElementById('heroTrack');
  if(track) track.style.transform = `translateX(-${state.heroIndex*100}%)`;
}

/* ---- Card tilt (mouse) / tap-shine (touch) ---- */
const CARD_HOVER_CAPABLE = window.matchMedia('(hover:hover) and (pointer:fine)').matches;
if(CARD_HOVER_CAPABLE){
  document.addEventListener('pointermove', e=>{
    const card = e.target.closest && e.target.closest('.card');
    if(!card) return;
    const r = card.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    card.style.setProperty('--tiltY', (px * 10).toFixed(2) + 'deg');
    card.style.setProperty('--tiltX', (-py * 10).toFixed(2) + 'deg');
  });
  // pointerleave doesn't bubble, but a capture-phase listener on document still sees it on the way down.
  document.addEventListener('pointerleave', e=>{
    const card = e.target && e.target.closest && e.target.closest('.card');
    if(card){ card.style.removeProperty('--tiltX'); card.style.removeProperty('--tiltY'); }
  }, true);
} else {
  document.addEventListener('touchstart', e=>{
    const card = e.target.closest && e.target.closest('.card');
    if(!card) return;
    card.classList.remove('tap-shine');
    void card.offsetWidth; // restart the CSS transition if the same card is tapped again quickly
    card.classList.add('tap-shine');
    setTimeout(()=> card.classList.remove('tap-shine'), 650);
  }, {passive:true});
}

/* ---- Trailer hover preview (TMDB) ---- */
const cardHoverTimers = {};
function clearAllCardHoverTimers(){
  Object.values(cardHoverTimers).forEach(t=>clearTimeout(t));
  for(const k in cardHoverTimers) delete cardHoverTimers[k];
}
function cardHoverStart(e, id){
  if(!state.settings.tmdb) return; // no TMDB key configured — plain hover only
  const cardEl = e.currentTarget;
  clearTimeout(cardHoverTimers[id]);
  cardHoverTimers[id] = setTimeout(()=> showCardTrailer(cardEl, id), 1500);
}
function cardHoverEnd(e, id){
  clearTimeout(cardHoverTimers[id]);
  hideCardTrailer(e.currentTarget);
}
async function showCardTrailer(cardEl, id){
  const item = getItem(id);
  if(!item || !cardEl) return;
  if(!item.trailerChecked){
    await fetchTmdbTrailer(item);
  }
  if(!cardEl.matches(':hover')) return; // mouse already left while we were fetching
  if(!item.trailerKey) return; // checked, none available
  if(cardEl.querySelector('.card-trailer')) return; // already showing
  const wrap = document.createElement('div');
  wrap.className = 'card-trailer';
  wrap.innerHTML = `
    <iframe src="https://www.youtube.com/embed/${item.trailerKey}?autoplay=1&mute=1&controls=0&modestbranding=1&playsinline=1&loop=1&playlist=${item.trailerKey}&rel=0&enablejsapi=1" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    <button type="button" class="card-trailer-mute" data-muted="true" title="Unmute" onclick="event.stopPropagation(); toggleCardTrailerMute(this)">${ICON.volumeOff}</button>`;
  cardEl.appendChild(wrap);
}
function hideCardTrailer(cardEl){
  const el = cardEl && cardEl.querySelector && cardEl.querySelector('.card-trailer');
  if(el) el.remove();
}
function toggleCardTrailerMute(btn){
  const wrap = btn.closest('.card-trailer');
  const iframe = wrap && wrap.querySelector('iframe');
  if(!iframe) return;
  const wasMuted = btn.dataset.muted !== 'false';
  const cmd = wasMuted ? 'unMute' : 'mute';
  try{ iframe.contentWindow.postMessage(JSON.stringify({event:'command', func:cmd, args:[]}), '*'); }catch(e){}
  btn.dataset.muted = wasMuted ? 'false' : 'true';
  btn.title = wasMuted ? 'Mute' : 'Unmute';
  btn.innerHTML = wasMuted ? ICON.volumeOn : ICON.volumeOff;
}
async function fetchTmdbTrailer(item){
  item.trailerChecked = true; // mark so we never re-fetch a title with no trailer on every hover
  if(!state.settings.tmdb){ return; }
  try{
    const type = item.type==='series' ? 'tv' : 'movie';
    const yearParam = item.year ? (type==='movie' ? `&year=${encodeURIComponent(item.year)}` : `&first_air_date_year=${encodeURIComponent(item.year)}`) : '';
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${encodeURIComponent(state.settings.tmdb)}&query=${encodeURIComponent(item.title)}${yearParam}`);
    const searchData = await searchRes.json();
    const match = searchData.results && searchData.results[0];
    if(!match){ saveLib(); return; }
    item.tmdbId = match.id;
    const videoRes = await fetch(`https://api.themoviedb.org/3/${type}/${match.id}/videos?api_key=${encodeURIComponent(state.settings.tmdb)}`);
    const videoData = await videoRes.json();
    const vids = (videoData.results||[]).filter(v=>v.site==='YouTube');
    const trailer = vids.find(v=>v.type==='Trailer' && v.official) || vids.find(v=>v.type==='Trailer') || vids.find(v=>v.type==='Teaser') || vids[0];
    if(trailer) item.trailerKey = trailer.key;
    saveLib();
  }catch(e){
    // Silent fail — a missing preview shouldn't interrupt browsing.
    saveLib();
  }
}

function timeAgo(iso){
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff/60000);
  if(mins<1) return 'just now';
  if(mins<60) return mins+'m ago';
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+'h ago';
  return Math.floor(hrs/24)+'d ago';
}

  if(item.type==='movie'){

    // find first unwatched episode, else first episode
    const flat = [];
    (item.seasons||[]).forEach(s=> (s.episodes||[]).forEach(e=> flat.push({s:s.number,e})));
    let target = flat.find(f=>{
      const key = 's'+f.s+'e'+f.e.number;
      const p = (item.progress||{})[key];
      return !p || !p.watched;
    }) || flat[0];

    else toast('No episodes added yet');
  }

/* =========================================================
   TV SCHEDULE (TVmaze)
========================================================= */
function todayISO(offsetDays){
  const d = new Date();
  d.setDate(d.getDate() + (offsetDays||0));
  return d.toISOString().slice(0,10);
}
function formatScheduleDateLabel(iso){
  const d = new Date(iso+'T00:00:00');
  const diffDays = Math.round((d - new Date(todayISO()+'T00:00:00')) / 86400000);
  const dateStr = d.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric'});
  if(diffDays===0) return 'Today · '+dateStr;
  if(diffDays===1) return 'Tomorrow · '+dateStr;
  if(diffDays===-1) return 'Yesterday · '+dateStr;
  return dateStr;
}
function renderSchedule(){
  const st = state.schedule;
  const tab = st.tab || 'mine';
  return `
    <div class="page">
      <div class="filter-bar">
        <select id="scheduleTabSelect" class="select-input" style="width:auto; border-radius:8px;" onchange="setScheduleTab(this.value)">
          <option value="mine" ${tab==='mine'?'selected':''}>My TV Shows</option>
          <option value="broad" ${tab==='broad'?'selected':''}>Live TV</option>
        </select>
        ${tab==='broad' ? `
          <button class="btn-icon" title="Previous day" onclick="shiftScheduleDate(-1)">${ICON.chevronLeft}</button>
          <div class="schedule-date-label">${formatScheduleDateLabel(st.date)}</div>
          <button class="btn-icon" title="Next day" onclick="shiftScheduleDate(1)">${ICON.chevronRight}</button>
          <span class="tag" title="Change the country in Settings → TV Schedule">${esc(state.settings.scheduleCountry)}</span>
        ` : ''}
        <input class="search-input" placeholder="${tab==='mine'?'Search my shows...':'Search schedule...'}" value="${esc(st.search)}" oninput="setScheduleSearch(this.value)">
      </div>
      <div id="scheduleListing"></div>
    </div>`;
}
function setScheduleTab(val){
  state.schedule.tab = val;
  stopMyShowsCountdown();
  document.getElementById('pageRoot').innerHTML = renderSchedule();
  if(val==='mine') loadMyShowsSchedule(); else loadScheduleData();
}
function shiftScheduleDate(delta){
  const d = new Date(state.schedule.date+'T00:00:00');
  d.setDate(d.getDate()+delta);
  state.schedule.date = d.toISOString().slice(0,10);
  document.getElementById('pageRoot').innerHTML = renderSchedule();
  loadScheduleData();
}
function saveScheduleCountry(){
  const val = document.getElementById('scheduleCountryInput').value;
  state.settings.scheduleCountry = val.trim().toUpperCase().slice(0,2) || 'US';
  saveSettings();
  state.schedule.cache = {};
  toast('Schedule country saved');
  if(state.route==='schedule' && (state.schedule.tab||'mine')==='broad'){
    document.getElementById('pageRoot').innerHTML = renderSchedule();
    loadScheduleData();
  }
}
function setScheduleSearch(val){
  state.schedule.search = val;
  const tab = state.schedule.tab||'mine';
  if(tab==='mine'){
    if(state.schedule._myShowsResults) renderMyShowsListing(state.schedule._myShowsResults);
  } else {
    renderScheduleListing(state.schedule.cache[scheduleCacheKey()] || []);
  }
}
function scheduleCacheKey(){
  return state.settings.scheduleCountry+'_'+state.schedule.date;
}
async function loadScheduleData(){
  const container = document.getElementById('scheduleListing');
  if(!container) return;
  const key = scheduleCacheKey();
  if(state.schedule.cache[key]){ renderScheduleListing(state.schedule.cache[key]); return; }
  container.innerHTML = `<div class="empty-state"><div class="spinner" style="margin:0 auto;"></div><p style="margin-top:16px; color:var(--muted);">Loading schedule…</p></div>`;
  try{
    const res = await fetch(`https://api.tvmaze.com/schedule?country=${encodeURIComponent(state.settings.scheduleCountry)}&date=${state.schedule.date}`);
    if(!res.ok) throw new Error('TVmaze request failed (status '+res.status+')');
    const data = await res.json();
    state.schedule.cache[key] = data;
    if(document.getElementById('scheduleListing')) renderScheduleListing(data);
  }catch(e){
    if(container.isConnected) container.innerHTML = `<div class="empty-state"><h3>Couldn't load the schedule</h3><p>${esc(e.message||'Check your connection and try again.')}</p></div>`;
  }
}
function renderScheduleListing(data){
