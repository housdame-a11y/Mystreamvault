// IMDb Auto Import: paste any IMDb title URL, get metadata + (for TV) full season/episode
// structure pulled automatically from OMDb + TMDB. Stream sources are left for you to fill in —
// see the note in the UI for why links aren't auto-generated.
async function importFromImdb(){
  const raw = document.getElementById('imdbUrlInput').value.trim();
  const idMatch = raw.match(/tt\d{6,10}/);
  if(!idMatch){ toast('Paste a valid IMDb URL (e.g. imdb.com/title/tt0111161/)'); return; }
  const imdbId = idMatch[0];
  if(!state.settings.omdb){ toast('Add your OMDb API key in Settings first'); return; }
  if(!state.settings.tmdb){ toast('Add your TMDB API key in Settings first — needed for backdrops, logos, trailers, and season data'); return; }

  const setBtnState = (text, disabled)=>{
    // Re-queried on demand since applyTmdbDetails re-renders the whole modal partway through.
    const b = document.getElementById('imdbImportBtn');
    if(b){ b.disabled = disabled; b.textContent = text; }
  };
  setBtnState('Importing...', true);
  try{
    // OMDb by IMDb ID gives us a reliable Movie/Series type plus baseline fields.
    const omdbRes = await fetch(`https://www.omdbapi.com/?i=${encodeURIComponent(imdbId)}&plot=full&apikey=${encodeURIComponent(state.settings.omdb)}`);
    const omdb = await omdbRes.json();
    if(omdb.Response==='False'){ toast(omdb.Error || 'IMDb ID not found on OMDb — double-check your OMDb key in Settings'); return; }
    const type = omdb.Type==='series' ? 'series' : 'movie';
    state.editType = type;

    // Resolve the TMDB numeric ID from the IMDb ID so we can pull backdrops/logos/trailers/seasons.
    const tmdbType = type==='series' ? 'tv' : 'movie';
    const findRes = await fetch(`https://api.themoviedb.org/3/find/${imdbId}?api_key=${encodeURIComponent(state.settings.tmdb)}&external_source=imdb_id`);
    const find = await findRes.json();
    if(find.success===false){
      toast(`TMDB error: ${find.status_message||'request failed'} — check your API key in Settings (it needs the "API Key (v3 auth)", not the Read Access Token)`);
      return;
    }
    const results = tmdbType==='movie' ? find.movie_results : find.tv_results;
    const tmdbMatch = results && results[0];

    let info = null;
    if(tmdbMatch){
      info = await applyTmdbDetails(tmdbMatch.id, tmdbType);
    } else {
      if(omdb.Genre) state.editGenres = omdb.Genre.split(',').map(g=>g.trim()).filter(Boolean);
      if(omdb.Actors && omdb.Actors!=='N/A') state.editActors = omdb.Actors.split(',').map(a=>a.trim()).filter(Boolean);
      renderEditModal(state.editingId?getItem(state.editingId):null);
    }

    // Fill in anything TMDB left blank (or wasn't available at all) using OMDb's data,
    // and prefer OMDb's IMDb rating since that's the number most people recognize.
    const setIfEmpty = (id, val)=>{ const el=document.getElementById(id); if(el && !el.value && val && val!=='N/A') el.value = val; };
    setIfEmpty('f_title', omdb.Title);
    setIfEmpty('f_year', (omdb.Year||'').split('–')[0].split('-')[0]);
    setIfEmpty('f_poster', omdb.Poster);
    setIfEmpty('f_desc', omdb.Plot);
    setIfEmpty('f_runtime', omdb.Runtime);
    if(omdb.imdbRating && omdb.imdbRating!=='N/A'){ const r=document.getElementById('f_rating'); if(r) r.value = omdb.imdbRating; }

    state.editImdbMeta = {
      imdbId,
      tmdbId: info ? info.tmdbId : null,
      trailerKey: info ? info.trailerKey : '',
      trailerChecked: !!(info && info.trailerKey),
    };

    const seasonNote = (info && info.seasonCount) ? ` — ${info.seasonCount} season(s), ${info.episodeCount} episode(s)` : '';
    const tmdbNote = tmdbMatch ? '' : ' (no TMDB match — used OMDb data only, so no backdrop/logo/trailer)';
    toast(`Imported from IMDb${seasonNote}${tmdbNote}. Now add your stream source(s) below.`);
  }catch(e){
    toast('Import failed: ' + (e.message || 'check your API keys and the IMDb URL'));
  }finally{
    setBtnState('Import', false);
  }
}

/* =========================================================
   PLAYER
========================================================= */
const VIDSRC_DOMAINS = ['vidsrc-embed.ru','vidsrc-embed.su','vidsrcme.su','vsrc.su'];
const VIDSRC_MATCH = /vidsrc[-a-z]*\.(ru|su|to|me|pro|cc|xyz|net|in|vip)|vsrc\.su/i;

function detectEmbed(url){
  url = url.trim();
  let m;
  if((m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/live\/)([\w-]{6,})/))){
    return {kind:'iframe', src:`https://www.youtube.com/embed/${m[1]}?autoplay=1`};
  }
  // Live stream tied to a channel ID rather than a video ID (e.g. youtube.com/channel/UC.../live)
  if((m = url.match(/youtube\.com\/channel\/([\w-]+)\/live/))){
    return {kind:'iframe', src:`https://www.youtube.com/embed/live_stream?channel=${m[1]}&autoplay=1`};
  }
  if((m = url.match(/dailymotion\.com\/video\/([\w]+)/))){
    return {kind:'iframe', src:`https://www.dailymotion.com/embed/video/${m[1]}`};
  }
  // VidSrc family — always rewritten onto the configured mirror domain
  if(VIDSRC_MATCH.test(url)){
    return {kind:'iframe', src: normalizeVidsrc(url), isVidsrc:true};
  }
  if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)){
    return {kind:'video', src:url};
  }
  if(/\.m3u8(\?|$)/i.test(url)){
    return {kind:'hls', src:url};
  }
  return {kind:'iframe', src:url};
}

function normalizeVidsrc(url){
  const domain = VIDSRC_DOMAINS.includes(state.settings.vidsrcDomain) ? state.settings.vidsrcDomain : VIDSRC_DOMAINS[0];
  let m;
  // imdb/tmdb query-style embed links: keep params, just swap the host
  if((m = url.match(/[?&](imdb|tmdb)=([\w]+)/i))){
    const rest = url.split(/\/\/[^/]+/)[1] || '';
    return `https://${domain}${rest}`;
  }
  // /embed/movie/{id} or /movie/{id}
  if((m = url.match(/\/(?:embed\/)?movie\/([\w]+)/i))){
    return `https://${domain}/embed/movie/${m[1]}`;
  }
  // /embed/tv/{id}/{season}/{episode} or /tv/{id}/{season}/{episode}
  if((m = url.match(/\/(?:embed\/)?tv\/([\w]+)\/(\d+)\/(\d+)/i))){
    return `https://${domain}/embed/tv/${m[1]}/${m[2]}/${m[3]}`;
  }
  // /embed/tv/{id} or /tv/{id}
  if((m = url.match(/\/(?:embed\/)?tv\/([\w]+)/i))){
    return `https://${domain}/embed/tv/${m[1]}`;
  }
  // Unrecognized path shape — just swap the host onto the preferred domain, keep the rest.
  const rest = url.split(/\/\/[^/]+/)[1] || '';
  return `https://${domain}${rest}`;
}

function getNextEpisode(item, seasonNum, epNum){
  if(item.type!=='series' || seasonNum==null) return null;
  const seasons = (item.seasons||[]).slice().sort((a,b)=>a.number-b.number);
  const si = seasons.findIndex(s=>s.number===seasonNum);
  if(si===-1) return null;
  const eps = (seasons[si].episodes||[]).slice().sort((a,b)=>a.number-b.number);
  const ei = eps.findIndex(e=>e.number===epNum);
  if(ei>-1 && ei+1<eps.length){
    return {seasonNum:seasons[si].number, ep:eps[ei+1]};
  }
  if(si+1<seasons.length){
    const nextEps = (seasons[si+1].episodes||[]).slice().sort((a,b)=>a.number-b.number);
    if(nextEps.length) return {seasonNum:seasons[si+1].number, ep:nextEps[0]};
  }
  return null;
}
function playNextEpisode(){
  const p = state.player;
  if(!p) return;
  const item = getItem(p.itemId);
  const next = getNextEpisode(item, p.seasonNum, p.epNum);
  if(!next){ toast('No more episodes'); return; }
  cleanupPlayerTimers();
  openPlayer(item, next.seasonNum, next.ep.number, next.ep.sources||[]);
}

function openPlayer(item, seasonNum, epNum, sources){
  sources = sources || [];
  if(!sources.length){ toast('No sources available'); return; }
  state.player = {
    itemId: item.id, seasonNum, epNum, sources, sourceIdx:0,
    key: seasonNum!=null ? 's'+seasonNum+'e'+epNum : 'movie',
    subtitle: seasonNum!=null ? `Season ${seasonNum} · Episode ${epNum}` : (item.year||''),
  };
  item.lastWatched = new Date().toISOString();
  saveLib();
  renderPlayer();
  document.getElementById('playerOverlay').classList.add('open');
}
function playChannel(id){
  const ch = getChannel(id);
  if(!ch || !ch.sources || !ch.sources.length){ toast('No stream sources available'); return; }
  state.player = {
    isLive:true, channelId:id, sources:ch.sources, sourceIdx:0,
    subtitle: ch.category || 'General',
    title: ch.name,
  };
  renderPlayer();
  document.getElementById('playerOverlay').classList.add('open');
}
function renderPlayer(){
  const p = state.player;
  const isLive = !!p.isLive;
  const item = isLive ? null : getItem(p.itemId);
  const titleText = isLive ? p.title : item.title;
  const src = p.sources[p.sourceIdx];
  const embed = detectEmbed(src.url);
  const overlay = document.getElementById('playerOverlay');
  const next = isLive ? null : getNextEpisode(item, p.seasonNum, p.epNum);

  let stageHtml = '';
  if(embed.kind==='video'){
    stageHtml = `<video id="playerVideoEl" src="${esc(embed.src)}" controls autoplay></video>`;
  } else if(embed.kind==='hls'){
    stageHtml = `<video id="playerVideoEl" controls autoplay playsinline></video>`;
  } else {
    // Sandbox is opt-in via Settings > Block Popup/Redirect Ads. It stops third-party embeds from
    // opening popups or redirecting the tab, but some ad-supported mirrors (like certain VidSrc
    // clones) detect a sandboxed/popup-blocked iframe and refuse to play ("Media Unavailable") as a
    // countermeasure — so it's off by default to match normal-browser playback behavior.
    const sandboxAttr = state.settings.blockPopupAds ? ' sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"' : '';
    stageHtml = `<iframe id="playerIframeEl" src="${esc(embed.src)}" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen loading="eager"${sandboxAttr}></iframe>`;
  }

  overlay.innerHTML = `
    <div class="player-top">
      <div>
        <div class="player-title">${isLive?'<span class="live-badge">● LIVE</span> ':''}${esc(titleText)} ${embed.kind==='hls'?'<span class="hls-badge">HLS</span>':''}</div>
        <div class="player-sub">${esc(p.subtitle)} ${src.label?'· '+esc(src.label):''}</div>
      </div>
      <div class="player-top-actions">
        <button class="btn-icon" id="playerFullscreenBtn" title="Fullscreen" onclick="togglePlayerFullscreen()">${ICON.expand}</button>
        <button class="btn-icon" onclick="closePlayer()">${ICON.close}</button>
      </div>
    </div>
    <div class="player-stage" id="playerStage">
      ${stageHtml}
      <div class="player-loading" id="playerLoading"><div class="spinner"></div><span class="player-loading-label">Loading stream…</span></div>
      <div class="player-hover-zone" onmouseenter="scheduleHideControls()"></div>
    </div>
    <div id="upNextBanner"></div>
    ${next ? `
    <div class="player-next-side" title="Play next episode" onclick="playNextEpisode()">
      <div class="pns-thumb">${next.ep.thumbnail?`<img src="${esc(next.ep.thumbnail)}" alt="">`:''}<span class="pns-play-icon">${ICON.play}</span></div>
      <div class="pns-meta">
        <span class="pns-label">Next Episode</span>
        <span class="pns-title">${esc(next.ep.title||('Episode '+next.ep.number))}</span>
      </div>
    </div>` : ''}
    ${p.sources.length>1 ? `<div class="player-bottom"><button class="btn btn-ghost" onclick="tryNextSource()">Try Next Source</button></div>` : ''}
  `;
  scheduleHideControls();

  const isVideoLike = embed.kind==='video' || embed.kind==='hls';
  const stageEl = document.getElementById(isVideoLike ? 'playerVideoEl' : 'playerIframeEl');
  const hideSpinner = ()=>{ const l = document.getElementById('playerLoading'); if(l) l.classList.add('done'); };
  if(stageEl){
    stageEl.addEventListener('load', hideSpinner);
    stageEl.addEventListener('loadeddata', hideSpinner);
    stageEl.addEventListener('canplay', hideSpinner);
  }
  // Safety net: some cross-origin iframes never fire load reliably — clear the spinner regardless.
  setTimeout(hideSpinner, 4000);

  if(embed.kind==='hls') initHlsPlayer(embed.src, hideSpinner);

  if(isLive) return; // no progress tracking / watch timers for live channels

  if(isVideoLike){
    const vid = document.getElementById('playerVideoEl');
    const saved = (item.progress||{})[p.key];
    if(saved && saved.timestamp) vid.currentTime = saved.timestamp;
    p._interval = setInterval(()=>{
      if(!vid.duration || !isFinite(vid.duration)) return;
      saveProgress(item, p.key, vid.currentTime, vid.duration, vid.currentTime >= vid.duration-5);
    }, 5000);
    vid.addEventListener('ended', ()=>{
      if(isFinite(vid.duration)) saveProgress(item, p.key, vid.duration, vid.duration, true);
      if(next) showUpNextBanner(next);
    });
    vid.addEventListener('error', ()=>{
      hideSpinner();
      if(p.sources.length>1){ toast('This source failed — trying the next one'); tryNextSource(); }
      else toast('This source failed to play');
    });
  } else {
    clearTimeout(p._watchTimer);
    p._watchTimer = setTimeout(()=>{
      saveProgress(item, p.key, 300, 300, true);
    }, 5*60*1000);
  }
}
let hlsJsLoadPromise = null;
function loadHlsJs(){
  if(window.Hls) return Promise.resolve(window.Hls);
  if(hlsJsLoadPromise) return hlsJsLoadPromise;
  hlsJsLoadPromise = new Promise((resolve, reject)=>{
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js';
    script.onload = ()=> resolve(window.Hls);
    script.onerror = ()=> reject(new Error('Failed to load HLS.js'));
    document.head.appendChild(script);
  });
  return hlsJsLoadPromise;
}
async function initHlsPlayer(src, hideSpinner){
  const vid = document.getElementById('playerVideoEl');
  if(!vid) return;
  // Safari (and some mobile browsers) can play HLS natively — no library needed.
  if(vid.canPlayType('application/vnd.apple.mpegurl')){
    vid.src = src;
    return;
  }
  try{
    const Hls = await loadHlsJs();
    if(!Hls || !Hls.isSupported()){
      toast('HLS playback is not supported in this browser');
      hideSpinner && hideSpinner();
      return;
    }
    const hls = new Hls({ maxBufferLength: 30, enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ hideSpinner && hideSpinner(); vid.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (evt, data)=>{
      if(!data.fatal) return;
      if(data.type===Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
      else if(data.type===Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
      else{
        hideSpinner && hideSpinner();
        if(state.player && state.player.sources.length>1){ toast('Stream failed — trying the next source'); tryNextSource(); }
        else toast('Stream failed to load');
        hls.destroy();
      }
    });
    if(state.player) state.player._hls = hls;
  }catch(e){
    toast('Failed to load the HLS player');
    hideSpinner && hideSpinner();
  }
}
function togglePlayerFullscreen(){
  const stage = document.getElementById('playerStage');
  if(!stage) return;
  if(!document.fullscreenElement) stage.requestFullscreen?.().catch(()=>{});
  else document.exitFullscreen?.().catch(()=>{});
}
function showUpNextBanner(next){
  const el = document.getElementById('upNextBanner');
  if(!el) return;
  const totalSeconds = 8;
  let seconds = totalSeconds;
  el.innerHTML = `
    <div class="up-next">
      <div class="up-next-thumb">${next.ep.thumbnail?`<img src="${esc(next.ep.thumbnail)}" alt="">`:''}</div>
      <div class="up-next-info">
        <span class="up-next-label">Up Next</span>
        <span class="up-next-title">${esc(next.ep.title||('Episode '+next.ep.number))}</span>
        <div class="up-next-progress"><div id="upNextProgressBar"></div></div>
      </div>
      <div class="up-next-actions">
        <button class="btn btn-primary" onclick="playNextEpisode()">${ICON.play} Play Now</button>
        <button class="btn btn-ghost" onclick="cancelUpNext()">Cancel</button>
      </div>
    </div>`;
  const bar = document.getElementById('upNextProgressBar');
  if(bar) bar.style.transition = `width ${totalSeconds}s linear`;
  requestAnimationFrame(()=>{ if(bar) bar.style.width = '100%'; }); // triggers the CSS transition
  state.player._upNextInterval = setInterval(()=>{
    seconds--;
    if(seconds<=0){
      clearInterval(state.player._upNextInterval);
      playNextEpisode();
    }
  }, 1000);
}
function cancelUpNext(){
  if(state.player && state.player._upNextInterval) clearInterval(state.player._upNextInterval);
  const el = document.getElementById('upNextBanner');
  if(el) el.innerHTML = '';
}
function saveProgress(item, key, timestamp, duration, watched){
  item.progress = item.progress || {};
  item.progress[key] = {timestamp: Math.round(timestamp||0), duration: Math.round(duration||0), watched: !!watched};
  item.lastWatched = new Date().toISOString();
  saveLib();
}
function tryNextSource(){
  const p = state.player;
  p.sourceIdx = (p.sourceIdx+1) % p.sources.length;
  cleanupPlayerTimers();
  renderPlayer();
}
function cleanupPlayerTimers(){
  if(state.player){
    clearInterval(state.player._interval);
    clearTimeout(state.player._watchTimer);
    clearInterval(state.player._upNextInterval);
    if(state.player._hls){ try{ state.player._hls.destroy(); }catch(e){} state.player._hls = null; }
  }
  clearTimeout(controlsHideTimer);
}
let controlsHideTimer = null;
function scheduleHideControls(){
  clearTimeout(controlsHideTimer);
  const overlay = document.getElementById('playerOverlay');
  if(overlay) overlay.classList.remove('controls-hidden');
  controlsHideTimer = setTimeout(()=>{
    const ov = document.getElementById('playerOverlay');
    if(ov && ov.classList.contains('open')) ov.classList.add('controls-hidden');
  }, 3200);
}
document.addEventListener('mousemove', e=>{
  const overlay = document.getElementById('playerOverlay');
  if(overlay && overlay.classList.contains('open')) scheduleHideControls();
});
document.addEventListener('touchstart', e=>{
  const overlay = document.getElementById('playerOverlay');
  if(overlay && overlay.classList.contains('open')) scheduleHideControls();
});
function closePlayer(){
  cleanupPlayerTimers();
  document.getElementById('playerOverlay').classList.remove('open','controls-hidden');
  setTimeout(()=>{ document.getElementById('playerOverlay').innerHTML=''; }, 260);
  state.player = null;
  router();
}

/* =========================================================
   GLOBAL KEYS
========================================================= */
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(document.getElementById('playerOverlay').classList.contains('open')) closePlayer();
    else if(document.getElementById('modalOverlay').classList.contains('open')) closeModal();
    return;
  }
  const playerOpen = document.getElementById('playerOverlay').classList.contains('open');
  if(!playerOpen) return;
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
  const vid = document.getElementById('playerVideoEl');
  scheduleHideControls();
  if(e.key==='f' || e.key==='F'){ e.preventDefault(); togglePlayerFullscreen(); return; }
  if(!vid) return; // remaining shortcuts only apply to direct video sources, not third-party iframes
  if(e.key===' ' || e.code==='Space'){ e.preventDefault(); vid.paused ? vid.play() : vid.pause(); }
  else if(e.key==='ArrowRight'){ e.preventDefault(); vid.currentTime = Math.min(vid.duration||Infinity, vid.currentTime+10); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); vid.currentTime = Math.max(0, vid.currentTime-10); }
  else if(e.key==='m' || e.key==='M'){ e.preventDefault(); vid.muted = !vid.muted; }
});

/* =========================================================
   INIT
========================================================= */
router.__manual__ = function(){};
router();
</script>
